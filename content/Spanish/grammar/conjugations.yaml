# ============================================================
# IRREGULAR IMPERATIVE (TÚ) COMMANDS
# ============================================================
irregular_tú_commands:
  decir: di
  hacer: haz
  ir: ve
  poner: pon
  salir: sal
  ser: sé
  tener: ten
  venir: ven
  notes:
    en: "These 8 verbs have irregular affirmative tú commands. Negative tú commands use the present subjunctive (e.g., no digas, no hagas)."
    ko: "이 8개 동사는 불규칙 긍정 tú 명령형을 가짐. 부정 tú 명령형은 현재 접속법을 사용 (예: no digas, no hagas)."

# ============================================================
# IRREGULAR PAST PARTICIPLES
# ============================================================
irregular_past_participles:
  abrir: abierto
  cubrir: cubierto
  decir: dicho
  escribir: escrito
  hacer: hecho
  morir: muerto
  poner: puesto
  romper: roto
  ver: visto
  volver: vuelto
  notes:
    en: >
      Past participles are used with HABER for compound tenses (invariable)
      and with SER/ESTAR as adjectives (must agree in gender/number:
      -o/-a/-os/-as). Example: Las puertas están abiertas. Los libros
      fueron escritos por ella.
    ko: >
      과거분사는 HABER와 함께 복합 시제에서 사용되며 (변하지 않음),
      SER/ESTAR와 함께 형용사로 사용될 때는 성/수 일치 필요
      (-o/-a/-os/-as). 예: Las puertas están abiertas. Los libros
      fueron escritos por ella.

# ============================================================
# IRREGULAR GERUNDS (PRESENT PARTICIPLES)
# ============================================================
irregular_gerunds:
  decir: diciendo
  dormir: durmiendo
  ir: yendo
  leer: leyendo
  oír: oyendo
  pedir: pidiendo
  seguir: siguiendo
  notes:
    en: >
      Regular gerund formation: -AR → -ando, -ER/-IR → -iendo.
      Stem-changing -IR verbs change e→i or o→u in gerund.
      Verbs with stems ending in a vowel use -yendo (leer → leyendo, oír → oyendo).
    ko: >
      규칙적 현재분사 형성: -AR → -ando, -ER/-IR → -iendo.
      어간 변화 -IR 동사는 현재분사에서 e→i 또는 o→u 변화.
      어간이 모음으로 끝나는 동사는 -yendo 사용 (leer → leyendo, oír → oyendo).
