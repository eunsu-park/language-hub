- id: 8_common_daily_expressions
  label:
    en: 8. Common Daily Expressions
    ko: 8. 일상 표현
  type: vocabulary
  words:
  - spanish: ¡Buenos días!
    translation:
      en: Good morning!
      ko: 좋은 아침이에요!
    gender: null
  - spanish: ¡Buenas tardes!
    translation:
      en: Good afternoon!
      ko: 좋은 오후예요!
    gender: null
  - spanish: ¡Buenas noches!
    translation:
      en: Good evening/night!
      ko: 좋은 저녁이에요! / 안녕히 주무세요!
    gender: null
  - spanish: ¡Que tengas un buen día!
    translation:
      en: Have a nice day!
      ko: 좋은 하루 보내세요!
    gender: null
  - spanish: ¡Que descanses!
    translation:
      en: Rest well!
      ko: 푹 쉬세요!
    gender: null
  - spanish: ¡Buen provecho!
    translation:
      en: Enjoy your meal!
      ko: 맛있게 드세요!
    gender: null
  - spanish: ¡Salud!
    translation:
      en: Cheers! / Bless you!
      ko: 건배! / 건강하세요!
    gender: null
  - spanish: Con permiso.
    translation:
      en: Excuse me.
      ko: 실례합니다.
    gender: null
  - spanish: Perdón. / Disculpe.
    translation:
      en: Sorry. / Excuse me.
      ko: 죄송합니다. / 실례합니다.
    gender: null
  - spanish: ¡Felicidades!
    translation:
      en: Congratulations!
      ko: 축하합니다!
    gender: null
  - spanish: ¡Feliz cumpleaños!
    translation:
      en: Happy birthday!
      ko: 생일 축하합니다!
    gender: null
  - spanish: ¡Buena suerte!
    translation:
      en: Good luck!
      ko: 행운을 빕니다!
    gender: null
  - spanish: ¡Que te vaya bien!
    translation:
      en: May it go well!
      ko: 잘 되길 바랍니다!
    gender: null
  - spanish: ¡Cuídate!
    translation:
      en: Take care!
      ko: 몸 조심하세요!
    gender: null
  - spanish: No te preocupes.
    translation:
      en: Don't worry.
      ko: 걱정하지 마세요.
    gender: null
  - spanish: Lo siento.
    translation:
      en: I'm sorry.
      ko: 유감입니다.
    gender: null
  - spanish: No hay de qué.
    translation:
      en: You're welcome.
      ko: 천만에요.
    gender: null
  - spanish: De nada.
    translation:
      en: You're welcome.
      ko: 천만에요.
    gender: null
  - spanish: Con mucho gusto.
    translation:
      en: With pleasure.
      ko: 기꺼이요.
    gender: null
  - spanish: No importa.
    translation:
      en: It doesn't matter.
      ko: 상관없어요.
    gender: null
