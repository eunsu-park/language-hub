- id: motion_verbs
  label:
    en: Motion Verbs
    ko: 이동 동사
  type: vocabulary
  words:
  - spanish: ir
    translation:
      en: to go
      ko: 가다
    gender: null
    notes:
      en: Highly irregular; voy, vas, va, vamos, vais, van
      ko: 매우 불규칙; voy, vas, va, vamos, vais, van
  - spanish: venir
    translation:
      en: to come
      ko: 오다
    gender: null
    notes:
      en: Irregular; yo form = vengo; stem-changing (e→ie)
      ko: 불규칙; yo 형태 = vengo; 어간 변화 (e→ie)
  - spanish: ir a
    translation:
      en: to be going to (future)
      ko: ~할 예정이다
    gender: null
    notes:
      en: "Voy a comer. — I'm going to eat."
      ko: "Voy a comer. — 먹을 예정이다."
