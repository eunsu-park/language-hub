lesson: 04_Essential_Verbs
lesson_number: 4
cefr: A1
categories:
- id: 21_present_tense_conjugation
  label:
    en: 2.1 Present Tense Conjugation
    ko: 2.1 현재 시제 활용(Conjugation)
  type: conjugation
  verb: ser
  tense: present
  entries:
  - subject: yo
    form: soy
    example:
      es: Soy estudiante.
      en: I'm a student.
  - subject: tú
    form: eres
    example:
      es: Eres inteligente.
      en: You're smart.
  - subject: él/ella/usted
    form: es
    example:
      es: Es profesor.
      en: He's a teacher.
  - subject: nosotros/as
    form: somos
    example:
      es: Somos coreanos.
      en: We're Korean.
  - subject: vosotros/as
    form: sois
    example:
      es: Sois amigos.
      en: You all are friends.
  - subject: ellos/ellas/ustedes
    form: son
    example:
      es: Son las tres.
      en: It's three o'clock.
- id: 31_present_tense_conjugation
  label:
    en: 3.1 Present Tense Conjugation
    ko: 3.1 현재 시제 활용(Conjugation)
  type: conjugation
  verb: estar
  tense: present
  entries:
  - subject: yo
    form: estoy
    example:
      es: Estoy en casa.
      en: I'm at home.
  - subject: tú
    form: estás
    example:
      es: ¿Cómo estás?
      en: How are you?
  - subject: él/ella/usted
    form: está
    example:
      es: Está contento.
      en: He's happy.
  - subject: nosotros/as
    form: estamos
    example:
      es: Estamos cansados.
      en: We're tired.
  - subject: vosotros/as
    form: estáis
    example:
      es: ¿Estáis listos?
      en: Are you all ready?
  - subject: ellos/ellas/ustedes
    form: están
    example:
      es: Están en Madrid.
      en: They're in Madrid.
- id: 51_present_tense_conjugation
  label:
    en: 5.1 Present Tense Conjugation
    ko: 5.1 현재 시제 활용(Conjugation)
  type: conjugation
  verb: tener
  tense: present
  entries:
  - subject: yo
    form: tengo
    example:
      es: Tengo un gato.
      en: I have a cat.
  - subject: tú
    form: tienes
    example:
      es: ¿Tienes tiempo?
      en: Do you have time?
  - subject: él/ella/usted
    form: tiene
    example:
      es: Tiene 30 años.
      en: He's 30 years old.
  - subject: nosotros/as
    form: tenemos
    example:
      es: Tenemos clase.
      en: We have class.
  - subject: vosotros/as
    form: tenéis
    example:
      es: ¿Tenéis hambre?
      en: Are you hungry?
  - subject: ellos/ellas/ustedes
    form: tienen
    example:
      es: Tienen dos hijos.
      en: They have two children.
- id: ser_estar_expressions
