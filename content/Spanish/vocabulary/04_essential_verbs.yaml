      ko: "Soy de Corea. — 나는 한국 출신이다."
  - spanish: es importante
    translation:
      en: it is important
      ko: 중요하다
    gender: null
  - spanish: es necesario
    translation:
      en: it is necessary
      ko: 필요하다
    gender: null
  - spanish: es posible
    translation:
      en: it is possible
      ko: 가능하다
    gender: null
  - spanish: es imposible
    translation:
      en: it is impossible
      ko: 불가능하다
    gender: null
  - spanish: es fácil
    translation:
      en: it is easy
      ko: 쉽다
    gender: null
  - spanish: es difícil
    translation:
