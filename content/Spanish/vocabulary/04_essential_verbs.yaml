    gender: null
- id: haber_expressions
  label:
    en: Haber Expressions
    ko: Haber 표현
  type: vocabulary
  words:
  - spanish: hay
    translation:
      en: there is / there are
      ko: ~이 있다
    gender: null
    notes:
      en: Impersonal form of haber; invariable for singular/plural
      ko: haber의 비인칭형; 단수/복수 동일
  - spanish: hay que
    translation:
      en: one must / it is necessary to
      ko: ~해야 한다
    gender: null
    notes:
      en: "Hay que estudiar. — One must study."
      ko: "Hay que estudiar. — 공부해야 한다."
  - spanish: no hay
    translation:
      en: there is not / there are not
      ko: ~이 없다
    gender: null
  - spanish: ¿Hay...?
    translation:
      en: Is there...? / Are there...?
      ko: ~이 있나요?
    gender: null
  - spanish: hay mucho/a
    translation:
      en: there is a lot of
      ko: 많이 있다
    gender: null
  - spanish: hay poco/a
    translation:
      en: there is little of
      ko: 적게 있다
    gender: null
  - spanish: hay demasiado/a
    translation:
      en: there is too much
      ko: 너무 많이 있다
    gender: null
  - spanish: hay suficiente
    translation:
      en: there is enough
      ko: 충분히 있다
    gender: null
  - spanish: no hay nada
    translation:
      en: there is nothing
      ko: 아무것도 없다
    gender: null
  - spanish: no hay nadie
    translation:
      en: there is nobody
      ko: 아무도 없다
    gender: null
- id: other_essential_verbs
  label:
    en: Other Essential Verbs
    ko: 기타 필수 동사
  type: vocabulary
  words:
  - spanish: hacer
    translation:
      en: to do / to make
      ko: 하다 / 만들다
    gender: null
    notes:
      en: Irregular; yo form = hago
      ko: 불규칙; yo 형태 = hago
  - spanish: poder
    translation:
      en: to be able to / can
      ko: ~할 수 있다
    gender: null
    notes:
      en: Stem-changing (o→ue); puedo, puedes...
      ko: 어간 변화 (o→ue); puedo, puedes...
  - spanish: querer
    translation:
      en: to want / to love
      ko: 원하다 / 사랑하다
    gender: null
    notes:
      en: Stem-changing (e→ie); quiero, quieres...
      ko: 어간 변화 (e→ie); quiero, quieres...
  - spanish: saber
    translation:
      en: to know (facts/how to)
      ko: 알다 (사실/방법)
    gender: null
    notes:
      en: "Sé nadar. — I know how to swim."
      ko: "Sé nadar. — 수영할 줄 안다."
  - spanish: conocer
