    ko: 2.7 인사에 대한 응답
  type: vocabulary
  words:
  - spanish: Bien, gracias.
    translation:
      en: Fine, thanks.
      ko: 잘 지내, 고마워.
    gender: null
  - spanish: Muy bien.
    translation:
      en: Very well.
      ko: 아주 잘 지내.
    gender: null
  - spanish: Más o menos.
    translation:
      en: So-so.
      ko: 그저 그래.
    gender: null
  - spanish: Regular.
    translation:
