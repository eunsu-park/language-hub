- id: 21_common_informal_greetings
  label:
    en: 2.1 Common Informal Greetings
    ko: 2.1 일반적인 비격식 인사
  type: vocabulary
  words:
  - spanish: ¡Hola!
    translation:
      en: Hi!
      ko: 안녕!
    gender: null
    notes:
      en: Universal, any time
      ko: 보편적, 아무 때나
  - spanish: ¿Qué tal?
    translation:
      en: How's it going?
      ko: 잘 지내?
    gender: null
    notes:
      en: Very common
      ko: 매우 흔함
  - spanish: ¿Cómo estás?
    translation:
      en: How are you?
      ko: 어떻게 지내?
    gender: null
    notes:
      en: Standard informal
      ko: 표준 비격식
  - spanish: ¿Qué hay?
    translation:
      en: What's up?
      ko: 무슨 일이야?
    gender: null
    notes:
      en: Casual
      ko: 가벼운 표현
  - spanish: ¿Qué pasa?
    translation:
      en: What's happening?
      ko: 무슨 일이야?
    gender: null
    notes:
      en: Very casual
      ko: 매우 가벼운 표현
  - spanish: ¿Cómo te va?
    translation:
      en: How's it going for you?
      ko: 잘 되어 가?
    gender: null
    notes:
      en: Friendly
      ko: 친근한 표현
  - spanish: ¿Qué hay de nuevo?
    translation:
      en: What's new?
      ko: 새로운 거 있어?
    gender: null
    notes:
      en: Catching up
      ko: 안부를 물을 때
