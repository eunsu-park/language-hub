lesson: 02_Greetings_and_Basic_Conversation
lesson_number: 2
cefr: A1
categories:
- id: 21_common_informal_greetings
  label:
    en: 2.1 Common Informal Greetings
    ko: 2.1 일반적인 비격식 인사
  type: vocabulary
  words:
  - spanish: ¡Hola!
    translation:
      en: Hi!
      ko: 안녕!
    gender: null
    notes:
      en: Universal, any time
      ko: 보편적, 아무 때나
  - spanish: ¿Qué tal?
    translation:
      en: How's it going?
      ko: 잘 지내?
    gender: null
    notes:
      en: Very common
      ko: 매우 흔함
  - spanish: ¿Cómo estás?
    translation:
      en: How are you?
      ko: 어떻게 지내?
    gender: null
    notes:
      en: Standard informal
      ko: 표준 비격식
  - spanish: ¿Qué hay?
    translation:
      en: What's up?
      ko: 무슨 일이야?
    gender: null
    notes:
      en: Casual
      ko: 가벼운 표현
  - spanish: ¿Qué pasa?
    translation:
      en: What's happening?
      ko: 무슨 일이야?
    gender: null
    notes:
      en: Very casual
      ko: 매우 가벼운 표현
  - spanish: ¿Cómo te va?
    translation:
      en: How's it going for you?
      ko: 잘 되어 가?
    gender: null
    notes:
      en: Friendly
      ko: 친근한 표현
  - spanish: ¿Qué hay de nuevo?
    translation:
      en: What's new?
      ko: 새로운 거 있어?
    gender: null
    notes:
      en: Catching up
      ko: 안부를 물을 때
- id: 22_regional_informal_greetings
  label:
    en: 2.2 Regional Informal Greetings
    ko: 2.2 지역별 비격식 인사
  type: vocabulary
  words:
  - spanish: ¿Qué onda?
    translation:
      en: What's up?
      ko: 뭐 해?
    gender: null
    notes:
      en: Mexico
      ko: 멕시코
  - spanish: ¿Qué hubo? / ¿Quiubo?
    translation:
      en: What's up?
      ko: 뭐 해?
    gender: null
    notes:
      en: Colombia
      ko: 콜롬비아
  - spanish: ¿Cómo andás?
    translation:
      en: How are you?
      ko: 어떻게 지내?
    gender: null
    notes:
      en: Argentina (voseo)
      ko: 아르헨티나 (보세오)
  - spanish: ¿Qué tal, tío/tía?
    translation:
      en: What's up, dude?
      ko: 잘 지내, 친구?
    gender: null
    notes:
      en: Spain
      ko: 스페인
  - spanish: ¿Cómo vas?
    translation:
      en: How are you going?
      ko: 어떻게 지내?
    gender: null
    notes:
      en: General
      ko: 일반적
- id: 23_formal_greetings
  label:
    en: 2.3 Formal Greetings
    ko: 2.3 격식 인사
  type: vocabulary
  words:
  - spanish: ¿Cómo está usted?
    translation:
      en: How are you? (formal)
      ko: 어떻게 지내십니까? (격식)
    gender: null
    notes:
      en: Use 'usted' for formal situations
      ko: 격식적인 상황에서 'usted' 사용
  - spanish: Buenos días.
    translation:
      en: Good morning.
      ko: 좋은 아침입니다.
    gender: null
    notes:
      en: Used until noon
      ko: 정오까지 사용
  - spanish: Buenas tardes.
    translation:
      en: Good afternoon.
      ko: 좋은 오후입니다.
    gender: null
    notes:
      en: Used from noon to sunset
      ko: 정오부터 해질녘까지 사용
  - spanish: Buenas noches.
    translation:
      en: Good evening / Good night.
      ko: 좋은 저녁입니다 / 안녕히 주무세요.
    gender: null
    notes:
      en: Greeting and farewell at night
      ko: 밤에 인사와 작별 모두 사용
  - spanish: Es un placer conocerle.
    translation:
      en: It's a pleasure to meet you. (formal)
      ko: 만나서 영광입니다. (격식)
    gender: null
  - spanish: Encantado/a de conocerle.
    translation:
      en: Delighted to meet you. (formal)
      ko: 만나 뵙게 되어 기쁩니다. (격식)
    gender: null
- id: 24_introductions
  label:
    en: 2.4 Introductions
    ko: 2.4 자기소개
  type: vocabulary
  words:
  - spanish: Me llamo...
    translation:
      en: My name is...
      ko: 제 이름은...입니다.
    gender: null
    notes:
      en: Literally 'I call myself'
      ko: 직역하면 '저는 저를 ~라고 부릅니다'
  - spanish: Soy...
    translation:
      en: I am...
      ko: 저는...입니다.
    gender: null
  - spanish: Mucho gusto.
    translation:
      en: Nice to meet you.
      ko: 반갑습니다.
    gender: null
  - spanish: Igualmente.
    translation:
      en: Likewise.
      ko: 저도요.
    gender: null
  - spanish: Encantado/a.
    translation:
      en: Delighted (to meet you).
      ko: 만나서 반갑습니다.
    gender: null
    notes:
      en: Use -o for male, -a for female speaker
      ko: 남성은 -o, 여성은 -a 사용
  - spanish: ¿Cómo te llamas?
    translation:
      en: What's your name? (informal)
      ko: 이름이 뭐야? (비격식)
    gender: null
  - spanish: ¿Cómo se llama usted?
    translation:
      en: What's your name? (formal)
      ko: 성함이 어떻게 되십니까? (격식)
    gender: null
  - spanish: ¿De dónde eres?
    translation:
      en: Where are you from? (informal)
      ko: 어디 출신이야? (비격식)
    gender: null
  - spanish: Soy de...
    translation:
      en: I'm from...
      ko: 저는...출신입니다.
    gender: null
  - spanish: Tengo ... años.
    translation:
      en: I am ... years old.
      ko: 저는 ... 살입니다.
    gender: null
    notes:
      en: Spanish uses 'tener' (to have) for age, not 'ser'
      ko: 스페인어에서는 나이를 말할 때 'ser'가 아닌 'tener' 사용
- id: 25_farewells
  label:
    en: 2.5 Farewells
    ko: 2.5 작별 인사
  type: vocabulary
  words:
  - spanish: ¡Hasta luego!
    translation:
      en: See you later!
      ko: 나중에 봐!
    gender: null
  - spanish: ¡Hasta mañana!
    translation:
      en: See you tomorrow!
      ko: 내일 봐!
    gender: null
  - spanish: ¡Hasta pronto!
    translation:
      en: See you soon!
      ko: 곧 봐!
    gender: null
  - spanish: ¡Nos vemos!
    translation:
      en: See you!
      ko: 또 보자!
    gender: null
    notes:
      en: Very common informal farewell
      ko: 매우 흔한 비격식 작별 인사
  - spanish: ¡Chao!
    translation:
      en: Bye!
      ko: 잘 가!
    gender: null
    notes:
      en: From Italian 'ciao', common in Latin America
      ko: 이탈리아어 'ciao'에서 유래, 라틴 아메리카에서 흔함
  - spanish: ¡Que te vaya bien!
    translation:
      en: Take care! / Hope it goes well!
      ko: 잘 가! / 잘 되길 바라!
    gender: null
  - spanish: ¡Adiós!
    translation:
      en: Goodbye!
      ko: 안녕히 가세요!
    gender: null
  - spanish: ¡Cuídate!
    translation:
      en: Take care!
      ko: 몸 조심해!
    gender: null
