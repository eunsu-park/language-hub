      ko: "'tengo previsto salir' = 떠날 계획이다"
- id: conditional_expressions
  label:
    en: Conditional Expressions
    ko: 조건법 표현
  type: vocabulary
  words:
  - spanish: me gustaría
    translation:
      en: I would like
      ko: ~하고 싶습니다
    gender: null
    notes:
      en: Polite request using conditional
      ko: 조건법을 사용한 공손한 요청
  - spanish: podría
    translation:
      en: could / would be able to
      ko: ~할 수 있을 것이다
    gender: null
  - spanish: debería
    translation:
      en: should / ought to
      ko: ~해야 할 것이다
    gender: null
  - spanish: tendría que
    translation:
      en: would have to
      ko: ~해야 할 텐데
    gender: null
  - spanish: sería mejor
    translation:
      en: it would be better
      ko: ~하는 것이 더 좋을 것이다
    gender: null
  - spanish: en tu lugar
    translation:
      en: in your place / if I were you
      ko: 네 입장이라면
    gender: null
    notes:
      en: Used with conditional; 'en tu lugar, yo iría'
      ko: 조건법과 함께 사용; 'en tu lugar, yo iría'
  - spanish: si pudiera
    translation:
      en: if I could
      ko: 할 수 있다면
    gender: null
  - spanish: si tuviera tiempo
    translation:
      en: if I had time
      ko: 시간이 있다면
    gender: null
  - spanish: ¿Te importaría...?
    translation:
      en: Would you mind...?
      ko: ~해 주시겠어요?
    gender: null
    notes:
      en: Polite conditional request
      ko: 공손한 조건법 요청
  - spanish: ¿Podría usted...?
    translation:
      en: Could you...? (formal)
      ko: ~해 주실 수 있으시겠습니까?
    gender: null
  - spanish: habría
    translation:
      en: there would be
      ko: ~가 있을 것이다
    gender: null
  - spanish: querría
    translation:
      en: I would want
      ko: ~하고 싶을 것이다
    gender: null
    notes:
      en: Less common than 'me gustaría' but valid
      ko: "'me gustaría'보다 덜 쓰이지만 올바른 표현"
  - spanish: en caso de que
    translation:
      en: in case that
      ko: ~할 경우에
    gender: null
    notes:
      en: Triggers subjunctive in the subordinate clause
      ko: 종속절에서 접속법을 유발
  - spanish: con tal de que
    translation:
      en: provided that / as long as
      ko: ~하는 한 / ~하기만 하면
    gender: null
  - spanish: a condición de que
    translation:
      en: on the condition that
      ko: ~한다는 조건으로
    gender: null
- id: compound_tense_vocabulary
  label:
    en: Compound Tense Vocabulary
    ko: 복합 시제 어휘
  type: vocabulary
  words:
  - spanish: haber
    translation:
      en: to have (auxiliary)
      ko: ~했다 (조동사)
    gender: null
    notes:
      en: Auxiliary verb for all compound tenses
      ko: 모든 복합 시제의 조동사
  - spanish: el participio pasado
    translation:
      en: past participle
      ko: 과거분사
    gender: m
  - spanish: ya
    translation:
      en: already
      ko: 이미 / 벌써
    gender: null
    notes:
      en: Common with present perfect; 'ya he comido'
      ko: 현재완료와 함께 사용; 'ya he comido'
  - spanish: todavía no
    translation:
      en: not yet
      ko: 아직 ~하지 않다
    gender: null
    notes:
      en: "'todavía no he terminado' = I haven't finished yet"
      ko: "'todavía no he terminado' = 아직 끝내지 않았다"
  - spanish: alguna vez
    translation:
      en: ever / at some point
      ko: 한 번이라도 / 언젠가
    gender: null
    notes:
      en: Used in questions; '¿has viajado alguna vez?'
      ko: 질문에서 사용; '¿has viajado alguna vez?'
  - spanish: nunca
    translation:
      en: never
      ko: 한 번도 ~하지 않다
    gender: null
    notes:
      en: "'nunca he estado en Japón' = I've never been to Japan"
      ko: "'nunca he estado en Japón' = 일본에 가 본 적이 없다"
  - spanish: aún
    translation:
      en: still / yet
      ko: 아직 / 여전히
    gender: null
  - spanish: recientemente
    translation:
      en: recently
      ko: 최근에
    gender: null
  - spanish: últimamente
    translation:
      en: lately
      ko: 요즘 / 최근에
    gender: null
  - spanish: desde hace
    translation:
      en: for (duration)
      ko: ~전부터 / ~동안
    gender: null
    notes:
      en: "'desde hace dos años' = for two years"
      ko: "'desde hace dos años' = 2년 전부터"
  - spanish: hasta ahora
    translation:
      en: until now / so far
      ko: 지금까지
    gender: null
  - spanish: en mi vida
    translation:
      en: in my life / ever
      ko: 내 인생에서 / 평생
    gender: null
  - spanish: varias veces
    translation:
      en: several times
      ko: 여러 번
    gender: null
  - spanish: muchas veces
    translation:
      en: many times
      ko: 많은 횟수로
    gender: null
  - spanish: apenas
    translation:
      en: barely / hardly
      ko: 거의 ~하지 않다 / 겨우
    gender: null
