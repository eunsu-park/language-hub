lesson: 12_Future_Conditional_and_Compound_Tenses
lesson_number: 12
cefr: B1
categories:
- id: 5_present_perfect
  label:
    en: 5. Present Perfect
    ko: 5. 현재완료
  type: conjugation
  tense: present
  entries:
  - subject: yo
    form: he
    example:
      es: He comido.
      en: I have eaten.
  - subject: tú
    form: has
    example:
      es: ¿Has visto esa película?
      en: Have you seen...?
  - subject: él/ella
    form: ha
    example:
      es: Ha terminado.
      en: He/She has finished.
  - subject: nosotros
    form: hemos
    example:
      es: Hemos estudiado.
      en: We have studied.
  - subject: vosotros
    form: habéis
    example:
      es: ¿Habéis llegado?
      en: Have you all arrived?
  - subject: ellos
    form: han
    example:
      es: Han salido.
      en: They have gone out.
- id: 6_pluperfect_past_perfect
  label:
    en: 6. Pluperfect (Past Perfect)
    ko: 6. 대과거 (과거완료)
  type: conjugation
  tense: present
  entries:
  - subject: yo
    form: había
    example:
      es: Había terminado.
      en: I had finished.
  - subject: tú
    form: habías
    example:
      es: ¿Habías comido?
      en: Had you eaten?
  - subject: él/ella
    form: había
    example:
      es: Había salido.
      en: He/She had left.
  - subject: nosotros
    form: habíamos
    example:
      es: No habíamos visto.
      en: We hadn't seen.
  - subject: ellos
    form: habían
    example:
      es: Habían llegado.
      en: They had arrived.
