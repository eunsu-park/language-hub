    gender: null
  - spanish: dentro de poco
    translation:
      en: in a little while / shortly
      ko: 곧 / 조금 후에
    gender: null
  - spanish: pronto
    translation:
      en: soon
      ko: 곧
    gender: null
  - spanish: más tarde
    translation:
      en: later
      ko: 나중에
    gender: null
  - spanish: algún día
    translation:
      en: someday
      ko: 언젠가
    gender: null
  - spanish: a partir de ahora
    translation:
      en: from now on
      ko: 지금부터
    gender: null
  - spanish: en adelante
    translation:
      en: from now on / henceforth
      ko: 앞으로
    gender: null
  - spanish: tarde o temprano
    translation:
      en: sooner or later
      ko: 조만간
    gender: null
  - spanish: a largo plazo
    translation:
      en: in the long term
      ko: 장기적으로
    gender: null
  - spanish: a corto plazo
    translation:
      en: in the short term
      ko: 단기적으로
    gender: null
  - spanish: está a punto de
    translation:
      en: is about to
      ko: 막 ~하려고 하다
    gender: null
