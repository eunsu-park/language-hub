- id: future_conditional_example_phrases
  label:
    en: Future & Conditional Example Phrases
    ko: 미래 & 조건법 예문
  type: vocabulary
  words:
  - spanish: Mañana iré al médico.
    translation:
      en: Tomorrow I will go to the doctor.
      ko: 내일 병원에 갈 것이다.
    gender: null
    notes:
      en: Simple future tense
      ko: 단순 미래 시제
  - spanish: ¿Vendrás a la fiesta?
    translation:
      en: Will you come to the party?
      ko: 파티에 올 거야?
    gender: null
    notes:
      en: Irregular future stem 'vendr-'
      ko: 불규칙 미래 어간 'vendr-'
  - spanish: Habrá mucha gente.
    translation:
      en: There will be a lot of people.
      ko: 사람이 많을 것이다.
    gender: null
    notes:
      en: Future of 'haber'; irregular stem 'habr-'
      ko: "'haber'의 미래형; 불규칙 어간 'habr-'"
  - spanish: Si fuera rico, viajaría por el mundo.
    translation:
      en: If I were rich, I would travel the world.
      ko: 부자라면 세계를 여행할 텐데.
    gender: null
    notes:
      en: Conditional in si-clause (hypothetical)
      ko: si절에서의 조건법 (가정)
  - spanish: Dijo que vendría.
    translation:
      en: He said he would come.
      ko: 그는 올 거라고 말했다.
    gender: null
    notes:
      en: Conditional for future-in-the-past
      ko: 과거 시점의 미래를 나타내는 조건법
  - spanish: Ya he terminado la tarea.
    translation:
      en: I have already finished the homework.
      ko: 이미 숙제를 끝냈다.
    gender: null
    notes:
      en: Present perfect with 'ya'
      ko: "'ya'와 함께 쓰인 현재완료"
  - spanish: Nunca he visto nieve.
    translation:
      en: I have never seen snow.
      ko: 눈을 본 적이 없다.
    gender: null
    notes:
      en: Present perfect for life experience
      ko: 인생 경험을 나타내는 현재완료
  - spanish: Cuando llegué, ya habían salido.
    translation:
      en: When I arrived, they had already left.
      ko: 내가 도착했을 때 그들은 이미 떠났었다.
    gender: null
    notes:
      en: Pluperfect for action before another past action
      ko: 다른 과거 행동 이전의 행동을 나타내는 대과거
  - spanish: Habría ido, pero estaba enfermo.
    translation:
      en: I would have gone, but I was sick.
      ko: 갔을 텐데, 아팠다.
    gender: null
    notes:
      en: Conditional perfect (habría + past participle)
      ko: 조건 완료 (habría + 과거분사)
  - spanish: Para el viernes, habré terminado.
    translation:
      en: By Friday, I will have finished.
      ko: 금요일까지 끝내 놓을 것이다.
    gender: null
    notes:
      en: Future perfect (habré + past participle)
      ko: 미래 완료 (habré + 과거분사)
  - spanish: Serán las tres.
    translation:
      en: It must be three o'clock.
      ko: 세 시쯤 될 것이다.
    gender: null
    notes:
      en: Future of probability — guessing about the present
      ko: 추측의 미래 — 현재에 대한 추측
  - spanish: Tendría unos 30 años.
    translation:
      en: He was probably about 30 years old.
      ko: 서른 살 정도였을 것이다.
    gender: null
    notes:
      en: Conditional of probability — guessing about the past
      ko: 추측의 조건법 — 과거에 대한 추측
  - spanish: ¿Habrá llegado ya?
    translation:
      en: Could he have arrived already?
      ko: 벌써 도착했을까?
    gender: null
    notes:
      en: Future perfect of probability
      ko: 추측의 미래 완료
  - spanish: No sé qué habrá pasado.
    translation:
      en: I don't know what could have happened.
      ko: 무슨 일이 있었을지 모르겠다.
    gender: null
    notes:
      en: Future perfect expressing conjecture
      ko: 추측을 나타내는 미래 완료
  - spanish: Me habría gustado ir contigo.
    translation:
      en: I would have liked to go with you.
      ko: 너와 함께 가고 싶었을 텐데.
    gender: null
    notes:
      en: Conditional perfect for unfulfilled wish
      ko: 이루어지지 않은 소망의 조건 완료
