- id: preterite_vs_imperfect_signal_words
  label:
    en: Preterite vs. Imperfect Signal Words
    ko: 점과거 vs. 불완료 과거 신호 단어
  type: vocabulary
  words:
  - spanish: cuando
    translation:
      en: when
      ko: ~할 때
    gender: null
    notes:
      en: Can trigger either tense depending on context
      ko: 문맥에 따라 점과거나 불완료 과거 모두 가능
  - spanish: porque
    translation:
      en: because
      ko: 왜냐하면
    gender: null
  - spanish: como
    translation:
      en: as / since
      ko: ~이므로 / ~처럼
    gender: null
    notes:
      en: Often triggers imperfect for background description
      ko: 배경 설명에서 주로 불완료 과거를 유발
  - spanish: después
    translation:
      en: after / afterwards
      ko: 나중에 / 그 후에
    gender: null
    notes:
      en: Usually triggers preterite for sequential actions
      ko: 순차적 행동에서 주로 점과거를 유발
  - spanish: luego
    translation:
      en: then / later
      ko: 그 다음에 / 나중에
    gender: null
    notes:
      en: Sequence marker; usually preterite
      ko: 순서 표지; 주로 점과거
  - spanish: antes
    translation:
      en: before
      ko: 이전에
    gender: null
  - spanish: primero
    translation:
      en: first
      ko: 먼저 / 첫째
    gender: null
    notes:
      en: Sequence marker; usually preterite
      ko: 순서 표지; 주로 점과거
  - spanish: al final
    translation:
      en: in the end
      ko: 결국
    gender: null
  - spanish: de pronto
    translation:
      en: suddenly / all of a sudden
      ko: 갑자기
    gender: null
    notes:
      en: Interruption marker; triggers preterite
      ko: 중단 표지; 점과거를 유발
  - spanish: durante
    translation:
      en: during
      ko: ~동안
    gender: null
- id: past_tense_example_phrases
  label:
    en: Past Tense Example Phrases
    ko: 과거 시제 예문
  type: vocabulary
  words:
  - spanish: Ayer fui al cine.
    translation:
      en: Yesterday I went to the cinema.
      ko: 어제 영화관에 갔다.
    gender: null
    notes:
      en: Preterite — completed action with specific time
      ko: 점과거 — 특정 시점의 완료된 행동
  - spanish: Cuando era niño, jugaba mucho.
    translation:
      en: When I was a child, I used to play a lot.
      ko: 어렸을 때 많이 놀곤 했다.
    gender: null
    notes:
      en: Imperfect — habitual past action
      ko: 불완료 과거 — 습관적 과거 행동
  - spanish: Llovía cuando salí de casa.
    translation:
      en: It was raining when I left the house.
      ko: 내가 집을 나섰을 때 비가 오고 있었다.
    gender: null
    notes:
      en: Imperfect (background) + preterite (interruption)
      ko: 불완료 과거 (배경) + 점과거 (중단)
  - spanish: Conocí a mi esposa en 2010.
    translation:
      en: I met my wife in 2010.
      ko: 2010년에 아내를 만났다.
    gender: null
    notes:
      en: Preterite — 'conocer' in preterite means 'met'
      ko: 점과거 — 'conocer'의 점과거는 '만나다'
  - spanish: No quise hacerlo.
    translation:
      en: I refused to do it.
      ko: 나는 그것을 하기를 거부했다.
    gender: null
    notes:
      en: Preterite of 'querer' in negative = refused
      ko: "'querer'의 점과거 부정형 = 거부했다"
  - spanish: Sabía la verdad.
    translation:
      en: I knew the truth.
      ko: 나는 진실을 알고 있었다.
    gender: null
    notes:
      en: Imperfect — ongoing state of knowledge
      ko: 불완료 과거 — 지속적인 앎의 상태
  - spanish: Supe la verdad.
    translation:
      en: I found out the truth.
      ko: 나는 진실을 알게 되었다.
    gender: null
    notes:
      en: Preterite — moment of discovery
      ko: 점과거 — 알게 된 순간
  - spanish: Eran las tres cuando llegó.
    translation:
      en: It was three o'clock when he arrived.
      ko: 그가 도착했을 때 세 시였다.
    gender: null
    notes:
      en: Imperfect for time + preterite for event
      ko: 시간은 불완료 과거 + 사건은 점과거
  - spanish: Vivíamos en Madrid antes.
    translation:
      en: We used to live in Madrid before.
      ko: 우리는 전에 마드리드에 살았다.
    gender: null
    notes:
      en: Imperfect — description of past living situation
      ko: 불완료 과거 — 과거 거주 상황 설명
  - spanish: Me desperté y desayuné.
    translation:
      en: I woke up and had breakfast.
      ko: 나는 일어나서 아침을 먹었다.
    gender: null
    notes:
      en: Preterite — chain of completed actions
      ko: 점과거 — 완료된 행동의 연쇄
  - spanish: Hacía calor y el sol brillaba.
    translation:
      en: It was hot and the sun was shining.
      ko: 날씨가 덥고 해가 빛나고 있었다.
    gender: null
    notes:
      en: Imperfect — setting/weather description
      ko: 불완료 과거 — 배경/날씨 묘사
  - spanish: De repente, sonó el teléfono.
    translation:
      en: Suddenly, the phone rang.
      ko: 갑자기 전화가 울렸다.
    gender: null
    notes:
      en: Preterite — sudden interrupting event
      ko: 점과거 — 갑작스러운 중단 사건
  - spanish: Todos los veranos íbamos a la playa.
    translation:
      en: Every summer we used to go to the beach.
      ko: 매 여름마다 해변에 가곤 했다.
    gender: null
    notes:
      en: Imperfect — recurring past action
      ko: 불완료 과거 — 반복적 과거 행동
  - spanish: Ella tenía miedo pero lo hizo.
    translation:
      en: She was afraid but she did it.
      ko: 그녀는 무서웠지만 해냈다.
    gender: null
    notes:
      en: Imperfect (emotion) + preterite (action)
      ko: 불완료 과거 (감정) + 점과거 (행동)
  - spanish: Mientras estudiaba, llegó mi amigo.
    translation:
      en: While I was studying, my friend arrived.
      ko: 내가 공부하는 동안 친구가 왔다.
    gender: null
    notes:
      en: Imperfect (ongoing) interrupted by preterite
      ko: 불완료 과거 (진행) 중 점과거로 중단
  - spanish: Podía nadar bien de joven.
    translation:
      en: I could swim well when young.
      ko: 젊었을 때 수영을 잘할 수 있었다.
    gender: null
    notes:
      en: Imperfect — ongoing ability in the past
      ko: 불완료 과거 — 과거의 지속적인 능력
  - spanish: No pude encontrar las llaves.
    translation:
      en: I couldn't find the keys.
      ko: 열쇠를 찾을 수 없었다.
    gender: null
    notes:
      en: Preterite — failed attempt at a specific moment
      ko: 점과거 — 특정 순간의 실패한 시도
