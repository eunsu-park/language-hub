- id: irregular_preterite_verbs
  label:
    en: Irregular Preterite Verbs
    ko: 불규칙 점과거 동사
  type: vocabulary
  words:
  - spanish: tener (tuve)
    translation:
      en: to have (I had)
      ko: 가지다 (나는 가졌다)
    gender: null
    notes:
      en: Irregular stem 'tuv-' in preterite
      ko: 점과거에서 불규칙 어간 'tuv-'
  - spanish: estar (estuve)
    translation:
      en: to be (I was)
      ko: 있다/~이다 (나는 있었다)
    gender: null
    notes:
      en: Irregular stem 'estuv-' in preterite
      ko: 점과거에서 불규칙 어간 'estuv-'
  - spanish: poder (pude)
    translation:
      en: to be able to (I could)
      ko: 할 수 있다 (나는 할 수 있었다)
    gender: null
    notes:
      en: Irregular stem 'pud-' in preterite
      ko: 점과거에서 불규칙 어간 'pud-'
  - spanish: poner (puse)
    translation:
      en: to put (I put)
      ko: 놓다 (나는 놓았다)
    gender: null
    notes:
      en: Irregular stem 'pus-' in preterite
      ko: 점과거에서 불규칙 어간 'pus-'
  - spanish: saber (supe)
    translation:
      en: to know (I found out)
      ko: 알다 (나는 알게 되었다)
    gender: null
    notes:
      en: In preterite means 'found out'; stem 'sup-'
      ko: 점과거에서는 '알게 되다'의 의미; 어간 'sup-'
  - spanish: hacer (hice)
    translation:
      en: to do/make (I did)
      ko: 하다/만들다 (나는 했다)
    gender: null
    notes:
      en: Irregular stem 'hic-'; third person 'hizo'
      ko: 불규칙 어간 'hic-'; 3인칭 'hizo'
  - spanish: venir (vine)
    translation:
      en: to come (I came)
      ko: 오다 (나는 왔다)
    gender: null
    notes:
      en: Irregular stem 'vin-' in preterite
      ko: 점과거에서 불규칙 어간 'vin-'
  - spanish: querer (quise)
    translation:
      en: to want (I wanted/tried)
      ko: 원하다 (나는 원했다/시도했다)
    gender: null
    notes:
      en: In preterite means 'tried to'; stem 'quis-'
      ko: 점과거에서는 '시도했다'의 의미; 어간 'quis-'
  - spanish: decir (dije)
    translation:
      en: to say (I said)
      ko: 말하다 (나는 말했다)
    gender: null
    notes:
      en: Irregular stem 'dij-'; 3rd pl. 'dijeron'
      ko: 불규칙 어간 'dij-'; 3인칭 복수 'dijeron'
  - spanish: traer (traje)
    translation:
      en: to bring (I brought)
      ko: 가져오다 (나는 가져왔다)
    gender: null
    notes:
      en: Irregular stem 'traj-'; 3rd pl. 'trajeron'
      ko: 불규칙 어간 'traj-'; 3인칭 복수 'trajeron'
  - spanish: conducir (conduje)
    translation:
      en: to drive (I drove)
      ko: 운전하다 (나는 운전했다)
    gender: null
    notes:
      en: All -ducir verbs follow this pattern; stem 'conduj-'
      ko: 모든 -ducir 동사가 이 패턴을 따름; 어간 'conduj-'
  - spanish: producir (produje)
    translation:
      en: to produce (I produced)
      ko: 생산하다 (나는 생산했다)
    gender: null
    notes:
      en: Follows -ducir pattern; stem 'produj-'
      ko: -ducir 패턴을 따름; 어간 'produj-'
  - spanish: andar (anduve)
    translation:
      en: to walk (I walked)
      ko: 걷다 (나는 걸었다)
    gender: null
    notes:
      en: Irregular stem 'anduv-' in preterite
      ko: 점과거에서 불규칙 어간 'anduv-'
  - spanish: caber (cupe)
    translation:
      en: to fit (I fit)
      ko: 들어맞다 (나는 들어맞았다)
    gender: null
    notes:
      en: Irregular stem 'cup-' in preterite
      ko: 점과거에서 불규칙 어간 'cup-'
  - spanish: caer (caí)
    translation:
      en: to fall (I fell)
      ko: 넘어지다 (나는 넘어졌다)
    gender: null
    notes:
      en: Spelling change in 3rd person; cayó, cayeron
      ko: 3인칭에서 철자 변화; cayó, cayeron
  - spanish: leer (leí)
    translation:
      en: to read (I read)
      ko: 읽다 (나는 읽었다)
    gender: null
    notes:
      en: Spelling change in 3rd person; leyó, leyeron
      ko: 3인칭에서 철자 변화; leyó, leyeron
  - spanish: oír (oí)
    translation:
      en: to hear (I heard)
      ko: 듣다 (나는 들었다)
    gender: null
    notes:
      en: Spelling change in 3rd person; oyó, oyeron
      ko: 3인칭에서 철자 변화; oyó, oyeron
  - spanish: dormir (dormí)
    translation:
      en: to sleep (I slept)
      ko: 자다 (나는 잤다)
    gender: null
    notes:
      en: Stem change o→u in 3rd person; durmió, durmieron
      ko: 3인칭에서 어간 변화 o→u; durmió, durmieron
  - spanish: pedir (pedí)
    translation:
      en: to ask for (I asked for)
      ko: 요청하다 (나는 요청했다)
    gender: null
    notes:
      en: Stem change e→i in 3rd person; pidió, pidieron
      ko: 3인칭에서 어간 변화 e→i; pidió, pidieron
  - spanish: sentir (sentí)
    translation:
      en: to feel (I felt)
      ko: 느끼다 (나는 느꼈다)
    gender: null
    notes:
      en: Stem change e→i in 3rd person; sintió, sintieron
      ko: 3인칭에서 어간 변화 e→i; sintió, sintieron
