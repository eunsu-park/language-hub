lesson: 25_DELE_and_SIELE_Preparation
lesson_number: 25
cefr: B2-C1
categories:
- id: 1_exam_terminology
  label:
    en: 1. Exam Terminology
    ko: 1. 시험 용어
  type: vocabulary
  words:
  - spanish: el examen
    translation:
      en: the exam
      ko: 시험
    gender: null
    notes:
      en: General term for any exam
      ko: 모든 시험을 가리키는 일반적인 용어
  - spanish: la prueba
    translation:
      en: the test / assessment
      ko: 테스트 / 평가
    gender: null
    notes:
      en: Can refer to a specific section or task
      ko: 특정 섹션이나 과제를 가리킬 수 있음
  - spanish: el candidato / la candidata
    translation:
      en: the candidate
      ko: 응시자
    gender: null
    notes:
      en: The person taking the exam
      ko: 시험을 보는 사람
  - spanish: aprobar
    translation:
      en: to pass (an exam)
      ko: 합격하다
    gender: null
    notes:
      en: "'Aprobé el DELE B2' = I passed DELE B2"
      ko: "'Aprobé el DELE B2' = DELE B2에 합격했다"
  - spanish: suspender
    translation:
      en: to fail (an exam)
      ko: 불합격하다
    gender: null
    notes:
      en: Spain usage; in Latin America, 'reprobar' is more common
      ko: 스페인식 표현; 중남미에서는 'reprobar'가 더 일반적
  - spanish: la calificación
    translation:
      en: the grade / score
      ko: 성적 / 점수
    gender: null
  - spanish: la puntuación
    translation:
      en: the score / points
      ko: 점수 / 배점
    gender: null
  - spanish: la comprensión lectora
    translation:
      en: reading comprehension
      ko: 독해
    gender: null
    notes:
      en: One of the four DELE skill sections
      ko: DELE 4개 영역 중 하나
  - spanish: la expresión escrita
    translation:
      en: written expression
      ko: 쓰기 표현
    gender: null
    notes:
      en: Writing section of DELE/SIELE
      ko: DELE/SIELE의 쓰기 영역
  - spanish: la comprensión auditiva
    translation:
      en: listening comprehension
      ko: 듣기
    gender: null
    notes:
      en: Listening section of DELE/SIELE
      ko: DELE/SIELE의 듣기 영역
  - spanish: la expresión oral
    translation:
      en: oral expression
      ko: 말하기 표현
    gender: null
    notes:
      en: Speaking section of DELE/SIELE
      ko: DELE/SIELE의 말하기 영역
- id: 2_academic_spanish
  label:
    en: 2. Academic Spanish
    ko: 2. 학술 스페인어
  type: vocabulary
  words:
  - spanish: la tesis
    translation:
      en: the thesis
      ko: 논제 / 논문
    gender: null
    notes:
      en: Main argument or dissertation
      ko: 주요 논지 또는 학위 논문
  - spanish: el argumento
    translation:
      en: the argument / reasoning
      ko: 논점 / 논거
    gender: null
    notes:
      en: A point in a debate, not a quarrel
      ko: 토론에서의 논점, 말다툼이 아님
  - spanish: la hipótesis
    translation:
      en: the hypothesis
      ko: 가설
    gender: null
  - spanish: citar
    translation:
      en: to cite / to quote
      ko: 인용하다
    gender: null
    notes:
      en: "'Citar una fuente' = to cite a source"
      ko: "'Citar una fuente' = 출처를 인용하다"
  - spanish: analizar
    translation:
      en: to analyze
      ko: 분석하다
    gender: null
  - spanish: el resumen
    translation:
      en: the summary / abstract
      ko: 요약 / 초록
    gender: null
    notes:
      en: Used for essay summaries or academic abstracts
      ko: 에세이 요약 또는 학술 초록에 사용
  - spanish: el ensayo
    translation:
      en: the essay
      ko: 에세이 / 소론
    gender: null
    notes:
      en: Academic or literary essay
      ko: 학술 또는 문학 에세이
  - spanish: la conclusión
    translation:
      en: the conclusion
      ko: 결론
    gender: null
  - spanish: argumentar
    translation:
      en: to argue / to make a case
      ko: 논증하다
    gender: null
    notes:
      en: To present arguments in support of a position
      ko: 입장을 뒷받침하는 논거를 제시하다
  - spanish: el ámbito
    translation:
      en: scope / field / domain
      ko: 범위 / 분야 / 영역
    gender: m
  - spanish: abordar
    translation:
      en: to address / to tackle (a topic)
      ko: (주제를) 다루다 / 접근하다
    gender: null
  - spanish: plantear
    translation:
      en: to raise / to pose (a question)
      ko: (문제를) 제기하다 / 제시하다
    gender: null
  - spanish: la fuente
    translation:
      en: source
      ko: 출처
    gender: f
  - spanish: el criterio
    translation:
      en: criterion / judgment
      ko: 기준 / 판단
    gender: m
  - spanish: el matiz
    translation:
      en: nuance / shade of meaning
      ko: 뉘앙스 / 미묘한 차이
    gender: m
- id: 3_discourse_markers
  label:
    en: 3. Discourse Markers
    ko: 3. 담화 표지어
  type: vocabulary
  words:
  - spanish: en primer lugar
    translation:
      en: in the first place / firstly
      ko: 우선 / 첫째로
    gender: null
  - spanish: por un lado... por otro
    translation:
      en: on one hand... on the other
      ko: 한편으로는... 다른 한편으로는
    gender: null
  - spanish: a continuación
    translation:
      en: next / following
      ko: 다음으로 / 이어서
    gender: null
  - spanish: en definitiva
    translation:
      en: in short / ultimately
      ko: 결국 / 요컨대
    gender: null
  - spanish: por consiguiente
    translation:
      en: consequently / therefore
      ko: 따라서 / 그 결과
    gender: null
  - spanish: así pues
    translation:
      en: therefore / so then
      ko: 그러므로 / 따라서
    gender: null
  - spanish: ahora bien
    translation:
      en: now then / however
      ko: 그런데 / 그러나
    gender: null
  - spanish: en cuanto a
    translation:
      en: as for / regarding
      ko: ~에 관해서는
    gender: null
  - spanish: dicho esto
    translation:
      en: having said that
      ko: 이를 말했으니
    gender: null
  - spanish: con respecto a
    translation:
      en: with respect to
      ko: ~에 관하여
    gender: null
  - spanish: en lo que se refiere a
    translation:
      en: as far as ... is concerned
      ko: ~에 관한 한
    gender: null
  - spanish: de ahí que
    translation:
      en: hence / that is why
      ko: 그래서 / 그런 이유로
    gender: null
    notes:
      en: Followed by subjunctive
      ko: 접속법이 뒤따름
- id: 4_formal_register_vocabulary
  label:
