- id: 5_exam_task_instructions
  label:
    en: 5. Exam Task Instructions
    ko: 5. 시험 과제 지시어
  type: vocabulary
  words:
  - spanish: Lea el siguiente texto
    translation:
      en: Read the following text
      ko: 다음 텍스트를 읽으시오
    gender: null
  - spanish: Elija la respuesta correcta
    translation:
      en: Choose the correct answer
      ko: 올바른 답을 고르시오
    gender: null
  - spanish: Complete las frases
    translation:
      en: Complete the sentences
      ko: 문장을 완성하시오
    gender: null
  - spanish: Redacte un texto
    translation:
      en: Write a text
      ko: 텍스트를 작성하시오
    gender: null
  - spanish: Justifique su respuesta
    translation:
      en: Justify your answer
      ko: 답을 근거를 들어 설명하시오
    gender: null
  - spanish: Escuche la audición
    translation:
      en: Listen to the recording
      ko: 녹음을 들으시오
    gender: null
  - spanish: Marque verdadero o falso
    translation:
      en: Mark true or false
      ko: 참 또는 거짓을 표시하시오
    gender: null
  - spanish: Relacione cada elemento
    translation:
      en: Match each item
      ko: 각 항목을 연결하시오
    gender: null
  - spanish: Resuma las ideas principales
    translation:
      en: Summarize the main ideas
      ko: 주요 아이디어를 요약하시오
    gender: null
  - spanish: Exprese su opinión
    translation:
      en: Express your opinion
      ko: 의견을 표현하시오
    gender: null
