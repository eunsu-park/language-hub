      en: to give rise to
      ko: ~을 초래하다
    gender: null
  - spanish: poner de manifiesto
    translation:
      en: to reveal / to make evident
      ko: 드러내다 / 분명히 하다
    gender: null
  - spanish: tener en cuenta
    translation:
      en: to take into account
      ko: ~을 고려하다
    gender: null
  - spanish: hacer hincapié en
