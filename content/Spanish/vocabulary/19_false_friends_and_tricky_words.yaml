lesson: 19_False_Friends_and_Tricky_Words
lesson_number: 19
cefr: B2
categories:
- id: 1_false_friends
  label:
    en: 1. False Friends
    ko: 1. 거짓 짝 (헷갈리는 유사 단어)
  type: vocabulary
  words:
  - spanish: embarazada
    translation:
      en: pregnant
      ko: 임신한
    gender: null
    notes:
      en: Does NOT mean 'embarrassed'; use 'avergonzado/a' instead
      ko: "'embarrassed(당황한)'가 아님; 'avergonzado/a'를 사용"
  - spanish: actual
    translation:
      en: current / present
      ko: 현재의
    gender: null
    notes:
      en: Does NOT mean 'actual'; use 'real' or 'verdadero' instead
      ko: "'actual(실제의)'이 아님; 'real' 또는 'verdadero'를 사용"
  - spanish: realizar
    translation:
      en: to carry out / to accomplish
      ko: 수행하다 / 달성하다
    gender: null
    notes:
      en: Does NOT mean 'to realize'; use 'darse cuenta de' instead
      ko: "'realize(깨닫다)'가 아님; 'darse cuenta de'를 사용"
  - spanish: sensible
