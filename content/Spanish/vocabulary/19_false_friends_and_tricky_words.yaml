    gender: null
    notes:
      en: Does NOT mean 'library'; use 'biblioteca' instead
      ko: "'library(도서관)'가 아님; 'biblioteca'를 사용"
  - spanish: recordar
    translation:
      en: to remember
      ko: 기억하다
    gender: null
    notes:
      en: Does NOT mean 'to record'; use 'grabar' instead
      ko: "'record(녹음하다)'가 아님; 'grabar'를 사용"
  - spanish: molestar
    translation:
      en: to bother / to annoy
      ko: 귀찮게 하다 / 성가시게 하다
    gender: null
    notes:
      en: Does NOT mean 'to molest'; use 'abusar (sexualmente)' instead
      ko: "'molest(성추행하다)'가 아님; 'abusar (sexualmente)'를 사용"
  - spanish: bizarro
    translation:
      en: brave, gallant
      ko: 용감한, 씩씩한
    gender: null
    notes:
      en: Does NOT mean 'bizarre'; use 'extraño' or 'raro' instead
      ko: "'bizarre(기이한)'가 아님; 'extraño' 또는 'raro'를 사용"
  - spanish: largo
    translation:
      en: long
      ko: 긴
    gender: null
    notes:
      en: Does NOT mean 'large'; use 'grande' instead
      ko: "'large(큰)'가 아님; 'grande'를 사용"
  - spanish: fábrica
    translation:
      en: factory
      ko: 공장
    gender: f
    notes:
      en: Does NOT mean 'fabric'; use 'tela' or 'tejido' instead
      ko: "'fabric(직물)'이 아님; 'tela' 또는 'tejido'를 사용"
  - spanish: introducir
    translation:
      en: to insert / to input
      ko: 삽입하다 / 입력하다
    gender: null
    notes:
      en: Does NOT mean 'to introduce (a person)'; use 'presentar' instead
      ko: "'introduce(소개하다)'가 아님; 'presentar'를 사용"
  - spanish: suceso
    translation:
      en: event / happening
      ko: 사건 / 일
    gender: m
    notes:
      en: Does NOT mean 'success'; use 'éxito' instead
      ko: "'success(성공)'가 아님; 'éxito'를 사용"
  - spanish: disgusto
    translation:
      en: annoyance / displeasure
      ko: 불쾌 / 기분 나쁨
    gender: m
    notes:
      en: Does NOT mean 'disgust'; use 'asco' or 'repugnancia' instead
      ko: "'disgust(혐오)'가 아님; 'asco' 또는 'repugnancia'를 사용"
  - spanish: soportar
    translation:
      en: to tolerate / to bear
      ko: 참다 / 견디다
    gender: null
    notes:
      en: Does NOT mean 'to support'; use 'apoyar' instead
      ko: "'support(지지하다)'가 아님; 'apoyar'를 사용"
  - spanish: pretender
    translation:
      en: to intend / to try
      ko: 의도하다 / 시도하다
    gender: null
    notes:
      en: Does NOT mean 'to pretend'; use 'fingir' instead
      ko: "'pretend(~인 척하다)'가 아님; 'fingir'를 사용"
  - spanish: contestar
    translation:
      en: to answer / to reply
      ko: 대답하다 / 응답하다
    gender: null
    notes:
      en: Does NOT mean 'to contest'; use 'impugnar' instead
      ko: "'contest(이의를 제기하다)'가 아님; 'impugnar'를 사용"
  - spanish: rope
    translation:
      en: clothes (la ropa)
      ko: 옷 (la ropa)
    gender: null
    notes:
      en: "'Ropa' does NOT mean 'rope'; use 'cuerda' or 'soga' for rope"
      ko: "'Ropa'는 'rope(밧줄)'가 아님; 밧줄은 'cuerda' 또는 'soga'를 사용"
  - spanish: rato
    translation:
      en: a while / a short time
      ko: 잠시 / 짧은 시간
    gender: m
    notes:
      en: Does NOT mean 'rat'; use 'rata' for rat
      ko: "'rat(쥐)'가 아님; 쥐는 'rata'를 사용"
  - spanish: trampa
    translation:
      en: trap / trick / cheating
      ko: 함정 / 속임수 / 부정행위
    gender: f
    notes:
      en: Also means cheating in a game; 'Hacer trampa' = to cheat
      ko: 게임에서 부정행위도 의미; 'Hacer trampa' = 속이다
  - spanish: conductor
    translation:
      en: driver
      ko: 운전사
    gender: m
    notes:
      en: Does NOT mean 'conductor (music)'; use 'director de orquesta' instead
      ko: "'conductor(지휘자)'가 아님; 'director de orquesta'를 사용"
- id: 2_commonly_confused_pairs
  label:
    en: 2. Commonly Confused Pairs
    ko: 2. 자주 혼동되는 단어 쌍
  type: vocabulary
  words:
  - spanish: ser
    translation:
      en: to be (permanent/identity)
      ko: ~이다 (본질/정체성)
    gender: null
    notes:
      en: Identity, origin, profession, time; 'Soy estudiante'
      ko: 정체성, 출신, 직업, 시간; 'Soy estudiante'
  - spanish: estar
    translation:
      en: to be (state/location)
      ko: ~이다 (상태/위치)
    gender: null
    notes:
      en: Temporary states, location, emotions; 'Estoy cansado'
      ko: 일시적 상태, 위치, 감정; 'Estoy cansado'
  - spanish: por
    translation:
      en: for / by / through / because of
      ko: ~때문에 / ~에 의해 / ~을 통해
    gender: null
    notes:
      en: Cause, exchange, duration, movement through
      ko: 원인, 교환, 기간, 통과
  - spanish: para
    translation:
      en: for / in order to / toward
      ko: ~을 위해 / ~하기 위해 / ~쪽으로
    gender: null
    notes:
      en: Purpose, destination, deadline, recipient
      ko: 목적, 목적지, 기한, 수신인
  - spanish: saber
    translation:
      en: to know (facts/skills)
      ko: 알다 (사실/기술)
    gender: null
    notes:
      en: Knowledge of facts or how to do something; 'Sé nadar'
      ko: 사실이나 방법에 대한 지식; 'Sé nadar'
  - spanish: conocer
    translation:
      en: to know (people/places)
      ko: 알다 (사람/장소)
    gender: null
    notes:
      en: Familiarity with people, places, things; 'Conozco Madrid'
      ko: 사람, 장소, 사물에 대한 친숙함; 'Conozco Madrid'
  - spanish: llevar
    translation:
      en: to take / to carry / to wear
      ko: 가져가다 / 들고 가다 / 입다
    gender: null
    notes:
      en: Movement away from speaker; 'Lleva el libro a casa'
      ko: 화자로부터 멀어지는 이동; 'Lleva el libro a casa'
  - spanish: traer
    translation:
      en: to bring
      ko: 가져오다
    gender: null
    notes:
      en: Movement toward speaker; 'Trae el libro aquí'
      ko: 화자를 향한 이동; 'Trae el libro aquí'
  - spanish: pedir
    translation:
      en: to ask for / to request
      ko: 요청하다
    gender: null
    notes:
      en: Requesting something; 'Pedí la cuenta'
      ko: 무언가를 요청; 'Pedí la cuenta'
  - spanish: preguntar
    translation:
      en: to ask (a question)
      ko: 질문하다
    gender: null
    notes:
      en: Asking a question; 'Le pregunté la hora'
      ko: 질문을 하기; 'Le pregunté la hora'
  - spanish: jugar
    translation:
      en: to play (a game/sport)
      ko: 놀다 / (경기를) 하다
    gender: null
    notes:
      en: Games and sports; 'Jugar al fútbol'
      ko: 게임과 스포츠; 'Jugar al fútbol'
  - spanish: tocar
    translation:
      en: to play (an instrument) / to touch
      ko: (악기를) 연주하다 / 만지다
    gender: null
    notes:
      en: Musical instruments; 'Tocar la guitarra'
      ko: 악기 연주; 'Tocar la guitarra'
  - spanish: quedar
    translation:
      en: to remain / to arrange to meet
      ko: 남다 / 만나기로 하다
    gender: null
    notes:
      en: "'Quedamos a las tres' = Let's meet at three"
      ko: "'Quedamos a las tres' = 세 시에 만나자"
  - spanish: quedarse
    translation:
      en: to stay / to keep
      ko: 머물다 / 간직하다
    gender: null
    notes:
      en: Reflexive form changes meaning; 'Me quedé en casa'
      ko: 재귀형은 의미가 다름; 'Me quedé en casa'
  - spanish: dejar
    translation:
      en: to leave (behind) / to let
      ko: 두고 가다 / ~하게 하다
    gender: null
    notes:
      en: "'Deja el libro aquí' = Leave the book here"
      ko: "'Deja el libro aquí' = 여기에 책을 두어라"
  - spanish: salir
    translation:
      en: to leave / to go out
      ko: 나가다 / 떠나다
    gender: null
    notes:
      en: Physical departure; 'Salí de la oficina a las cinco'
      ko: 물리적 출발; 'Salí de la oficina a las cinco'
  - spanish: irse
    translation:
      en: to go away / to leave
      ko: 가버리다 / 떠나다
    gender: null
    notes:
      en: Emphasizes departure; 'Me voy' = I'm leaving
      ko: 떠남을 강조; 'Me voy' = 나는 떠난다
  - spanish: tiempo
    translation:
      en: time / weather
      ko: 시간 / 날씨
    gender: m
    notes:
      en: Dual meaning; context clarifies ('¿Qué tiempo hace?' = weather)
      ko: 이중 의미; 문맥으로 구분 ('¿Qué tiempo hace?' = 날씨)
  - spanish: vez
    translation:
      en: time (occasion)
      ko: 번 / 회 (횟수)
    gender: f
    notes:
      en: For counting occurrences; 'Una vez' = once
      ko: 횟수를 셀 때; 'Una vez' = 한 번
  - spanish: hora
    translation:
      en: time (clock) / hour
      ko: 시각 / 시간
    gender: f
    notes:
      en: Clock time; '¿Qué hora es?' = What time is it?
      ko: 시각; '¿Qué hora es?' = 몇 시입니까?
- id: 3_words_that_change_meaning_with_gender
  label:
    en: 3. Words That Change Meaning with Gender
    ko: 3. 성별에 따라 의미가 바뀌는 단어
  type: vocabulary
  words:
  - spanish: el capital
    translation:
      en: capital (money)
      ko: 자본 (돈)
    gender: m
    notes:
      en: "'La capital' = capital city; 'el capital' = financial capital"
      ko: "'La capital' = 수도; 'el capital' = 자본금"
  - spanish: la capital
    translation:
      en: capital (city)
      ko: 수도
    gender: f
  - spanish: el orden
    translation:
      en: order (arrangement)
      ko: 순서 / 질서
    gender: m
    notes:
      en: "'La orden' = command/order (restaurant)"
      ko: "'La orden' = 명령 / 주문"
  - spanish: la orden
    translation:
      en: order (command) / religious order
      ko: 명령 / 주문 / 수도회
    gender: f
  - spanish: el cura
    translation:
      en: priest
      ko: 사제 / 신부
    gender: m
    notes:
      en: "'La cura' = the cure"
      ko: "'La cura' = 치료"
  - spanish: la cura
    translation:
      en: the cure
      ko: 치료
    gender: f
  - spanish: el papa
    translation:
      en: the Pope
      ko: 교황
    gender: m
    notes:
      en: "'La papa' = potato (Latin America)"
      ko: "'La papa' = 감자 (라틴아메리카)"
  - spanish: el cometa
    translation:
      en: comet
      ko: 혜성
    gender: m
    notes:
      en: "'La cometa' = kite"
      ko: "'La cometa' = 연"
  - spanish: el frente
    translation:
      en: the front (military/weather)
      ko: 전선 (군사/기상)
    gender: m
    notes:
      en: "'La frente' = forehead"
      ko: "'La frente' = 이마"
  - spanish: el guía
    translation:
      en: the guide (person, male)
      ko: 안내인 (남성)
    gender: m
    notes:
      en: "'La guía' = guidebook / female guide"
      ko: "'La guía' = 안내서 / 여성 안내인"
- id: 4_tricky_prepositions
  label:
    en: 4. Tricky Prepositions
    ko: 4. 까다로운 전치사
  type: vocabulary
  words:
  - spanish: pensar en
    translation:
      en: to think about
      ko: ~에 대해 생각하다
    gender: null
    notes:
      en: NOT 'pensar sobre' (common learner error)
      ko: "'pensar sobre'가 아님 (흔한 학습자 오류)"
  - spanish: soñar con
    translation:
      en: to dream about
      ko: ~에 대해 꿈꾸다
    gender: null
    notes:
      en: NOT 'soñar de/sobre'
      ko: "'soñar de/sobre'가 아님"
  - spanish: depender de
    translation:
      en: to depend on
      ko: ~에 달려 있다
    gender: null
    notes:
      en: NOT 'depender en'
      ko: "'depender en'이 아님"
  - spanish: casarse con
    translation:
      en: to marry (someone)
      ko: ~와 결혼하다
    gender: null
    notes:
      en: NOT 'casarse a'; 'Me casé con Ana'
      ko: "'casarse a'가 아님; 'Me casé con Ana'"
  - spanish: fijarse en
    translation:
      en: to notice / to pay attention to
      ko: ~을 주목하다 / 주의를 기울이다
    gender: null
  - spanish: acordarse de
    translation:
      en: to remember
      ko: ~을 기억하다
    gender: null
    notes:
      en: Reflexive + de; 'Me acuerdo de ti'
      ko: 재귀형 + de; 'Me acuerdo de ti'
  - spanish: consistir en
    translation:
      en: to consist of
      ko: ~로 구성되다
    gender: null
    notes:
      en: NOT 'consistir de' (common English interference)
      ko: "'consistir de'가 아님 (영어 간섭 오류)"
  - spanish: convertirse en
    translation:
      en: to become / to turn into
      ko: ~이 되다 / ~로 변하다
    gender: null
    notes:
      en: NOT 'convertirse a' (unless religion); 'Se convirtió en médico'
      ko: "'convertirse a'가 아님 (종교 개종 제외); 'Se convirtió en médico'"
- id: 5_deceptive_cognates
  label:
    en: 5. Deceptive Cognates
    ko: 5. 기만적인 동족어
  type: vocabulary
  words:
  - spanish: compromiso
    translation:
      en: commitment / obligation
      ko: 약속 / 의무
    gender: m
    notes:
      en: Does NOT mean 'compromise'; use 'acuerdo mutuo' instead
      ko: "'compromise(타협)'가 아님; 'acuerdo mutuo'를 사용"
  - spanish: dirección
    translation:
      en: address / direction / management
      ko: 주소 / 방향 / 경영
    gender: f
    notes:
      en: Multiple meanings; context determines which
      ko: 여러 의미; 문맥에 따라 결정
  - spanish: eventual
    translation:
      en: possible / contingent
      ko: 가능한 / 임시의
    gender: null
    notes:
      en: Does NOT mean 'eventual'; use 'final' or 'definitivo' instead
      ko: "'eventual(궁극적인)'이 아님; 'final' 또는 'definitivo'를 사용"
  - spanish: lectura
    translation:
      en: reading
      ko: 읽기 / 독서
    gender: f
    notes:
      en: Does NOT mean 'lecture'; use 'conferencia' or 'clase magistral' instead
      ko: "'lecture(강의)'가 아님; 'conferencia' 또는 'clase magistral'를 사용"
  - spanish: decepción
    translation:
      en: disappointment
      ko: 실망
    gender: f
    notes:
      en: Does NOT mean 'deception'; use 'engaño' instead
      ko: "'deception(속임수)'이 아님; 'engaño'를 사용"
  - spanish: simpatía
    translation:
      en: friendliness / likeability
      ko: 호감 / 친절함
    gender: f
    notes:
      en: Does NOT mean 'sympathy'; use 'compasión' instead
      ko: "'sympathy(동정)'가 아님; 'compasión'을 사용"
  - spanish: particular
    translation:
      en: private / specific
      ko: 개인적인 / 특정한
    gender: null
    notes:
      en: Does NOT mean 'particular (fussy)'; use 'exigente' or 'quisquilloso/a'
      ko: "'particular(까다로운)'이 아님; 'exigente' 또는 'quisquilloso/a'를 사용"
  - spanish: delito
    translation:
      en: crime / offense
      ko: 범죄 / 위법행위
    gender: m
    notes:
      en: Does NOT mean 'delight'; use 'placer' or 'deleite' instead
      ko: "'delight(기쁨)'이 아님; 'placer' 또는 'deleite'를 사용"
  - spanish: desgracia
    translation:
      en: misfortune
      ko: 불행
    gender: f
    notes:
      en: Does NOT mean 'disgrace'; use 'deshonra' or 'vergüenza' instead
      ko: "'disgrace(치욕)'가 아님; 'deshonra' 또는 'vergüenza'를 사용"
  - spanish: intoxicado
    translation:
      en: poisoned (food poisoning)
      ko: 식중독에 걸린
    gender: null
    notes:
      en: Does NOT mean 'intoxicated (drunk)'; use 'borracho/a' instead
      ko: "'intoxicated(취한)'가 아님; 'borracho/a'를 사용"
  - spanish: tabla
    translation:
      en: board / plank / table (chart)
      ko: 판자 / 널빤지 / 표
    gender: f
    notes:
      en: Does NOT mean 'table (furniture)'; use 'mesa' instead
      ko: "'table(가구)'가 아님; 'mesa'를 사용"
  - spanish: arena
    translation:
      en: sand
      ko: 모래
    gender: f
    notes:
      en: Does NOT mean 'arena'; use 'estadio' or 'plaza' instead
      ko: "'arena(경기장)'가 아님; 'estadio' 또는 'plaza'를 사용"
  - spanish: marca
    translation:
      en: brand / mark
      ko: 브랜드 / 표시
    gender: f
    notes:
      en: Can also mean a sports record; 'marca personal' = personal record
      ko: 스포츠 기록도 의미; 'marca personal' = 개인 기록
  - spanish: once
    translation:
      en: eleven
      ko: 열하나 (11)
    gender: null
    notes:
      en: Does NOT mean 'once'; use 'una vez' instead
      ko: "'once(한 번)'가 아님; 'una vez'를 사용"
  - spanish: pan
    translation:
      en: bread
      ko: 빵
    gender: m
    notes:
      en: Does NOT mean 'pan (cooking)'; use 'sartén' instead
      ko: "'pan(프라이팬)'이 아님; 'sartén'을 사용"
  - spanish: red
