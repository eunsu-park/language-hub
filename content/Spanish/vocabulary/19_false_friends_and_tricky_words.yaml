lesson: 19_False_Friends_and_Tricky_Words
lesson_number: 19
cefr: B2
categories:
- id: 1_false_friends
  label:
    en: 1. False Friends
    ko: 1. 거짓 짝 (헷갈리는 유사 단어)
  type: vocabulary
  words:
  - spanish: embarazada
    translation:
      en: pregnant
      ko: 임신한
    gender: null
    notes:
      en: Does NOT mean 'embarrassed'; use 'avergonzado/a' instead
      ko: "'embarrassed(당황한)'가 아님; 'avergonzado/a'를 사용"
  - spanish: actual
    translation:
      en: current / present
      ko: 현재의
    gender: null
    notes:
      en: Does NOT mean 'actual'; use 'real' or 'verdadero' instead
      ko: "'actual(실제의)'이 아님; 'real' 또는 'verdadero'를 사용"
  - spanish: realizar
    translation:
      en: to carry out / to accomplish
      ko: 수행하다 / 달성하다
    gender: null
    notes:
      en: Does NOT mean 'to realize'; use 'darse cuenta de' instead
      ko: "'realize(깨닫다)'가 아님; 'darse cuenta de'를 사용"
  - spanish: sensible
    translation:
      en: sensitive
      ko: 민감한
    gender: null
    notes:
      en: Does NOT mean 'sensible'; use 'sensato/a' instead
      ko: "'sensible(분별 있는)'이 아님; 'sensato/a'를 사용"
  - spanish: éxito
    translation:
      en: success
      ko: 성공
    gender: null
    notes:
      en: Does NOT mean 'exit'; use 'salida' instead
      ko: "'exit(출구)'가 아님; 'salida'를 사용"
  - spanish: constipado
    translation:
      en: having a cold
      ko: 감기에 걸린
    gender: null
    notes:
      en: Does NOT mean 'constipated'; use 'estreñido/a' instead
      ko: "'constipated(변비)'가 아님; 'estreñido/a'를 사용"
  - spanish: asistir
    translation:
      en: to attend
      ko: 참석하다
    gender: null
    notes:
      en: Does NOT mean 'to assist'; use 'ayudar' instead
      ko: "'assist(돕다)'가 아님; 'ayudar'를 사용"
  - spanish: carpeta
    translation:
      en: folder / binder
      ko: 폴더 / 바인더
    gender: null
    notes:
      en: Does NOT mean 'carpet'; use 'alfombra' instead
      ko: "'carpet(카펫)'이 아님; 'alfombra'를 사용"
  - spanish: librería
    translation:
      en: bookstore
      ko: 서점
    gender: null
    notes:
      en: Does NOT mean 'library'; use 'biblioteca' instead
      ko: "'library(도서관)'가 아님; 'biblioteca'를 사용"
  - spanish: recordar
    translation:
      en: to remember
      ko: 기억하다
    gender: null
    notes:
      en: Does NOT mean 'to record'; use 'grabar' instead
      ko: "'record(녹음하다)'가 아님; 'grabar'를 사용"
- id: 2_commonly_confused_pairs
  label:
    en: 2. Commonly Confused Pairs
    ko: 2. 자주 혼동되는 단어 쌍
  type: vocabulary
  words:
  - spanish: ser
    translation:
      en: to be (permanent/identity)
      ko: ~이다 (본질/정체성)
    gender: null
    notes:
      en: Identity, origin, profession, time; 'Soy estudiante'
      ko: 정체성, 출신, 직업, 시간; 'Soy estudiante'
  - spanish: estar
    translation:
      en: to be (state/location)
      ko: ~이다 (상태/위치)
    gender: null
    notes:
      en: Temporary states, location, emotions; 'Estoy cansado'
      ko: 일시적 상태, 위치, 감정; 'Estoy cansado'
  - spanish: por
    translation:
      en: for / by / through / because of
      ko: ~때문에 / ~에 의해 / ~을 통해
    gender: null
    notes:
      en: Cause, exchange, duration, movement through
      ko: 원인, 교환, 기간, 통과
  - spanish: para
    translation:
      en: for / in order to / toward
      ko: ~을 위해 / ~하기 위해 / ~쪽으로
    gender: null
    notes:
      en: Purpose, destination, deadline, recipient
      ko: 목적, 목적지, 기한, 수신인
  - spanish: saber
    translation:
      en: to know (facts/skills)
      ko: 알다 (사실/기술)
    gender: null
    notes:
      en: Knowledge of facts or how to do something; 'Sé nadar'
      ko: 사실이나 방법에 대한 지식; 'Sé nadar'
  - spanish: conocer
    translation:
      en: to know (people/places)
      ko: 알다 (사람/장소)
    gender: null
    notes:
      en: Familiarity with people, places, things; 'Conozco Madrid'
      ko: 사람, 장소, 사물에 대한 친숙함; 'Conozco Madrid'
  - spanish: llevar
    translation:
      en: to take / to carry / to wear
      ko: 가져가다 / 들고 가다 / 입다
    gender: null
    notes:
      en: Movement away from speaker; 'Lleva el libro a casa'
      ko: 화자로부터 멀어지는 이동; 'Lleva el libro a casa'
  - spanish: traer
    translation:
      en: to bring
      ko: 가져오다
    gender: null
    notes:
      en: Movement toward speaker; 'Trae el libro aquí'
      ko: 화자를 향한 이동; 'Trae el libro aquí'
  - spanish: pedir
    translation:
      en: to ask for / to request
      ko: 요청하다
    gender: null
    notes:
      en: Requesting something; 'Pedí la cuenta'
      ko: 무언가를 요청; 'Pedí la cuenta'
  - spanish: preguntar
    translation:
      en: to ask (a question)
      ko: 질문하다
    gender: null
    notes:
      en: Asking a question; 'Le pregunté la hora'
      ko: 질문을 하기; 'Le pregunté la hora'
