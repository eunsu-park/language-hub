- id: three_key_phenomena
  label:
    en: Three Key Phenomena
    ko: 세 가지 핵심 현상
  type: vocabulary
  words:
  - spanish: Distinción
    translation:
      en: c/z = [θ], s = [s]
      ko: c/z = [θ], s = [s]
    gender: null
    notes:
      en: Most of Spain
      ko: 스페인 대부분
  - spanish: Seseo
    translation:
      en: c/z/s all = [s]
      ko: c/z/s 모두 = [s]
    gender: null
    notes:
      en: All of Latin America, southern Spain
      ko: 라틴아메리카 전역, 스페인 남부
  - spanish: Ceceo
    translation:
      en: c/z/s all = [θ]
      ko: c/z/s 모두 = [θ]
    gender: null
    notes:
      en: Parts of Andalusia
      ko: 안달루시아 일부
  - spanish: Yeísmo
    translation:
      en: ll = y = [j]
      ko: ll = y = [j]
    gender: null
    notes:
      en: Most of Spanish-speaking world
      ko: 스페인어권 대부분
  - spanish: Sheísmo
    translation:
      en: ll = y = [ʃ] or [ʒ]
      ko: ll = y = [ʃ] 또는 [ʒ]
    gender: null
    notes:
      en: Argentina, Uruguay
      ko: 아르헨티나, 우루과이
  - spanish: S-aspiration
    translation:
      en: Final -s → [h]
    gender: null
    notes:
      en: Caribbean, Chile, Andalusia, parts of L.A.
  - spanish: Voseo
    translation:
      en: "Use of 'vos' instead of 'tú'"
      ko: "'tú' 대신 'vos' 사용"
    gender: null
    notes:
      en: Argentina, Uruguay, parts of Central America
      ko: 아르헨티나, 우루과이, 중미 일부
  - spanish: Leísmo
    translation:
      en: "Use of 'le' instead of 'lo/la' for direct object"
      ko: "직접목적어에 'lo/la' 대신 'le' 사용"
    gender: null
    notes:
      en: Common in central Spain; accepted for masculine persons
      ko: 스페인 중부에서 흔함; 남성 인물에 대해서는 허용
