lesson: 16_Complex_Sentences_and_Advanced_Grammar
lesson_number: 16
cefr: B2
categories:
- id: 1_relative_clauses_with_que
  label:
    en: 1. Relative Clauses with QUE
    ko: 1. QUE를 사용한 관계절(Relative Clause)
  type: vocabulary
  words:
  - spanish: El libro que leo es interesante.
    translation:
      en: The book (that) I'm reading is interesting.
      ko: 내가 읽고 있는 책은 재미있다.
    gender: null
  - spanish: La profesora que enseña física es brillante.
    translation:
      en: The professor who teaches physics is brilliant.
      ko: 물리학을 가르치는 교수님은 뛰어나다.
    gender: null
- id: 3_lo_que_what_that_which
  label:
    en: 3. LO QUE — "What / That Which"
    ko: 3. LO QUE — "~하는 것"
  type: vocabulary
  words:
  - spanish: Lo que dices es verdad.
    translation:
      en: What you say is true.
      ko: 네가 말하는 것은 사실이다.
    gender: null
  - spanish: No entiendo lo que pasó.
    translation:
      en: I don't understand what happened.
      ko: 무슨 일이 있었는지 이해가 안 된다.
    gender: null
  - spanish: Haz lo que quieras.
    translation:
      en: Do whatever you want.
      ko: 하고 싶은 대로 해라.
    gender: null
  - spanish: Llegó tarde, lo que molestó a todos.
    translation:
      en: He arrived late, which annoyed everyone.
      ko: 그는 늦게 도착했고, 그것이 모두를 짜증나게 했다.
    gender: null
- id: 5_passive_se
  label:
    en: 5. Passive SE
    ko: 5. 수동 SE (Passive SE)
  type: vocabulary
  words:
  - spanish: Se habla español aquí.
    translation:
      en: Spanish is spoken here.
      ko: 여기서 스페인어가 사용됩니다.
    gender: null
  - spanish: Se venden casas.
    translation:
      en: Houses for sale.
      ko: 집을 팝니다. (매물)
    gender: null
  - spanish: Se necesitan programadores.
    translation:
      en: Programmers are needed.
      ko: 프로그래머를 구합니다.
    gender: null
  - spanish: En España se cena tarde.
    translation:
      en: In Spain, dinner is eaten late.
      ko: 스페인에서는 저녁을 늦게 먹는다.
    gender: null
- id: 8_como_si_subjunctive
  label:
    en: 8. COMO SI + Subjunctive
    ko: 8. COMO SI + 접속법(Subjunctive)
  type: vocabulary
  words:
  - spanish: Habla como si supiera todo.
    translation:
      en: He talks as if he knew everything.
      ko: 그는 마치 모든 것을 아는 것처럼 말한다.
    gender: null
  - spanish: Actúa como si nada hubiera pasado.
    translation:
      en: She acts as if nothing had happened.
      ko: 그녀는 마치 아무 일도 없었던 것처럼 행동한다.
    gender: null
  - spanish: Me miró como si fuera un extraño.
    translation:
      en: He looked at me as if I were a stranger.
      ko: 그는 마치 내가 낯선 사람인 것처럼 나를 바라보았다.
    gender: null
