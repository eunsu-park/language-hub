lesson: 16_Complex_Sentences_and_Advanced_Grammar
lesson_number: 16
cefr: B2
categories:
- id: 1_relative_clauses_with_que
  label:
    en: 1. Relative Clauses with QUE
    ko: 1. QUE를 사용한 관계절(Relative Clause)
  type: vocabulary
  words:
  - spanish: El libro que leo es interesante.
    translation:
      en: The book (that) I'm reading is interesting.
      ko: 내가 읽고 있는 책은 재미있다.
    gender: null
  - spanish: La profesora que enseña física es brillante.
    translation:
      en: The professor who teaches physics is brilliant.
      ko: 물리학을 가르치는 교수님은 뛰어나다.
    gender: null
- id: 3_lo_que_what_that_which
  label:
    en: 3. LO QUE — "What / That Which"
    ko: 3. LO QUE — "~하는 것"
  type: vocabulary
  words:
  - spanish: Lo que dices es verdad.
    translation:
      en: What you say is true.
      ko: 네가 말하는 것은 사실이다.
    gender: null
  - spanish: No entiendo lo que pasó.
    translation:
      en: I don't understand what happened.
      ko: 무슨 일이 있었는지 이해가 안 된다.
    gender: null
  - spanish: Haz lo que quieras.
    translation:
      en: Do whatever you want.
      ko: 하고 싶은 대로 해라.
    gender: null
  - spanish: Llegó tarde, lo que molestó a todos.
    translation:
      en: He arrived late, which annoyed everyone.
      ko: 그는 늦게 도착했고, 그것이 모두를 짜증나게 했다.
    gender: null
- id: 5_passive_se
  label:
    en: 5. Passive SE
    ko: 5. 수동 SE (Passive SE)
  type: vocabulary
  words:
  - spanish: Se habla español aquí.
    translation:
      en: Spanish is spoken here.
      ko: 여기서 스페인어가 사용됩니다.
    gender: null
  - spanish: Se venden casas.
    translation:
      en: Houses for sale.
      ko: 집을 팝니다. (매물)
    gender: null
  - spanish: Se necesitan programadores.
    translation:
      en: Programmers are needed.
      ko: 프로그래머를 구합니다.
    gender: null
  - spanish: En España se cena tarde.
    translation:
      en: In Spain, dinner is eaten late.
      ko: 스페인에서는 저녁을 늦게 먹는다.
    gender: null
- id: 8_como_si_subjunctive
  label:
    en: 8. COMO SI + Subjunctive
    ko: 8. COMO SI + 접속법(Subjunctive)
  type: vocabulary
  words:
  - spanish: Habla como si supiera todo.
    translation:
      en: He talks as if he knew everything.
      ko: 그는 마치 모든 것을 아는 것처럼 말한다.
    gender: null
  - spanish: Actúa como si nada hubiera pasado.
    translation:
      en: She acts as if nothing had happened.
      ko: 그녀는 마치 아무 일도 없었던 것처럼 행동한다.
    gender: null
  - spanish: Me miró como si fuera un extraño.
    translation:
      en: He looked at me as if I were a stranger.
      ko: 그는 마치 내가 낯선 사람인 것처럼 나를 바라보았다.
    gender: null
- id: relative_pronouns
  label:
    en: Relative Pronouns
    ko: 관계 대명사
  type: vocabulary
  words:
  - spanish: que
    translation:
      en: that / which / who
      ko: ~하는 / ~한
    gender: null
    notes:
      en: Most common relative pronoun; used for people and things
      ko: 가장 흔한 관계 대명사; 사람과 사물 모두에 사용
  - spanish: quien / quienes
    translation:
      en: who / whom
      ko: ~하는 사람 / ~하는 사람들
    gender: null
    notes:
      en: Only for people; used after prepositions
      ko: 사람에게만 사용; 전치사 뒤에 사용
  - spanish: el cual / la cual
    translation:
      en: which / who (formal)
      ko: ~하는 것 / ~하는 사람 (격식)
    gender: null
    notes:
      en: Formal; agrees in gender and number
      ko: 격식; 성과 수에 일치
  - spanish: los cuales / las cuales
    translation:
      en: which / who (formal, plural)
      ko: ~하는 것들 / ~하는 사람들 (격식)
    gender: null
  - spanish: lo cual
    translation:
      en: which (refers to a clause)
      ko: ~한 것 (절을 가리킴)
    gender: null
    notes:
      en: Refers to entire preceding clause, not a noun
      ko: 명사가 아닌 앞의 절 전체를 가리킴
  - spanish: cuyo / cuya
    translation:
      en: whose
      ko: ~의
    gender: null
    notes:
      en: Possessive relative; agrees with the possessed noun, not the owner
      ko: 소유 관계사; 소유자가 아닌 소유물에 일치
  - spanish: cuyos / cuyas
    translation:
      en: whose (plural)
      ko: ~의 (복수)
    gender: null
  - spanish: donde
    translation:
      en: where
      ko: ~하는 곳
    gender: null
    notes:
      en: Relative adverb of place; 'la ciudad donde nací'
      ko: 장소의 관계 부사; 'la ciudad donde nací'
  - spanish: en donde
    translation:
      en: where / in which
      ko: ~하는 곳에서
    gender: null
    notes:
      en: More formal variant of 'donde'
      ko: "'donde'의 더 격식적인 변형"
  - spanish: adonde
    translation:
      en: to where / where (motion)
      ko: ~하는 곳으로
    gender: null
    notes:
      en: Used with verbs of motion; 'el lugar adonde vamos'
      ko: 이동 동사와 함께 사용; 'el lugar adonde vamos'
- id: conjunctions_and_connectors
  label:
    en: Conjunctions & Connectors
    ko: 접속사 & 연결어
  type: vocabulary
  words:
  - spanish: y / e
    translation:
      en: and
      ko: 그리고
    gender: null
    notes:
      en: "'e' before words starting with 'i-' or 'hi-'"
      ko: "'i-' 또는 'hi-'로 시작하는 단어 앞에서 'e'"
  - spanish: o / u
    translation:
      en: or
      ko: 또는
    gender: null
    notes:
      en: "'u' before words starting with 'o-' or 'ho-'"
      ko: "'o-' 또는 'ho-'로 시작하는 단어 앞에서 'u'"
  - spanish: ni... ni...
    translation:
      en: neither... nor...
      ko: ~도 ~도 아닌
    gender: null
  - spanish: sino
    translation:
      en: but rather
      ko: 오히려 / ~가 아니라
    gender: null
    notes:
      en: Used after negative clause; 'no es azul, sino verde'
      ko: 부정절 뒤에 사용; 'no es azul, sino verde'
  - spanish: sino que
    translation:
      en: but rather (+ conjugated verb)
      ko: 오히려 ~하다
    gender: null
    notes:
      en: Same as 'sino' but introduces a conjugated verb
      ko: "'sino'와 같지만 활용된 동사를 도입"
  - spanish: por lo que
    translation:
      en: so / therefore
      ko: 그래서 / 그러므로
    gender: null
  - spanish: de modo que
    translation:
      en: so that / in such a way that
      ko: ~하도록 / ~한 방식으로
    gender: null
  - spanish: dado que
    translation:
      en: given that / since
      ko: ~을 고려할 때 / ~이므로
    gender: null
    notes:
      en: Formal causal connector
      ko: 격식적 인과 접속어
  - spanish: puesto que
    translation:
      en: since / given that
      ko: ~이므로 / ~이기 때문에
    gender: null
  - spanish: ya que
    translation:
      en: since / because
      ko: ~이므로 / ~이기 때문에
    gender: null
    notes:
      en: Less formal than 'puesto que'; common in speech
      ko: "'puesto que'보다 덜 격식적; 구어에서 흔함"
  - spanish: a pesar de que
    translation:
      en: despite / in spite of the fact that
      ko: ~에도 불구하고
    gender: null
  - spanish: siempre y cuando
    translation:
      en: as long as / provided that
      ko: ~하는 한 / ~하기만 하면
    gender: null
    notes:
      en: Triggers subjunctive
      ko: 접속법을 유발
  - spanish: de ahí que
    translation:
      en: hence / that is why
      ko: 그래서 / 그런 이유로
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: por más que
    translation:
      en: no matter how much
      ko: 아무리 ~해도
    gender: null
    notes:
      en: Concessive connector; triggers subjunctive
      ko: 양보 접속어; 접속법을 유발
  - spanish: a medida que
    translation:
      en: as / to the extent that
      ko: ~함에 따라
    gender: null
- id: subordinate_clause_connectors
  label:
    en: Subordinate Clause Connectors
    ko: 종속절 접속어
  type: vocabulary
  words:
  - spanish: el hecho de que
    translation:
      en: the fact that
      ko: ~라는 사실
    gender: null
    notes:
      en: Triggers subjunctive when expressing attitude
      ko: 태도를 표현할 때 접속법을 유발
  - spanish: a causa de que
    translation:
      en: because of the fact that
      ko: ~때문에
    gender: null
  - spanish: gracias a que
    translation:
      en: thanks to the fact that
      ko: ~덕분에
    gender: null
  - spanish: debido a que
    translation:
      en: due to the fact that
      ko: ~에 기인하여
    gender: null
    notes:
      en: Formal causal expression
      ko: 격식적 인과 표현
  - spanish: con el fin de que
    translation:
      en: with the aim of / so that
      ko: ~하기 위해서
    gender: null
    notes:
      en: Purpose clause; triggers subjunctive
      ko: 목적절; 접속법을 유발
  - spanish: a no ser que
    translation:
      en: unless
      ko: ~하지 않는 한
    gender: null
  - spanish: siempre que
    translation:
      en: whenever / as long as
      ko: ~할 때마다 / ~하는 한
    gender: null
    notes:
      en: Indicative for 'whenever'; subjunctive for 'as long as'
      ko: "'~할 때마다'는 직설법; '~하는 한'은 접속법"
  - spanish: cada vez que
    translation:
      en: every time that
      ko: ~할 때마다
    gender: null
  - spanish: según
    translation:
      en: according to / as
      ko: ~에 따르면 / ~에 따라
    gender: null
  - spanish: tal como
    translation:
      en: just as / such as
      ko: ~처럼 / ~와 같이
    gender: null
  - spanish: al + infinitivo
    translation:
      en: upon / when (doing something)
      ko: ~할 때 / ~하면서
    gender: null
    notes:
      en: "'al llegar' = upon arriving"
      ko: "'al llegar' = 도착하자마자"
  - spanish: de manera que
    translation:
      en: so that / in such a way that
      ko: ~하도록 / ~한 방식으로
    gender: null
- id: passive_voice_vocabulary
  label:
    en: Passive Voice & Impersonal Constructions
    ko: 수동태 & 비인칭 구문 어휘
  type: vocabulary
  words:
  - spanish: ser + participio
    translation:
      en: to be + past participle (passive)
      ko: ~되다 (수동태)
    gender: null
    notes:
      en: True passive; 'fue construido' = it was built
      ko: 진정한 수동태; 'fue construido' = 건설되었다
  - spanish: estar + participio
    translation:
      en: to be + past participle (resultant state)
      ko: ~되어 있다 (결과 상태)
    gender: null
    notes:
      en: "'la puerta está cerrada' = the door is closed (state)"
      ko: "'la puerta está cerrada' = 문이 닫혀 있다 (상태)"
  - spanish: por
    translation:
      en: by (agent in passive)
      ko: ~에 의해
    gender: null
    notes:
      en: "'fue escrito por Cervantes' = was written by Cervantes"
      ko: "'fue escrito por Cervantes' = 세르반테스에 의해 쓰였다"
  - spanish: se + verbo (pasiva refleja)
    translation:
      en: reflexive passive construction
      ko: 재귀 수동 구문
    gender: null
    notes:
      en: More common than true passive in Spanish
      ko: 스페인어에서 진정한 수동태보다 더 흔함
  - spanish: se dice que
    translation:
      en: it is said that
      ko: ~라고 한다
    gender: null
  - spanish: se sabe que
    translation:
      en: it is known that
      ko: ~라고 알려져 있다
    gender: null
  - spanish: se cree que
    translation:
      en: it is believed that
      ko: ~라고 믿어진다
    gender: null
  - spanish: se puede
    translation:
      en: one can / it is possible
      ko: ~할 수 있다
    gender: null
    notes:
      en: Impersonal 'se' construction
      ko: 비인칭 'se' 구문
  - spanish: se prohíbe
    translation:
      en: it is prohibited / forbidden
      ko: 금지되어 있다
    gender: null
  - spanish: hay que
    translation:
      en: one must / it is necessary to
      ko: ~해야 한다
    gender: null
    notes:
      en: Impersonal obligation; no specific subject
      ko: 비인칭 의무; 특정 주어 없음
  - spanish: hace falta
    translation:
      en: it is necessary / it is needed
      ko: ~이 필요하다
    gender: null
  - spanish: resulta que
    translation:
      en: it turns out that
      ko: 알고 보니 ~이다
    gender: null
  - spanish: fue construido
    translation:
      en: it was built
      ko: 건설되었다
    gender: null
    notes:
      en: Example of true passive with 'ser'
      ko: "'ser'를 사용한 진정한 수동태의 예"
  - spanish: fue descubierto
    translation:
      en: it was discovered
      ko: 발견되었다
    gender: null
  - spanish: está prohibido
    translation:
      en: it is forbidden
      ko: 금지되어 있다
    gender: null
    notes:
      en: Resultant state with 'estar'
      ko: "'estar'를 사용한 결과 상태"
  - spanish: Se alquilan habitaciones.
    translation:
      en: Rooms for rent.
      ko: 방을 빌려드립니다.
    gender: null
    notes:
      en: Pasiva refleja for impersonal announcement
      ko: 비인칭 공고를 위한 재귀 수동
  - spanish: Se ruega silencio.
    translation:
      en: Silence is requested.
      ko: 정숙을 부탁합니다.
    gender: null
    notes:
      en: Formal impersonal request
      ko: 격식적 비인칭 요청
  - spanish: Se busca camarero.
    translation:
      en: Waiter wanted.
      ko: 웨이터를 구합니다.
    gender: null
- id: complex_sentence_examples
  label:
    en: Complex Sentence Examples
    ko: 복합문 예문
  type: vocabulary
  words:
  - spanish: El hombre cuyo hijo ganó el premio está orgulloso.
    translation:
      en: The man whose son won the prize is proud.
      ko: 아들이 상을 탄 남자는 자랑스럽다.
    gender: null
    notes:
      en: Relative possessive 'cuyo' agrees with 'hijo'
      ko: 관계 소유격 'cuyo'가 'hijo'에 일치
  - spanish: No solo estudia, sino que también trabaja.
    translation:
      en: He not only studies, but also works.
      ko: 공부만 하는 게 아니라 일도 한다.
    gender: null
    notes:
      en: Correlative conjunction 'no solo... sino que también'
      ko: 상관 접속사 'no solo... sino que también'
  - spanish: Ni lo vi ni lo oí.
    translation:
      en: I neither saw it nor heard it.
      ko: 보지도 듣지도 못했다.
    gender: null
  - spanish: Dado que no tenemos tiempo, lo haremos mañana.
    translation:
      en: Given that we don't have time, we'll do it tomorrow.
      ko: 시간이 없으므로 내일 할 것이다.
    gender: null
  - spanish: A medida que crecía, entendía más.
    translation:
      en: As he grew up, he understood more.
      ko: 성장함에 따라 더 많이 이해했다.
    gender: null
  - spanish: Por más que lo intenté, no pude.
    translation:
      en: No matter how much I tried, I couldn't.
      ko: 아무리 노력해도 할 수 없었다.
    gender: null
  - spanish: La casa en la que vivimos es antigua.
    translation:
      en: The house in which we live is old.
      ko: 우리가 사는 집은 오래되었다.
    gender: null
    notes:
      en: Prepositional relative clause with 'en la que'
      ko: "'en la que'를 사용한 전치사 관계절"
  - spanish: El restaurante adonde fuimos estaba lleno.
    translation:
      en: The restaurant where we went was full.
      ko: 우리가 간 식당은 만석이었다.
    gender: null
  - spanish: Sea lo que sea, lo aceptaré.
    translation:
      en: Whatever it may be, I will accept it.
      ko: 그것이 무엇이든 받아들이겠다.
    gender: null
    notes:
      en: Concessive subjunctive construction
      ko: 양보 접속법 구문
  - spanish: De haber sabido, no habría venido.
    translation:
      en: Had I known, I would not have come.
      ko: 알았더라면 오지 않았을 것이다.
    gender: null
    notes:
      en: Condensed conditional with 'de + infinitive'
      ko: "'de + 부정사'를 사용한 축약 조건문"
  - spanish: Cuanto más estudias, más aprendes.
    translation:
      en: The more you study, the more you learn.
      ko: 많이 공부할수록 많이 배운다.
    gender: null
    notes:
      en: Comparative correlative construction
      ko: 비교 상관 구문
  - spanish: Siendo la mayor, tiene más responsabilidades.
    translation:
      en: Being the oldest, she has more responsibilities.
      ko: 장녀이기 때문에 더 많은 책임이 있다.
    gender: null
    notes:
      en: Gerund clause used as a causal expression
      ko: 원인을 나타내는 분사 구문
