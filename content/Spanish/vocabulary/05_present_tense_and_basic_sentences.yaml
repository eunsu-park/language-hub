- id: 66_question_patterns
  label:
    en: 6.6 Question Patterns
    ko: 6.6 의문문 패턴
  type: vocabulary
  words:
  - spanish: ¿Hablas español?
    translation:
      en: Do you speak Spanish?
      ko: 스페인어 할 줄 알아?
    gender: null
    notes:
      en: Yes/no question — intonation rises at end
      ko: 예/아니오 질문 — 끝에서 억양이 올라감
  - spanish: ¿Dónde vives?
    translation:
      en: Where do you live?
      ko: 어디에 살아?
    gender: null
  - spanish: ¿Qué haces?
    translation:
      en: What are you doing?
      ko: 뭐 해?
    gender: null
  - spanish: ¿A qué te dedicas?
    translation:
      en: What do you do (for a living)?
      ko: 직업이 뭐야?
    gender: null
  - spanish: ¿Cuántos años tienes?
    translation:
      en: How old are you?
      ko: 몇 살이야?
    gender: null
  - spanish: ¿A qué hora...?
    translation:
      en: At what time...?
      ko: 몇 시에...?
    gender: null
  - spanish: ¿Por qué estudias español?
    translation:
      en: Why do you study Spanish?
      ko: 왜 스페인어를 공부해?
    gender: null
  - spanish: ¿Cómo se dice...?
    translation:
      en: How do you say...?
      ko: ~을 어떻게 말하나요?
    gender: null
    notes:
      en: Essential phrase for language learners
      ko: 어학 학습자에게 필수적인 표현
  - spanish: ¿Qué significa...?
    translation:
      en: What does ... mean?
      ko: ~은 무슨 뜻이야?
    gender: null
  - spanish: ¿Verdad? / ¿No?
    translation:
      en: Right? / Isn't it?
      ko: 맞지? / 그렇지?
    gender: null
    notes:
      en: Tag question added at end of statement
      ko: 문장 끝에 붙이는 부가 의문문
- id: 67_sentence_connectors
  label:
    en: 6.7 Sentence Connectors
    ko: 6.7 문장 연결어
  type: vocabulary
  words:
  - spanish: porque
    translation:
      en: because
      ko: 왜냐하면
    gender: null
    notes:
      en: "Do not confuse with '¿por qué?' (why?)"
      ko: "'¿por qué?' (왜?)와 혼동하지 말 것"
  - spanish: pero
    translation:
      en: but
      ko: 하지만
    gender: null
  - spanish: entonces
    translation:
      en: then / so
      ko: 그러면 / 그래서
    gender: null
  - spanish: también
    translation:
      en: also / too
      ko: 또한 / ~도
    gender: null
  - spanish: tampoco
    translation:
      en: neither / not either
      ko: ~도 아니다
    gender: null
    notes:
      en: Negative counterpart of 'también'
      ko: "'también'의 부정 대응어"
  - spanish: cuando
    translation:
      en: when
      ko: ~할 때
    gender: null
  - spanish: mientras
    translation:
      en: while
      ko: ~하는 동안
    gender: null
  - spanish: si
    translation:
      en: if
      ko: 만약
    gender: null
    notes:
      en: "Without accent; 'sí' (with accent) = yes"
      ko: "악센트 없음; 'sí' (악센트 있음) = 네"
  - spanish: que
    translation:
      en: that
      ko: ~라고 / ~것
    gender: null
    notes:
      en: "Creo que sí. — I think so."
      ko: "Creo que sí. — 그렇다고 생각해."
  - spanish: sin embargo
    translation:
      en: however
      ko: 그러나
    gender: null
