      ko: 두 서법 모두 가능; 더 불확실할 때 접속법
- id: subjunctive_phrases
  label:
    en: Subjunctive Example Phrases
    ko: 접속법 예문
  type: vocabulary
  words:
  - spanish: Te lo digo para que lo sepas.
    translation:
      en: I'm telling you so that you know.
      ko: 네가 알도록 말해주는 거야.
    gender: null
  - spanish: Hazlo antes de que sea tarde.
    translation:
      en: Do it before it's too late.
      ko: 늦기 전에 해라.
    gender: null
  - spanish: Salió sin que nadie lo viera.
    translation:
      en: He left without anyone seeing him.
      ko: 아무도 모르게 나갔다.
    gender: null
  - spanish: Iré a menos que llueva.
    translation:
      en: I'll go unless it rains.
      ko: 비가 오지 않는 한 갈 것이다.
    gender: null
  - spanish: Cuando llegues, llámame.
    translation:
      en: When you arrive, call me.
      ko: 도착하면 전화해.
    gender: null
    notes:
      en: Subjunctive because 'when' refers to the future
      ko: "'when'이 미래를 가리키므로 접속법"
  - spanish: Esperaré hasta que vuelvas.
    translation:
      en: I will wait until you return.
      ko: 네가 돌아올 때까지 기다릴 것이다.
    gender: null
  - spanish: Si yo fuera tú, no lo haría.
    translation:
      en: If I were you, I wouldn't do it.
      ko: 내가 너라면 하지 않을 거야.
    gender: null
    notes:
      en: Imperfect subjunctive in contrary-to-fact condition
      ko: 반사실 조건의 불완료 접속법
  - spanish: Ojalá hubiera estudiado más.
    translation:
      en: I wish I had studied more.
      ko: 더 공부했더라면 좋았을 텐데.
    gender: null
    notes:
      en: Pluperfect subjunctive for past regret
      ko: 과거의 후회를 나타내는 대과거 접속법
  - spanish: Si hubiera sabido, habría ido.
    translation:
      en: If I had known, I would have gone.
      ko: 알았더라면 갔을 텐데.
    gender: null
    notes:
      en: Third conditional — pluperfect subjunctive + conditional perfect
      ko: 3차 조건 — 대과거 접속법 + 조건 완료
  - spanish: Buscamos un hotel que tenga piscina.
    translation:
      en: We're looking for a hotel that has a pool.
      ko: 수영장이 있는 호텔을 찾고 있다.
    gender: null
    notes:
      en: Subjunctive in relative clause (unknown entity)
      ko: 관계절에서의 접속법 (미지의 대상)
  - spanish: No hay nadie que sepa la respuesta.
    translation:
      en: There is no one who knows the answer.
      ko: 정답을 아는 사람이 아무도 없다.
    gender: null
    notes:
      en: Subjunctive after negative antecedent
      ko: 부정 선행사 뒤의 접속법
  - spanish: Aunque sea difícil, lo intentaré.
    translation:
      en: Even if it's difficult, I'll try.
      ko: 비록 어렵더라도 시도할 것이다.
    gender: null
  - spanish: Haré lo que me pidas.
    translation:
      en: I will do whatever you ask me.
      ko: 네가 요청하는 대로 할 것이다.
    gender: null
  - spanish: Necesitábamos que nos ayudara.
    translation:
      en: We needed him/her to help us.
      ko: 우리는 그/그녀가 우리를 도와주기를 원했다.
    gender: null
    notes:
      en: Imperfect subjunctive triggered by past main clause
      ko: 과거 주절에 의해 유발된 불완료 접속법
  - spanish: Quería que vinieras.
    translation:
      en: I wanted you to come.
      ko: 네가 오기를 원했다.
    gender: null
  - spanish: No creía que fuera verdad.
    translation:
      en: I didn't believe it was true.
      ko: 그것이 사실이라고 믿지 않았다.
    gender: null
  - spanish: Era importante que lo supieras.
    translation:
      en: It was important that you knew.
      ko: 네가 알아야 하는 것이 중요했다.
    gender: null
  - spanish: Le pedí que se callara.
    translation:
      en: I asked him/her to be quiet.
      ko: 그/그녀에게 조용히 하라고 부탁했다.
    gender: null
  - spanish: Dudaba que pudieran hacerlo.
    translation:
      en: I doubted they could do it.
      ko: 그들이 할 수 있을지 의심했다.
    gender: null
- id: imperfect_subjunctive_expressions
  label:
    en: Imperfect Subjunctive Expressions
    ko: 불완료 접속법 표현
  type: vocabulary
  words:
  - spanish: como si
    translation:
      en: as if
      ko: 마치 ~인 것처럼
    gender: null
    notes:
      en: Always requires imperfect or pluperfect subjunctive
      ko: 항상 불완료 또는 대과거 접속법을 요구
  - spanish: si yo pudiera
    translation:
      en: if I could
      ko: 내가 할 수 있다면
    gender: null
  - spanish: si yo tuviera
    translation:
      en: if I had
      ko: 내가 가지고 있다면
    gender: null
  - spanish: si yo supiera
    translation:
      en: if I knew
      ko: 내가 알고 있다면
    gender: null
  - spanish: quisiera
    translation:
      en: I would like (polite)
      ko: ~하고 싶습니다 (공손)
    gender: null
    notes:
      en: Imperfect subjunctive of 'querer'; very polite request
      ko: "'querer'의 불완료 접속법; 매우 공손한 요청"
  - spanish: debiera
    translation:
      en: should / ought to
      ko: ~해야 할 텐데
    gender: null
    notes:
      en: Imperfect subjunctive of 'deber'; formal alternative to 'debería'
      ko: "'deber'의 불완료 접속법; 'debería'의 격식 대안"
  - spanish: hubiera
    translation:
      en: had (auxiliary, subjunctive)
      ko: ~했었다 (조동사, 접속법)
    gender: null
    notes:
      en: Used for pluperfect subjunctive; 'hubiera + past participle'
      ko: 대과거 접속법에 사용; 'hubiera + 과거분사'
  - spanish: Si hubiéramos llegado a tiempo...
    translation:
      en: If we had arrived on time...
      ko: 우리가 제시간에 도착했더라면...
    gender: null
    notes:
      en: Pluperfect subjunctive for unfulfilled past condition
      ko: 이루어지지 않은 과거 조건의 대과거 접속법
  - spanish: Ojalá pudiéramos volar.
    translation:
      en: I wish we could fly.
      ko: 우리가 날 수 있다면 좋겠다.
    gender: null
  - spanish: Si no existiera la gravedad...
    translation:
      en: If gravity didn't exist...
      ko: 중력이 존재하지 않는다면...
    gender: null
    notes:
      en: Contrary-to-fact condition with imperfect subjunctive
      ko: 불완료 접속법을 사용한 반사실 조건
  - spanish: Habló como si estuviera cansado.
    translation:
      en: He spoke as if he were tired.
      ko: 그는 마치 피곤한 것처럼 말했다.
    gender: null
  - spanish: Te lo dije para que no cometieras el mismo error.
    translation:
      en: I told you so you wouldn't make the same mistake.
      ko: 같은 실수를 하지 않도록 말해줬다.
    gender: null
    notes:
      en: Imperfect subjunctive in purpose clause (past context)
      ko: 과거 맥락의 목적절에서 불완료 접속법
