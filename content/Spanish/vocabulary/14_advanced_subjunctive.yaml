- id: subjunctive_conjunctions
  label:
    en: Subjunctive Conjunctions
    ko: 접속법 접속사
  type: vocabulary
  words:
  - spanish: para que
    translation:
      en: so that / in order that
      ko: ~하기 위해서
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: antes de que
    translation:
      en: before
      ko: ~하기 전에
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: después de que
    translation:
      en: after
      ko: ~한 후에
    gender: null
    notes:
      en: Subjunctive if future/hypothetical; indicative if past
      ko: 미래/가정이면 접속법; 과거이면 직설법
  - spanish: sin que
    translation:
      en: without
      ko: ~하지 않고
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: con tal de que
    translation:
      en: provided that / as long as
      ko: ~하는 한 / ~하기만 하면
    gender: null
  - spanish: a menos que
    translation:
      en: unless
      ko: ~하지 않는 한
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: a no ser que
    translation:
      en: unless
      ko: ~하지 않는 한
    gender: null
    notes:
      en: Synonym of 'a menos que'; always subjunctive
      ko: "'a menos que'의 동의어; 항상 접속법"
  - spanish: aunque
    translation:
      en: although / even if
      ko: ~일지라도 / 비록 ~이지만
    gender: null
    notes:
      en: Subjunctive if hypothetical; indicative if factual
      ko: 가정이면 접속법; 사실이면 직설법
  - spanish: cuando
    translation:
      en: when
      ko: ~할 때
    gender: null
    notes:
      en: Subjunctive if referring to future events
      ko: 미래 사건을 가리킬 때 접속법
  - spanish: hasta que
    translation:
      en: until
      ko: ~할 때까지
    gender: null
    notes:
      en: Subjunctive if future; indicative if habitual/past
      ko: 미래이면 접속법; 습관/과거이면 직설법
  - spanish: tan pronto como
    translation:
      en: as soon as
      ko: ~하자마자
    gender: null
    notes:
      en: Subjunctive if future; indicative if past
      ko: 미래이면 접속법; 과거이면 직설법
  - spanish: en cuanto
    translation:
      en: as soon as
      ko: ~하자마자
    gender: null
    notes:
      en: Synonym of 'tan pronto como'
      ko: "'tan pronto como'의 동의어"
  - spanish: mientras que
    translation:
      en: as long as / while
      ko: ~하는 동안 / ~하는 한
    gender: null
  - spanish: a fin de que
    translation:
      en: in order that / so that
      ko: ~하기 위해서
    gender: null
    notes:
      en: Formal equivalent of 'para que'; always subjunctive
      ko: "'para que'의 격식 등가물; 항상 접속법"
  - spanish: a condición de que
    translation:
      en: on condition that
      ko: ~한다는 조건으로
    gender: null
  - spanish: en caso de que
    translation:
      en: in case (that)
      ko: ~할 경우에
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - spanish: donde
    translation:
      en: wherever
      ko: 어디든지
    gender: null
    notes:
      en: Subjunctive when location is unknown/indefinite
      ko: 장소가 불확실/불명일 때 접속법
  - spanish: como
    translation:
      en: however / as
      ko: 어떻게든 / ~처럼
    gender: null
    notes:
      en: "'hazlo como quieras' = do it however you want"
      ko: "'hazlo como quieras' = 네가 원하는 대로 해"
