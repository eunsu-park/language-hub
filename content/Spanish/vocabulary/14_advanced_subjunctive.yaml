- id: doubt_expressions
  label:
    en: Doubt & Denial Expressions (Subjunctive Triggers)
    ko: 의심 & 부정 표현 (접속법 유발)
  type: vocabulary
  words:
  - spanish: no es cierto que
    translation:
      en: it is not certain that
      ko: ~한 것은 확실하지 않다
    gender: null
  - spanish: no es seguro que
    translation:
      en: it is not sure that
      ko: ~한 것은 확실하지 않다
    gender: null
  - spanish: no es evidente que
    translation:
      en: it is not evident that
      ko: ~한 것은 명백하지 않다
    gender: null
  - spanish: negar que
    translation:
      en: to deny that
      ko: ~한 것을 부인하다
    gender: null
  - spanish: no pensar que
    translation:
      en: to not think that
      ko: ~라고 생각하지 않다
    gender: null
  - spanish: no parecer que
    translation:
      en: it doesn't seem that
      ko: ~인 것 같지 않다
    gender: null
  - spanish: es dudoso que
    translation:
      en: it is doubtful that
      ko: ~인 것은 의심스럽다
    gender: null
  - spanish: es improbable que
    translation:
      en: it is unlikely that
      ko: ~할 가능성이 낮다
    gender: null
  - spanish: es imposible que
