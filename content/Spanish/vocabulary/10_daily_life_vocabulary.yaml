- id: 8_daily_routine_with_reflexive_verbs
  label:
    en: 8. Daily Routine with Reflexive Verbs
    ko: 8. 재귀 동사를 활용한 일과
  type: vocabulary
  words:
  - spanish: Me despierto y me levanto.
    translation:
      en: I wake up and get up.
      ko: 일어나고 침대에서 나온다.
    gender: null
  - spanish: Me ducho y me lavo el pelo.
    translation:
      en: I shower and wash my hair.
      ko: 샤워하고 머리를 감는다.
    gender: null
  - spanish: Me visto y me peino.
    translation:
      en: I get dressed and comb my hair.
      ko: 옷을 입고 머리를 빗는다.
    gender: null
  - spanish: Desayuno café con tostadas.
    translation:
      en: I have coffee with toast for breakfast.
      ko: 커피와 토스트로 아침을 먹는다.
    gender: null
  - spanish: Salgo de casa y voy al trabajo.
    translation:
      en: I leave home and go to work.
      ko: 집을 나서서 직장에 간다.
    gender: null
  - spanish: Almuerzo con mis compañeros.
    translation:
      en: I have lunch with my colleagues.
      ko: 동료들과 점심을 먹는다.
    gender: null
  - spanish: Vuelvo a casa y descanso.
    translation:
      en: I return home and rest.
      ko: 집에 돌아와서 쉰다.
    gender: null
  - spanish: Hago ejercicio o paseo.
    translation:
      en: I exercise or take a walk.
      ko: 운동을 하거나 산책한다.
    gender: null
  - spanish: Ceno y veo la televisión.
    translation:
      en: I have dinner and watch TV.
      ko: 저녁을 먹고 텔레비전을 본다.
    gender: null
  - spanish: Me cepillo los dientes y me acuesto.
    translation:
      en: I brush my teeth and go to bed.
      ko: 이를 닦고 잠자리에 든다.
    gender: null
