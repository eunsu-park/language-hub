    notes:
      en: Spanish uses both opening (¿) and closing (?) marks
      ko: 스페인어는 여는 부호(¿)와 닫는 부호(?) 둘 다 사용
- id: 13_pronunciation_concepts
  label:
    en: 1.3 Pronunciation Concepts
    ko: 1.3 발음 개념
  type: vocabulary
  words:
  - spanish: el diptongo
    translation:
      en: the diphthong
      ko: 이중모음
    gender: m
    notes:
      en: Two vowels in one syllable (e.g., ai, ei, ue)
      ko: 한 음절에 두 개의 모음 (예 ai, ei, ue)
  - spanish: el hiato
    translation:
      en: the hiatus
      ko: 모음 분리
    gender: m
    notes:
      en: Two vowels pronounced in separate syllables
      ko: 두 모음이 각각 다른 음절로 발음됨
  - spanish: la entonación
    translation:
      en: the intonation
      ko: 억양
    gender: f
  - spanish: el ritmo
    translation:
      en: the rhythm
      ko: 리듬
    gender: m
  - spanish: la pausa
    translation:
      en: the pause
      ko: 멈춤
    gender: f
  - spanish: el tono
    translation:
      en: the tone
      ko: 음조
    gender: m
  - spanish: la voz
    translation:
      en: the voice
      ko: 목소리
    gender: f
  - spanish: deletrear
    translation:
      en: to spell
      ko: 철자하다
    gender: null
    notes:
      en: "¿Cómo se deletrea? — How do you spell it?"
      ko: "¿Cómo se deletrea? — 어떻게 철자하나요?"
  - spanish: pronunciar
    translation:
      en: to pronounce
      ko: 발음하다
    gender: null
  - spanish: repetir
    translation:
      en: to repeat
      ko: 반복하다
    gender: null
