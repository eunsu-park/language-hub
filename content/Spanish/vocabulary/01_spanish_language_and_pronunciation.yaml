lesson: 01_Spanish_Language_and_Pronunciation
lesson_number: 1
cefr: A1
categories:
- id: 11_alphabet_basics
  label:
    en: 1.1 Alphabet Basics
    ko: 1.1 알파벳 기초
  type: vocabulary
  words:
  - spanish: el alfabeto
    translation:
      en: the alphabet
      ko: 알파벳
    gender: null
    notes:
      en: 27 letters in Spanish
      ko: 스페인어에는 27개의 글자가 있음
  - spanish: la letra
    translation:
      en: the letter
      ko: 글자
    gender: null
    notes:
      en: A single character
      ko: 하나의 문자
  - spanish: la vocal
    translation:
      en: the vowel
      ko: 모음
    gender: null
    notes:
      en: 'a, e, i, o, u'
      ko: 'a, e, i, o, u'
  - spanish: la consonante
    translation:
      en: the consonant
      ko: 자음
    gender: null
  - spanish: la tilde
    translation:
      en: the tilde / accent mark
      ko: 틸데 / 악센트 부호
    gender: null
    notes:
      en: The ~ mark on ñ, or the acute accent (´)
      ko: ñ 위의 ~ 기호 또는 양음 악센트 (´)
  - spanish: la ñ
    translation:
      en: the letter ñ
      ko: ñ 글자
    gender: null
    notes:
      en: "Unique to Spanish, sounds like 'ny'"
      ko: "스페인어 고유 글자, 'ny' 발음"
  - spanish: la sílaba
    translation:
      en: the syllable
      ko: 음절
    gender: null
  - spanish: la pronunciación
    translation:
      en: the pronunciation
      ko: 발음
    gender: null
  - spanish: el acento
    translation:
      en: the accent / stress
      ko: 악센트 / 강세
    gender: null
    notes:
      en: Stress on a syllable or written accent mark
      ko: 음절의 강세 또는 악센트 부호
  - spanish: la mayúscula
    translation:
      en: the capital letter
      ko: 대문자
    gender: null
  - spanish: la minúscula
    translation:
      en: the lowercase letter
      ko: 소문자
    gender: null
- id: 12_first_words
  label:
    en: 1.2 First Words
    ko: 1.2 첫 번째 단어들
  type: vocabulary
  words:
  - spanish: sí
    translation:
      en: yes
      ko: 네
    gender: null
    notes:
      en: "Written with accent to distinguish from 'si' (if)"
      ko: "'si'(만약)와 구별하기 위해 악센트를 붙임"
  - spanish: no
    translation:
      en: no
      ko: 아니요
    gender: null
    notes:
      en: Also used to negate verbs
      ko: 동사 부정에도 사용
  - spanish: por favor
    translation:
      en: please
      ko: 부탁합니다
    gender: null
    notes:
      en: Essential polite expression
      ko: 필수적인 공손한 표현
  - spanish: gracias
    translation:
      en: thank you
      ko: 감사합니다
    gender: null
  - spanish: de nada
    translation:
      en: you're welcome
      ko: 천만에요
    gender: null
    notes:
      en: Literally 'of nothing'
      ko: 직역하면 '아무것도 아닌'
  - spanish: perdón
    translation:
      en: excuse me / pardon
      ko: 실례합니다
    gender: null
    notes:
      en: Used to get attention or for minor apologies
      ko: 주의를 끌거나 가벼운 사과에 사용
  - spanish: lo siento
    translation:
      en: I'm sorry
      ko: 죄송합니다
    gender: null
    notes:
      en: Literally 'I feel it'; for sincere apologies
      ko: 직역하면 '그것을 느낍니다'; 진심 어린 사과에 사용
  - spanish: hola
    translation:
      en: hello
      ko: 안녕하세요
    gender: null
    notes:
      en: Universal greeting, any time of day
      ko: 시간에 관계없이 사용하는 보편적 인사
  - spanish: adiós
    translation:
      en: goodbye
      ko: 안녕히 가세요
    gender: null
    notes:
      en: Standard farewell
      ko: 표준 작별 인사
