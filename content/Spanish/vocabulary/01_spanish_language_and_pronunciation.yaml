- id: 12_first_words
  label:
    en: 1.2 First Words
    ko: 1.2 첫 번째 단어들
  type: vocabulary
  words:
  - spanish: sí
    translation:
      en: yes
      ko: 네
    gender: null
    notes:
      en: "Written with accent to distinguish from 'si' (if)"
      ko: "'si'(만약)와 구별하기 위해 악센트를 붙임"
  - spanish: no
    translation:
      en: no
      ko: 아니요
    gender: null
    notes:
      en: Also used to negate verbs
      ko: 동사 부정에도 사용
  - spanish: por favor
    translation:
      en: please
      ko: 부탁합니다
    gender: null
    notes:
      en: Essential polite expression
      ko: 필수적인 공손한 표현
  - spanish: gracias
    translation:
      en: thank you
      ko: 감사합니다
    gender: null
  - spanish: de nada
    translation:
      en: you're welcome
      ko: 천만에요
    gender: null
    notes:
      en: Literally 'of nothing'
      ko: 직역하면 '아무것도 아닌'
  - spanish: perdón
    translation:
      en: excuse me / pardon
      ko: 실례합니다
    gender: null
    notes:
      en: Used to get attention or for minor apologies
      ko: 주의를 끌거나 가벼운 사과에 사용
  - spanish: lo siento
    translation:
