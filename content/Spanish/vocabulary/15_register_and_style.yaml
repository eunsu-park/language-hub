      ko: ~해 주시면 감사하겠습니다 / 야, ~해 줄 수 있어?
    gender: null
    notes:
      en: Formal request vs. casual request
      ko: 격식적 요청 vs. 비격식 요청
  - spanish: Reciba un cordial saludo. / ¡Un abrazo!
