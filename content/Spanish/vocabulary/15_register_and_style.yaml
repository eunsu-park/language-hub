- id: 6_register_switching_examples
  label:
    en: 6. Register-Switching Examples
    ko: 6. 어체 전환 예문
  type: vocabulary
  words:
  - spanish: Le comunico que... (formal) / Te digo que... (informal)
    translation:
      en: I inform you that... / I'm telling you that...
      ko: 알려드립니다... / 말해줄게...
    gender: null
    notes:
      en: Formal notification vs. casual telling
      ko: 격식적 통보 vs. 비격식 전달
  - spanish: Le agradeceríamos que... / Oye, ¿podrías...?
    translation:
