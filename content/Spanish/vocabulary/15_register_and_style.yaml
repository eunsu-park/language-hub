lesson: 15_Register_and_Style
lesson_number: 15
cefr: B1
categories:
- id: 1_formal_expressions
  label:
    en: 1. Formal Expressions
    ko: 1. 격식 표현
  type: vocabulary
  words:
  - spanish: usted
    translation:
      en: you (formal)
      ko: 당신 (격식)
    gender: null
    notes:
      en: Formal second-person pronoun; takes third-person verb forms
      ko: 격식체 2인칭 대명사; 3인칭 동사 활용을 사용
  - spanish: estimado/a
    translation:
      en: dear / esteemed
      ko: 친애하는 / 존경하는
    gender: null
    notes:
      en: Used in formal letters and emails
      ko: 격식 편지 및 이메일에서 사용
  - spanish: le ruego
    translation:
      en: I beg you / I kindly ask you
      ko: 부탁드립니다
    gender: null
    notes:
      en: Very formal request
      ko: 매우 격식적인 요청
  - spanish: tenga a bien
    translation:
      en: please be so kind as to
      ko: 부디 ~해 주시기 바랍니다
    gender: null
    notes:
      en: Highly formal, bureaucratic
      ko: 매우 격식적, 관료적
  - spanish: atentamente
    translation:
      en: sincerely / respectfully
      ko: 경의를 표하며
    gender: null
    notes:
      en: Formal letter closing
      ko: 격식 편지 맺음말
  - spanish: disculpe
    translation:
      en: excuse me (formal)
      ko: 실례합니다 (격식)
    gender: null
    notes:
      en: Formal form of 'disculpa'
      ko: "'disculpa'의 격식 형태"
  - spanish: le agradezco
    translation:
      en: I thank you (formal)
      ko: 감사드립니다 (격식)
    gender: null
    notes:
      en: Formal gratitude
      ko: 격식적 감사 표현
  - spanish: le saluda cordialmente
    translation:
      en: cordially yours
      ko: 삼가 인사드립니다
    gender: null
    notes:
      en: Formal letter closing
      ko: 격식 편지 맺음말
  - spanish: me dirijo a usted
    translation:
      en: I am writing to you
      ko: 귀하께 글을 올립니다
    gender: null
    notes:
      en: Opening of formal letters
      ko: 격식 편지 서두
  - spanish: a quien corresponda
    translation:
      en: to whom it may concern
      ko: 관계자분께
    gender: null
    notes:
      en: Standard formal letter opening
      ko: 표준 격식 편지 서두
- id: 2_informal_expressions
  label:
    en: 2. Informal Expressions
    ko: 2. 비격식 표현
  type: vocabulary
  words:
  - spanish: tío/tía
    translation:
      en: dude / mate
      ko: 친구 / 야
    gender: null
    notes:
      en: Spain; literally 'uncle/aunt'
      ko: 스페인; 직역하면 '삼촌/이모'
  - spanish: molar
    translation:
      en: to be cool / awesome
      ko: 멋지다
    gender: null
    notes:
      en: Spain slang; 'mola mucho' = it's really cool
      ko: 스페인 속어; 'mola mucho' = 정말 멋지다
  - spanish: flipar
    translation:
      en: to freak out / to be amazed
      ko: 깜짝 놀라다
    gender: null
    notes:
      en: Spain slang; 'estoy flipando' = I can't believe it
      ko: 스페인 속어; 'estoy flipando' = 믿을 수가 없어
  - spanish: currar
    translation:
      en: to work
      ko: 일하다
    gender: null
    notes:
      en: Spain slang for 'trabajar'
      ko: "'trabajar'의 스페인 속어"
  - spanish: tronco/a
    translation:
      en: buddy / pal
      ko: 친구 / 벗
    gender: null
    notes:
      en: Spain slang; literally 'trunk'
      ko: 스페인 속어; 직역하면 '나무 줄기'
  - spanish: ¡Qué guay!
    translation:
      en: How cool!
      ko: 멋지다!
    gender: null
    notes:
      en: Spain; informal exclamation
      ko: 스페인; 비격식 감탄사
  - spanish: ¡Venga!
    translation:
      en: Come on! / Let's go!
      ko: 자! / 어서!
    gender: null
    notes:
      en: Spain; encouragement or agreement
      ko: 스페인; 격려 또는 동의
  - spanish: ¡No me digas!
    translation:
      en: No way! / You don't say!
      ko: 설마! / 말도 안 돼!
    gender: null
    notes:
      en: Expresses surprise
      ko: 놀라움을 표현
  - spanish: quedarse en blanco
    translation:
      en: to go blank / draw a blank
      ko: 머리가 하얘지다
    gender: null
    notes:
      en: Colloquial idiom
      ko: 구어체 관용 표현
  - spanish: pasarlo bomba
    translation:
      en: to have a blast
      ko: 엄청 즐기다
    gender: null
    notes:
      en: Colloquial; 'lo pasamos bomba' = we had a great time
      ko: 구어체; 'lo pasamos bomba' = 정말 즐거웠어
