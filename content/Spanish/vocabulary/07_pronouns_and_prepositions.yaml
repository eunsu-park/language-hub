lesson: 07_Pronouns_and_Prepositions
lesson_number: 7
cefr: A2
categories:
- id: 1_subject_pronouns
  label:
    en: 1. Subject Pronouns
    ko: 1. 주격 대명사
  type: pronoun
  entries:
  - person: 1st
    singular: yo (I)
    plural: nosotros/nosotras (we)
  - person: 2nd informal
    singular: tú (you)
    plural: vosotros/vosotras (you all — Spain)
  - person: 2nd formal
    singular: usted (you)
    plural: ustedes (you all)
  - person: 3rd
    singular: él/ella (he/she)
    plural: ellos/ellas (they)
- id: 2_direct_object_pronouns
  label:
    en: 2. Direct Object Pronouns
    ko: 2. 직접 목적어 대명사
  type: pronoun
  entries:
  - person: 1st
    singular: me (me)
    plural: nos (us)
  - person: 2nd informal
    singular: te (you)
    plural: os (you all — Spain)
  - person: 2nd formal
    singular: lo/la (you)
    plural: los/las (you all)
  - person: 3rd masc.
    singular: lo (him/it)
    plural: los (them)
  - person: 3rd fem.
    singular: la (her/it)
    plural: las (them)
- id: 3_indirect_object_pronouns
  label:
    en: 3. Indirect Object Pronouns
    ko: 3. 간접 목적어 대명사
  type: pronoun
  entries:
  - person: 1st
    singular: me (to me)
    plural: nos (to us)
  - person: 2nd informal
    singular: te (to you)
    plural: os (to you all)
  - person: 3rd
    singular: le (to him/her/you)
    plural: les (to them/you all)
- id: 6_reflexive_pronouns
  label:
    en: 6. Reflexive Pronouns
    ko: 6. 재귀 대명사
  type: conjugation
  tense: present
  entries:
  - subject: yo
    form: me
    example:
      es: Me levanto.
      en: I get up.
  - subject: tú
    form: te
    example:
      es: Te duchas.
      en: You shower.
  - subject: él/ella/Ud.
    form: se
    example:
      es: Se peina.
      en: He/she combs his/her hair.
  - subject: nosotros
    form: nos
    example:
      es: Nos vestimos.
      en: We get dressed.
  - subject: vosotros
    form: os
    example:
      es: Os sentáis.
      en: You all sit down.
  - subject: ellos/Uds.
    form: se
    example:
      es: Se acuestan.
      en: They go to bed.
