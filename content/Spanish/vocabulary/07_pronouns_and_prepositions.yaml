- id: possessive_adjectives_before_the_noun
  label:
    en: Possessive Adjectives (before the noun)
    ko: 소유 형용사 (명사 앞에 위치)
  type: pronoun
  entries:
  - person: yo
    singular: mi
    plural: mis
  - person: tú
    singular: tu
    plural: tus
  - person: él/ella/Ud.
    singular: su
    plural: sus
  - person: nosotros
    singular: nuestro/a
    plural: nuestros/as
  - person: vosotros
    singular: vuestro/a
    plural: vuestros/as
  - person: ellos/Uds.
    singular: su
    plural: sus
- id: possessive_pronouns_replace_noun
  label:
    en: Possessive Pronouns (replace noun)
    ko: 소유 대명사 (명사를 대체)
  type: conjugation
  tense: present
  entries:
  - subject: yo
    form: mío
  - subject: tú
    form: tuyo
  - subject: él/ella
    form: suyo
  - subject: nosotros
    form: nuestro
- id: simple_prepositions
  label:
    en: Simple Prepositions
    ko: 단순 전치사
  type: preposition
  entries:
  - preposition: a
    meaning:
      en: to, at
      ko: ~에, ~로
    example: Voy a la escuela. (I go to school.)
  - preposition: de
    meaning:
      en: of, from
      ko: ~의, ~에서
    example: Soy de México. (I'm from Mexico.)
  - preposition: en
    meaning:
      en: in, on, at
      ko: ~안에, ~위에, ~에서
    example: Estoy en casa. (I'm at home.)
  - preposition: con
    meaning:
      en: with
      ko: ~와 함께
    example: Voy con mi amigo. (I go with my friend.)
  - preposition: sin
    meaning:
      en: without
      ko: ~없이
    example: Café sin azúcar. (Coffee without sugar.)
  - preposition: por
    meaning:
      en: by, for, through
      ko: ~에 의해, ~을 위해, ~을 통해
    example: Paso por el parque. (I pass through the park.)
  - preposition: para
    meaning:
      en: for, in order to
      ko: ~을 위해, ~하기 위해
    example: Es para ti. (It's for you.)
  - preposition: entre
    meaning:
      en: between
      ko: ~사이에
    example: Entre tú y yo. (Between you and me.)
  - preposition: sobre
    meaning:
      en: on, about
      ko: ~위에, ~에 대해
    example: El libro está sobre la mesa. (on the table)
  - preposition: hasta
    meaning:
      en: until, up to
      ko: ~까지
    example: Trabajo hasta las 5. (I work until 5.)
  - preposition: desde
    meaning:
      en: from, since
      ko: ~부터, ~이래로
    example: Vivo aquí desde 2020. (since 2020)
  - preposition: hacia
    meaning:
      en: toward
      ko: ~을 향해
    example: Camino hacia la playa. (toward the beach)
  - preposition: según
    meaning:
      en: according to
      ko: ~에 따르면
    example: Según él... (According to him...)
- id: compound_prepositions
  label:
    en: Compound Prepositions
    ko: 복합 전치사
  type: preposition
  entries:
  - preposition: delante de
    meaning:
      en: in front of
      ko: ~앞에
    example: delante de la casa
  - preposition: detrás de
    meaning:
      en: behind
      ko: ~뒤에
    example: detrás de ti
  - preposition: encima de
    meaning:
      en: on top of
      ko: ~위에
    example: encima de la mesa
  - preposition: debajo de
    meaning:
      en: under
      ko: ~아래에
    example: debajo de la cama
  - preposition: al lado de
    meaning:
      en: next to
      ko: ~옆에
    example: al lado de la escuela
  - preposition: cerca de
    meaning:
      en: near
      ko: ~근처에
    example: cerca de aquí
  - preposition: lejos de
    meaning:
      en: far from
      ko: ~에서 먼
    example: lejos de la ciudad
