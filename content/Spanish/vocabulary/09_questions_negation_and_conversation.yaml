lesson: 09_Questions_Negation_and_Conversation
lesson_number: 9
cefr: A2
categories:
- id: 4_double_negatives
  label:
    en: 4. Double Negatives
    ko: 4. 이중 부정
  type: vocabulary
  words:
  - spanish: No tengo nada.
    translation:
      en: 'I don''t have anything. (lit: I don''t have nothing.)'
      ko: '나는 아무것도 없다. (직역: 나는 아무것도 가지고 있지 않다.)'
    gender: null
  - spanish: No viene nadie.
    translation:
      en: Nobody is coming.
      ko: 아무도 오지 않는다.
    gender: null
  - spanish: No voy nunca.
    translation:
      en: I never go.
      ko: 나는 절대 가지 않는다.
    gender: null
  - spanish: No quiero ni café ni té.
    translation:
      en: I want neither coffee nor tea.
      ko: 나는 커피도 차도 원하지 않는다.
    gender: null
  - spanish: No tengo ningún problema.
    translation:
      en: I don't have any problem.
      ko: 나는 아무 문제도 없다.
    gender: null
- id: 5_negation_words
  label:
    en: 5. Negation Words
    ko: 5. 부정어
  type: vocabulary
  words:
  - spanish: no
    translation:
      en: no / not
      ko: 아니오 / ~않다
    gender: null
    notes:
      en: Placed before the verb to negate
      ko: 부정하기 위해 동사 앞에 배치
  - spanish: nunca
    translation:
      en: never
      ko: 절대 ~않다
    gender: null
  - spanish: jamás
    translation:
      en: never (emphatic)
      ko: 절대 ~않다 (강조)
    gender: null
    notes:
      en: Stronger than 'nunca'
      ko: "'nunca'보다 강한 표현"
  - spanish: nada
    translation:
      en: nothing
      ko: 아무것도 (~않다)
    gender: null
  - spanish: nadie
    translation:
      en: nobody
      ko: 아무도 (~않다)
    gender: null
  - spanish: ninguno/a
    translation:
      en: none / not any
      ko: 아무 ~도 없는
    gender: null
  - spanish: ni...ni
    translation:
      en: neither...nor
      ko: ~도 ~도 아닌
    gender: null
  - spanish: tampoco
    translation:
      en: neither / not either
      ko: ~도 아니다
    gender: null
    notes:
      en: "Yo tampoco. — Me neither."
      ko: "Yo tampoco. — 나도 아니야."
  - spanish: ya no
    translation:
      en: no longer / not anymore
      ko: 더 이상 ~않다
    gender: null
  - spanish: todavía no
    translation:
      en: not yet
      ko: 아직 ~않다
    gender: null
- id: 55_conversational_fillers
  label:
    en: 5.5 Conversational Fillers
    ko: 5.5 대화 채움말
  type: vocabulary
  words:
  - spanish: bueno
    translation:
      en: well / okay
      ko: 음 / 좋아
    gender: null
    notes:
      en: Very common conversation starter
      ko: 매우 흔한 대화 시작어
  - spanish: pues
    translation:
      en: well / so
      ko: 음 / 그러니까
    gender: null
  - spanish: o sea
    translation:
      en: I mean / that is
      ko: 그러니까 / 즉
    gender: null
  - spanish: a ver
    translation:
      en: let's see
      ko: 어디 보자
    gender: null
  - spanish: es que...
    translation:
      en: the thing is...
      ko: 사실은...
    gender: null
    notes:
      en: Used to introduce an explanation or excuse
      ko: 설명이나 변명을 시작할 때 사용
  - spanish: mira
    translation:
      en: look (filler)
      ko: 있잖아
    gender: null
    notes:
      en: Gets listener's attention
      ko: 청자의 주의를 끌 때
  - spanish: oye
    translation:
      en: hey / listen
      ko: 저기 / 들어봐
    gender: null
  - spanish: ¿sabes?
    translation:
      en: you know?
      ko: 알지?
    gender: null
  - spanish: ¿me entiendes?
    translation:
      en: do you understand me?
      ko: 이해해?
    gender: null
  - spanish: claro
    translation:
      en: of course / sure
      ko: 물론
    gender: null
- id: 56_expressing_opinions
  label:
    en: 5.6 Expressing Opinions
    ko: 5.6 의견 표현
  type: vocabulary
  words:
  - spanish: Creo que...
    translation:
      en: I think that...
      ko: ~라고 생각해...
    gender: null
  - spanish: Me parece que...
    translation:
      en: It seems to me that...
      ko: ~인 것 같아...
    gender: null
  - spanish: En mi opinión...
    translation:
      en: In my opinion...
      ko: 내 생각에는...
    gender: null
  - spanish: Estoy de acuerdo.
    translation:
      en: I agree.
      ko: 동의해.
    gender: null
  - spanish: No estoy de acuerdo.
    translation:
      en: I disagree.
      ko: 동의하지 않아.
    gender: null
  - spanish: Tienes razón.
    translation:
      en: You're right.
      ko: 네 말이 맞아.
    gender: null
  - spanish: No es verdad.
    translation:
      en: That's not true.
      ko: 사실이 아니야.
    gender: null
  - spanish: Depende.
    translation:
      en: It depends.
      ko: 경우에 따라 다르지.
    gender: null
  - spanish: Por supuesto.
    translation:
      en: Of course.
      ko: 물론이지.
    gender: null
  - spanish: Sin duda.
    translation:
      en: Without a doubt.
      ko: 의심할 여지 없이.
    gender: null
- id: 6_phone_expressions
  label:
    en: 6. Phone Expressions
    ko: 6. 전화 표현
  type: vocabulary
  words:
  - spanish: ¿Aló? / ¿Diga? / ¿Bueno?
    translation:
      en: Hello? (answering phone)
      ko: 여보세요? (전화 받을 때)
    gender: null
  - spanish: ¿Puedo hablar con...?
    translation:
      en: Can I speak with...?
      ko: '...와 통화할 수 있을까요?'
    gender: null
  - spanish: ¿De parte de quién?
    translation:
      en: Who's calling?
      ko: 누구시죠? (전화한 사람 확인)
    gender: null
  - spanish: Un momento, por favor.
    translation:
      en: One moment, please.
      ko: 잠시만요.
    gender: null
  - spanish: No está disponible.
    translation:
      en: He/She is not available.
      ko: 지금 통화할 수 없습니다.
    gender: null
  - spanish: ¿Quiere dejar un mensaje?
    translation:
      en: Would you like to leave a message?
      ko: 메시지를 남기시겠어요?
    gender: null
  - spanish: Le devuelvo la llamada.
    translation:
      en: I'll return the call.
      ko: 다시 전화 드리겠습니다.
    gender: null
  - spanish: Se cortó la llamada.
    translation:
      en: The call was cut off.
      ko: 전화가 끊겼어요.
    gender: null
  - spanish: No tengo señal.
    translation:
      en: I don't have signal.
      ko: 신호가 없어요.
    gender: null
- id: useful_phrases
  label:
    en: Useful Phrases
    ko: 유용한 표현
  type: vocabulary
  words:
  - spanish: Una mesa para dos, por favor.
    translation:
      en: A table for two, please.
      ko: 2인 테이블 부탁합니다.
    gender: null
  - spanish: ¿Tienen menú del día?
    translation:
      en: Do you have a set menu?
      ko: 오늘의 메뉴가 있나요?
    gender: null
  - spanish: ¿Qué me recomienda?
    translation:
      en: What do you recommend?
      ko: 뭘 추천하시나요?
    gender: null
  - spanish: Para mí, la sopa.
    translation:
      en: For me, the soup.
      ko: 저는 수프로 할게요.
    gender: null
  - spanish: ¿Me trae la cuenta, por favor?
    translation:
      en: Can you bring me the check?
      ko: 계산서 좀 가져다주시겠어요?
    gender: null
  - spanish: ¿Está incluida la propina?
    translation:
      en: Is the tip included?
      ko: 팁이 포함되어 있나요?
    gender: null
  - spanish: ¿Puedo pagar con tarjeta?
    translation:
      en: Can I pay by card?
      ko: 카드로 결제할 수 있나요?
    gender: null
- id: 8_shopping_scenarios
  label:
    en: 8. Shopping Scenarios
    ko: 8. 쇼핑 시나리오
  type: vocabulary
  words:
  - spanish: ¿Cuánto cuesta esto?
    translation:
      en: How much does this cost?
      ko: 이거 얼마예요?
    gender: null
  - spanish: ¿Tiene una talla más grande/pequeña?
    translation:
      en: Do you have a bigger/smaller size?
      ko: 더 큰/작은 사이즈 있나요?
    gender: null
  - spanish: ¿Lo puedo probar?
    translation:
      en: Can I try it on?
      ko: 입어 봐도 되나요?
    gender: null
  - spanish: ¿Dónde está el probador?
    translation:
      en: Where is the fitting room?
      ko: 탈의실이 어디예요?
    gender: null
  - spanish: Me lo llevo.
    translation:
      en: I'll take it.
      ko: 이걸로 살게요.
    gender: null
  - spanish: ¿Tienen descuento?
    translation:
      en: Do you have a discount?
      ko: 할인이 있나요?
    gender: null
  - spanish: Está en oferta / en rebajas.
    translation:
      en: It's on sale.
      ko: 세일 중이에요.
    gender: null
  - spanish: ¿Aceptan tarjeta de crédito?
    translation:
      en: Do you accept credit cards?
      ko: 신용카드 되나요?
    gender: null
  - spanish: Solo estoy mirando.
    translation:
      en: I'm just looking.
      ko: 그냥 구경하는 거예요.
    gender: null
- id: 9_asking_for_directions
  label:
    en: 9. Asking for Directions
    ko: 9. 길 묻기
  type: vocabulary
  words:
  - spanish: Perdone, ¿dónde está...?
    translation:
      en: Excuse me, where is...?
      ko: 실례합니다, ...이/가 어디에 있나요?
    gender: null
  - spanish: ¿Cómo llego a...?
    translation:
      en: How do I get to...?
      ko: '...에 어떻게 가나요?'
    gender: null
  - spanish: ¿Está lejos/cerca de aquí?
    translation:
      en: Is it far/near from here?
      ko: 여기서 멀어요/가까워요?
    gender: null
  - spanish: Siga todo recto / derecho.
    translation:
      en: Go straight ahead.
      ko: 쭉 직진하세요.
    gender: null
  - spanish: Gire a la derecha/izquierda.
    translation:
      en: Turn right/left.
      ko: 오른쪽/왼쪽으로 도세요.
    gender: null
  - spanish: Está en la esquina.
    translation:
      en: It's on the corner.
      ko: 모퉁이에 있어요.
    gender: null
  - spanish: Está al lado de...
    translation:
      en: It's next to...
      ko: '... 옆에 있어요.'
    gender: null
  - spanish: Está enfrente de...
    translation:
      en: It's across from...
      ko: '... 맞은편에 있어요.'
    gender: null
  - spanish: Cruce la calle.
    translation:
      en: Cross the street.
      ko: 길을 건너세요.
    gender: null
  - spanish: A dos cuadras / manzanas.
    translation:
      en: Two blocks away.
      ko: 두 블록 거리에 있어요.
    gender: null
- id: 10_emergency_and_help
  label:
    en: 10. Emergency and Asking for Help
    ko: 10. 비상 상황과 도움 요청
  type: vocabulary
  words:
  - spanish: ¡Ayuda!
    translation:
      en: Help!
      ko: 도와주세요!
    gender: null
  - spanish: ¡Llame a la policía!
    translation:
      en: Call the police!
      ko: 경찰을 불러주세요!
    gender: null
  - spanish: ¡Llame a una ambulancia!
    translation:
      en: Call an ambulance!
      ko: 구급차를 불러주세요!
    gender: null
  - spanish: Necesito un médico.
    translation:
      en: I need a doctor.
      ko: 의사가 필요해요.
    gender: null
  - spanish: ¿Dónde está el hospital?
    translation:
      en: Where is the hospital?
      ko: 병원이 어디에 있나요?
    gender: null
  - spanish: Me he perdido.
    translation:
      en: I'm lost.
      ko: 길을 잃었어요.
    gender: null
  - spanish: No hablo bien español.
    translation:
      en: I don't speak Spanish well.
      ko: 스페인어를 잘 못해요.
    gender: null
  - spanish: ¿Habla inglés?
    translation:
      en: Do you speak English?
      ko: 영어 하시나요?
    gender: null
  - spanish: Más despacio, por favor.
    translation:
      en: Slower, please.
      ko: 좀 더 천천히요.
    gender: null
  - spanish: ¿Puede escribirlo?
    translation:
      en: Can you write it down?
      ko: 적어 주실 수 있나요?
    gender: null
