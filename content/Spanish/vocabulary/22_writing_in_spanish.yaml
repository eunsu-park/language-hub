- id: letter_and_email_vocabulary
  label:
    en: Letter and Email Vocabulary
    ko: 편지 및 이메일 어휘
  type: vocabulary
  words:
  - spanish: Estimado/a señor/a
    translation:
      en: Dear Sir/Madam
      ko: 존경하는 선생님께
    gender: null
    notes:
      en: Formal letter/email opening
      ko: 공식 편지/이메일 서두
  - spanish: Muy señor mío
    translation:
      en: Dear Sir (very formal)
      ko: 존경하는 귀하 (매우 격식체)
    gender: null
  - spanish: Querido/a
    translation:
      en: Dear (informal)
      ko: 친애하는 (비격식)
    gender: null
  - spanish: Me dirijo a usted
    translation:
      en: I am writing to you (formal)
      ko: 귀하께 서신을 드립니다
    gender: null
  - spanish: Le escribo con motivo de
    translation:
      en: I am writing regarding
      ko: ~에 관하여 서신을 드립니다
    gender: null
  - spanish: En relación con
    translation:
      en: In relation to / Regarding
      ko: ~에 관하여
    gender: null
  - spanish: Adjunto le envío
    translation:
      en: I am attaching / Please find attached
      ko: 첨부하여 보내드립니다
    gender: null
  - spanish: Quedo a su disposición
    translation:
      en: I remain at your disposal
      ko: 언제든지 연락 주십시오
    gender: null
  - spanish: Le saluda atentamente
    translation:
      en: Yours sincerely / Yours faithfully
      ko: 경의를 표하며
    gender: null
  - spanish: Un cordial saludo
    translation:
      en: Kind regards
      ko: 친절한 인사를 드리며
    gender: null
  - spanish: Un abrazo
    translation:
      en: A hug (warm informal closing)
      ko: 포옹 (따뜻한 비격식 맺음)
    gender: m
  - spanish: Besos
    translation:
      en: Kisses (very informal closing)
      ko: 키스 (매우 비격식 맺음)
    gender: null
  - spanish: el destinatario
    translation:
      en: the recipient / addressee
      ko: 수신인
    gender: m
  - spanish: el remitente
    translation:
      en: the sender
      ko: 발신인
    gender: m
  - spanish: el asunto
    translation:
      en: the subject (of email)
      ko: 제목 (이메일)
    gender: m
