framework: CEFR
full_name:
  en: "Common European Framework of Reference for Languages"
  ko: "유럽 공통 언어 기준"

levels:
  A1:
    label:
      en: "Beginner"
      ko: "입문"
    description:
      en: "Can understand and use familiar everyday expressions and very basic phrases."
      ko: "일상적인 표현과 기본적인 구문을 이해하고 사용할 수 있다."
    color: "#28a745"

  A2:
    label:
      en: "Elementary"
      ko: "초급"
    description:
      en: "Can understand sentences and frequently used expressions related to areas of most immediate relevance."
      ko: "가장 즉각적인 관련 분야의 문장과 자주 사용되는 표현을 이해할 수 있다."
    color: "#5cb85c"

  B1:
    label:
      en: "Intermediate"
      ko: "중급"
    description:
      en: "Can understand the main points of clear standard input on familiar matters."
      ko: "익숙한 주제에 대한 명확한 표준 입력의 요점을 이해할 수 있다."
    color: "#f0ad4e"

  B2:
    label:
      en: "Upper Intermediate"
      ko: "중상급"
    description:
      en: "Can understand the main ideas of complex text on both concrete and abstract topics."
      ko: "구체적이고 추상적인 주제의 복잡한 텍스트의 주요 아이디어를 이해할 수 있다."
    color: "#ff8c00"

  C1:
    label:
      en: "Advanced"
      ko: "고급"
    description:
      en: "Can understand a wide range of demanding, longer texts, and recognize implicit meaning."
      ko: "다양한 길고 까다로운 텍스트를 이해하고 암묵적 의미를 파악할 수 있다."
    color: "#d9534f"

  C2:
    label:
      en: "Mastery"
      ko: "최상급"
    description:
      en: "Can understand with ease virtually everything heard or read."
      ko: "듣거나 읽는 거의 모든 것을 쉽게 이해할 수 있다."
    color: "#c9302c"
