lesson: sup_C1_Latin_in_Modern_Languages
lesson_number: 140
type: supplementary
topic: "Latin in Modern Languages"
cefr: C1
categories:
- id: english_roots
  label:
    en: Latin Roots in English
    ko: 영어 속의 라틴어 어근
  type: vocabulary
  words:
  - latin: audio
    translation:
      en: I hear (→ audio, audience, auditorium)
      ko: 나는 듣는다 (→ audio, audience, auditorium)
    gender: m
    notes:
      en: "verb, 4th conj.; English derivatives relate to hearing and sound"
      ko: "동사, 제4활용; 영어 파생어는 듣기와 소리에 관련"
  - latin: video
    translation:
      en: I see (→ video, vision, evidence)
      ko: 나는 본다 (→ video, vision, evidence)
    gender: m
    notes:
      en: "verb, 2nd conj.; English derivatives relate to sight and seeing"
      ko: "동사, 제2활용; 영어 파생어는 시각과 보기에 관련"
  - latin: scribo
    translation:
      en: I write (→ scribe, scripture, describe, prescribe)
      ko: 나는 쓴다 (→ scribe, scripture, describe, prescribe)
    gender: m
    notes:
      en: "verb, 3rd conj.; English derivatives relate to writing"
      ko: "동사, 제3활용; 영어 파생어는 쓰기에 관련"
  - latin: duco
    translation:
      en: I lead (→ duke, conduct, educate, produce)
      ko: 나는 이끈다 (→ duke, conduct, educate, produce)
    gender: m
    notes:
      en: "verb, 3rd conj.; one of the most productive Latin roots in English"
      ko: "동사, 제3활용; 영어에서 가장 생산적인 라틴어 어근 중 하나"
  - latin: facio
    translation:
      en: I make, I do (→ fact, factory, manufacture, effect)
      ko: 나는 만든다, 나는 행한다 (→ fact, factory, manufacture, effect)
    gender: m
    notes:
      en: "verb, 3rd conj. -io; hundreds of English derivatives"
      ko: "동사, 제3활용 -io형; 수백 개의 영어 파생어"
  - latin: porto
    translation:
      en: I carry (→ port, transport, export, import, report)
      ko: 나는 운반한다 (→ port, transport, export, import, report)
    gender: m
    notes:
      en: "verb, 1st conj.; Latin prefixes create distinct English words"
      ko: "동사, 제1활용; 라틴어 접두사가 서로 다른 영어 단어를 생성"
  - latin: mitto
    translation:
      en: I send (→ mission, emit, transmit, commit, submit)
      ko: 나는 보낸다 (→ mission, emit, transmit, commit, submit)
    gender: m
    notes:
      en: "verb, 3rd conj.; past participle missus gives 'mission'"
      ko: "동사, 제3활용; 과거분사 missus가 'mission'을 만듦"
  - latin: capio
    translation:
      en: I take (→ capture, capable, accept, receive)
      ko: 나는 잡는다 (→ capture, capable, accept, receive)
    gender: m
    notes:
      en: "verb, 3rd conj. -io; compounds: ac-cipio, re-cipio, con-cipio"
      ko: "동사, 제3활용 -io형; 합성어: ac-cipio, re-cipio, con-cipio"
  - latin: teneo
    translation:
      en: I hold (→ tenant, tenure, contain, retain, maintain)
      ko: 나는 유지한다 (→ tenant, tenure, contain, retain, maintain)
    gender: m
    notes:
      en: "verb, 2nd conj.; English derivatives relate to holding and keeping"
      ko: "동사, 제2활용; 영어 파생어는 보유와 유지에 관련"
  - latin: rego
    translation:
      en: I rule, I direct (→ regal, regent, direct, correct, region)
      ko: 나는 다스린다, 나는 지시한다 (→ regal, regent, direct, correct, region)
    gender: m
    notes:
      en: "verb, 3rd conj.; rex 'king' is from the same root"
      ko: "동사, 제3활용; rex '왕'이 같은 어근에서 유래"
  - latin: pono
    translation:
      en: I place (→ position, compose, dispose, expose, propose)
      ko: 나는 놓는다 (→ position, compose, dispose, expose, propose)
    gender: m
    notes:
      en: "verb, 3rd conj.; past participle positus; extremely productive in English"
      ko: "동사, 제3활용; 과거분사 positus; 영어에서 매우 생산적"
  - latin: amo
    translation:
      en: I love (→ amateur, amorous, amicable)
      ko: 나는 사랑한다 (→ amateur, amorous, amicable)
    gender: m
    notes:
      en: "verb, 1st conj.; the textbook first Latin verb"
      ko: "동사, 제1활용; 교과서에서 첫 번째로 배우는 라틴어 동사"
  - latin: voco
    translation:
      en: I call (→ vocal, vocation, invoke, provoke, advocate)
      ko: 나는 부른다 (→ vocal, vocation, invoke, provoke, advocate)
    gender: m
    notes:
      en: "verb, 1st conj.; vōx 'voice' is cognate"
      ko: "동사, 제1활용; vōx '목소리'가 동계어"

- id: romance_evolution
  label:
    en: Latin to Romance Language Evolution
    ko: 라틴어에서 로망스어로의 진화
  type: vocabulary
  words:
  - latin: aqua
    translation:
      en: water (→ Sp. agua, It. acqua, Fr. eau, Pt. água)
      ko: 물 (→ 스페인어 agua, 이탈리아어 acqua, 프랑스어 eau, 포르투갈어 água)
    gender: f
    notes:
      en: "gen. aquae; 1st decl.; shows different phonetic evolution in each Romance language"
      ko: "속격 aquae; 제1변화; 각 로망스어에서 서로 다른 음운 변화를 보여줌"
  - latin: filius
    translation:
      en: son (→ Sp. hijo, It. figlio, Fr. fils, Pt. filho)
      ko: 아들 (→ 스페인어 hijo, 이탈리아어 figlio, 프랑스어 fils, 포르투갈어 filho)
    gender: m
    notes:
      en: "gen. fīliī; 2nd decl.; Latin f- → Spanish h-; Latin -li- → Italian -gli-"
      ko: "속격 fīliī; 제2변화; 라틴어 f- → 스페인어 h-; 라틴어 -li- → 이탈리아어 -gli-"
  - latin: nox
    translation:
      en: night (→ Sp. noche, It. notte, Fr. nuit, Pt. noite)
      ko: 밤 (→ 스페인어 noche, 이탈리아어 notte, 프랑스어 nuit, 포르투갈어 noite)
    gender: f
    notes:
      en: "gen. noctis; 3rd decl.; accusative noctem is the base form for Romance"
      ko: "속격 noctis; 제3변화; 대격 noctem이 로망스어의 기본형"
  - latin: oculus
    translation:
      en: eye (→ Sp. ojo, It. occhio, Fr. oeil, Pt. olho)
      ko: 눈 (→ 스페인어 ojo, 이탈리아어 occhio, 프랑스어 oeil, 포르투갈어 olho)
    gender: m
    notes:
      en: "gen. oculī; 2nd decl.; Vulgar Latin oclus; Latin -cl- → various outcomes"
      ko: "속격 oculī; 제2변화; 속 라틴어 oclus; 라틴어 -cl- → 다양한 결과"
  - latin: factum
    translation:
      en: thing done, deed (→ Sp. hecho, It. fatto, Fr. fait, Pt. feito)
      ko: 행해진 것, 행위 (→ 스페인어 hecho, 이탈리아어 fatto, 프랑스어 fait, 포르투갈어 feito)
    gender: n
    notes:
      en: "gen. factī; 2nd decl.; Latin -ct- → Sp. -ch-, It. -tt-, Fr. -t, Pt. -it-"
      ko: "속격 factī; 제2변화; 라틴어 -ct- → 스페인어 -ch-, 이탈리아어 -tt-, 프랑스어 -t, 포르투갈어 -it-"
  - latin: habeo
    translation:
      en: I have (→ Sp. he/haber, It. ho/avere, Fr. ai/avoir, Pt. hei/haver)
      ko: 나는 가진다 (→ 스페인어 he/haber, 이탈리아어 ho/avere, 프랑스어 ai/avoir, 포르투갈어 hei/haver)
    gender: m
    notes:
      en: "verb, 2nd conj.; became an auxiliary verb for compound tenses in all Romance languages"
      ko: "동사, 제2활용; 모든 로망스어에서 복합 시제의 조동사가 됨"
  - latin: terra
    translation:
      en: earth, land (→ Sp. tierra, It. terra, Fr. terre, Pt. terra)
      ko: 땅, 육지 (→ 스페인어 tierra, 이탈리아어 terra, 프랑스어 terre, 포르투갈어 terra)
    gender: f
    notes:
      en: "gen. terrae; 1st decl.; Latin -rr- → Sp. -rr- with diphthong (ie)"
      ko: "속격 terrae; 제1변화; 라틴어 -rr- → 스페인어 -rr- 이중모음(ie) 발생"
  - latin: dicere
    translation:
      en: to say (→ Sp. decir, It. dire, Fr. dire, Pt. dizer)
      ko: 말하다 (→ 스페인어 decir, 이탈리아어 dire, 프랑스어 dire, 포르투갈어 dizer)
    gender: n
    notes:
      en: "3rd conj. infinitive; shows different syncope patterns in Romance"
      ko: "제3활용 부정사; 로망스어에서 서로 다른 음절 탈락 패턴을 보여줌"
  - latin: lingua
    translation:
      en: tongue, language (→ Sp. lengua, It. lingua, Fr. langue, Pt. língua)
      ko: 혀, 언어 (→ 스페인어 lengua, 이탈리아어 lingua, 프랑스어 langue, 포르투갈어 língua)
    gender: f
    notes:
      en: "gen. linguae; 1st decl.; English 'language' via Old French"
      ko: "속격 linguae; 제1변화; 영어 'language'는 고대 프랑스어를 경유"
  - latin: homo
    translation:
      en: human being, man (→ Sp. hombre, It. uomo, Fr. homme, Pt. homem)
      ko: 인간, 사람 (→ 스페인어 hombre, 이탈리아어 uomo, 프랑스어 homme, 포르투갈어 homem)
    gender: m
    notes:
      en: "gen. hominis; 3rd decl.; accusative hominem is the base for Romance forms"
      ko: "속격 hominis; 제3변화; 대격 hominem이 로망스어 형태의 기본형"

- id: everyday_latin
  label:
    en: Everyday Latin Phrases in Modern Use
    ko: 현대에서 사용되는 일상 라틴어 구문
  type: vocabulary
  words:
  - latin: ad hoc
    translation:
      en: for this purpose, improvised
      ko: 이것을 위해, 임시의
    gender: n
    notes:
      en: "used in English for something arranged for a specific purpose"
      ko: "특정 목적을 위해 마련된 것에 대해 영어에서 사용"
  - latin: per capita
    translation:
      en: by heads, per person
      ko: 1인당
    gender: n
    notes:
      en: "lit. 'by heads'; used in economics and statistics"
      ko: "직역 '머리당'; 경제학과 통계학에서 사용"
  - latin: status quo
    translation:
      en: the existing state of affairs
      ko: 현상, 현재 상태
    gender: m
    notes:
      en: "from in statū quō 'in the state in which'; the current condition"
      ko: "in statū quō '~인 상태에서'에서 유래; 현재 상태"
  - latin: vice versa
    translation:
      en: with the position turned, conversely
      ko: 반대로, 거꾸로
    gender: n
    notes:
      en: "ablative absolute; indicating a reversal of relationship"
      ko: "탈격 독립 구문; 관계의 역전을 나타냄"
  - latin: alter ego
    translation:
      en: other self, close friend
      ko: 또 다른 자아, 절친한 친구
    gender: m
    notes:
      en: "Cicero used this phrase; also used in psychology and literature"
      ko: "키케로가 이 표현을 사용; 심리학과 문학에서도 사용"
  - latin: bona fide
    translation:
      en: in good faith, genuine
      ko: 진정한, 선의의
    gender: f
    notes:
      en: "ablative of bona fidēs; used as adjective in English"
      ko: "bona fidēs의 탈격; 영어에서 형용사로 사용"
  - latin: carpe diem
    translation:
      en: seize the day
      ko: 오늘을 즐겨라
    gender: m
    notes:
      en: "Horace, Odes 1.11; the most famous Latin phrase in popular culture"
      ko: "호라티우스, 송시 1.11; 대중 문화에서 가장 유명한 라틴어 구절"
  - latin: memento mori
    translation:
      en: remember that you will die
      ko: 죽음을 기억하라
    gender: n
    notes:
      en: "a reminder of mortality; common in art and philosophy"
      ko: "유한함에 대한 상기; 예술과 철학에서 흔함"
  - latin: persona non grata
    translation:
      en: unwelcome person
      ko: 기피 인물
    gender: f
    notes:
      en: "used in diplomacy for an unwelcome foreign representative"
      ko: "외교에서 환영받지 못하는 외국 대표를 가리킬 때 사용"
  - latin: et cetera
    translation:
      en: and the rest, and so forth
      ko: 기타, 등등
    gender: n
    notes:
      en: "abbreviated etc.; one of the most frequently used Latin phrases"
      ko: "약자 etc.; 가장 빈번히 사용되는 라틴어 구절 중 하나"
  - latin: pro tempore
    translation:
      en: for the time being, temporarily
      ko: 임시로, 당분간
    gender: n
    notes:
      en: "abbreviated pro tem; president pro tempore = 'acting president'"
      ko: "약자 pro tem; president pro tempore = '임시 의장'"
  - latin: mea culpa
    translation:
      en: my fault, my blame
      ko: 내 잘못이다
    gender: f
    notes:
      en: "from the Confiteor prayer; an acknowledgment of one's error"
      ko: "고백 기도에서 유래; 자신의 잘못을 인정하는 표현"
  - latin: tabula rasa
    translation:
      en: blank slate, clean slate
      ko: 백지 상태
    gender: f
    notes:
      en: "used by Locke and others; the mind as a blank slate at birth"
      ko: "로크 등이 사용; 출생 시 백지 상태인 마음"
  - latin: in medias res
    translation:
      en: into the middle of things
      ko: 이야기의 중간으로
    gender: f
    notes:
      en: "Horace, Ars Poetica 148; narrative technique of starting in the middle"
      ko: "호라티우스, 시학 148; 이야기 중간에서 시작하는 서사 기법"
  - latin: de profundis
    translation:
      en: from the depths
      ko: 깊은 곳에서
    gender: m
    notes:
      en: "Psalm 130:1; title of Oscar Wilde's prison letter"
      ko: "시편 130:1; 오스카 와일드의 옥중 서간 제목"
  - latin: vox populi
    translation:
      en: voice of the people
      ko: 민중의 목소리
    gender: f
    notes:
      en: "vox populī, vox Deī = 'the voice of the people is the voice of God'"
      ko: "vox populī, vox Deī = '민중의 목소리가 신의 목소리다'"
  - latin: sine qua non
    translation:
      en: without which not, an essential condition
      ko: 필수 불가결한 것
    gender: f
    notes:
      en: "from condiciō sine quā nōn; an indispensable requirement"
      ko: "condiciō sine quā nōn에서 유래; 불가결한 요건"
  - latin: in toto
    translation:
      en: in total, entirely
      ko: 전체적으로, 완전히
    gender: n
    notes:
      en: "used in English to mean 'completely, as a whole'"
      ko: "'완전히, 전체로서'의 의미로 영어에서 사용"
