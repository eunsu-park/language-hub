lesson: sup_C1_Ecclesiastical_Latin
lesson_number: 137
type: supplementary
topic: "Ecclesiastical Latin"
cefr: C1
categories:
- id: liturgical
  label:
    en: Liturgical Terms
    ko: 전례 용어
  type: vocabulary
  words:
  - latin: missa
    translation:
      en: Mass, liturgical service
      ko: 미사
    gender: f
    notes:
      en: "gen. missae; 1st decl.; from 'Ite, missa est' ('Go, it is sent/dismissed')"
      ko: "속격 missae; 제1변화; 'Ite, missa est' ('가라, 파송되었다/끝났다')에서 유래"
  - latin: liturgia
    translation:
      en: liturgy, public worship
      ko: 전례, 공적 예배
    gender: f
    notes:
      en: "gen. liturgiae; 1st decl.; Greek loanword; the formal public worship of the Church"
      ko: "속격 liturgiae; 제1변화; 그리스어 차용어; 교회의 공식 공적 예배"
  - latin: baptisma
    translation:
      en: baptism
      ko: 세례
    gender: n
    notes:
      en: "gen. baptismatis; 3rd decl.; Greek loanword; sacrament of initiation"
      ko: "속격 baptismatis; 제3변화; 그리스어 차용어; 입문 성사"
  - latin: eucharistia
    translation:
      en: Eucharist, Holy Communion, thanksgiving
      ko: 성찬, 성체, 감사
    gender: f
    notes:
      en: "gen. eucharistiae; 1st decl.; Greek loanword; 'thanksgiving'"
      ko: "속격 eucharistiae; 제1변화; 그리스어 차용어; '감사'"
  - latin: sacramentum
    translation:
      en: sacrament, sacred oath
      ko: 성사, 신성한 서약
    gender: n
    notes:
      en: "gen. sacrāmentī; 2nd decl.; originally a military oath; seven sacraments"
      ko: "속격 sacrāmentī; 제2변화; 원래 군사적 맹세; 일곱 성사"
  - latin: oratio
    translation:
      en: prayer, speech
      ko: 기도, 연설
    gender: f
    notes:
      en: "gen. ōrātiōnis; 3rd decl.; Ōrātiō Dominica = 'the Lord's Prayer'"
      ko: "속격 ōrātiōnis; 제3변화; Ōrātiō Dominica = '주님의 기도'"
  - latin: hymnus
    translation:
      en: hymn, song of praise
      ko: 찬송가, 찬미 노래
    gender: m
    notes:
      en: "gen. hymnī; 2nd decl.; Greek loanword"
      ko: "속격 hymnī; 제2변화; 그리스어 차용어"
  - latin: psalmus
    translation:
      en: psalm
      ko: 시편
    gender: m
    notes:
      en: "gen. psalmī; 2nd decl.; Greek loanword; the 150 Psalms of the Bible"
      ko: "속격 psalmī; 제2변화; 그리스어 차용어; 성경의 시편 150편"
  - latin: antiphona
    translation:
      en: antiphon, response chant
      ko: 교창, 응답 성가
    gender: f
    notes:
      en: "gen. antiphonae; 1st decl.; Greek loanword; alternating chant"
      ko: "속격 antiphonae; 제1변화; 그리스어 차용어; 교대 성가"
  - latin: benedictio
    translation:
      en: blessing, benediction
      ko: 축복, 강복
    gender: f
    notes:
      en: "gen. benedictiōnis; 3rd decl.; from bene + dīcere"
      ko: "속격 benedictiōnis; 제3변화; bene + dīcere에서 유래"
  - latin: confessio
    translation:
      en: confession, profession of faith
      ko: 고백, 신앙 고백
    gender: f
    notes:
      en: "gen. confessiōnis; 3rd decl.; sacrament of penance"
      ko: "속격 confessiōnis; 제3변화; 고해 성사"
  - latin: absolutio
    translation:
      en: absolution, forgiveness of sins
      ko: 사죄, 죄의 용서
    gender: f
    notes:
      en: "gen. absolūtiōnis; 3rd decl.; granted by a priest after confession"
      ko: "속격 absolūtiōnis; 제3변화; 고백 후 사제가 수여"
  - latin: communio
    translation:
      en: communion, sharing
      ko: 영성체, 친교
    gender: f
    notes:
      en: "gen. commūniōnis; 3rd decl.; receiving the Eucharist"
      ko: "속격 commūniōnis; 제3변화; 성체를 받아 모심"

- id: theological
  label:
    en: Theological Terms
    ko: 신학 용어
  type: vocabulary
  words:
  - latin: Deus
    translation:
      en: God
      ko: 하느님
    gender: m
    notes:
      en: "gen. Deī; 2nd decl.; the one God of Christianity"
      ko: "속격 Deī; 제2변화; 기독교의 유일신"
  - latin: Trinitas
    translation:
      en: Trinity
      ko: 삼위일체
    gender: f
    notes:
      en: "gen. Trīnitātis; 3rd decl.; Father, Son, and Holy Spirit"
      ko: "속격 Trīnitātis; 제3변화; 성부, 성자, 성령"
  - latin: peccatum
    translation:
      en: sin
      ko: 죄
    gender: n
    notes:
      en: "gen. peccātī; 2nd decl.; peccātum originale = 'original sin'"
      ko: "속격 peccātī; 제2변화; peccātum originale = '원죄'"
  - latin: gratia
    translation:
      en: grace, favor
      ko: 은총, 은혜
    gender: f
    notes:
      en: "gen. grātiae; 1st decl.; divine grace freely given"
      ko: "속격 grātiae; 제1변화; 자유로이 주어지는 신적 은총"
  - latin: redemptio
    translation:
      en: redemption, ransom
      ko: 구속, 대속
    gender: f
    notes:
      en: "gen. redemptiōnis; 3rd decl.; Christ's saving act"
      ko: "속격 redemptiōnis; 제3변화; 그리스도의 구원 행위"
  - latin: resurrectio
    translation:
      en: resurrection, rising again
      ko: 부활
    gender: f
    notes:
      en: "gen. resurrectiōnis; 3rd decl.; resurrectio mortuōrum = 'resurrection of the dead'"
      ko: "속격 resurrectiōnis; 제3변화; resurrectio mortuōrum = '죽은 자의 부활'"
  - latin: incarnatio
    translation:
      en: incarnation, becoming flesh
      ko: 성육신
    gender: f
    notes:
      en: "gen. incarnātiōnis; 3rd decl.; Verbum carō factum est (John 1:14)"
      ko: "속격 incarnātiōnis; 제3변화; Verbum carō factum est (요한복음 1:14)"
  - latin: salvatio
    translation:
      en: salvation
      ko: 구원
    gender: f
    notes:
      en: "gen. salvātiōnis; 3rd decl.; deliverance from sin and death"
      ko: "속격 salvātiōnis; 제3변화; 죄와 죽음으로부터의 구출"
  - latin: fides
    translation:
      en: faith, belief, trust
      ko: 신앙, 믿음, 신뢰
    gender: f
    notes:
      en: "gen. fideī; 5th decl.; the theological virtue of faith"
      ko: "속격 fideī; 제5변화; 신학적 덕목인 신앙"
  - latin: spes
    translation:
      en: hope
      ko: 희망
    gender: f
    notes:
      en: "gen. speī; 5th decl.; the theological virtue of hope"
      ko: "속격 speī; 제5변화; 신학적 덕목인 희망"
  - latin: caritas
    translation:
      en: charity, love, divine love
      ko: 사랑, 자선, 신적 사랑
    gender: f
    notes:
      en: "gen. cāritātis; 3rd decl.; the greatest of the three theological virtues"
      ko: "속격 cāritātis; 제3변화; 세 신학적 덕목 중 가장 큰 것"
  - latin: angelus
    translation:
      en: angel, messenger
      ko: 천사
    gender: m
    notes:
      en: "gen. angelī; 2nd decl.; Greek loanword; divine messenger"
      ko: "속격 angelī; 제2변화; 그리스어 차용어; 신의 전령"
  - latin: diabolus
    translation:
      en: devil, accuser
      ko: 악마, 고발자
    gender: m
    notes:
      en: "gen. diabolī; 2nd decl.; Greek loanword; the adversary"
      ko: "속격 diabolī; 제2변화; 그리스어 차용어; 적대자"
  - latin: evangelium
    translation:
      en: gospel, good news
      ko: 복음
    gender: n
    notes:
      en: "gen. ēvangeliī; 2nd decl.; Greek loanword; the four Gospels"
      ko: "속격 ēvangeliī; 제2변화; 그리스어 차용어; 네 복음서"
  - latin: prophetia
    translation:
      en: prophecy
      ko: 예언
    gender: f
    notes:
      en: "gen. prophētiae; 1st decl.; Greek loanword; divinely inspired utterance"
      ko: "속격 prophētiae; 제1변화; 그리스어 차용어; 신의 영감을 받은 발언"

- id: church_hierarchy
  label:
    en: Church Hierarchy and Organization
    ko: 교회 위계와 조직
  type: vocabulary
  words:
  - latin: ecclesia
    translation:
      en: church, assembly, congregation
      ko: 교회, 집회, 회중
    gender: f
    notes:
      en: "gen. ecclēsiae; 1st decl.; Greek loanword; from ekklēsia 'assembly'"
      ko: "속격 ecclēsiae; 제1변화; 그리스어 차용어; ekklēsia '집회'에서 유래"
  - latin: papa
    translation:
      en: pope, father
      ko: 교황, 아버지
    gender: m
    notes:
      en: "gen. papae; 1st decl.; from Greek pappas 'father'; Bishop of Rome"
      ko: "속격 papae; 제1변화; 그리스어 pappas '아버지'에서 유래; 로마의 주교"
  - latin: cardinalis
    translation:
      en: cardinal
      ko: 추기경
    gender: m
    notes:
      en: "gen. cardinālis; 3rd decl.; from cardō 'hinge'; senior church official"
      ko: "속격 cardinālis; 제3변화; cardō '경첩'에서 유래; 고위 성직자"
  - latin: archiepiscopus
    translation:
      en: archbishop
      ko: 대주교
    gender: m
    notes:
      en: "gen. archiepiscopī; 2nd decl.; head of an archdiocese"
      ko: "속격 archiepiscopī; 제2변화; 대교구의 수장"
  - latin: episcopus
    translation:
      en: bishop
      ko: 주교
    gender: m
    notes:
      en: "gen. episcopī; 2nd decl.; Greek loanword; overseer of a diocese"
      ko: "속격 episcopī; 제2변화; 그리스어 차용어; 교구의 감독"
  - latin: presbyter
    translation:
      en: priest, elder
      ko: 사제, 장로
    gender: m
    notes:
      en: "gen. presbyterī; 2nd decl.; Greek loanword; ordained minister"
      ko: "속격 presbyterī; 제2변화; 그리스어 차용어; 서품된 성직자"
  - latin: diaconus
    translation:
      en: deacon
      ko: 부제
    gender: m
    notes:
      en: "gen. diāconī; 2nd decl.; Greek loanword; assistant to the bishop"
      ko: "속격 diāconī; 제2변화; 그리스어 차용어; 주교의 보좌"
  - latin: monachus
    translation:
      en: monk
      ko: 수도사
    gender: m
    notes:
      en: "gen. monachī; 2nd decl.; Greek loanword; from monos 'alone'"
      ko: "속격 monachī; 제2변화; 그리스어 차용어; monos '홀로'에서 유래"
  - latin: abbās
    translation:
      en: abbot, head of a monastery
      ko: 수도원장
    gender: m
    notes:
      en: "gen. abbātis; 3rd decl.; from Aramaic abba 'father'"
      ko: "속격 abbātis; 제3변화; 아람어 abba '아버지'에서 유래"
  - latin: dioecesis
    translation:
      en: diocese, administrative district
      ko: 교구
    gender: f
    notes:
      en: "gen. dioecesis; 3rd decl.; Greek loanword; the bishop's jurisdiction"
      ko: "속격 dioecesis; 제3변화; 그리스어 차용어; 주교의 관할 구역"
  - latin: concilium
    translation:
      en: council, assembly
      ko: 공의회, 회의
    gender: n
    notes:
      en: "gen. conciliī; 2nd decl.; concilium oecumenicum = 'ecumenical council'"
      ko: "속격 conciliī; 제2변화; concilium oecumenicum = '세계 공의회'"
  - latin: catechismus
    translation:
      en: catechism, instruction in faith
      ko: 교리문답
    gender: m
    notes:
      en: "gen. catēchismī; 2nd decl.; Greek loanword; systematic instruction in the faith"
      ko: "속격 catēchismī; 제2변화; 그리스어 차용어; 신앙에 대한 체계적 교육"
