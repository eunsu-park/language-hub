lesson: 25_Medieval_and_Living_Latin
lesson_number: 25
cefr: C1
categories:
- id: 251_vulgar_latin_changes
  label:
    en: 25.1 Vulgar Latin Changes
    ko: 25.1 민중 라틴어 변화
  type: vocabulary
  words:
  - latin: caballus
    translation:
      en: horse (colloquial)
      ko: 말 (구어)
    gender: m
    notes:
      en: "Replaced Classical equus in Vulgar Latin; source of Spanish caballo, French cheval"
      ko: "민중 라틴어에서 고전어 equus를 대체; 스페인어 caballo, 프랑스어 cheval의 어원"
  - latin: focus
    translation:
      en: hearth, fireplace
      ko: 화덕, 벽난로
    gender: m
    notes:
      en: "Replaced ignis for 'fire' in Vulgar Latin; source of French feu, Italian fuoco"
      ko: "민중 라틴어에서 ignis 대신 '불'을 의미; 프랑스어 feu, 이탈리아어 fuoco의 어원"
  - latin: manducare
    translation:
      en: to chew, to eat
      ko: 씹다, 먹다
    gender: null
    notes:
      en: "Replaced edere in Vulgar Latin; source of French manger, Italian mangiare"
      ko: "민중 라틴어에서 edere를 대체; 프랑스어 manger, 이탈리아어 mangiare의 어원"
  - latin: parabolare
    translation:
      en: to speak
      ko: 말하다
    gender: null
    notes:
      en: "From parabola (parable); replaced loqui; source of French parler, Spanish hablar"
      ko: "parabola(비유)에서 유래; loqui를 대체; 프랑스어 parler, 스페인어 hablar의 어원"
  - latin: bucca
    translation:
      en: cheek, mouth
      ko: 볼, 입
    gender: f
    notes:
      en: "Replaced os (mouth) in Vulgar Latin; source of French bouche, Italian bocca"
      ko: "민중 라틴어에서 os(입)를 대체; 프랑스어 bouche, 이탈리아어 bocca의 어원"
  - latin: casa
    translation:
      en: hut, cottage, house
      ko: 오두막, 집
    gender: f
    notes:
      en: "Replaced domus in many Romance languages; source of Spanish casa, Italian casa"
      ko: "많은 로망스어에서 domus를 대체; 스페인어 casa, 이탈리아어 casa의 어원"
  - latin: platea
    translation:
      en: street, broad way
      ko: 거리, 넓은 길
    gender: f
    notes:
      en: "From Greek plateia; replaced via in Vulgar Latin; source of Spanish plaza"
      ko: "그리스어 plateia에서 유래; 민중 라틴어에서 via를 대체; 스페인어 plaza의 어원"
  - latin: grandis
    translation:
      en: large, great
      ko: 큰, 위대한
    gender: m
    notes:
      en: "Replaced magnus in Vulgar Latin; source of French grand, Italian grande"
      ko: "민중 라틴어에서 magnus를 대체; 프랑스어 grand, 이탈리아어 grande의 어원"
  - latin: cambiare
    translation:
      en: to exchange, to change
      ko: 교환하다, 바꾸다
    gender: null
    notes:
      en: "Celtic loanword in Vulgar Latin; source of French changer, Spanish cambiar"
      ko: "민중 라틴어의 켈트어 차용어; 프랑스어 changer, 스페인어 cambiar의 어원"
  - latin: carricare
    translation:
      en: to load, to carry
      ko: 싣다, 운반하다
    gender: null
    notes:
      en: "From carrus (cart); source of English 'carry' and 'charge'"
      ko: "carrus(수레)에서 유래; 영어 'carry'와 'charge'의 어원"
- id: 252_medieval_latin_terms
  label:
    en: 25.2 Medieval Latin Terms
    ko: 25.2 중세 라틴어 용어
  type: vocabulary
  words:
  - latin: universitas
    translation:
      en: university, corporation
      ko: 대학, 법인 단체
    gender: f
    notes:
      en: "Originally 'a whole body'; applied to guilds of scholars from 12th century"
      ko: "원래 '전체 집단'; 12세기부터 학자 길드에 적용"
  - latin: magister
    translation:
      en: master (academic title)
      ko: 석사, 교수
    gender: m
    notes:
      en: "Magister artium = Master of Arts; a medieval university degree"
      ko: "Magister artium = 문학 석사; 중세 대학 학위"
  - latin: baccalaureus
    translation:
      en: bachelor (academic)
      ko: 학사
    gender: m
    notes:
      en: "Source of English 'bachelor's degree'; origin debated"
      ko: "영어 'bachelor's degree'의 어원; 기원에 대해 논쟁 중"
  - latin: thesis
    translation:
      en: thesis, proposition
      ko: 논문, 명제
    gender: f
    notes:
      en: "Greek loanword; a proposition defended in academic disputation"
      ko: "그리스어 차용어; 학술 논쟁에서 방어하는 명제"
  - latin: alumnus
    translation:
      en: foster child, graduate
      ko: 양자, 졸업생
    gender: m
    notes:
      en: "From alere (to nourish); fem. alumna; pl. alumni/alumnae"
      ko: "alere(양육하다)에서 유래; 여성형 alumna; 복수 alumni/alumnae"
  - latin: curriculum
    translation:
      en: course, race-track
      ko: 교육과정, 경주로
    gender: n
    notes:
      en: "From currere (to run); curriculum vitae = course of life (CV/resume)"
      ko: "currere(달리다)에서 유래; curriculum vitae = 인생의 경주 (이력서)"
  - latin: trivium
    translation:
      en: the three liberal arts
      ko: 3학 (문법, 논리학, 수사학)
    gender: n
    notes:
      en: "Grammar, logic, rhetoric — the foundation of medieval education"
      ko: "문법, 논리학, 수사학 — 중세 교육의 기초"
  - latin: quadrivium
    translation:
      en: the four liberal arts
      ko: 4과 (산술, 기하, 음악, 천문학)
    gender: n
    notes:
      en: "Arithmetic, geometry, music, astronomy — the advanced medieval curriculum"
      ko: "산술, 기하학, 음악, 천문학 — 중세 고급 교육과정"
  - latin: disputatio
    translation:
      en: disputation, debate
      ko: 논쟁, 토론
    gender: f
    notes:
      en: "The formal method of medieval university teaching and examination"
      ko: "중세 대학 교육과 시험의 공식적 방법"
  - latin: scholasticus
    translation:
      en: scholastic, scholarly
      ko: 스콜라적, 학문적
    gender: m
    notes:
      en: "Source of English 'scholastic'; the dominant medieval intellectual tradition"
      ko: "영어 'scholastic'의 어원; 지배적인 중세 지적 전통"
- id: 253_ecclesiastical_vocabulary
  label:
    en: 25.3 Ecclesiastical Vocabulary
    ko: 25.3 교회 라틴어 어휘
  type: vocabulary
  words:
  - latin: ecclesia
    translation:
      en: church, assembly
      ko: 교회, 집회
    gender: f
    notes:
      en: "From Greek ekklesia; the Christian church as institution"
      ko: "그리스어 ekklesia에서 유래; 제도로서의 기독교 교회"
  - latin: papa
    translation:
      en: pope, father
      ko: 교황
    gender: m
    notes:
      en: "1st decl. masculine; the Bishop of Rome"
      ko: "제1변화 남성; 로마 주교"
  - latin: missa
    translation:
      en: mass (liturgy)
      ko: 미사
    gender: f
    notes:
      en: "From Ite, missa est (Go, it is the dismissal); the central Christian liturgy"
      ko: "Ite, missa est(가라, 파송이다)에서 유래; 기독교의 중심 전례"
  - latin: baptisma
    translation:
      en: baptism
      ko: 세례
    gender: n
    notes:
      en: "Greek loanword; the sacrament of initiation into Christianity"
      ko: "그리스어 차용어; 기독교 입문의 성사"
  - latin: angelus
    translation:
      en: angel, messenger
      ko: 천사
    gender: m
    notes:
      en: "From Greek angelos (messenger); a divine intermediary"
      ko: "그리스어 angelos(사자)에서 유래; 신적 중재자"
  - latin: evangelium
    translation:
      en: gospel, good news
      ko: 복음
    gender: n
    notes:
      en: "From Greek euangelion; the four Gospels of the New Testament"
      ko: "그리스어 euangelion에서 유래; 신약성서의 네 복음서"
  - latin: sacramentum
    translation:
      en: sacrament, sacred oath
      ko: 성사, 신성한 맹세
    gender: n
    notes:
      en: "Originally a military oath; adopted for Christian rites"
      ko: "원래 군사 선서; 기독교 의식에 채택"
  - latin: peccatum
    translation:
      en: sin
      ko: 죄
    gender: n
    notes:
      en: "From peccare (to err); central concept in Christian theology"
      ko: "peccare(잘못하다)에서 유래; 기독교 신학의 핵심 개념"
  - latin: gratia
    translation:
      en: grace, favor
      ko: 은총, 은혜
    gender: f
    notes:
      en: "Sola gratia = by grace alone; a key Reformation concept"
      ko: "Sola gratia = 오직 은총으로; 종교개혁의 핵심 개념"
  - latin: credo
    translation:
      en: I believe (creed)
      ko: 나는 믿는다 (신경)
    gender: null
    notes:
      en: "Opening word of the Nicene Creed; source of English 'creed' and 'credible'"
      ko: "니케아 신경의 첫 단어; 영어 'creed'와 'credible'의 어원"
  - latin: resurrectio
    translation:
      en: resurrection
      ko: 부활
    gender: f
    notes:
      en: "From resurgere (to rise again); central Christian doctrine"
      ko: "resurgere(다시 일어나다)에서 유래; 기독교의 핵심 교리"
- id: 254_modern_latin_usage
  label:
    en: 25.4 Modern Latin Usage
    ko: 25.4 현대 라틴어 사용
  type: vocabulary
  words:
  - latin: et cetera
    translation:
      en: and the rest, and so on
      ko: 기타 등등
    gender: null
    notes:
      en: "Abbreviated etc.; one of the most common Latin phrases in daily use"
      ko: "etc.로 축약; 일상에서 가장 흔히 사용되는 라틴어 표현 중 하나"
  - latin: ad hoc
    translation:
      en: for this (purpose), improvised
      ko: 임시의, 특별한 목적의
    gender: null
    notes:
      en: "Formed or arranged for a particular purpose only"
      ko: "특정 목적만을 위해 구성되거나 마련된"
  - latin: per capita
    translation:
      en: by heads, per person
      ko: 1인당
    gender: null
    notes:
      en: "Used in economics and statistics for per-person calculations"
      ko: "경제학과 통계에서 1인당 계산에 사용"
  - latin: status quo
    translation:
      en: the existing state of affairs
      ko: 현 상태, 현상
    gender: m
    notes:
      en: "From in statu quo (in the state in which); the current situation"
      ko: "in statu quo(현재 상태에서)에서 유래; 현재 상황"
  - latin: curriculum vitae
    translation:
      en: course of life, CV
      ko: 이력서
    gender: n
    notes:
      en: "Abbreviated CV; a summary of one's education and career"
      ko: "CV로 축약; 교육과 경력의 요약"
  - latin: alma mater
    translation:
      en: nourishing mother, university
      ko: 모교
    gender: f
    notes:
      en: "Originally an epithet of goddesses; now one's former school"
      ko: "원래 여신들의 별칭; 현재 자신의 출신 학교"
  - latin: vice versa
    translation:
      en: the other way around
      ko: 그 반대로
    gender: null
    notes:
      en: "Literally 'with the position turned'; indicating reversal"
      ko: "문자 그대로 '위치가 뒤바뀐 채로'; 역전을 나타냄"
  - latin: circa
    translation:
      en: around, approximately
      ko: 약, 대략
    gender: null
    notes:
      en: "Abbreviated c. or ca.; used with dates and quantities"
      ko: "c. 또는 ca.로 축약; 날짜와 수량에 사용"
  - latin: versus
    translation:
      en: against, compared with
      ko: 대(對), ~에 대하여
    gender: null
    notes:
      en: "Abbreviated vs.; from vertere (to turn); used in legal and sporting contexts"
      ko: "vs.로 축약; vertere(돌리다)에서 유래; 법률과 스포츠 맥락에서 사용"
  - latin: bonus
    translation:
      en: good (as a noun: bonus payment)
      ko: 좋은 (명사: 보너스)
    gender: m
    notes:
      en: "The Latin adjective adopted directly into English as a noun"
      ko: "라틴어 형용사가 영어에 명사로 직접 채택됨"
  - latin: agenda
    translation:
      en: things to be done
      ko: 의제, 안건
    gender: n
    notes:
      en: "Neuter plural gerundive of agere; treated as singular in English"
      ko: "agere의 중성 복수 동형용사; 영어에서 단수로 취급"
  - latin: verbatim
    translation:
      en: word for word
      ko: 축어적으로, 글자 그대로
    gender: null
    notes:
      en: "From verbum (word); an exact reproduction of spoken or written words"
      ko: "verbum(단어)에서 유래; 구어 또는 문어의 정확한 재현"
  - latin: ergo
    translation:
      en: therefore
      ko: 그러므로
    gender: null
    notes:
      en: "Cogito ergo sum = I think, therefore I am"
      ko: "Cogito ergo sum = 나는 생각한다, 고로 나는 존재한다"
  - latin: ibid.
    translation:
      en: in the same place (ibidem)
      ko: 같은 곳에 (위와 같은 출처)
    gender: null
    notes:
      en: "Abbreviation of ibidem; used in academic citations"
      ko: "ibidem의 축약; 학술 인용에서 사용"
  - latin: e.g.
    translation:
      en: for example (exempli gratia)
      ko: 예를 들어
    gender: null
    notes:
      en: "Abbreviation of exempli gratia; used in academic and general writing"
      ko: "exempli gratia의 축약; 학술 및 일반 글쓰기에서 사용"
  - latin: i.e.
    translation:
      en: that is (id est)
      ko: 즉, 다시 말해
    gender: null
    notes:
      en: "Abbreviation of id est; used to clarify or restate"
      ko: "id est의 축약; 명확히 하거나 다시 말할 때 사용"
  - latin: N.B.
    translation:
      en: note well (nota bene)
      ko: 주의, 참고
    gender: null
    notes:
      en: "Abbreviation of nota bene; draws attention to important information"
      ko: "nota bene의 축약; 중요한 정보에 주의를 환기"
  - latin: veto
    translation:
      en: I forbid
      ko: 거부하다, 거부권
    gender: null
    notes:
      en: "From Roman tribunes' power of intercessio; now used worldwide in politics"
      ko: "로마 호민관의 intercessio 권한에서 유래; 현재 전 세계 정치에서 사용"
  - latin: alibi
    translation:
      en: elsewhere
      ko: 알리바이, 부재 증명
    gender: null
    notes:
      en: "Used in law to prove one was somewhere else when a crime occurred"
      ko: "범죄 발생 시 다른 곳에 있었음을 증명하기 위해 법률에서 사용"
