lesson: 14_Subjunctive_Mood_Introduction
lesson_number: 14
cefr: B1
categories:
- id: 141_subjunctive_trigger_words
  label:
    en: 14.1 Subjunctive Trigger Words
    ko: 14.1 접속법 유발 단어
  type: vocabulary
  words:
  - latin: ut
    translation:
      en: so that, in order that (purpose/result)
      ko: ~하기 위해, ~하도록 (목적/결과)
    gender: null
    notes:
      en: Conjunction; introduces purpose and result clauses
      ko: 접속사; 목적절과 결과절 도입
  - latin: ne
    translation:
      en: lest, so that not (negative purpose)
      ko: ~하지 않도록 (부정 목적)
    gender: null
    notes:
      en: Conjunction; negative purpose clause
      ko: 접속사; 부정 목적절
  - latin: cum
    translation:
      en: when, since, although (+ subjunctive)
      ko: ~할 때, ~이므로, ~임에도 (+ 접속법)
    gender: null
    notes:
      en: Conjunction; temporal/causal/concessive with subjunctive
      ko: 접속사; 접속법과 시간/원인/양보
  - latin: utinam
    translation:
      en: would that, if only (wish)
      ko: ~하면 좋겠다, 제발 (소원)
    gender: null
    notes:
      en: Particle; introduces optative subjunctive
      ko: 불변화사; 희망의 접속법 도입
  - latin: si
    translation:
      en: if
      ko: 만약 ~라면
    gender: null
    notes:
      en: Conjunction; conditional clause (indicative or subjunctive)
      ko: 접속사; 조건절 (직설법 또는 접속법)
  - latin: nisi
    translation:
      en: unless, if not
      ko: ~하지 않으면, ~가 아니라면
    gender: null
    notes:
      en: Conjunction; negative conditional
      ko: 접속사; 부정 조건
  - latin: quamvis
    translation:
      en: although, however much
      ko: 비록 ~일지라도
    gender: null
    notes:
      en: Conjunction; concessive + subjunctive
      ko: 접속사; 양보 + 접속법
  - latin: licet
    translation:
      en: although (+ subjunctive); it is permitted
      ko: 비록 ~일지라도 (+ 접속법); 허락되다
    gender: null
    notes:
      en: Conjunction or impersonal verb
      ko: 접속사 또는 비인칭 동사
  - latin: dum
    translation:
      en: while, until, provided that
      ko: ~하는 동안, ~할 때까지, ~하기만 하면
    gender: null
    notes:
      en: Conjunction; with subjunctive for purpose/proviso
      ko: 접속사; 목적/조건의 접속법과 함께
  - latin: priusquam
    translation:
      en: before (+ subjunctive for anticipated action)
      ko: ~하기 전에 (+ 접속법, 예상 행위)
    gender: null
    notes:
      en: Conjunction; temporal + subjunctive for intention
      ko: 접속사; 시간 + 의도의 접속법
  - latin: antequam
    translation:
      en: before (+ subjunctive for anticipated action)
      ko: ~하기 전에 (+ 접속법, 예상 행위)
    gender: null
    notes:
      en: Conjunction; synonym of priusquam
      ko: 접속사; priusquam의 동의어
  - latin: quin
    translation:
      en: that not, but that (after negative expressions)
      ko: ~하지 않는 (부정 표현 뒤)
    gender: null
    notes:
      en: Conjunction; + subjunctive after verbs of doubt/prevention
      ko: 접속사; 의심/방해 동사 뒤 + 접속법
  - latin: quominus
    translation:
      en: from (doing), that not (after verbs of hindering)
      ko: ~하는 것을 (방해 동사 뒤)
    gender: null
    notes:
      en: Conjunction; + subjunctive after verbs of preventing
      ko: 접속사; 방지 동사 뒤 + 접속법
  - latin: ne...quidem
    translation:
      en: not even
      ko: ~조차 아닌
    gender: null
    notes:
      en: Emphatic negation; emphasized word between ne and quidem
      ko: 강조 부정; 강조어가 ne와 quidem 사이에 위치
- id: 142_purpose_clauses
  label:
    en: 14.2 Purpose Clauses
    ko: 14.2 목적절
  type: vocabulary
  words:
  - latin: venio ut videam
    translation:
      en: I come in order to see
      ko: 나는 보기 위해 온다
    gender: null
    notes:
      en: ut + present subjunctive = purpose
      ko: ut + 현재 접속법 = 목적
  - latin: venit ut videret
    translation:
      en: he came in order to see
      ko: 그는 보기 위해 왔다
    gender: null
    notes:
      en: ut + imperfect subjunctive (secondary sequence)
      ko: ut + 미완료 접속법 (부차 시제열)
  - latin: milites misit ne hostes fugerent
    translation:
      en: he sent soldiers lest the enemies flee
      ko: 적이 도망치지 못하도록 병사를 보냈다
    gender: null
    notes:
      en: ne + imperfect subjunctive = negative purpose
      ko: ne + 미완료 접속법 = 부정 목적
  - latin: quo facilius
    translation:
      en: in order that more easily (comparative purpose)
      ko: 더 쉽게 ~하도록 (비교급 목적)
    gender: null
    notes:
      en: quo replaces ut before comparatives in purpose clauses
      ko: 목적절에서 비교급 앞 ut 대신 quo 사용
  - latin: causa
    translation:
      en: for the sake of (+ preceding genitive)
      ko: ~를 위해 (+ 선행 속격)
    gender: null
    notes:
      en: Postpositive preposition with genitive gerund/gerundive
      ko: 속격 동명사/동형용사와 후치 전치사
  - latin: gratia
    translation:
      en: for the sake of (+ preceding genitive)
      ko: ~를 위해 (+ 선행 속격)
    gender: null
    notes:
      en: Synonym of causa; postpositive
      ko: causa의 동의어; 후치사
  - latin: eo consilio ut
    translation:
      en: with this plan that, with the intention that
      ko: ~하기 위한 계획으로
    gender: null
    notes:
      en: Ablative of purpose + ut-clause
      ko: 목적의 탈격 + ut-절
- id: 143_result_clauses
  label:
    en: 14.3 Result Clauses
    ko: 14.3 결과절
  type: vocabulary
  words:
  - latin: tam
    translation:
      en: so, to such a degree
      ko: 그렇게, 그 정도로
    gender: null
    notes:
      en: Adverb; signals result clause with ut
      ko: 부사; ut과 함께 결과절 신호
  - latin: ita
    translation:
      en: so, in such a way, thus
      ko: 그렇게, 그런 식으로
    gender: null
    notes:
      en: Adverb; triggers result clause
      ko: 부사; 결과절 유발
  - latin: sic
    translation:
      en: so, thus, in this way
      ko: 이렇게, 그렇게
    gender: null
    notes:
      en: Adverb; can signal result clause
      ko: 부사; 결과절 신호 가능
  - latin: adeo
    translation:
      en: to such an extent, so much
      ko: 그 정도까지, 매우
    gender: null
    notes:
      en: Adverb; strong degree marker + ut
      ko: 부사; 강한 정도 표지 + ut
  - latin: tantus, -a, -um
    translation:
      en: so great, so large
      ko: 그렇게 큰, 그렇게 많은
    gender: null
    notes:
      en: Adjective; signals result with ut
      ko: 형용사; ut과 함께 결과 신호
  - latin: talis, -e
    translation:
      en: such, of such a kind
      ko: 그런, 그러한 종류의
    gender: null
    notes:
      en: 3rd declension adjective; + ut = result
      ko: 제3변화 형용사; + ut = 결과
  - latin: tot
    translation:
      en: so many (indeclinable)
      ko: 그렇게 많은 (불변화)
    gender: null
    notes:
      en: Indeclinable adjective; + ut = result
      ko: 불변화 형용사; + ut = 결과
  - latin: tantum
    translation:
      en: so much, only
      ko: 그만큼, ~만
    gender: null
    notes:
      en: Adverb (neuter of tantus); degree marker
      ko: 부사 (tantus의 중성); 정도 표지
  - latin: tam...ut
    translation:
      en: so...that (result)
      ko: 너무...해서 ~하다 (결과)
    gender: null
    notes:
      en: Correlative pair for result clauses
      ko: 결과절의 상관 구문
  - latin: ita...ut
    translation:
      en: in such a way...that (result)
      ko: 그렇게...해서 ~하다 (결과)
    gender: null
    notes:
      en: Correlative pair for result clauses
      ko: 결과절의 상관 구문
  - latin: tantus...ut
    translation:
      en: so great...that (result)
      ko: 너무 큰...해서 ~하다 (결과)
    gender: null
    notes:
      en: Adjective + ut for result clause
      ko: 형용사 + ut, 결과절
  - latin: tam fortis erat ut hostes vincerent
    translation:
      en: he was so brave that they defeated the enemies
      ko: 그는 너무 용감해서 적을 이겼다
    gender: null
    notes:
      en: Example of result clause with tam...ut
      ko: tam...ut 결과절의 예문
  - latin: ut non
    translation:
      en: that not (negative result — NOT ne)
      ko: ~하지 않도록 (부정 결과 — ne가 아님)
    gender: null
    notes:
      en: Result clauses use ut non (not ne) for negation
      ko: 결과절은 부정에 ne가 아닌 ut non 사용
- id: 144_independent_subjunctive
  label:
    en: 14.4 Independent Subjunctive
    ko: 14.4 독립 접속법
  type: vocabulary
  words:
  - latin: eamus
    translation:
      en: let us go (hortatory)
      ko: 가자 (권유)
    gender: null
    notes:
      en: 1st person plural present subjunctive; hortatory
      ko: 1인칭 복수 현재 접속법; 권유
  - latin: vivat rex
    translation:
      en: long live the king (optative)
      ko: 왕 만세 (기원)
    gender: null
    notes:
      en: 3rd person singular present subjunctive; wish
      ko: 3인칭 단수 현재 접속법; 소원
  - latin: ne hoc facias
    translation:
      en: do not do this (prohibition)
      ko: 이것을 하지 마라 (금지)
    gender: null
    notes:
      en: ne + 2nd person present subjunctive = prohibition
      ko: ne + 2인칭 현재 접속법 = 금지
  - latin: utinam veniat
    translation:
      en: would that he come, I wish he would come
      ko: 그가 왔으면 좋겠다
    gender: null
    notes:
      en: Present subjunctive = attainable wish
      ko: 현재 접속법 = 실현 가능한 소원
  - latin: utinam veniret
    translation:
      en: would that he were coming (contrary to fact, present)
      ko: 그가 오고 있다면 좋을 텐데 (현재 반사실)
    gender: null
    notes:
      en: Imperfect subjunctive = unattainable present wish
      ko: 미완료 접속법 = 실현 불가능한 현재 소원
  - latin: utinam venisset
    translation:
      en: would that he had come (contrary to fact, past)
      ko: 그가 왔더라면 좋았을 텐데 (과거 반사실)
    gender: null
    notes:
      en: Pluperfect subjunctive = unattainable past wish
      ko: 과거완료 접속법 = 실현 불가능한 과거 소원
  - latin: utinam ne
    translation:
      en: would that not, I wish that not
      ko: ~하지 않았으면 좋겠다
    gender: null
    notes:
      en: Negative optative; utinam ne + subjunctive
      ko: 부정 기원; utinam ne + 접속법
  - latin: quid faciam?
    translation:
      en: what am I to do? (deliberative)
      ko: 내가 무엇을 해야 하는가? (숙고)
    gender: null
    notes:
      en: 1st person present subjunctive = deliberative question
      ko: 1인칭 현재 접속법 = 숙고 의문문
  - latin: quid facerem?
    translation:
      en: what was I to do? (past deliberative)
      ko: 내가 무엇을 해야 했는가? (과거 숙고)
    gender: null
    notes:
      en: Imperfect subjunctive = past deliberative
      ko: 미완료 접속법 = 과거 숙고
  - latin: fiat lux
    translation:
      en: let there be light (jussive)
      ko: 빛이 있으라 (명령)
    gender: null
    notes:
      en: 3rd person present subjunctive; jussive
      ko: 3인칭 현재 접속법; 명령
  - latin: velim
    translation:
      en: I would like (potential)
      ko: 저는 원합니다 (잠재)
    gender: null
    notes:
      en: Present subjunctive of volo; polite request
      ko: volo의 현재 접속법; 공손한 요청
  - latin: vellem
    translation:
      en: I would wish (contrary to fact)
      ko: 원했을 텐데 (반사실)
    gender: null
    notes:
      en: Imperfect subjunctive of volo; unreal
      ko: volo의 미완료 접속법; 비현실
  - latin: nolim
    translation:
      en: I would not like (potential)
      ko: 원하지 않습니다 (잠재)
    gender: null
    notes:
      en: Present subjunctive of nolo
      ko: nolo의 현재 접속법
  - latin: forsitan
    translation:
      en: perhaps (+ subjunctive)
      ko: 아마도 (+ 접속법)
    gender: null
    notes:
      en: Adverb; takes potential subjunctive
      ko: 부사; 잠재 접속법 지배
  - latin: fortasse
    translation:
      en: perhaps (+ indicative)
      ko: 아마도 (+ 직설법)
    gender: null
    notes:
      en: Adverb; contrast with forsitan (subjunctive)
      ko: 부사; forsitan (접속법)과 대조
  - latin: cave ne cadas
    translation:
      en: beware lest you fall
      ko: 넘어지지 않도록 조심해라
    gender: null
    notes:
      en: cave + ne + subjunctive = warning
      ko: cave + ne + 접속법 = 경고
  - latin: rogo ut venias
    translation:
      en: I ask that you come
      ko: 나는 네가 오기를 요청한다
    gender: null
    notes:
      en: Indirect command; rogo + ut + subjunctive
      ko: 간접 명령; rogo + ut + 접속법
  - latin: timeo ne veniat
    translation:
      en: I fear that he may come
      ko: 나는 그가 올까 봐 두렵다
    gender: null
    notes:
      en: Fear clause; timeo + ne = fear that (positive)
      ko: 두려움절; timeo + ne = ~할까 봐 (긍정)
  - latin: timeo ut veniat
    translation:
      en: I fear that he may not come
      ko: 나는 그가 오지 않을까 봐 두렵다
    gender: null
    notes:
      en: Fear clause; timeo + ut = fear that not (negative)
      ko: 두려움절; timeo + ut = ~하지 않을까 봐 (부정)
  - latin: impedio quominus eat
    translation:
      en: I prevent him from going
      ko: 나는 그가 가는 것을 막는다
    gender: null
    notes:
      en: Verb of hindering + quominus + subjunctive
      ko: 방해 동사 + quominus + 접속법
  - latin: dubito quin verum sit
    translation:
      en: I doubt that it is true
      ko: 나는 그것이 사실인지 의심한다
    gender: null
    notes:
      en: Negative doubt; non dubito + quin + subjunctive
      ko: 부정 의심; non dubito + quin + 접속법
  - latin: si habeam, dem
    translation:
      en: if I should have, I would give (future less vivid)
      ko: 내가 가진다면, 줄 텐데 (미래 가능)
    gender: null
    notes:
      en: Present subjunctive in both clauses = future less vivid
      ko: 양쪽 절에 현재 접속법 = 미래 가능 조건
  - latin: si haberem, darem
    translation:
      en: if I had, I would give (present contrary to fact)
      ko: 내가 가지고 있다면, 줄 텐데 (현재 반사실)
    gender: null
    notes:
      en: Imperfect subjunctive in both clauses
      ko: 양쪽 절에 미완료 접속법
  - latin: si habuissem, dedissem
    translation:
      en: if I had had, I would have given (past contrary to fact)
      ko: 내가 가졌더라면, 주었을 텐데 (과거 반사실)
    gender: null
    notes:
      en: Pluperfect subjunctive in both clauses
      ko: 양쪽 절에 과거완료 접속법
  - latin: cum venisset, dixit
    translation:
      en: when he had come, he spoke (cum circumstantial)
      ko: 그가 왔을 때, 말했다 (상황의 cum)
    gender: null
    notes:
      en: cum + pluperfect subjunctive = temporal
      ko: cum + 과거완료 접속법 = 시간
  - latin: cum dives esset, miser erat
    translation:
      en: although he was rich, he was miserable (cum concessive)
      ko: 비록 부유했지만, 불행했다 (양보의 cum)
    gender: null
    notes:
      en: cum + imperfect subjunctive = concessive
      ko: cum + 미완료 접속법 = 양보
  - latin: quamquam
    translation:
      en: although (+ indicative)
      ko: 비록 ~일지라도 (+ 직설법)
    gender: null
    notes:
      en: Conjunction; + indicative (contrast quamvis + subjunctive)
      ko: 접속사; + 직설법 (quamvis + 접속법과 대조)
  - latin: etsi
    translation:
      en: even if, although
      ko: 비록 ~일지라도, 설령
    gender: null
    notes:
      en: Conjunction; + indicative or subjunctive
      ko: 접속사; + 직설법 또는 접속법
  - latin: quasi
    translation:
      en: as if, as though
      ko: 마치 ~인 것처럼
    gender: null
    notes:
      en: Conjunction; + subjunctive for unreal comparison
      ko: 접속사; 비현실 비교에 + 접속법
  - latin: tamquam
    translation:
      en: as if, just as
      ko: 마치 ~처럼
    gender: null
    notes:
      en: Conjunction; + subjunctive for hypothetical comparison
      ko: 접속사; 가정적 비교에 + 접속법
  - latin: velut si
    translation:
      en: just as if
      ko: 마치 ~인 것처럼
    gender: null
    notes:
      en: Conjunction; introduces comparison with subjunctive
      ko: 접속사; 접속법과 함께 비교 도입
  - latin: ne quis
    translation:
      en: lest anyone, that no one
      ko: 아무도 ~하지 않도록
    gender: null
    notes:
      en: ne + indefinite pronoun in purpose clauses
      ko: 목적절에서 ne + 부정대명사
  - latin: ne quid
    translation:
      en: lest anything, that nothing
      ko: 아무것도 ~하지 않도록
    gender: null
    notes:
      en: ne + neuter indefinite in purpose clauses
      ko: 목적절에서 ne + 중성 부정대명사
  - latin: ne umquam
    translation:
      en: lest ever, that never
      ko: 결코 ~하지 않도록
    gender: null
    notes:
      en: Negative purpose with temporal adverb
      ko: 시간 부사를 사용한 부정 목적
  - latin: ne usquam
    translation:
      en: lest anywhere, that nowhere
      ko: 어디에서도 ~하지 않도록
    gender: null
    notes:
      en: Negative purpose with place adverb
      ko: 장소 부사를 사용한 부정 목적
  - latin: ne ullus
    translation:
      en: lest any, that no (adjective)
      ko: 어떤 ~도 ~하지 않도록
    gender: null
    notes:
      en: ne + ullus in purpose clause replaces ne + nullus
      ko: 목적절에서 ne + ullus가 ne + nullus를 대체
