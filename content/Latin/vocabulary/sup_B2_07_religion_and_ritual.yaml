lesson: sup_B2_Religion_and_Ritual
lesson_number: 132
type: supplementary
topic: "Religion and Ritual"
cefr: B2
categories:
- id: augury
  label:
    en: Augury and Divination
    ko: 점술과 예언
  type: vocabulary
  words:
  - latin: augur
    translation:
      en: augur, official diviner
      ko: 조점관
    gender: m
    notes:
      en: "gen. auguris; 3rd decl.; interpreted the will of the gods from bird signs"
      ko: "속격 auguris; 제3변화; 새의 징조로 신의 뜻을 해석"
  - latin: auspicium
    translation:
      en: auspice, omen from birds
      ko: 조점, 새에 의한 점
    gender: n
    notes:
      en: "gen. auspiciī; 2nd decl.; from avis + specere 'to look at birds'"
      ko: "속격 auspiciī; 제2변화; avis + specere '새를 보다'에서 유래"
  - latin: haruspex
    translation:
      en: haruspex, entrail diviner
      ko: 내장 점쟁이
    gender: m
    notes:
      en: "gen. haruspicis; 3rd decl.; examined livers of sacrificed animals"
      ko: "속격 haruspicis; 제3변화; 제물로 바친 동물의 간을 살핌"
  - latin: omen
    translation:
      en: omen, sign, portent
      ko: 징조, 전조
    gender: n
    notes:
      en: "gen. ōminis; 3rd decl."
      ko: "속격 ōminis; 제3변화"
  - latin: prodigium
    translation:
      en: prodigy, portent, unnatural occurrence
      ko: 이변, 기이한 현상
    gender: n
    notes:
      en: "gen. prōdigiī; 2nd decl.; required expiation by the state"
      ko: "속격 prōdigiī; 제2변화; 국가적 속죄 의식이 필요함"
  - latin: oraculum
    translation:
      en: oracle, divine response
      ko: 신탁
    gender: n
    notes:
      en: "gen. ōrāculī; 2nd decl.; also the place where oracles were given"
      ko: "속격 ōrāculī; 제2변화; 신탁이 전해지는 장소도 의미"
  - latin: sortēs
    translation:
      en: lots, oracular lots
      ko: 제비, 신탁 제비
    gender: f
    notes:
      en: "gen. sortium; 3rd decl. pl.; used at Praeneste and other oracular sites"
      ko: "속격 sortium; 제3변화 복수; 프라이네스테 등 신탁소에서 사용"
  - latin: libri Sibyllini
    translation:
      en: Sibylline Books
      ko: 시빌라의 서
    gender: m
    notes:
      en: "prophetic texts consulted in times of crisis by the quindecimviri"
      ko: "위기 시 15인 위원회가 참조하는 예언서"
  - latin: fulmen
    translation:
      en: thunderbolt, lightning
      ko: 벼락, 번개
    gender: n
    notes:
      en: "gen. fulminis; 3rd decl.; Jupiter's weapon; interpreted as an omen"
      ko: "속격 fulminis; 제3변화; 유피테르의 무기; 징조로 해석됨"
  - latin: divinatio
    translation:
      en: divination, prophecy
      ko: 점술, 예언
    gender: f
    notes:
      en: "gen. dīvīnātiōnis; 3rd decl.; Cicero wrote De Dīvīnātiōne"
      ko: "속격 dīvīnātiōnis; 제3변화; 키케로가 '점술에 관하여'를 저술"

- id: priesthoods
  label:
    en: Priesthoods and Sacred Offices
    ko: 신관직과 성직
  type: vocabulary
  words:
  - latin: pontifex maximus
    translation:
      en: chief priest, supreme pontiff
      ko: 대신관
    gender: m
    notes:
      en: "head of the Roman state religion; later adopted by Christian popes"
      ko: "로마 국가 종교의 수장; 이후 기독교 교황이 이 칭호를 채택"
  - latin: pontifex
    translation:
      en: priest, pontiff
      ko: 신관
    gender: m
    notes:
      en: "gen. pontificis; 3rd decl.; member of the collegium pontificum"
      ko: "속격 pontificis; 제3변화; 신관단(collegium pontificum)의 구성원"
  - latin: flamen
    translation:
      en: flamen, priest of a specific deity
      ko: 플라멘, 특정 신의 신관
    gender: m
    notes:
      en: "gen. flāminis; 3rd decl.; flāmen Diālis (Jupiter), flāmen Martiālis (Mars)"
      ko: "속격 flāminis; 제3변화; flāmen Diālis (유피테르), flāmen Martiālis (마르스)"
  - latin: virgo Vestalis
    translation:
      en: Vestal Virgin
      ko: 베스타 처녀
    gender: f
    notes:
      en: "priestess who tended the sacred fire of Vesta; vowed to 30 years of chastity"
      ko: "베스타의 성화를 지키는 여사제; 30년간의 순결을 서약"
  - latin: sacerdos
    translation:
      en: priest, priestess
      ko: 사제, 여사제
    gender: m
    notes:
      en: "gen. sacerdōtis; 3rd decl.; generic term for priest"
      ko: "속격 sacerdōtis; 제3변화; 사제를 뜻하는 일반적 용어"
  - latin: rex sacrorum
    translation:
      en: king of sacred rites
      ko: 제의왕
    gender: m
    notes:
      en: "the priest who inherited the religious functions of the kings"
      ko: "왕들의 종교적 기능을 계승한 사제"
  - latin: collegium
    translation:
      en: college, priestly body
      ko: 단체, 사제단
    gender: n
    notes:
      en: "gen. collegiī; 2nd decl.; e.g. collegium pontificum, collegium augurūm"
      ko: "속격 collegiī; 제2변화; 예: 신관단, 조점관단"
  - latin: fetialis
    translation:
      en: fetial priest, priest of war and treaties
      ko: 페티알리스, 전쟁과 조약의 사제
    gender: m
    notes:
      en: "gen. fētiālis; 3rd decl.; performed rituals for declaring war and making peace"
      ko: "속격 fētiālis; 제3변화; 전쟁 선포와 평화 체결의 의식을 거행"

- id: sacred_terms
  label:
    en: Sacred Terms and Concepts
    ko: 신성한 용어와 개념
  type: vocabulary
  words:
  - latin: numen
    translation:
      en: divine power, divine will, deity
      ko: 신성한 힘, 신의 뜻
    gender: n
    notes:
      en: "gen. nūminis; 3rd decl.; the supernatural force of a god"
      ko: "속격 nūminis; 제3변화; 신의 초자연적 힘"
  - latin: pietas
    translation:
      en: piety, devotion, duty to gods and family
      ko: 경건, 헌신, 신과 가족에 대한 의무
    gender: f
    notes:
      en: "gen. pietātis; 3rd decl.; Aeneas's defining virtue"
      ko: "속격 pietātis; 제3변화; 아이네아스의 대표적 덕목"
  - latin: religio
    translation:
      en: religious scruple, awe, worship
      ko: 종교적 경외, 숭배
    gender: f
    notes:
      en: "gen. religiōnis; 3rd decl.; meticulous observance of ritual"
      ko: "속격 religiōnis; 제3변화; 의식의 세심한 준수"
  - latin: superstitio
    translation:
      en: superstition, excessive religious fear
      ko: 미신, 과도한 종교적 두려움
    gender: f
    notes:
      en: "gen. superstitiōnis; 3rd decl.; contrasted with proper religio"
      ko: "속격 superstitiōnis; 제3변화; 올바른 religio와 대조됨"
  - latin: sacrum
    translation:
      en: sacred rite, sacred object
      ko: 신성한 의식, 성물
    gender: n
    notes:
      en: "gen. sacrī; 2nd decl.; res sacra = 'sacred thing'"
      ko: "속격 sacrī; 제2변화; res sacra = '신성한 것'"
  - latin: templum
    translation:
      en: temple, sacred precinct
      ko: 신전, 신성한 구역
    gender: n
    notes:
      en: "gen. templī; 2nd decl.; originally the augur's delimited space in the sky"
      ko: "속격 templī; 제2변화; 원래 조점관이 하늘에 설정한 한정된 공간"
  - latin: fanum
    translation:
      en: shrine, sanctuary
      ko: 성소, 사당
    gender: n
    notes:
      en: "gen. fānī; 2nd decl.; prōfānus = 'outside the shrine'"
      ko: "속격 fānī; 제2변화; prōfānus = '성소 밖의'"
  - latin: fas
    translation:
      en: divine law, what is divinely permitted
      ko: 신법, 신이 허용하는 것
    gender: n
    notes:
      en: "indeclinable; fas est = 'it is divinely lawful'; opposite: nefas"
      ko: "불변화사; fas est = '신법상 허용되다'; 반대: nefas"
  - latin: nefas
    translation:
      en: sacrilege, what is divinely forbidden
      ko: 신성 모독, 신이 금하는 것
    gender: n
    notes:
      en: "indeclinable; that which violates divine law"
      ko: "불변화사; 신법을 위반하는 것"

- id: rites
  label:
    en: Rites and Ceremonies
    ko: 의식과 제례
  type: vocabulary
  words:
  - latin: sacrificium
    translation:
      en: sacrifice
      ko: 제사, 희생
    gender: n
    notes:
      en: "gen. sacrificiī; 2nd decl.; offering to the gods"
      ko: "속격 sacrificiī; 제2변화; 신들에 대한 봉헌"
  - latin: libatio
    translation:
      en: libation, drink offering
      ko: 헌주, 술을 부어 바침
    gender: f
    notes:
      en: "gen. lībātiōnis; 3rd decl.; pouring wine or milk to a deity"
      ko: "속격 lībātiōnis; 제3변화; 신에게 포도주나 우유를 부어 바침"
  - latin: lustrum
    translation:
      en: lustration, purification ceremony
      ko: 정화 의식
    gender: n
    notes:
      en: "gen. lūstrī; 2nd decl.; performed every five years after the census"
      ko: "속격 lūstrī; 제2변화; 인구 조사 후 5년마다 거행"
  - latin: devotio
    translation:
      en: devotion, self-sacrifice, consecration to the gods
      ko: 헌신, 자기 희생, 신에 대한 봉헌
    gender: f
    notes:
      en: "gen. dēvōtiōnis; 3rd decl.; a general vowing himself and the enemy to the gods below"
      ko: "속격 dēvōtiōnis; 제3변화; 장군이 자신과 적을 지하의 신들에게 바침"
  - latin: supplicatio
    translation:
      en: public thanksgiving, day of prayer
      ko: 공공 감사제, 기도일
    gender: f
    notes:
      en: "gen. supplicātiōnis; 3rd decl.; decreed by the Senate after victories"
      ko: "속격 supplicātiōnis; 제3변화; 승전 후 원로원에 의해 선포됨"
  - latin: feriae
    translation:
      en: holidays, festival days
      ko: 축일, 제일
    gender: f
    notes:
      en: "gen. fēriārum; 1st decl. pl.; days on which legal and political business was forbidden"
      ko: "속격 fēriārum; 제1변화 복수; 법적·정치적 업무가 금지된 날"
  - latin: votum
    translation:
      en: vow, votive offering
      ko: 서원, 봉헌물
    gender: n
    notes:
      en: "gen. vōtī; 2nd decl.; a promise to a god in exchange for a favor"
      ko: "속격 vōtī; 제2변화; 은혜의 대가로 신에게 하는 약속"
  - latin: pompa
    translation:
      en: procession, parade
      ko: 행렬
    gender: f
    notes:
      en: "gen. pompae; 1st decl.; pompa circēnsis = 'circus procession'"
      ko: "속격 pompae; 제1변화; pompa circēnsis = '전차 경기장 행렬'"
  - latin: lustratio
    translation:
      en: lustration, ritual purification
      ko: 정화 의식
    gender: f
    notes:
      en: "gen. lūstrātiōnis; 3rd decl.; purifying people, armies, or fields by circumambulation"
      ko: "속격 lūstrātiōnis; 제3변화; 사람, 군대, 또는 밭을 우회 행진으로 정화"
  - latin: triumphus
    translation:
      en: triumph, triumphal procession
      ko: 개선식
    gender: m
    notes:
      en: "gen. triumphī; 2nd decl.; the highest military honor"
      ko: "속격 triumphī; 제2변화; 최고의 군사적 영예"
  - latin: expiatio
    translation:
      en: expiation, atonement
      ko: 속죄
    gender: f
    notes:
      en: "gen. expiātiōnis; 3rd decl.; ritual purification after a sacrilege"
      ko: "속격 expiātiōnis; 제3변화; 신성 모독 후의 의례적 정화"
  - latin: consecratio
    translation:
      en: consecration, deification
      ko: 봉헌, 신격화
    gender: f
    notes:
      en: "gen. cōnsecrātiōnis; 3rd decl.; making something or someone sacred; deification of emperors"
      ko: "속격 cōnsecrātiōnis; 제3변화; 무언가를 신성하게 함; 황제의 신격화"
