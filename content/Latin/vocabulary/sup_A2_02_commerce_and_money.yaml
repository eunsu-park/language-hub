lesson: "sup_A2_Commerce_and_Money"
lesson_number: 108
cefr: A2
type: supplementary
topic: "Commerce and Money"
categories:
- id: money
  label:
    en: "Money and Currency"
    ko: "화폐"
  type: vocabulary
  words:
  - latin: denarius
    translation:
      en: "denarius (silver coin)"
      ko: "데나리우스 (은화)"
    gender: m
    notes:
      en: "gen. denarii; 2nd declension; worth 10 asses; source of 'denari, dinar'"
      ko: "속격 denarii; 제2변화; 10 아스의 가치; 영어 'dinar'의 어원"
  - latin: sestertius
    translation:
      en: "sestertius (bronze coin)"
      ko: "세스테르티우스 (청동화)"
    gender: m
    notes:
      en: "gen. sestertii; 2nd declension; = 2.5 asses; standard Roman unit of account"
      ko: "속격 sestertii; 제2변화; = 2.5 아스; 로마의 표준 회계 단위"
  - latin: as
    translation:
      en: "as (base copper coin)"
      ko: "아스 (기본 구리화)"
    gender: m
    notes:
      en: "gen. assis; 3rd declension; the smallest Roman coin"
      ko: "속격 assis; 제3변화; 가장 작은 로마 동전"
  - latin: aureus
    translation:
      en: "aureus (gold coin)"
      ko: "아우레우스 (금화)"
    gender: m
    notes:
      en: "gen. aurei; 2nd declension; = 25 denarii; highest value Roman coin"
      ko: "속격 aurei; 제2변화; = 25 데나리이; 최고 가치의 로마 동전"
  - latin: pecunia
    translation:
      en: "money"
      ko: "돈"
    gender: f
    notes:
      en: "gen. pecuniae; 1st declension; from pecus 'cattle'; source of 'pecuniary'"
      ko: "속격 pecuniae; 제1변화; pecus '가축'에서 유래; 영어 'pecuniary'의 어원"
  - latin: nummus
    translation:
      en: "coin"
      ko: "동전"
    gender: m
    notes:
      en: "gen. nummi; 2nd declension; source of 'numismatic'"
      ko: "속격 nummi; 제2변화; 영어 'numismatic'의 어원"
  - latin: moneta
    translation:
      en: "mint / money"
      ko: "조폐소 / 화폐"
    gender: f
    notes:
      en: "gen. monetae; 1st declension; from the temple of Juno Moneta; source of 'money, mint'"
      ko: "속격 monetae; 제1변화; 유노 모네타 신전에서 유래; 영어 'money, mint'의 어원"
  - latin: pretium
    translation:
      en: "price / value"
      ko: "가격 / 가치"
    gender: n
    notes:
      en: "gen. pretii; 2nd declension neuter; source of 'price, precious'"
      ko: "속격 pretii; 제2변화 중성; 영어 'price, precious'의 어원"
  - latin: lucrum
    translation:
      en: "profit / gain"
      ko: "이익 / 이득"
    gender: n
    notes:
      en: "gen. lucri; 2nd declension neuter; source of 'lucre, lucrative'"
      ko: "속격 lucri; 제2변화 중성; 영어 'lucre, lucrative'의 어원"
  - latin: debitum
    translation:
      en: "debt"
      ko: "빚"
    gender: n
    notes:
      en: "gen. debiti; 2nd declension neuter; source of 'debt, debit'"
      ko: "속격 debiti; 제2변화 중성; 영어 'debt, debit'의 어원"

- id: marketplace
  label:
    en: "Marketplace"
    ko: "시장"
  type: vocabulary
  words:
  - latin: forum
    translation:
      en: "forum / marketplace"
      ko: "포럼 / 시장"
    gender: n
    notes:
      en: "gen. fori; 2nd declension neuter; center of Roman public life; source of 'forum'"
      ko: "속격 fori; 제2변화 중성; 로마 공공생활의 중심; 영어 'forum'의 어원"
  - latin: taberna
    translation:
      en: "shop / stall"
      ko: "가게 / 노점"
    gender: f
    notes:
      en: "gen. tabernae; 1st declension; line of shops in the forum"
      ko: "속격 tabernae; 제1변화; 포럼의 가게들"
  - latin: mercator
    translation:
      en: "merchant / trader"
      ko: "상인"
    gender: m
    notes:
      en: "gen. mercatoris; 3rd declension; source of 'merchant, Mercury'"
      ko: "속격 mercatoris; 제3변화; 영어 'merchant, Mercury'의 어원"
  - latin: institor
    translation:
      en: "shopkeeper / peddler"
      ko: "소매상 / 행상인"
    gender: m
    notes:
      en: "gen. institoris; 3rd declension; from insistere 'to stand upon'"
      ko: "속격 institoris; 제3변화; insistere '위에 서다'에서 유래"
  - latin: nundinae
    translation:
      en: "market day (plural)"
      ko: "장날 (복수형)"
    gender: f
    notes:
      en: "gen. nundinarum; 1st declension; held every 8 days in the Roman calendar"
      ko: "속격 nundinarum; 제1변화; 로마력에서 8일마다 열림"
  - latin: merx
    translation:
      en: "merchandise / goods"
      ko: "상품"
    gender: f
    notes:
      en: "gen. mercis; 3rd declension; source of 'commerce, merchandise'"
      ko: "속격 mercis; 제3변화; 영어 'commerce, merchandise'의 어원"
  - latin: macellum
    translation:
      en: "food market"
      ko: "식품 시장"
    gender: n
    notes:
      en: "gen. macelli; 2nd declension neuter; specialized food market"
      ko: "속격 macelli; 제2변화 중성; 전문 식품 시장"
  - latin: libra
    translation:
      en: "pound (weight) / balance"
      ko: "파운드 (무게) / 저울"
    gender: f
    notes:
      en: "gen. librae; 1st declension; source of '£' symbol and 'Libra' zodiac sign"
      ko: "속격 librae; 제1변화; '£' 기호와 별자리 '천칭자리(Libra)'의 어원"
  - latin: statera
    translation:
      en: "scales / balance"
      ko: "저울"
    gender: f
    notes:
      en: "gen. staterae; 1st declension; from Greek statēr"
      ko: "속격 staterae; 제1변화; 그리스어 statēr에서 유래"

- id: trade
  label:
    en: "Trade and Commerce"
    ko: "무역과 상업"
  type: vocabulary
  words:
  - latin: emere
    translation:
      en: "to buy"
      ko: "사다"
    gender: n
    notes:
      en: "3rd conjugation verb; emo, emere, emi, emptum; source of 'exempt, redeem'"
      ko: "제3활용 동사; emo, emere, emi, emptum; 영어 'exempt, redeem'의 어원"
  - latin: vendere
    translation:
      en: "to sell"
      ko: "팔다"
    gender: n
    notes:
      en: "3rd conjugation verb; vendo, vendere, vendidi, venditum; source of 'vendor, vend'"
      ko: "제3활용 동사; vendo, vendere, vendidi, venditum; 영어 'vendor, vend'의 어원"
  - latin: negotium
    translation:
      en: "business / affair"
      ko: "사업 / 일"
    gender: n
    notes:
      en: "gen. negotii; 2nd declension neuter; nec + otium 'not leisure'; source of 'negotiate'"
      ko: "속격 negotii; 제2변화 중성; nec + otium '여가가 아닌'; 영어 'negotiate'의 어원"
  - latin: commercium
    translation:
      en: "trade / commerce"
      ko: "교역 / 상업"
    gender: n
    notes:
      en: "gen. commercii; 2nd declension neuter; source of 'commerce'"
      ko: "속격 commercii; 제2변화 중성; 영어 'commerce'의 어원"
  - latin: vectigal
    translation:
      en: "tax / toll"
      ko: "세금 / 통행료"
    gender: n
    notes:
      en: "gen. vectigalis; 3rd declension neuter; import/export duties"
      ko: "속격 vectigalis; 제3변화 중성; 수출입 관세"
  - latin: argentarius
    translation:
      en: "banker / money changer"
      ko: "은행가 / 환전상"
    gender: m
    notes:
      en: "gen. argentarii; 2nd declension; from argentum 'silver'"
      ko: "속격 argentarii; 제2변화; argentum '은'에서 유래"
  - latin: faenus
    translation:
      en: "interest / usury"
      ko: "이자 / 고리대금"
    gender: n
    notes:
      en: "gen. faenoris; 3rd declension neuter; faenus nauticum = maritime loan"
      ko: "속격 faenoris; 제3변화 중성; faenus nauticum = 해상 대출"
  - latin: contractus
    translation:
      en: "contract / agreement"
      ko: "계약"
    gender: m
    notes:
      en: "gen. contractus; 4th declension; source of 'contract'"
      ko: "속격 contractus; 제4변화; 영어 'contract'의 어원"
  - latin: pondus
    translation:
      en: "weight"
      ko: "무게"
    gender: n
    notes:
      en: "gen. ponderis; 3rd declension neuter; source of 'ponderous, pound'"
      ko: "속격 ponderis; 제3변화 중성; 영어 'ponderous, pound'의 어원"
  - latin: saccus
    translation:
      en: "sack / bag"
      ko: "자루 / 가방"
    gender: m
    notes:
      en: "gen. sacci; 2nd declension; source of 'sack'"
      ko: "속격 sacci; 제2변화; 영어 'sack'의 어원"
  - latin: horreum
    translation:
      en: "warehouse / granary"
      ko: "창고 / 곡물 저장소"
    gender: n
    notes:
      en: "gen. horrei; 2nd declension neuter; Rome had huge public horrea"
      ko: "속격 horrei; 제2변화 중성; 로마에는 거대한 공공 창고가 있었음"
  - latin: nauta
    translation:
      en: "sailor"
      ko: "선원"
    gender: m
    notes:
      en: "gen. nautae; 1st declension masculine; source of 'nautical'"
      ko: "속격 nautae; 제1변화 남성; 영어 'nautical'의 어원"
  - latin: pirata
    translation:
      en: "pirate"
      ko: "해적"
    gender: m
    notes:
      en: "gen. piratae; 1st declension masculine; Pompey cleared pirates in 67 BC"
      ko: "속격 piratae; 제1변화 남성; 폼페이우스가 기원전 67년 해적을 소탕"
  - latin: onus
    translation:
      en: "cargo / burden"
      ko: "화물 / 짐"
    gender: n
    notes:
      en: "gen. oneris; 3rd declension neuter; source of 'onerous'"
      ko: "속격 oneris; 제3변화 중성; 영어 'onerous'의 어원"
