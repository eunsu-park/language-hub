categories:
- id: stoicism
  label:
    en: Stoicism
    ko: 스토아 철학
  type: vocabulary
  words:
  - latin: sapientia
    translation:
      en: wisdom
      ko: 지혜
    gender: f
    notes:
      en: "Central Stoic virtue; gen. sapientiae; 1st decl."
      ko: "스토아 철학의 핵심 덕목; 속격 sapientiae; 제1변화"
  - latin: virtus
    translation:
      en: virtue, moral excellence
      ko: 덕, 도덕적 탁월함
    gender: f
    notes:
      en: "gen. virtūtis; 3rd decl.; the sole good in Stoicism"
      ko: "속격 virtūtis; 제3변화; 스토아 철학에서 유일한 선"
  - latin: ratio
    translation:
      en: reason, reckoning, method
      ko: 이성, 계산, 방법
    gender: f
    notes:
      en: "gen. ratiōnis; 3rd decl.; the governing principle of the universe"
      ko: "속격 ratiōnis; 제3변화; 우주의 지배 원리"
  - latin: natura
    translation:
      en: nature
      ko: 자연
    gender: f
    notes:
      en: "gen. natūrae; 1st decl.; secundum natūram vīvere = 'to live according to nature'"
      ko: "속격 natūrae; 제1변화; secundum natūram vīvere = '자연에 따라 살다'"
  - latin: logos
    translation:
      en: word, reason, rational principle
      ko: 말씀, 이성, 합리적 원리
    gender: m
    notes:
      en: "Greek loanword; the universal rational principle in Stoic physics"
      ko: "그리스어 차용어; 스토아 자연학의 우주적 이성 원리"
  - latin: apatheia
    translation:
      en: freedom from passion, equanimity
      ko: 무정념, 평정
    gender: f
    notes:
      en: "Greek loanword; Stoic ideal of freedom from destructive emotions"
      ko: "그리스어 차용어; 파괴적 감정으로부터의 자유라는 스토아적 이상"
  - latin: adfectus
    translation:
      en: emotion, passion, affection
      ko: 감정, 정념, 애정
    gender: m
    notes:
      en: "gen. adfectūs; 4th decl.; also affectus; Stoics sought to master these"
      ko: "속격 adfectūs; 제4변화; affectus로도 표기; 스토아 학파는 이를 다스리고자 함"
  - latin: fatum
    translation:
      en: fate, destiny
      ko: 운명, 숙명
    gender: n
    notes:
      en: "gen. fātī; 2nd decl.; the Stoic doctrine of determinism"
      ko: "속격 fātī; 제2변화; 스토아 철학의 결정론적 교리"
  - latin: providentia
    translation:
      en: providence, foresight
      ko: 섭리, 선견
    gender: f
    notes:
      en: "gen. providentiae; 1st decl.; divine rational governance of the cosmos"
      ko: "속격 providentiae; 제1변화; 우주에 대한 신적 이성의 통치"
  - latin: constantia
    translation:
      en: steadfastness, firmness
      ko: 견고함, 불변
    gender: f
    notes:
      en: "gen. constantiae; 1st decl.; key Stoic quality"
      ko: "속격 constantiae; 제1변화; 핵심 스토아적 자질"
  - latin: moderatio
    translation:
      en: moderation, self-control
      ko: 절제, 자기 통제
    gender: f
    notes:
      en: "gen. moderatiōnis; 3rd decl.; one of the cardinal virtues"
      ko: "속격 moderatiōnis; 제3변화; 기본 덕목 중 하나"
  - latin: officium
    translation:
      en: duty, obligation, proper function
      ko: 의무, 직분
    gender: n
    notes:
      en: "gen. officiī; 2nd decl.; title of Cicero's De Officiīs"
      ko: "속격 officiī; 제2변화; 키케로의 '의무론' 제목"
  - latin: hegemonikon
    translation:
      en: ruling faculty, commanding part of the soul
      ko: 지배적 이성, 영혼의 지도부
    gender: n
    notes:
      en: "Greek loanword; the rational center in Stoic psychology"
      ko: "그리스어 차용어; 스토아 심리학에서 이성적 중심부"
  - latin: assensio
    translation:
      en: assent, agreement
      ko: 동의, 승인
    gender: f
    notes:
      en: "gen. assensiōnis; 3rd decl.; the Stoic act of assenting to an impression"
      ko: "속격 assensiōnis; 제3변화; 인상에 대한 스토아적 동의 행위"

- id: epicureanism
  label:
    en: Epicureanism
    ko: 에피쿠로스 철학
  type: vocabulary
  words:
  - latin: voluptas
    translation:
      en: pleasure, delight
      ko: 쾌락, 기쁨
    gender: f
    notes:
      en: "gen. voluptātis; 3rd decl.; the Epicurean highest good"
      ko: "속격 voluptātis; 제3변화; 에피쿠로스 철학의 최고선"
  - latin: ataraxia
    translation:
      en: tranquility, freedom from anxiety
      ko: 평온, 불안으로부터의 자유
    gender: f
    notes:
      en: "Greek loanword; the Epicurean ideal mental state"
      ko: "그리스어 차용어; 에피쿠로스 철학의 이상적 정신 상태"
  - latin: atomus
    translation:
      en: atom, indivisible particle
      ko: 원자, 분할 불가능한 입자
    gender: f
    notes:
      en: "gen. atomī; Greek loanword; fundamental unit in Epicurean physics"
      ko: "속격 atomī; 그리스어 차용어; 에피쿠로스 자연학의 기본 단위"
  - latin: inane
    translation:
      en: void, empty space
      ko: 공허, 빈 공간
    gender: n
    notes:
      en: "gen. inānis; substantive adjective; the void through which atoms move"
      ko: "속격 inānis; 명사화된 형용사; 원자가 움직이는 빈 공간"
  - latin: clinamen
    translation:
      en: swerve, declination
      ko: 이탈, 편향
    gender: n
    notes:
      en: "gen. clīnāminis; 3rd decl.; Lucretius's term for the unpredictable atomic swerve"
      ko: "속격 clīnāminis; 제3변화; 원자의 예측 불가능한 편향에 대한 루크레티우스의 용어"
  - latin: dolor
    translation:
      en: pain, grief
      ko: 고통, 슬픔
    gender: m
    notes:
      en: "gen. dolōris; 3rd decl.; Epicureans sought absence of dolor (aponia)"
      ko: "속격 dolōris; 제3변화; 에피쿠로스 학파는 고통의 부재(아포니아)를 추구함"
  - latin: amicitia
    translation:
      en: friendship
      ko: 우정
    gender: f
    notes:
      en: "gen. amīcitiae; 1st decl.; highly valued by Epicureans"
      ko: "속격 amīcitiae; 제1변화; 에피쿠로스 학파에서 크게 중시됨"
  - latin: sensus
    translation:
      en: sense, perception, feeling
      ko: 감각, 지각, 느낌
    gender: m
    notes:
      en: "gen. sensūs; 4th decl.; the Epicurean criterion of truth"
      ko: "속격 sensūs; 제4변화; 에피쿠로스 철학의 진리 기준"
  - latin: simulacrum
    translation:
      en: image, likeness, thin film
      ko: 형상, 모사, 얇은 막
    gender: n
    notes:
      en: "gen. simulācrī; 2nd decl.; atomic films emitted from objects enabling perception"
      ko: "속격 simulācrī; 제2변화; 대상에서 방출되어 지각을 가능하게 하는 원자 막"
  - latin: lathe biosas
    translation:
      en: live unnoticed, live in obscurity
      ko: 숨어 살아라, 은둔하여 살아라
    gender: n
    notes:
      en: "Greek phrase; Epicurean motto advocating withdrawal from public life"
      ko: "그리스어 구절; 공적 생활로부터의 철수를 옹호하는 에피쿠로스적 좌우명"
  - latin: hortus
    translation:
      en: garden
      ko: 정원
    gender: m
    notes:
      en: "gen. hortī; 2nd decl.; Epicurus taught in his Garden (Hortus)"
      ko: "속격 hortī; 제2변화; 에피쿠로스는 자신의 정원(Hortus)에서 가르침"
  - latin: foedus
    translation:
      en: compact, covenant, agreement
      ko: 계약, 협약
    gender: n
    notes:
      en: "gen. foederis; 3rd decl.; Epicurean social contract theory of justice"
      ko: "속격 foederis; 제3변화; 에피쿠로스 학파의 사회 계약적 정의론"
  - latin: mortalitas
    translation:
      en: mortality, death
      ko: 죽음, 유한함
    gender: f
    notes:
      en: "gen. mortālitātis; 3rd decl.; Epicureans argued the soul is mortal"
      ko: "속격 mortālitātis; 제3변화; 에피쿠로스 학파는 영혼이 소멸한다고 주장함"

- id: skepticism
  label:
    en: Skepticism
    ko: 회의주의
  type: vocabulary
  words:
  - latin: dubitatio
    translation:
      en: doubt, hesitation
      ko: 의심, 주저
    gender: f
    notes:
      en: "gen. dubitātiōnis; 3rd decl.; the skeptical state of withholding judgment"
      ko: "속격 dubitātiōnis; 제3변화; 판단을 보류하는 회의적 상태"
  - latin: epochē
    translation:
      en: suspension of judgment
      ko: 판단 중지
    gender: f
    notes:
      en: "Greek loanword; the central Pyrrhonist concept"
      ko: "그리스어 차용어; 피론주의의 핵심 개념"
  - latin: probabilis
    translation:
      en: probable, plausible, approvable
      ko: 개연적인, 그럴듯한
    gender: m
    notes:
      en: "adj. 3rd decl.; Cicero's translation of the Academic skeptic term pithanon"
      ko: "형용사 제3변화; 아카데미 회의주의 용어 pithanon에 대한 키케로의 번역"
  - latin: opinio
    translation:
      en: opinion, belief, conjecture
      ko: 의견, 믿음, 추측
    gender: f
    notes:
      en: "gen. opīniōnis; 3rd decl.; distinguished from certain knowledge (scientia)"
      ko: "속격 opīniōnis; 제3변화; 확실한 지식(scientia)과 구분됨"
  - latin: argumentum
    translation:
      en: argument, proof, evidence
      ko: 논증, 증거
    gender: n
    notes:
      en: "gen. argūmentī; 2nd decl.; tool of philosophical debate"
      ko: "속격 argūmentī; 제2변화; 철학적 논쟁의 도구"
  - latin: comprehensio
    translation:
      en: comprehension, grasping, katalepsis
      ko: 이해, 파악, 카탈렙시스
    gender: f
    notes:
      en: "gen. comprehensiōnis; 3rd decl.; Cicero's term for the Stoic katalēpsis"
      ko: "속격 comprehensiōnis; 제3변화; 스토아 철학의 카탈렙시스에 대한 키케로의 용어"
  - latin: visum
    translation:
      en: impression, appearance, representation
      ko: 인상, 외관, 표상
    gender: n
    notes:
      en: "gen. vīsī; 2nd decl.; Cicero's term for the Stoic phantasia"
      ko: "속격 vīsī; 제2변화; 스토아 철학의 판타시아에 대한 키케로의 용어"
  - latin: isosthenia
    translation:
      en: equipollence, equal force of arguments
      ko: 논증의 동등한 힘, 등가성
    gender: f
    notes:
      en: "Greek loanword; opposing arguments have equal weight"
      ko: "그리스어 차용어; 대립하는 논증이 동등한 무게를 가짐"
  - latin: sustineo
    translation:
      en: to withhold, sustain, endure
      ko: 보류하다, 유지하다, 견디다
    gender: m
    notes:
      en: "verb, 2nd conj.; sustinēre adsensiōnem = 'to suspend assent'"
      ko: "동사, 제2활용; sustinēre adsensiōnem = '동의를 보류하다'"
  - latin: acatalēpsia
    translation:
      en: inability to apprehend with certainty
      ko: 확실한 파악의 불가능성
    gender: f
    notes:
      en: "Greek loanword; the Academic skeptic doctrine"
      ko: "그리스어 차용어; 아카데미 회의주의의 교리"

- id: key_concepts
  label:
    en: Key Philosophical Concepts
    ko: 핵심 철학 개념
  type: vocabulary
  words:
  - latin: philosophia
    translation:
      en: philosophy, love of wisdom
      ko: 철학, 지혜에 대한 사랑
    gender: f
    notes:
      en: "gen. philosophiae; 1st decl.; Greek loanword"
      ko: "속격 philosophiae; 제1변화; 그리스어 차용어"
  - latin: summum bonum
    translation:
      en: the highest good
      ko: 최고선
    gender: n
    notes:
      en: "central question of ancient ethics: 'what is the summum bonum?'"
      ko: "고대 윤리학의 핵심 질문: '최고선이란 무엇인가?'"
  - latin: animus
    translation:
      en: mind, soul, spirit
      ko: 마음, 영혼, 정신
    gender: m
    notes:
      en: "gen. animī; 2nd decl.; the rational soul in Roman philosophy"
      ko: "속격 animī; 제2변화; 로마 철학에서 이성적 영혼"
  - latin: anima
    translation:
      en: breath, life, soul
      ko: 숨, 생명, 영혼
    gender: f
    notes:
      en: "gen. animae; 1st decl.; the vital principle; cf. animus"
      ko: "속격 animae; 제1변화; 생명의 원리; animus 참조"
  - latin: ethica
    translation:
      en: ethics, moral philosophy
      ko: 윤리학, 도덕 철학
    gender: f
    notes:
      en: "gen. ethicae; 1st decl.; from Greek ēthikē"
      ko: "속격 ethicae; 제1변화; 그리스어 ēthikē에서 유래"
  - latin: logica
    translation:
      en: logic
      ko: 논리학
    gender: f
    notes:
      en: "gen. logicae; 1st decl.; one of three divisions of philosophy"
      ko: "속격 logicae; 제1변화; 철학의 세 분과 중 하나"
  - latin: physica
    translation:
      en: natural philosophy, physics
      ko: 자연 철학, 물리학
    gender: f
    notes:
      en: "gen. physicae; 1st decl.; the study of nature (phusis)"
      ko: "속격 physicae; 제1변화; 자연(phusis)에 대한 탐구"
  - latin: dialectica
    translation:
      en: dialectic, art of reasoning
      ko: 변증법, 논증의 기술
    gender: f
    notes:
      en: "gen. dialecticae; 1st decl.; formal argumentation and logic"
      ko: "속격 dialecticae; 제1변화; 형식적 논증과 논리"
  - latin: dogma
    translation:
      en: doctrine, tenet, philosophical position
      ko: 교리, 신조, 철학적 입장
    gender: n
    notes:
      en: "gen. dogmatis; 3rd decl.; Greek loanword"
      ko: "속격 dogmatis; 제3변화; 그리스어 차용어"
  - latin: veritas
    translation:
      en: truth
      ko: 진리
    gender: f
    notes:
      en: "gen. vēritātis; 3rd decl."
      ko: "속격 vēritātis; 제3변화"
  - latin: scientia
    translation:
      en: knowledge, understanding
      ko: 지식, 이해
    gender: f
    notes:
      en: "gen. scientiae; 1st decl.; certain knowledge as opposed to opinio"
      ko: "속격 scientiae; 제1변화; opinio에 대비되는 확실한 지식"
  - latin: beatitudo
    translation:
      en: happiness, blessedness
      ko: 행복, 축복
    gender: f
    notes:
      en: "gen. beātitūdinis; 3rd decl.; the goal of philosophical life"
      ko: "속격 beātitūdinis; 제3변화; 철학적 삶의 목표"
  - latin: contemplatīvus
    translation:
      en: contemplative
      ko: 관조적인
    gender: m
    notes:
      en: "adj. 1st/2nd decl.; vīta contemplatīva = 'the contemplative life'"
      ko: "형용사 제1/2변화; vīta contemplatīva = '관조적 삶'"
  - latin: praeceptum
    translation:
      en: precept, rule, teaching
      ko: 교훈, 규칙, 가르침
    gender: n
    notes:
      en: "gen. praeceptī; 2nd decl.; philosophical guidance for action"
      ko: "속격 praeceptī; 제2변화; 행위를 위한 철학적 지침"
  - latin: secta
    translation:
      en: school of thought, philosophical sect
      ko: 학파, 철학적 유파
    gender: f
    notes:
      en: "gen. sectae; 1st decl.; a philosophical school or movement"
      ko: "속격 sectae; 제1변화; 철학 학파 또는 운동"
