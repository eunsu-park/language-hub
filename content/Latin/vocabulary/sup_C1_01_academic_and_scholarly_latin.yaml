lesson: sup_C1_Academic_and_Scholarly_Latin
lesson_number: 136
type: supplementary
topic: "Academic and Scholarly Latin"
cefr: C1
categories:
- id: academic_terms
  label:
    en: Academic Terms and Degrees
    ko: 학술 용어와 학위
  type: vocabulary
  words:
  - latin: universitas
    translation:
      en: university, whole, totality
      ko: 대학, 전체, 총체
    gender: f
    notes:
      en: "gen. ūniversitātis; 3rd decl.; originally 'community of scholars' (universitas magistrorum et scholarium)"
      ko: "속격 ūniversitātis; 제3변화; 원래 '학자들의 공동체' (universitas magistrorum et scholarium)"
  - latin: alumnus
    translation:
      en: foster child, graduate, former student
      ko: 양자, 졸업생, 전 학생
    gender: m
    notes:
      en: "gen. alumnī; 2nd decl.; from alere 'to nourish'; fem. alumna"
      ko: "속격 alumnī; 제2변화; alere '양육하다'에서 유래; 여성형 alumna"
  - latin: alma mater
    translation:
      en: nourishing mother, one's university
      ko: 모교
    gender: f
    notes:
      en: "lit. 'bountiful mother'; refers to one's university"
      ko: "직역 '자애로운 어머니'; 자신의 대학을 가리킴"
  - latin: baccalaureus
    translation:
      en: bachelor (degree holder)
      ko: 학사
    gender: m
    notes:
      en: "gen. baccalaureī; 2nd decl.; possibly from bacca laurī 'laurel berry'"
      ko: "속격 baccalaureī; 제2변화; bacca laurī '월계수 열매'에서 유래 가능"
  - latin: magister
    translation:
      en: master, teacher
      ko: 석사, 선생
    gender: m
    notes:
      en: "gen. magistrī; 2nd decl.; Magister Artium (MA)"
      ko: "속격 magistrī; 제2변화; Magister Artium (문학 석사)"
  - latin: doctor
    translation:
      en: teacher, learned one, doctor
      ko: 박사, 학자
    gender: m
    notes:
      en: "gen. doctōris; 3rd decl.; from docēre 'to teach'"
      ko: "속격 doctōris; 제3변화; docēre '가르치다'에서 유래"
  - latin: professor
    translation:
      en: professor, one who professes
      ko: 교수
    gender: m
    notes:
      en: "gen. professōris; 3rd decl.; from profitērī 'to declare publicly'"
      ko: "속격 professōris; 제3변화; profitērī '공개적으로 선언하다'에서 유래"
  - latin: thesis
    translation:
      en: thesis, proposition
      ko: 논제, 학위 논문
    gender: f
    notes:
      en: "gen. thesis; 3rd decl.; Greek loanword; a proposition to be defended"
      ko: "속격 thesis; 제3변화; 그리스어 차용어; 방어해야 할 명제"
  - latin: dissertatio
    translation:
      en: dissertation, scholarly discussion
      ko: 학위 논문, 학술 토론
    gender: f
    notes:
      en: "gen. dissertātiōnis; 3rd decl.; from dissertāre 'to discuss at length'"
      ko: "속격 dissertātiōnis; 제3변화; dissertāre '길게 논하다'에서 유래"
  - latin: curriculum
    translation:
      en: course, running track, career
      ko: 교과 과정, 경주로, 경력
    gender: n
    notes:
      en: "gen. curriculī; 2nd decl.; from currere 'to run'"
      ko: "속격 curriculī; 제2변화; currere '달리다'에서 유래"
  - latin: curriculum vitae
    translation:
      en: course of life, CV, resume
      ko: 이력서
    gender: n
    notes:
      en: "abbreviated CV; a summary of one's academic and professional career"
      ko: "약자 CV; 학력과 직업 경력의 요약"
  - latin: summa cum laude
    translation:
      en: with highest praise
      ko: 최우등
    gender: f
    notes:
      en: "ablative phrase; the highest academic distinction"
      ko: "탈격 구문; 최고의 학업 구분"
  - latin: magna cum laude
    translation:
      en: with great praise
      ko: 우등
    gender: f
    notes:
      en: "ablative phrase; second highest academic distinction"
      ko: "탈격 구문; 두 번째로 높은 학업 구분"
  - latin: cum laude
    translation:
      en: with praise
      ko: 우량
    gender: f
    notes:
      en: "ablative phrase; honorable academic distinction"
      ko: "탈격 구문; 명예로운 학업 구분"
  - latin: emeritus
    translation:
      en: retired, having served one's term
      ko: 명예 퇴직의
    gender: m
    notes:
      en: "adj. 1st/2nd decl.; professor emeritus"
      ko: "형용사 제1/2변화; 명예 교수"
  - latin: colloquium
    translation:
      en: conversation, scholarly conference
      ko: 대화, 학술 회의
    gender: n
    notes:
      en: "gen. colloquiī; 2nd decl.; from colloquī 'to converse'"
      ko: "속격 colloquiī; 제2변화; colloquī '대화하다'에서 유래"
  - latin: symposium
    translation:
      en: symposium, drinking party, conference
      ko: 심포지엄, 연회, 학술 발표회
    gender: n
    notes:
      en: "gen. symposiī; 2nd decl.; Greek loanword; Plato's Symposium"
      ko: "속격 symposiī; 제2변화; 그리스어 차용어; 플라톤의 '향연'"
  - latin: seminarium
    translation:
      en: seed bed, seminar, nursery
      ko: 세미나, 모판
    gender: n
    notes:
      en: "gen. sēmināriī; 2nd decl.; from sēmen 'seed'"
      ko: "속격 sēmināriī; 제2변화; sēmen '씨앗'에서 유래"
  - latin: facultas
    translation:
      en: faculty, ability, opportunity
      ko: 학부, 능력, 기회
    gender: f
    notes:
      en: "gen. facultātis; 3rd decl.; an academic division of a university"
      ko: "속격 facultātis; 제3변화; 대학의 학문적 분과"
  - latin: campus
    translation:
      en: field, plain, campus
      ko: 들판, 평원, 캠퍼스
    gender: m
    notes:
      en: "gen. campī; 2nd decl.; adopted for university grounds"
      ko: "속격 campī; 제2변화; 대학 부지를 지칭하는 데 채택됨"

- id: mottos
  label:
    en: Academic Mottos and Sayings
    ko: 학술 좌우명과 명언
  type: vocabulary
  words:
  - latin: veritas
    translation:
      en: truth
      ko: 진리
    gender: f
    notes:
      en: "gen. vēritātis; 3rd decl.; motto of Harvard University"
      ko: "속격 vēritātis; 제3변화; 하버드 대학교의 모토"
  - latin: lux et veritas
    translation:
      en: light and truth
      ko: 빛과 진리
    gender: f
    notes:
      en: "motto of Yale University"
      ko: "예일 대학교의 모토"
  - latin: fiat lux
    translation:
      en: let there be light
      ko: 빛이 있으라
    gender: f
    notes:
      en: "from Genesis 1:3; motto of UC Berkeley and others"
      ko: "창세기 1:3에서 유래; UC 버클리 등의 모토"
  - latin: scientia est potentia
    translation:
      en: knowledge is power
      ko: 아는 것이 힘이다
    gender: f
    notes:
      en: "attributed to Francis Bacon; used in academic contexts"
      ko: "프랜시스 베이컨에게 귀속; 학술적 맥락에서 사용"
  - latin: sapere aude
    translation:
      en: dare to know, dare to be wise
      ko: 감히 알라, 알기를 감행하라
    gender: n
    notes:
      en: "Horace, Epistulae 1.2.40; adopted by Kant as motto of the Enlightenment"
      ko: "호라티우스, 서간집 1.2.40; 칸트가 계몽주의의 좌우명으로 채택"
  - latin: per aspera ad astra
    translation:
      en: through hardships to the stars
      ko: 역경을 뚫고 별까지
    gender: n
    notes:
      en: "popular motto; appears in many institutional mottos"
      ko: "인기 있는 좌우명; 많은 기관의 모토에 등장"
  - latin: non scholae sed vitae discimus
    translation:
      en: we learn not for school but for life
      ko: 학교를 위해서가 아니라 삶을 위해 배운다
    gender: n
    notes:
      en: "reversed from Seneca, Epistulae 106.12 (who wrote 'nōn vītae sed scholae')"
      ko: "세네카의 서간집 106.12를 뒤집은 것 (세네카는 'nōn vītae sed scholae'라 씀)"

- id: abbreviations
  label:
    en: Latin Abbreviations in Scholarly Use
    ko: 학술적으로 사용되는 라틴어 약어
  type: vocabulary
  words:
  - latin: exempli gratia
    translation:
      en: for the sake of example (e.g.)
      ko: 예를 들어
    gender: f
    notes:
      en: "abbreviated e.g.; introduces examples"
      ko: "약자 e.g.; 예시를 소개할 때 사용"
  - latin: id est
    translation:
      en: that is (i.e.)
      ko: 즉
    gender: n
    notes:
      en: "abbreviated i.e.; introduces a clarification"
      ko: "약자 i.e.; 설명을 소개할 때 사용"
  - latin: et cetera
    translation:
      en: and the rest, and so on (etc.)
      ko: 기타, 등등
    gender: n
    notes:
      en: "abbreviated etc.; indicates a continuation of a list"
      ko: "약자 etc.; 목록의 계속을 나타냄"
  - latin: et alii
    translation:
      en: and others (et al.)
      ko: 그 외 다른 사람들
    gender: m
    notes:
      en: "abbreviated et al.; used in citations with multiple authors"
      ko: "약자 et al.; 여러 저자가 있는 인용에서 사용"
  - latin: ibidem
    translation:
      en: in the same place (ibid.)
      ko: 같은 곳에서
    gender: n
    notes:
      en: "abbreviated ibid.; refers to the same source as the previous citation"
      ko: "약자 ibid.; 이전 인용과 같은 출처를 가리킴"
  - latin: opere citato
    translation:
      en: in the work cited (op. cit.)
      ko: 인용한 저작에서
    gender: n
    notes:
      en: "abbreviated op. cit.; refers to a previously cited work"
      ko: "약자 op. cit.; 이전에 인용한 저작을 가리킴"
  - latin: loco citato
    translation:
      en: in the place cited (loc. cit.)
      ko: 인용한 곳에서
    gender: n
    notes:
      en: "abbreviated loc. cit.; refers to the same passage previously cited"
      ko: "약자 loc. cit.; 이전에 인용한 같은 구절을 가리킴"
  - latin: sic
    translation:
      en: thus, so (indicating exact quotation)
      ko: 원문 그대로
    gender: n
    notes:
      en: "placed in brackets [sic] to indicate the original text reads exactly as quoted"
      ko: "괄호 안에 [sic]로 표기하여 원문이 인용 그대로임을 나타냄"
  - latin: videlicet
    translation:
      en: namely, that is to say (viz.)
      ko: 즉, 다시 말해
    gender: n
    notes:
      en: "abbreviated viz.; from vidēre licet 'it is permitted to see'"
      ko: "약자 viz.; vidēre licet '보는 것이 허용되다'에서 유래"
  - latin: circa
    translation:
      en: around, approximately (c. / ca.)
      ko: 약, 대략
    gender: n
    notes:
      en: "abbreviated c. or ca.; used before approximate dates"
      ko: "약자 c. 또는 ca.; 대략적인 날짜 앞에 사용"
  - latin: confer
    translation:
      en: compare (cf.)
      ko: 비교하라
    gender: n
    notes:
      en: "abbreviated cf.; imperative of conferre 'to compare'"
      ko: "약자 cf.; conferre '비교하다'의 명령형"
  - latin: nota bene
    translation:
      en: note well (N.B.)
      ko: 잘 기억하라
    gender: n
    notes:
      en: "abbreviated N.B.; draws attention to something important"
      ko: "약자 N.B.; 중요한 것에 주의를 환기"
  - latin: quod erat demonstrandum
    translation:
      en: which was to be demonstrated (Q.E.D.)
      ko: 증명해야 할 것이 증명되었다
    gender: n
    notes:
      en: "abbreviated Q.E.D.; placed at the end of mathematical proofs"
      ko: "약자 Q.E.D.; 수학적 증명의 끝에 배치"
  - latin: passim
    translation:
      en: here and there, throughout
      ko: 여기저기에, 곳곳에
    gender: n
    notes:
      en: "used in citations to indicate a reference occurs in many places in the source"
      ko: "인용에서 출처의 여러 곳에 참조가 나타남을 표시할 때 사용"
  - latin: floruit
    translation:
      en: flourished (fl.)
      ko: 활동기
    gender: n
    notes:
      en: "abbreviated fl.; used when exact birth/death dates are unknown"
      ko: "약자 fl.; 정확한 출생/사망 연도를 모를 때 사용"
