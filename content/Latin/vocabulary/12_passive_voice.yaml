categories:
- id: 121_passive_constructions
  label:
    en: 12.1 Passive Constructions
    ko: 12.1 수동태 구문
  type: vocabulary
  words:
  - latin: a, ab
    translation:
      en: by (with agent in passive)
      ko: ~에 의해 (수동태 행위자)
    gender: null
    notes:
      en: Preposition + ablative; ab before vowels/h
      ko: 전치사 + 탈격; 모음/h 앞에서 ab
  - latin: amor
    translation:
      en: I am loved
      ko: 나는 사랑받는다
    gender: null
    notes:
      en: 1st person singular present passive of amo
      ko: amo의 1인칭 단수 현재 수동
  - latin: amaris
    translation:
      en: you are loved
      ko: 너는 사랑받는다
