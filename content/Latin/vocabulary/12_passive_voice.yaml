    notes:
      en: 1st person plural present passive of amo
      ko: amo의 1인칭 복수 현재 수동
  - latin: amamini
    translation:
      en: you (pl.) are loved
      ko: 너희는 사랑받는다
    gender: null
    notes:
      en: 2nd person plural present passive of amo
      ko: amo의 2인칭 복수 현재 수동
  - latin: amantur
    translation:
      en: they are loved
      ko: 그들은 사랑받는다
    gender: null
    notes:
      en: 3rd person plural present passive of amo
      ko: amo의 3인칭 복수 현재 수동
  - latin: moneor
    translation:
      en: I am advised
      ko: 나는 충고받는다
