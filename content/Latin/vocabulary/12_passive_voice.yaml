      en: 1st person singular present passive of moneo (2nd conj.)
      ko: moneo의 1인칭 단수 현재 수동 (제2변화)
  - latin: regor
    translation:
      en: I am ruled
      ko: 나는 통치받는다
    gender: null
    notes:
      en: 1st person singular present passive of rego (3rd conj.)
      ko: rego의 1인칭 단수 현재 수동 (제3변화)
  - latin: capior
    translation:
      en: I am taken, I am seized
      ko: 나는 잡힌다
    gender: null
    notes:
      en: 1st person singular present passive of capio (3rd i-stem)
      ko: capio의 1인칭 단수 현재 수동 (제3변화 i-어간)
  - latin: audior
    translation:
      en: I am heard
      ko: 나는 들린다
    gender: null
    notes:
      en: 1st person singular present passive of audio (4th conj.)
      ko: audio의 1인칭 단수 현재 수동 (제4변화)
  - latin: amatus est
    translation:
      en: he was loved (perfect passive)
      ko: 그는 사랑받았다 (완료 수동)
    gender: null
    notes:
      en: Perfect passive = perfect participle + sum
      ko: 완료 수동 = 완료 분사 + sum
  - latin: amata est
    translation:
      en: she was loved (perfect passive)
      ko: 그녀는 사랑받았다 (완료 수동)
    gender: null
    notes:
      en: Feminine form of perfect passive participle
      ko: 완료 수동 분사의 여성형
  - latin: amati sunt
    translation:
      en: they were loved (perfect passive)
      ko: 그들은 사랑받았다 (완료 수동)
    gender: null
    notes:
      en: Masculine plural perfect passive
      ko: 남성 복수 완료 수동
  - latin: dictum est
    translation:
      en: it was said
      ko: 그것이 말해졌다
    gender: null
    notes:
      en: Neuter singular perfect passive of dico
      ko: dico의 중성 단수 완료 수동
  - latin: missi sunt
    translation:
      en: they were sent
      ko: 그들은 보내졌다
    gender: null
    notes:
      en: Masculine plural perfect passive of mitto
      ko: mitto의 남성 복수 완료 수동
  - latin: scriptum est
    translation:
      en: it was written
      ko: 그것이 쓰여졌다
    gender: null
    notes:
      en: Neuter singular perfect passive of scribo
      ko: scribo의 중성 단수 완료 수동
  - latin: ductus est
    translation:
      en: he was led
      ko: 그는 이끌려졌다
    gender: null
    notes:
      en: Masculine singular perfect passive of duco
      ko: duco의 남성 단수 완료 수동
- id: 122_agent_expressions
  label:
    en: 12.2 Agent Expressions
    ko: 12.2 행위자 표현
  type: vocabulary
  words:
  - latin: a rege
    translation:
      en: by the king
      ko: 왕에 의해
    gender: null
    notes:
      en: Agent expression with a + ablative
      ko: a + 탈격으로 행위자 표현
  - latin: ab imperatore
    translation:
      en: by the commander
      ko: 사령관에 의해
    gender: null
    notes:
      en: ab before vowel; ablative of agent
      ko: 모음 앞에서 ab; 행위자의 탈격
  - latin: a militibus
    translation:
      en: by the soldiers
      ko: 병사들에 의해
    gender: null
    notes:
      en: Plural agent; a + ablative plural
      ko: 복수 행위자; a + 탈격 복수
  - latin: a populo
    translation:
      en: by the people
      ko: 국민에 의해
    gender: null
    notes:
      en: Agent expression with collective noun
      ko: 집합명사로 행위자 표현
  - latin: gladio
    translation:
      en: with/by a sword (instrument)
      ko: 칼로 (도구)
    gender: null
    notes:
      en: Ablative of instrument (no preposition)
      ko: 도구의 탈격 (전치사 없음)
  - latin: igni
    translation:
      en: with/by fire (instrument)
      ko: 불로 (도구)
    gender: null
    notes:
      en: Ablative of instrument; ignis, -is (3rd decl.)
      ko: 도구의 탈격; ignis, -is (제3변화)
  - latin: veneno
    translation:
      en: with/by poison (instrument)
      ko: 독으로 (도구)
    gender: null
    notes:
      en: Ablative of means; venenum, -i (2nd decl.)
      ko: 수단의 탈격; venenum, -i (제2변화)
  - latin: consilio
    translation:
      en: by plan, by counsel
      ko: 계략으로, 조언으로
    gender: null
    notes:
      en: Ablative of means; consilium, -i (2nd decl.)
      ko: 수단의 탈격; consilium, -i (제2변화)
  - latin: lege
    translation:
      en: by law
      ko: 법에 의해
    gender: null
    notes:
      en: Ablative of means; lex, legis (3rd decl.)
      ko: 수단의 탈격; lex, legis (제3변화)
