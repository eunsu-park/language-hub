lesson: "sup_A2_Sports_and_Games"
lesson_number: 110
cefr: A2
type: supplementary
topic: "Sports and Games"
categories:
- id: gladiators
  label:
    en: "Gladiators and Arena"
    ko: "검투사와 투기장"
  type: vocabulary
  words:
  - latin: gladiator
    translation:
      en: "gladiator"
      ko: "검투사"
    gender: m
    notes:
      en: "gen. gladiatoris; 3rd declension; from gladius 'sword'"
      ko: "속격 gladiatoris; 제3변화; gladius '검'에서 유래"
  - latin: lanista
    translation:
      en: "gladiator trainer"
      ko: "검투사 훈련사"
    gender: m
    notes:
      en: "gen. lanistae; 1st declension masculine; owned gladiator schools (ludi)"
      ko: "속격 lanistae; 제1변화 남성; 검투사 학교(ludi)를 소유"
  - latin: arena
    translation:
      en: "arena / sand"
      ko: "투기장 / 모래"
    gender: f
    notes:
      en: "gen. arenae; 1st declension; literally 'sand' (spread on the arena floor)"
      ko: "속격 arenae; 제1변화; 문자 그대로 '모래' (투기장 바닥에 깔림)"
  - latin: munus
    translation:
      en: "gladiatorial show / public gift"
      ko: "검투 경기 / 공적 선물"
    gender: n
    notes:
      en: "gen. muneris; 3rd declension neuter; source of 'munificent'"
      ko: "속격 muneris; 제3변화 중성; 영어 'munificent'의 어원"
  - latin: amphitheatrum
    translation:
      en: "amphitheater"
      ko: "원형경기장"
    gender: n
    notes:
      en: "gen. amphitheatri; 2nd declension neuter; the Colosseum is the most famous"
      ko: "속격 amphitheatri; 제2변화 중성; 콜로세움이 가장 유명"
  - latin: gladius
    translation:
      en: "sword"
      ko: "검"
    gender: m
    notes:
      en: "gen. gladii; 2nd declension; the short Roman fighting sword"
      ko: "속격 gladii; 제2변화; 짧은 로마 전투용 검"
  - latin: scutum
    translation:
      en: "shield"
      ko: "방패"
    gender: n
    notes:
      en: "gen. scuti; 2nd declension neuter; large rectangular shield"
      ko: "속격 scuti; 제2변화 중성; 크고 직사각형인 방패"
  - latin: retiarius
    translation:
      en: "net-fighter (gladiator type)"
      ko: "그물 투사 (검투사 유형)"
    gender: m
    notes:
      en: "gen. retiarii; 2nd declension; fought with net and trident"
      ko: "속격 retiarii; 제2변화; 그물과 삼지창으로 싸움"
  - latin: secutor
    translation:
      en: "pursuer (gladiator type)"
      ko: "추격자 (검투사 유형)"
    gender: m
    notes:
      en: "gen. secutoris; 3rd declension; opponent of the retiarius"
      ko: "속격 secutoris; 제3변화; 레티아리우스의 상대"
  - latin: bestiarius
    translation:
      en: "beast-fighter"
      ko: "맹수 투사"
    gender: m
    notes:
      en: "gen. bestiarii; 2nd declension; fought wild animals in the arena"
      ko: "속격 bestiarii; 제2변화; 투기장에서 야생 동물과 싸움"
  - latin: venatio
    translation:
      en: "beast hunt (in arena)"
      ko: "맹수 사냥 (투기장 내)"
    gender: f
    notes:
      en: "gen. venationis; 3rd declension; elaborate animal hunts as spectacle"
      ko: "속격 venationis; 제3변화; 볼거리로서의 정교한 동물 사냥"
  - latin: rudis
    translation:
      en: "wooden sword (of freedom)"
      ko: "나무 검 (자유의)"
    gender: f
    notes:
      en: "gen. rudis; 3rd declension; given to a gladiator granted freedom"
      ko: "속격 rudis; 제3변화; 자유를 얻은 검투사에게 수여됨"

- id: chariot_racing
  label:
    en: "Chariot Racing"
    ko: "전차 경주"
  type: vocabulary
  words:
  - latin: quadriga
    translation:
      en: "four-horse chariot"
      ko: "네 마리 말 전차"
    gender: f
    notes:
      en: "gen. quadrigae; 1st declension; the standard racing chariot"
      ko: "속격 quadrigae; 제1변화; 표준 경주용 전차"
  - latin: biga
    translation:
      en: "two-horse chariot"
      ko: "두 마리 말 전차"
    gender: f
    notes:
      en: "gen. bigae; 1st declension; less common in races"
      ko: "속격 bigae; 제1변화; 경주에서 덜 흔함"
  - latin: auriga
    translation:
      en: "charioteer"
      ko: "전차 조종사"
    gender: m
    notes:
      en: "gen. aurigae; 1st declension masculine; some became wildly famous"
      ko: "속격 aurigae; 제1변화 남성; 일부는 엄청난 유명세를 얻음"
  - latin: circus
    translation:
      en: "circus / racetrack"
      ko: "경기장 / 경마장"
    gender: m
    notes:
      en: "gen. circi; 2nd declension; Circus Maximus held 250,000 spectators"
      ko: "속격 circi; 제2변화; 키르쿠스 막시무스는 25만 명 수용"
  - latin: spina
    translation:
      en: "spine (central barrier)"
      ko: "중앙 장벽"
    gender: f
    notes:
      en: "gen. spinae; 1st declension; dividing wall in the center of the circus"
      ko: "속격 spinae; 제1변화; 경기장 중앙의 분리벽"
  - latin: meta
    translation:
      en: "turning post"
      ko: "회전 기둥"
    gender: f
    notes:
      en: "gen. metae; 1st declension; conical pillars at each end of the spina"
      ko: "속격 metae; 제1변화; 스피나 양 끝의 원추형 기둥"
  - latin: factio
    translation:
      en: "racing team / faction"
      ko: "경주 팀 / 파벌"
    gender: f
    notes:
      en: "gen. factionis; 3rd declension; four factions: Red, White, Blue, Green"
      ko: "속격 factionis; 제3변화; 네 파벌: 적, 백, 청, 녹"
  - latin: naufragium
    translation:
      en: "shipwreck / crash (in racing)"
      ko: "난파 / 충돌 (경주에서)"
    gender: n
    notes:
      en: "gen. naufragii; 2nd declension neuter; dramatic chariot wrecks"
      ko: "속격 naufragii; 제2변화 중성; 극적인 전차 충돌"
  - latin: palma
    translation:
      en: "palm (of victory)"
      ko: "승리의 종려나무 가지"
    gender: f
    notes:
      en: "gen. palmae; 1st declension; source of 'palm'"
      ko: "속격 palmae; 제1변화; 영어 'palm'의 어원"
  - latin: corona
    translation:
      en: "crown / wreath"
      ko: "왕관 / 화환"
    gender: f
    notes:
      en: "gen. coronae; 1st declension; victory wreath; source of 'crown, corona'"
      ko: "속격 coronae; 제1변화; 승리의 화환; 영어 'crown, corona'의 어원"

- id: baths
  label:
    en: "Baths and Exercise"
    ko: "목욕탕과 운동"
  type: vocabulary
  words:
  - latin: thermae
    translation:
      en: "public baths (plural)"
      ko: "공중목욕탕 (복수형)"
    gender: f
    notes:
      en: "gen. thermarum; 1st declension; from Greek thermos 'hot'; source of 'thermal'"
      ko: "속격 thermarum; 제1변화; 그리스어 thermos '뜨거운'에서 유래; 영어 'thermal'의 어원"
  - latin: palaestra
    translation:
      en: "exercise ground / wrestling court"
      ko: "운동장 / 레슬링 코트"
    gender: f
    notes:
      en: "gen. palaestrae; 1st declension; from Greek palaistra"
      ko: "속격 palaestrae; 제1변화; 그리스어 palaistra에서 유래"
  - latin: caldarium
    translation:
      en: "hot bath room"
      ko: "온탕실"
    gender: n
    notes:
      en: "gen. caldarii; 2nd declension neuter; from calidus 'hot'"
      ko: "속격 caldarii; 제2변화 중성; calidus '뜨거운'에서 유래"
  - latin: tepidarium
    translation:
      en: "warm bath room"
      ko: "미온탕실"
    gender: n
    notes:
      en: "gen. tepidarii; 2nd declension neuter; from tepidus 'warm'"
      ko: "속격 tepidarii; 제2변화 중성; tepidus '따뜻한'에서 유래"
  - latin: frigidarium
    translation:
      en: "cold bath room"
      ko: "냉탕실"
    gender: n
    notes:
      en: "gen. frigidarii; 2nd declension neuter; from frigidus 'cold'"
      ko: "속격 frigidarii; 제2변화 중성; frigidus '차가운'에서 유래"
  - latin: strigilis
    translation:
      en: "skin scraper"
      ko: "피부 긁개"
    gender: f
    notes:
      en: "gen. strigilis; 3rd declension; curved metal tool for scraping oil and sweat"
      ko: "속격 strigilis; 제3변화; 기름과 땀을 긁어내는 구부러진 금속 도구"
  - latin: unguentum
    translation:
      en: "oil / ointment"
      ko: "기름 / 연고"
    gender: n
    notes:
      en: "gen. unguenti; 2nd declension neuter; source of 'unguent'"
      ko: "속격 unguenti; 제2변화 중성; 영어 'unguent'의 어원"
  - latin: natare
    translation:
      en: "to swim"
      ko: "수영하다"
    gender: n
    notes:
      en: "1st conjugation verb; source of 'natatorium'"
      ko: "제1활용 동사; 영어 'natatorium'의 어원"

- id: games
  label:
    en: "Games and Entertainment"
    ko: "놀이와 오락"
  type: vocabulary
  words:
  - latin: pila
    translation:
      en: "ball"
      ko: "공"
    gender: f
    notes:
      en: "gen. pilae; 1st declension; various ball games were popular"
      ko: "속격 pilae; 제1변화; 다양한 공놀이가 인기였음"
  - latin: tesserae
    translation:
      en: "dice (plural)"
      ko: "주사위 (복수형)"
    gender: f
    notes:
      en: "gen. tesserarum; 1st declension; 'alea iacta est' — the die is cast"
      ko: "속격 tesserarum; 제1변화; 'alea iacta est' — 주사위는 던져졌다"
  - latin: alea
    translation:
      en: "die (singular) / gambling"
      ko: "주사위 (단수) / 도박"
    gender: f
    notes:
      en: "gen. aleae; 1st declension; gambling was technically illegal in Rome"
      ko: "속격 aleae; 제1변화; 도박은 로마에서 기술적으로 불법이었음"
  - latin: ludus
    translation:
      en: "game / school"
      ko: "놀이 / 학교"
    gender: m
    notes:
      en: "gen. ludi; 2nd declension; ludi publici = public games/festivals"
      ko: "속격 ludi; 제2변화; ludi publici = 공공 경기/축제"
  - latin: tabula
    translation:
      en: "board (for games)"
      ko: "판 (놀이용)"
    gender: f
    notes:
      en: "gen. tabulae; 1st declension; tabula lusoria = game board"
      ko: "속격 tabulae; 제1변화; tabula lusoria = 놀이판"
  - latin: latrunculus
    translation:
      en: "game piece / soldier (in game)"
      ko: "놀이 말 / 병사 (게임 속)"
    gender: m
    notes:
      en: "gen. latrunculi; 2nd declension; ludus latrunculorum = Roman strategy game"
      ko: "속격 latrunculi; 제2변화; ludus latrunculorum = 로마 전략 게임"
  - latin: trochus
    translation:
      en: "hoop (for rolling)"
      ko: "굴렁쇠"
    gender: m
    notes:
      en: "gen. trochi; 2nd declension; children's game; rolled with a stick"
      ko: "속격 trochi; 제2변화; 어린이 놀이; 막대기로 굴림"
  - latin: talus
    translation:
      en: "knucklebone (for games)"
      ko: "복사뼈 (놀이용)"
    gender: m
    notes:
      en: "gen. tali; 2nd declension; animal knucklebones used as dice"
      ko: "속격 tali; 제2변화; 동물의 복사뼈를 주사위로 사용"
  - latin: spectator
    translation:
      en: "spectator"
      ko: "관중"
    gender: m
    notes:
      en: "gen. spectatoris; 3rd declension; source of 'spectator'"
      ko: "속격 spectatoris; 제3변화; 영어 'spectator'의 어원"
  - latin: victoria
    translation:
      en: "victory"
      ko: "승리"
    gender: f
    notes:
      en: "gen. victoriae; 1st declension; source of 'victory'"
      ko: "속격 victoriae; 제1변화; 영어 'victory'의 어원"
