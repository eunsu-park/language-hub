- id: government_verbs
  label:
    en: "Government and Political Verbs"
    ko: "정치와 행정 동사"
  type: vocabulary
  words:
  - latin: "regnare"
    translation:
      en: "to rule, to reign"
      ko: "통치하다, 군림하다"
    gender: n
    notes:
      en: "1st conj."
      ko: "제1활용"
  - latin: "gubernare"
    translation:
      en: "to govern, to steer"
      ko: "통치하다, 이끌다"
    gender: n
    notes:
      en: "1st conj."
      ko: "제1활용"
  - latin: "administrare"
    translation:
      en: "to administer, to manage"
      ko: "관리하다, 운영하다"
    gender: n
    notes:
      en: "1st conj.; rem publicam administrare"
      ko: "제1활용; rem publicam administrare"
  - latin: "abdicare"
    translation:
      en: "to resign (from office)"
      ko: "(관직을) 사임하다"
    gender: n
    notes:
      en: "1st conj.; se magistratu abdicare"
      ko: "제1활용; se magistratu abdicare"
  - latin: "creare"
    translation:
      en: "to elect, to appoint"
      ko: "선출하다, 임명하다"
    gender: n
    notes:
      en: "1st conj.; consulem creare = 'to elect a consul'"
      ko: "제1활용; consulem creare = '집정관을 선출하다'"
  - latin: "designare"
    translation:
      en: "to designate, to elect"
      ko: "지명하다, 선출하다"
    gender: n
    notes:
      en: "1st conj.; consul designatus = 'consul elect'"
      ko: "제1활용; consul designatus = '차기 집정관'"
  - latin: "censere"
    translation:
      en: "to assess, to vote, to decree"
      ko: "평가하다, 표결하다, 결의하다"
    gender: n
    notes:
      en: "2nd conj."
      ko: "제2활용"
  - latin: "oboedire"
    translation:
      en: "to obey"
      ko: "복종하다"
    gender: n
    notes:
      en: "4th conj.; + dat."
      ko: "제4활용; + 여격"
  - latin: "cogere"
    translation:
      en: "to compel, to assemble"
      ko: "강제하다, 소집하다"
    gender: n
    notes:
      en: "3rd conj.; perf. coēgī; senatum cogere = 'to convene the senate'"
      ko: "제3활용; 완료 coēgī; senatum cogere = '원로원을 소집하다'"
  - latin: "decernere"
    translation:
      en: "to decree, to decide"
      ko: "결의하다, 결정하다"
    gender: n
    notes:
      en: "3rd conj.; perf. dēcrēvī"
      ko: "제3활용; 완료 dēcrēvī"
  - latin: "referre"
    translation:
      en: "to report, to bring before (senate)"
      ko: "보고하다, (원로원에) 상정하다"
    gender: n
    notes:
