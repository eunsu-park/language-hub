lesson: sup_B2_Poetry_and_Meter
lesson_number: 128
type: supplementary
topic: "Poetry and Meter"
cefr: B2
categories:
- id: metrical_terms
  label:
    en: Metrical Terms
    ko: 운율 용어
  type: vocabulary
  words:
  - latin: metrum
    translation:
      en: meter, measure
      ko: 운율, 율격
    gender: n
    notes:
      en: "gen. metrī; 2nd decl.; Greek loanword"
      ko: "속격 metrī; 제2변화; 그리스어 차용어"
  - latin: hexameter
    translation:
      en: hexameter, six-foot verse
      ko: 6보격
    gender: m
    notes:
      en: "Greek loanword; the meter of epic poetry (Vergil's Aeneid)"
      ko: "그리스어 차용어; 서사시의 운율 (베르길리우스의 아이네이스)"
  - latin: pentameter
    translation:
      en: pentameter, five-foot verse
      ko: 5보격
    gender: m
    notes:
      en: "Greek loanword; paired with hexameter in elegiac couplets"
      ko: "그리스어 차용어; 비가 대구에서 6보격과 짝을 이룸"
  - latin: dactylus
    translation:
      en: dactyl, metrical foot (long-short-short)
      ko: 장단단격
    gender: m
    notes:
      en: "gen. dactylī; 2nd decl.; from Greek daktylos 'finger'"
      ko: "속격 dactylī; 제2변화; 그리스어 daktylos '손가락'에서 유래"
  - latin: spondeus
    translation:
      en: spondee, metrical foot (long-long)
      ko: 장장격
    gender: m
    notes:
      en: "gen. spondeī; 2nd decl.; substitutes for dactyl in hexameter"
      ko: "속격 spondeī; 제2변화; 6보격에서 장단단격을 대체 가능"
  - latin: trochaeus
    translation:
      en: trochee, metrical foot (long-short)
      ko: 장단격
    gender: m
    notes:
      en: "gen. trochaeī; 2nd decl.; used in comedy"
      ko: "속격 trochaeī; 제2변화; 희극에서 사용"
  - latin: iambus
    translation:
      en: iamb, metrical foot (short-long)
      ko: 단장격
    gender: m
    notes:
      en: "gen. iambī; 2nd decl.; the meter closest to spoken language"
      ko: "속격 iambī; 제2변화; 구어에 가장 가까운 운율"
  - latin: anapaestus
    translation:
      en: anapest, metrical foot (short-short-long)
      ko: 단단장격
    gender: m
    notes:
      en: "gen. anapaestī; 2nd decl.; used in choral passages"
      ko: "속격 anapaestī; 제2변화; 합창 부분에서 사용"
  - latin: caesura
    translation:
      en: caesura, pause within a verse
      ko: 휴지, 시행 내 쉼
    gender: f
    notes:
      en: "gen. caesūrae; 1st decl.; from caedere 'to cut'"
      ko: "속격 caesūrae; 제1변화; caedere '자르다'에서 유래"
  - latin: pes
    translation:
      en: foot (metrical unit)
      ko: 율격 단위, 보
    gender: m
    notes:
      en: "gen. pedis; 3rd decl.; the basic rhythmic unit of verse"
      ko: "속격 pedis; 제3변화; 시의 기본 리듬 단위"
  - latin: syllaba longa
    translation:
      en: long syllable
      ko: 장음절
    gender: f
    notes:
      en: "a syllable that is heavy by nature or position"
      ko: "본성상 또는 위치상 무거운 음절"
  - latin: syllaba brevis
    translation:
      en: short syllable
      ko: 단음절
    gender: f
    notes:
      en: "a syllable that is light"
      ko: "가벼운 음절"
  - latin: arsis
    translation:
      en: upbeat, strong part of the foot
      ko: 강박, 율격 단위의 강한 부분
    gender: f
    notes:
      en: "Greek loanword; the metrically strong position"
      ko: "그리스어 차용어; 운율적으로 강한 위치"
  - latin: thesis
    translation:
      en: downbeat, weak part of the foot
      ko: 약박, 율격 단위의 약한 부분
    gender: f
    notes:
      en: "Greek loanword; the metrically weak position"
      ko: "그리스어 차용어; 운율적으로 약한 위치"
  - latin: elisio
    translation:
      en: elision, suppression of a final vowel
      ko: 모음 탈락
    gender: f
    notes:
      en: "gen. ēlīsiōnis; 3rd decl.; occurs before a word beginning with a vowel"
      ko: "속격 ēlīsiōnis; 제3변화; 모음으로 시작하는 단어 앞에서 발생"
  - latin: synaloepha
    translation:
      en: elision of vowels between words
      ko: 모음 축약
    gender: f
    notes:
      en: "Greek loanword; the merging of syllables across word boundaries"
      ko: "그리스어 차용어; 단어 경계를 넘어 음절이 합쳐지는 현상"
  - latin: hiatus
    translation:
      en: hiatus, gap between vowels without elision
      ko: 모음 충돌, 이중 모음 사이의 틈
    gender: m
    notes:
      en: "gen. hiātūs; 4th decl.; generally avoided in classical verse"
      ko: "속격 hiātūs; 제4변화; 고전 시에서 일반적으로 회피됨"

- id: poetic_vocabulary
  label:
    en: Poetic Vocabulary
    ko: 시적 어휘
  type: vocabulary
  words:
  - latin: carmen
    translation:
      en: song, poem, incantation
      ko: 노래, 시, 주문
    gender: n
    notes:
      en: "gen. carminis; 3rd decl.; the most general word for 'poem'"
      ko: "속격 carminis; 제3변화; '시'를 뜻하는 가장 일반적인 단어"
  - latin: versus
    translation:
      en: verse, line of poetry
      ko: 시행, 운문
    gender: m
    notes:
      en: "gen. versūs; 4th decl.; from vertere 'to turn' (the plough)"
      ko: "속격 versūs; 제4변화; vertere '돌리다'(쟁기)에서 유래"
  - latin: musa
    translation:
      en: Muse, poetic inspiration
      ko: 뮤즈, 시적 영감
    gender: f
    notes:
      en: "gen. mūsae; 1st decl.; one of the nine goddesses of the arts"
      ko: "속격 mūsae; 제1변화; 예술의 아홉 여신 중 하나"
  - latin: vates
    translation:
      en: poet-prophet, inspired singer
      ko: 시인 예언자, 영감받은 가수
    gender: m
    notes:
      en: "gen. vātis; 3rd decl.; elevated term for poet (cf. poēta)"
      ko: "속격 vātis; 제3변화; 시인의 격조 높은 표현 (poēta 참조)"
  - latin: poema
    translation:
      en: poem
      ko: 시
    gender: n
    notes:
      en: "gen. poēmatis; 3rd decl.; Greek loanword"
      ko: "속격 poēmatis; 제3변화; 그리스어 차용어"
  - latin: elegia
    translation:
      en: elegy, elegiac poem
      ko: 비가, 애가
    gender: f
    notes:
      en: "gen. elegiae; 1st decl.; alternating hexameter and pentameter"
      ko: "속격 elegiae; 제1변화; 6보격과 5보격이 교대"
  - latin: epos
    translation:
      en: epic poetry
      ko: 서사시
    gender: n
    notes:
      en: "Greek loanword; heroic narrative in dactylic hexameter"
      ko: "그리스어 차용어; 장단단격 6보격의 영웅적 서사"
  - latin: lyrica
    translation:
      en: lyric poetry
      ko: 서정시
    gender: f
    notes:
      en: "gen. lyricae; 1st decl.; originally poetry sung to the lyre"
      ko: "속격 lyricae; 제1변화; 원래 리라에 맞춰 노래한 시"
  - latin: oda
    translation:
      en: ode
      ko: 송가
    gender: f
    notes:
      en: "gen. odae; 1st decl.; Latin form of Greek ōdē; Horace's Odes"
      ko: "속격 odae; 제1변화; 그리스어 ōdē의 라틴어 형태; 호라티우스의 송시집"
  - latin: satira
    translation:
      en: satire
      ko: 풍자시
    gender: f
    notes:
      en: "gen. satirae; 1st decl.; a uniquely Roman genre (satura tota nostra est)"
      ko: "속격 satirae; 제1변화; 순수 로마 고유의 장르 (satura tota nostra est)"
  - latin: fabula
    translation:
      en: story, play, fable
      ko: 이야기, 연극, 우화
    gender: f
    notes:
      en: "gen. fābulae; 1st decl.; fabula palliāta (Greek comedy), fabula togāta (Roman comedy)"
      ko: "속격 fābulae; 제1변화; fabula palliāta (그리스식 희극), fabula togāta (로마식 희극)"
  - latin: bucolicuon
    translation:
      en: bucolic, pastoral poetry
      ko: 목가
    gender: n
    notes:
      en: "Greek loanword; Vergil's Eclogues are bucolic poetry"
      ko: "그리스어 차용어; 베르길리우스의 목가는 목가시에 해당"
  - latin: epyllion
    translation:
      en: little epic, miniature epic poem
      ko: 소서사시
    gender: n
    notes:
      en: "Greek loanword; a short mythological narrative poem"
      ko: "그리스어 차용어; 짧은 신화적 서사 시"
  - latin: epithalamium
    translation:
      en: wedding song
      ko: 축혼가
    gender: n
    notes:
      en: "gen. epithalamii; 2nd decl.; Greek loanword; Catullus 61, 62"
      ko: "속격 epithalamii; 제2변화; 그리스어 차용어; 카툴루스 61, 62편"
  - latin: strophē
    translation:
      en: strophe, stanza
      ko: 시련, 연
    gender: f
    notes:
      en: "Greek loanword; a group of lines forming a metrical unit"
      ko: "그리스어 차용어; 운율적 단위를 이루는 행의 묶음"

- id: figures_of_speech
  label:
    en: Figures of Speech and Poetic Devices
    ko: 수사법과 시적 기법
  type: vocabulary
  words:
  - latin: metaphora
    translation:
      en: metaphor
      ko: 은유
    gender: f
    notes:
      en: "gen. metaphorae; 1st decl.; Greek loanword; implicit comparison"
      ko: "속격 metaphorae; 제1변화; 그리스어 차용어; 암묵적 비교"
  - latin: similitudo
    translation:
      en: simile, comparison
      ko: 직유, 비교
    gender: f
    notes:
      en: "gen. similitūdinis; 3rd decl.; explicit comparison using 'like' or 'as'"
      ko: "속격 similitūdinis; 제3변화; '~처럼'을 사용한 명시적 비교"
  - latin: allegoria
    translation:
      en: allegory, extended metaphor
      ko: 알레고리, 확장된 은유
    gender: f
    notes:
      en: "gen. allēgoriae; 1st decl.; Greek loanword"
      ko: "속격 allēgoriae; 제1변화; 그리스어 차용어"
  - latin: synecdoche
    translation:
      en: synecdoche, part for the whole
      ko: 제유법, 부분으로 전체를 나타냄
    gender: f
    notes:
      en: "Greek loanword; e.g. 'puppis' (stern) for 'navis' (ship)"
      ko: "그리스어 차용어; 예: 'puppis'(선미)로 'navis'(배) 전체를 나타냄"
  - latin: metonymia
    translation:
      en: metonymy, substitution of a related word
      ko: 환유, 관련어로 대체
    gender: f
    notes:
      en: "gen. metōnymiae; 1st decl.; e.g. 'Mars' for 'war'"
      ko: "속격 metōnymiae; 제1변화; 예: 'Mars'로 '전쟁'을 나타냄"
  - latin: litotes
    translation:
      en: litotes, understatement by negation
      ko: 완곡어법, 부정을 통한 축소 표현
    gender: f
    notes:
      en: "Greek loanword; e.g. 'non ignārus' = 'very much aware'"
      ko: "그리스어 차용어; 예: 'non ignārus' = '아주 잘 아는'"
  - latin: hendiadys
    translation:
      en: expression of one idea by two nouns joined with 'et'
      ko: 이어법, 'et'로 연결된 두 명사로 하나의 개념을 표현
    gender: f
    notes:
      en: "Greek loanword; e.g. 'molem et montēs' for 'massive mountains'"
      ko: "그리스어 차용어; 예: 'molem et montēs'로 '거대한 산'을 표현"
  - latin: enjambement
    translation:
      en: enjambment, continuation of a sentence across verse lines
      ko: 시행 걸침
    gender: n
    notes:
      en: "the syntactic overflow of one line into the next"
      ko: "한 행의 통사적 내용이 다음 행으로 넘어감"
  - latin: tmesis
    translation:
      en: tmesis, splitting a compound word
      ko: 사이끼움, 합성어의 분리
    gender: f
    notes:
      en: "Greek loanword; e.g. 'quō mē cumque rapit tempestās' (Horace)"
      ko: "그리스어 차용어; 예: 'quō mē cumque rapit tempestās' (호라티우스)"
  - latin: chiasmus
    translation:
      en: chiasmus, ABBA word order
      ko: 교차법, ABBA 어순
    gender: m
    notes:
      en: "Greek loanword; named for the Greek letter chi (X)"
      ko: "그리스어 차용어; 그리스 문자 키(X)에서 이름 유래"
  - latin: asyndeton
    translation:
      en: omission of conjunctions
      ko: 접속사 생략법
    gender: n
    notes:
      en: "Greek loanword; e.g. Caesar's 'vēnī, vīdī, vīcī'"
      ko: "그리스어 차용어; 예: 카이사르의 'vēnī, vīdī, vīcī'"
  - latin: polysyndeton
    translation:
      en: repetition of conjunctions
      ko: 접속사 반복법
    gender: n
    notes:
      en: "Greek loanword; opposite of asyndeton; creates a sense of accumulation"
      ko: "그리스어 차용어; asyndeton의 반대; 축적의 느낌을 생성"
  - latin: onomatopoeia
    translation:
      en: onomatopoeia, sound imitation
      ko: 의성법, 소리 모방
    gender: f
    notes:
      en: "Greek loanword; e.g. 'quadrupedante putrem sonitū quatit ungula campum' (Vergil)"
      ko: "그리스어 차용어; 예: 'quadrupedante putrem sonitū quatit ungula campum' (베르길리우스)"
  - latin: ecphrasis
    translation:
      en: ekphrasis, vivid description of a work of art
      ko: 에크프라시스, 예술 작품의 생생한 묘사
    gender: f
    notes:
      en: "Greek loanword; e.g. the shield of Aeneas (Aeneid 8)"
      ko: "그리스어 차용어; 예: 아이네아스의 방패 (아이네이스 8권)"
  - latin: apostrophē
    translation:
      en: apostrophe, addressing an absent entity
      ko: 전향법, 부재하는 대상에게 말걸기
    gender: f
    notes:
      en: "Greek loanword; dramatic address to a person, thing, or abstract idea"
      ko: "그리스어 차용어; 사람, 사물, 추상적 관념에 대한 극적 호칭"
