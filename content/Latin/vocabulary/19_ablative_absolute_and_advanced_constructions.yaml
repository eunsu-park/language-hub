    notes:
      en: "adj. invītus, -a, -um; mē invītō = 'against my will' (abl. abs.)"
      ko: "형용사 invītus, -a, -um; mē invītō = '내 의지에 반하여' (탈격 독립)"
  - latin: absens
    translation:
      en: absent, away
      ko: 부재하는
    gender: m
    notes:
      en: "pres. part. of abesse; gen. absentis; mē absente = 'in my absence'"
      ko: "abesse의 현재분사; 속격 absentis; mē absente = '내가 없는 동안'"
  - latin: praesens
    translation:
      en: present, at hand
      ko: 현재의, 있는
    gender: m
    notes:
      en: "pres. part. of praeesse; gen. praesentis"
      ko: "praeesse의 현재분사; 속격 praesentis"
  - latin: vivus
    translation:
      en: alive, living
      ko: 살아 있는
    gender: m
    notes:
      en: "adj. vīvus, -a, -um; mē vīvō = 'while I am alive'"
      ko: "형용사 vīvus, -a, -um; mē vīvō = '내가 살아 있는 동안'"
- id: 192_supine_constructions
  label:
    en: 19.2 Supine Constructions
    ko: 19.2 목적분사 구문
  type: vocabulary
  words:
  - latin: mirabile dictu
    translation:
      en: wonderful to say, amazing to relate
      ko: 말하기 놀라운
    gender: null
    notes:
      en: "supine in -ū (ablative); dictu from dīcere"
      ko: "목적분사 -ū형 (탈격); dictu는 dīcere에서"
  - latin: facile factu
    translation:
      en: easy to do
      ko: 하기 쉬운
    gender: null
    notes:
      en: "supine in -ū; factu from facere"
      ko: "목적분사 -ū형; factu는 facere에서"
  - latin: difficile factu
    translation:
      en: difficult to do
      ko: 하기 어려운
    gender: null
    notes:
      en: "supine in -ū; factu from facere"
      ko: "목적분사 -ū형; factu는 facere에서"
  - latin: incredibile dictu
    translation:
      en: unbelievable to say
      ko: 말하기 믿기 어려운
    gender: null
    notes:
      en: "supine in -ū; dictu from dīcere"
      ko: "목적분사 -ū형; dictu는 dīcere에서"
  - latin: horribile visu
    translation:
      en: horrible to see
      ko: 보기 끔찍한
    gender: null
    notes:
      en: "supine in -ū; vīsū from vidēre"
      ko: "목적분사 -ū형; vīsū는 vidēre에서"
  - latin: optimum factu
    translation:
      en: the best thing to do
      ko: 하기에 가장 좋은
    gender: null
    notes:
      en: "supine in -ū; superlative + supine construction"
      ko: "목적분사 -ū형; 최상급 + 목적분사 구문"
  - latin: cubitum ire
    translation:
      en: to go to sleep (lit. to go to lie down)
      ko: "자러 가다 (직역: 눕기 위해 가다)"
    gender: null
    notes:
      en: "supine in -um (accusative); expresses purpose with verbs of motion"
      ko: "목적분사 -um형 (대격); 이동 동사와 함께 목적을 표현"
  - latin: nuptum dare
    translation:
      en: to give in marriage
      ko: 시집보내다
    gender: null
    notes:
      en: "supine in -um; from nūbere 'to marry'"
      ko: "목적분사 -um형; nūbere '결혼하다'에서"
  - latin: spectatum venire
    translation:
      en: to come to watch
      ko: 보러 오다
    gender: null
    notes:
      en: "supine in -um; from spectāre 'to watch'"
      ko: "목적분사 -um형; spectāre '구경하다'에서"
