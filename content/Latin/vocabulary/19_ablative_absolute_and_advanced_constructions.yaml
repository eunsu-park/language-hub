    notes:
      en: "ablative absolute phrase; very common in Caesar"
      ko: "탈격 독립 구문; 카이사르에게서 매우 흔함"
  - latin: his rebus gestis
    translation:
      en: when these things had been done
      ko: 이 일들이 수행된 후
    gender: null
    notes:
      en: "ablative absolute phrase; common in historical narrative"
      ko: "탈격 독립 구문; 역사 서술에서 흔함"
  - latin: pace facta
    translation:
      en: when peace had been made
      ko: 평화가 이루어진 후
    gender: null
    notes:
      en: "ablative absolute phrase"
      ko: "탈격 독립 구문"
  - latin: nulla mora interposita
    translation:
      en: without any delay
      ko: 아무 지체 없이
    gender: null
    notes:
      en: "ablative absolute phrase; lit. 'with no delay interposed'"
      ko: "탈격 독립 구문; 직역 '아무 지체도 끼이지 않은 채'"
  - latin: invitus
    translation:
      en: unwilling, reluctant
      ko: 마지못한, 내키지 않는
