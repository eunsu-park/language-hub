    ko: 19.1 탈격 독립 구문 어구
  type: vocabulary
  words:
  - latin: dux
    translation:
      en: leader, general, guide
      ko: 지도자, 장군, 안내자
    gender: m
    notes:
      en: "gen. ducis; 3rd decl.; Caesare duce = 'with Caesar as leader'"
      ko: "속격 ducis; 제3변화; Caesare duce = '카이사르가 지도자로서'"
  - latin: auctor
    translation:
