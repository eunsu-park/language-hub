      en: "gen. auctōris; 3rd decl.; auctōre senātū = 'on the authority of the senate'"
      ko: "속격 auctōris; 제3변화; auctōre senātū = '원로원의 권위로'"
  - latin: condere
    translation:
      en: to found, to establish, to store
      ko: 세우다, 창건하다, 저장하다
    gender: null
    notes:
      en: "3rd conj.; condō, condere, condidī, conditum; urbe conditā = 'with the city having been founded'"
      ko: "제3활용; condō, condere, condidī, conditum; urbe conditā = '도시가 세워진 후'"
  - latin: oriri
    translation:
      en: to rise, to arise, to be born
      ko: 떠오르다, 일어나다, 태어나다
    gender: null
    notes:
      en: "4th conj. deponent; orior, orīrī, ortus sum; sōle oriente = 'with the sun rising'"
      ko: "제4활용 탈형 동사; orior, orīrī, ortus sum; sōle oriente = '해가 뜰 때'"
  - latin: conficere
    translation:
