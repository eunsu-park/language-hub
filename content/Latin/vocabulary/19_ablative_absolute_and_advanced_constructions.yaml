      ko: "제3활용 -iō형; interficiō, interficere, interfēcī, interfectum; rēge interfectō = '왕이 살해된 후'"
  - latin: expugnare
    translation:
      en: to storm, to capture by assault
      ko: 공격하여 함락하다
    gender: null
    notes:
      en: "1st conj.; expugnō, expugnāre, expugnāvī, expugnātum; oppidō expugnātō = 'with the town captured'"
      ko: "제1활용; expugnō, expugnāre, expugnāvī, expugnātum; oppidō expugnātō = '도시가 함락된 후'"
  - latin: proficisci
    translation:
      en: to set out, to depart
      ko: 출발하다, 떠나다
