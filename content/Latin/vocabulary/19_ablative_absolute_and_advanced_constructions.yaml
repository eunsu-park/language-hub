      en: "3rd conj. -iō; cōnficiō, cōnficere, cōnfēcī, cōnfectum; bellō cōnfectō = 'with the war finished'"
      ko: "제3활용 -iō형; cōnficiō, cōnficere, cōnfēcī, cōnfectum; bellō cōnfectō = '전쟁이 끝난 후'"
  - latin: interficere
    translation:
      en: to kill, to destroy
      ko: 죽이다, 파괴하다
