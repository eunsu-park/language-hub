lesson: sup_B2_Historiography
lesson_number: 134
type: supplementary
topic: "Historiography"
cefr: B2
categories:
- id: historical_writing
  label:
    en: Historical Writing and Genres
    ko: 역사 서술과 장르
  type: vocabulary
  words:
  - latin: historia
    translation:
      en: history, inquiry, narrative
      ko: 역사, 탐구, 서사
    gender: f
    notes:
      en: "gen. historiae; 1st decl.; Greek loanword; from historein 'to inquire'"
      ko: "속격 historiae; 제1변화; 그리스어 차용어; historein '탐구하다'에서 유래"
  - latin: annales
    translation:
      en: annals, year-by-year record
      ko: 연대기
    gender: m
    notes:
      en: "gen. annālium; 3rd decl. pl.; chronological record of events; Tacitus's Annales"
      ko: "속격 annālium; 제3변화 복수; 사건의 연대순 기록; 타키투스의 연대기"
  - latin: res gestae
    translation:
      en: deeds accomplished, achievements
      ko: 업적, 공적
    gender: f
    notes:
      en: "lit. 'things done'; Augustus's Res Gestae Divi Augusti"
      ko: "직역 '행해진 것들'; 아우구스투스의 '신 아우구스투스의 업적록'"
  - latin: commentarii
    translation:
      en: commentaries, memoirs, notebooks
      ko: 논평, 회고록, 수기
    gender: m
    notes:
      en: "gen. commentāriōrum; 2nd decl. pl.; Caesar's war memoirs"
      ko: "속격 commentāriōrum; 제2변화 복수; 카이사르의 전쟁 수기"
  - latin: fasti
    translation:
      en: calendar, official chronicle, list of magistrates
      ko: 달력, 공식 연대기, 관리 명부
    gender: m
    notes:
      en: "gen. fastōrum; 2nd decl. pl.; also Ovid's poem Fasti"
      ko: "속격 fastōrum; 제2변화 복수; 오비디우스의 시 Fasti도 포함"
  - latin: epitome
    translation:
      en: epitome, abridgment, summary
      ko: 요약, 축약
    gender: f
    notes:
      en: "gen. epitomēs; 1st decl.; Greek loanword; a shortened version of a larger work"
      ko: "속격 epitomēs; 제1변화; 그리스어 차용어; 더 큰 저작의 축약본"
  - latin: chronicon
    translation:
      en: chronicle
      ko: 연대기
    gender: n
    notes:
      en: "gen. chronici; 2nd decl.; a chronological narrative of events"
      ko: "속격 chronici; 제2변화; 사건의 연대순 서술"
  - latin: biographia
    translation:
      en: biography
      ko: 전기
    gender: f
    notes:
      en: "gen. biographiae; 1st decl.; Greek loanword; Suetonius's Lives of the Caesars"
      ko: "속격 biographiae; 제1변화; 그리스어 차용어; 수에토니우스의 '황제전'"
  - latin: historicus
    translation:
      en: historian
      ko: 역사가
    gender: m
    notes:
      en: "gen. historicī; 2nd decl.; also used as adjective 'historical'"
      ko: "속격 historicī; 제2변화; '역사적인'이라는 형용사로도 사용"
  - latin: scriptor
    translation:
      en: writer, author
      ko: 저술가, 저자
    gender: m
    notes:
      en: "gen. scrīptōris; 3rd decl.; scriptor rērum = 'historian'"
      ko: "속격 scrīptōris; 제3변화; scriptor rērum = '역사가'"
  - latin: narratio
    translation:
      en: narration, account, story
      ko: 서술, 이야기
    gender: f
    notes:
      en: "gen. narrātiōnis; 3rd decl."
      ko: "속격 narrātiōnis; 제3변화"

- id: chronology
  label:
    en: Chronology and Time
    ko: 연대학과 시간
  type: vocabulary
  words:
  - latin: aetas
    translation:
      en: age, era, period, lifetime
      ko: 시대, 연대, 일생
    gender: f
    notes:
      en: "gen. aetātis; 3rd decl.; aetās aurea = 'Golden Age'"
      ko: "속격 aetātis; 제3변화; aetās aurea = '황금시대'"
  - latin: saeculum
    translation:
      en: generation, century, age
      ko: 세대, 세기, 시대
    gender: n
    notes:
      en: "gen. saeculī; 2nd decl.; originally ~110 years; lūdī saeculārēs = 'Secular Games'"
      ko: "속격 saeculī; 제2변화; 원래 약 110년; lūdī saeculārēs = '세기 경기'"
  - latin: annus
    translation:
      en: year
      ko: 해, 년
    gender: m
    notes:
      en: "gen. annī; 2nd decl.; ab urbe conditā = 'from the founding of the city'"
      ko: "속격 annī; 제2변화; ab urbe conditā = '도시 건설 이래'"
  - latin: tempus
    translation:
      en: time, period, occasion
      ko: 시간, 시기, 기회
    gender: n
    notes:
      en: "gen. temporis; 3rd decl."
      ko: "속격 temporis; 제3변화"
  - latin: epocha
    translation:
      en: epoch, fixed point in time
      ko: 시대, 기점
    gender: f
    notes:
      en: "gen. epochae; 1st decl.; Greek loanword; a defining moment in chronology"
      ko: "속격 epochae; 제1변화; 그리스어 차용어; 연대기의 결정적 시점"
  - latin: antiquitas
    translation:
      en: antiquity, ancient times
      ko: 고대, 먼 옛날
    gender: f
    notes:
      en: "gen. antīquitātis; 3rd decl."
      ko: "속격 antīquitātis; 제3변화"
  - latin: posteritas
    translation:
      en: posterity, future generations
      ko: 후세, 미래 세대
    gender: f
    notes:
      en: "gen. posteritātis; 3rd decl."
      ko: "속격 posteritātis; 제3변화"
  - latin: memoria
    translation:
      en: memory, recollection, tradition
      ko: 기억, 회상, 전통
    gender: f
    notes:
      en: "gen. memoriae; 1st decl.; post hominum memoriam = 'within living memory'"
      ko: "속격 memoriae; 제1변화; post hominum memoriam = '사람들의 기억 이래'"
  - latin: origo
    translation:
      en: origin, source, beginning
      ko: 기원, 원천, 시작
    gender: f
    notes:
      en: "gen. orīginis; 3rd decl.; Cato's Origines traced Rome's beginnings"
      ko: "속격 orīginis; 제3변화; 카토의 '기원'은 로마의 시작을 추적"
  - latin: ab urbe condita
    translation:
      en: from the founding of the city (753 BC)
      ko: 도시 건설 이래 (기원전 753년)
    gender: f
    notes:
      en: "abbreviated AUC; Livy's Ab Urbe Condita; Roman dating system"
      ko: "약자 AUC; 리비우스의 '도시 건설 이래'; 로마의 연대 체계"

- id: source_criticism
  label:
    en: Source Criticism and Methodology
    ko: 사료 비판과 방법론
  type: vocabulary
  words:
  - latin: fons
    translation:
      en: source, spring, origin
      ko: 출처, 샘, 기원
    gender: m
    notes:
      en: "gen. fontis; 3rd decl.; fontēs = 'historical sources'"
      ko: "속격 fontis; 제3변화; fontēs = '역사적 출처'"
  - latin: tabula
    translation:
      en: record, tablet, document
      ko: 기록, 서판, 문서
    gender: f
    notes:
      en: "gen. tabulae; 1st decl.; tabulae pūblicae = 'public records'"
      ko: "속격 tabulae; 제1변화; tabulae pūblicae = '공공 기록'"
  - latin: monumentum
    translation:
      en: monument, memorial, written record
      ko: 기념물, 기념비, 기록
    gender: n
    notes:
      en: "gen. monumentī; 2nd decl.; from monēre 'to remind'"
      ko: "속격 monumentī; 제2변화; monēre '상기시키다'에서 유래"
  - latin: inscriptio
    translation:
      en: inscription
      ko: 비문
    gender: f
    notes:
      en: "gen. inscrīptiōnis; 3rd decl.; text carved on stone, metal, or other material"
      ko: "속격 inscrīptiōnis; 제3변화; 돌, 금속 또는 기타 재료에 새긴 글"
  - latin: exemplum
    translation:
      en: example, model, precedent
      ko: 예시, 모범, 선례
    gender: n
    notes:
      en: "gen. exemplī; 2nd decl.; moral examples central to Roman historiography"
      ko: "속격 exemplī; 제2변화; 로마 역사 서술의 핵심인 도덕적 모범"
  - latin: auctoritas
    translation:
      en: authority, reliability, credibility (of a source)
      ko: 권위, 신뢰성 (출처의)
    gender: f
    notes:
      en: "gen. auctōritātis; 3rd decl.; the trustworthiness of a historical witness"
      ko: "속격 auctōritātis; 제3변화; 역사적 증인의 신뢰성"
  - latin: fides
    translation:
      en: trustworthiness, credibility, good faith
      ko: 신뢰성, 신빙성, 신의
    gender: f
    notes:
      en: "gen. fideī; 5th decl.; fides historica = 'historical reliability'"
      ko: "속격 fideī; 제5변화; fides historica = '역사적 신뢰성'"
  - latin: veritas
    translation:
      en: truth, accuracy
      ko: 진실, 정확성
    gender: f
    notes:
      en: "gen. vēritātis; 3rd decl.; the historian's claimed ideal"
      ko: "속격 vēritātis; 제3변화; 역사가가 추구하는 이상"
  - latin: testimonium
    translation:
      en: testimony, evidence, attestation
      ko: 증언, 증거, 입증
    gender: n
    notes:
      en: "gen. testimōniī; 2nd decl."
      ko: "속격 testimōniī; 제2변화"
  - latin: fabula
    translation:
      en: legend, myth, story (as opposed to historia)
      ko: 전설, 신화, 이야기 (historia와 대조)
    gender: f
    notes:
      en: "gen. fābulae; 1st decl.; distinguished from factual history"
      ko: "속격 fābulae; 제1변화; 사실적 역사와 구별됨"
  - latin: laudatio
    translation:
      en: eulogy, praise, funeral speech
      ko: 찬사, 칭송, 추도 연설
    gender: f
    notes:
      en: "gen. laudātiōnis; 3rd decl.; laudātiō fūnebris = funeral eulogy, an early source genre"
      ko: "속격 laudātiōnis; 제3변화; laudātiō fūnebris = 장례 추도사, 초기 사료 장르"
  - latin: traditio
    translation:
      en: tradition, handing down, transmission
      ko: 전통, 전승
    gender: f
    notes:
      en: "gen. trāditiōnis; 3rd decl.; oral or written transmission of knowledge"
      ko: "속격 trāditiōnis; 제3변화; 구전 또는 문서적 지식 전승"
  - latin: compilator
    translation:
      en: compiler, one who compiles from various sources
      ko: 편찬자, 다양한 출처에서 모으는 자
    gender: m
    notes:
      en: "gen. compilātōris; 3rd decl.; late Latin term for a historian who collects material"
      ko: "속격 compilātōris; 제3변화; 자료를 모으는 역사가에 대한 후기 라틴어 용어"
  - latin: digressio
    translation:
      en: digression, excursus
      ko: 여담, 곁길 이야기
    gender: f
    notes:
      en: "gen. digressiōnis; 3rd decl.; a narrative aside common in ancient historiography"
      ko: "속격 digressiōnis; 제3변화; 고대 역사 서술에서 흔한 서사적 곁길"
  - latin: praefatio
    translation:
      en: preface, introduction
      ko: 서문, 머리말
    gender: f
    notes:
      en: "gen. praefātiōnis; 3rd decl.; the historian's programmatic statement of method and purpose"
      ko: "속격 praefātiōnis; 제3변화; 역사가의 방법과 목적에 대한 강령적 진술"
