lesson: 15_Complete_Conjugation_System
lesson_number: 15
cefr: B1
categories:
- id: 151_grammar_terms
  label:
    en: 15.1 Grammar Terms (Metalanguage)
    ko: 15.1 문법 용어 (메타언어)
  type: vocabulary
  words:
  - latin: coniugatio
    translation:
      en: conjugation
      ko: 동사변화, 활용
    gender: f
    notes:
      en: 3rd declension; coniugatio, -onis
      ko: 제3변화 여성명사; coniugatio, -onis
  - latin: modus
    translation:
      en: mood (grammatical)
      ko: (문법적) 법
    gender: m
    notes:
      en: 2nd declension; modus, -i
      ko: 제2변화 남성명사; modus, -i
  - latin: tempus
    translation:
      en: tense, time
      ko: 시제, 시간
    gender: n
    notes:
      en: 3rd declension; tempus, temporis
      ko: 제3변화 중성명사; tempus, temporis
  - latin: vox
    translation:
      en: voice (grammatical); voice, word
      ko: (문법적) 태; 목소리, 단어
    gender: f
    notes:
      en: 3rd declension; vox, vocis
      ko: 제3변화 여성명사; vox, vocis
  - latin: indicativus
    translation:
      en: indicative (mood)
      ko: 직설법
    gender: m
    notes:
      en: Adjective used as noun; modus indicativus
      ko: 명사로 쓰이는 형용사; modus indicativus
  - latin: coniunctivus
    translation:
      en: subjunctive (mood)
      ko: 접속법
    gender: m
    notes:
      en: Adjective used as noun; modus coniunctivus
      ko: 명사로 쓰이는 형용사; modus coniunctivus
  - latin: imperativus
    translation:
      en: imperative (mood)
      ko: 명령법
    gender: m
    notes:
      en: Adjective used as noun; modus imperativus
      ko: 명사로 쓰이는 형용사; modus imperativus
  - latin: activus
    translation:
      en: active (voice)
      ko: 능동 (태)
    gender: m
    notes:
      en: vox activa = active voice
      ko: vox activa = 능동태
  - latin: passivus
    translation:
      en: passive (voice)
      ko: 수동 (태)
    gender: m
    notes:
      en: vox passiva = passive voice
      ko: vox passiva = 수동태
  - latin: praesens
    translation:
      en: present (tense)
      ko: 현재 (시제)
    gender: null
    notes:
      en: 3rd declension adjective; tempus praesens
      ko: 제3변화 형용사; tempus praesens
  - latin: imperfectum
    translation:
      en: imperfect (tense)
      ko: 미완료 (시제)
    gender: n
    notes:
      en: Neuter adjective as noun; tempus imperfectum
      ko: 중성 형용사의 명사화; tempus imperfectum
  - latin: perfectum
    translation:
      en: perfect (tense)
      ko: 완료 (시제)
    gender: n
    notes:
      en: Neuter adjective as noun; tempus perfectum
      ko: 중성 형용사의 명사화; tempus perfectum
  - latin: plusquamperfectum
    translation:
      en: pluperfect (tense)
      ko: 과거완료 (시제)
    gender: n
    notes:
      en: "More than perfect"; plus quam perfectum
      ko: "완료보다 더"; plus quam perfectum
  - latin: futurum
    translation:
      en: future (tense)
      ko: 미래 (시제)
    gender: n
    notes:
      en: Neuter adjective as noun; tempus futurum
      ko: 중성 형용사의 명사화; tempus futurum
  - latin: infinitivus
    translation:
      en: infinitive
      ko: 부정사, 부정법
    gender: m
    notes:
      en: modus infinitivus = infinitive mood
      ko: modus infinitivus = 부정법
  - latin: participium
    translation:
      en: participle
      ko: 분사
    gender: n
    notes:
      en: 2nd declension neuter; participium, -i
      ko: 제2변화 중성명사; participium, -i
  - latin: gerundium
    translation:
      en: gerund
      ko: 동명사
    gender: n
    notes:
      en: 2nd declension neuter; gerundium, -i
      ko: 제2변화 중성명사; gerundium, -i
  - latin: gerundivum
    translation:
      en: gerundive
      ko: 동형용사
    gender: n
    notes:
      en: 2nd declension neuter; gerundivum, -i
      ko: 제2변화 중성명사; gerundivum, -i
  - latin: supinum
    translation:
      en: supine
      ko: 목적분사
    gender: n
    notes:
      en: 2nd declension neuter; verbal noun (4th principal part)
      ko: 제2변화 중성명사; 동사적 명사 (제4기본형)
- id: 152_deponent_verbs
  label:
    en: 15.2 Deponent Verbs
