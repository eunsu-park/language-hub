lesson: sup_B2_Roman_History_Periods
lesson_number: 135
type: supplementary
topic: "Roman History Periods"
cefr: B2
categories:
- id: kingdom
  label:
    en: Kingdom (753-509 BC)
    ko: 왕정 (기원전 753-509년)
  type: vocabulary
  words:
  - latin: regnum
    translation:
      en: kingdom, royal power, reign
      ko: 왕국, 왕권, 통치
    gender: n
    notes:
      en: "gen. rēgnī; 2nd decl.; the period of the seven kings of Rome"
      ko: "속격 rēgnī; 제2변화; 로마 일곱 왕의 시대"
  - latin: rex
    translation:
      en: king
      ko: 왕
    gender: m
    notes:
      en: "gen. rēgis; 3rd decl.; Rome had seven kings (753-509 BC)"
      ko: "속격 rēgis; 제3변화; 로마에는 일곱 왕이 있었음 (기원전 753-509)"
  - latin: Romulus
    translation:
      en: Romulus, legendary founder and first king
      ko: 로물루스, 전설적 건국자이자 초대 왕
    gender: m
    notes:
      en: "gen. Rōmulī; 2nd decl.; twin brother of Remus"
      ko: "속격 Rōmulī; 제2변화; 레무스의 쌍둥이 형제"
  - latin: Tarquinius Superbus
    translation:
      en: Tarquinius the Proud, last king of Rome
      ko: 타르퀴니우스 수페르부스, 로마의 마지막 왕
    gender: m
    notes:
      en: "expelled in 509 BC; his tyranny led to the founding of the Republic"
      ko: "기원전 509년 추방됨; 그의 폭정이 공화정 수립으로 이어짐"
  - latin: interregnum
    translation:
      en: interregnum, gap between rulers
      ko: 공위 기간
    gender: n
    notes:
      en: "gen. interrēgnī; 2nd decl.; period without a king"
      ko: "속격 interrēgnī; 제2변화; 왕이 없는 기간"
  - latin: urbs condita
    translation:
      en: the founded city
      ko: 건설된 도시
    gender: f
    notes:
      en: "Rome founded in 753 BC by tradition; ab urbe condita = 'from the founding of the city'"
      ko: "전통적으로 기원전 753년에 건설된 로마; ab urbe condita = '도시 건설 이래'"
  - latin: gens
    translation:
      en: clan, family, people
      ko: 씨족, 가문
    gender: f
    notes:
      en: "gen. gentis; 3rd decl.; a group of families sharing a common ancestor"
      ko: "속격 gentis; 제3변화; 공동 조상을 공유하는 가족 집단"
  - latin: patres
    translation:
      en: fathers, senators, patricians
      ko: 원로, 원로원 의원, 귀족
    gender: m
    notes:
      en: "gen. patrum; 3rd decl. pl.; the original aristocratic senators"
      ko: "속격 patrum; 제3변화 복수; 원래의 귀족 원로원 의원"
  - latin: plebs
    translation:
      en: common people, plebeians
      ko: 평민
    gender: f
    notes:
      en: "gen. plēbis; 3rd decl.; the non-patrician citizen body"
      ko: "속격 plēbis; 제3변화; 비귀족 시민 집단"

- id: republic
  label:
    en: Republic (509-27 BC)
    ko: 공화정 (기원전 509-27년)
  type: vocabulary
  words:
  - latin: res publica
    translation:
      en: republic, commonwealth
      ko: 공화국
    gender: f
    notes:
      en: "lit. 'public affair'; the Republican system of government"
      ko: "직역 '공공의 일'; 공화정 체제"
  - latin: secessio plebis
    translation:
      en: secession of the plebs
      ko: 평민의 철수
    gender: f
    notes:
      en: "the plebs withdrew from Rome to force political concessions; five secessions recorded"
      ko: "평민이 정치적 양보를 강요하기 위해 로마에서 철수; 다섯 차례 기록됨"
  - latin: leges duodecim tabularum
    translation:
      en: Laws of the Twelve Tables
      ko: 12표법
    gender: f
    notes:
      en: "c. 450 BC; first codification of Roman law; basis of ius civile"
      ko: "기원전 약 450년; 로마법의 최초 성문화; 시민법의 기초"
  - latin: bellum Punicum
    translation:
      en: Punic War
      ko: 포에니 전쟁
    gender: n
    notes:
      en: "three wars with Carthage: 264-241, 218-201, 149-146 BC"
      ko: "카르타고와의 세 차례 전쟁: 기원전 264-241, 218-201, 149-146"
  - latin: Hannibal
    translation:
      en: Hannibal, Carthaginian general
      ko: 한니발, 카르타고의 장군
    gender: m
    notes:
      en: "gen. Hannibalis; 3rd decl.; crossed the Alps in 218 BC"
      ko: "속격 Hannibalis; 제3변화; 기원전 218년 알프스를 넘음"
  - latin: Scipio
    translation:
      en: Scipio Africanus
      ko: 스키피오 아프리카누스
    gender: m
    notes:
      en: "gen. Scipiōnis; 3rd decl.; defeated Hannibal at Zama (202 BC)"
      ko: "속격 Scipiōnis; 제3변화; 자마 전투에서 한니발을 격파 (기원전 202)"
  - latin: bellum sociale
    translation:
      en: Social War (War of the Allies)
      ko: 동맹시 전쟁
    gender: n
    notes:
      en: "91-88 BC; Italian allies fought for Roman citizenship"
      ko: "기원전 91-88년; 이탈리아 동맹국들이 로마 시민권을 위해 싸움"
  - latin: dictatura
    translation:
      en: dictatorship
      ko: 독재관직
    gender: f
    notes:
      en: "gen. dictātūrae; 1st decl.; Sulla's and Caesar's dictatorships"
      ko: "속격 dictātūrae; 제1변화; 술라와 카이사르의 독재"
  - latin: triumviratus
    translation:
      en: triumvirate, rule of three men
      ko: 삼두 정치
    gender: m
    notes:
      en: "gen. triumvirātūs; 4th decl.; First (Caesar, Pompey, Crassus) and Second (Octavian, Antony, Lepidus)"
      ko: "속격 triumvirātūs; 제4변화; 제1차 (카이사르, 폼페이우스, 크라수스), 제2차 (옥타비아누스, 안토니우스, 레피두스)"
  - latin: proscriptio
    translation:
      en: proscription, posting of names for execution
      ko: 추방령, 처형 명단 공시
    gender: f
    notes:
      en: "gen. prōscrīptiōnis; 3rd decl.; Sulla's and the Second Triumvirate's lists"
      ko: "속격 prōscrīptiōnis; 제3변화; 술라와 제2차 삼두 정치의 명단"
  - latin: bellum civile
    translation:
      en: civil war
      ko: 내전
    gender: n
    notes:
      en: "wars between Marius and Sulla, Caesar and Pompey, Octavian and Antony"
      ko: "마리우스와 술라, 카이사르와 폼페이우스, 옥타비아누스와 안토니우스 사이의 전쟁"
  - latin: senatus populusque Romanus
    translation:
      en: the Senate and People of Rome (SPQR)
      ko: 로마 원로원과 시민 (SPQR)
    gender: m
    notes:
      en: "the official designation of the Roman state"
      ko: "로마 국가의 공식 명칭"
  - latin: lex agraria
    translation:
      en: agrarian law, land reform law
      ko: 토지법, 농지 개혁법
    gender: f
    notes:
      en: "contested land redistribution laws; the Gracchi brothers' reforms"
      ko: "논쟁적 토지 재분배법; 그라쿠스 형제의 개혁"

- id: empire
  label:
    en: Empire (27 BC - 476 AD)
    ko: 제정 (기원전 27년 - 서기 476년)
  type: vocabulary
  words:
  - latin: principatus
    translation:
      en: principate, rule of the first citizen
      ko: 원수정, 제1시민의 통치
    gender: m
    notes:
      en: "gen. prīncipātūs; 4th decl.; Augustus to Diocletian (27 BC - 284 AD)"
      ko: "속격 prīncipātūs; 제4변화; 아우구스투스부터 디오클레티아누스까지 (기원전 27 - 서기 284)"
  - latin: dominatus
    translation:
      en: dominate, absolute rule
      ko: 전제정, 절대 통치
    gender: m
    notes:
      en: "gen. dominātūs; 4th decl.; Diocletian to the fall of Rome (284-476 AD)"
      ko: "속격 dominātūs; 제4변화; 디오클레티아누스부터 로마 몰락까지 (서기 284-476)"
  - latin: princeps
    translation:
      en: first citizen, emperor
      ko: 제1시민, 황제
    gender: m
    notes:
      en: "gen. prīncipis; 3rd decl.; the emperor's formal title under the Principate"
      ko: "속격 prīncipis; 제3변화; 원수정 하에서 황제의 공식 칭호"
  - latin: imperator
    translation:
      en: commander, emperor
      ko: 최고 사령관, 황제
    gender: m
    notes:
      en: "gen. imperātōris; 3rd decl.; originally a military title; became 'emperor'"
      ko: "속격 imperātōris; 제3변화; 원래 군사 칭호; '황제'가 됨"
  - latin: Augustus
    translation:
      en: Augustus, revered one
      ko: 아우구스투스, 존엄한 자
    gender: m
    notes:
      en: "gen. Augustī; 2nd decl.; honorary title of the first emperor (27 BC)"
      ko: "속격 Augustī; 제2변화; 초대 황제의 존호 (기원전 27년)"
  - latin: Caesar
    translation:
      en: Caesar, imperial title
      ko: 카이사르, 황제 칭호
    gender: m
    notes:
      en: "gen. Caesaris; 3rd decl.; became a title for the junior co-emperor"
      ko: "속격 Caesaris; 제3변화; 하위 공동 황제의 칭호가 됨"
  - latin: pax Romana
    translation:
      en: Roman Peace
      ko: 로마의 평화
    gender: f
    notes:
      en: "period of relative peace from Augustus to Marcus Aurelius (27 BC - 180 AD)"
      ko: "아우구스투스부터 마르쿠스 아우렐리우스까지의 비교적 평화로운 시기 (기원전 27 - 서기 180)"
  - latin: limes
    translation:
      en: frontier, boundary, fortified border
      ko: 국경, 경계, 방벽
    gender: m
    notes:
      en: "gen. līmitis; 3rd decl.; the Roman frontier defense system"
      ko: "속격 līmitis; 제3변화; 로마의 변경 방어 체계"
  - latin: praetorium
    translation:
      en: praetorium, general's headquarters
      ko: 집정관 사령부
    gender: n
    notes:
      en: "gen. praetōriī; 2nd decl.; also the residence of a provincial governor"
      ko: "속격 praetōriī; 제2변화; 속주 총독의 관저도 의미"
  - latin: praefectus praetorio
    translation:
      en: praetorian prefect
      ko: 근위대 사령관
    gender: m
    notes:
      en: "commander of the Praetorian Guard; eventually the most powerful official"
      ko: "근위대 지휘관; 결국 가장 강력한 관리가 됨"

- id: key_events
  label:
    en: Key Events and Turning Points
    ko: 주요 사건과 전환점
  type: vocabulary
  words:
  - latin: incendium
    translation:
      en: fire, conflagration
      ko: 화재, 대화재
    gender: n
    notes:
      en: "gen. incendiī; 2nd decl.; the Great Fire of Rome (64 AD) under Nero"
      ko: "속격 incendiī; 제2변화; 네로 치하의 로마 대화재 (서기 64년)"
  - latin: eruptio
    translation:
      en: eruption, outbreak
      ko: 분출, 발발
    gender: f
    notes:
      en: "gen. ēruptiōnis; 3rd decl.; eruption of Vesuvius destroyed Pompeii (79 AD)"
      ko: "속격 ēruptiōnis; 제3변화; 베수비우스 분출로 폼페이 멸망 (서기 79년)"
  - latin: persecutio
    translation:
      en: persecution
      ko: 박해
    gender: f
    notes:
      en: "gen. persecūtiōnis; 3rd decl.; persecutions of Christians under various emperors"
      ko: "속격 persecūtiōnis; 제3변화; 여러 황제 치하의 기독교인 박해"
  - latin: conversio
    translation:
      en: conversion, turning
      ko: 개종, 전환
    gender: f
    notes:
      en: "gen. conversiōnis; 3rd decl.; Constantine's conversion to Christianity (312 AD)"
      ko: "속격 conversiōnis; 제3변화; 콘스탄티누스의 기독교 개종 (서기 312년)"
  - latin: invasio
    translation:
      en: invasion, incursion
      ko: 침입, 침략
    gender: f
    notes:
      en: "gen. invāsiōnis; 3rd decl.; barbarian invasions of the 4th-5th centuries"
      ko: "속격 invāsiōnis; 제3변화; 4-5세기 야만족의 침입"
  - latin: divisio imperii
    translation:
      en: division of the empire
      ko: 제국의 분할
    gender: f
    notes:
      en: "permanent east-west division under Theodosius I (395 AD)"
      ko: "테오도시우스 1세 하에서의 영구적 동서 분할 (서기 395년)"
  - latin: casus
    translation:
      en: fall, collapse, downfall
      ko: 멸망, 붕괴, 몰락
    gender: m
    notes:
      en: "gen. cāsūs; 4th decl.; the fall of the Western Roman Empire (476 AD)"
      ko: "속격 cāsūs; 제4변화; 서로마 제국의 멸망 (서기 476년)"
  - latin: foederati
    translation:
      en: allied peoples, federated barbarians
      ko: 동맹 민족, 연합 이민족
    gender: m
    notes:
      en: "gen. foederātōrum; 2nd decl. pl.; barbarian groups settled within the empire by treaty"
      ko: "속격 foederātōrum; 제2변화 복수; 조약에 의해 제국 내에 정착한 이민족 집단"
  - latin: decadentia
    translation:
      en: decline, decay
      ko: 쇠퇴
    gender: f
    notes:
      en: "gen. dēcadentiae; 1st decl.; the gradual weakening of Roman power"
      ko: "속격 dēcadentiae; 제1변화; 로마 권력의 점진적 약화"
  - latin: renovatio imperii
    translation:
      en: renewal of the empire
      ko: 제국의 갱신
    gender: f
    notes:
      en: "concept of restoring Roman imperial greatness; Justinian, Charlemagne"
      ko: "로마 제국의 위대함을 회복하는 개념; 유스티니아누스, 샤를마뉴"
