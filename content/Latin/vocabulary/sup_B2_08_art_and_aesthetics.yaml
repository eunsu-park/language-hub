categories:
- id: sculpture
  label:
    en: Sculpture and Architecture
    ko: 조각과 건축
  type: vocabulary
  words:
  - latin: sculptor
    translation:
      en: sculptor, carver
      ko: 조각가
    gender: m
    notes:
      en: "gen. sculptōris; 3rd decl.; from sculpere 'to carve'"
      ko: "속격 sculptōris; 제3변화; sculpere '조각하다'에서 유래"
  - latin: statua
    translation:
      en: statue
      ko: 조상, 동상
    gender: f
    notes:
      en: "gen. statuae; 1st decl.; a freestanding figure"
      ko: "속격 statuae; 제1변화; 독립 입상"
  - latin: signum
    translation:
      en: statue, figure, seal
      ko: 상, 형상, 인장
    gender: n
    notes:
      en: "gen. signī; 2nd decl.; also 'military standard'"
      ko: "속격 signī; 제2변화; '군기'의 의미도 있음"
  - latin: simulacrum
    translation:
      en: image, likeness, statue of a god
      ko: 형상, 모상, 신상
    gender: n
    notes:
      en: "gen. simulācrī; 2nd decl."
      ko: "속격 simulācrī; 제2변화"
  - latin: marmor
    translation:
      en: marble
      ko: 대리석
    gender: n
    notes:
      en: "gen. marmoris; 3rd decl.; preferred material for sculpture"
      ko: "속격 marmoris; 제3변화; 조각의 선호 재료"
  - latin: aes
    translation:
      en: bronze, copper
      ko: 청동, 구리
    gender: n
    notes:
      en: "gen. aeris; 3rd decl.; widely used for statues and coinage"
      ko: "속격 aeris; 제3변화; 조상과 주화에 널리 사용"
  - latin: columna
    translation:
      en: column, pillar
      ko: 기둥, 원주
    gender: f
    notes:
      en: "gen. columnae; 1st decl.; Doric, Ionic, Corinthian orders"
      ko: "속격 columnae; 제1변화; 도리스식, 이오니아식, 코린트식 양식"
  - latin: arcus
    translation:
      en: arch, triumphal arch
      ko: 아치, 개선문
    gender: m
    notes:
      en: "gen. arcūs; 4th decl.; a distinctive Roman architectural form"
      ko: "속격 arcūs; 제4변화; 특징적인 로마 건축 형태"
  - latin: fornix
    translation:
      en: arch, vault
      ko: 아치, 궁륭
    gender: m
    notes:
      en: "gen. fornicis; 3rd decl.; structural arch"
      ko: "속격 fornicis; 제3변화; 구조적 아치"
  - latin: basilica
    translation:
      en: basilica, public hall
      ko: 바실리카, 공공 회관
    gender: f
    notes:
      en: "gen. basilicae; 1st decl.; large hall for law courts and commerce"
      ko: "속격 basilicae; 제1변화; 법정과 상업을 위한 대형 회관"
  - latin: aedificium
    translation:
      en: building, edifice
      ko: 건물
    gender: n
    notes:
      en: "gen. aedificiī; 2nd decl."
      ko: "속격 aedificiī; 제2변화"
  - latin: caementum
    translation:
      en: rubble, concrete aggregate
      ko: 골재, 콘크리트 재료
    gender: n
    notes:
      en: "gen. caementī; 2nd decl.; Roman concrete (opus caementicium) revolutionized construction"
      ko: "속격 caementī; 제2변화; 로마 콘크리트(opus caementicium)가 건축에 혁명을 일으킴"

- id: painting
  label:
    en: Painting and Mosaic
    ko: 회화와 모자이크
  type: vocabulary
  words:
  - latin: pictor
    translation:
      en: painter
      ko: 화가
    gender: m
    notes:
      en: "gen. pictōris; 3rd decl.; from pingere 'to paint'"
      ko: "속격 pictōris; 제3변화; pingere '그리다'에서 유래"
  - latin: pictura
    translation:
      en: painting, picture
      ko: 그림, 회화
    gender: f
    notes:
      en: "gen. pictūrae; 1st decl."
      ko: "속격 pictūrae; 제1변화"
  - latin: tabula
    translation:
      en: panel, painting board, tablet
      ko: 판, 화판, 서판
    gender: f
    notes:
      en: "gen. tabulae; 1st decl.; tabula picta = 'painted panel'"
      ko: "속격 tabulae; 제1변화; tabula picta = '채색된 판'"
  - latin: color
    translation:
      en: color, hue, pigment
      ko: 색, 색조, 안료
    gender: m
    notes:
      en: "gen. colōris; 3rd decl."
      ko: "속격 colōris; 제3변화"
  - latin: pigmentum
    translation:
      en: pigment, paint, dye
      ko: 안료, 그림물감, 염료
    gender: n
    notes:
      en: "gen. pigmentī; 2nd decl."
      ko: "속격 pigmentī; 제2변화"
  - latin: tectorium
    translation:
      en: plaster, stucco, wall coating
      ko: 회반죽, 치장 벽토
    gender: n
    notes:
      en: "gen. tectōriī; 2nd decl.; the surface for fresco painting"
      ko: "속격 tectōriī; 제2변화; 프레스코 회화의 표면"
  - latin: musivum
    translation:
      en: mosaic, mosaic work
      ko: 모자이크
    gender: n
    notes:
      en: "gen. mūsīvī; 2nd decl.; opus mūsīvum = 'mosaic work'"
      ko: "속격 mūsīvī; 제2변화; opus mūsīvum = '모자이크 작업'"
  - latin: tessera
    translation:
      en: tile, mosaic piece, token
      ko: 타일, 모자이크 조각, 표
    gender: f
    notes:
      en: "gen. tesserae; 1st decl.; small cubes used in mosaics"
      ko: "속격 tesserae; 제1변화; 모자이크에 사용되는 작은 입방체"
  - latin: encaustum
    translation:
      en: encaustic painting (wax-based)
      ko: 밀랍 그림 기법
    gender: n
    notes:
      en: "gen. encaustī; 2nd decl.; Greek technique using heated wax and pigment"
      ko: "속격 encaustī; 제2변화; 가열된 밀랍과 안료를 사용한 그리스 기법"
  - latin: imago
    translation:
      en: image, portrait, likeness
      ko: 초상, 형상
    gender: f
    notes:
      en: "gen. imāginis; 3rd decl.; imāginēs maiōrum = 'ancestral portraits'"
      ko: "속격 imāginis; 제3변화; imāginēs maiōrum = '조상의 초상'"

- id: mosaic
  label:
    en: Mosaic Techniques
    ko: 모자이크 기법
  type: vocabulary
  words:
  - latin: opus tessellatum
    translation:
      en: tessellated work, mosaic of regular cubes
      ko: 테셀라투스 작업, 규칙적 입방체 모자이크
    gender: n
    notes:
      en: "geometric mosaic patterns made from uniform pieces"
      ko: "균일한 조각으로 만든 기하학적 모자이크 패턴"
  - latin: opus vermiculatum
    translation:
      en: worm-like mosaic, fine pictorial mosaic
      ko: 벌미쿨라투스 모자이크, 정밀 회화적 모자이크
    gender: n
    notes:
      en: "very fine tesserae used for detailed pictorial representations"
      ko: "정밀한 회화적 표현에 사용되는 매우 작은 테세라"
  - latin: opus sectile
    translation:
      en: cut-work, inlaid stone/marble
      ko: 세크틸레 작업, 석재/대리석 상감
    gender: n
    notes:
      en: "pieces of marble cut to fit a pattern, more expensive than tessellated"
      ko: "패턴에 맞게 자른 대리석 조각; 테셀라투스보다 비쌈"
  - latin: emblema
    translation:
      en: emblem, central mosaic panel
      ko: 엠블레마, 중앙 모자이크 패널
    gender: n
    notes:
      en: "gen. emblēmatis; 3rd decl.; Greek loanword; a prefabricated pictorial panel"
      ko: "속격 emblēmatis; 제3변화; 그리스어 차용어; 미리 제작된 회화적 패널"
  - latin: pavimentum
    translation:
      en: pavement, floor, paved surface
      ko: 포장, 바닥
    gender: n
    notes:
      en: "gen. pāvīmentī; 2nd decl.; from pāvīre 'to beat down'"
      ko: "속격 pāvīmentī; 제2변화; pāvīre '다지다'에서 유래"

- id: aesthetic_philosophy
  label:
    en: Aesthetic Philosophy and Concepts
    ko: 미학과 철학적 개념
  type: vocabulary
  words:
  - latin: ars
    translation:
      en: art, skill, craft, technique
      ko: 예술, 기술, 기예
    gender: f
    notes:
      en: "gen. artis; 3rd decl.; broader than modern 'art'; includes any learned skill"
      ko: "속격 artis; 제3변화; 현대의 '예술'보다 넓은 의미; 모든 학습된 기술 포함"
  - latin: artifex
    translation:
      en: artist, craftsman, master
      ko: 예술가, 장인, 명인
    gender: m
    notes:
      en: "gen. artificis; 3rd decl.; one skilled in an ars"
      ko: "속격 artificis; 제3변화; ars에 능숙한 자"
  - latin: opus
    translation:
      en: work, masterpiece, product
      ko: 작품, 걸작, 산물
    gender: n
    notes:
      en: "gen. operis; 3rd decl.; magnum opus = 'great work'"
      ko: "속격 operis; 제3변화; magnum opus = '대작'"
  - latin: decor
    translation:
      en: beauty, grace, seemliness
      ko: 아름다움, 우아함, 적합함
    gender: m
    notes:
      en: "gen. decōris; 3rd decl.; what is fitting and beautiful"
      ko: "속격 decōris; 제3변화; 적합하고 아름다운 것"
  - latin: ornamentum
    translation:
      en: ornament, decoration, embellishment
      ko: 장식, 꾸밈
    gender: n
    notes:
      en: "gen. ornāmentī; 2nd decl."
      ko: "속격 ornāmentī; 제2변화"
  - latin: proportio
    translation:
      en: proportion, ratio
      ko: 비례
    gender: f
    notes:
      en: "gen. prōportiōnis; 3rd decl.; mathematical harmony in art"
      ko: "속격 prōportiōnis; 제3변화; 예술에서의 수학적 조화"
  - latin: symmetria
    translation:
      en: symmetry, due proportion
      ko: 대칭, 적절한 비례
    gender: f
    notes:
      en: "gen. symmetriae; 1st decl.; Greek loanword; Vitruvius's key architectural concept"
      ko: "속격 symmetriae; 제1변화; 그리스어 차용어; 비트루비우스의 핵심 건축 개념"
  - latin: venustas
    translation:
      en: beauty, charm, elegance
      ko: 아름다움, 매력, 우아함
    gender: f
    notes:
      en: "gen. venustātis; 3rd decl.; one of Vitruvius's three principles (firmitas, utilitas, venustas)"
      ko: "속격 venustātis; 제3변화; 비트루비우스의 세 원칙 중 하나 (견고함, 유용함, 아름다움)"
  - latin: firmitas
    translation:
      en: firmness, structural soundness
      ko: 견고함, 구조적 안정
    gender: f
    notes:
      en: "gen. firmitātis; 3rd decl.; Vitruvian principle of structural integrity"
      ko: "속격 firmitātis; 제3변화; 비트루비우스의 구조적 건전성 원칙"
  - latin: utilitas
    translation:
      en: usefulness, functionality
      ko: 유용성, 기능성
    gender: f
    notes:
      en: "gen. ūtilitātis; 3rd decl.; Vitruvian principle of practical function"
      ko: "속격 ūtilitātis; 제3변화; 비트루비우스의 실용적 기능 원칙"
  - latin: elegantia
    translation:
      en: elegance, refinement, good taste
      ko: 우아함, 세련됨, 좋은 취향
    gender: f
    notes:
      en: "gen. elegantiae; 1st decl.; discerning taste in art and style"
      ko: "속격 elegantiae; 제1변화; 예술과 양식에서의 안목"
  - latin: imitatio
    translation:
      en: imitation, mimesis
      ko: 모방
    gender: f
    notes:
      en: "gen. imitātiōnis; 3rd decl.; central concept in ancient art theory"
      ko: "속격 imitātiōnis; 제3변화; 고대 예술 이론의 핵심 개념"
  - latin: pulchritudo
    translation:
      en: beauty, loveliness
      ko: 아름다움
    gender: f
    notes:
      en: "gen. pulchritūdinis; 3rd decl.; physical or moral beauty"
      ko: "속격 pulchritūdinis; 제3변화; 신체적 또는 도덕적 아름다움"
