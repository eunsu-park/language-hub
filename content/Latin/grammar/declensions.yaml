# Latin Noun Declension Paradigms
# All five declension groups with example nouns

declensions:
  # ============================================================
  # 1. FIRST DECLENSION (-A Stems)
  # ============================================================
  first:
    id: first
    label:
      en: "First Declension (-A Stems)"
      ko: "제1변화 (-A 어간)"
    gender: "mostly feminine (some masculine: nauta, poeta, agricola, pirata, incola)"
    cefr: A1
    description:
      en: "First declension nouns typically end in -a in the nominative singular and are mostly feminine. A small group of masculine nouns (mainly professions and natural roles) also belong here. The genitive singular -ae is the identifier for this declension."
      ko: "제1변화 명사는 주격 단수가 보통 -a로 끝나며 대부분 여성형이다. 소수의 남성 명사(주로 직업과 자연적 역할)도 여기에 속한다. 속격 단수 -ae가 이 변화의 식별자이다."
    paradigm:
      example_noun: "puella, -ae (f.) — girl"
      singular:
        nominativus: puella
        genetivus: puellae
        dativus: puellae
        accusativus: puellam
        ablativus: puellā
        vocativus: puella
      plural:
        nominativus: puellae
        genetivus: puellārum
        dativus: puellīs
        accusativus: puellās
        ablativus: puellīs
        vocativus: puellae
    notes:
      en: "Dative and ablative plural are always identical (-is). Genitive singular (-ae) and nominative plural (-ae) are identical in form — context distinguishes them."
      ko: "여격과 탈격 복수는 항상 동일(-is). 속격 단수(-ae)와 주격 복수(-ae)는 형태가 동일 — 문맥으로 구분한다."
    additional_examples:
      - noun: terra, -ae (f.)
        meaning: {en: land/earth, ko: 땅/지구}
      - noun: via, -ae (f.)
        meaning: {en: road/way, ko: 길}
      - noun: aqua, -ae (f.)
        meaning: {en: water, ko: 물}
      - noun: nauta, -ae (m.)
        meaning: {en: sailor, ko: 선원}
      - noun: agricola, -ae (m.)
        meaning: {en: farmer, ko: 농부}

  # ============================================================
  # 2. SECOND DECLENSION — MASCULINE (-US, -ER)
  # ============================================================
  second_masculine:
    id: second_masculine
    label:
      en: "Second Declension — Masculine (-US, -ER)"
      ko: "제2변화 — 남성 (-US, -ER)"
    gender: "masculine"
    cefr: A1
    description:
      en: "Second declension masculine nouns end in -us or -er in the nominative singular. The -er type splits into two sub-patterns: those that keep the -e- throughout (puer, pueri) and those that drop it (ager, agri). The genitive singular -i is the identifier."
      ko: "제2변화 남성 명사는 주격 단수가 -us 또는 -er로 끝난다. -er 유형은 두 하위 패턴으로 나뉜다: -e-를 유지하는 것(puer, pueri)과 탈락시키는 것(ager, agri). 속격 단수 -i가 식별자이다."
    paradigm:
      us_type:
        example_noun: "servus, -ī (m.) — slave/servant"
        singular:
          nominativus: servus
          genetivus: servī
          dativus: servō
          accusativus: servum
          ablativus: servō
          vocativus: serve
        plural:
          nominativus: servī
          genetivus: servōrum
          dativus: servīs
          accusativus: servōs
          ablativus: servīs
          vocativus: servī
      er_type_keeping_e:
        example_noun: "puer, puerī (m.) — boy"
        note:
          en: "The -e- is part of the stem (puer-) and remains in all forms."
          ko: "-e-가 어간(puer-)의 일부로 모든 형태에서 유지된다."
        singular:
          nominativus: puer
          genetivus: puerī
          dativus: puerō
          accusativus: puerum
          ablativus: puerō
          vocativus: puer
        plural:
          nominativus: puerī
          genetivus: puerōrum
          dativus: puerīs
          accusativus: puerōs
          ablativus: puerīs
          vocativus: puerī
      er_type_dropping_e:
        example_noun: "ager, agrī (m.) — field"
        note:
          en: "The -e- appears only in the nominative singular; the true stem is agr-. Check the genitive to find the stem."
          ko: "-e-는 주격 단수에서만 나타나고 진짜 어간은 agr-이다. 속격을 확인하여 어간을 찾는다."
        singular:
          nominativus: ager
          genetivus: agrī
          dativus: agrō
          accusativus: agrum
          ablativus: agrō
          vocativus: ager
        plural:
          nominativus: agrī
          genetivus: agrōrum
          dativus: agrīs
          accusativus: agrōs
          ablativus: agrīs
          vocativus: agrī
    notes:
      en: "The vocative singular of -us nouns ends in -e (serve!), except for nouns ending in -ius, which have vocative -ī (fīlī! from fīlius). The word 'deus' has irregular forms: nom. pl. dī/deī, gen. pl. deōrum/deum, dat./abl. pl. dīs/deīs."
      ko: "-us 명사의 호격 단수는 -e로 끝나지만(serve!), -ius로 끝나는 명사는 호격이 -ī이다(fīlī! ← fīlius). 'deus'는 불규칙 형태를 갖는다: 주격 복수 dī/deī, 속격 복수 deōrum/deum, 여격/탈격 복수 dīs/deīs."
    additional_examples:
      - noun: dominus, -ī (m.)
        meaning: {en: master/lord, ko: 주인}
      - noun: amīcus, -ī (m.)
        meaning: {en: friend, ko: 친구}
      - noun: liber, librī (m.)
        meaning: {en: book, ko: 책}
        note: "-er type dropping -e-"
      - noun: magister, magistrī (m.)
        meaning: {en: teacher, ko: 선생님}
        note: "-er type dropping -e-"
      - noun: vir, virī (m.)
        meaning: {en: man, ko: 남자}
        note: "irregular -ir type, declines like puer"

  # ============================================================
  # 3. SECOND DECLENSION — NEUTER (-UM)
  # ============================================================
  second_neuter:
    id: second_neuter
    label:
      en: "Second Declension — Neuter (-UM)"
      ko: "제2변화 — 중성 (-UM)"
    gender: "neuter"
    cefr: A1
    description:
      en: "Second declension neuter nouns end in -um in the nominative singular. They follow the same pattern as masculine -us nouns except: (1) nominative, accusative, and vocative are always identical, and (2) the plural of these three cases always ends in -a."
      ko: "제2변화 중성 명사는 주격 단수가 -um으로 끝난다. 남성 -us 명사와 같은 패턴이지만: (1) 주격, 대격, 호격이 항상 동일하고, (2) 이 세 격의 복수는 항상 -a로 끝난다."
    paradigm:
      example_noun: "bellum, -ī (n.) — war"
      singular:
        nominativus: bellum
        genetivus: bellī
        dativus: bellō
        accusativus: bellum
        ablativus: bellō
        vocativus: bellum
      plural:
        nominativus: bella
        genetivus: bellōrum
        dativus: bellīs
        accusativus: bella
        ablativus: bellīs
        vocativus: bella
    notes:
      en: "The neuter rule (nom. = acc. = voc.) applies in ALL declensions. In the 2nd declension neuter, genitive, dative, and ablative endings are identical to the masculine."
      ko: "중성 규칙(주격 = 대격 = 호격)은 모든 변화에 적용된다. 제2변화 중성에서 속격, 여격, 탈격 어미는 남성과 동일하다."
    additional_examples:
      - noun: dōnum, -ī (n.)
        meaning: {en: gift, ko: 선물}
      - noun: verbum, -ī (n.)
        meaning: {en: word, ko: 말/단어}
      - noun: templum, -ī (n.)
        meaning: {en: temple, ko: 신전}
      - noun: cōnsilium, -ī (n.)
        meaning: {en: plan/advice, ko: 계획/조언}

  # ============================================================
  # 4. THIRD DECLENSION — CONSONANT STEMS
  # ============================================================
  third_consonant:
    id: third_consonant
    label:
      en: "Third Declension — Consonant Stems"
      ko: "제3변화 — 자음 어간"
    gender: "masculine, feminine, or neuter (varies by noun)"
    cefr: A2
    description:
      en: "Third declension consonant-stem nouns show a stem change between nominative and genitive singular. The genitive singular ending -is is the identifier. The nominative singular varies widely; always learn the genitive to find the true stem. Consonant stems are classified by their final stem consonant."
      ko: "제3변화 자음 어간 명사는 주격 단수와 속격 단수 사이에 어간 변화를 보인다. 속격 단수 어미 -is가 식별자이다. 주격 단수는 매우 다양하므로 반드시 속격을 배워 진짜 어간을 찾아야 한다. 자음 어간은 마지막 어간 자음에 따라 분류된다."
    paradigm:
      c_stem:
        example_noun: "rēx, rēgis (m.) — king"
        stem_note:
          en: "Stem: rēg- (c-stem: the g appears before -s in nominative as x)"
          ko: "어간: rēg- (c-어간: g가 주격에서 -s 앞에 x로 나타남)"
        singular:
          nominativus: rēx
          genetivus: rēgis
          dativus: rēgī
          accusativus: rēgem
          ablativus: rēge
          vocativus: rēx
        plural:
          nominativus: rēgēs
          genetivus: rēgum
          dativus: rēgibus
          accusativus: rēgēs
          ablativus: rēgibus
          vocativus: rēgēs
      t_stem:
        example_noun: "mīles, mīlitis (m.) — soldier"
        stem_note:
          en: "Stem: mīlit- (t-stem: the -t drops before -s in nominative)"
          ko: "어간: mīlit- (t-어간: -t가 주격에서 -s 앞에 탈락)"
        singular:
          nominativus: mīles
          genetivus: mīlitis
          dativus: mīlitī
          accusativus: mīlitem
          ablativus: mīlite
          vocativus: mīles
        plural:
          nominativus: mīlitēs
          genetivus: mīlitum
          dativus: mīlitibus
          accusativus: mīlitēs
          ablativus: mīlitibus
          vocativus: mīlitēs
      s_stem_neuter:
        example_noun: "corpus, corporis (n.) — body"
        stem_note:
          en: "Stem: corpor- (s-stem: original *corpos- → the -s between vowels became -r by rhotacism)"
          ko: "어간: corpor- (s-어간: 원래 *corpos- → 모음 사이의 -s가 r음화로 -r이 됨)"
        singular:
          nominativus: corpus
          genetivus: corporis
          dativus: corporī
          accusativus: corpus
          ablativus: corpore
          vocativus: corpus
        plural:
          nominativus: corpora
          genetivus: corporum
          dativus: corporibus
          accusativus: corpora
          ablativus: corporibus
          vocativus: corpora
      n_stem_neuter:
        example_noun: "nōmen, nōminis (n.) — name"
        stem_note:
          en: "Stem: nōmin- (n-stem: the nominative drops the final -n of the stem and shows -en)"
          ko: "어간: nōmin- (n-어간: 주격에서 어간의 마지막 -n이 탈락하고 -en으로 나타남)"
        singular:
          nominativus: nōmen
          genetivus: nōminis
          dativus: nōminī
          accusativus: nōmen
          ablativus: nōmine
          vocativus: nōmen
        plural:
          nominativus: nōmina
          genetivus: nōminum
          dativus: nōminibus
          accusativus: nōmina
          ablativus: nōminibus
          vocativus: nōmina
    notes:
      en: "Key consonant-stem markers: gen. pl. -um (not -ium), nom./acc. neuter pl. -a (not -ia), abl. sg. -e (not -i). These distinguish consonant stems from i-stems."
      ko: "자음 어간 핵심 표지: 속격 복수 -um (-ium 아님), 중성 주격/대격 복수 -a (-ia 아님), 탈격 단수 -e (-i 아님). 이것들이 자음 어간을 i-어간과 구별한다."
    additional_examples:
      - noun: dux, ducis (m.)
        meaning: {en: leader/general, ko: 지도자/장군}
        stem: "duc- (c-stem)"
      - noun: virtūs, virtūtis (f.)
        meaning: {en: courage/virtue, ko: 용기/덕}
        stem: "virtūt- (t-stem)"
      - noun: flūmen, flūminis (n.)
        meaning: {en: river, ko: 강}
        stem: "flūmin- (n-stem)"
      - noun: tempus, temporis (n.)
        meaning: {en: time, ko: 시간}
        stem: "tempor- (s-stem)"

  # ============================================================
  # 5. THIRD DECLENSION — I-STEMS
  # ============================================================
  third_i_stem:
    id: third_i_stem
    label:
      en: "Third Declension — I-Stems"
      ko: "제3변화 — I-어간"
    gender: "masculine/feminine or neuter"
    cefr: A2
    description:
      en: "Third declension i-stem nouns retain an -i- in certain forms, distinguishing them from consonant stems. Masculine/feminine i-stems show -ium in gen. pl. and -ī in abl. sg. (sometimes -e). Neuter i-stems show -ium in gen. pl., -ī in abl. sg., and -ia in nom./acc. pl. Identifying i-stems requires knowing the rules: parisyllabics (same syllable count in nom. and gen.) and nouns whose stem ends in two consonants."
      ko: "제3변화 i-어간 명사는 특정 형태에서 -i-를 유지하여 자음 어간과 구별된다. 남성/여성 i-어간은 속격 복수 -ium, 탈격 단수 -ī(때로 -e)를 보인다. 중성 i-어간은 속격 복수 -ium, 탈격 단수 -ī, 주격/대격 복수 -ia를 보인다. i-어간 식별에는 규칙 숙지가 필요하다: 등음절(주격과 속격의 음절 수가 같음)과 어간이 두 자음으로 끝나는 명사."
    paradigm:
      mf_i_stem:
        example_noun: "cīvis, cīvis (m./f.) — citizen"
        note:
          en: "Parisyllabic i-stem: same number of syllables in nom. sg. (cī-vis) and gen. sg. (cī-vis)."
          ko: "등음절 i-어간: 주격 단수(cī-vis)와 속격 단수(cī-vis)의 음절 수가 같다."
        singular:
          nominativus: cīvis
          genetivus: cīvis
          dativus: cīvī
          accusativus: cīvem
          ablativus: cīve / cīvī
          vocativus: cīvis
        plural:
          nominativus: cīvēs
          genetivus: cīvium
          dativus: cīvibus
          accusativus: cīvēs / cīvīs
          ablativus: cīvibus
          vocativus: cīvēs
      neuter_i_stem:
        example_noun: "mare, maris (n.) — sea"
        note:
          en: "Neuter i-stem: abl. sg. -ī, nom./acc. pl. -ia, gen. pl. -ium."
          ko: "중성 i-어간: 탈격 단수 -ī, 주격/대격 복수 -ia, 속격 복수 -ium."
        singular:
          nominativus: mare
          genetivus: maris
          dativus: marī
          accusativus: mare
          ablativus: marī
          vocativus: mare
        plural:
          nominativus: maria
          genetivus: marium
          dativus: maribus
          accusativus: maria
          ablativus: maribus
          vocativus: maria
      neuter_i_stem_al:
        example_noun: "animal, animālis (n.) — animal"
        note:
          en: "Neuter i-stem in -al/-ar/-e: the nominative drops the stem-final -i. Stem: animāli-."
          ko: "중성 i-어간 -al/-ar/-e: 주격에서 어간 끝의 -i가 탈락한다. 어간: animāli-."
        singular:
          nominativus: animal
          genetivus: animālis
          dativus: animālī
          accusativus: animal
          ablativus: animālī
          vocativus: animal
        plural:
          nominativus: animālia
          genetivus: animālium
          dativus: animālibus
          accusativus: animālia
          ablativus: animālibus
          vocativus: animālia
    i_stem_identification:
      en: >
        How to identify i-stems: (1) Parisyllabics — nouns with the same number of
        syllables in nom. and gen. sg. (cīvis, cīvis; nūbēs, nūbis). (2) Nouns whose
        stem (found from genitive minus -is) ends in two consonants (urbs, urbis — stem
        urb-; mōns, montis — stem mont-). (3) Neuter nouns ending in -e, -al, or -ar
        (mare, animal, exemplar).
      ko: >
        i-어간 식별법: (1) 등음절 — 주격과 속격 단수의 음절 수가 같은 명사(cīvis,
        cīvis; nūbēs, nūbis). (2) 어간(속격에서 -is를 뺀 것)이 두 자음으로 끝나는
        명사(urbs, urbis — 어간 urb-; mōns, montis — 어간 mont-). (3) -e, -al, -ar로
        끝나는 중성 명사(mare, animal, exemplar).
    additional_examples:
      - noun: ignis, ignis (m.)
        meaning: {en: fire, ko: 불}
        type: "parisyllabic m/f i-stem"
      - noun: nūbēs, nūbis (f.)
        meaning: {en: cloud, ko: 구름}
        type: "parisyllabic m/f i-stem"
      - noun: urbs, urbis (f.)
        meaning: {en: city, ko: 도시}
        type: "two-consonant stem i-stem"
      - noun: mōns, montis (m.)
        meaning: {en: mountain, ko: 산}
        type: "two-consonant stem i-stem"
      - noun: exemplar, exemplāris (n.)
        meaning: {en: example/model, ko: 본보기}
        type: "neuter -ar i-stem"

  # ============================================================
  # 6. FOURTH DECLENSION (-US / -U)
  # ============================================================
  fourth:
    id: fourth
    label:
      en: "Fourth Declension (-U Stems)"
      ko: "제4변화 (-U 어간)"
    gender: "mostly masculine -us (some feminine: manus, domus, tribus); neuter -u"
    cefr: A2
    description:
      en: "Fourth declension nouns have stems ending in -u. Masculine and feminine nouns end in -us in the nominative singular; neuter nouns end in -u. The genitive singular -ūs is the identifier. This declension is smaller than the first three but includes important nouns like manus (hand), exercitus (army), and senatus (senate)."
      ko: "제4변화 명사는 -u로 끝나는 어간을 가진다. 남성과 여성 명사는 주격 단수가 -us로, 중성 명사는 -u로 끝난다. 속격 단수 -ūs가 식별자이다. 이 변화는 처음 세 변화보다 작지만 manus(손), exercitus(군대), senatus(원로원) 같은 중요한 명사를 포함한다."
    paradigm:
      us_type:
        example_noun: "manus, -ūs (f.) — hand"
        singular:
          nominativus: manus
          genetivus: manūs
          dativus: manuī
          accusativus: manum
          ablativus: manū
          vocativus: manus
        plural:
          nominativus: manūs
          genetivus: manuum
          dativus: manibus
          accusativus: manūs
          ablativus: manibus
          vocativus: manūs
      u_type_neuter:
        example_noun: "cornū, -ūs (n.) — horn, wing (of army)"
        note:
          en: "Neuter fourth declension: nom., acc., and voc. are identical (-u sg., -ua pl.). Very few nouns belong here."
          ko: "중성 제4변화: 주격, 대격, 호격이 동일(-u 단수, -ua 복수). 매우 적은 명사가 여기에 속한다."
        singular:
          nominativus: cornū
          genetivus: cornūs
          dativus: cornū
          accusativus: cornū
          ablativus: cornū
          vocativus: cornū
        plural:
          nominativus: cornua
          genetivus: cornuum
          dativus: cornibus
          accusativus: cornua
          ablativus: cornibus
          vocativus: cornua
    notes:
      en: "Domus (house) is partly 4th, partly 2nd declension: gen. sg. domūs, abl. sg. domō (2nd), acc. sg. domum, loc. domī, acc. pl. domōs/domūs. The dative/ablative plural ending is -ibus (not -ubus), except for a few nouns like artus and tribus which use -ubus to avoid ambiguity."
      ko: "Domus(집)는 제4변화와 제2변화가 혼합된다: 속격 단수 domūs, 탈격 단수 domō(제2변화), 대격 단수 domum, 처격 domī, 대격 복수 domōs/domūs. 여격/탈격 복수 어미는 -ibus(-ubus 아님)이나, artus, tribus 같은 일부 명사는 혼동을 피하기 위해 -ubus를 사용한다."
    additional_examples:
      - noun: exercitus, -ūs (m.)
        meaning: {en: army, ko: 군대}
      - noun: senātus, -ūs (m.)
        meaning: {en: senate, ko: 원로원}
      - noun: frūctus, -ūs (m.)
        meaning: {en: fruit/enjoyment, ko: 과일/향유}
      - noun: genū, -ūs (n.)
        meaning: {en: knee, ko: 무릎}
      - noun: domus, -ūs (f.)
        meaning: {en: house/home, ko: 집}
        note: "mixed 4th/2nd declension"

  # ============================================================
  # 7. FIFTH DECLENSION (-E Stems)
  # ============================================================
  fifth:
    id: fifth
    label:
      en: "Fifth Declension (-E Stems)"
      ko: "제5변화 (-E 어간)"
    gender: "mostly feminine (diēs is masculine or feminine)"
    cefr: A2
    description:
      en: "Fifth declension nouns have stems ending in -e and are mostly feminine. This is the smallest declension. The genitive singular -eī (or -ēī) is the identifier. Only rēs and diēs have complete plural forms; most other fifth declension nouns lack the plural."
      ko: "제5변화 명사는 -e로 끝나는 어간을 가지며 대부분 여성형이다. 가장 작은 변화이다. 속격 단수 -eī(또는 -ēī)가 식별자이다. rēs와 diēs만 완전한 복수형을 가지며, 다른 제5변화 명사 대부분은 복수가 없다."
    paradigm:
      res:
        example_noun: "rēs, reī (f.) — thing, matter, affair"
        singular:
          nominativus: rēs
          genetivus: reī
          dativus: reī
          accusativus: rem
          ablativus: rē
          vocativus: rēs
        plural:
          nominativus: rēs
          genetivus: rērum
          dativus: rēbus
          accusativus: rēs
          ablativus: rēbus
          vocativus: rēs
      dies:
        example_noun: "diēs, diēī (m./f.) — day"
        note:
          en: "Diēs is masculine when meaning a specific/appointed day, feminine when meaning a period/deadline or in the general sense. The genitive/dative singular -ēī has three syllables."
          ko: "Diēs는 특정/지정된 날을 의미할 때 남성, 기간/기한이나 일반적 의미일 때 여성이다. 속격/여격 단수 -ēī는 세 음절이다."
        singular:
          nominativus: diēs
          genetivus: diēī
          dativus: diēī
          accusativus: diem
          ablativus: diē
          vocativus: diēs
        plural:
          nominativus: diēs
          genetivus: diērum
          dativus: diēbus
          accusativus: diēs
          ablativus: diēbus
          vocativus: diēs
    notes:
      en: "The nominative singular and plural are identical (rēs / rēs; diēs / diēs) — context and verb agreement distinguish them. Common compounds of rēs: rēs pūblica (republic/state), rēs gestae (deeds/achievements), rēs novae (revolution)."
      ko: "주격 단수와 복수가 동일하다(rēs / rēs; diēs / diēs) — 문맥과 동사 일치로 구분한다. rēs의 흔한 합성어: rēs pūblica(공화국/국가), rēs gestae(업적), rēs novae(혁명)."
    additional_examples:
      - noun: spēs, speī (f.)
        meaning: {en: hope, ko: 희망}
      - noun: fidēs, fideī (f.)
        meaning: {en: faith/trust, ko: 신뢰/믿음}
      - noun: faciēs, faciēī (f.)
        meaning: {en: face/appearance, ko: 얼굴/외모}
      - noun: merīdiēs, merīdiēī (m.)
        meaning: {en: midday/noon, ko: 정오}
