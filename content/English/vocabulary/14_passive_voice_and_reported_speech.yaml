lesson: 14_Passive_Voice_and_Reported_Speech
lesson_number: 14
cefr: B1
categories:
- id: 11_passive_voice
  label:
    en: "1.1 Passive Voice"
    ko: "1.1 수동태"
  type: vocabulary
  words:
  - english: active voice
    translation:
      en: a sentence where the subject performs the action
      ko: 능동태
    gender: null
  - english: passive voice
    translation:
      en: a sentence where the subject receives the action (be + past participle)
      ko: 수동태
    gender: null
  - english: agent
    translation:
      en: the doer of the action (introduced by 'by' in passive)
      ko: 행위자
    gender: null
  - english: by
    translation:
      en: preposition showing who performed the action in passive sentences
      ko: ~에 의해
    gender: null
  - english: is made
    translation:
      en: present passive of make
      ko: 만들어지다
    gender: null
  - english: was built
    translation:
      en: past passive of build
      ko: 지어졌다
    gender: null
  - english: is being repaired
    translation:
      en: present continuous passive
      ko: 수리되고 있다
    gender: null
  - english: has been done
    translation:
      en: present perfect passive
      ko: 완료되었다
    gender: null
  - english: will be finished
    translation:
      en: future passive
      ko: 끝날 것이다
    gender: null
  - english: can be seen
    translation:
      en: modal passive
      ko: 볼 수 있다
    gender: null
  - english: is known for
    translation:
      en: recognized because of
      ko: ~으로 알려져 있다
    gender: null
  - english: is called
    translation:
      en: given the name of
      ko: ~라고 불리다
    gender: null
  - english: is made of
    translation:
      en: composed of (material visible)
      ko: ~으로 만들어지다
    gender: null
  - english: is used for
    translation:
      en: serves the purpose of
      ko: ~에 사용되다
    gender: null
  - english: is located
    translation:
      en: situated in a particular place
      ko: ~에 위치해 있다
    gender: null
  - english: is considered
    translation:
      en: regarded or thought of as
      ko: ~으로 여겨지다
    gender: null
- id: 12_reported_speech
  label:
    en: "1.2 Reported Speech"
    ko: "1.2 간접 화법"
  type: vocabulary
  words:
  - english: direct speech
    translation:
      en: the exact words someone said, in quotation marks
      ko: 직접 화법
    gender: null
  - english: reported speech
    translation:
      en: telling what someone said without using their exact words
      ko: 간접 화법
    gender: null
    notes:
      en: Also called indirect speech
      ko: 간접 발화라고도 함
  - english: backshifting
    translation:
      en: changing the tense back one step in reported speech
      ko: 시제 후퇴
    gender: null
    notes:
      en: "present → past, past → past perfect, will → would"
      ko: "현재 → 과거, 과거 → 과거완료, will → would"
  - english: quotation marks
    translation:
      en: punctuation marks (" ") used for direct speech
      ko: 따옴표
    gender: null
- id: 13_reporting_verbs
  label:
    en: "1.3 Reporting Verbs"
    ko: "1.3 전달 동사"
  type: vocabulary
  words:
  - english: say
    translation:
      en: to speak words (not followed directly by a person)
      ko: 말하다
    gender: null
    notes:
      en: "'She said that...' (NOT 'She said me that...')"
      ko: "'She said that...' ('She said me that...'이 아님)"
  - english: tell
    translation:
      en: to communicate to a specific person (followed by a person)
      ko: 말하다 (누구에게)
    gender: null
    notes:
      en: "'She told me that...' (NOT 'She told that...')"
      ko: "'She told me that...' ('She told that...'이 아님)"
  - english: ask
    translation:
      en: to request information or action
      ko: 묻다 / 요청하다
    gender: null
  - english: explain
    translation:
      en: to make something clear or understandable
      ko: 설명하다
    gender: null
  - english: suggest
    translation:
      en: to propose an idea
      ko: 제안하다
    gender: null
  - english: advise
    translation:
      en: to recommend a course of action
      ko: 조언하다
    gender: null
  - english: warn
    translation:
      en: to alert about possible danger
      ko: 경고하다
    gender: null
  - english: promise
    translation:
      en: to commit to doing something
      ko: 약속하다
    gender: null
  - english: deny
    translation:
      en: to say something is not true
      ko: 부인하다
    gender: null
  - english: admit
    translation:
      en: to confess that something is true
      ko: 인정하다
    gender: null
  - english: claim
    translation:
      en: to state something is true (possibly without proof)
      ko: 주장하다
    gender: null
  - english: complain
    translation:
      en: to express dissatisfaction
      ko: 불평하다
    gender: null
  - english: mention
    translation:
      en: to refer to briefly
      ko: 언급하다
    gender: null
  - english: announce
    translation:
      en: to make something known publicly
      ko: 발표하다
    gender: null
  - english: agree
    translation:
      en: to have the same opinion
      ko: 동의하다
    gender: null
  - english: refuse
    translation:
      en: to say no to
      ko: 거절하다
    gender: null
  - english: remind
    translation:
      en: to help someone remember
      ko: 상기시키다
    gender: null
  - english: encourage
    translation:
      en: to give support and confidence
      ko: 격려하다
    gender: null
