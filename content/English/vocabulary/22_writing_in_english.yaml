lesson: 22_Writing_in_English
lesson_number: 22
cefr: B2
categories:
- id: 11_writing_types
  label:
    en: "1.1 Writing Types and Structure"
    ko: "1.1 글쓰기 유형과 구조"
  type: vocabulary
  words:
  - english: essay
    translation:
      en: a written composition on a specific topic
      ko: 에세이
    gender: null
  - english: thesis statement
    translation:
      en: the main argument of an essay, usually at the end of the introduction
      ko: 논제문 (에세이의 주장)
    gender: null
  - english: introduction
    translation:
      en: the opening section of an essay or text
      ko: 서론
    gender: null
  - english: body paragraph
    translation:
      en: a middle section of an essay that develops a main point
      ko: 본론 문단
    gender: null
  - english: conclusion
    translation:
      en: the final section that summarizes and wraps up
      ko: 결론
    gender: null
  - english: hook
    translation:
      en: an attention-grabbing opening sentence
      ko: 도입부 (독자의 관심을 끄는 문장)
    gender: null
  - english: topic sentence
    translation:
      en: the first sentence of a paragraph stating its main idea
      ko: 주제문
    gender: null
  - english: supporting evidence
    translation:
      en: facts, data, or examples that back up the main point
      ko: 뒷받침하는 증거
    gender: null
  - english: transition word
    translation:
      en: a word or phrase connecting ideas between sentences or paragraphs
      ko: 전환어
    gender: null
  - english: outline
    translation:
      en: a structured plan for a piece of writing
      ko: 개요
    gender: null
  - english: draft
    translation:
      en: a preliminary version of a text
      ko: 초안
    gender: null
  - english: proofread
    translation:
      en: to read carefully to find and correct errors
      ko: 교정하다
    gender: null
  - english: edit
    translation:
      en: to revise and improve a written text
      ko: 편집하다
    gender: null
  - english: revise
    translation:
      en: to change and improve a piece of writing
      ko: 수정하다
    gender: null
- id: 12_email_writing
  label:
    en: "1.2 Email Writing"
    ko: "1.2 이메일 작성"
  type: vocabulary
  words:
  - english: subject line
    translation:
      en: the topic of an email, shown in the header
      ko: 제목란
    gender: null
  - english: greeting
    translation:
      en: the opening salutation of an email or letter
      ko: 인사말
    gender: null
  - english: sign-off
    translation:
      en: the closing phrase before your name
      ko: 맺음말
    gender: null
  - english: attachment
    translation:
      en: a file sent with an email
      ko: 첨부 파일
    gender: null
  - english: recipient
    translation:
      en: the person who receives the email
      ko: 수신인
    gender: null
  - english: CC (carbon copy)
    translation:
      en: sending a copy of an email to additional people
      ko: 참조
    gender: null
  - english: formal
    translation:
      en: following official or professional conventions
      ko: 격식체의
    gender: null
  - english: informal
    translation:
      en: casual, not following strict conventions
      ko: 비격식체의
    gender: null
  - english: "Dear Sir/Madam"
    translation:
      en: a very formal greeting when the name is unknown
      ko: 담당자님께 (이름 모를 때 격식체)
    gender: null
  - english: "Best regards"
    translation:
      en: a common professional email sign-off
      ko: 감사합니다 (이메일 맺음말)
    gender: null
  - english: "I am writing to..."
    translation:
      en: a formal way to state the purpose of an email
      ko: ~에 관해 글을 드립니다
    gender: null
  - english: "Please find attached..."
    translation:
      en: a formal phrase for including a file
      ko: 첨부 파일을 확인해 주십시오
    gender: null
  - english: "I look forward to hearing from you."
    translation:
      en: a polite closing phrase expecting a reply
      ko: 답변을 기다리겠습니다
    gender: null
- id: 13_punctuation
  label:
    en: "1.3 Punctuation"
    ko: "1.3 구두점"
  type: vocabulary
  words:
  - english: period / full stop
    translation:
      en: the dot at the end of a sentence (.)
      ko: 마침표
    gender: null
    notes:
      en: "'period' (AmE), 'full stop' (BrE)"
      ko: "'period' (미국식), 'full stop' (영국식)"
  - english: comma
    translation:
      en: a punctuation mark for pauses and lists (,)
      ko: 쉼표
    gender: null
  - english: semicolon
    translation:
      en: a mark joining related independent clauses (;)
      ko: 세미콜론
    gender: null
  - english: colon
    translation:
      en: a mark introducing a list or explanation (:)
      ko: 콜론
    gender: null
  - english: apostrophe
    translation:
      en: a mark for contractions or possession (')
      ko: 아포스트로피
    gender: null
  - english: quotation marks
    translation:
      en: marks enclosing direct speech or titles (" ")
      ko: 따옴표
    gender: null
  - english: exclamation mark
    translation:
      en: a mark showing strong feeling or emphasis (!)
      ko: 느낌표
    gender: null
  - english: question mark
    translation:
      en: a mark at the end of a question (?)
      ko: 물음표
    gender: null
  - english: hyphen
    translation:
      en: a short dash joining words or parts of words (-)
      ko: 하이픈
    gender: null
  - english: dash
    translation:
      en: a longer mark for parenthetical statements (—)
      ko: 대시
    gender: null
  - english: parentheses
    translation:
      en: curved marks enclosing extra information ( )
      ko: 괄호
    gender: null
  - english: Oxford comma
    translation:
      en: a comma before 'and' in a list of three or more items
      ko: 옥스퍼드 쉼표
    gender: null
    notes:
      en: "Optional but recommended: 'apples, oranges, and bananas'"
      ko: "선택 사항이지만 권장: 'apples, oranges, and bananas'"
  - english: comma splice
    translation:
      en: an error of joining two sentences with only a comma
      ko: 쉼표 연결 오류
    gender: null
    notes:
      en: "Wrong: 'I was tired, I went to bed.' Right: 'I was tired, so I went to bed.'"
      ko: "틀림: 'I was tired, I went to bed.' 맞음: 'I was tired, so I went to bed.'"
- id: 14_capitalization_rules
  label:
    en: "1.4 Capitalization Rules"
    ko: "1.4 대문자 규칙"
  type: vocabulary
  words:
  - english: capitalize
    translation:
      en: to write a letter in uppercase
      ko: 대문자로 쓰다
    gender: null
  - english: uppercase
    translation:
      en: capital letters (A, B, C)
      ko: 대문자
    gender: null
  - english: lowercase
    translation:
      en: small letters (a, b, c)
      ko: 소문자
    gender: null
  - english: proper noun
    translation:
      en: a name of a specific person, place, or organization (always capitalized)
      ko: 고유 명사
    gender: null
  - english: title case
    translation:
      en: capitalizing the first letter of major words in a title
      ko: 제목 대문자 표기법
    gender: null
    notes:
      en: "'The Lord of the Rings' — capitalize major words, not articles/prepositions"
      ko: "'The Lord of the Rings' — 주요 단어만 대문자, 관사/전치사는 소문자"
- id: 15_academic_writing
  label:
    en: "1.5 Academic Writing"
    ko: "1.5 학술적 글쓰기"
  type: vocabulary
  words:
  - english: academic
    translation:
      en: relating to education and scholarship
      ko: 학술적인
    gender: null
  - english: formal register
    translation:
      en: a style of language appropriate for professional or academic contexts
      ko: 격식체
    gender: null
  - english: hedging language
    translation:
      en: careful words that avoid sounding too certain
      ko: 완곡 표현
    gender: null
    notes:
      en: "'may,' 'suggests,' 'appears to' — less direct than stating a fact"
      ko: "'may,' 'suggests,' 'appears to' — 사실 단정보다 간접적"
  - english: cite
    translation:
      en: to reference a source in academic writing
      ko: 인용하다
    gender: null
  - english: source
    translation:
      en: a book, article, or study used as a reference
      ko: 출처
    gender: null
  - english: paraphrase
    translation:
      en: to restate someone's ideas in your own words
      ko: 바꿔 말하기
    gender: null
  - english: plagiarism
    translation:
      en: using someone's work without giving credit
      ko: 표절
    gender: null
  - english: contraction
    translation:
      en: a shortened form of a word (e.g., don't, can't)
      ko: 축약형
    gender: null
    notes:
      en: "Avoid contractions in formal academic writing"
      ko: "격식 학술 글에서는 축약형을 사용하지 않음"
  - english: run-on sentence
    translation:
      en: two or more sentences joined without proper punctuation
      ko: 연결 문장 오류
    gender: null
  - english: coherence
    translation:
      en: logical connection and flow between ideas
      ko: 일관성
    gender: null
  - english: concise
    translation:
      en: expressing ideas clearly in few words
      ko: 간결한
    gender: null
- id: 16_common_korean_speaker_errors
  label:
    en: "1.6 Common Writing Errors by Korean Speakers"
    ko: "1.6 한국어 화자의 흔한 작문 오류"
  type: vocabulary
  words:
  - english: article error
    translation:
      en: incorrect use or omission of a/an/the
      ko: 관사 오류
    gender: null
    notes:
      en: "'I want to be doctor' → 'I want to be a doctor'"
      ko: "'I want to be doctor' → 'I want to be a doctor'"
  - english: subject-verb agreement
    translation:
      en: the subject and verb must match in number
      ko: 주어-동사 수일치
    gender: null
  - english: word order error
    translation:
      en: placing words in the wrong sequence
      ko: 어순 오류
    gender: null
    notes:
      en: "Korean SOV → English SVO: 'I yesterday went' → 'I went yesterday'"
      ko: "한국어 SOV → 영어 SVO: 'I yesterday went' → 'I went yesterday'"
  - english: tense consistency
    translation:
      en: keeping the same tense throughout a passage
      ko: 시제 일관성
    gender: null
  - english: preposition error
    translation:
      en: using the wrong preposition with a word
      ko: 전치사 오류
    gender: null
    notes:
      en: "'interested for' → 'interested in'"
      ko: "'interested for' → 'interested in'"
