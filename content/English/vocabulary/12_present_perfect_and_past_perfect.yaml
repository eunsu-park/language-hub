lesson: 12_Present_Perfect_and_Past_Perfect
lesson_number: 12
cefr: B1
categories:
- id: 11_present_perfect_formation
  label:
    en: "1.1 Present Perfect Formation"
    ko: "1.1 현재완료 형성"
  type: vocabulary
  words:
  - english: present perfect
    translation:
      en: have/has + past participle — connects past to present
      ko: 현재완료
    gender: null
    notes:
      en: Korean has no equivalent — the hardest tense for Korean speakers
      ko: 한국어에는 이에 대응하는 시제가 없음 — 한국어 화자에게 가장 어려운 시제
  - english: past participle
    translation:
      en: the third form of a verb (eaten, gone, written)
      ko: 과거분사
    gender: null
  - english: have
    translation:
      en: auxiliary verb for present perfect (I/you/we/they have)
      ko: 현재완료 조동사 (I/you/we/they have)
    gender: null
  - english: has
    translation:
      en: auxiliary verb for present perfect (he/she/it has)
      ko: 현재완료 조동사 (he/she/it has)
    gender: null
  - english: experience
    translation:
      en: something that has happened to you
      ko: 경험
    gender: null
  - english: result
    translation:
      en: the effect or consequence of an action
      ko: 결과
    gender: null
  - english: connection
    translation:
      en: a link between past action and present state
      ko: 연결
    gender: null
- id: 12_present_perfect_time_markers
  label:
    en: "1.2 Present Perfect Time Markers"
    ko: "1.2 현재완료 시간 표지"
  type: vocabulary
  words:
  - english: since
    translation:
      en: from a point in time until now
      ko: ~이래로 (시점)
    gender: null
    notes:
      en: "Used with a specific point: 'since 2020', 'since Monday'"
      ko: "특정 시점과 함께 사용: 'since 2020', 'since Monday'"
  - english: for
    translation:
      en: indicating a duration of time
      ko: ~동안 (기간)
    gender: null
    notes:
      en: "Used with a duration: 'for three years', 'for two hours'"
      ko: "기간과 함께 사용: 'for three years', 'for two hours'"
  - english: already
    translation:
      en: before now; sooner than expected
      ko: 이미, 벌써
    gender: null
    notes:
      en: "'I have already eaten.' (used in positive sentences)"
      ko: "'I have already eaten.' (긍정문에서 사용)"
  - english: yet
    translation:
      en: until now (used in questions and negatives)
      ko: 아직
    gender: null
    notes:
      en: "'Have you finished yet?' 'I haven't finished yet.'"
      ko: "'Have you finished yet?' 'I haven't finished yet.'"
  - english: just
    translation:
      en: a very short time ago
      ko: 방금
    gender: null
    notes:
      en: "'I have just arrived.' (very recently)"
      ko: "'I have just arrived.' (아주 최근에)"
  - english: still
    translation:
      en: continuing to the present (often with negatives)
      ko: 아직도 / 여전히
    gender: null
    notes:
      en: "'I still haven't received it.' (expected by now)"
      ko: "'I still haven't received it.' (지금까지 받을 줄 알았는데)"
  - english: ever
    translation:
      en: at any time (used in questions)
      ko: 이제까지
    gender: null
    notes:
      en: "'Have you ever been to Japan?'"
      ko: "'Have you ever been to Japan?' (일본에 가 본 적 있어요?)"
  - english: never
    translation:
      en: at no time
      ko: 한 번도 ~않다
    gender: null
    notes:
      en: "'I have never eaten sushi.' (no experience)"
      ko: "'I have never eaten sushi.' (경험 없음)"
  - english: so far
    translation:
      en: up to this point
      ko: 지금까지
    gender: null
  - english: recently
    translation:
      en: not long ago
      ko: 최근에
    gender: null
  - english: lately
    translation:
      en: in the recent period
      ko: 요즘
    gender: null
- id: 13_present_perfect_vs_simple_past
  label:
    en: "1.3 Present Perfect vs Simple Past"
    ko: "1.3 현재완료 vs 단순 과거"
  type: vocabulary
  words:
  - english: specific time
    translation:
      en: an exact moment in the past (yesterday, last week, in 2020)
      ko: 특정 시점
    gender: null
    notes:
      en: Use SIMPLE PAST with specific times, not present perfect
      ko: 특정 시점에는 현재완료가 아닌 단순 과거를 사용
  - english: unspecified time
    translation:
      en: a time not explicitly stated
      ko: 불특정 시점
    gender: null
    notes:
      en: Use PRESENT PERFECT when the time is not important
      ko: 시점이 중요하지 않을 때 현재완료를 사용
  - english: finished period
    translation:
      en: a time period that has ended
      ko: 끝난 기간
    gender: null
  - english: unfinished period
    translation:
      en: a time period still ongoing (today, this week, this year)
      ko: 아직 끝나지 않은 기간
    gender: null
- id: 14_past_perfect
  label:
    en: "1.4 Past Perfect"
    ko: "1.4 과거완료"
  type: vocabulary
  words:
  - english: past perfect
    translation:
      en: had + past participle — the past before the past
      ko: 과거완료
    gender: null
    notes:
      en: Used for an action completed before another past action
      ko: 다른 과거 행동보다 먼저 완료된 행동에 사용
  - english: had
    translation:
      en: auxiliary verb for past perfect (all persons)
      ko: 과거완료 조동사
    gender: null
  - english: before (past event)
    translation:
      en: earlier than another past action
      ko: ~전에 (과거 사건)
    gender: null
  - english: after (past event)
    translation:
      en: later than another past action
      ko: ~후에 (과거 사건)
    gender: null
  - english: by the time
    translation:
      en: before a particular moment
      ko: ~할 때까지
    gender: null
    notes:
      en: "'By the time I arrived, she had already left.'"
      ko: "'By the time I arrived, she had already left.'"
  - english: when
    translation:
      en: at the time that
      ko: ~할 때
    gender: null
  - english: previously
    translation:
      en: before the time being discussed
      ko: 이전에
    gender: null
