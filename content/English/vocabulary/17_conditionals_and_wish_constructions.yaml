lesson: 17_Conditionals_and_Wish_Constructions
lesson_number: 17
cefr: B2
categories:
- id: 11_conditional_types
  label:
    en: "1.1 Conditional Types"
    ko: "1.1 조건문 유형"
  type: vocabulary
  words:
  - english: conditional
    translation:
      en: a sentence expressing a condition and its result
      ko: 조건문
    gender: null
  - english: if-clause
    translation:
      en: the part of a conditional that states the condition
      ko: if절 (조건절)
    gender: null
  - english: result clause
    translation:
      en: the part that states the consequence
      ko: 결과절 (주절)
    gender: null
  - english: zero conditional
    translation:
      en: if + present, present — general truths
      ko: 영 조건문 (일반적 사실)
    gender: null
    notes:
      en: "'If you heat water, it boils.' — always true"
      ko: "'If you heat water, it boils.' — 항상 참"
  - english: first conditional
    translation:
      en: if + present, will + base — real future possibility
      ko: 1 조건문 (실현 가능한 미래)
    gender: null
    notes:
      en: "'If it rains, I will stay home.' — possible future"
      ko: "'If it rains, I will stay home.' — 가능한 미래"
  - english: second conditional
    translation:
      en: if + past, would + base — unreal present/future
      ko: 2 조건문 (비현실적 현재/미래)
    gender: null
    notes:
      en: "'If I were rich, I would travel.' — imaginary"
      ko: "'If I were rich, I would travel.' — 상상"
  - english: third conditional
    translation:
      en: if + past perfect, would have + past participle — unreal past
      ko: 3 조건문 (비현실적 과거)
    gender: null
    notes:
      en: "'If I had studied, I would have passed.' — past regret"
      ko: "'If I had studied, I would have passed.' — 과거 후회"
  - english: mixed conditional
    translation:
      en: combining elements of different conditional types
      ko: 혼합 조건문
    gender: null
- id: 12_conditional_vocabulary
  label:
    en: "1.2 Conditional Vocabulary"
    ko: "1.2 조건문 어휘"
  type: vocabulary
  words:
  - english: if
    translation:
      en: on the condition that
      ko: 만약 ~라면
    gender: null
  - english: unless
    translation:
      en: if not; except if
      ko: ~하지 않는 한
    gender: null
    notes:
      en: "'Unless you hurry, you will be late.' = If you don't hurry..."
      ko: "'Unless you hurry, you will be late.' = 서두르지 않으면..."
  - english: provided that
    translation:
      en: on the condition that (formal)
      ko: ~라는 조건하에
    gender: null
  - english: as long as
    translation:
      en: on the condition that; for the whole time that
      ko: ~하는 한
    gender: null
  - english: in case
    translation:
      en: as a precaution; if it happens that
      ko: ~할 경우에 대비하여
    gender: null
  - english: otherwise
    translation:
      en: if not; in another way
      ko: 그렇지 않으면
    gender: null
  - english: suppose / supposing
    translation:
      en: what if; imagine that
      ko: ~라고 가정하면
    gender: null
  - english: even if
    translation:
      en: regardless of whether
      ko: ~라고 해도
    gender: null
  - english: whether or not
    translation:
      en: regardless of the situation
      ko: ~이든 아니든
    gender: null
  - english: on condition that
    translation:
      en: only if (formal)
      ko: ~라는 조건으로
    gender: null
- id: 13_wish_constructions
  label:
    en: "1.3 Wish Constructions"
    ko: "1.3 소망 구문"
  type: vocabulary
  words:
  - english: wish
    translation:
      en: to want something to be different from reality
      ko: ~이면 좋겠다 / 바라다
    gender: null
  - english: "I wish I were..."
    translation:
      en: expressing a wish about the present (unreal)
      ko: 내가 ~라면 좋겠다
    gender: null
    notes:
      en: "Use 'were' for all persons after 'wish' (subjunctive)"
      ko: "wish 뒤에는 모든 인칭에 'were' 사용 (가정법)"
  - english: "I wish I had..."
    translation:
      en: expressing a wish about the past (regret)
      ko: ~했더라면 좋았을 텐데
    gender: null
  - english: "I wish I could..."
    translation:
      en: expressing a wish about ability
      ko: ~할 수 있으면 좋겠다
    gender: null
  - english: if only
    translation:
      en: a stronger way to express a wish
      ko: ~하기만 했다면
    gender: null
    notes:
      en: "'If only I had more time!' — more emotional than 'I wish'"
      ko: "'If only I had more time!' — 'I wish'보다 더 감정적"
  - english: regret
    translation:
      en: a feeling of sadness about something past
      ko: 후회
    gender: null
  - english: hypothetical
    translation:
      en: based on an imagined situation, not real
      ko: 가정적인
    gender: null
  - english: imaginary
    translation:
      en: existing only in the mind
      ko: 상상의
    gender: null
  - english: real
    translation:
      en: actually existing or happening
      ko: 현실의
    gender: null
  - english: unreal
    translation:
      en: not actually existing; imagined
      ko: 비현실적인
    gender: null
- id: 14_polite_conditionals
  label:
    en: "1.4 Polite Conditionals"
    ko: "1.4 공손한 조건문"
  type: vocabulary
  words:
  - english: "Would you mind...?"
    translation:
      en: a very polite way to ask someone to do something
      ko: ~해 주시겠어요?
    gender: null
  - english: "I would appreciate it if..."
    translation:
      en: a formal polite request
      ko: ~해 주시면 감사하겠습니다
    gender: null
  - english: "If you could..."
    translation:
      en: a polite way to begin a request
      ko: ~해 주실 수 있다면
    gender: null
  - english: "I was wondering if..."
    translation:
      en: an indirect polite question
      ko: ~인지 궁금한데요
    gender: null
  - english: "Would it be possible to...?"
    translation:
      en: asking if something can be done (formal)
      ko: ~하는 것이 가능할까요?
    gender: null
