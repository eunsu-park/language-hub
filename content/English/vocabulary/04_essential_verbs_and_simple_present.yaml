lesson: 04_Essential_Verbs_and_Simple_Present
lesson_number: 4
cefr: A1
categories:
- id: 11_be_have_do
  label:
    en: "1.1 Core Verbs: be, have, do"
    ko: "1.1 핵심 동사: be, have, do"
  type: vocabulary
  words:
  - english: verb
    translation:
      en: a word that describes an action or state
      ko: 동사
    gender: null
  - english: be
    translation:
      en: to exist; to have a quality (am/is/are)
      ko: ~이다 / ~있다
    gender: null
    notes:
      en: The most important and irregular English verb
      ko: 영어에서 가장 중요하고 불규칙한 동사
  - english: have
    translation:
      en: to possess; to experience (have/has)
      ko: 가지다 / ~이 있다
    gender: null
  - english: has
    translation:
      en: third person singular of have
      ko: have의 3인칭 단수형
    gender: null
  - english: do
    translation:
      en: to perform an action; also an auxiliary verb (do/does)
      ko: 하다
    gender: null
  - english: does
    translation:
      en: third person singular of do
      ko: do의 3인칭 단수형
    gender: null
- id: 12_go_get_make_take_give
  label:
    en: "1.2 Core Verbs: go, get, make, take, give"
    ko: "1.2 핵심 동사: go, get, make, take, give"
  type: vocabulary
  words:
  - english: go
    translation:
      en: to move from one place to another
      ko: 가다
    gender: null
    notes:
      en: "'go home' not 'go to home' — home is an adverb here"
      ko: "'go to home'이 아니라 'go home' — home이 부사로 쓰임"
  - english: get
    translation:
      en: to receive, obtain, become, or arrive
      ko: 얻다 / 되다 / 도착하다
    gender: null
    notes:
      en: One of the most versatile English verbs
      ko: 영어에서 가장 다양한 의미를 가진 동사 중 하나
  - english: make
    translation:
      en: to create or produce something
      ko: 만들다
    gender: null
  - english: take
    translation:
      en: to get hold of, carry, or require time
      ko: 가져가다 / 걸리다
    gender: null
  - english: give
    translation:
      en: to hand something to someone
      ko: 주다
    gender: null
