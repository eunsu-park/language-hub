    gender: null
- id: 14_simple_present_tense
  label:
    en: "1.4 Simple Present Tense"
    ko: "1.4 현재 시제"
  type: vocabulary
  words:
  - english: simple present
    translation:
      en: the tense for habits, facts, and permanent states
      ko: 단순 현재 시제
    gender: null
  - english: base form
    translation:
      en: the basic form of a verb without endings
      ko: 기본형
    gender: null
  - english: third person singular
    translation:
      en: he, she, or it — requires -s on the verb
      ko: 3인칭 단수
    gender: null
    notes:
      en: "'he eats', 'she goes' — only form that changes"
      ko: "'he eats', 'she goes' — 유일하게 변하는 형태"
  - english: conjugation
    translation:
      en: changing a verb form to match person, tense, etc.
      ko: 동사 활용
    gender: null
  - english: habit
    translation:
      en: something you do regularly
      ko: 습관
    gender: null
  - english: routine
    translation:
      en: a regular pattern of activities
      ko: 일과
    gender: null
  - english: fact
    translation:
      en: something that is true
      ko: 사실
    gender: null
- id: 15_questions_and_negatives
  label:
    en: "1.5 Questions and Negatives"
    ko: "1.5 의문문과 부정문"
  type: vocabulary
  words:
  - english: do-support
    translation:
      en: using do/does to form questions and negatives
      ko: do 조동사 삽입
    gender: null
    notes:
      en: "'Do you like...?' 'I don't like...'"
      ko: "'Do you like...?' 'I don't like...'"
  - english: "don't"
    translation:
      en: contraction of do not
      ko: do not의 축약형
    gender: null
  - english: "doesn't"
    translation:
      en: contraction of does not
      ko: does not의 축약형
    gender: null
    notes:
      en: "After doesn't, verb returns to base form: 'She doesn't eat'"
      ko: "doesn't 뒤에는 동사 원형: 'She doesn't eat'"
  - english: question
    translation:
      en: a sentence asking for information
      ko: 의문문, 질문
    gender: null
  - english: answer
    translation:
      en: a response to a question
      ko: 대답
    gender: null
  - english: negative
    translation:
      en: expressing "no" or "not"
      ko: 부정
    gender: null
