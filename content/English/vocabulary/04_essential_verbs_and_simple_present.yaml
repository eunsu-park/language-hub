  - english: often
    translation:
      en: frequently, about 70%
      ko: 자주
    gender: null
  - english: sometimes
    translation:
      en: occasionally, about 50%
      ko: 가끔
    gender: null
  - english: rarely
    translation:
      en: almost never, about 10%
      ko: 거의 안
    gender: null
  - english: never
