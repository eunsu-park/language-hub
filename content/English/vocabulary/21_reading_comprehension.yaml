- id: 13_konglish_false_friends
  label:
    en: "1.3 Konglish False Friends"
    ko: "1.3 콩글리시 잘못된 친구"
  type: vocabulary
  words:
  - english: "apartment (not 'apart')"
    translation:
      en: a living unit in a building
      ko: 아파트
    gender: null
    notes:
      en: "Korean '아파트' is an apartment, not 'apart' (which means separate)"
      ko: "한국어 '아파트'는 apartment이지 apart(분리된)가 아님"
  - english: "air conditioner (not 'aircon')"
    translation:
      en: a device for cooling air
      ko: 에어컨
    gender: null
  - english: "cell phone / mobile phone (not 'handphone')"
    translation:
      en: a portable telephone
      ko: 핸드폰
    gender: null
    notes:
      en: "'handphone' is Konglish — say 'cell phone' (AmE) or 'mobile' (BrE)"
      ko: "'핸드폰'은 콩글리시 — 'cell phone' (미국식) 또는 'mobile' (영국식)"
  - english: "laptop (not 'notebook')"
    translation:
      en: a portable computer
      ko: 노트북
    gender: null
    notes:
      en: "'notebook' in English usually means a paper notebook for writing"
      ko: "영어 'notebook'은 보통 종이 공책을 의미"
  - english: "part-time job (not 'arbeit')"
    translation:
      en: a job with fewer hours than full-time
      ko: 아르바이트
    gender: null
    notes:
      en: "'arbeit' is from German and not used in English"
      ko: "'아르바이트'는 독일어에서 온 것으로 영어에서는 사용하지 않음"
  - english: "outlet (not 'consent')"
    translation:
      en: an electrical socket
      ko: 콘센트
    gender: null
    notes:
      en: "Korean '콘센트' comes from 'concentric plug' — English says 'outlet' (AmE) or 'socket' (BrE)"
      ko: "한국어 '콘센트'는 'concentric plug'에서 왔으나 영어에서는 outlet/socket"
  - english: "fighting (not a cheer in English)"
    translation:
      en: physical combat
      ko: 파이팅
    gender: null
    notes:
      en: "Korean '파이팅!' as encouragement doesn't exist in English — say 'Go for it!' or 'You can do it!'"
      ko: "한국어 '파이팅!'은 영어에 없음 — 'Go for it!' 또는 'You can do it!' 사용"
  - english: "SNS → social media"
    translation:
      en: websites and apps for social networking
      ko: SNS
    gender: null
    notes:
      en: "'SNS' is rarely used in English — say 'social media'"
      ko: "'SNS'는 영어에서 거의 쓰지 않음 — 'social media' 사용"
  - english: "skinship → physical affection"
    translation:
      en: physical touch between people as a sign of closeness
      ko: 스킨십
    gender: null
    notes:
      en: "'skinship' is not used in English — say 'physical affection' or 'physical contact'"
      ko: "'스킨십'은 영어에서 쓰지 않음 — 'physical affection' 또는 'physical contact'"
  - english: "one-piece → dress"
    translation:
      en: a garment covering the body from shoulders to legs
      ko: 원피스
    gender: null
    notes:
      en: "'one-piece' in English usually means a one-piece swimsuit"
      ko: "영어 'one-piece'는 보통 원피스 수영복을 의미"
