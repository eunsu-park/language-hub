      en: a written composition on a specific topic
      ko: 에세이
    gender: null
  - english: fiction
    translation:
      en: literature describing imaginary events
      ko: 소설, 허구
    gender: null
  - english: non-fiction
    translation:
      en: writing based on real facts and events
      ko: 논픽션
    gender: null
  - english: editorial
