categories:
- id: 11_reading_strategies
  label:
    en: "1.1 Reading Strategy Terms"
    ko: "1.1 독해 전략 용어"
  type: vocabulary
  words:
  - english: reading comprehension
    translation:
      en: understanding the meaning of written text
      ko: 독해
    gender: null
  - english: skimming
    translation:
      en: reading quickly to get the main idea
      ko: 훑어 읽기
    gender: null
  - english: scanning
    translation:
      en: reading quickly to find specific information
      ko: 찾아 읽기
    gender: null
  - english: inference
    translation:
      en: drawing a conclusion from what is implied, not stated
      ko: 추론
    gender: null
  - english: main idea
    translation:
      en: the central point of a text
      ko: 중심 생각
    gender: null
  - english: supporting detail
    translation:
      en: information that backs up the main idea
      ko: 세부 사항
    gender: null
  - english: context clue
    translation:
      en: hints in the text that help you guess word meaning
      ko: 문맥 단서
    gender: null
  - english: critical reading
    translation:
      en: evaluating and questioning what you read
      ko: 비판적 독해
    gender: null
  - english: paraphrase
    translation:
      en: to restate something in different words
      ko: 바꿔 말하기
    gender: null
  - english: summarize
    translation:
      en: to give a brief statement of the main points
      ko: 요약하다
    gender: null
  - english: comprehension
    translation:
      en: the ability to understand
      ko: 이해력
    gender: null
  - english: vocabulary in context
    translation:
      en: understanding word meaning from surrounding text
      ko: 문맥 속 어휘
    gender: null
