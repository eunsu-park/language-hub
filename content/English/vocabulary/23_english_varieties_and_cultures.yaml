- id: 14_ame_vs_bre_grammar
  label:
    en: "1.4 AmE vs BrE Grammar Differences"
    ko: "1.4 미국식 vs 영국식 문법 차이"
  type: vocabulary
  words:
  - english: "gotten (AmE) / got (BrE)"
    translation:
      en: past participle of 'get'
      ko: get의 과거 분사
    gender: null
    notes:
      en: "AmE uses 'gotten' for become/obtained; BrE uses 'got' for all meanings"
      ko: "미국식은 become/obtained 의미에 'gotten' 사용; 영국식은 모두 'got'"
  - english: shall
    translation:
      en: used in BrE for suggestions; rare in AmE
      ko: ~할까요 (영국식 제안)
    gender: null
    notes:
      en: "BrE: 'Shall we go?' AmE: 'Should we go?' / 'Do you want to go?'"
      ko: "영국식: 'Shall we go?' 미국식: 'Should we go?'"
  - english: collective noun
    translation:
      en: a noun referring to a group (team, family, government)
      ko: 집합 명사
    gender: null
    notes:
      en: "BrE: 'The team are playing.' AmE: 'The team is playing.'"
      ko: "영국식: 복수 동사 가능. 미국식: 단수 동사만"
- id: 15_cultural_communication
  label:
    en: "1.5 Cultural Communication"
    ko: "1.5 문화적 의사소통"
  type: vocabulary
  words:
  - english: high-context culture
    translation:
      en: a culture where meaning is often implied, not stated directly
      ko: 고맥락 문화
    gender: null
    notes:
      en: "Korean, Japanese, Chinese — indirect communication"
      ko: "한국, 일본, 중국 — 간접적 의사소통"
  - english: low-context culture
    translation:
      en: a culture where meaning is stated explicitly in words
      ko: 저맥락 문화
    gender: null
    notes:
      en: "American, German, Australian — direct communication"
      ko: "미국, 독일, 호주 — 직접적 의사소통"
  - english: understatement
    translation:
      en: expressing something as less important than it is (common in BrE)
      ko: 절제된 표현 (영국식)
    gender: null
    notes:
      en: "BrE 'Not bad' often means 'quite good'"
      ko: "영국식 'Not bad'는 보통 '꽤 좋다'는 의미"
  - english: directness
    translation:
      en: saying exactly what you mean
      ko: 직접성
    gender: null
  - english: indirectness
    translation:
      en: communicating meaning without stating it plainly
      ko: 간접성
    gender: null
  - english: small talk
    translation:
      en: polite conversation about unimportant topics
      ko: 가벼운 잡담
    gender: null
  - english: irony
    translation:
      en: saying the opposite of what you mean (common in BrE humor)
      ko: 아이러니, 반어법
    gender: null
  - english: self-deprecation
    translation:
      en: making fun of yourself in a modest way
      ko: 자기 비하 유머
    gender: null
    notes:
      en: "Common in Australian and British cultures"
      ko: "호주와 영국 문화에서 흔함"
  - english: eye contact
    translation:
      en: looking directly at someone during conversation
      ko: 눈 맞춤
    gender: null
    notes:
      en: "Important in Western business settings; shows confidence"
      ko: "서양 비즈니스에서 중요; 자신감을 보여줌"
- id: 16_australian_and_other_varieties
  label:
    en: "1.6 Australian and Other Varieties"
    ko: "1.6 호주 및 기타 영어 변형"
  type: vocabulary
  words:
  - english: mate
    translation:
      en: friend (Australian/British informal)
      ko: 친구
    gender: null
  - english: no worries
    translation:
      en: no problem; it's fine (Australian informal)
      ko: 괜찮아요
    gender: null
  - english: arvo
    translation:
      en: afternoon (Australian slang)
      ko: 오후
    gender: null
  - english: barbie
    translation:
      en: barbecue (Australian slang)
      ko: 바비큐
    gender: null
  - english: uni
    translation:
      en: university (Australian/British informal)
      ko: 대학교
    gender: null
  - english: prepone
    translation:
      en: to move to an earlier time (Indian English; opposite of postpone)
      ko: 앞당기다 (인도 영어)
    gender: null
    notes:
      en: "Not used in other varieties of English"
      ko: "다른 영어 변형에서는 사용하지 않음"
  - english: "eh?"
    translation:
      en: a tag question used in Canadian English
      ko: 그렇지? (캐나다 영어)
    gender: null
  - english: Singlish
    translation:
      en: a variety of English spoken in Singapore with Chinese and Malay influence
      ko: 싱글리시 (싱가포르 영어)
    gender: null
