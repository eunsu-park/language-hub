- id: 12_ame_vs_bre_spelling
  label:
    en: "1.2 AmE vs BrE Spelling Differences"
    ko: "1.2 미국식 vs 영국식 철자 차이"
  type: vocabulary
  words:
  - english: "color (AmE) / colour (BrE)"
    translation:
      en: the visual property of objects
      ko: 색깔
    gender: null
    notes:
      en: "AmE -or vs BrE -our: honor/honour, favor/favour, behavior/behaviour"
      ko: "미국식 -or vs 영국식 -our: honor/honour, favor/favour, behavior/behaviour"
  - english: "center (AmE) / centre (BrE)"
    translation:
      en: the middle point
      ko: 중앙
    gender: null
    notes:
      en: "AmE -er vs BrE -re: theater/theatre, meter/metre, fiber/fibre"
      ko: "미국식 -er vs 영국식 -re: theater/theatre, meter/metre, fiber/fibre"
  - english: "organize (AmE) / organise (BrE)"
    translation:
      en: to arrange or put in order
      ko: 조직하다
    gender: null
    notes:
      en: "AmE -ize vs BrE -ise: realize/realise, recognize/recognise"
      ko: "미국식 -ize vs 영국식 -ise: realize/realise, recognize/recognise"
  - english: "traveling (AmE) / travelling (BrE)"
    translation:
      en: going from one place to another
      ko: 여행
    gender: null
    notes:
      en: "AmE single l vs BrE double l: canceled/cancelled, modeled/modelled"
      ko: "미국식 l 하나 vs 영국식 ll: canceled/cancelled, modeled/modelled"
  - english: "defense (AmE) / defence (BrE)"
    translation:
      en: protection from attack
      ko: 방어
    gender: null
    notes:
      en: "AmE -ense vs BrE -ence: offense/offence"
      ko: "미국식 -ense vs 영국식 -ence: offense/offence"
  - english: "gray (AmE) / grey (BrE)"
    translation:
      en: a color between black and white
      ko: 회색
    gender: null
