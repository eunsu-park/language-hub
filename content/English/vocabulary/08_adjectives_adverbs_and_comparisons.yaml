lesson: 08_Adjectives_Adverbs_and_Comparisons
lesson_number: 8
cefr: A2
categories:
- id: 11_common_adjectives
  label:
    en: "1.1 Common Adjectives"
    ko: "1.1 자주 쓰이는 형용사"
  type: vocabulary
  words:
  - english: adjective
    translation:
      en: a word that describes a noun
      ko: 형용사
    gender: null
    notes:
      en: Korean adjectives conjugate like verbs; English adjectives never change form
      ko: 한국어 형용사는 동사처럼 활용하지만 영어 형용사는 형태가 변하지 않음
  - english: big
    translation:
      en: large in size
      ko: 큰
    gender: null
  - english: small
    translation:
      en: little in size
      ko: 작은
    gender: null
  - english: tall
    translation:
      en: having great height
      ko: 키가 큰
    gender: null
  - english: short
    translation:
      en: not tall; not long
      ko: 키가 작은; 짧은
    gender: null
  - english: long
    translation:
      en: having great length or duration
      ko: 긴
    gender: null
  - english: old
    translation:
      en: having lived for many years; not new
      ko: 나이든; 오래된
    gender: null
  - english: young
    translation:
      en: not old; in early life
      ko: 어린; 젊은
    gender: null
  - english: new
    translation:
      en: recently made or discovered
      ko: 새로운
    gender: null
  - english: good
    translation:
      en: of high quality; pleasant
      ko: 좋은
    gender: null
  - english: bad
    translation:
      en: of poor quality; unpleasant
      ko: 나쁜
    gender: null
  - english: hot
    translation:
      en: having a high temperature
      ko: 뜨거운; 더운
    gender: null
  - english: cold
    translation:
      en: having a low temperature
      ko: 차가운; 추운
    gender: null
  - english: happy
    translation:
      en: feeling pleasure or contentment
      ko: 행복한
    gender: null
  - english: sad
    translation:
      en: feeling unhappy
      ko: 슬픈
    gender: null
  - english: fast
    translation:
      en: moving at high speed
      ko: 빠른
    gender: null
  - english: slow
    translation:
      en: moving at low speed
      ko: 느린
    gender: null
  - english: easy
    translation:
      en: not difficult
      ko: 쉬운
    gender: null
  - english: difficult
    translation:
      en: hard to do or understand
      ko: 어려운
    gender: null
  - english: expensive
    translation:
      en: costing a lot of money
      ko: 비싼
    gender: null
  - english: cheap
    translation:
      en: costing little money
      ko: 싼
    gender: null
  - english: beautiful
    translation:
      en: very attractive; pleasing to the senses
      ko: 아름다운
    gender: null
  - english: ugly
    translation:
      en: unpleasant to look at
      ko: 못생긴
    gender: null
  - english: clean
    translation:
      en: free from dirt
      ko: 깨끗한
    gender: null
  - english: dirty
    translation:
      en: not clean
      ko: 더러운
    gender: null
  - english: quiet
    translation:
      en: making little noise
      ko: 조용한
    gender: null
  - english: loud
    translation:
      en: producing much noise
      ko: 시끄러운
    gender: null
  - english: interesting
    translation:
      en: holding attention
      ko: 재미있는; 흥미로운
    gender: null
  - english: boring
    translation:
      en: not interesting
      ko: 지루한
    gender: null
  - english: important
    translation:
      en: of great value or significance
      ko: 중요한
    gender: null
- id: 12_comparatives
  label:
    en: "1.2 Comparative Forms"
    ko: "1.2 비교급"
  type: vocabulary
  words:
  - english: comparative
    translation:
      en: the form used to compare two things (-er / more)
      ko: 비교급
    gender: null
  - english: taller
    translation:
      en: more tall (comparative of tall)
      ko: 더 큰 (키)
    gender: null
  - english: bigger
    translation:
      en: more big (comparative of big, double consonant)
      ko: 더 큰
    gender: null
  - english: easier
    translation:
      en: more easy (comparative of easy, y to ier)
      ko: 더 쉬운
    gender: null
  - english: more expensive
    translation:
      en: comparative of expensive (long adjective — use more)
      ko: 더 비싼
    gender: null
  - english: more interesting
    translation:
      en: comparative of interesting (long adjective — use more)
      ko: 더 재미있는
    gender: null
  - english: than
    translation:
      en: used to introduce the second element in a comparison
      ko: ~보다
    gender: null
    notes:
      en: "'She is taller THAN me.' 'This is more expensive THAN that.'"
      ko: "'She is taller THAN me.' 'This is more expensive THAN that.'"
- id: 13_superlatives
  label:
    en: "1.3 Superlative Forms"
    ko: "1.3 최상급"
  type: vocabulary
  words:
  - english: superlative
    translation:
      en: the form used to express the highest degree (-est / most)
      ko: 최상급
    gender: null
  - english: the tallest
    translation:
      en: the most tall (superlative of tall)
      ko: 가장 큰 (키)
    gender: null
  - english: the biggest
    translation:
      en: the most big (superlative of big)
      ko: 가장 큰
    gender: null
  - english: the easiest
    translation:
      en: the most easy (superlative of easy)
      ko: 가장 쉬운
    gender: null
  - english: the most expensive
    translation:
      en: superlative of expensive
      ko: 가장 비싼
    gender: null
  - english: the most interesting
    translation:
      en: superlative of interesting
      ko: 가장 재미있는
    gender: null
    notes:
      en: Superlatives always use 'the'
      ko: 최상급은 항상 'the'와 함께 사용
- id: 14_irregular_comparisons
  label:
    en: "1.4 Irregular Comparisons"
    ko: "1.4 불규칙 비교급/최상급"
  type: vocabulary
  words:
  - english: good / better / the best
    translation:
      en: positive / comparative / superlative of good
      ko: 좋은 / 더 좋은 / 가장 좋은
    gender: null
  - english: bad / worse / the worst
    translation:
      en: positive / comparative / superlative of bad
      ko: 나쁜 / 더 나쁜 / 가장 나쁜
    gender: null
  - english: far / farther / the farthest
    translation:
      en: positive / comparative / superlative of far
      ko: 먼 / 더 먼 / 가장 먼
    gender: null
  - english: many / more / the most
    translation:
      en: positive / comparative / superlative of many
      ko: 많은 / 더 많은 / 가장 많은
    gender: null
  - english: little / less / the least
    translation:
      en: positive / comparative / superlative of little
      ko: 적은 / 더 적은 / 가장 적은
    gender: null
  - english: "as...as"
    translation:
      en: used to say two things are equal
      ko: ~만큼 ~한
    gender: null
    notes:
      en: "'She is as tall as her brother.' 'not as big as'"
      ko: "'She is as tall as her brother.' 'not as big as'"
- id: 15_adverbs
  label:
    en: "1.5 Adverbs"
    ko: "1.5 부사"
  type: vocabulary
  words:
  - english: adverb
    translation:
      en: a word that modifies a verb, adjective, or another adverb
      ko: 부사
    gender: null
    notes:
      en: Many adverbs are formed by adding -ly to adjectives
      ko: 많은 부사가 형용사에 -ly를 붙여 만들어짐
  - english: quickly
    translation:
      en: at a fast speed (adverb of quick)
      ko: 빠르게
    gender: null
  - english: slowly
    translation:
      en: at a slow speed (adverb of slow)
      ko: 느리게
    gender: null
  - english: carefully
    translation:
      en: with care and attention (adverb of careful)
      ko: 조심스럽게
    gender: null
  - english: easily
    translation:
      en: without difficulty (adverb of easy)
      ko: 쉽게
    gender: null
  - english: beautifully
    translation:
      en: in a beautiful manner
      ko: 아름답게
    gender: null
  - english: loudly
    translation:
      en: with much noise
      ko: 시끄럽게
    gender: null
  - english: quietly
    translation:
      en: with little noise
      ko: 조용히
    gender: null
  - english: well
    translation:
      en: in a good way (adverb of good — irregular)
      ko: 잘
    gender: null
    notes:
      en: "'good' is adjective, 'well' is adverb — 'She sings well.'"
      ko: "'good'은 형용사, 'well'은 부사 — 'She sings well.'"
  - english: hard
    translation:
      en: with great effort (same form for adjective and adverb)
      ko: 열심히
    gender: null
    notes:
      en: "'hardly' means 'almost not' — completely different meaning!"
      ko: "'hardly'는 '거의 아닌'이라는 뜻 — 완전히 다른 의미!"
  - english: fast
    translation:
      en: at high speed (same form for adjective and adverb)
      ko: 빠르게
    gender: null
  - english: enough
    translation:
      en: to the necessary degree
      ko: 충분히
    gender: null
    notes:
      en: "'old enough' (after adj), 'enough money' (before noun)"
      ko: "'old enough' (형용사 뒤), 'enough money' (명사 앞)"
  - english: too
    translation:
      en: more than needed; excessively
      ko: 너무
    gender: null
    notes:
      en: "'too hot' means excessively hot — negative nuance"
      ko: "'too hot'은 과도하게 뜨거운 — 부정적 뉘앙스"
