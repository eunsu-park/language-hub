lesson: 15_Complete_Tense_System
lesson_number: 15
cefr: B1
categories:
- id: 11_tense_names
  label:
    en: "1.1 Tense Names"
    ko: "1.1 시제 이름"
  type: vocabulary
  words:
  - english: tense
    translation:
      en: a verb form showing when an action happens
      ko: 시제
    gender: null
  - english: simple present
    translation:
      en: verb form for habits, facts (I eat)
      ko: 단순 현재
    gender: null
  - english: present continuous
    translation:
      en: verb form for actions happening now (I am eating)
      ko: 현재 진행
    gender: null
  - english: present perfect
    translation:
      en: verb form connecting past to present (I have eaten)
      ko: 현재 완료
    gender: null
  - english: present perfect continuous
    translation:
      en: verb form for actions started in past and still continuing (I have been eating)
      ko: 현재 완료 진행
    gender: null
  - english: simple past
    translation:
      en: verb form for completed past actions (I ate)
      ko: 단순 과거
    gender: null
  - english: past continuous
    translation:
      en: verb form for actions in progress at a past time (I was eating)
      ko: 과거 진행
    gender: null
  - english: past perfect
    translation:
      en: verb form for the earlier of two past events (I had eaten)
      ko: 과거 완료
    gender: null
  - english: past perfect continuous
    translation:
      en: verb form for duration of action before another past event (I had been eating)
      ko: 과거 완료 진행
    gender: null
  - english: simple future
    translation:
      en: verb form for future actions (I will eat)
      ko: 단순 미래
    gender: null
  - english: future continuous
    translation:
      en: verb form for actions in progress at a future time (I will be eating)
      ko: 미래 진행
    gender: null
  - english: future perfect
    translation:
      en: verb form for actions completed before a future point (I will have eaten)
      ko: 미래 완료
    gender: null
  - english: future perfect continuous
    translation:
      en: verb form for duration before a future point (I will have been eating)
      ko: 미래 완료 진행
    gender: null
- id: 12_aspect_terms
  label:
    en: "1.2 Aspect Terms"
    ko: "1.2 상(相) 용어"
  type: vocabulary
  words:
  - english: aspect
    translation:
      en: how the action relates to time (simple, continuous, perfect)
      ko: 상 (시간과 행동의 관계)
    gender: null
  - english: simple
    translation:
      en: completed or habitual action
      ko: 단순 (완료 또는 습관적 행동)
    gender: null
  - english: continuous
    translation:
      en: ongoing or in-progress action
      ko: 진행 (진행 중인 행동)
    gender: null
    notes:
      en: Also called 'progressive'
      ko: "'진행형(progressive)'이라고도 함"
  - english: perfect
    translation:
      en: completed action with relevance to another time
      ko: 완료 (다른 시점과 관련된 완료된 행동)
    gender: null
  - english: auxiliary verb
    translation:
      en: a helper verb (be, have, do, will)
      ko: 조동사
    gender: null
  - english: main verb
    translation:
      en: the primary verb carrying the meaning
      ko: 본동사
    gender: null
  - english: infinitive
    translation:
      en: the base form of a verb, often with 'to'
      ko: 부정사 (to + 동사원형)
    gender: null
  - english: gerund
    translation:
      en: the -ing form of a verb used as a noun
      ko: 동명사 (-ing 형태의 명사)
    gender: null
- id: 13_signal_words
  label:
    en: "1.3 Signal Words by Tense"
    ko: "1.3 시제별 표지어"
  type: vocabulary
  words:
  - english: every day
    translation:
      en: signal word for simple present (habit)
      ko: 매일 (단순 현재 표지어)
    gender: null
  - english: right now
    translation:
      en: signal word for present continuous
      ko: 바로 지금 (현재 진행 표지어)
    gender: null
  - english: already
    translation:
      en: signal word for present perfect (completion)
      ko: 이미 (현재 완료 표지어)
    gender: null
  - english: yesterday
    translation:
      en: signal word for simple past
      ko: 어제 (단순 과거 표지어)
    gender: null
  - english: while
    translation:
      en: signal word for past continuous (during)
      ko: ~하는 동안 (과거 진행 표지어)
    gender: null
  - english: before (that)
    translation:
      en: signal word for past perfect
      ko: 그 전에 (과거 완료 표지어)
    gender: null
  - english: by then
    translation:
      en: signal word for future perfect
      ko: 그때까지 (미래 완료 표지어)
    gender: null
  - english: at this time tomorrow
    translation:
      en: signal word for future continuous
      ko: 내일 이 시간에 (미래 진행 표지어)
    gender: null
- id: 14_common_tense_errors
  label:
    en: "1.4 Common Tense Error Terms"
    ko: "1.4 시제 오류 관련 용어"
  type: vocabulary
  words:
  - english: tense consistency
    translation:
      en: using the same tense throughout when appropriate
      ko: 시제 일치
    gender: null
  - english: time reference
    translation:
      en: the time a sentence refers to
      ko: 시간 참조
    gender: null
  - english: sequence of tenses
    translation:
      en: matching tenses in main and subordinate clauses
      ko: 시제의 일치
    gender: null
  - english: duration
    translation:
      en: how long something lasts
      ko: 기간 / 지속시간
    gender: null
  - english: completion
    translation:
      en: the state of being finished
      ko: 완료
    gender: null
  - english: ongoing
    translation:
      en: still happening, not finished
      ko: 진행 중인
    gender: null
  - english: repeated
    translation:
      en: done more than once
      ko: 반복되는
    gender: null
  - english: interrupted
    translation:
      en: stopped in the middle of an action
      ko: 중단된
    gender: null
    notes:
      en: "Past continuous often describes an interrupted action"
      ko: "과거 진행형은 종종 중단된 행동을 묘사함"
