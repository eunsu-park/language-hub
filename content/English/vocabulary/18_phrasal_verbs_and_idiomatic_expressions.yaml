- id: 15_separable_vs_inseparable
  label:
    en: "1.5 Separable vs Inseparable"
    ko: "1.5 분리 가능 vs 분리 불가능"
  type: vocabulary
  words:
  - english: separable
    translation:
      en: the verb and particle can be separated by an object
      ko: 분리 가능
    gender: null
    notes:
      en: "'Turn off the light' or 'Turn the light off' — both correct"
      ko: "'Turn off the light' 또는 'Turn the light off' — 둘 다 맞음"
  - english: inseparable
    translation:
      en: the verb and particle cannot be separated
      ko: 분리 불가능
    gender: null
    notes:
      en: "'Look after the baby' — NOT 'Look the baby after'"
      ko: "'Look after the baby' — 'Look the baby after'는 안 됨"
  - english: particle
    translation:
      en: the preposition or adverb in a phrasal verb
      ko: 불변화사 (전치사/부사)
    gender: null
