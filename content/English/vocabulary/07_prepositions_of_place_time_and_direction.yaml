lesson: 07_Prepositions_of_Place_Time_and_Direction
lesson_number: 7
cefr: A2
categories:
- id: 11_prepositions_of_place
  label:
    en: "1.1 Prepositions of Place"
    ko: "1.1 장소 전치사"
  type: vocabulary
  words:
  - english: preposition
    translation:
      en: a word placed before a noun to show relationship
      ko: 전치사
    gender: null
    notes:
      en: "Korean uses postpositions (조사) AFTER nouns; English uses prepositions BEFORE"
      ko: "한국어는 명사 뒤에 조사, 영어는 명사 앞에 전치사를 사용"
  - english: in
    translation:
      en: inside an enclosed space
      ko: ~안에
    gender: null
    notes:
      en: "'in the room', 'in the box', 'in Korea'"
      ko: "'in the room', 'in the box', 'in Korea'"
  - english: "on"
    translation:
      en: on a surface
      ko: ~위에
    gender: null
    notes:
      en: "'on the table', 'on the wall', 'on the floor'"
      ko: "'on the table', 'on the wall', 'on the floor'"
  - english: at
    translation:
      en: at a specific point or location
      ko: ~에 (특정 지점)
    gender: null
    notes:
      en: "'at the bus stop', 'at school', 'at the door'"
      ko: "'at the bus stop', 'at school', 'at the door'"
  - english: under
    translation:
      en: below or beneath something
      ko: ~아래에
    gender: null
  - english: above
    translation:
      en: higher than but not touching
      ko: ~위에 (접촉 없이)
    gender: null
  - english: below
    translation:
      en: lower than something
      ko: ~아래에
    gender: null
  - english: between
    translation:
      en: in the space separating two things
      ko: ~사이에
    gender: null
  - english: behind
    translation:
      en: at the back of
      ko: ~뒤에
    gender: null
  - english: in front of
    translation:
      en: facing the front side of
      ko: ~앞에
    gender: null
  - english: next to
    translation:
      en: beside, at the side of
      ko: ~옆에
    gender: null
  - english: near
    translation:
      en: close to
      ko: ~가까이에
    gender: null
  - english: opposite
    translation:
      en: facing on the other side
      ko: ~맞은편에
    gender: null
  - english: inside
    translation:
      en: within the interior of
      ko: 안쪽에
    gender: null
  - english: outside
    translation:
      en: not inside; in the open air
      ko: 바깥에
    gender: null
  - english: among
    translation:
      en: in the middle of a group (three or more)
      ko: ~사이에 (셋 이상)
    gender: null
  - english: around
    translation:
      en: on all sides of; approximately
      ko: ~주위에 / 약
    gender: null
- id: 12_prepositions_of_time
  label:
    en: "1.2 Prepositions of Time"
    ko: "1.2 시간 전치사"
  type: vocabulary
  words:
  - english: in (time)
    translation:
      en: used with months, years, seasons, parts of day
      ko: ~에 (월, 연, 계절, 시간대)
    gender: null
    notes:
      en: "'in January', 'in 2024', 'in summer', 'in the morning'"
      ko: "'in January', 'in 2024', 'in summer', 'in the morning'"
  - english: on (time)
    translation:
      en: used with days and dates
      ko: ~에 (요일, 날짜)
    gender: null
    notes:
      en: "'on Monday', 'on July 4th', 'on my birthday'"
      ko: "'on Monday', 'on July 4th', 'on my birthday'"
  - english: at (time)
    translation:
      en: used with clock times and specific moments
      ko: ~에 (시각, 특정 시점)
    gender: null
    notes:
      en: "'at 3 o'clock', 'at noon', 'at night', 'at Christmas'"
      ko: "'at 3 o'clock', 'at noon', 'at night', 'at Christmas'"
  - english: before
    translation:
      en: earlier than
      ko: ~전에
    gender: null
  - english: after
    translation:
      en: later than
      ko: ~후에
    gender: null
  - english: during
    translation:
      en: throughout a period of time
      ko: ~동안
    gender: null
  - english: until / till
    translation:
      en: up to a point in time
      ko: ~까지
    gender: null
  - english: since
    translation:
      en: from a point in time to now
      ko: ~이래로
    gender: null
  - english: for
    translation:
      en: indicating a duration of time
      ko: ~동안 (기간)
    gender: null
    notes:
      en: "'for two hours', 'for three years'"
      ko: "'for two hours', 'for three years'"
  - english: by
    translation:
      en: no later than; before a deadline
      ko: ~까지 (기한)
    gender: null
    notes:
      en: "'by Friday' means before Friday ends"
      ko: "'by Friday'는 금요일이 끝나기 전에"
- id: 13_prepositions_of_direction
  label:
    en: "1.3 Prepositions of Direction"
    ko: "1.3 방향 전치사"
  type: vocabulary
  words:
  - english: to
    translation:
      en: toward a destination
      ko: ~으로, ~에
    gender: null
    notes:
      en: "'go to school', 'walk to the store'"
      ko: "'go to school', 'walk to the store'"
  - english: from
    translation:
      en: indicating the starting point
      ko: ~에서
    gender: null
  - english: into
    translation:
      en: moving to the inside of
      ko: ~안으로
    gender: null
  - english: out of
    translation:
      en: moving to the outside of
      ko: ~밖으로
    gender: null
  - english: through
    translation:
      en: moving from one side to the other
      ko: ~을 통해
    gender: null
  - english: across
    translation:
      en: from one side to the other
      ko: ~을 가로질러
    gender: null
  - english: along
    translation:
      en: following the length of
      ko: ~을 따라
    gender: null
  - english: toward
    translation:
      en: in the direction of
      ko: ~쪽으로
    gender: null
  - english: past
    translation:
      en: moving beyond
      ko: ~을 지나서
    gender: null
  - english: up
    translation:
      en: to a higher position
      ko: 위로
    gender: null
  - english: down
    translation:
      en: to a lower position
      ko: 아래로
    gender: null
