lesson: 13_Modal_Verbs_and_Auxiliary_System
lesson_number: 13
cefr: B1
categories:
- id: 11_core_modals
  label:
    en: "1.1 Core Modal Verbs"
    ko: "1.1 핵심 조동사"
  type: vocabulary
  words:
  - english: modal verb
    translation:
      en: a special auxiliary verb expressing ability, permission, obligation, etc.
      ko: 조동사
    gender: null
    notes:
      en: "No -s for 3rd person, followed by base verb, no do-support"
      ko: "3인칭에 -s 없음, 동사 원형이 뒤따름, do 조동사 불필요"
  - english: can
    translation:
      en: expressing ability or permission
      ko: ~할 수 있다
    gender: null
  - english: could
    translation:
      en: past of can; polite request; possibility
      ko: ~할 수 있었다 / ~할 수 있을까요
    gender: null
  - english: may
    translation:
      en: expressing permission or possibility
      ko: ~해도 된다 / ~일 수도 있다
    gender: null
  - english: might
    translation:
      en: expressing lower possibility
      ko: ~일지도 모른다
    gender: null
  - english: must
    translation:
      en: expressing strong obligation or certainty
      ko: ~해야 한다 / ~임에 틀림없다
    gender: null
  - english: "mustn't"
    translation:
      en: expressing prohibition (must not)
      ko: ~하면 안 된다
    gender: null
    notes:
      en: "'mustn't' = forbidden; 'don't have to' = not necessary — very different!"
      ko: "'mustn't' = 금지; 'don't have to' = 불필요 — 매우 다름!"
  - english: should
    translation:
      en: expressing advice or recommendation
      ko: ~해야 한다 (조언)
    gender: null
  - english: "shouldn't"
    translation:
      en: advising against something
      ko: ~하면 안 된다 (조언)
    gender: null
  - english: will
    translation:
      en: expressing future, willingness, or promise
      ko: ~할 것이다
    gender: null
  - english: would
    translation:
      en: expressing polite request, hypothetical, or past habit
      ko: ~하겠습니다 / ~하곤 했다
    gender: null
  - english: shall
    translation:
      en: expressing suggestion or formal future (mainly BrE)
      ko: ~할까요
    gender: null
    notes:
      en: "'Shall we go?' = suggestion; mainly used in questions"
      ko: "'Shall we go?' = 제안; 주로 의문문에서 사용"
- id: 12_ability_permission
  label:
    en: "1.2 Ability and Permission"
    ko: "1.2 능력과 허가"
  type: vocabulary
  words:
  - english: ability
    translation:
      en: the skill or power to do something
      ko: 능력
    gender: null
  - english: permission
    translation:
      en: authorization to do something
      ko: 허가
    gender: null
  - english: be able to
    translation:
      en: an alternative to 'can' for ability (can be used in all tenses)
      ko: ~할 수 있다
    gender: null
    notes:
      en: "'will be able to' — 'can' has no future form"
      ko: "'will be able to' — 'can'은 미래형이 없음"
  - english: be allowed to
    translation:
      en: to have permission
      ko: ~하는 것이 허용되다
    gender: null
  - english: "Can I...?"
    translation:
      en: asking for permission (informal)
      ko: ~해도 될까요? (비격식)
    gender: null
  - english: "May I...?"
    translation:
      en: asking for permission (formal)
      ko: ~해도 될까요? (격식)
    gender: null
  - english: "Could I...?"
    translation:
      en: asking for permission (polite)
      ko: ~해도 될까요? (공손)
    gender: null
- id: 13_obligation_necessity
  label:
    en: "1.3 Obligation and Necessity"
    ko: "1.3 의무와 필요"
  type: vocabulary
  words:
  - english: obligation
    translation:
      en: something you must do
      ko: 의무
    gender: null
  - english: necessity
    translation:
      en: something that is needed
      ko: 필요
    gender: null
  - english: have to
    translation:
      en: expressing external obligation (rules, laws)
      ko: ~해야 한다 (외부 의무)
    gender: null
  - english: "don't have to"
    translation:
      en: expressing that something is not necessary
      ko: ~할 필요가 없다
    gender: null
    notes:
      en: "Very different from mustn't! 'don't have to' = optional"
      ko: "mustn't와 매우 다름! 'don't have to' = 선택적"
  - english: ought to
    translation:
      en: expressing moral obligation or advice (like should)
      ko: ~해야 한다 (도의적)
    gender: null
  - english: need to
    translation:
      en: expressing necessity
      ko: ~할 필요가 있다
    gender: null
  - english: had better
    translation:
      en: expressing strong advice with a warning
      ko: ~하는 게 좋겠다
    gender: null
    notes:
      en: Stronger than should — implies bad consequences if not followed
      ko: should보다 강함 — 따르지 않으면 나쁜 결과 암시
- id: 14_possibility_certainty
  label:
    en: "1.4 Possibility and Certainty"
    ko: "1.4 가능성과 확신"
  type: vocabulary
  words:
  - english: possibility
    translation:
      en: something that may happen or be true
      ko: 가능성
    gender: null
  - english: certainty
    translation:
      en: being completely sure
      ko: 확신
    gender: null
  - english: probability
    translation:
      en: how likely something is to happen
      ko: 확률
    gender: null
  - english: certain
    translation:
      en: completely sure
      ko: 확실한
    gender: null
  - english: possible
    translation:
      en: able to happen
      ko: 가능한
    gender: null
  - english: impossible
    translation:
      en: not able to happen
      ko: 불가능한
    gender: null
  - english: likely
    translation:
      en: probably going to happen
      ko: ~할 것 같은
    gender: null
  - english: unlikely
    translation:
      en: probably not going to happen
      ko: ~하지 않을 것 같은
    gender: null
  - english: perhaps
    translation:
      en: maybe, possibly
      ko: 아마
    gender: null
  - english: probably
    translation:
      en: almost certainly
      ko: 아마도
    gender: null
  - english: definitely
    translation:
      en: without any doubt
      ko: 확실히
    gender: null
- id: 15_past_modals
  label:
    en: "1.5 Past Modals"
    ko: "1.5 과거 조동사"
  type: vocabulary
  words:
  - english: must have + past participle
    translation:
      en: expressing certainty about a past event
      ko: ~했음에 틀림없다
    gender: null
    notes:
      en: "'She must have forgotten.' = I'm sure she forgot"
      ko: "'She must have forgotten.' = 그녀가 잊은 게 틀림없다"
  - english: might have + past participle
    translation:
      en: expressing possibility about a past event
      ko: ~했을지도 모른다
    gender: null
  - english: could have + past participle
    translation:
      en: expressing ability or possibility that was not used
      ko: ~할 수 있었는데 (안 했다)
    gender: null
  - english: should have + past participle
    translation:
      en: expressing regret about something not done
      ko: ~했어야 했다 (안 했다)
    gender: null
    notes:
      en: "'I should have studied harder.' = I regret not studying harder"
      ko: "'I should have studied harder.' = 더 열심히 공부했어야 했는데"
  - english: "shouldn't have + past participle"
    translation:
      en: expressing regret about something done
      ko: ~하지 말았어야 했다
    gender: null
