lesson: 16_Relative_Clauses_and_Complex_Sentences
lesson_number: 16
cefr: B2
categories:
- id: 11_relative_pronouns
  label:
    en: "1.1 Relative Pronouns"
    ko: "1.1 관계 대명사"
  type: vocabulary
  words:
  - english: relative clause
    translation:
      en: a clause that gives extra information about a noun
      ko: 관계절
    gender: null
    notes:
      en: Korean modifies nouns BEFORE them; English modifies AFTER
      ko: 한국어는 명사를 앞에서 수식하고 영어는 뒤에서 수식함
  - english: who
    translation:
      en: relative pronoun for people (subject)
      ko: ~하는 (사람)
    gender: null
    notes:
      en: "'The woman who lives next door is kind.'"
      ko: "'The woman who lives next door is kind.'"
  - english: whom
    translation:
      en: relative pronoun for people (object, formal)
      ko: ~하는 (사람, 목적격, 격식)
    gender: null
  - english: which
    translation:
      en: relative pronoun for things
      ko: ~하는 (사물)
    gender: null
  - english: that
    translation:
      en: relative pronoun for people or things (defining clauses)
      ko: ~하는 (사람/사물)
    gender: null
    notes:
      en: Can replace 'who' or 'which' in defining clauses
      ko: 제한적 관계절에서 'who'나 'which'를 대신할 수 있음
  - english: whose
    translation:
      en: relative pronoun showing possession
      ko: ~의
    gender: null
    notes:
      en: "'The man whose car was stolen reported it.'"
      ko: "'The man whose car was stolen reported it.'"
  - english: where
    translation:
      en: relative adverb for places
      ko: ~하는 (장소)
    gender: null
  - english: when
    translation:
      en: relative adverb for times
      ko: ~하는 (시간)
    gender: null
- id: 12_defining_vs_nondefining
  label:
    en: "1.2 Defining vs Non-defining Clauses"
    ko: "1.2 제한적 vs 비제한적 관계절"
  type: vocabulary
  words:
  - english: defining relative clause
    translation:
      en: a clause essential to identify the noun (no commas)
      ko: 제한적 관계절 (쉼표 없음)
    gender: null
    notes:
      en: "'The book THAT I bought is great.' — tells you WHICH book"
      ko: "'The book THAT I bought is great.' — 어떤 책인지 알려줌"
  - english: non-defining relative clause
    translation:
      en: a clause adding extra info (with commas)
      ko: 비제한적 관계절 (쉼표 있음)
    gender: null
    notes:
      en: "'Seoul, WHICH is the capital, is very modern.' — extra info"
      ko: "'Seoul, WHICH is the capital, is very modern.' — 부가 정보"
  - english: essential
    translation:
      en: absolutely necessary
      ko: 필수적인
    gender: null
  - english: additional
    translation:
      en: extra, supplementary
      ko: 추가적인
    gender: null
  - english: omit
    translation:
      en: to leave out
      ko: 생략하다
    gender: null
    notes:
      en: Object relative pronouns can be omitted in defining clauses
      ko: 목적격 관계대명사는 제한적 관계절에서 생략 가능
- id: 13_complex_sentence_connectors
  label:
    en: "1.3 Complex Sentence Connectors"
    ko: "1.3 복문 연결어"
  type: vocabulary
  words:
  - english: complex sentence
    translation:
      en: a sentence with a main clause and one or more subordinate clauses
      ko: 복문
    gender: null
  - english: main clause
    translation:
      en: the independent part of a sentence
      ko: 주절
    gender: null
  - english: subordinate clause
    translation:
      en: a dependent part that cannot stand alone
      ko: 종속절
    gender: null
  - english: noun clause
    translation:
      en: a clause that acts as a noun
      ko: 명사절
    gender: null
    notes:
      en: "'I know THAT she is right.' — noun clause as object"
      ko: "'I know THAT she is right.' — 목적어 역할의 명사절"
  - english: that (conjunction)
    translation:
      en: introduces a noun clause
      ko: ~라는 것
    gender: null
  - english: whether
    translation:
      en: introduces a yes/no noun clause
      ko: ~인지 아닌지
    gender: null
  - english: if (noun clause)
    translation:
      en: introduces an indirect yes/no question
      ko: ~인지
    gender: null
  - english: what (noun clause)
    translation:
      en: the thing that
      ko: ~하는 것
    gender: null
    notes:
      en: "'I don't know what he wants.' — what = the thing that"
      ko: "'I don't know what he wants.' — what = ~하는 것"
- id: 14_participle_phrases
  label:
    en: "1.4 Participle Phrases"
    ko: "1.4 분사구"
  type: vocabulary
  words:
  - english: participle phrase
    translation:
      en: a phrase using -ing or -ed form to modify a noun
      ko: 분사구
    gender: null
  - english: present participle
    translation:
      en: the -ing form of a verb used as an adjective
      ko: 현재분사
    gender: null
    notes:
      en: "'The woman SITTING by the window is my aunt.'"
      ko: "'The woman SITTING by the window is my aunt.'"
  - english: past participle
    translation:
      en: the -ed/-en form used as an adjective
      ko: 과거분사
    gender: null
    notes:
      en: "'The book WRITTEN by Hemingway is famous.'"
      ko: "'The book WRITTEN by Hemingway is famous.'"
  - english: reduced clause
    translation:
      en: a relative clause shortened to a participle phrase
      ko: 축소된 절
    gender: null
  - english: modify
    translation:
      en: to add information about or describe
      ko: 수식하다
    gender: null
