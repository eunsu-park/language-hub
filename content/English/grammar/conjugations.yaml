      future_perfect_continuous:
        I: will have been stopping
        you: will have been stopping
        he/she/it: will have been stopping
        we: will have been stopping
        they: will have been stopping
    notes:
      en: "One-syllable verbs ending in CVC (consonant-vowel-consonant) double the final consonant before -ed and -ing: stop → stopped, stopping. Same rule: plan → planned, sit → sitting."
      ko: "CVC (자음-모음-자음)로 끝나는 1음절 동사는 -ed와 -ing 앞에서 마지막 자음 이중화: stop → stopped, stopping. 같은 규칙: plan → planned, sit → sitting."

