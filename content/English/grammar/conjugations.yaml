# ============================================================
# IRREGULAR VERB FORMS QUICK REFERENCE
# ============================================================
irregular_forms:
  # Verb: [infinitive, past simple, past participle]
  be: [be, "was/were", been]
  have: [have, had, had]
  do: [do, did, done]
  go: [go, went, gone]
  get: [get, got, "got/gotten"]
  make: [make, made, made]
  take: [take, took, taken]
  come: [come, came, come]
  see: [see, saw, seen]
  give: [give, gave, given]
  know: [know, knew, known]
  say: [say, said, said]
  think: [think, thought, thought]
  put: [put, put, put]
  tell: [tell, told, told]
  notes:
    en: >
      English irregular verbs fall into patterns:
      (1) No change: put/put/put, cut/cut/cut, hit/hit/hit
      (2) Same past/pp: make/made/made, say/said/said, tell/told/told, have/had/had, think/thought/thought
      (3) All different: go/went/gone, see/saw/seen, take/took/taken, give/gave/given, know/knew/known, come/came/come
      (4) Vowel change: get/got/got, do/did/done, be/was-were/been
    ko: >
      영어 불규칙 동사 패턴:
      (1) 무변화: put/put/put, cut/cut/cut, hit/hit/hit
      (2) 과거/과거분사 동일: make/made/made, say/said/said, tell/told/told, have/had/had, think/thought/thought
      (3) 모두 다름: go/went/gone, see/saw/seen, take/took/taken, give/gave/given, know/knew/known, come/came/come
      (4) 모음 변화: get/got/got, do/did/done, be/was-were/been

# ============================================================
# STATIVE VERBS (NOT normally used in continuous tenses)
# ============================================================
stative_verbs:
  description:
    en: "Stative verbs describe states, not actions. They are generally NOT used in continuous/progressive tenses. Korean does not have this restriction."
    ko: "상태 동사는 행동이 아닌 상태를 묘사. 일반적으로 진행형/계속형에 사용하지 않음. 한국어에는 이 제한이 없음."
  categories:
    mental_states:
      label:
        en: "Mental states / Opinion"
        ko: "정신 상태 / 의견"
      verbs: [know, believe, understand, remember, forget, think (opinion), suppose, doubt, recognize, realize, mean, imagine, agree, disagree]
    emotions:
      label:
        en: "Emotions / Feelings"
        ko: "감정 / 느낌"
      verbs: [love, hate, like, dislike, prefer, want, wish, need, desire, fear, envy, mind, care, appreciate]
    senses:
      label:
        en: "Senses / Perception"
        ko: "감각 / 인식"
      verbs: [see, hear, smell, taste, feel, seem, appear, look (seem), sound]
    possession:
      label:
        en: "Possession / Existence"
        ko: "소유 / 존재"
      verbs: [have (possess), own, belong, possess, contain, consist, include, involve, owe]
    measurement:
      label:
        en: "Measurement"
        ko: "측정"
      verbs: [weigh, measure, cost, fit, equal]
  exceptions:
    en: >
      Some stative verbs CAN be used in continuous when the meaning changes to
      an active/temporary sense:
      - I think you're right. (opinion) vs I'm thinking about it. (process)
      - She has a car. (possession) vs She's having lunch. (eating)
      - This cake tastes good. (perception) vs I'm tasting the soup. (action)
      - I see what you mean. (understand) vs I'm seeing the doctor. (meeting)
    ko: >
      일부 상태 동사는 의미가 능동적/일시적으로 바뀔 때 진행형 사용 가능:
      - I think you're right. (의견) vs I'm thinking about it. (과정)
      - She has a car. (소유) vs She's having lunch. (먹는 행위)
      - This cake tastes good. (인지) vs I'm tasting the soup. (행위)
      - I see what you mean. (이해) vs I'm seeing the doctor. (만남)

# ============================================================
# CONTRACTIONS (spoken/informal forms)
# ============================================================
contractions:
  description:
    en: "English heavily uses contractions in spoken and informal written language. Korean speakers must learn these for listening comprehension."
    ko: "영어는 구어와 비격식 서면에서 축약형을 많이 사용. 한국어 화자는 듣기 이해를 위해 반드시 학습 필요."
  affirmative:
    - {full: "I am", contracted: "I'm"}
    - {full: "you are", contracted: "you're"}
    - {full: "he is / he has", contracted: "he's"}
    - {full: "she is / she has", contracted: "she's"}
    - {full: "it is / it has", contracted: "it's"}
    - {full: "we are", contracted: "we're"}
    - {full: "they are", contracted: "they're"}
    - {full: "I have", contracted: "I've"}
    - {full: "you have", contracted: "you've"}
    - {full: "we have", contracted: "we've"}
    - {full: "they have", contracted: "they've"}
    - {full: "I will", contracted: "I'll"}
    - {full: "you will", contracted: "you'll"}
    - {full: "he will", contracted: "he'll"}
    - {full: "she will", contracted: "she'll"}
    - {full: "it will", contracted: "it'll"}
    - {full: "we will", contracted: "we'll"}
    - {full: "they will", contracted: "they'll"}
    - {full: "I would / I had", contracted: "I'd"}
    - {full: "you would / you had", contracted: "you'd"}
    - {full: "he would / he had", contracted: "he'd"}
    - {full: "she would / she had", contracted: "she'd"}
    - {full: "we would / we had", contracted: "we'd"}
    - {full: "they would / they had", contracted: "they'd"}
  negative:
    - {full: "is not", contracted: "isn't"}
    - {full: "are not", contracted: "aren't"}
    - {full: "was not", contracted: "wasn't"}
    - {full: "were not", contracted: "weren't"}
    - {full: "have not", contracted: "haven't"}
    - {full: "has not", contracted: "hasn't"}
    - {full: "had not", contracted: "hadn't"}
    - {full: "do not", contracted: "don't"}
    - {full: "does not", contracted: "doesn't"}
    - {full: "did not", contracted: "didn't"}
    - {full: "will not", contracted: "won't"}
    - {full: "would not", contracted: "wouldn't"}
    - {full: "can not", contracted: "can't"}
    - {full: "could not", contracted: "couldn't"}
    - {full: "should not", contracted: "shouldn't"}
