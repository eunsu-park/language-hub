        they: will have had
      future_perfect_continuous:
        I: will have been having
        you: will have been having
        he/she/it: will have been having
        we: will have been having
        they: will have been having
    notes:
      en: "HAVE serves as both a main verb (possession) and an auxiliary (perfect tenses). As auxiliary, it cannot be used in continuous form. 'Have got' (BrE) = 'have' (AmE) for possession."
      ko: "HAVE는 본동사(소유)와 조동사(완료 시제) 모두로 사용. 조동사일 때는 진행형 불가. 'Have got' (영국식) = 'have' (미국식, 소유)."

