        you: will have been being
        he/she/it: will have been being
        we: will have been being
        they: will have been being
    notes:
      en: "BE is the most irregular English verb. It has 8 forms: be, am, is, are, was, were, being, been. Korean has no direct equivalent — Korean uses topic/subject markers (-은/는, -이/가) and descriptive verbs instead."
      ko: "BE는 가장 불규칙한 영어 동사. 8가지 형태: be, am, is, are, was, were, being, been. 한국어에는 직접적 대응이 없음 — 한국어는 주제/주어 조사(-은/는, -이/가)와 서술 동사를 대신 사용."

