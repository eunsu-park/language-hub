# English Grammar Rules, Contrasts, and Patterns

rules:
  # ============================================================
  # 1. ARTICLES (a, an, the, zero article)
  # ============================================================
  articles:
    id: articles
    label:
      en: "Articles (a/an, the, zero article)"
      ko: "관사 (a/an, the, 무관사)"
    category: determiners
    cefr: A1
    description:
      en: "English has three article choices: indefinite (a/an), definite (the), and zero article (no article). Korean has no articles, making this one of the most persistent challenges for Korean speakers."
      ko: "영어에는 세 가지 관사 선택: 부정관사(a/an), 정관사(the), 무관사. 한국어에는 관사가 없어 한국어 화자에게 가장 지속적인 어려움 중 하나."
    indefinite_article:
      label:
        en: "A / AN — Indefinite Article"
        ko: "A / AN — 부정관사"
      rules:
        - rule:
            en: "Use 'a' before consonant sounds; 'an' before vowel sounds"
            ko: "자음 소리 앞에 'a'; 모음 소리 앞에 'an' 사용"
          examples:
            - "a book, a cat, a university (/juː/ — consonant sound)"
            - "an apple, an hour (/aʊər/ — vowel sound), an MBA (/em/ — vowel sound)"
          warning:
            en: "Based on SOUND, not spelling: 'a uniform' (yoo-), 'an honest person' (silent h)"
            ko: "철자가 아닌 소리에 기반: 'a uniform' (유-), 'an honest person' (묵음 h)"
        - rule:
            en: "First mention of a countable singular noun (introducing new information)"
            ko: "셀 수 있는 단수 명사의 첫 언급 (새로운 정보 소개)"
          example: "I saw a dog in the park."
        - rule:
            en: "Classifying — saying what something is"
            ko: "분류 — 무엇인지 말하기"
          example: "She is a teacher. This is an interesting book."
        - rule:
            en: "With 'one of many' meaning"
            ko: "'여럿 중 하나' 의미로"
          example: "Can I have a glass of water?"
        - rule:
            en: "In expressions of frequency and price"
            ko: "빈도와 가격 표현에서"
          example: "twice a week, $5 a kilo, 60 km an hour"
    definite_article:
      label:
        en: "THE — Definite Article"
        ko: "THE — 정관사"
      rules:
        - rule:
            en: "Second mention (already known/introduced)"
            ko: "두 번째 언급 (이미 알려진/소개된)"
          example: "I saw a dog. The dog was brown."
        - rule:
            en: "Unique or only one (shared knowledge)"
            ko: "유일하거나 하나뿐인 것 (공유 지식)"
          example: "the sun, the moon, the president, the internet"
        - rule:
            en: "Specified by context or a following phrase"
            ko: "문맥이나 뒤따르는 구로 특정된"
          example: "the book on the table, the woman who called you"
        - rule:
            en: "Superlatives and ordinals"
            ko: "최상급과 서수"
          example: "the best, the first, the tallest building"
        - rule:
            en: "With of-phrases for specific groups"
            ko: "특정 그룹의 of-구와 함께"
          example: "the United States, the Republic of Korea"
        - rule:
            en: "Musical instruments (general ability)"
            ko: "악기 (일반적 능력)"
          example: "She plays the piano."
        - rule:
            en: "Certain geographic names"
            ko: "특정 지리적 이름"
          examples:
            - "Rivers/oceans/seas: the Amazon, the Pacific, the Mediterranean"
            - "Mountain ranges: the Alps, the Himalayas"
            - "Deserts: the Sahara, the Gobi"
            - "Countries (plural/union): the United States, the Netherlands, the UK"
    zero_article:
      label:
        en: "Zero Article (no article)"
        ko: "무관사 (관사 없음)"
      rules:
        - rule:
            en: "Uncountable nouns (general meaning)"
            ko: "셀 수 없는 명사 (일반적 의미)"
          example: "Water is essential. Music is relaxing. Information is important."
        - rule:
            en: "Plural countable nouns (general meaning)"
            ko: "복수 셀 수 있는 명사 (일반적 의미)"
          example: "Dogs are loyal. Books are expensive. Teachers work hard."
        - rule:
            en: "Meals, sports, academic subjects"
            ko: "식사, 스포츠, 학과목"
          example: "I had lunch. She plays tennis. He studies math."
        - rule:
            en: "Languages and nationalities (as subjects)"
            ko: "언어와 국적 (주어로)"
          example: "English is widely spoken. Korean is my first language."
        - rule:
            en: "Most country names, cities, continents"
            ko: "대부분의 나라 이름, 도시, 대륙"
          example: "Korea, Seoul, Asia, France, Tokyo"
        - rule:
            en: "With possessive or demonstrative determiners"
            ko: "소유격이나 지시 한정사와 함께"
          example: "my book (NOT the my book), this car (NOT the this car)"
    decision_tree:
      en: |
        Is the noun countable?
        ├── YES (countable)
        │   ├── Singular?
        │   │   ├── Known/specific? → THE (the book I mentioned)
        │   │   └── New/general?   → A/AN (a book, an apple)
        │   └── Plural?
        │       ├── Known/specific? → THE (the books on the shelf)
        │       └── General?        → ZERO (Books are useful.)
        └── NO (uncountable)
            ├── Known/specific? → THE (the water in this bottle)
            └── General?        → ZERO (Water is essential.)
      ko: |
        명사가 셀 수 있는가?
        ├── 예 (가산)
        │   ├── 단수?
        │   │   ├── 알려진/특정? → THE (the book I mentioned)
        │   │   └── 새로운/일반? → A/AN (a book, an apple)
        │   └── 복수?
        │       ├── 알려진/특정? → THE (the books on the shelf)
        │       └── 일반?       → 무관사 (Books are useful.)
        └── 아니오 (불가산)
            ├── 알려진/특정? → THE (the water in this bottle)
            └── 일반?       → 무관사 (Water is essential.)
    korean_common_errors:
      - error: "Omitting articles entirely"
        wrong: "I bought book."
        correct: "I bought a book."
        explanation:
          en: "Korean has no articles, so speakers often omit them."
          ko: "한국어에 관사가 없어 화자가 자주 생략."
      - error: "Using 'the' with general statements"
        wrong: "The dogs are loyal animals."
        correct: "Dogs are loyal animals."
        explanation:
          en: "Korean '그' is not equivalent to 'the'. General plural nouns need zero article."
          ko: "한국어 '그'는 'the'와 동일하지 않음. 일반 복수 명사는 무관사 필요."
      - error: "Confusing a/an based on spelling"
        wrong: "a honest person, an university"
        correct: "an honest person, a university"
        explanation:
          en: "Article choice is based on pronunciation, not spelling."
          ko: "관사 선택은 철자가 아닌 발음에 기반."

  # ============================================================
  # 2. PREPOSITION USAGE
  # ============================================================
  preposition_usage:
    id: preposition_usage
    label:
      en: "Preposition Usage"
      ko: "전치사 사용법"
    category: prepositions
    cefr: A2
    description:
      en: "English prepositions express relationships of time, place, direction, and other concepts. They often don't translate directly from Korean postpositions (-에, -에서, -으로)."
      ko: "영어 전치사는 시간, 장소, 방향 및 기타 개념의 관계를 표현. 한국어 조사(-에, -에서, -으로)에서 직접 번역되지 않는 경우가 많음."
    time_prepositions:
      label:
        en: "Time Prepositions: IN, ON, AT"
        ko: "시간 전치사: IN, ON, AT"
      rules:
        - preposition: AT
          use:
            en: "Specific times and points in time"
            ko: "특정 시간과 시점"
          examples: ["at 3 o'clock", "at noon", "at midnight", "at night", "at the weekend (BrE)", "at Christmas", "at the moment"]
        - preposition: ON
          use:
            en: "Days and dates"
            ko: "요일과 날짜"
          examples: ["on Monday", "on March 5th", "on my birthday", "on Christmas Day", "on the weekend (AmE)", "on a sunny day"]
        - preposition: IN
          use:
            en: "Longer periods (months, years, centuries, seasons, parts of day)"
            ko: "긴 기간 (월, 년, 세기, 계절, 하루의 부분)"
          examples: ["in January", "in 2024", "in the 21st century", "in summer", "in the morning", "in the afternoon", "in the evening"]
      exceptions:
        - "at night (NOT in the night)"
        - "on the weekend (AmE) / at the weekend (BrE)"
        - "No preposition: today, tomorrow, yesterday, last week, next month, this year, every day"
    place_prepositions:
      label:
        en: "Place Prepositions: IN, ON, AT"
        ko: "장소 전치사: IN, ON, AT"
      rules:
        - preposition: AT
          use:
            en: "Points, specific locations, addresses"
            ko: "지점, 특정 장소, 주소"
          examples: ["at the bus stop", "at the door", "at 123 Main Street", "at school", "at work", "at home", "at the airport"]
        - preposition: ON
          use:
            en: "Surfaces, lines (roads, rivers, floors)"
            ko: "표면, 선 (도로, 강, 층)"
          examples: ["on the table", "on the wall", "on the floor", "on Main Street", "on the second floor", "on the bus", "on the internet"]
        - preposition: IN
          use:
            en: "Enclosed spaces, areas, countries, cities"
            ko: "밀폐된 공간, 지역, 나라, 도시"
          examples: ["in the room", "in the box", "in Seoul", "in Korea", "in the park", "in the car", "in bed"]
    direction_prepositions:
      label:
        en: "Direction Prepositions"
        ko: "방향 전치사"
      rules:
        - preposition: to
          meaning: {en: "toward a destination", ko: "목적지를 향해"}
          example: "I went to school. She drove to the airport."
        - preposition: from
          meaning: {en: "starting point / origin", ko: "출발점 / 기원"}
          example: "I'm from Korea. The train from Seoul."
        - preposition: into
          meaning: {en: "movement to the inside", ko: "내부로의 이동"}
          example: "She walked into the room."
        - preposition: out of
          meaning: {en: "movement from the inside", ko: "내부에서 밖으로의 이동"}
          example: "He ran out of the building."
        - preposition: through
          meaning: {en: "from one side to the other", ko: "한쪽에서 다른 쪽으로 통과"}
          example: "We drove through the tunnel."
        - preposition: across
          meaning: {en: "from one side to the other (surface)", ko: "한쪽에서 다른 쪽으로 (표면)"}
          example: "She walked across the bridge."
        - preposition: along
          meaning: {en: "following the length of", ko: "~을 따라"}
          example: "We walked along the river."
        - preposition: toward(s)
          meaning: {en: "in the direction of", ko: "~방향으로"}
          example: "He walked toward the station."
    korean_common_errors:
      - error: "Using wrong time preposition"
        wrong: "I wake up in 7 o'clock."
        correct: "I wake up at 7 o'clock."
        explanation:
          en: "Korean uses -에 for all time expressions. English distinguishes AT (time), ON (day), IN (period)."
          ko: "한국어는 모든 시간 표현에 -에 사용. 영어는 AT(시간), ON(날), IN(기간) 구분."
      - error: "Adding 'to' with 'home'"
        wrong: "I went to home."
        correct: "I went home."
        explanation:
          en: "'Home' as an adverb doesn't need 'to'. But: 'I went to his home' (noun)."
          ko: "부사로서 'home'은 'to' 불필요. 하지만: 'I went to his home' (명사)."
      - error: "Confusing in/on for transportation"
        wrong: "I was in the bus."
        correct: "I was on the bus."
        explanation:
          en: "ON the bus/train/plane (public transport you can stand on). IN the car/taxi (small vehicle you sit in)."
          ko: "ON the bus/train/plane (서서 탈 수 있는 대중교통). IN the car/taxi (앉아서 타는 소형 차량)."

  # ============================================================
  # 3. TENSE CONTRASTS
  # ============================================================
  tense_contrasts:
    id: tense_contrasts
    label:
      en: "Key Tense Contrasts"
      ko: "핵심 시제 대조"
    category: tenses
    cefr: B1
    description:
      en: "English tense pairs that are frequently confused by Korean speakers. Understanding these contrasts is essential for accurate communication."
      ko: "한국어 화자가 자주 혼동하는 영어 시제 쌍. 정확한 의사소통을 위해 이러한 대조를 이해하는 것이 필수적."
    contrasts:
      - pair: "Simple Present vs Present Continuous"
        label:
          ko: "단순 현재 vs 현재 진행"
        simple:
          use:
            en: "Habits, routines, permanent states, general truths"
            ko: "습관, 일과, 영구적 상태, 일반적 진리"
          example: "I drink coffee every morning. (habit)"
        continuous:
          use:
            en: "Actions happening now, temporary situations"
            ko: "지금 일어나는 행동, 일시적 상황"
          example: "I am drinking coffee right now. (now)"
        korean_trap:
          en: "Korean -아/어요 covers both. Korean speakers must actively decide: is this a habit or happening now?"
          ko: "한국어 -아/어요가 둘 다 포함. 한국어 화자는 적극적으로 판단해야 함: 습관인가 지금 일어나는 것인가?"

      - pair: "Simple Past vs Present Perfect"
        label:
          ko: "단순 과거 vs 현재 완료"
        simple_past:
          use:
            en: "Finished actions at a specific past time"
            ko: "특정 과거 시간에 완료된 행동"
          example: "I visited Paris in 2019. (specific time)"
        present_perfect:
          use:
            en: "Past actions with present relevance, no specific time"
            ko: "현재와 관련된 과거 행동, 특정 시간 없음"
          example: "I have visited Paris. (experience, no time)"
        key_rule:
          en: >
            If you mention WHEN → use simple past.
            If time is NOT specified → present perfect is often better.
            "I have been to Korea" (OK) vs "I have been to Korea last year" (WRONG — use "I went to Korea last year").
          ko: >
            언제인지 언급하면 → 단순과거 사용.
            시간이 명시되지 않으면 → 현재완료가 더 적합.
            "I have been to Korea" (맞음) vs "I have been to Korea last year" (틀림 — "I went to Korea last year" 사용).

      - pair: "Present Perfect vs Present Perfect Continuous"
        label:
          ko: "현재 완료 vs 현재 완료 진행"
        perfect:
          use:
            en: "Emphasis on result or completion"
            ko: "결과나 완료 강조"
          example: "I have written three emails. (result: 3 done)"
        perfect_continuous:
          use:
            en: "Emphasis on duration or ongoing process"
            ko: "기간이나 진행 과정 강조"
          example: "I have been writing emails all morning. (duration)"

      - pair: "Will vs Going to"
        label:
          ko: "Will vs Going to"
        will:
          use:
            en: "Spontaneous decisions, promises, opinion-based predictions"
            ko: "즉흥적 결정, 약속, 의견 기반 예측"
          example: "I'll have the steak. (just decided now)"
        going_to:
          use:
            en: "Pre-planned intentions, evidence-based predictions"
            ko: "미리 계획된 의도, 증거 기반 예측"
          example: "I'm going to have the steak. (already decided)"

      - pair: "Past Simple vs Past Continuous"
        label:
          ko: "단순 과거 vs 과거 진행"
        simple:
          use:
            en: "Completed actions, main events in sequence"
            ko: "완료된 행동, 연속된 주요 사건"
          example: "She opened the door and walked in."
        continuous:
          use:
            en: "Background actions, actions in progress when interrupted"
            ko: "배경 행동, 중단되었을 때 진행 중인 행동"
          example: "She was cooking when the phone rang."

      - pair: "Used to vs Would vs Simple Past"
        label:
          ko: "Used to vs Would vs 단순 과거"
        used_to:
          use:
            en: "Past habits or states that no longer exist"
            ko: "더 이상 존재하지 않는 과거 습관이나 상태"
          example: "I used to live in Seoul. (I don't anymore)"
        would:
          use:
            en: "Repeated past actions only (NOT states)"
            ko: "반복된 과거 행동만 (상태 아님)"
          example: "Every summer, we would go to the beach."
        restriction:
          en: "'Would' CANNOT be used for past states: 'I would live in Seoul' (WRONG for past state). Use 'used to' or simple past for states."
          ko: "'Would'는 과거 상태에 사용 불가: 'I would live in Seoul' (과거 상태로 틀림). 상태에는 'used to'나 단순과거 사용."

  # ============================================================
  # 4. CONDITIONALS
  # ============================================================
  conditionals:
    id: conditionals
    label:
      en: "Conditional Sentences"
      ko: "조건문"
    category: conditionals
    cefr: B1
    description:
      en: "English conditionals use specific tense combinations to express real, hypothetical, and impossible conditions. See tense_rules.yaml for detailed formation."
      ko: "영어 조건문은 현실적, 가정적, 불가능한 조건을 표현하기 위해 특정 시제 조합을 사용. 자세한 형성법은 tense_rules.yaml 참조."
    summary_table:
      en: |
        Type     | If-clause            | Main clause              | Use
        ---------|----------------------|--------------------------|---------------------------
        Zero     | present simple       | present simple           | General truths
        First    | present simple       | will + base              | Real/possible future
        Second   | past simple          | would + base             | Unreal present/future
        Third    | past perfect         | would have + pp          | Unreal past (regret)
        Mixed    | past perfect         | would + base             | Past cause → present result
      ko: |
        유형     | If절                  | 주절                      | 용도
        ---------|----------------------|--------------------------|---------------------------
        0조건    | 현재 단순             | 현재 단순                 | 일반적 진리
        1조건    | 현재 단순             | will + 원형               | 현실적/가능한 미래
        2조건    | 과거 단순             | would + 원형              | 비현실적 현재/미래
        3조건    | 과거 완료             | would have + 과거분사     | 비현실적 과거 (후회)
        혼합     | 과거 완료             | would + 원형              | 과거 원인 → 현재 결과
    key_rules:
      - rule:
          en: "Never use WILL in the if-clause for conditions"
          ko: "조건의 if절에 WILL 사용 금지"
        wrong: "If it will rain, I will stay home."
        correct: "If it rains, I will stay home."
      - rule:
          en: "Use WERE (not WAS) for 2nd conditional in formal English"
          ko: "격식 영어에서 2조건문에 WAS가 아닌 WERE 사용"
        formal: "If I were rich, I would travel."
        informal: "If I was rich, I would travel."
      - rule:
          en: "If-clause can come first or second (comma only when if-clause is first)"
          ko: "If절은 앞이나 뒤에 올 수 있음 (If절이 앞에 올 때만 쉼표)"
        examples:
          - "If it rains, I'll stay home."
          - "I'll stay home if it rains."
    korean_note:
      en: "Korean uses -(으)면 for all conditionals with no tense distinction. Korean speakers must learn to use past simple (2nd), past perfect (3rd), and the concept of 'backshifting' for hypothetical/unreal conditions."
      ko: "한국어는 모든 조건문에 시제 구분 없이 -(으)면 사용. 한국어 화자는 과거 단순(2조건), 과거 완료(3조건), 그리고 가정적/비현실적 조건을 위한 '시제 후퇴' 개념을 반드시 학습."

  # ============================================================
  # 5. PASSIVE VOICE
  # ============================================================
  passive_voice:
    id: passive_voice
    label:
      en: "Passive Voice"
      ko: "수동태"
    category: voice
    cefr: B1
    description:
      en: "The passive voice emphasizes the action or the receiver rather than the doer. Formed with BE + past participle."
      ko: "수동태는 행위자보다 행동이나 수신자를 강조. BE + 과거분사로 형성."
    formation:
      en: "Subject + BE (conjugated in appropriate tense) + past participle (+ by + agent)"
      ko: "주어 + BE (적절한 시제로 활용) + 과거분사 (+ by + 행위자)"
    tense_examples:
      - tense: Simple Present
        active: "They make cars in Germany."
        passive: "Cars are made in Germany."
      - tense: Simple Past
        active: "Shakespeare wrote Hamlet."
        passive: "Hamlet was written by Shakespeare."
      - tense: Present Perfect
        active: "Someone has stolen my wallet."
        passive: "My wallet has been stolen."
      - tense: Future (will)
        active: "They will build a new hospital."
        passive: "A new hospital will be built."
      - tense: Present Continuous
        active: "They are repairing the road."
        passive: "The road is being repaired."
      - tense: Past Continuous
        active: "They were cleaning the office."
        passive: "The office was being cleaned."
      - tense: Modal
        active: "You must complete the form."
        passive: "The form must be completed."
      - tense: Past Perfect
        active: "They had finished the project."
        passive: "The project had been finished."
    when_to_use:
      - use:
          en: "The doer is unknown"
          ko: "행위자를 모를 때"
        example: "My car was stolen. (I don't know who did it.)"
      - use:
          en: "The doer is obvious or unimportant"
          ko: "행위자가 명백하거나 중요하지 않을 때"
        example: "The suspect was arrested. (by police — obvious)"
      - use:
          en: "Formal or academic writing"
          ko: "격식체 또는 학술적 글쓰기"
        example: "The experiment was conducted over six months."
      - use:
          en: "To emphasize the action/object"
          ko: "행동/대상을 강조하기 위해"
        example: "The Mona Lisa was painted by Leonardo da Vinci."
    by_agent:
      en: "Include 'by + agent' only when the doer is important or surprising. Omit when the agent is obvious, unknown, or general."
      ko: "'by + 행위자'는 행위자가 중요하거나 놀라울 때만 포함. 행위자가 명백하거나, 알려지지 않았거나, 일반적일 때 생략."
      include: "The song was written by a 12-year-old. (surprising)"
      omit: "English is spoken worldwide. (by people — obvious)"
    get_passive:
      en: >
        In informal English, GET + past participle is often used instead of BE + past participle:
        - get married (not be married — for the event)
        - get hurt, get fired, get promoted, get arrested, get lost
        GET passive often implies something unexpected or unfortunate.
      ko: >
        비격식 영어에서 BE + 과거분사 대신 GET + 과거분사를 자주 사용:
        - get married (결혼하다 — 사건), get hurt (다치다), get fired (해고되다),
        get promoted (승진하다), get arrested (체포되다), get lost (길을 잃다)
        GET 수동태는 예상치 못한 일이나 불운한 일을 함축하는 경우가 많음.
    korean_comparison:
      en: >
        Korean passive uses:
        - Suffixes: -이/히/리/기 (먹히다, 잡히다, 열리다, 안기다)
        - 되다 verbs: 발견되다, 사용되다
        - -아/어지다: 만들어지다
        Korean passive is more limited than English — many Korean passive constructions use active voice with different subjects. English uses passive much more frequently than Korean.
      ko: >
        한국어 수동태:
        - 접미사: -이/히/리/기 (먹히다, 잡히다, 열리다, 안기다)
        - 되다 동사: 발견되다, 사용되다
        - -아/어지다: 만들어지다
        한국어 수동태는 영어보다 제한적 — 많은 한국어 수동 구문은 다른 주어의 능동태 사용. 영어는 한국어보다 수동태를 훨씬 더 자주 사용.

  # ============================================================
  # 6. RELATIVE CLAUSES
  # ============================================================
  relative_clauses:
    id: relative_clauses
    label:
      en: "Relative Clauses"
      ko: "관계절"
    category: clauses
    cefr: B2
    description:
      en: "Relative clauses add information about nouns using relative pronouns (who, which, that, whose, where, when). English relative clauses come AFTER the noun — the opposite of Korean modification order."
      ko: "관계절은 관계대명사(who, which, that, whose, where, when)를 사용하여 명사에 정보를 추가. 영어 관계절은 명사 뒤에 옴 — 한국어 수식 순서와 반대."
    relative_pronouns:
      - pronoun: who
        use: {en: "People (subject)", ko: "사람 (주어)"}
        example: "The woman who lives next door is a doctor."
      - pronoun: whom
        use: {en: "People (object, formal)", ko: "사람 (목적어, 격식)"}
        example: "The person whom I called was not available."
      - pronoun: which
        use: {en: "Things and animals", ko: "사물과 동물"}
        example: "The book which I read was excellent."
      - pronoun: that
        use: {en: "People or things (defining clauses only)", ko: "사람 또는 사물 (한정 관계절만)"}
        example: "The car that he bought was expensive."
      - pronoun: whose
        use: {en: "Possession (people or things)", ko: "소유 (사람 또는 사물)"}
        example: "The student whose phone rang left the room."
      - pronoun: where
        use: {en: "Places", ko: "장소"}
        example: "The restaurant where we ate was excellent."
      - pronoun: when
        use: {en: "Times", ko: "시간"}
        example: "I remember the day when we first met."
    types:
      defining:
        label:
          en: "Defining (Restrictive) — essential information"
          ko: "한정적 (제한적) — 필수 정보"
        rules:
          - en: "No commas"
            ko: "쉼표 없음"
          - en: "'That' can replace 'who' or 'which'"
            ko: "'that'이 'who' 또는 'which'를 대체 가능"
          - en: "Relative pronoun can be omitted when it is the OBJECT"
            ko: "관계대명사가 목적어일 때 생략 가능"
        examples:
          - "The man who/that called you is my boss. (subject — cannot omit)"
          - "The book (which/that) I read was good. (object — can omit)"
      non_defining:
        label:
          en: "Non-defining (Non-restrictive) — extra information"
          ko: "비한정적 (비제한적) — 추가 정보"
        rules:
          - en: "Commas required around the clause"
            ko: "관계절 주위에 쉼표 필수"
          - en: "CANNOT use 'that'"
            ko: "'that' 사용 불가"
          - en: "Relative pronoun CANNOT be omitted"
            ko: "관계대명사 생략 불가"
        examples:
          - "My mother, who is 60, lives in Seoul. (extra info about my mother)"
          - "Seoul, which is the capital of Korea, has 10 million people."
    reduced_relative_clauses:
      en: >
        Defining relative clauses can be reduced:
        - Active verb: "The woman who is sitting there" → "The woman sitting there"
        - Passive verb: "The book which was written by her" → "The book written by her"
        - Be + adjective: "People who are interested" → "People interested"
      ko: >
        한정 관계절을 축소 가능:
        - 능동사: "The woman who is sitting there" → "The woman sitting there"
        - 수동사: "The book which was written by her" → "The book written by her"
        - Be + 형용사: "People who are interested" → "People interested"
    korean_word_order_contrast:
      en: >
        Korean modifies BEFORE the noun (pre-modification):
        "어제 내가 만난 사람" (yesterday I-met person)
        English modifies AFTER the noun (post-modification):
        "The person who I met yesterday"
        This is one of the biggest structural differences between Korean and English.
      ko: >
        한국어는 명사 앞에서 수식 (전치 수식):
        "어제 내가 만난 사람"
        영어는 명사 뒤에서 수식 (후치 수식):
        "The person who I met yesterday"
        이것은 한국어와 영어의 가장 큰 구조적 차이 중 하나.

  # ============================================================
  # 7. WORD ORDER
  # ============================================================
  word_order:
    id: word_order
    label:
      en: "English Word Order"
      ko: "영어 어순"
    category: syntax
    cefr: A1
    description:
      en: "English is an SVO (Subject-Verb-Object) language. Word order is relatively fixed compared to Korean (SOV). Changing word order changes meaning or makes sentences ungrammatical."
      ko: "영어는 SVO (주어-동사-목적어) 언어. 한국어(SOV)에 비해 어순이 비교적 고정적. 어순을 바꾸면 의미가 변하거나 비문법적이 됨."
    basic_svo:
      en: "Subject + Verb + Object"
      ko: "주어 + 동사 + 목적어"
      examples:
        - english: "I eat rice."
          korean: "나는 밥을 먹는다."
          note:
            en: "Korean SOV: 나는(S) 밥을(O) 먹는다(V)"
            ko: "한국어 SOV: 나는(S) 밥을(O) 먹는다(V)"
        - english: "She reads books."
          korean: "그녀는 책을 읽는다."
    question_word_order:
      label:
        en: "Question Formation (Subject-Auxiliary Inversion)"
        ko: "의문문 형성 (주어-조동사 도치)"
      rules:
        - type:
            en: "Yes/No questions with BE"
            ko: "BE를 사용한 예/아니오 의문문"
          statement: "She is a teacher."
          question: "Is she a teacher?"
          pattern: "BE + subject + ...?"
        - type:
            en: "Yes/No questions with auxiliary"
            ko: "조동사를 사용한 예/아니오 의문문"
          statement: "They have finished."
          question: "Have they finished?"
          pattern: "Auxiliary + subject + ...?"
        - type:
            en: "Yes/No questions with DO-support"
            ko: "DO-지지를 사용한 예/아니오 의문문"
          statement: "You like coffee."
          question: "Do you like coffee?"
          pattern: "Do/Does/Did + subject + base verb?"
        - type:
            en: "Wh-questions"
            ko: "Wh-의문문"
          pattern: "Wh-word + auxiliary/BE + subject + verb?"
          examples:
            - "What do you want?"
            - "Where does she live?"
            - "When did they arrive?"
            - "Why are you crying?"
            - "How have you been?"
        - type:
            en: "Wh-word as subject (no inversion)"
            ko: "Wh-단어가 주어일 때 (도치 없음)"
          examples:
            - "Who called you? (NOT Who did call you?)"
            - "What happened? (NOT What did happen?)"
      korean_error:
        en: "Korean questions use sentence-final markers (-습니까?, -나요?) without word order change. Korean speakers often keep SVO order in English questions: 'You like coffee?' instead of 'Do you like coffee?'"
        ko: "한국어 의문문은 어순 변경 없이 문장 끝 표지 사용 (-습니까?, -나요?). 한국어 화자는 영어 의문문에서 종종 SVO 어순 유지: 'Do you like coffee?' 대신 'You like coffee?'"
    negative_word_order:
      label:
        en: "Negative Sentences"
        ko: "부정문"
      rules:
        - type:
            en: "With BE"
            ko: "BE와 함께"
          pattern: "Subject + BE + not + ..."
          example: "She is not (isn't) happy."
        - type:
            en: "With auxiliary verbs"
            ko: "조동사와 함께"
          pattern: "Subject + auxiliary + not + ..."
          example: "They have not (haven't) arrived."
        - type:
            en: "With DO-support"
            ko: "DO-지지와 함께"
          pattern: "Subject + do/does/did + not + base verb"
          example: "I do not (don't) understand."
      korean_error:
        en: "Korean negation uses 안/못 BEFORE the verb or -지 않다 AFTER. Korean speakers sometimes place 'not' in the wrong position: 'I not like' instead of 'I don't like' or 'I do not like'."
        ko: "한국어 부정은 동사 앞에 안/못 또는 뒤에 -지 않다 사용. 한국어 화자는 'not'을 잘못된 위치에 놓기도 함: 'I don't like' 대신 'I not like'."
    adjective_order:
      label:
        en: "Adjective Order (OSASCOMP)"
        ko: "형용사 순서 (OSASCOMP)"
      description:
        en: "When multiple adjectives modify a noun, they follow a fixed order. Native speakers follow this instinctively."
        ko: "여러 형용사가 명사를 수식할 때 고정된 순서를 따름. 원어민은 본능적으로 이 순서를 따름."
      order:
        - position: 1
          category: {en: Opinion, ko: 의견}
          examples: [beautiful, nice, ugly, lovely, awful, delicious]
        - position: 2
          category: {en: Size, ko: 크기}
          examples: [big, small, tall, short, tiny, huge, long]
        - position: 3
          category: {en: Age, ko: 나이}
          examples: [old, young, new, ancient, modern]
        - position: 4
          category: {en: Shape, ko: 모양}
          examples: [round, square, flat, oval, thin, wide]
        - position: 5
          category: {en: Color, ko: 색상}
          examples: [red, blue, green, black, white, dark, light]
        - position: 6
          category: {en: Origin, ko: 출신}
          examples: [Korean, American, Japanese, French, Italian]
        - position: 7
          category: {en: Material, ko: 재료}
          examples: [wooden, metal, cotton, silk, glass, leather]
        - position: 8
          category: {en: Purpose, ko: 목적}
          examples: [cooking (pot), sleeping (bag), running (shoes)]
      mnemonic:
        en: "OSASCOMP = Opinion, Size, Age, Shape, Color, Origin, Material, Purpose"
        ko: "OSASCOMP = 의견, 크기, 나이, 모양, 색상, 출신, 재료, 목적"
      examples:
        - "a beautiful big old round red Italian wooden cooking spoon (all 8!)"
        - "a lovely small new black Korean leather handbag"
        - "an ugly big old square brown German metal box"
      notes:
        en: "In practice, rarely more than 2-3 adjectives before a noun. Korean adjective order is more flexible."
        ko: "실제로 명사 앞에 2-3개 이상의 형용사를 쓰는 경우는 드묾. 한국어 형용사 순서는 더 유연."
    adverb_position:
      label:
        en: "Adverb Position"
        ko: "부사 위치"
      rules:
        - type: {en: "Frequency adverbs", ko: "빈도 부사"}
          position: {en: "Before main verb, after BE/auxiliary", ko: "본동사 앞, BE/조동사 뒤"}
          examples:
            - "I always eat breakfast. (before main verb)"
            - "She is usually late. (after BE)"
            - "He has never been to Korea. (after auxiliary)"
        - type: {en: "Manner adverbs", ko: "양태 부사"}
          position: {en: "After the verb or object", ko: "동사 또는 목적어 뒤"}
          examples:
            - "She speaks English fluently."
            - "He carefully opened the box."
        - type: {en: "Time and place adverbs", ko: "시간과 장소 부사"}
          position: {en: "Usually at the end (place before time)", ko: "보통 끝에 (장소가 시간보다 앞)"}
          examples:
            - "I met her at the cafe yesterday. (place, then time)"
            - "She arrived in Seoul last Monday."
    korean_sov_vs_english_svo:
      en: |
        Korean (SOV)          | English (SVO)
        ----------------------|---------------------------
        나는 커피를 마신다.      | I drink coffee.
        S    O     V          | S   V     O
        나는 한국에서 왔습니다.  | I come from Korea.
        S    장소+에서  V      | S  V    from  place
        그녀가 나에게 책을 줬다. | She gave me a book.
        S    IO    DO   V    | S    V   IO  DO
      ko: |
        한국어 (SOV)            | 영어 (SVO)
        ----------------------|---------------------------
        나는 커피를 마신다.      | I drink coffee.
        S    O     V          | S   V     O
        나는 한국에서 왔습니다.  | I come from Korea.
        S    장소+에서  V      | S  V    from  장소
        그녀가 나에게 책을 줬다. | She gave me a book.
        S    IO    DO   V    | S    V   IO  DO
