lesson: 10_Giving_and_Receiving
lesson_number: 10
jlpt: N4
categories:
- id: giving_receiving_verbs
  label:
    en: Giving and Receiving Verbs
    ko: 수수 동사
  type: vocabulary
  words:
  - japanese: あげる
    reading: null
    translation:
      en: to give (speaker to other)
      ko: 주다 (화자 → 타인)
    gender: null
    plural: null
    notes:
      en: "Direction: outward from speaker. Never used when someone gives TO the speaker"
      ko: "방향: 화자로부터 밖으로. 누군가가 화자에게 줄 때는 사용하지 않음"
  - japanese: もらう
    reading: null
    translation:
      en: to receive
      ko: 받다
    gender: null
    plural: null
    notes:
      en: "The receiver is the subject. Giver marked with に or から"
      ko: "받는 사람이 주어. 주는 사람은 に 또는 から로 표시"
  - japanese: くれる
    reading: null
    translation:
      en: to give (other to speaker)
      ko: 주다 (타인 → 화자)
    gender: null
    plural: null
    notes:
      en: "Used when someone gives to the speaker or speaker's in-group. Implies gratitude"
      ko: "누군가가 화자 또는 화자의 내집단에게 줄 때 사용. 감사의 뉘앙스 포함"
  - japanese: さしあげる
    reading: null
    translation:
      en: to give (humble/formal)
      ko: 드리다 (겸양)
    gender: null
    plural: null
    notes:
      en: "Humble form of あげる. Used when giving to superiors"
      ko: "あげる의 겸양형. 윗사람에게 줄 때 사용"
  - japanese: いただく
    reading: null
    translation:
      en: to receive (humble/formal)
      ko: 받다 (겸양)
    gender: null
    plural: null
    notes:
      en: "Humble form of もらう. Used when receiving from superiors"
      ko: "もらう의 겸양형. 윗사람에게서 받을 때 사용"
  - japanese: くださる
    reading: null
    translation:
      en: to give (honorific)
      ko: 주시다 (존경)
    gender: null
    plural: null
    notes:
      en: "Honorific form of くれる. Used when a superior gives to the speaker"
      ko: "くれる의 존경형. 윗사람이 화자에게 줄 때 사용"
