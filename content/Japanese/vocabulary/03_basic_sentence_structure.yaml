- id: copula_and_sentence_endings
  label:
    en: Copula and Sentence Endings
    ko: 서술사와 문장 종결
  type: vocabulary
  words:
  - japanese: です
    reading: null
    translation:
      en: is / am / are (polite copula)
      ko: ~입니다 / ~입니까 (공손 서술사)
    gender: null
    plural: null
    notes:
      en: "Polite copula. 学生です = (I) am a student."
      ko: "공손 서술사. 学生です = 학생입니다."
  - japanese: じゃないです
    reading: null
    translation:
      en: is not (polite negative)
      ko: ~가 아닙니다
    gender: null
    plural: null
    notes:
      en: "Negative of です. Also じゃありません (more formal)."
      ko: "です의 부정형. じゃありません도 가능 (더 격식적)."
  - japanese: でした
    reading: null
    translation:
      en: was / were (polite past copula)
      ko: ~이었습니다
    gender: null
    plural: null
  - japanese: だ
    reading: null
    translation:
      en: is / am / are (plain copula)
      ko: ~이다 (반말 서술사)
    gender: null
    plural: null
    notes:
      en: "Plain/casual form of です. Used in informal speech and writing."
      ko: "です의 반말형. 비격식적 대화와 글에서 사용."
  - japanese: よ
    reading: null
    translation:
      en: sentence-ending particle (emphasis/assertion)
      ko: ~요 / ~이야 (강조/단정 종결 조사)
    gender: null
    plural: null
    notes:
      en: "Adds emphasis or new information: これは本ですよ (This IS a book, you know)"
      ko: "강조 또는 새로운 정보 전달: これは本ですよ (이건 책이에요)"
  - japanese: ね
    reading: null
    translation:
      en: sentence-ending particle (seeking agreement)
      ko: ~네 / ~지 (동의 구하기 종결 조사)
    gender: null
    plural: null
    notes:
      en: "Seeks agreement: いい天気ですね (Nice weather, isn't it?)"
      ko: "동의를 구함: いい天気ですね (좋은 날씨네요, 그렇죠?)"

