lesson: 03_Basic_Sentence_Structure
lesson_number: 3
jlpt: N5
categories:
- id: basic_particles
  label:
    en: Basic Particles
    ko: 기본 조사
  type: vocabulary
  words:
  - japanese: は
    reading: null
    translation:
      en: topic marker particle (read 'wa')
      ko: 주제 표시 조사 ('와'로 읽음)
    gender: null
    plural: null
    notes:
      en: "Written は but read 'wa' when used as a particle. Marks the topic of the sentence."
      ko: "は로 쓰지만 조사로 쓸 때는 'wa'로 읽음. 문장의 주제를 표시."
  - japanese: が
    reading: null
    translation:
      en: subject marker particle
      ko: 주어 표시 조사
    gender: null
    plural: null
    notes:
      en: "Marks the grammatical subject, especially for new/important information"
      ko: "문법적 주어를 표시, 특히 새로운/중요한 정보에 사용"
  - japanese: を
    reading: null
    translation:
      en: object marker particle (read 'o')
      ko: 목적어 표시 조사 ('오'로 읽음)
    gender: null
    plural: null
    notes:
      en: "Written を but read 'o' in modern Japanese. Marks the direct object."
      ko: "を로 쓰지만 현대 일본어에서는 'o'로 읽음. 직접 목적어를 표시."
  - japanese: に
    reading: null
    translation:
      en: direction / time / location particle
      ko: 방향 / 시간 / 장소 조사
    gender: null
    plural: null
    notes:
      en: "Multiple uses: 'to' (direction), 'at' (time), 'in/at' (existence location)"
      ko: "다양한 용법: 방향(~에), 시간(~에), 존재 장소(~에)"
  - japanese: で
    reading: null
    translation:
      en: place of action / means particle
      ko: 행동 장소 / 수단 조사
    gender: null
    plural: null
    notes:
      en: "Where an action happens ('at') or means/method ('by/with')"
      ko: "행동이 일어나는 장소(~에서) 또는 수단/방법(~으로)"
  - japanese: か
    reading: null
    translation:
      en: question particle
      ko: 의문 조사
    gender: null
    plural: null
    notes:
      en: "Added to the end of a statement to form a question"
      ko: "문장 끝에 붙여 의문문을 만듦"
  - japanese: の
    reading: null
    translation:
      en: possessive / connection particle
      ko: 소유 / 연결 조사
    gender: null
    plural: null
    notes:
      en: "Like 's in English: 私の本 (watashi no hon) = my book"
      ko: "영어의 's와 유사: 私の本(와타시 노 혼) = 나의 책"
  - japanese: も
    reading: null
    translation:
      en: also / too particle
      ko: ~도 조사
    gender: null
    plural: null
    notes:
      en: "Replaces は or が: 私も学生です (I am also a student)"
      ko: "は나 が를 대체: 私も学生です (나도 학생입니다)"
  - japanese: と
    reading: null
    translation:
      en: and (connecting nouns) / with
      ko: ~와/과 (명사 연결) / ~와 함께
    gender: null
    plural: null
    notes:
      en: "Connects nouns exhaustively: 犬と猫 (dog and cat)"
      ko: "명사를 빠짐없이 연결: 犬と猫 (개와 고양이)"
  - japanese: や
    reading: null
    translation:
      en: and (non-exhaustive list)
      ko: ~이나 / ~와 같은
    gender: null
    plural: null
    notes:
      en: "Implies there are more items: 犬や猫 (dogs, cats, etc.)"
      ko: "더 많은 항목이 있음을 암시: 犬や猫 (개, 고양이 등)"
  - japanese: から
    reading: null
    translation:
      en: from / because
      ko: ~부터 / ~에서 / ~이니까
    gender: null
    plural: null
    notes:
      en: "Time/place origin: 九時から (from 9 o'clock). Reason: 暑いから (because it's hot)."
      ko: "시간/장소 기점: 九時から (9시부터). 이유: 暑いから (더우니까)."
  - japanese: まで
    reading: null
    translation:
      en: until / up to
      ko: ~까지
    gender: null
    plural: null
    notes:
      en: "Often paired with から: 九時から五時まで (from 9 to 5)"
      ko: "から와 짝으로 사용: 九時から五時まで (9시부터 5시까지)"
  - japanese: へ
    reading: null
    translation:
      en: toward / to (direction) (read 'e')
      ko: ~으로 / ~을 향해 ('에'로 읽음)
    gender: null
    plural: null
    notes:
      en: "Written へ but read 'e' as a particle. Shows direction of movement."
      ko: "へ로 쓰지만 조사로 쓸 때는 'e'로 읽음. 이동 방향을 나타냄."

