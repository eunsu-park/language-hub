- id: email_expressions
  label:
    en: Email Expressions
    ko: 이메일 표현
  type: vocabulary
  words:
  - japanese: お世話になっております
    reading: おせわになっております
    translation:
      en: standard email opening (to external contacts)
      ko: 항상 신세지고 있습니다 (외부 연락 시 인사)
    gender: null
    plural: null
    notes:
      en: "The most common email opening for external business contacts"
      ko: "외부 비즈니스 연락 시 가장 일반적인 이메일 인사"
  - japanese: お疲れ様です
    reading: おつかれさまです
    translation:
      en: internal greeting (to colleagues)
      ko: 수고하셨습니다 (사내 인사)
    gender: null
    plural: null
  - japanese: 何卒よろしくお願い申し上げます
    reading: なにとぞよろしくおねがいもうしあげます
    translation:
      en: standard formal email closing
      ko: 아무쪼록 잘 부탁드립니다
    gender: null
    plural: null
  - japanese: ご確認のほど
    reading: ごかくにんのほど
    translation:
      en: please confirm (formal)
      ko: 확인해 주시기 바랍니다
    gender: null
    plural: null
  - japanese: 添付ファイル
    reading: てんぷファイル
    translation:
      en: attached file
      ko: 첨부 파일
    gender: null
    plural: null
  - japanese: ご返信
    reading: ごへんしん
    translation:
      en: reply (honorific)
      ko: 답장 (존경어)
    gender: null
    plural: null
  - japanese: ご無沙汰しております
    reading: ごぶさたしております
    translation:
      en: it has been a long time (formal greeting)
      ko: 오랫동안 연락 못 드렸습니다
    gender: null
    plural: null

- id: corporate_terms
  label:
    en: Corporate Terms
    ko: 기업 용어
  type: vocabulary
  words:
  - japanese: 社長
    reading: しゃちょう
    translation:
      en: president, CEO
      ko: 사장
    gender: null
    plural: null
  - japanese: 部長
    reading: ぶちょう
    translation:
      en: department head
      ko: 부장
    gender: null
    plural: null
  - japanese: 課長
    reading: かちょう
    translation:
      en: section chief
      ko: 과장
    gender: null
    plural: null
  - japanese: 名刺交換
    reading: めいしこうかん
    translation:
      en: business card exchange
      ko: 명함 교환
    gender: null
    plural: null
    notes:
      en: "A highly ritualized aspect of Japanese business culture"
      ko: "일본 비즈니스 문화의 매우 의례적인 측면"
  - japanese: 報告
    reading: ほうこく
    translation:
      en: report (to a superior)
      ko: 보고
    gender: null
    plural: null
    notes:
      en: "Part of ほうれんそう (報連相) — the foundation of Japanese workplace communication"
      ko: "ほうれんそう(報連相)의 일부 — 일본 직장 소통의 기본"
  - japanese: 連絡
    reading: れんらく
    translation:
      en: notification, contacting
      ko: 연락
    gender: null
    plural: null
  - japanese: 相談
    reading: そうだん
    translation:
      en: consultation
      ko: 상담
    gender: null
    plural: null
  - japanese: お先に失礼いたします
    reading: おさきにしつれいいたします
    translation:
      en: excuse me for leaving first
      ko: 먼저 실례하겠습니다
    gender: null
    plural: null
    notes:
      en: "Standard phrase when leaving the office before colleagues"
      ko: "동료보다 먼저 퇴근할 때 사용하는 표준 표현"
  - japanese: 折り返し
    reading: おりかえし
    translation:
      en: return (call back)
      ko: 다시 전화하기
    gender: null
    plural: null
    notes:
      en: "折り返しお電話する = to call back"
      ko: "折り返しお電話する = 다시 전화하다"
  - japanese: 善処いたします
    reading: ぜんしょいたします
    translation:
      en: we will do our best to handle it
      ko: 최선을 다하겠습니다
    gender: null
    plural: null
    notes:
      en: "Often an indirect way of declining — may mean 'don't hold your breath'"
      ko: "종종 간접적인 거절 방법 — '기대하지 마세요'라는 의미일 수 있음"
  - japanese: 前向きに検討させていただきます
    reading: まえむきにけんとうさせていただきます
    translation:
      en: we will consider it positively
      ko: 긍정적으로 검토하겠습니다
    gender: null
    plural: null
    notes:
      en: "Commonly an indirect refusal in business context"
      ko: "비즈니스에서 흔히 간접적 거절을 의미"
