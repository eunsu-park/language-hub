lesson: 21_Business_Japanese
lesson_number: 21
jlpt: N1
categories:
- id: business_honorifics
  label:
    en: Business Honorifics
    ko: 비즈니스 경어
  type: vocabulary
  words:
  - japanese: ビジネス敬語
    reading: ビジネスけいご
    translation:
      en: business honorifics
      ko: 비즈니스 경어
    gender: null
    plural: null
    notes:
      en: "Ultra-formal honorific expressions required in professional settings"
      ko: "비즈니스 환경에서 필요한 극존칭 표현"
  - japanese: 申し上げる
    reading: もうしあげる
    translation:
      en: to say (humble, business level)
      ko: 말씀드리다 (겸양어, 비즈니스)
    gender: null
    plural: null
    notes:
      en: "Business upgrade of 申す (mousu)"
      ko: "申す의 비즈니스 격상형"
  - japanese: 存じ上げる
    reading: ぞんじあげる
    translation:
      en: to know (humble, business level)
      ko: 알고 있다 (겸양어, 비즈니스)
    gender: null
    plural: null
  - japanese: 拝見する
    reading: はいけんする
    translation:
      en: to look at (humble)
      ko: 보다 (겸양어)
    gender: null
    plural: null
  - japanese: 頂戴する
    reading: ちょうだいする
    translation:
      en: to receive (humble, business level)
      ko: 받다 (겸양어, 비즈니스)
    gender: null
    plural: null
  - japanese: 賜る
    reading: たまわる
    translation:
      en: to receive (very humble, formal)
      ko: 받들다 (매우 겸손한 표현)
    gender: null
    plural: null
  - japanese: 弊社
    reading: へいしゃ
    translation:
      en: our company (humble)
      ko: 저희 회사 (겸양)
    gender: null
    plural: null
  - japanese: 御社
    reading: おんしゃ
    translation:
      en: your company (spoken, respectful)
      ko: 귀사 (구어, 존경)
    gender: null
    plural: null
  - japanese: 貴社
    reading: きしゃ
    translation:
      en: your company (written, respectful)
      ko: 귀사 (문어, 존경)
    gender: null
    plural: null
  - japanese: 二重敬語
    reading: にじゅうけいご
    translation:
      en: double honorific (error)
      ko: 이중 경어 (오류)
    gender: null
    plural: null
    notes:
      en: "Common mistake of stacking honorifics, e.g., おっしゃられる (incorrect)"
      ko: "경어를 겹쳐 사용하는 흔한 실수, 예: おっしゃられる (잘못됨)"

