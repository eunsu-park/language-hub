- id: reason_purpose
  label:
    en: Reason and Purpose Expressions
    ko: 이유와 목적 표현
  type: vocabulary
  words:
  - japanese: ために (purpose)
    reading: null
    translation:
      en: in order to (purpose)
      ko: ~하기 위해 (목적)
    gender: null
    plural: null
    notes:
      en: "Dictionary form verb + ために. For volitional/controllable actions."
      ko: "사전형 동사 + ために. 의지적/통제 가능한 행동에 사용."
  - japanese: ために (cause)
    reading: null
    translation:
      en: because of, due to (cause)
      ko: ~때문에 (원인)
    gender: null
    plural: null
    notes:
      en: "Past form/state + ために. More formal than ので. 台風のために欠航になった."
      ko: "과거형/상태 + ために. ので보다 격식적. 台風のために欠航になった."
  - japanese: ように
    reading: null
    translation:
      en: so that, in a way that (goal state)
      ko: ~하도록, ~할 수 있도록 (목표 상태)
    gender: null
    plural: null
    notes:
      en: "For non-volitional verbs (potential, negative, state). Different subjects OK."
      ko: "비의지적 동사 (가능형, 부정, 상태)에 사용. 주어가 달라도 됨."
  - japanese: ようにする
    reading: null
    translation:
      en: make an effort to, try to
      ko: ~하도록 하다, 노력하다
    gender: null
    plural: null
    notes:
      en: "Habitual effort. 毎日野菜を食べるようにしている."
      ko: "습관적 노력. 毎日野菜を食べるようにしている."
  - japanese: ようになる
    reading: null
    translation:
      en: to come to be able to, to start to
      ko: ~하게 되다, ~할 수 있게 되다
    gender: null
    plural: null
    notes:
      en: "Change of state. 日本語が話せるようになった (I became able to speak Japanese)."
      ko: "상태 변화. 日本語が話せるようになった (일본어를 할 수 있게 되었다)."
  - japanese: のに (utility)
    reading: null
    translation:
      en: for the purpose of (utility)
      ko: ~하는 데 (용도)
    gender: null
    plural: null
    notes:
      en: "Different from contrast のに. 料理するのに便利だ (convenient for cooking)."
      ko: "대조의 のに와 다름. 料理するのに便利だ (요리하는 데 편리하다)."
  - japanese: ことにする
    reading: null
