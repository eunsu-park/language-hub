- id: connective_expressions
  label:
    en: Connective Expressions
    ko: 접속 표현
  type: vocabulary
  words:
  - japanese: ので
    reading: null
    translation:
      en: because, since (polite reason)
      ko: ~이므로, ~이기 때문에 (정중한 이유)
    gender: null
    plural: null
    notes:
      en: "Soft, objective reason. More polite than から. な-adj/noun use な before ので."
      ko: "부드럽고 객관적인 이유. から보다 정중. な형용사/명사는 ので 앞에 な 사용."
  - japanese: から
    reading: null
    translation:
      en: because (direct/casual reason)
      ko: ~이니까, ~때문에 (직접적/구어 이유)
    gender: null
    plural: null
    notes:
      en: "Direct, subjective reason. More assertive than ので."
      ko: "직접적이고 주관적인 이유. ので보다 단정적."
  - japanese: のに
    reading: null
    translation:
      en: although, despite, even though (with frustration)
      ko: ~인데도 (불구하고, 불만 포함)
    gender: null
    plural: null
    notes:
      en: "Contrast with frustration/disappointment. 勉強したのに落ちた (I studied but failed!)."
      ko: "불만/실망이 포함된 대조. 勉強したのに落ちた (공부했는데 떨어졌어!)."
  - japanese: けど
    reading: null
    translation:
      en: but, although (neutral contrast)
      ko: ~이지만 (중립적 대조)
    gender: null
    plural: null
    notes:
      en: "Neutral contrast. Less emotional than のに. Casual form of けれども."
      ko: "중립적 대조. のに보다 감정이 적음. けれども의 구어형."
  - japanese: が
    reading: null
    translation:
      en: but, however (formal contrast)
      ko: ~이지만, ~인데 (격식 대조)
    gender: null
    plural: null
    notes:
      en: "Formal neutral contrast. 連絡しましたが、返事がありませんでした."
      ko: "격식적 중립 대조. 連絡しましたが、返事がありませんでした."
  - japanese: し
    reading: null
    translation:
      en: and also, moreover (listing reasons)
      ko: ~이고, ~하기도 하고 (이유 나열)
    gender: null
    plural: null
    notes:
      en: "Lists cumulative reasons. 安いし、おいしいし、最高だ."
      ko: "누적 이유 나열. 安いし、おいしいし、最高だ."
  - japanese: ながら
    reading: null
    translation:
      en: while doing (simultaneous actions)
      ko: ~하면서 (동시 동작)
    gender: null
    plural: null
    notes:
      en: "Masu-stem + ながら. Same subject required. 音楽を聞きながら勉強する."
      ko: "ます어간 + ながら. 같은 주어 필수. 音楽を聞きながら勉強する."
  - japanese: たり...たりする
    reading: null
    translation:
      en: doing things like... and... (representative actions)
      ko: ~하거나 ~하거나 하다 (대표적 행동)
    gender: null
    plural: null
    notes:
      en: "た-form + り for each action. する at end required. Non-exhaustive list."
      ko: "각 행동에 た형 + り. 끝에 する 필수. 전부를 나열하지 않는 목록."
  - japanese: て
    reading: null
    translation:
      en: and then, and (sequential connector)
      ko: ~하고, ~해서 (순차 연결)
    gender: null
    plural: null
