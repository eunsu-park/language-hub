- id: contrast_concession
  label:
    en: Contrast and Concession Expressions
    ko: 대조와 양보 표현
  type: vocabulary
  words:
  - japanese: くせに
    reading: null
    translation:
      en: even though (critical/blaming)
      ko: ~하는 주제에 (비판적)
    gender: null
    plural: null
    notes:
      en: "Stronger and more negative than のに. 知っているくせに教えてくれない."
      ko: "のに보다 강하고 부정적. 知っているくせに教えてくれない."
  - japanese: ものの
    reading: null
    translation:
      en: although (formal/literary)
      ko: ~이지만 (격식/문어)
    gender: null
    plural: null
    notes:
      en: "Formal/written contrast. 申し込んだものの、返事が来ない."
      ko: "격식적/문어적 대조. 申し込んだものの、返事が来ない."
  - japanese: うちに
    reading: null
    translation:
      en: while, before (a change occurs)
      ko: ~하는 동안에, ~하기 전에
    gender: null
    plural: null
    notes:
      en: "Before situation changes. 暗くならないうちに帰ろう."
      ko: "상황이 변하기 전에. 暗くならないうちに帰ろう."
  - japanese: 上で
    reading: うえで
    translation:
      en: after doing, upon (completion)
      ko: ~한 후에, ~한 다음에
    gender: null
    plural: null
    notes:
      en: "One action completed before next. よく考えた上で決めます."
      ko: "한 행동이 완료된 후 다음 행동. よく考えた上で決めます."
  - japanese: 残念ながら
    reading: ざんねんながら
    translation:
      en: regrettably, unfortunately
      ko: 유감스럽게도, 안타깝게도
    gender: null
    plural: null
    notes:
      en: "Concessive ながら usage (literary). 残念ながら参加できません."
      ko: "ながら의 양보 용법 (문어). 残念ながら参加できません."
  - japanese: せっかく
    reading: null
    translation:
      en: with great effort, specially, taking the trouble
      ko: 모처럼, 일부러
    gender: null
    plural: null
    notes:
      en: "Often paired with のに for frustration. せっかく作ったのに誰も食べなかった."
      ko: "불만을 나타내는 のに와 자주 사용. せっかく作ったのに誰も食べなかった."
  - japanese: にもかかわらず
    reading: null
    translation:
      en: despite, in spite of (formal)
      ko: ~에도 불구하고 (격식)
    gender: null
    plural: null
    notes:
      en: "Formal/written contrast. Primarily used in essays and reports."
      ko: "격식적/문어적 대조. 주로 에세이와 보고서에서 사용."
  - japanese: 一方で
    reading: いっぽうで
    translation:
      en: on the other hand, while
      ko: 한편으로, 반면에
    gender: null
    plural: null
    notes:
      en: "Presenting a different perspective or contrasting aspect."
      ko: "다른 관점이나 대조적 측면을 제시."
  - japanese: 間
    reading: あいだ
    translation:
      en: while, during (different subjects OK)
      ko: ~하는 동안 (다른 주어 가능)
    gender: null
    plural: null
    notes:
      en: "Unlike ながら, allows different subjects. 母が料理している間、父はテレビを見ている."
      ko: "ながら와 달리 다른 주어 가능. 母が料理している間、父はテレビを見ている."
  - japanese: 間に
    reading: あいだに
    translation:
      en: during, in the meantime
      ko: ~하는 사이에
    gender: null
    plural: null
    notes:
      en: "Something happens during a time period. 寝ている間に雨が降った."
      ko: "시간 기간 동안 무언가가 발생. 寝ている間に雨が降った."
  - japanese: けれども
    reading: null
    translation:
      en: however, although (formal conjunction)
      ko: 그렇지만, ~이지만 (격식 접속사)
    gender: null
    plural: null
    notes:
      en: "Formal form. Shortened forms: けれど, けど (increasingly casual)."
      ko: "격식형. 축약형: けれど, けど (점점 더 구어적)."
  - japanese: それに
    reading: null
    translation:
      en: moreover, besides, in addition
      ko: 게다가, 더구나
    gender: null
    plural: null
    notes:
      en: "Adds information. 安いし、それにおいしい."
      ko: "정보를 추가. 安いし、それにおいしい."
  - japanese: そのため
    reading: null
    translation:
      en: for that reason, therefore
      ko: 그 때문에, 그래서
    gender: null
    plural: null
    notes:
      en: "Causal connector. More formal than だから."
      ko: "원인 접속사. だから보다 격식적."
  - japanese: 知っていながら
    reading: しっていながら
    translation:
      en: despite knowing (concessive ながら)
      ko: 알면서도 (양보의 ながら)
    gender: null
    plural: null
    notes:
      en: "Concessive ながら: despite ~. 知っていながら何も言わなかった."
      ko: "양보의 ながら: ~에도 불구하고. 知っていながら何も言わなかった."
  - japanese: 代わりに
    reading: かわりに
    translation:
      en: instead of, in exchange for
      ko: ~대신에
    gender: null
    plural: null
    notes:
      en: "Substitution or exchange. 肉の代わりに魚を食べた."
      ko: "대체 또는 교환. 肉の代わりに魚を食べた."
  - japanese: それにしても
    reading: null
    translation:
      en: even so, nevertheless
      ko: 그렇다 하더라도
    gender: null
    plural: null
  - japanese: それでも
    reading: null
    translation:
      en: even so, but still
      ko: 그래도, 그럼에도
    gender: null
    plural: null
  - japanese: だからといって
    reading: null
