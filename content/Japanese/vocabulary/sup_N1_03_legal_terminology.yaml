      ko: "위반 + 헌법; 違憲判決 = 위헌 판결"
  - japanese: "合憲"
    reading: "ごうけん"
    translation:
      en: "constitutional"
      ko: "합헌"
    gender: null
    notes:
      en: "match + constitution; 合憲判断 = judgment of constitutionality"
      ko: "합하다 + 헌법; 合憲判断 = 합헌 판단"
  - japanese: "改正"
    reading: "かいせい"
    translation:
      en: "amendment, revision"
      ko: "개정"
    gender: null
    notes:
      en: "change + correct; 憲法改正 = constitutional amendment"
      ko: "고치다 + 바로잡다; 憲法改正 = 헌법 개정"
  - japanese: "条文"
    reading: "じょうぶん"
    translation:
      en: "article, text of a law"
      ko: "조문"
    gender: null
    notes:
      en: "article + writing; 条文を解釈する = to interpret a legal text"
      ko: "조항 + 글; 条文を解釈する = 조문을 해석하다"
  - japanese: "条項"
    reading: "じょうこう"
    translation:
      en: "clause, provision"
      ko: "조항"
    gender: null
    notes:
      en: "article + item; 条項に基づく = based on a clause"
      ko: "조 + 항; 条項に基づく = 조항에 기초하여"
  - japanese: "法令"
    reading: "ほうれい"
    translation:
