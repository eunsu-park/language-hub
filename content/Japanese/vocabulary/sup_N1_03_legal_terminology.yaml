      ko: "법령"
    gender: null
    notes:
      en: "law + order; 法令を遵守する = to comply with laws"
      ko: "법 + 령; 法令を遵守する = 법령을 준수하다"
  - japanese: "施行"
    reading: "しこう"
    translation:
      en: "enforcement, enactment"
      ko: "시행"
    gender: null
    notes:
      en: "carry out + go; 法律を施行する = to enforce a law"
      ko: "실시 + 행하다; 法律を施行する = 법률을 시행하다"
  - japanese: "公布"
    reading: "こうふ"
    translation:
      en: "promulgation"
      ko: "공포"
    gender: null
    notes:
      en: "public + spread; 法律を公布する = to promulgate a law"
      ko: "공 + 펴다; 法律を公布する = 법률을 공포하다"
  - japanese: "請願"
    reading: "せいがん"
    translation:
      en: "petition"
      ko: "청원"
    gender: null
    notes:
      en: "request + wish; 請願権 = right to petition"
      ko: "청하다 + 원하다; 請願権 = 청원권"
  - japanese: "表現の自由"
    reading: "ひょうげんのじゆう"
    translation:
      en: "freedom of expression"
      ko: "표현의 자유"
    gender: null
    notes:
      en: "expression + freedom; guaranteed by Article 21"
      ko: "표현 + 자유; 제21조에 의해 보장"
  - japanese: "平等権"
    reading: "びょうどうけん"
    translation:
      en: "right to equality"
      ko: "평등권"
    gender: null
    notes:
      en: "equality + right; 法の下の平等 = equality under the law"
      ko: "평등 + 권리; 法の下の平等 = 법 아래의 평등"
  - japanese: "信教の自由"
    reading: "しんきょうのじゆう"
    translation:
      en: "freedom of religion"
      ko: "신교의 자유"
    gender: null
    notes:
      en: "belief + religion + freedom; 政教分離 = separation of church and state"
      ko: "신앙 + 종교 + 자유; 政教分離 = 정교분리"
  - japanese: "生存権"
    reading: "せいぞんけん"
    translation:
      en: "right to survival, right to life"
      ko: "생존권"
    gender: null
    notes:
      en: "survive + right; Article 25 of the Japanese constitution"
      ko: "생존 + 권리; 일본 헌법 제25조"
  - japanese: "適正手続"
    reading: "てきせいてつづき"
    translation:
      en: "due process"
      ko: "적정절차"
    gender: null
    notes:
      en: "proper + procedure; 適正手続の保障 = guarantee of due process"
      ko: "적정 + 절차; 適正手続の保障 = 적정절차의 보장"
  - japanese: "統治"
    reading: "とうち"
    translation:
      en: "governance, rule"
      ko: "통치"
    gender: null
    notes:
      en: "govern + manage; 統治機構 = governing structure"
      ko: "통치 + 다스리다; 統治機構 = 통치기구"
  - japanese: "主権"
    reading: "しゅけん"
    translation:
      en: "sovereignty"
      ko: "주권"
    gender: null
    notes:
      en: "main + right; 主権在民 = sovereignty resides in the people"
      ko: "주 + 권리; 主権在民 = 주권재민"
  - japanese: "公共の福祉"
    reading: "こうきょうのふくし"
    translation:
      en: "public welfare"
      ko: "공공복지"
    gender: null
    notes:
      en: "public + welfare; grounds for limiting rights"
      ko: "공공 + 복지; 권리 제한의 근거"

- id: contract_law
  label:
    en: "Contract Law"
    ko: "계약법"
  type: vocabulary
  words:
  - japanese: "契約"
    reading: "けいやく"
    translation:
      en: "contract"
      ko: "계약"
    gender: null
    notes:
      en: "pledge + promise; 契約を結ぶ = to conclude a contract"
      ko: "맺다 + 약속; 契約を結ぶ = 계약을 체결하다"
  - japanese: "債務"
    reading: "さいむ"
    translation:
      en: "obligation, debt"
      ko: "채무"
    gender: null
    notes:
      en: "debt + duty; 債務不履行 = breach of contract"
      ko: "빚 + 의무; 債務不履行 = 채무불이행"
  - japanese: "債権"
    reading: "さいけん"
    translation:
      en: "claim, credit"
      ko: "채권"
    gender: null
    notes:
      en: "debt + right; 債権者 = creditor"
      ko: "빚 + 권리; 債権者 = 채권자"
  - japanese: "履行"
    reading: "りこう"
    translation:
      en: "performance, fulfillment"
      ko: "이행"
    gender: null
    notes:
      en: "walk + go; 契約を履行する = to perform a contract"
      ko: "밟다 + 가다; 契約を履行する = 계약을 이행하다"
  - japanese: "不履行"
    reading: "ふりこう"
    translation:
      en: "non-performance, breach"
      ko: "불이행"
    gender: null
    notes:
      en: "not + performance; 債務不履行 = default on obligations"
      ko: "불 + 이행; 債務不履行 = 채무불이행"
  - japanese: "瑕疵"
    reading: "かし"
    translation:
      en: "defect, flaw"
      ko: "하자"
    gender: null
    notes:
      en: "flaw + blemish; 瑕疵担保責任 = warranty against defects"
      ko: "흠 + 결점; 瑕疵担保責任 = 하자담보책임"
  - japanese: "解除"
    reading: "かいじょ"
    translation:
      en: "cancellation, rescission"
      ko: "해제"
    gender: null
    notes:
      en: "dissolve + remove; 契約を解除する = to rescind a contract"
      ko: "풀다 + 제거; 契約を解除する = 계약을 해제하다"
  - japanese: "解約"
    reading: "かいやく"
    translation:
      en: "termination (of a contract)"
      ko: "해약"
    gender: null
    notes:
      en: "dissolve + promise; 解約する = to terminate a contract"
      ko: "풀다 + 약속; 解約する = 해약하다"
  - japanese: "損害賠償"
    reading: "そんがいばいしょう"
    translation:
      en: "damages, compensation"
      ko: "손해배상"
    gender: null
    notes:
      en: "damage + compensate; 損害賠償を請求する = to claim damages"
      ko: "손해 + 배상; 損害賠償を請求する = 손해배상을 청구하다"
  - japanese: "善意"
    reading: "ぜんい"
    translation:
      en: "good faith (legal)"
      ko: "선의"
    gender: null
    notes:
      en: "good + intention; in law: not knowing of a defect"
      ko: "선 + 의; 법에서: 결함을 모르는 상태"
  - japanese: "悪意"
    reading: "あくい"
    translation:
      en: "bad faith, with knowledge (legal)"
      ko: "악의"
    gender: null
    notes:
      en: "bad + intention; in law: knowing of a defect or fact"
      ko: "악 + 의; 법에서: 결함이나 사실을 알고 있는 상태"
  - japanese: "過失"
    reading: "かしつ"
    translation:
      en: "negligence"
      ko: "과실"
    gender: null
    notes:
      en: "pass + lose; 過失責任 = liability for negligence"
      ko: "지나치다 + 잃다; 過失責任 = 과실책임"
  - japanese: "故意"
    reading: "こい"
    translation:
      en: "intent, willfulness"
      ko: "고의"
    gender: null
    notes:
      en: "reason + intention; 故意に = intentionally"
      ko: "연고 + 뜻; 故意に = 고의로"
  - japanese: "錯誤"
    reading: "さくご"
    translation:
      en: "mistake, error"
      ko: "착오"
    gender: null
    notes:
      en: "mix up + mistake; 錯誤による取消し = voidance due to mistake"
      ko: "섞이다 + 잘못; 錯誤による取消し = 착오에 의한 취소"
  - japanese: "詐欺"
    reading: "さぎ"
    translation:
      en: "fraud"
      ko: "사기"
    gender: null
    notes:
      en: "deceive + cheat; 詐欺罪 = crime of fraud"
      ko: "속이다 + 속이다; 詐欺罪 = 사기죄"
  - japanese: "強迫"
    reading: "きょうはく"
    translation:
      en: "duress, coercion"
      ko: "강박"
    gender: null
    notes:
      en: "strong + press; 強迫による意思表示 = declaration of intent under duress"
      ko: "강하다 + 박; 強迫による意思表示 = 강박에 의한 의사표시"
  - japanese: "代理"
    reading: "だいり"
    translation:
      en: "agency, representation"
      ko: "대리"
    gender: null
    notes:
      en: "substitute + reason; 代理人 = agent, representative"
      ko: "대신 + 이치; 代理人 = 대리인"
  - japanese: "委託"
    reading: "いたく"
    translation:
      en: "consignment, entrustment"
      ko: "위탁"
    gender: null
    notes:
      en: "entrust + consign; 業務委託 = outsourcing"
      ko: "맡기다 + 부탁; 業務委託 = 업무위탁"
  - japanese: "弁済"
    reading: "べんさい"
    translation:
      en: "payment, performance of obligation"
      ko: "변제"
    gender: null
    notes:
      en: "manage + settle; 弁済する = to repay, to perform an obligation"
      ko: "처리 + 갚다; 弁済する = 변제하다"
  - japanese: "担保"
    reading: "たんぽ"
    translation:
      en: "collateral, security"
      ko: "담보"
    gender: null
    notes:
      en: "carry + protect; 担保権 = security interest"
      ko: "담다 + 보호; 担保権 = 담보권"
  - japanese: "保証"
    reading: "ほしょう"
    translation:
      en: "guarantee, surety"
      ko: "보증"
    gender: null
    notes:
      en: "protect + prove; 保証人 = guarantor"
      ko: "보호 + 증명; 保証人 = 보증인"
  - japanese: "連帯保証"
    reading: "れんたいほしょう"
    translation:
      en: "joint and several guarantee"
      ko: "연대보증"
    gender: null
    notes:
      en: "joint + guarantee; 連帯保証人 = joint guarantor"
      ko: "연대 + 보증; 連帯保証人 = 연대보증인"
  - japanese: "時効"
    reading: "じこう"
    translation:
      en: "statute of limitations"
      ko: "시효"
    gender: null
    notes:
      en: "time + effect; 時効が成立する = the statute of limitations expires"
      ko: "시간 + 효력; 時効が成立する = 시효가 성립하다"
  - japanese: "約款"
    reading: "やっかん"
    translation:
      en: "general terms and conditions"
      ko: "약관"
    gender: null
    notes:
      en: "promise + section; 利用約款 = terms of use"
      ko: "약속 + 항목; 利用約款 = 이용약관"
  - japanese: "免責"
    reading: "めんせき"
    translation:
      en: "exemption from liability"
      ko: "면책"
    gender: null
    notes:
      en: "exempt + responsibility; 免責条項 = disclaimer clause"
      ko: "면하다 + 책임; 免責条項 = 면책조항"
  - japanese: "無効"
    reading: "むこう"
    translation:
      en: "invalid, void"
      ko: "무효"
    gender: null
    notes:
      en: "without + effect; 契約を無効とする = to void a contract"
      ko: "없다 + 효력; 契約を無効とする = 계약을 무효로 하다"
  - japanese: "取消し"
    reading: "とりけし"
    translation:
      en: "rescission, annulment"
      ko: "취소"
    gender: null
    notes:
      en: "take + erase; 取り消す = to rescind"
      ko: "취하다 + 지우다; 取り消す = 취소하다"

