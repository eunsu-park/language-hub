- id: self_introduction
  label:
    en: Self-Introduction Phrases
    ko: 자기소개 표현
  type: vocabulary
  words:
  - japanese: はじめまして
    reading: null
    translation:
      en: nice to meet you (first meeting)
      ko: 처음 뵙겠습니다
    gender: null
    plural: null
    notes:
      en: "Used ONLY when meeting someone for the first time"
      ko: "처음 만나는 사람에게만 사용"
  - japanese: どうぞよろしくおねがいします
    reading: null
    translation:
      en: please treat me well (very polite)
      ko: 잘 부탁드립니다 (매우 공손)
    gender: null
    plural: null
    notes:
      en: "Standard closing phrase for self-introductions"
      ko: "자기소개의 표준 마무리 표현"
  - japanese: よろしくおねがいします
    reading: null
    translation:
      en: nice to meet you / please (polite)
      ko: 잘 부탁합니다
    gender: null
    plural: null
  - japanese: 私
    reading: わたし
    translation:
      en: I / me
      ko: 나 / 저
    gender: null
    plural: null
    notes:
      en: "Kanji: 私. Gender-neutral first-person pronoun"
      ko: "한자: 私. 성별 중립 1인칭 대명사"
  - japanese: 名前
    reading: なまえ
    translation:
      en: name
      ko: 이름
    gender: null
    plural: null
    notes:
      en: "Kanji: 名(name) + 前(front)"
      ko: "한자: 名(이름) + 前(앞)"
  - japanese: 学生
    reading: がくせい
    translation:
      en: student
      ko: 학생
    gender: null
    plural: null
    notes:
      en: "Kanji: 学(learn) + 生(life)"
      ko: "한자: 학(배울) + 생(날)"
  - japanese: 先生
    reading: せんせい
    translation:
      en: teacher
      ko: 선생님
    gender: null
    plural: null
    notes:
      en: "Kanji: 先(before) + 生(life). Also used for doctors, lawyers, etc."
      ko: "한자: 先(먼저) + 生(날). 의사, 변호사 등에도 사용"
  - japanese: 会社員
    reading: かいしゃいん
    translation:
      en: office worker / company employee
      ko: 회사원
    gender: null
    plural: null
    notes:
      en: "Kanji: 会社(company) + 員(member)"
      ko: "한자: 会社(회사) + 員(구성원)"
  - japanese: 医者
    reading: いしゃ
    translation:
      en: doctor
      ko: 의사
    gender: null
    plural: null
  - japanese: エンジニア
    reading: null
    translation:
      en: engineer
      ko: 엔지니어
    gender: null
    plural: null
    notes:
      en: "Loanword from English"
      ko: "영어 차용어"
  - japanese: こちらこそ
    reading: null
    translation:
      en: likewise / it is I who should say that
      ko: 저야말로
    gender: null
    plural: null

