  - japanese: こんばんは
    reading: null
    translation:
      en: good evening
      ko: 안녕하세요 (저녁)
    gender: null
    plural: null
    notes:
      en: "Used after ~6 PM. The は is the particle (read 'wa')"
      ko: "오후 6시 이후 사용. は는 조사로 'wa'로 읽음"
  - japanese: おやすみなさい
    reading: null
    translation:
      en: good night (polite)
      ko: 안녕히 주무세요
    gender: null
    plural: null
    notes:
