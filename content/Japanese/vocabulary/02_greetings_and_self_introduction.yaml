      ko: "한자: 大(큰) + 学(배울) + 生(날)"
  - japanese: 高校生
    reading: こうこうせい
    translation:
      en: high school student
      ko: 고등학생
    gender: null
    plural: null
    notes:
      en: "Kanji: 高(high) + 校(school) + 生(student)"
      ko: "한자: 高(높을) + 校(학교) + 生(날)"
