      ko: "잠자리에 들 때 사용"
  - japanese: さようなら
    reading: null
    translation:
      en: goodbye (formal)
      ko: 안녕히 가세요 (격식)
    gender: null
    plural: null
    notes:
      en: "Implies a long or possibly final separation"
      ko: "오랜 혹은 영구적인 이별을 암시"

