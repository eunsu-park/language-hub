      ko: 나 (남성, 매우 비격식)
    gender: null
    plural: null
    notes:
      en: "Very informal masculine pronoun. Not used in polite contexts."
      ko: "매우 비격식적인 남성 대명사. 공손한 상황에서는 사용하지 않음."
  - japanese: あなた
    reading: null
    translation:
      en: you
      ko: 당신 / 너
    gender: null
    plural: null
    notes:
      en: "Rarely used in Japanese; using the person's name + さん is preferred"
      ko: "일본어에서는 잘 사용하지 않음; 이름 + さん을 선호"
  - japanese: 趣味
    reading: しゅみ
    translation:
      en: hobby
      ko: 취미
    gender: null
    plural: null
