- id: permission_prohibition
  label:
    en: Permission and Prohibition Expressions
    ko: 허가 및 금지 표현
  type: vocabulary
  words:
  - japanese: もいい
    reading: null
    translation:
      en: it's okay to, may I
      ko: ~해도 된다
    gender: null
    plural: null
    notes:
      en: "て + もいいですか for asking permission: 食べてもいいですか (may I eat?)"
      ko: "て + もいいですか로 허가 요청: 食べてもいいですか (먹어도 됩니까?)"
  - japanese: いけない
    reading: null
    translation:
      en: must not, not allowed
      ko: ~하면 안 된다
    gender: null
    plural: null
    notes:
      en: "て + はいけない for prohibition: 走ってはいけない (must not run)"
      ko: "て + はいけない으로 금지: 走ってはいけない (뛰면 안 된다)"
  - japanese: だめ
    reading: null
    translation:
      en: no good, not allowed
      ko: 안 됨, 소용없음
    gender: null
    plural: null
    notes:
      en: "Colloquial alternative to いけない: 食べてはだめ (you must not eat)"
      ko: "いけない의 구어적 대안: 食べてはだめ (먹으면 안 돼)"
  - japanese: どうぞ
    reading: null
    translation:
      en: please, go ahead
      ko: 어서, 자 (권유)
    gender: null
    plural: null
  - japanese: もちろん
    reading: null
    translation:
