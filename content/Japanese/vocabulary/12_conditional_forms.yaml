lesson: 12_Conditional_Forms
lesson_number: 12
jlpt: N3
categories:
- id: conditional_expressions
  label:
    en: Conditional Expressions
    ko: 조건 표현
  type: vocabulary
  words:
  - japanese: もし
    reading: null
    translation:
      en: if, what if (hypothetical emphasis)
      ko: 만약, 혹시
    gender: null
    plural: null
    notes:
      en: "Adds emphasis to conditional statements. Pairs best with たら."
      ko: "조건문에 강조를 더함. たら와 가장 잘 어울림."
  - japanese: 安ければ
    reading: やすければ
    translation:
      en: if it is cheap (ば conditional of 安い)
      ko: 싸면 (安い의 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "い-adjective ば form: drop い, add ければ."
      ko: "い형용사 ば형: い를 빼고 ければ를 붙임."
  - japanese: 行けば
    reading: いけば
    translation:
      en: if one goes (ば conditional of 行く)
      ko: 가면 (行く의 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "Group 1 verb ば form: く → けば."
      ko: "1그룹 동사 ば형: く → けば."
  - japanese: 食べれば
    reading: たべれば
    translation:
      en: if one eats (ば conditional of 食べる)
      ko: 먹으면 (食べる의 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "Group 2 verb ば form: drop る, add れば."
      ko: "2그룹 동사 ば형: る를 빼고 れば를 붙임."
  - japanese: すれば
    reading: null
    translation:
      en: if one does (ば conditional of する)
      ko: 하면 (する의 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "Irregular ば form of する."
      ko: "する의 불규칙 ば형."
  - japanese: 来れば
    reading: くれば
    translation:
      en: if one comes (ば conditional of 来る)
      ko: 오면 (来る의 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "Irregular ば form of 来る."
      ko: "来る의 불규칙 ば형."
  - japanese: 行ったら
    reading: いったら
    translation:
      en: if/when one goes (たら conditional of 行く)
      ko: 가면/가게 되면 (行く의 たら 조건형)
    gender: null
    plural: null
    notes:
      en: "たら form: past tense (行った) + ら. Most versatile conditional."
      ko: "たら형: 과거형 (行った) + ら. 가장 다용도의 조건형."
  - japanese: 食べたら
    reading: たべたら
    translation:
      en: if/when one eats (たら conditional of 食べる)
      ko: 먹으면/먹고 나서 (食べる의 たら 조건형)
    gender: null
    plural: null
    notes:
      en: "たら form: past tense (食べた) + ら."
      ko: "たら형: 과거형 (食べた) + ら."
  - japanese: 行くなら
    reading: いくなら
    translation:
      en: if (it's the case that) one goes (なら conditional)
      ko: 간다면 (なら 조건형)
    gender: null
    plural: null
    notes:
      en: "なら attaches to plain form. Topic-based: responds to known context."
      ko: "なら는 기본형에 접속. 화제 기반: 알려진 맥락에 대한 반응."
  - japanese: 押すと
    reading: おすと
    translation:
      en: when one presses (と conditional of 押す)
      ko: 누르면 (押す의 と 조건형)
    gender: null
    plural: null
    notes:
      en: "と conditional: plain non-past + と. For natural/automatic consequences."
      ko: "と 조건형: 기본 비과거형 + と. 자연적/자동적 결과에 사용."
- id: conjunctions
  label:
    en: Conjunctions and Connectors
    ko: 접속사와 연결어
  type: vocabulary
  words:
  - japanese: なければならない
    reading: null
    translation:
      en: must do, have to
      ko: ~해야 한다
    gender: null
    plural: null
    notes:
      en: "Obligation pattern: ない-form stem + ければならない. E.g., 行かなければならない."
      ko: "의무 표현: ない형 어간 + ければならない. 예: 行かなければならない."
  - japanese: ないといけない
    reading: null
    translation:
      en: must do, have to (casual)
      ko: ~해야 한다 (구어)
    gender: null
    plural: null
    notes:
      en: "Casual equivalent of なければならない. E.g., 行かないといけない."
      ko: "なければならない의 구어 표현. 예: 行かないといけない."
  - japanese: ばいい
    reading: null
    translation:
      en: should just, it would be good to
      ko: ~하면 된다
    gender: null
    plural: null
    notes:
      en: "ば conditional + いい. Advice pattern: 先生に聞けばいい."
      ko: "ば 조건형 + いい. 조언 패턴: 先生に聞けばいい."
  - japanese: ばよかった
    reading: null
    translation:
      en: I wish I had (regret)
      ko: ~했으면 좋았을 텐데 (후회)
    gender: null
    plural: null
    notes:
      en: "ば conditional + よかった. Expresses regret: もっと勉強すればよかった."
      ko: "ば 조건형 + よかった. 후회 표현: もっと勉強すればよかった."
  - japanese: たらどうですか
    reading: null
    translation:
      en: how about doing...?
      ko: ~하는 게 어때요?
    gender: null
    plural: null
    notes:
      en: "たら conditional + どう. Suggestion: 医者に行ったらどうですか."
      ko: "たら 조건형 + どう. 제안: 医者に行ったらどうですか."
  - japanese: たらいいですか
    reading: null
    translation:
      en: what should I do?
      ko: ~하면 될까요?
    gender: null
    plural: null
    notes:
      en: "たら conditional + いい. Asking for advice: 何を持って行ったらいいですか."
      ko: "たら 조건형 + いい. 조언 요청: 何を持って行ったらいいですか."
- id: hypothetical_phrases
  label:
    en: Hypothetical Phrases and Patterns
    ko: 가정 표현과 패턴
  type: vocabulary
  words:
  - japanese: ばするほど
    reading: null
    translation:
      en: the more... the more...
      ko: ~하면 할수록
    gender: null
    plural: null
    notes:
      en: "Pattern: Vば + Vる + ほど. E.g., 練習すればするほど上手になる."
      ko: "패턴: Vば + Vる + ほど. 예: 練習すればするほど上手になる."
  - japanese: 急がば回れ
    reading: いそがばまわれ
    translation:
      en: more haste, less speed (proverb)
      ko: 급할수록 돌아가라 (속담)
    gender: null
    plural: null
    notes:
      en: "Lit: If you hurry, go around. Classic ば conditional proverb."
      ko: "직역: 서두르면 돌아가라. 고전 ば 조건형 속담."
  - japanese: 宝くじに当たったら
    reading: たからくじにあたったら
    translation:
      en: if I won the lottery
      ko: 복권에 당첨되면
    gender: null
    plural: null
    notes:
      en: "Common hypothetical expression using たら."
      ko: "たら를 사용한 일반적인 가정 표현."
  - japanese: もし私だったら
    reading: もしわたしだったら
    translation:
      en: if it were me
      ko: 만약 내가라면
    gender: null
    plural: null
    notes:
      en: "もし + noun + だったら. For hypothetical self-referencing."
      ko: "もし + 명사 + だったら. 자기를 주어로 한 가정."
  - japanese: 大人になったら
    reading: おとなになったら
    translation:
      en: when I grow up
      ko: 어른이 되면
    gender: null
    plural: null
    notes:
      en: "たら for future condition: when a state is reached."
      ko: "たら로 미래 상태 도달: 상태에 이르렀을 때."
  - japanese: 天気がよければ
    reading: てんきがよければ
    translation:
      en: if the weather is good
      ko: 날씨가 좋으면
    gender: null
    plural: null
    notes:
      en: "い-adjective ば form: いい → よければ (irregular). State condition."
      ko: "い형용사 ば형: いい → よければ (불규칙). 상태 조건."
  - japanese: 分からなかったら
    reading: わからなかったら
    translation:
      en: if you don't understand
      ko: 모르겠으면
    gender: null
    plural: null
    notes:
      en: "Negative たら conditional: 分からなかった + ら."
      ko: "부정 たら 조건형: 分からなかった + ら."
  - japanese: 春になると
    reading: はるになると
    translation:
      en: when spring comes (habitual)
      ko: 봄이 되면 (습관적)
    gender: null
    plural: null
    notes:
      en: "と conditional for natural/seasonal consequences."
      ko: "자연적/계절적 결과에 사용하는 と 조건형."
  - japanese: 右に曲がると
    reading: みぎにまがると
    translation:
      en: if you turn right (directions)
      ko: 오른쪽으로 돌면 (길 안내)
    gender: null
    plural: null
    notes:
      en: "と conditional for giving directions: automatic result."
      ko: "길 안내에 사용하는 と 조건형: 자동적 결과."
  - japanese: のなら
    reading: null
    translation:
      en: if it is that... (emphatic なら)
      ko: ~라면, ~하는 것이라면 (강조형 なら)
    gender: null
    plural: null
    notes:
      en: "Emphatic form of なら with の. E.g., 行くのなら、早くしなさい."
      ko: "の가 붙은 なら의 강조형. 예: 行くのなら、早くしなさい."
  - japanese: 静かであれば
    reading: しずかであれば
    translation:
      en: if it is quiet (formal ば conditional for な-adjective)
      ko: 조용하다면 (な형용사의 격식체 ば 조건형)
    gender: null
    plural: null
    notes:
      en: "な-adjective ば form: stem + であれば."
      ko: "な형용사 ば형: 어간 + であれば."
