- id: conjunctions
  label:
    en: Conjunctions and Connectors
    ko: 접속사와 연결어
  type: vocabulary
  words:
  - japanese: なければならない
    reading: null
    translation:
      en: must do, have to
      ko: ~해야 한다
    gender: null
    plural: null
