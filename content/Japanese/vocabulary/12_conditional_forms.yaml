      en: "Obligation pattern: ない-form stem + ければならない. E.g., 行かなければならない."
      ko: "의무 표현: ない형 어간 + ければならない. 예: 行かなければならない."
  - japanese: ないといけない
    reading: null
    translation:
      en: must do, have to (casual)
      ko: ~해야 한다 (구어)
    gender: null
    plural: null
    notes:
      en: "Casual equivalent of なければならない. E.g., 行かないといけない."
      ko: "なければならない의 구어 표현. 예: 行かないといけない."
  - japanese: ばいい
    reading: null
    translation:
      en: should just, it would be good to
      ko: ~하면 된다
    gender: null
    plural: null
    notes:
      en: "ば conditional + いい. Advice pattern: 先生に聞けばいい."
      ko: "ば 조건형 + いい. 조언 패턴: 先生に聞けばいい."
