- id: connectors
  label:
    en: Connectors and Logical Flow Markers
    ko: 접속사와 논리 흐름 표지
  type: vocabulary
  words:
  - japanese: しかし
    reading: null
    translation:
      en: however, but (formal contrast)
      ko: 그러나, 하지만 (격식 대조)
    gender: null
    plural: null
    notes:
      en: "Signals contrast. More formal than でも. Common in essays."
      ko: "대조를 알림. でも보다 격식적. 에세이에서 자주 사용."
  - japanese: したがって
    reading: null
    translation:
      en: therefore, consequently
      ko: 따라서, 그러므로
    gender: null
    plural: null
    notes:
      en: "Signals a conclusion or logical consequence."
      ko: "결론이나 논리적 결과를 알림."
  - japanese: さらに
    reading: null
    translation:
      en: moreover, furthermore, additionally
      ko: 더욱이, 게다가
    gender: null
    plural: null
    notes:
      en: "Adds more information. Similar to その上."
      ko: "더 많은 정보를 추가. その上과 유사."
  - japanese: 一方
    reading: いっぽう
    translation:
      en: on the other hand, meanwhile
      ko: 한편, 반면에
    gender: null
    plural: null
    notes:
      en: "Presents a different perspective or contrasting aspect."
      ko: "다른 관점이나 대조적 측면을 제시."
  - japanese: つまり
    reading: null
    translation:
      en: in other words, that is to say
      ko: 즉, 다시 말해
    gender: null
    plural: null
    notes:
      en: "Rephrasing or summarizing. Similar to すなわち (more formal)."
      ko: "바꿔 말하기 또는 요약. すなわち (더 격식적)와 유사."
  - japanese: 例えば
    reading: たとえば
    translation:
      en: for example
      ko: 예를 들어
    gender: null
    plural: null
    notes:
      en: "Introduces an example. Similar to 具体的には (more specifically)."
      ko: "예시를 소개. 具体的には (더 구체적으로)와 유사."
  - japanese: なぜなら
    reading: null
    translation:
      en: because, the reason is
      ko: 왜냐하면
    gender: null
    plural: null
    notes:
      en: "Introduces an explanation. Often followed by からだ/からである."
      ko: "설명을 소개. からだ/からである가 뒤따르는 경우가 많음."
  - japanese: ではないだろうか
    reading: null
    translation:
      en: isn't it? (rhetorical question implying agreement)
      ko: ~가 아닐까 (수사적 질문)
    gender: null
    plural: null
    notes:
