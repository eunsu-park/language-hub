      ko: "저자의 의견을 부드럽게 제시하는 수사적 질문."
  - japanese: べきだ
    reading: null
    translation:
      en: should, ought to (strong recommendation)
      ko: ~해야 한다 (강한 권고)
    gender: null
    plural: null
    notes:
      en: "Opinion marker in essays. Dictionary form + べきだ."
      ko: "에세이에서의 의견 표지. 사전형 + べきだ."
