      ko: "에세이에서의 온건한 주장 패턴. と言える보다 부드러움."
  - japanese: すなわち
    reading: null
    translation:
      en: namely, that is (very formal)
      ko: 즉, 다시 말하면 (매우 격식적)
    gender: null
    plural: null
    notes:
      en: "More formal than つまり. Common in academic texts."
      ko: "つまり보다 더 격식적. 학술 텍스트에서 자주 사용."
