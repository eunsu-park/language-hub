      ko: 둘 (범용 조수사)
    gender: null
    plural: null
  - japanese: みっつ
    reading: null
    translation:
      en: three (generic counter)
      ko: 셋 (범용 조수사)
    gender: null
    plural: null
  - japanese: いくつ
    reading: null
    translation:
      en: how many (generic)
      ko: 몇 개
    gender: null
    plural: null
  - japanese: 人
    reading: にん
    translation:
      en: counter for people
      ko: 사람 조수사
    gender: null
    plural: null
    notes:
      en: "Irregular: 1人=ひとり, 2人=ふたり. Regular from 3人=さんにん"
      ko: "불규칙: 1人=ひとり, 2人=ふたり. 3人=さんにん부터 규칙적"
  - japanese: 本
    reading: ほん
    translation:
      en: counter for long/thin objects
      ko: 길고 얇은 것 조수사
    gender: null
    plural: null
    notes:
      en: "For pens, bottles, trees, etc. Sound changes: 1=いっぽん, 3=さんぼん, 6=ろっぽん"
      ko: "펜, 병, 나무 등. 음변화: 1=いっぽん, 3=さんぼん, 6=ろっぽん"
  - japanese: 枚
    reading: まい
    translation:
      en: counter for flat/thin objects
      ko: 평평하고 얇은 것 조수사
    gender: null
    plural: null
    notes:
      en: "For paper, shirts, plates, tickets. No sound changes."
      ko: "종이, 셔츠, 접시, 티켓 등. 음변화 없음."
  - japanese: 匹
    reading: ひき
    translation:
      en: counter for small animals
      ko: 작은 동물 조수사
    gender: null
    plural: null
    notes:
      en: "For cats, dogs, fish, insects. Sound changes: 1=いっぴき, 3=さんびき"
      ko: "고양이, 개, 물고기, 곤충 등. 음변화: 1=いっぴき, 3=さんびき"
  - japanese: 台
    reading: だい
    translation:
      en: counter for machines/vehicles
      ko: 기계/차량 조수사
    gender: null
    plural: null
    notes:
      en: "For cars, computers, TVs. No sound changes."
      ko: "자동차, 컴퓨터, TV 등. 음변화 없음."
  - japanese: 冊
    reading: さつ
    translation:
      en: counter for books/volumes
      ko: 책/권 조수사
    gender: null
    plural: null
    notes:
      en: "Sound changes: 1=いっさつ, 8=はっさつ, 10=じゅっさつ"
      ko: "음변화: 1=いっさつ, 8=はっさつ, 10=じゅっさつ"
  - japanese: 杯
    reading: はい
    translation:
      en: counter for cups/glasses/bowls
      ko: 잔/그릇 조수사
    gender: null
    plural: null
    notes:
      en: "Sound changes: 1=いっぱい, 3=さんばい, 6=ろっぱい"
      ko: "음변화: 1=いっぱい, 3=さんばい, 6=ろっぱい"

