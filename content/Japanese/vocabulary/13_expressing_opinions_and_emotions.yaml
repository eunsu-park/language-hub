lesson: 13_Expressing_Opinions_and_Emotions
lesson_number: 13
jlpt: N3
categories:
- id: opinion_expressions
  label:
    en: Opinion Expressions
    ko: 의견 표현
  type: vocabulary
  words:
  - japanese: と思う
    reading: とおもう
    translation:
      en: I think (that)
      ko: ~라고 생각하다
    gender: null
    plural: null
    notes:
      en: "Plain form + と思う. Negate the content, not 思う: 来ないと思う (I think he won't come)."
      ko: "기본형 + と思う. 思う가 아닌 내용을 부정: 来ないと思う (안 올 거라 생각한다)."
  - japanese: と思っている
    reading: とおもっている
    translation:
      en: I think/believe (sustained belief)
      ko: ~라고 생각하고 있다 (지속적 생각)
    gender: null
    plural: null
    notes:
      en: "Ongoing belief. Required for third person: 田中さんは来ないと思っている."
      ko: "지속적인 생각. 3인칭에서 필수: 田中さんは来ないと思っている."
  - japanese: と思います
    reading: とおもいます
    translation:
      en: I think (that) (polite)
      ko: ~라고 생각합니다 (존댓말)
    gender: null
    plural: null
    notes:
      en: "Polite form of と思う. Used in formal settings."
      ko: "と思う의 존댓말. 격식 있는 상황에서 사용."
  - japanese: どう思いますか
    reading: どうおもいますか
    translation:
      en: what do you think?
      ko: 어떻게 생각하세요?
    gender: null
    plural: null
    notes:
      en: "Standard way to ask for opinions."
      ko: "의견을 묻는 표준 표현."
  - japanese: と考える
    reading: とかんがえる
    translation:
      en: to consider that, to think (formal)
      ko: ~라고 생각하다 (격식체)
    gender: null
    plural: null
    notes:
      en: "More formal/intellectual than と思う. Common in essays and academic writing."
      ko: "と思う보다 격식적/지적인 표현. 에세이나 학술 글에서 자주 사용."
  - japanese: かもしれない
    reading: null
    translation:
      en: might, maybe, perhaps
      ko: ~일지도 모른다
    gender: null
    plural: null
    notes:
      en: "Expresses possibility (low certainty). Plain form + かもしれない."
      ko: "가능성 표현 (낮은 확실성). 기본형 + かもしれない."
  - japanese: に違いない
    reading: にちがいない
    translation:
      en: must be, no doubt
      ko: ~임에 틀림없다
    gender: null
    plural: null
    notes:
      en: "Strong conviction. Higher certainty than はずだ."
      ko: "강한 확신. はずだ보다 높은 확실성."
- id: emotion_words
  label:
    en: Emotion and Impression Words
    ko: 감정 및 인상 표현
  type: vocabulary
  words:
  - japanese: ようだ
    reading: null
    translation:
      en: it seems, it appears (formal)
      ko: ~인 것 같다 (격식체)
    gender: null
    plural: null
    notes:
      en: "Judgment based on direct observation. Formal register."
      ko: "직접 관찰에 기반한 판단. 격식체."
  - japanese: ような
    reading: null
    translation:
      en: like, such as (before noun)
      ko: ~와 같은 (명사 수식)
    gender: null
    plural: null
    notes:
      en: "Attributive form of ようだ: 夢のような話 (a dream-like story)."
      ko: "ようだ의 연체형: 夢のような話 (꿈같은 이야기)."
  - japanese: ように
    reading: null
    translation:
      en: in a way that, so that (before verb)
      ko: ~처럼, ~하도록 (동사 수식)
    gender: null
    plural: null
    notes:
      en: "Adverbial form of ようだ: 忘れないようにメモした."
      ko: "ようだ의 부사형: 忘れないようにメモした."
  - japanese: みたいだ
    reading: null
    translation:
      en: it seems like (casual)
      ko: ~인 것 같다 (구어)
    gender: null
    plural: null
    notes:
      en: "Casual equivalent of ようだ. Attaches directly, no の or な connector."
      ko: "ようだ의 구어 표현. の나 な 없이 바로 접속."
  - japanese: みたいな
    reading: null
    translation:
      en: like, -ish (before noun, casual)
      ko: ~같은 (명사 수식, 구어)
    gender: null
    plural: null
    notes:
      en: "Attributive form: お姫様みたいなドレス (a princess-like dress)."
      ko: "연체형: お姫様みたいなドレス (공주 같은 드레스a)."
  - japanese: みたいに
    reading: null
    translation:
      en: like, as if (before verb, casual)
      ko: ~처럼 (동사 수식, 구어)
    gender: null
    plural: null
    notes:
      en: "Adverbial form: 子供みたいに笑う (laugh like a child)."
      ko: "부사형: 子供みたいに笑う (아이처럼 웃다)."
  - japanese: まるで
    reading: null
    translation:
      en: just like, as if (emphasis)
      ko: 마치, 꼭 (강조)
    gender: null
    plural: null
    notes:
      en: "Emphatic adverb often paired with ようだ/みたいだ: まるで映画のような景色."
      ko: "ようだ/みたいだ와 자주 함께 사용하는 강조 부사: まるで映画のような景色."
  - japanese: おいしそうだ
    reading: null
    translation:
      en: it looks delicious (appearance)
      ko: 맛있어 보인다 (외관)
    gender: null
    plural: null
    notes:
      en: "Appearance そうだ: adj stem + そうだ. NOT おいしいそうだ (that's hearsay)."
      ko: "외관 そうだ: 형용사 어간 + そうだ. おいしいそうだ가 아님 (그것은 전문)."
  - japanese: 降りそうだ
    reading: ふりそうだ
    translation:
      en: it looks like it will rain (appearance)
      ko: 비가 올 것 같다 (외관)
    gender: null
    plural: null
    notes:
      en: "Appearance そうだ with verb: masu-stem + そうだ."
      ko: "동사의 외관 そうだ: ます어간 + そうだ."
  - japanese: よさそうだ
    reading: null
    translation:
      en: it looks good (appearance)
      ko: 좋아 보인다 (외관)
    gender: null
    plural: null
    notes:
      en: "Special form: いい → よさそうだ (not いそうだ)."
      ko: "특수 형태: いい → よさそうだ (いそうだ가 아님)."
  - japanese: なさそうだ
    reading: null
    translation:
      en: it doesn't look like (negative appearance)
      ko: ~없어 보인다 (부정 외관)
    gender: null
    plural: null
    notes:
      en: "Special form: ない → なさそうだ (not なそうだ)."
      ko: "특수 형태: ない → なさそうだ (なそうだ가 아님)."
- id: evidential_expressions
  label:
    en: Evidential Expressions
    ko: 증거 기반 표현
  type: vocabulary
  words:
  - japanese: らしい
    reading: null
    translation:
      en: apparently, I heard (hearsay)
      ko: ~인 것 같다, ~라고 들었다 (전문)
    gender: null
    plural: null
    notes:
      en: "Information from others or indirect evidence. Plain form + らしい."
      ko: "타인으로부터의 정보 또는 간접 증거. 기본형 + らしい."
  - japanese: 春らしい
    reading: はるらしい
    translation:
      en: spring-like, typical of spring
      ko: 봄답다, 봄다운
    gender: null
    plural: null
    notes:
      en: "Noun + らしい = typical of, befitting. Different from hearsay usage."
      ko: "명사 + らしい = ~답다. 전문(듣다) 용법과 다름."
  - japanese: そうだ (appearance)
    reading: null
    translation:
      en: it looks like (visual impression)
      ko: ~할 것 같다 (외관)
    gender: null
    plural: null
    notes:
      en: "Masu-stem/adj-stem + そうだ. Based on visual impression."
      ko: "ます어간/형용사 어간 + そうだ. 시각적 인상에 기반."
  - japanese: そうだ (hearsay)
    reading: null
    translation:
      en: I heard that (reported information)
      ko: ~라고 한다 (전문)
    gender: null
    plural: null
    notes:
      en: "Plain form + そうだ. Key distinction: おいしそう (looks) vs. おいしいそうだ (heard)."
      ko: "기본형 + そうだ. 핵심 구별: おいしそう (보인다) vs. おいしいそうだ (들었다)."
  - japanese: はずだ
    reading: null
    translation:
      en: should be, is expected (logical expectation)
      ko: ~일 것이다, ~해야 한다 (논리적 기대)
    gender: null
    plural: null
    notes:
      en: "High certainty based on reasoning. Plain form + はずだ."
      ko: "추론에 기반한 높은 확실성. 기본형 + はずだ."
  - japanese: はずがない
    reading: null
    translation:
      en: there's no way that, can't be
      ko: ~일 리가 없다
    gender: null
    plural: null
    notes:
      en: "Strong negation. こんなに高いはずがない (It can't possibly be this expensive)."
      ko: "강한 부정. こんなに高いはずがない (이렇게 비쌀 리가 없다)."
  - japanese: ことがある
    reading: null
    translation:
      en: there are times when (occasional occurrence)
      ko: ~하는 경우가 있다 (때때로)
    gender: null
    plural: null
    notes:
      en: "Dictionary form + ことがある: 電車が遅れることがある (the train is sometimes late)."
      ko: "사전형 + ことがある: 電車が遅れることがある (전철이 가끔 늦는다)."
  - japanese: たことがある
    reading: null
    translation:
      en: have experienced, have done before
      ko: ~한 적이 있다 (경험)
    gender: null
    plural: null
    notes:
      en: "た-form + ことがある: 日本に行ったことがある (I have been to Japan)."
      ko: "た형 + ことがある: 日本に行ったことがある (일본에 간 적이 있다)."
  - japanese: たことがない
    reading: null
    translation:
      en: have never done
      ko: ~한 적이 없다
    gender: null
    plural: null
    notes:
      en: "た-form + ことがない: 納豆を食べたことがない (I have never eaten natto)."
      ko: "た형 + ことがない: 納豆を食べたことがない (낫토를 먹은 적이 없다)."
  - japanese: 便利だと思う
    reading: べんりだとおもう
    translation:
      en: I think it's convenient
      ko: 편리하다고 생각한다
    gender: null
    plural: null
    notes:
      en: "な-adjective + だ + と思う. The だ is required before と."
      ko: "な형용사 + だ + と思う. と 앞에 だ가 필수."
  - japanese: 難しいようだ
    reading: むずかしいようだ
    translation:
      en: it seems difficult
      ko: 어려운 것 같다
    gender: null
    plural: null
    notes:
      en: "い-adjective + ようだ. Judgment based on observation."
      ko: "い형용사 + ようだ. 관찰에 기반한 판단."
  - japanese: 元気そうだ
    reading: げんきそうだ
    translation:
      en: looks healthy/energetic (appearance)
      ko: 건강해 보인다 (외관)
    gender: null
    plural: null
    notes:
      en: "な-adjective stem + そうだ (appearance). 彼は元気そうだ."
      ko: "な형용사 어간 + そうだ (외관). 彼は元気そうだ."
