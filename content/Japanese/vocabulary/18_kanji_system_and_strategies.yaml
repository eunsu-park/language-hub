      en: sun/day radical
      ko: 일변 (해/날 부수)
    gender: null
    plural: null
    notes:
      en: "Related to sun/time. Found in 明, 時, 暗, 晴, 昼."
      ko: "해/시간 관련. 明, 時, 暗, 晴, 昼에 사용."
  - japanese: 目
    reading: めへん
    translation:
      en: eye radical
      ko: 목변 (눈 부수)
    gender: null
    plural: null
    notes:
      en: "Related to seeing/eyes. Found in 見, 睡, 眼, 瞬."
      ko: "보기/눈 관련. 見, 睡, 眼, 瞬에 사용."

- id: kanji_prefixes_suffixes
  label:
    en: Common Kanji Prefixes and Suffixes
    ko: 주요 한자 접두사 및 접미사
  type: vocabulary
  words:
  - japanese: 不
    reading: ふ
    translation:
      en: un-, non- (negative prefix)
      ko: 불, 부 (부정 접두사)
    gender: null
    plural: null
    notes:
      en: "不可能 (impossible), 不安 (anxiety), 不便 (inconvenient)."
      ko: "不可能 (불가능), 不安 (불안), 不便 (불편)."
  - japanese: 無
    reading: む
    translation:
      en: without, -less (negative prefix)
      ko: 무 (없음 접두사)
    gender: null
    plural: null
    notes:
      en: "無料 (free of charge), 無理 (unreasonable), 無関心 (indifferent)."
      ko: "無料 (무료), 無理 (무리), 無関心 (무관심)."
  - japanese: 非
    reading: ひ
    translation:
      en: non-, un- (negative prefix)
      ko: 비 (부정 접두사)
    gender: null
    plural: null
    notes:
      en: "非常 (emergency), 非公式 (unofficial), 非難 (criticism)."
      ko: "非常 (비상), 非公式 (비공식), 非難 (비난)."
  - japanese: 未
    reading: み
    translation:
      en: not yet (prefix)
      ko: 미 (아직 ~않은 접두사)
    gender: null
    plural: null
    notes:
      en: "未来 (future), 未定 (undecided), 未経験 (inexperienced)."
      ko: "未来 (미래), 未定 (미정), 未経験 (미경험)."
  - japanese: 再
    reading: さい
    translation:
      en: re-, again (prefix)
      ko: 재 (다시 접두사)
    gender: null
    plural: null
    notes:
      en: "再開 (reopening), 再利用 (reuse), 再確認 (reconfirmation)."
      ko: "再開 (재개), 再利用 (재이용), 再確認 (재확인)."
  - japanese: 的
    reading: てき
    translation:
      en: -tic, -al, -ive (suffix)
      ko: ~적 (접미사)
    gender: null
    plural: null
    notes:
      en: "Creates な-adjective: 科学的 (scientific), 基本的 (basic)."
      ko: "な형용사 생성: 科学的 (과학적), 基本的 (기본적)."
  - japanese: 化
    reading: か
    translation:
      en: -ize, -ification (suffix)
      ko: ~화 (접미사)
    gender: null
    plural: null
    notes:
      en: "Creates する-verb: 国際化 (internationalization), 近代化 (modernization)."
      ko: "する동사 생성: 国際化 (국제화), 近代化 (근대화)."
  - japanese: 性
    reading: せい
    translation:
      en: -ity, -ness (suffix)
      ko: ~성 (접미사)
    gender: null
    plural: null
    notes:
      en: "可能性 (possibility), 重要性 (importance), 安全性 (safety)."
      ko: "可能性 (가능성), 重要性 (중요성), 安全性 (안전성)."
  - japanese: 者
    reading: しゃ
    translation:
      en: person (suffix)
      ko: ~자 (사람 접미사)
    gender: null
    plural: null
    notes:
      en: "研究者 (researcher), 労働者 (worker), 消費者 (consumer)."
      ko: "研究者 (연구자), 労働者 (노동자), 消費者 (소비자)."
  - japanese: 超
    reading: ちょう
    translation:
      en: super-, ultra- (prefix)
      ko: 초 (접두사)
    gender: null
    plural: null
    notes:
      en: "超自然 (supernatural), 超高速 (ultra-high speed)."
      ko: "超自然 (초자연), 超高速 (초고속)."
  - japanese: 各
    reading: かく
    translation:
      en: each, every (prefix)
      ko: 각 (접두사)
    gender: null
    plural: null
    notes:
      en: "各国 (each country), 各自 (each person), 各地 (each area)."
      ko: "各国 (각국), 各自 (각자), 各地 (각지)."
  - japanese: 全
    reading: ぜん
    translation:
      en: all, whole (prefix)
      ko: 전 (접두사)
    gender: null
    plural: null
    notes:
      en: "全国 (nationwide), 全体 (whole), 全員 (all members)."
      ko: "全国 (전국), 全体 (전체), 全員 (전원)."
  - japanese: 反
    reading: はん
    translation:
      en: anti-, counter- (prefix)
      ko: 반 (접두사)
    gender: null
    plural: null
    notes:
      en: "反対 (opposition), 反応 (reaction), 反省 (reflection)."
      ko: "反対 (반대), 反応 (반응), 反省 (반성)."
  - japanese: 同音異義語
    reading: どうおんいぎご
    translation:
      en: homophone (same sound, different meaning)
      ko: 동음이의어
    gender: null
    plural: null
    notes:
      en: "E.g., 橋/箸/端 all read はし but differ in meaning and pitch."
      ko: "예: 橋/箸/端 모두 はし로 읽히지만 의미와 억양이 다름."
  - japanese: 同訓異字
    reading: どうくんいじ
    translation:
      en: kanji with same kun reading but different meaning
      ko: 동훈이자 (같은 훈독, 다른 한자)
    gender: null
    plural: null
    notes:
      en: "E.g., 聞く/聴く both read きく but 聞 = hear, 聴 = listen actively."
      ko: "예: 聞く/聴く 모두 きく로 읽히지만 聞 = 듣다, 聴 = 경청하다."
  - japanese: 対義語
    reading: たいぎご
    translation:
      en: antonym
      ko: 반의어
    gender: null
    plural: null
    notes:
      en: "E.g., 大↔小, 長↔短, 上↔下."
      ko: "예: 大↔小, 長↔短, 上↔下."
  - japanese: 類義語
    reading: るいぎご
    translation:
      en: synonym
      ko: 유의어
    gender: null
    plural: null
    notes:
      en: "E.g., 始める/開始する (to begin)."
      ko: "예: 始める/開始する (시작하다)."
  - japanese: 四字熟語
    reading: よじじゅくご
    translation:
      en: four-character idiom
      ko: 사자성어
    gender: null
    plural: null
    notes:
      en: "E.g., 一石二鳥 (killing two birds with one stone)."
      ko: "예: 一石二鳥 (일석이조)."
  - japanese: 語源
    reading: ごげん
    translation:
      en: etymology, word origin
      ko: 어원
    gender: null
    plural: null
    notes:
      en: "Studying 語源 helps understand and remember kanji meanings."
      ko: "語源을 공부하면 한자의 의미를 이해하고 기억하는 데 도움."
  - japanese: 部首索引
    reading: ぶしゅさくいん
    translation:
      en: radical index
      ko: 부수 색인
    gender: null
    plural: null
    notes:
      en: "Method of looking up kanji by radical in a dictionary."
      ko: "사전에서 부수로 한자를 찾는 방법."
