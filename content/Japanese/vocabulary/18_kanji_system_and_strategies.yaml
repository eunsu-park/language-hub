      ko: 구변 (입 부수)
    gender: null
    plural: null
    notes:
      en: "Related to speaking/eating. Found in 言, 食, 呼, 吸."
      ko: "말하기/먹기 관련. 言, 食, 呼, 吸에 사용."
  - japanese: 氵
    reading: さんずい
