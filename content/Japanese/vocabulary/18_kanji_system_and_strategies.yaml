      ko: 인변 (사람 부수)
    gender: null
    plural: null
    notes:
      en: "Variant of 人. Found in 休, 体, 作, 住, 使."
      ko: "人의 변형. 休, 体, 作, 住, 使에 사용."
  - japanese: 口
