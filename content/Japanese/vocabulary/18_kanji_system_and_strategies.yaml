      ko: "왼쪽 아래에서 감싸는 부수 (예: 道의 辶)."

- id: reading_types
  label:
    en: Reading Types
    ko: 읽기 유형
  type: vocabulary
  words:
  - japanese: 音読み
    reading: おんよみ
    translation:
      en: on'yomi (Sino-Japanese reading)
      ko: 음독 (중국식 읽기)
    gender: null
    plural: null
    notes:
      en: "Chinese-derived pronunciation; used mainly in kanji compounds"
      ko: "중국에서 유래한 발음; 주로 한자 복합어에 사용"
  - japanese: 訓読み
    reading: くんよみ
    translation:
      en: kun'yomi (native Japanese reading)
      ko: 훈독 (일본 고유 읽기)
    gender: null
    plural: null
    notes:
      en: "Native Japanese reading; used when kanji stands alone or with okurigana"
      ko: "일본 고유 읽기; 한자가 단독으로 또는 오쿠리가나와 함께 사용될 때"
  - japanese: 熟字訓
    reading: じゅくじくん
    translation:
      en: special compound reading
      ko: 숙자훈 (특수 복합 읽기)
    gender: null
    plural: null
    notes:
      en: "Compound read as one native word (e.g., 大人 = おとな, not だいじん)"
      ko: "하나의 고유어로 읽히는 복합어 (예: 大人 = おとな)"
  - japanese: 名乗り
    reading: なのり
    translation:
      en: name reading
      ko: 이름 읽기
    gender: null
    plural: null
    notes:
      en: "Special readings used only in personal names"
      ko: "인명에서만 사용되는 특수 읽기"
  - japanese: 当て字
    reading: あてじ
    translation:
      en: phonetic kanji (ateji)
      ko: 당자 (음을 빌려 쓴 한자)
    gender: null
    plural: null
    notes:
      en: "Kanji chosen for sound, not meaning (e.g., 寿司 = すし)"
      ko: "의미가 아닌 소리를 위해 선택된 한자 (예: 寿司 = すし)"
  - japanese: 送り仮名
    reading: おくりがな
    translation:
      en: okurigana (trailing kana)
      ko: 오쿠리가나 (한자 뒤의 히라가나)
    gender: null
    plural: null
    notes:
      en: "Hiragana endings attached to kanji (e.g., 食べる)"
      ko: "한자에 붙는 히라가나 어미 (예: 食べる)"
  - japanese: 重箱読み
    reading: じゅうばこよみ
    translation:
      en: mixed reading (on + kun)
      ko: 중상 읽기 (음독 + 훈독)
    gender: null
    plural: null
    notes:
      en: "First kanji on'yomi, second kun'yomi (e.g., 本棚 ほんだな)."
      ko: "첫 한자 음독, 둘째 훈독 (예: 本棚 ほんだな)."
  - japanese: 湯桶読み
    reading: ゆとうよみ
    translation:
      en: mixed reading (kun + on)
      ko: 유통 읽기 (훈독 + 음독)
    gender: null
    plural: null
    notes:
      en: "First kanji kun'yomi, second on'yomi (e.g., 場所 ばしょ)."
      ko: "첫 한자 훈독, 둘째 음독 (예: 場所 ばしょ)."
  - japanese: 呉音
    reading: ごおん
    translation:
      en: Go-on reading (oldest Chinese reading)
      ko: 오음 (가장 오래된 중국식 읽기)
    gender: null
    plural: null
    notes:
      en: "Oldest layer of on'yomi, from southern China (Wu region)."
      ko: "가장 오래된 음독 층, 중국 남부 (오나라 지역)에서 유래."
  - japanese: 漢音
    reading: かんおん
    translation:
      en: Kan-on reading (Tang dynasty reading)
      ko: 한음 (당나라 시대 읽기)
    gender: null
    plural: null
    notes:
      en: "Most common on'yomi layer, from Chang'an during Tang dynasty."
      ko: "가장 일반적인 음독 층, 당나라 시대 장안에서 유래."
  - japanese: 唐音
    reading: とうおん
    translation:
      en: Tou-on reading (later Chinese reading)
      ko: 당음 (후기 중국식 읽기)
    gender: null
    plural: null
    notes:
      en: "Latest layer of on'yomi, from Song/Ming dynasty contacts."
      ko: "가장 늦은 음독 층, 송/명나라 교류에서 유래."

