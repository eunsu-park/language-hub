    gender: null
    plural: null
  - japanese: 冠
    reading: かんむり
    translation:
      en: top component
      ko: 관 (윗부분 구성 요소)
    gender: null
    plural: null
  - japanese: 脚
    reading: あし
    translation:
      en: bottom component
      ko: 각 (아랫부분 구성 요소)
    gender: null
    plural: null
  - japanese: 構
    reading: かまえ
    translation:
      en: enclosure component
      ko: 구 (에워싸는 구성 요소)
    gender: null
    plural: null
  - japanese: 象形文字
    reading: しょうけいもじ
    translation:
      en: pictograph
      ko: 상형문자
    gender: null
    plural: null
    notes:
      en: "Kanji derived from stylized pictures of objects (e.g., 山, 川)"
      ko: "사물의 양식화된 그림에서 유래한 한자 (예: 山, 川)"
  - japanese: 指事文字
    reading: しじもじ
    translation:
      en: ideograph
      ko: 지사문자
    gender: null
    plural: null
    notes:
      en: "Abstract concepts shown visually (e.g., 上, 下)"
      ko: "시각적으로 표현된 추상적 개념 (예: 上, 下)"
  - japanese: 会意文字
    reading: かいいもじ
    translation:
      en: compound ideograph
      ko: 회의문자
    gender: null
    plural: null
    notes:
      en: "Two or more elements combined for meaning (e.g., 森 = 木+木+木)"
      ko: "의미를 위해 두 개 이상의 요소가 결합 (예: 森 = 木+木+木)"
  - japanese: 形声文字
    reading: けいせいもじ
    translation:
      en: phono-semantic compound
      ko: 형성문자
    gender: null
    plural: null
    notes:
      en: "Meaning part + sound part; ~80% of all kanji are this type"
      ko: "의미 부분 + 음 부분; 전체 한자의 약 80%가 이 유형"
  - japanese: 音符
    reading: おんぷ
    translation:
      en: phonetic component
      ko: 음부 (소리를 나타내는 부분)
    gender: null
    plural: null

- id: reading_types
  label:
    en: Reading Types
    ko: 읽기 유형
  type: vocabulary
  words:
  - japanese: 音読み
    reading: おんよみ
    translation:
      en: on'yomi (Sino-Japanese reading)
      ko: 음독 (중국식 읽기)
    gender: null
    plural: null
    notes:
      en: "Chinese-derived pronunciation; used mainly in kanji compounds"
      ko: "중국에서 유래한 발음; 주로 한자 복합어에 사용"
  - japanese: 訓読み
    reading: くんよみ
    translation:
      en: kun'yomi (native Japanese reading)
      ko: 훈독 (일본 고유 읽기)
    gender: null
    plural: null
    notes:
      en: "Native Japanese reading; used when kanji stands alone or with okurigana"
      ko: "일본 고유 읽기; 한자가 단독으로 또는 오쿠리가나와 함께 사용될 때"
  - japanese: 熟字訓
    reading: じゅくじくん
    translation:
      en: special compound reading
      ko: 숙자훈 (특수 복합 읽기)
    gender: null
    plural: null
    notes:
      en: "Compound read as one native word (e.g., 大人 = おとな, not だいじん)"
      ko: "하나의 고유어로 읽히는 복합어 (예: 大人 = おとな)"
  - japanese: 名乗り
    reading: なのり
    translation:
      en: name reading
      ko: 이름 읽기
    gender: null
    plural: null
    notes:
      en: "Special readings used only in personal names"
      ko: "인명에서만 사용되는 특수 읽기"
  - japanese: 当て字
    reading: あてじ
    translation:
      en: phonetic kanji (ateji)
      ko: 당자 (음을 빌려 쓴 한자)
    gender: null
    plural: null
    notes:
      en: "Kanji chosen for sound, not meaning (e.g., 寿司 = すし)"
      ko: "의미가 아닌 소리를 위해 선택된 한자 (예: 寿司 = すし)"
  - japanese: 送り仮名
    reading: おくりがな
    translation:
      en: okurigana (trailing kana)
      ko: 오쿠리가나 (한자 뒤의 히라가나)
    gender: null
    plural: null
    notes:
      en: "Hiragana endings attached to kanji (e.g., 食べる)"
      ko: "한자에 붙는 히라가나 어미 (예: 食べる)"

