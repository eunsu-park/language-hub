lesson: 14_Formal_and_Informal_Speech
lesson_number: 14
jlpt: N3
categories:
- id: honorific_verbs
  label:
    en: Honorific Verbs (Sonkeigo)
    ko: 존경어 동사 (尊敬語)
  type: vocabulary
  words:
  - japanese: いらっしゃる
    reading: null
    translation:
      en: to be / to go / to come (honorific)
      ko: 계시다 / 가시다 / 오시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for いる, 行く, and 来る. Context distinguishes. Conjugates as Group 1."
      ko: "いる, 行く, 来る의 존경어. 문맥으로 구분. 1그룹으로 활용."
  - japanese: おっしゃる
    reading: null
    translation:
      en: to say (honorific)
      ko: 말씀하시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for 言う. Polite: おっしゃいます. Avoid double honorific: おっしゃられる is wrong."
      ko: "言う의 존경어. 존댓말: おっしゃいます. 이중 경어 주의: おっしゃられる는 틀림."
  - japanese: 召し上がる
    reading: めしあがる
    translation:
      en: to eat / to drink (honorific)
      ko: 드시다 / 잡수시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for 食べる and 飲む. どうぞ召し上がってください (Please help yourself)."
      ko: "食べる와 飲む의 존경어. どうぞ召し上がってください (드세요)."
  - japanese: ご覧になる
    reading: ごらんになる
    translation:
      en: to see / to look at (honorific)
      ko: 보시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for 見る. この資料をご覧になりましたか."
      ko: "見る의 존경어. この資料をご覧になりましたか."
  - japanese: ご存じだ
    reading: ごぞんじだ
    translation:
      en: to know (honorific)
      ko: 알고 계시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for 知っている. ご存じですか (Do you know?)."
      ko: "知っている의 존경어. ご存じですか (아시나요?)."
  - japanese: なさる
    reading: null
    translation:
      en: to do (honorific)
      ko: 하시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for する. Polite: なさいます."
      ko: "する의 존경어. 존댓말: なさいます."
  - japanese: くださる
    reading: null
    translation:
      en: to give (to me) (honorific)
      ko: 주시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for くれる. Polite: くださいます."
      ko: "くれる의 존경어. 존댓말: くださいます."
  - japanese: お召しになる
    reading: おめしになる
    translation:
      en: to wear (honorific)
      ko: 입으시다 (존경어)
    gender: null
    plural: null
    notes:
      en: "Honorific for 着る."
      ko: "着る의 존경어."
  - japanese: お帰りになる
    reading: おかえりになる
    translation:
      en: to return (honorific, productive pattern)
      ko: 돌아가시다 (존경어, 생산적 패턴)
    gender: null
    plural: null
    notes:
      en: "お + masu-stem + になる pattern. Productive honorific for regular verbs."
      ko: "お + ます어간 + になる 패턴. 일반 동사의 생산적 존경어."
  - japanese: お読みになる
    reading: およみになる
    translation:
      en: to read (honorific, productive pattern)
      ko: 읽으시다 (존경어, 생산적 패턴)
    gender: null
    plural: null
    notes:
      en: "お + masu-stem + になる pattern applied to 読む."
      ko: "読む에 적용한 お + ます어간 + になる 패턴."
  - japanese: 行かれる
    reading: いかれる
    translation:
      en: to go (light honorific via passive form)
      ko: 가시다 (수동형을 이용한 가벼운 존경어)
    gender: null
    plural: null
    notes:
      en: "Passive form used as lighter honorific. Less formal than いらっしゃる."
      ko: "수동형을 존경어로 사용. いらっしゃる보다 덜 격식적."
- id: humble_verbs
  label:
    en: Humble Verbs (Kenjougo)
    ko: 겸양어 동사 (謙譲語)
  type: vocabulary
  words:
  - japanese: おる
    reading: null
    translation:
      en: to be (humble)
      ko: 있다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for いる. 社長はおりません (The president is not in)."
      ko: "いる의 겸양어. 社長はおりません (사장님은 안 계십니다)."
  - japanese: 参る
    reading: まいる
    translation:
      en: to go / to come (humble)
      ko: 가다 / 오다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 行く and 来る. 明日参ります (I will come/go tomorrow)."
      ko: "行く와 来る의 겸양어. 明日参ります (내일 가겠습니다)."
  - japanese: いただく
    reading: null
    translation:
      en: to eat / to drink / to receive (humble)
      ko: 먹다 / 마시다 / 받다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 食べる, 飲む, もらう. いただきます is a set phrase before eating."
      ko: "食べる, 飲む, もらう의 겸양어. いただきます는 식사 전 인사말."
  - japanese: 申す
    reading: もうす
    translation:
      en: to say (humble)
      ko: 말씀드리다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 言う. 田中と申します (My name is Tanaka)."
      ko: "言う의 겸양어. 田中と申します (다나카라고 합니다)."
  - japanese: 拝見する
    reading: はいけんする
    translation:
      en: to see / to look at (humble)
      ko: 보다 / 뵙다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 見る. 資料を拝見しました (I have looked at the documents)."
      ko: "見る의 겸양어. 資料を拝見しました (자료를 봤습니다)."
  - japanese: 存じている
    reading: ぞんじている
    translation:
      en: to know (humble)
      ko: 알고 있다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 知っている."
      ko: "知っている의 겸양어."
  - japanese: いたす
    reading: null
    translation:
      en: to do (humble)
      ko: 하다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for する. 私がいたします (I will do it)."
      ko: "する의 겸양어. 私がいたします (제가 하겠습니다)."
  - japanese: 差し上げる
    reading: さしあげる
    translation:
      en: to give (humble)
      ko: 드리다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for あげる. Used when giving to a superior."
      ko: "あげる의 겸양어. 윗사람에게 줄 때 사용."
  - japanese: 伺う
    reading: うかがう
    translation:
      en: to ask / to visit (humble)
      ko: 여쭙다 / 찾아뵙다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 聞く and 訪ねる. お伺いしたいのですが."
      ko: "聞く와 訪ねる의 겸양어. お伺いしたいのですが."
  - japanese: お目にかかる
    reading: おめにかかる
    translation:
      en: to meet (humble)
      ko: 뵙다 (겸양어)
    gender: null
    plural: null
    notes:
      en: "Humble for 会う. お目にかかれて光栄です (It's an honor to meet you)."
      ko: "会う의 겸양어. お目にかかれて光栄です (뵙게 되어 영광입니다)."
  - japanese: お持ちする
    reading: おもちする
    translation:
      en: to carry (humble, productive pattern)
      ko: 들어 드리다 (겸양어, 생산적 패턴)
    gender: null
    plural: null
    notes:
      en: "お + masu-stem + する pattern. Productive humble for regular verbs."
      ko: "お + ます어간 + する 패턴. 일반 동사의 생산적 겸양어."
- id: polite_expressions
  label:
    en: Polite Expressions and Business Phrases
    ko: 정중 표현과 비즈니스 표현
  type: vocabulary
  words:
  - japanese: でございます
    reading: null
    translation:
      en: to be (very polite/formal)
      ko: ~이십니다 (매우 정중/격식)
    gender: null
    plural: null
    notes:
      en: "More formal than です. Used in business: 田中でございます."
      ko: "です보다 격식적. 비즈니스에서 사용: 田中でございます."
  - japanese: お世話になっております
    reading: おせわになっております
    translation:
      en: thank you for your continued support
      ko: 신세를 지고 있습니다
    gender: null
    plural: null
    notes:
      en: "Standard business email opening phrase."
      ko: "표준 비즈니스 이메일 첫 인사말."
  - japanese: よろしくお願いします
    reading: よろしくおねがいします
    translation:
      en: pleased to meet you / thank you in advance
      ko: 잘 부탁드립니다
    gender: null
    plural: null
    notes:
      en: "Very versatile polite phrase used in many contexts."
      ko: "다양한 상황에서 사용하는 정중한 표현."
  - japanese: 大変申し訳ございません
    reading: たいへんもうしわけございません
    translation:
      en: I'm very sorry (most formal apology)
      ko: 대단히 죄송합니다 (가장 격식적인 사과)
    gender: null
    plural: null
    notes:
      en: "Most formal apology. Business level. More formal than すみません."
      ko: "가장 격식적인 사과. 비즈니스 수준. すみません보다 격식적."
  - japanese: 少々お待ちください
    reading: しょうしょうおまちください
    translation:
      en: please wait a moment
      ko: 잠시만 기다려 주십시오
    gender: null
    plural: null
    notes:
      en: "Polite request to wait. Common in business and customer service."
      ko: "정중한 대기 요청. 비즈니스와 고객 서비스에서 자주 사용."
  - japanese: お忙しいところ
    reading: おいそがしいところ
    translation:
      en: despite being busy (polite preface)
      ko: 바쁘신 데 (정중한 서두)
    gender: null
    plural: null
    notes:
      en: "Polite preface: お忙しいところありがとうございました."
      ko: "정중한 서두: お忙しいところありがとうございました."
  - japanese: させていただく
    reading: null
    translation:
      en: to be allowed to do (very humble)
      ko: ~하겠습니다 (매우 겸손)
    gender: null
    plural: null
    notes:
      en: "Causative + いただく. 自己紹介させていただきます (Allow me to introduce myself)."
      ko: "사역형 + いただく. 自己紹介させていただきます (자기소개를 하겠습니다)."
  - japanese: お名前
    reading: おなまえ
    translation:
      en: name (with honorific prefix)
      ko: 성함 (존경 접두사 포함)
    gender: null
    plural: null
    notes:
      en: "お prefix for Japanese-origin (和語) words."
      ko: "일본어 기원 (和語) 단어에 사용하는 お 접두사."
  - japanese: ご住所
    reading: ごじゅうしょ
    translation:
      en: address (with honorific prefix)
      ko: 주소 (존경 접두사 포함)
    gender: null
    plural: null
    notes:
      en: "ご prefix for Chinese-origin (漢語) words."
      ko: "중국어 기원 (漢語) 단어에 사용하는 ご 접두사."
  - japanese: ご連絡
    reading: ごれんらく
    translation:
      en: contact (with honorific prefix)
      ko: 연락 (존경 접두사 포함)
    gender: null
    plural: null
    notes:
      en: "ご prefix. ご連絡いただきありがとうございます (Thank you for contacting us)."
      ko: "ご 접두사. ご連絡いただきありがとうございます (연락 주셔서 감사합니다)."
  - japanese: ていただけませんか
    reading: null
    translation:
      en: could you please...? (very polite request)
      ko: ~해 주실 수 있으신지요? (매우 정중한 요청)
    gender: null
    plural: null
    notes:
      en: "て-form + いただけませんか. 説明していただけませんか."
      ko: "て형 + いただけませんか. 説明していただけませんか."
  - japanese: 誠にありがとうございます
    reading: まことにありがとうございます
    translation:
      en: thank you very much (most formal)
      ko: 진심으로 감사합니다 (가장 격식적)
    gender: null
    plural: null
    notes:
      en: "Most formal thanks. 誠に = truly/sincerely."
      ko: "가장 격식적인 감사. 誠に = 진심으로."
