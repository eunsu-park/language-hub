- id: animal_idioms
  label:
    en: Animal Idioms and Proverbs
    ko: 동물 관용구 및 속담
  type: vocabulary
  words:
  - japanese: 猿も木から落ちる
    reading: さるもきからおちる
    translation:
      en: even monkeys fall from trees (even experts make mistakes)
      ko: 원숭이도 나무에서 떨어진다
    gender: null
    plural: null
  - japanese: 能ある鷹は爪を隠す
    reading: のうあるたかはつめをかくす
    translation:
      en: a talented hawk hides its claws (still waters run deep)
      ko: 재능 있는 매는 발톱을 숨긴다
    gender: null
    plural: null
  - japanese: 馬が合う
    reading: うまがあう
    translation:
      en: to get along well
      ko: 말이 맞다, 죽이 맞다
    gender: null
    plural: null
    notes:
      en: "Literally: the horses match"
      ko: "직역: 말이 맞다"

- id: proverbs
  label:
    en: Proverbs
    ko: 속담
  type: vocabulary
  words:
  - japanese: 七転び八起き
    reading: ななころびやおき
    translation:
      en: fall seven times, get up eight (never give up)
      ko: 칠전팔기
    gender: null
    plural: null
  - japanese: 石の上にも三年
    reading: いしのうえにもさんねん
    translation:
      en: three years on a stone (persistence pays off)
      ko: 돌 위에도 3년 (인내가 중요하다)
    gender: null
    plural: null
  - japanese: 継続は力なり
    reading: けいぞくはちからなり
    translation:
      en: continuation is power (practice makes perfect)
      ko: 계속은 힘이다
    gender: null
    plural: null
  - japanese: 急がば回れ
    reading: いそがばまわれ
    translation:
      en: if in a hurry, take the long way (haste makes waste)
      ko: 급하면 돌아가라
    gender: null
    plural: null
  - japanese: 百聞は一見に如かず
    reading: ひゃくぶんはいっけんにしかず
    translation:
      en: hearing 100 times is not as good as seeing once (seeing is believing)
      ko: 백 번 듣는 것은 한 번 보는 것만 못하다
    gender: null
    plural: null
  - japanese: 郷に入っては郷に従え
    reading: ごうにいってはごうにしたがえ
    translation:
      en: when in Rome, do as the Romans do
      ko: 로마에 가면 로마의 법을 따르라
    gender: null
    plural: null
  - japanese: 鉄は熱いうちに打て
    reading: てつはあついうちにうて
    translation:
      en: strike while the iron is hot
      ko: 쇠는 뜨거울 때 쳐라
    gender: null
    plural: null
  - japanese: 時は金なり
    reading: ときはかねなり
    translation:
      en: time is money
      ko: 시간은 금이다
    gender: null
    plural: null

