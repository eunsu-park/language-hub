- id: animal_idioms
  label:
    en: Animal Idioms and Proverbs
    ko: 동물 관용구 및 속담
  type: vocabulary
  words:
  - japanese: 猿も木から落ちる
    reading: さるもきからおちる
    translation:
      en: even monkeys fall from trees (even experts make mistakes)
      ko: 원숭이도 나무에서 떨어진다
    gender: null
    plural: null
  - japanese: 能ある鷹は爪を隠す
    reading: のうあるたかはつめをかくす
    translation:
      en: a talented hawk hides its claws (still waters run deep)
      ko: 재능 있는 매는 발톱을 숨긴다
    gender: null
    plural: null
  - japanese: 馬が合う
    reading: うまがあう
    translation:
      en: to get along well
      ko: 말이 맞다, 죽이 맞다
    gender: null
    plural: null
    notes:
      en: "Literally: the horses match"
      ko: "직역: 말이 맞다"
  - japanese: 猫の手も借りたい
    reading: ねこのてもかりたい
    translation:
      en: so busy one would even borrow a cat's paw
      ko: 고양이 손이라도 빌리고 싶다 (매우 바쁘다)
    gender: null
    plural: null
    notes:
      en: "Expresses extreme busyness."
      ko: "극도의 바쁨을 표현."
  - japanese: 猫をかぶる
    reading: ねこをかぶる
    translation:
      en: to pretend to be innocent, play dumb
      ko: 고양이를 뒤집어쓰다, 새침한 척하다
    gender: null
    plural: null
  - japanese: 虎の巻
    reading: とらのまき
    translation:
      en: cheat sheet, secret manual
      ko: 비법서, 참고서
    gender: null
    plural: null
    notes:
      en: "Literally: tiger's scroll."
      ko: "직역: 호랑이의 두루마리."
  - japanese: 鶴の一声
    reading: つるのひとこえ
    translation:
