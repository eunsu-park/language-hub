- id: letter_vocabulary
  label:
    en: Letter Writing Vocabulary
    ko: 편지 쓰기 어휘
  type: vocabulary
  words:
  - japanese: 拝啓
    reading: はいけい
    translation:
      en: Dear Sir/Madam (formal letter opening)
      ko: 배계 (격식 있는 편지 머리말)
    gender: null
    plural: null
    notes:
      en: "Must be paired with closing 敬具 (keigu)"
      ko: "반드시 맺음말 敬具와 쌍으로 사용"
  - japanese: 敬具
    reading: けいぐ
    translation:
      en: Sincerely (formal letter closing)
      ko: 경구 (격식 있는 편지 맺음말)
    gender: null
    plural: null
