- id: letter_vocabulary
  label:
    en: Letter Writing Vocabulary
    ko: 편지 쓰기 어휘
  type: vocabulary
  words:
  - japanese: 拝啓
    reading: はいけい
    translation:
      en: Dear Sir/Madam (formal letter opening)
      ko: 배계 (격식 있는 편지 머리말)
    gender: null
    plural: null
    notes:
      en: "Must be paired with closing 敬具 (keigu)"
      ko: "반드시 맺음말 敬具와 쌍으로 사용"
  - japanese: 敬具
    reading: けいぐ
    translation:
      en: Sincerely (formal letter closing)
      ko: 경구 (격식 있는 편지 맺음말)
    gender: null
    plural: null
  - japanese: 謹啓
    reading: きんけい
    translation:
      en: Dear Sir/Madam (very formal letter opening)
      ko: 근계 (매우 격식 있는 편지 머리말)
    gender: null
    plural: null
    notes:
      en: "Paired with 謹白 (kinpaku); more formal than 拝啓"
      ko: "謹白와 쌍으로 사용; 拝啓보다 더 격식 있음"
  - japanese: 前略
    reading: ぜんりゃく
    translation:
      en: informal letter opening (skipping formalities)
      ko: 전략 (격식 생략 편지 머리말)
    gender: null
    plural: null
    notes:
      en: "Used when skipping seasonal greetings; paired with 草々"
      ko: "계절 인사를 생략할 때 사용; 草々와 쌍으로 사용"
  - japanese: 時候の挨拶
    reading: じこうのあいさつ
    translation:
      en: seasonal greeting (in letters)
      ko: 시후의 인사 (편지에서)
    gender: null
    plural: null
    notes:
      en: "Each month has traditional seasonal greetings"
      ko: "매달 전통적인 계절 인사가 있음"
  - japanese: 履歴書
    reading: りれきしょ
    translation:
      en: resume, CV
      ko: 이력서
    gender: null
    plural: null
  - japanese: 志望動機
    reading: しぼうどうき
    translation:
      en: reason for application
      ko: 지원 동기
    gender: null
    plural: null
    notes:
      en: "Mandatory section in Japanese resumes"
      ko: "일본 이력서의 필수 항목"

