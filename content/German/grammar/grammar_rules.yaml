# German Grammar Rules, Contrasts, and Patterns

rules:
  # ============================================================
  # 1. CASES OVERVIEW
  # ============================================================
  cases_overview:
    id: cases_overview
    label:
      en: "The Four Cases (Die vier Fälle)"
      ko: "네 가지 격 (Die vier Fälle)"
    category: cases
    cefr: A2
    description:
      en: "German has four grammatical cases that determine the form of articles, adjectives, and pronouns. Each case has a specific grammatical function."
      ko: "독일어에는 관사, 형용사, 대명사의 형태를 결정하는 네 가지 문법적 격이 있다. 각 격은 특정한 문법적 기능을 가진다."
    cases:
      - case: Nominativ
        number: 1
        label:
          en: "Nominative (1st case)"
          ko: "1격 (주격)"
        function:
          en: "Subject of the sentence — who/what performs the action"
          ko: "문장의 주어 — 행동을 수행하는 사람/것"
        question:
          en: "Wer? (who?) / Was? (what?)"
          ko: "Wer? (누가?) / Was? (무엇이?)"
        examples:
          - "Der Mann liest ein Buch. (The man reads a book.)"
          - "Die Katze schläft. (The cat is sleeping.)"
        also_used:
          en: "After sein, werden, bleiben (predicate nominative): Er ist ein guter Lehrer."
          ko: "sein, werden, bleiben 뒤에 (서술 주격): Er ist ein guter Lehrer."

      - case: Akkusativ
        number: 4
        label:
          en: "Accusative (4th case)"
          ko: "4격 (목적격)"
        function:
          en: "Direct object — who/what receives the action"
          ko: "직접 목적어 — 행동을 받는 사람/것"
        question:
          en: "Wen? (whom?) / Was? (what?)"
          ko: "Wen? (누구를?) / Was? (무엇을?)"
        examples:
          - "Ich sehe den Mann. (I see the man.)"
          - "Sie kauft einen Kuchen. (She buys a cake.)"
        prepositions:
          always_accusative: [durch, für, gegen, ohne, um, bis, entlang]
          examples:
            - "für den Freund (for the friend)"
            - "ohne einen Grund (without a reason)"
            - "durch die Stadt (through the city)"

      - case: Dativ
        number: 3
        label:
          en: "Dative (3rd case)"
          ko: "3격 (여격)"
        function:
          en: "Indirect object — to/for whom the action is done"
          ko: "간접 목적어 — 행동이 누구에게/위해 행해지는지"
        question:
          en: "Wem? (to whom?)"
          ko: "Wem? (누구에게?)"
        examples:
          - "Ich gebe dem Kind ein Geschenk. (I give the child a gift.)"
          - "Er hilft der Frau. (He helps the woman.)"
        prepositions:
          always_dative: [aus, bei, mit, nach, seit, von, zu, gegenüber, außer]
          examples:
            - "mit dem Auto (with the car)"
            - "nach der Schule (after school)"
            - "von der Arbeit (from work)"
            - "zu dem (zum) Arzt (to the doctor)"
        dative_verbs:
          en: "Some verbs take dative objects instead of accusative"
          ko: "일부 동사는 4격 대신 3격 목적어를 취함"
          common_verbs: [helfen, danken, gehören, gefallen, folgen, glauben, antworten, gratulieren, passen, schmecken]
          example: "Das Buch gehört dem Lehrer. (The book belongs to the teacher.)"

      - case: Genitiv
        number: 2
        label:
          en: "Genitive (2nd case)"
          ko: "2격 (소유격)"
        function:
          en: "Possession/ownership — whose"
          ko: "소유/귀속 — 누구의"
        question:
          en: "Wessen? (whose?)"
          ko: "Wessen? (누구의?)"
        examples:
          - "Das Buch des Lehrers. (The teacher's book.)"
          - "Die Farbe der Blume. (The color of the flower.)"
        prepositions:
          always_genitive: [wegen, während, trotz, statt, anstatt, innerhalb, außerhalb, oberhalb, unterhalb]
          examples:
            - "wegen des Wetters (because of the weather)"
            - "während der Ferien (during the holidays)"
            - "trotz des Regens (despite the rain)"
        notes:
          en: "In spoken German, Genitiv is increasingly replaced by Dativ with 'von': das Buch von dem Lehrer. Genitiv prepositions are also often used with Dativ in speech: wegen dem Wetter."
          ko: "구어 독일어에서 2격은 'von' + 3격으로 점점 대체됨: das Buch von dem Lehrer. 2격 전치사도 구어에서 3격과 자주 사용: wegen dem Wetter."

    two_way_prepositions:
      label:
        en: "Two-Way Prepositions (Wechselpräpositionen)"
        ko: "이중 전치사 (Wechselpräpositionen)"
      description:
        en: "These 9 prepositions take Akkusativ (motion/direction toward) or Dativ (location/stationary). Mnemonic: An, auf, hinter, in, neben, über, unter, vor, zwischen."
        ko: "이 9개 전치사는 4격(이동/방향) 또는 3격(위치/정지)을 취함. 암기법: An, auf, hinter, in, neben, über, unter, vor, zwischen."
      prepositions: [an, auf, hinter, in, neben, über, unter, vor, zwischen]
      rule:
        akkusativ:
          en: "Wohin? (Where to?) — movement toward a destination"
          ko: "Wohin? (어디로?) — 목적지를 향한 이동"
          example: "Ich stelle das Buch auf den Tisch. (I put the book onto the table.)"
        dativ:
          en: "Wo? (Where?) — location, no movement"
          ko: "Wo? (어디에?) — 위치, 이동 없음"
          example: "Das Buch liegt auf dem Tisch. (The book is on the table.)"
      contrast_pairs:
        - preposition: in
          akkusativ: "Ich gehe in die Schule. (I go into the school.)"
          dativ: "Ich bin in der Schule. (I am in the school.)"
        - preposition: an
          akkusativ: "Er hängt das Bild an die Wand. (He hangs the picture on the wall.)"
          dativ: "Das Bild hängt an der Wand. (The picture hangs on the wall.)"
        - preposition: auf
          akkusativ: "Sie legt das Buch auf den Tisch. (She places the book on the table.)"
          dativ: "Das Buch liegt auf dem Tisch. (The book is on the table.)"

  # ============================================================
  # 2. ARTICLE DECLENSION
  # ============================================================
  article_declension:
    id: article_declension
    label:
      en: "Article Declension (Artikeldeklination)"
      ko: "관사 어미변화 (Artikeldeklination)"
    category: articles
    cefr: A1
    description:
      en: "German has three genders (masculine, feminine, neuter) and articles change form based on case. Learning article declension is fundamental to German grammar."
      ko: "독일어에는 세 가지 성(남성, 여성, 중성)이 있으며 관사는 격에 따라 형태가 변한다. 관사 어미변화는 독일어 문법의 기본이다."
    definite_articles:
      label:
        en: "Definite Articles (der, die, das)"
        ko: "정관사 (der, die, das)"
      table:
        en: |
          Case        | Maskulin | Feminin | Neutrum | Plural
          ------------|----------|---------|---------|-------
          Nominativ   | der      | die     | das     | die
          Akkusativ   | den      | die     | das     | die
          Dativ       | dem      | der     | dem     | den (+n)
          Genitiv     | des (+s) | der     | des (+s)| der
        ko: |
          격          | 남성     | 여성    | 중성    | 복수
          ------------|----------|---------|---------|-------
          1격 (주격)  | der      | die     | das     | die
          4격 (목적격)| den      | die     | das     | die
          3격 (여격)  | dem      | der     | dem     | den (+n)
          2격 (소유격)| des (+s) | der     | des (+s)| der
    indefinite_articles:
      label:
        en: "Indefinite Articles (ein, eine, ein)"
        ko: "부정관사 (ein, eine, ein)"
      table:
        en: |
          Case        | Maskulin | Feminin | Neutrum | Plural (kein)
          ------------|----------|---------|---------|-------------
          Nominativ   | ein      | eine    | ein     | keine
          Akkusativ   | einen    | eine    | ein     | keine
          Dativ       | einem    | einer   | einem   | keinen (+n)
          Genitiv     | eines    | einer   | eines   | keiner
        ko: |
          격          | 남성     | 여성    | 중성    | 복수 (kein)
          ------------|----------|---------|---------|-------------
          1격 (주격)  | ein      | eine    | ein     | keine
          4격 (목적격)| einen    | eine    | ein     | keine
          3격 (여격)  | einem    | einer   | einem   | keinen (+n)
          2격 (소유격)| eines    | einer   | eines   | keiner
      note:
        en: "There is no plural indefinite article. Use 'keine' (negation) or no article. Possessive pronouns (mein, dein, sein, etc.) follow the same pattern as ein/kein."
        ko: "복수 부정관사는 없음. 'keine' (부정) 또는 관사 없이 사용. 소유 대명사 (mein, dein, sein 등)는 ein/kein과 같은 패턴을 따름."
    mnemonics:
      rese_nese:
        en: |
          Definite article endings follow the "RESE-NESE-MRMN-SRSR" pattern:
          Nom: R-E-S-E (deR, diE, daS, diE)
          Akk: N-E-S-E (deN, diE, daS, diE)
          Dat: M-R-M-N (deM, deR, deM, deN)
          Gen: S-R-S-R (deS, deR, deS, deR)
        ko: |
          정관사 어미는 "RESE-NESE-MRMN-SRSR" 패턴을 따름:
          1격: R-E-S-E (deR, diE, daS, diE)
          4격: N-E-S-E (deN, diE, daS, diE)
          3격: M-R-M-N (deM, deR, deM, deN)
          2격: S-R-S-R (deS, deR, deS, deR)
    gender_tips:
      masculine:
        en: "Typically masculine: days, months, seasons, weather (der Montag, der Januar, der Sommer, der Regen); male persons; cars (der BMW); -er, -ling, -ismus endings."
        ko: "일반적으로 남성: 요일, 월, 계절, 날씨 (der Montag, der Januar, der Sommer, der Regen); 남성 인물; 자동차 (der BMW); -er, -ling, -ismus 어미."
      feminine:
        en: "Typically feminine: -ung, -heit, -keit, -schaft, -tion, -ie, -ik, -tät, -ur endings; most flowers and trees."
        ko: "일반적으로 여성: -ung, -heit, -keit, -schaft, -tion, -ie, -ik, -tät, -ur 어미; 대부분의 꽃과 나무."
      neuter:
        en: "Typically neuter: -chen, -lein (diminutives), -ment, -um, -nis endings; infinitives used as nouns (das Essen); ge- prefix collectives (das Gebäude)."
        ko: "일반적으로 중성: -chen, -lein (축소사), -ment, -um, -nis 어미; 명사로 사용된 부정사 (das Essen); ge- 접두사 집합명사 (das Gebäude)."
    dativ_plural_rule:
      en: "In dative plural, the noun itself adds -n (if it doesn't already end in -n or -s): den Kindern, den Häusern, but: den Autos."
      ko: "3격 복수에서 명사 자체에 -n이 추가됨 (-n이나 -s로 이미 끝나지 않는 경우): den Kindern, den Häusern, 그러나: den Autos."
    genitiv_noun_rule:
      en: "In genitive, masculine and neuter nouns add -(e)s: des Mannes, des Kindes, des Buches. Feminine and plural nouns do not change."
      ko: "2격에서 남성과 중성 명사는 -(e)s가 추가됨: des Mannes, des Kindes, des Buches. 여성과 복수 명사는 변하지 않음."

  # ============================================================
  # 3. ADJECTIVE ENDINGS
  # ============================================================
  adjective_endings:
    id: adjective_endings
    label:
      en: "Adjective Endings (Adjektivdeklination)"
      ko: "형용사 어미변화 (Adjektivdeklination)"
    category: adjectives
    cefr: B1
    description:
      en: "German adjectives take different endings depending on whether they follow a definite article, indefinite article, or no article. The core principle: someone must show the gender/case signal — if the article doesn't, the adjective must."
      ko: "독일어 형용사는 정관사, 부정관사, 또는 관사 없이 올 때 다른 어미를 취함. 핵심 원리: 누군가가 성/격 신호를 보여야 함 — 관사가 하지 않으면 형용사가 해야 함."
    declension_types:
      - type: weak
        label:
          en: "Weak Declension (after definite articles: der, die, das, dieser, jeder, alle, welcher)"
          ko: "약변화 (정관사 뒤: der, die, das, dieser, jeder, alle, welcher)"
        principle:
          en: "The article already shows the case signal, so the adjective takes minimal endings: -e or -en."
          ko: "관사가 이미 격 신호를 보여주므로 형용사는 최소 어미를 취함: -e 또는 -en."
        table:
          en: |
            Case        | Maskulin  | Feminin   | Neutrum   | Plural
            ------------|-----------|-----------|-----------|----------
            Nominativ   | -e        | -e        | -e        | -en
            Akkusativ   | -en       | -e        | -e        | -en
            Dativ       | -en       | -en       | -en       | -en
            Genitiv     | -en       | -en       | -en       | -en
          ko: |
            격          | 남성      | 여성      | 중성      | 복수
            ------------|-----------|-----------|-----------|----------
            1격         | -e        | -e        | -e        | -en
            4격         | -en       | -e        | -e        | -en
            3격         | -en       | -en       | -en       | -en
            2격         | -en       | -en       | -en       | -en
        examples:
          - "der alte Mann (the old man — nom.)"
          - "die schöne Frau (the beautiful woman — nom.)"
          - "das kleine Kind (the small child — nom.)"
          - "den alten Mann (the old man — acc.)"
        mnemonic:
          en: "Weak = mostly -en, only Nominative (all genders) and Accusative (fem/neut) take -e."
          ko: "약변화 = 대부분 -en, 1격(모든 성)과 4격(여성/중성)만 -e."

      - type: mixed
        label:
          en: "Mixed Declension (after indefinite articles: ein, kein, mein, dein, sein, etc.)"
          ko: "혼합변화 (부정관사 뒤: ein, kein, mein, dein, sein 등)"
        principle:
          en: "Where the indefinite article shows NO ending (ein __, ein __), the adjective must show the strong signal. Otherwise, use weak endings (-en)."
          ko: "부정관사에 어미가 없는 곳(ein __, ein __)에서는 형용사가 강변화 신호를 보여야 함. 그 외에는 약변화 어미(-en) 사용."
        table:
          en: |
            Case        | Maskulin  | Feminin   | Neutrum   | Plural (kein)
            ------------|-----------|-----------|-----------|-------------
            Nominativ   | -er       | -e        | -es       | -en
            Akkusativ   | -en       | -e        | -es       | -en
            Dativ       | -en       | -en       | -en       | -en
            Genitiv     | -en       | -en       | -en       | -en
          ko: |
            격          | 남성      | 여성      | 중성      | 복수 (kein)
            ------------|-----------|-----------|-----------|-------------
            1격         | -er       | -e        | -es       | -en
            4격         | -en       | -e        | -es       | -en
            3격         | -en       | -en       | -en       | -en
            2격         | -en       | -en       | -en       | -en
        examples:
          - "ein alter Mann (an old man — nom.)"
          - "eine schöne Frau (a beautiful woman — nom.)"
          - "ein kleines Kind (a small child — nom.)"
          - "einen alten Mann (an old man — acc.)"
        key_difference:
          en: "Differs from weak declension only in Nominativ masc. (-er vs -e) and Nominativ/Akkusativ neut. (-es vs -e)."
          ko: "약변화와 1격 남성 (-er vs -e)과 1격/4격 중성 (-es vs -e)에서만 다름."

      - type: strong
        label:
          en: "Strong Declension (no article preceding the adjective)"
          ko: "강변화 (형용사 앞에 관사가 없을 때)"
        principle:
          en: "No article is present, so the adjective itself must carry the full gender/case signal (matching the definite article endings)."
          ko: "관사가 없으므로 형용사 자체가 전체 성/격 신호를 지님 (정관사 어미와 일치)."
        table:
          en: |
            Case        | Maskulin  | Feminin   | Neutrum   | Plural
            ------------|-----------|-----------|-----------|----------
            Nominativ   | -er       | -e        | -es       | -e
            Akkusativ   | -en       | -e        | -es       | -e
            Dativ       | -em       | -er       | -em       | -en
            Genitiv     | -en       | -er       | -en       | -er
          ko: |
            격          | 남성      | 여성      | 중성      | 복수
            ------------|-----------|-----------|-----------|----------
            1격         | -er       | -e        | -es       | -e
            4격         | -en       | -e        | -es       | -e
            3격         | -em       | -er       | -em       | -en
            2격         | -en       | -er       | -en       | -er
        examples:
          - "kalter Kaffee (cold coffee — nom. masc.)"
          - "frische Milch (fresh milk — nom. fem.)"
          - "gutes Brot (good bread — nom. neut.)"
          - "mit kaltem Wasser (with cold water — dat. neut.)"
        when_used:
          en: "After numbers (zwei kleine Kinder), viele, einige, mehrere, wenige, and when no determiner precedes the adjective."
          ko: "숫자 뒤 (zwei kleine Kinder), viele, einige, mehrere, wenige 뒤, 그리고 형용사 앞에 한정사가 없을 때."

    predicate_adjectives:
      en: "Adjectives used after sein, werden, bleiben do NOT take endings: Das Haus ist groß. Der Mann wird alt."
      ko: "sein, werden, bleiben 뒤에 사용되는 형용사는 어미변화 없음: Das Haus ist groß. Der Mann wird alt."

  # ============================================================
  # 4. SEPARABLE VERBS
  # ============================================================
  separable_verbs:
    id: separable_verbs
    label:
      en: "Separable and Inseparable Verbs (Trennbare und untrennbare Verben)"
      ko: "분리동사와 비분리동사 (Trennbare und untrennbare Verben)"
    category: verbs
    cefr: A2
    description:
      en: "German verbs with prefixes are either separable (prefix detaches in main clauses) or inseparable (prefix stays attached). This affects word order and past participle formation."
      ko: "접두사가 있는 독일어 동사는 분리동사(주절에서 접두사 분리) 또는 비분리동사(접두사 고정)이다. 이는 어순과 과거분사 형성에 영향을 미친다."
    separable_prefixes:
      label:
        en: "Separable Prefixes (always stressed)"
        ko: "분리 접두사 (항상 강세)"
      prefixes: [ab-, an-, auf-, aus-, bei-, ein-, fest-, her-, hin-, los-, mit-, nach-, vor-, weg-, weiter-, zu-, zurück-, zusammen-]
      rules:
        main_clause:
          en: "In main clauses (Präsens, Präteritum, Imperativ), the prefix separates and goes to the end of the clause."
          ko: "주절 (현재, 과거, 명령형)에서 접두사가 분리되어 절의 끝으로 간다."
          examples:
            - "Ich stehe um 7 Uhr auf. (I get up at 7.)"
            - "Mach bitte die Tür zu! (Please close the door!)"
            - "Er rief seine Mutter an. (He called his mother.)"
        subordinate_clause:
          en: "In subordinate clauses, the verb goes to the end and the prefix does NOT separate."
          ko: "종속절에서는 동사가 끝으로 가며 접두사는 분리되지 않는다."
          examples:
            - "Ich weiß, dass er um 7 Uhr aufsteht."
            - "Weil er seine Mutter anrief, ..."
        partizip_ii:
          en: "Past participle: prefix + ge- + stem + -t/-en: aufgemacht, angefangen."
          ko: "과거분사: 접두사 + ge- + 어간 + -t/-en: aufgemacht, angefangen."
        infinitive_with_zu:
          en: "'zu' is inserted between prefix and verb: aufzustehen, anzurufen."
          ko: "'zu'가 접두사와 동사 사이에 삽입: aufzustehen, anzurufen."
      common_verbs:
        - {verb: aufstehen, meaning: {en: to get up, ko: 일어나다}, example: "Ich stehe früh auf."}
        - {verb: anfangen, meaning: {en: to begin, ko: 시작하다}, example: "Der Film fängt um 8 an."}
        - {verb: anrufen, meaning: {en: to call (phone), ko: 전화하다}, example: "Ruf mich an!"}
        - {verb: einkaufen, meaning: {en: to shop, ko: 쇼핑하다}, example: "Wir kaufen im Supermarkt ein."}
        - {verb: mitkommen, meaning: {en: to come along, ko: 함께 가다}, example: "Kommst du mit?"}
        - {verb: zumachen, meaning: {en: to close, ko: 닫다}, example: "Mach das Fenster zu!"}
        - {verb: ausgehen, meaning: {en: to go out, ko: 외출하다}, example: "Wir gehen heute Abend aus."}
        - {verb: zurückkommen, meaning: {en: to come back, ko: 돌아오다}, example: "Wann kommst du zurück?"}

    inseparable_prefixes:
      label:
        en: "Inseparable Prefixes (never stressed)"
        ko: "비분리 접두사 (강세 없음)"
      prefixes: [be-, emp-, ent-, er-, ge-, miss-, ver-, zer-]
      rules:
        en: "The prefix never separates. No ge- in Partizip II: verstehen → verstanden, beginnen → begonnen, erzählen → erzählt."
        ko: "접두사가 절대 분리되지 않음. 과거분사에서 ge- 없음: verstehen → verstanden, beginnen → begonnen, erzählen → erzählt."
      common_verbs:
        - {verb: verstehen, meaning: {en: to understand, ko: 이해하다}}
        - {verb: beginnen, meaning: {en: to begin, ko: 시작하다}}
        - {verb: erzählen, meaning: {en: to tell/narrate, ko: 이야기하다}}
        - {verb: bekommen, meaning: {en: to receive, ko: 받다}}
        - {verb: vergessen, meaning: {en: to forget, ko: 잊다}}
        - {verb: empfehlen, meaning: {en: to recommend, ko: 추천하다}}
        - {verb: entschuldigen, meaning: {en: to excuse, ko: 용서하다}}
        - {verb: zerstören, meaning: {en: to destroy, ko: 파괴하다}}

    dual_prefix_verbs:
      label:
        en: "Prefixes that can be separable OR inseparable"
        ko: "분리 또는 비분리가 가능한 접두사"
      prefixes: [durch-, über-, um-, unter-, wieder-]
      rule:
        en: "When literal/physical meaning: separable (stressed prefix). When figurative/abstract meaning: inseparable (stressed stem)."
        ko: "문자적/물리적 의미일 때: 분리 (접두사에 강세). 비유적/추상적 의미일 때: 비분리 (어간에 강세)."
      examples:
        - prefix: "über-"
          separable:
            example: "Das Wasser läuft über. (The water overflows. — literal)"
            meaning: {en: to overflow, ko: 넘치다}
          inseparable:
            example: "Er übersetzt den Text. (He translates the text. — figurative)"
            meaning: {en: to translate, ko: 번역하다}
        - prefix: "um-"
          separable:
            example: "Er zieht nächste Woche um. (He moves next week. — literal)"
            meaning: {en: to move (residence), ko: 이사하다}
          inseparable:
            example: "Die Mauer umgibt die Stadt. (The wall surrounds the city. — figurative)"
            meaning: {en: to surround, ko: 둘러싸다}

  # ============================================================
  # 5. WORD ORDER
  # ============================================================
  word_order:
    id: word_order
    label:
      en: "Word Order (Wortstellung)"
      ko: "어순 (Wortstellung)"
    category: syntax
    cefr: A2
    description:
      en: "German word order follows strict rules. The most important is the V2 rule: the conjugated verb is always in the second position in main clauses."
      ko: "독일어 어순은 엄격한 규칙을 따른다. 가장 중요한 것은 V2 규칙: 활용된 동사가 주절에서 항상 두 번째 위치에 온다."
    main_clause_rules:
      v2_rule:
        label:
          en: "V2 Rule (Verb Second)"
          ko: "V2 규칙 (동사 두 번째)"
        description:
          en: "In declarative main clauses, the conjugated verb MUST be in the second position. The first position can be filled by any element (subject, time expression, object, adverb)."
          ko: "평서 주절에서 활용된 동사는 반드시 두 번째 위치에 와야 한다. 첫 번째 위치는 아무 요소나 올 수 있다 (주어, 시간 표현, 목적어, 부사)."
        examples:
          - pattern: "Subject + Verb + ..."
            example: "Ich lese ein Buch."
            translation: {en: "I read a book.", ko: "나는 책을 읽는다."}
          - pattern: "Time + Verb + Subject + ..."
            example: "Morgen fahre ich nach Berlin."
            translation: {en: "Tomorrow I drive to Berlin.", ko: "내일 나는 베를린으로 간다."}
          - pattern: "Object + Verb + Subject + ..."
            example: "Das Buch lese ich gern."
            translation: {en: "I like to read the book.", ko: "그 책을 나는 즐겨 읽는다."}
      inversion:
        en: "When a non-subject element occupies position 1, the subject moves behind the verb. This is called inversion."
        ko: "주어가 아닌 요소가 1번 위치를 차지하면 주어가 동사 뒤로 이동한다. 이를 도치라 한다."

    sentence_bracket:
      label:
        en: "Sentence Bracket (Satzklammer)"
        ko: "문장 괄호 (Satzklammer)"
      description:
        en: "In compound verb forms, the conjugated verb stays in position 2, and the non-finite part (infinitive, participle, prefix) goes to the end, creating a 'bracket' around the middle field."
        ko: "복합 동사 형태에서 활용된 동사는 2번 위치에 머물고, 비정형 부분(부정사, 분사, 접두사)이 끝으로 가서 중간 영역 주위에 '괄호'를 형성한다."
      examples:
        - type: "Perfekt"
          example: "Ich [habe] gestern ein Buch [gelesen]."
        - type: "Modal"
          example: "Er [kann] gut Deutsch [sprechen]."
        - type: "Future"
          example: "Wir [werden] morgen nach Hamburg [fahren]."
        - type: "Separable"
          example: "Sie [steht] jeden Tag um 6 Uhr [auf]."

    subordinate_clause:
      label:
        en: "Subordinate Clause (Nebensatz)"
        ko: "종속절 (Nebensatz)"
      rule:
        en: "In subordinate clauses introduced by a conjunction (dass, weil, wenn, ob, als, etc.), the conjugated verb goes to the FINAL position."
        ko: "접속사(dass, weil, wenn, ob, als 등)로 시작하는 종속절에서는 활용된 동사가 마지막 위치로 간다."
      common_conjunctions: [dass, weil, wenn, ob, als, obwohl, während, bevor, nachdem, damit, seit, bis]
      examples:
        - "Ich weiß, dass er in Berlin wohnt."
        - "Weil es regnet, bleibe ich zu Hause."
        - "Er fragt, ob du morgen kommst."
      verb_order_in_compound:
        en: "In subordinate clauses with compound verbs, the conjugated verb comes last (after the infinitive/participle): ..., weil er das Buch gelesen hat."
        ko: "복합 동사가 있는 종속절에서 활용된 동사는 마지막에 옴 (부정사/분사 뒤): ..., weil er das Buch gelesen hat."

    tekamolo:
      label:
        en: "TeKaMoLo Rule"
        ko: "TeKaMoLo 규칙"
      description:
        en: "When multiple adverbials appear in the middle field, the default order is: Temporal (when) → Kausal (why) → Modal (how) → Lokal (where)."
        ko: "여러 부사(구)가 중간 영역에 나타날 때 기본 순서: Temporal (언제) → Kausal (왜) → Modal (어떻게) → Lokal (어디)."
      order:
        - {position: Te, type: {en: Temporal, ko: 시간}, question: "Wann? (When?)"}
        - {position: Ka, type: {en: Kausal, ko: 이유}, question: "Warum? (Why?)"}
        - {position: Mo, type: {en: Modal, ko: 방법}, question: "Wie? (How?)"}
        - {position: Lo, type: {en: Lokal, ko: 장소}, question: "Wo? / Wohin? (Where?)"}
      example:
        sentence: "Ich fahre morgen wegen der Arbeit mit dem Zug nach München."
        breakdown:
          Te: "morgen (tomorrow)"
          Ka: "wegen der Arbeit (because of work)"
          Mo: "mit dem Zug (by train)"
          Lo: "nach München (to Munich)"

    question_word_order:
      yes_no_questions:
        en: "Verb in first position: Kommst du morgen?"
        ko: "동사가 첫 번째 위치: Kommst du morgen?"
      w_questions:
        en: "W-word in first position, verb in second: Wann kommst du?"
        ko: "W-단어가 첫 번째, 동사가 두 번째: Wann kommst du?"

  # ============================================================
  # 6. HABEN vs SEIN (Perfekt Auxiliary)
  # ============================================================
  haben_vs_sein:
    id: haben_vs_sein
    label:
      en: "HABEN vs SEIN (Perfekt Auxiliary)"
      ko: "HABEN vs SEIN (완료형 조동사)"
    category: verbs
    cefr: A2
    description:
      en: "In the Perfekt tense, German uses either 'haben' or 'sein' as the auxiliary verb before the past participle. The choice depends on the type of main verb."
      ko: "완료형(Perfekt)에서 독일어는 과거분사 앞에 조동사로 'haben' 또는 'sein'을 사용한다. 선택은 본동사의 유형에 따라 달라진다."
    haben_rule:
      label:
        en: "Use HABEN with:"
        ko: "HABEN 사용:"
      categories:
        - category:
            en: "All transitive verbs (verbs with a direct object)"
            ko: "모든 타동사 (직접 목적어가 있는 동사)"
          examples:
            - "Ich habe das Buch gelesen. (I read the book.)"
            - "Er hat einen Kuchen gebacken. (He baked a cake.)"
        - category:
            en: "Most intransitive verbs (that don't express motion or change of state)"
            ko: "대부분의 자동사 (이동이나 상태 변화를 표현하지 않는)"
          examples:
            - "Ich habe geschlafen. (I slept.)"
            - "Er hat gearbeitet. (He worked.)"
            - "Sie hat gelacht. (She laughed.)"
        - category:
            en: "All reflexive verbs"
            ko: "모든 재귀동사"
          examples:
            - "Ich habe mich gewaschen. (I washed myself.)"
            - "Er hat sich gefreut. (He was happy.)"
        - category:
            en: "Modal verbs (when used with past participle)"
            ko: "화법조동사 (과거분사와 함께 사용할 때)"
          examples:
            - "Ich habe das gekonnt. (I was able to do that.)"
        - category:
            en: "Impersonal weather verbs"
            ko: "비인칭 날씨 동사"
          examples:
            - "Es hat geregnet. (It rained.)"
            - "Es hat geschneit. (It snowed.)"

    sein_rule:
      label:
        en: "Use SEIN with:"
        ko: "SEIN 사용:"
      categories:
        - category:
            en: "Intransitive verbs of motion (movement from A to B)"
            ko: "이동의 자동사 (A에서 B로의 이동)"
          verbs: [gehen, kommen, fahren, fliegen, laufen, reisen, fallen, steigen, rennen, schwimmen, reiten, wandern]
          examples:
            - "Ich bin nach Hause gegangen. (I went home.)"
            - "Wir sind nach Berlin gefahren. (We drove to Berlin.)"
            - "Er ist ins Wasser gefallen. (He fell into the water.)"
        - category:
            en: "Intransitive verbs of change of state"
            ko: "상태 변화의 자동사"
          verbs: [werden, sterben, wachsen, aufwachen, einschlafen, entstehen, verschwinden, explodieren]
          examples:
            - "Er ist Lehrer geworden. (He became a teacher.)"
            - "Die Pflanze ist gewachsen. (The plant grew.)"
            - "Sie ist eingeschlafen. (She fell asleep.)"
        - category:
            en: "The verbs 'sein' and 'bleiben'"
            ko: "'sein'과 'bleiben' 동사"
          examples:
            - "Ich bin dort gewesen. (I was there.)"
            - "Er ist zu Hause geblieben. (He stayed at home.)"
        - category:
            en: "The verb 'passieren' (to happen)"
            ko: "'passieren' (일어나다) 동사"
          examples:
            - "Was ist passiert? (What happened?)"
        - category:
            en: "The verb 'begegnen' (to encounter)"
            ko: "'begegnen' (만나다) 동사"
          examples:
            - "Ich bin ihm begegnet. (I encountered him.)"

    tricky_cases:
      - verb: fahren
        haben: "Ich habe das Auto gefahren. (I drove the car. — transitive)"
        sein: "Ich bin nach Berlin gefahren. (I drove to Berlin. — intransitive motion)"
        rule:
          en: "When used transitively (with a direct object), use haben. When intransitive (movement), use sein."
          ko: "타동사로 사용할 때(직접 목적어 있음) haben. 자동사(이동)로 사용할 때 sein."
      - verb: schwimmen
        haben: "Ich habe eine Stunde geschwommen. (I swam for an hour. — activity)"
        sein: "Ich bin ans Ufer geschwommen. (I swam to the shore. — motion A→B)"
        rule:
          en: "Activity without destination: haben. Movement to a destination: sein."
          ko: "목적지 없는 활동: haben. 목적지로의 이동: sein."

    mnemonic:
      en: >
        Think of SEIN verbs as "Mrs. Vandertramp" for German:
        Movement (gehen, kommen, fahren, fliegen...)
        Rise/fall (steigen, fallen, wachsen...)
        State change (werden, sterben, einschlafen, aufwachen...)
        Plus: sein, bleiben, passieren, begegnen
      ko: >
        SEIN 동사를 기억하는 방법:
        이동 (gehen, kommen, fahren, fliegen...)
        상승/하강 (steigen, fallen, wachsen...)
        상태 변화 (werden, sterben, einschlafen, aufwachen...)
        추가: sein, bleiben, passieren, begegnen

  # ============================================================
  # 7. KONJUNKTIV II
  # ============================================================
  konjunktiv_ii:
    id: konjunktiv_ii
    label:
      en: "Konjunktiv II (Subjunctive II)"
      ko: "접속법 II (Konjunktiv II)"
    category: mood
    cefr: B1
    description:
      en: "Konjunktiv II expresses unreality: hypothetical situations, wishes, polite requests, and contrary-to-fact conditions. It is one of the most important intermediate grammar topics."
      ko: "접속법 II는 비현실을 표현한다: 가정적 상황, 소망, 정중한 요청, 사실에 반하는 조건. 중급 문법에서 가장 중요한 주제 중 하나이다."
    formation:
      synthetic:
        label:
          en: "Synthetic Form (from Präteritum stem)"
          ko: "종합 형태 (과거형 어간에서)"
        rule:
          en: "Take the Präteritum stem, add umlaut to a/o/u if possible, add subjunctive endings: -e, -est, -e, -en, -et, -en."
          ko: "과거형 어간을 취하고, 가능하면 a/o/u에 움라우트를 추가하고, 접속법 어미 추가: -e, -est, -e, -en, -et, -en."
        common_forms:
          sein: {präteritum: war, konjunktiv_ii: wäre}
          haben: {präteritum: hatte, konjunktiv_ii: hätte}
          werden: {präteritum: wurde, konjunktiv_ii: würde}
          können: {präteritum: konnte, konjunktiv_ii: könnte}
          müssen: {präteritum: musste, konjunktiv_ii: müsste}
          dürfen: {präteritum: durfte, konjunktiv_ii: dürfte}
          sollen: {präteritum: sollte, konjunktiv_ii: sollte}
          wollen: {präteritum: wollte, konjunktiv_ii: wollte}
          gehen: {präteritum: ging, konjunktiv_ii: ginge}
          kommen: {präteritum: kam, konjunktiv_ii: käme}
          geben: {präteritum: gab, konjunktiv_ii: gäbe}
          wissen: {präteritum: wusste, konjunktiv_ii: wüsste}
          brauchen: {präteritum: brauchte, konjunktiv_ii: bräuchte}
        note:
          en: "sollen and wollen have NO umlaut in Konjunktiv II (identical to Präteritum). Context determines the meaning."
          ko: "sollen과 wollen은 접속법 II에서 움라우트가 없음 (과거형과 동일). 문맥으로 의미를 구별."
      periphrastic:
        label:
          en: "Periphrastic Form (würde + Infinitiv)"
          ko: "우회 형태 (würde + 부정사)"
        rule:
          en: "würde (conjugated) + Infinitiv. Used for most regular/weak verbs and many strong verbs where the synthetic form sounds archaic."
          ko: "würde (활용) + 부정사. 대부분의 약변화 동사와 종합 형태가 고어처럼 들리는 많은 강변화 동사에 사용."
        würde_conjugation:
          ich: würde
          du: würdest
          er: würde
          wir: würden
          ihr: würdet
          sie: würden
        examples:
          - "Ich würde gern nach Japan reisen. (I would like to travel to Japan.)"
          - "Was würdest du an meiner Stelle machen? (What would you do in my place?)"
        when_to_use:
          en: "Use würde + Infinitiv for all verbs EXCEPT: sein (wäre), haben (hätte), werden (würde), modals (könnte, müsste, etc.), and a handful of common strong verbs (ginge, käme, gäbe, wüsste, ließe, bräuchte)."
          ko: "다음을 제외한 모든 동사에 würde + 부정사 사용: sein (wäre), haben (hätte), werden (würde), 화법조동사 (könnte, müsste 등), 일부 흔한 강변화 동사 (ginge, käme, gäbe, wüsste, ließe, bräuchte)."

    usage_categories:
      - category:
          en: "Unreal Conditions (wenn-Sätze)"
          ko: "비현실 조건 (wenn절)"
        pattern: "Wenn + ... + Konj. II, ... + Konj. II"
        types:
          - type:
              en: "Present unreal (Konjunktiv II Präsens)"
              ko: "현재 비현실 (접속법 II 현재)"
            example: "Wenn ich reich wäre, würde ich ein Haus kaufen."
            translation: {en: "If I were rich, I would buy a house.", ko: "내가 부자라면 집을 살 텐데."}
          - type:
              en: "Past unreal (Konjunktiv II Perfekt)"
              ko: "과거 비현실 (접속법 II 완료)"
            example: "Wenn ich das gewusst hätte, wäre ich gekommen."
            translation: {en: "If I had known that, I would have come.", ko: "그것을 알았더라면 왔을 텐데."}
        note:
          en: "'Wenn' can be omitted with inversion: Wäre ich reich, würde ich... = Wenn ich reich wäre, würde ich..."
          ko: "'Wenn'은 도치로 생략 가능: Wäre ich reich, würde ich... = Wenn ich reich wäre, würde ich..."

      - category:
          en: "Wishes"
          ko: "소망"
        patterns:
          - "Ich wünschte, ich hätte mehr Zeit. (I wish I had more time.)"
          - "Wenn ich doch fliegen könnte! (If only I could fly!)"
          - "Hätte ich bloß mehr gelernt! (If only I had studied more!)"
        keywords: [ich wünschte, wenn ... doch, wenn ... nur, wenn ... bloß]

      - category:
          en: "Polite Requests"
          ko: "정중한 요청"
        examples:
          - "Könnten Sie mir bitte helfen? (Could you please help me?)"
          - "Hätten Sie einen Moment Zeit? (Would you have a moment?)"
          - "Ich hätte gern einen Kaffee. (I would like a coffee.)"
          - "Wäre es möglich, einen Termin zu bekommen? (Would it be possible to get an appointment?)"
          - "Dürfte ich Sie etwas fragen? (Might I ask you something?)"
        note:
          en: "Konjunktiv II is the standard way to make polite requests in German, much more common than English 'could/would you'."
          ko: "접속법 II는 독일어에서 정중한 요청을 하는 표준 방법으로, 영어의 'could/would you'보다 훨씬 더 일상적으로 사용."

      - category:
          en: "Suggestions and Advice"
          ko: "제안과 조언"
        examples:
          - "An deiner Stelle würde ich zum Arzt gehen. (In your place, I would go to the doctor.)"
          - "Du solltest mehr schlafen. (You should sleep more.)"
          - "Es wäre besser, wenn du früher anfangen würdest. (It would be better if you started earlier.)"

      - category:
          en: "als ob / als wenn (as if)"
          ko: "als ob / als wenn (~인 것처럼)"
        rule:
          en: "'als ob' and 'als wenn' always require Konjunktiv II. 'als' alone also triggers Konjunktiv II with verb inversion."
          ko: "'als ob'와 'als wenn'은 항상 접속법 II를 요구. 'als' 단독으로도 동사 도치와 함께 접속법 II를 유발."
        examples:
          - "Er tut so, als ob er krank wäre. (He acts as if he were sick.)"
          - "Sie spricht, als wäre sie eine Expertin. (She speaks as if she were an expert.)"

    common_fixed_expressions:
      - expression: "Das wäre schön."
        meaning: {en: "That would be nice.", ko: "그러면 좋겠다."}
      - expression: "Das könnte sein."
        meaning: {en: "That could be.", ko: "그럴 수도 있겠다."}
      - expression: "Ich hätte gern..."
        meaning: {en: "I would like...", ko: "~을 주세요 / ~하고 싶습니다."}
      - expression: "Es wäre möglich, dass..."
        meaning: {en: "It would be possible that...", ko: "~할 수 있을 것이다."}
      - expression: "An deiner/Ihrer Stelle..."
        meaning: {en: "In your place...", ko: "네/당신 입장이라면..."}
      - expression: "Wenn ich du wäre..."
        meaning: {en: "If I were you...", ko: "내가 너라면..."}
