    ko: 3.1 남성 명사 (der)
  type: vocabulary
  words:
  - german: der Mann
    translation:
      en: the man
      ko: 남자
    gender: m
    plural: die Männer
  - german: der Vater
    translation:
      en: the father
      ko: 아버지
    gender: m
    plural: die Väter
  - german: der Bruder
