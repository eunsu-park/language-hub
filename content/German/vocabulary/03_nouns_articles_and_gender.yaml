      ko: 안경
    gender: f
    plural: die Brillen
    notes:
      en: Always used in singular in German (unlike English "glasses")
      ko: 독일어에서는 항상 단수로 사용 (영어 "glasses"와 다름)
  - german: die Kirche
    translation:
      en: the church
      ko: 교회
    gender: f
    plural: die Kirchen

- id: 33_neuter_nouns
  label:
    en: 3.3 Neuter Nouns (das)
    ko: 3.3 중성 명사 (das)
  type: vocabulary
  words:
  - german: das Kind
    translation:
      en: the child
      ko: 아이
    gender: n
    plural: die Kinder
  - german: das Mädchen
    translation:
      en: the girl
      ko: 소녀
    gender: n
    plural: die Mädchen
    notes:
      en: -chen diminutive makes it neuter despite natural gender
      ko: -chen 축소접미사로 인해 자연 성별과 무관하게 중성
  - german: das Buch
    translation:
      en: the book
      ko: 책
    gender: n
    plural: die Bücher
  - german: das Haus
    translation:
      en: the house
      ko: 집
    gender: n
    plural: die Häuser
  - german: das Auto
    translation:
      en: the car
      ko: 자동차
    gender: n
    plural: die Autos
  - german: das Zimmer
    translation:
      en: the room
      ko: 방
    gender: n
    plural: die Zimmer
  - german: das Fenster
    translation:
      en: the window
      ko: 창문
    gender: n
    plural: die Fenster
  - german: das Bett
    translation:
      en: the bed
      ko: 침대
    gender: n
    plural: die Betten
  - german: das Wasser
    translation:
      en: the water
      ko: 물
    gender: n
    plural: die Wasser
  - german: das Bier
    translation:
      en: the beer
      ko: 맥주
    gender: n
    plural: die Biere
    notes:
      en: Exception — most alcoholic drinks are masculine, but das Bier is neuter
      ko: 예외 — 대부분의 주류는 남성이지만 das Bier는 중성
  - german: das Essen
    translation:
      en: the food / meal
      ko: 음식 / 식사
    gender: n
    plural: die Essen
    notes:
      en: Nominalized infinitive — always neuter
      ko: 명사화된 부정사 — 항상 중성
  - german: das Land
    translation:
      en: the country / land
      ko: 나라 / 땅
    gender: n
    plural: die Länder
  - german: das Tier
    translation:
      en: the animal
      ko: 동물
    gender: n
    plural: die Tiere
  - german: das Bild
    translation:
      en: the picture
      ko: 그림 / 사진
    gender: n
    plural: die Bilder
  - german: das Spiel
    translation:
      en: the game
      ko: 게임 / 놀이
    gender: n
    plural: die Spiele
  - german: das Telefon
    translation:
      en: the telephone
      ko: 전화기
    gender: n
    plural: die Telefone
  - german: das Radio
    translation:
      en: the radio
      ko: 라디오
    gender: n
    plural: die Radios
  - german: das Geschenk
    translation:
      en: the gift / present
      ko: 선물
    gender: n
    plural: die Geschenke
    notes:
      en: Ge- prefix words are often neuter
      ko: Ge- 접두사 단어는 종종 중성
  - german: das Brötchen
    translation:
      en: the bread roll
      ko: 빵 롤
    gender: n
    plural: die Brötchen
    notes:
      en: -chen diminutive of Brot; always neuter
      ko: Brot의 -chen 축소형; 항상 중성
  - german: das Problem
    translation:
      en: the problem
      ko: 문제
    gender: n
    plural: die Probleme
  - german: das Handy
    translation:
      en: the cell phone / mobile phone
      ko: 휴대폰
    gender: n
    plural: die Handys
    notes:
      en: False friend — English "handy" means convenient; German Handy means mobile phone
      ko: 거짓 친구 — 영어 "handy"는 편리한; 독일어 Handy는 휴대폰
  - german: das Geld
    translation:
      en: the money
      ko: 돈
    gender: n
    plural: die Gelder

- id: 34_compound_nouns
  label:
    en: 3.4 Compound Nouns (Komposita)
    ko: 3.4 복합 명사 (Komposita)
  type: vocabulary
  words:
  - german: die Haustür
    translation:
      en: the front door
      ko: 현관문
    gender: f
    plural: die Haustüren
    notes:
      en: das Haus + die Tür — last word determines gender
      ko: das Haus + die Tür — 마지막 단어가 성별 결정
  - german: der Handschuh
    translation:
      en: the glove
      ko: 장갑
    gender: m
    plural: die Handschuhe
    notes:
      en: "die Hand + der Schuh; lit. \"hand shoe\""
      ko: "die Hand + der Schuh; 직역 \"손 신발\""
  - german: das Kinderzimmer
    translation:
      en: the children's room
      ko: 아이 방
    gender: n
    plural: die Kinderzimmer
    notes:
      en: das Kind + das Zimmer — connecting element -er-
      ko: das Kind + das Zimmer — 연결요소 -er-
  - german: der Fußball
    translation:
      en: football / soccer
      ko: 축구
    gender: m
    plural: die Fußbälle
    notes:
      en: der Fuß + der Ball
      ko: der Fuß + der Ball
  - german: der Geburtstag
    translation:
      en: the birthday
      ko: 생일
    gender: m
    plural: die Geburtstage
    notes:
      en: die Geburt + der Tag — connecting element -s-
      ko: die Geburt + der Tag — 연결요소 -s-
  - german: das Krankenhaus
    translation:
      en: the hospital
      ko: 병원
    gender: n
    plural: die Krankenhäuser
    notes:
      en: "krank (sick) + das Haus; lit. \"sick house\""
      ko: "krank (아픈) + das Haus; 직역 \"아픈 사람의 집\""
  - german: der Kühlschrank
    translation:
      en: the refrigerator
      ko: 냉장고
    gender: m
    plural: die Kühlschränke
    notes:
      en: "kühl (cool) + der Schrank (cabinet); lit. \"cool cabinet\""
      ko: "kühl (시원한) + der Schrank (장); 직역 \"시원한 장\""
  - german: das Wörterbuch
    translation:
      en: the dictionary
      ko: 사전
    gender: n
    plural: die Wörterbücher
    notes:
      en: "das Wort + das Buch; lit. \"word book\""
      ko: "das Wort + das Buch; 직역 \"단어 책\""
  - german: die Zahnbürste
    translation:
      en: the toothbrush
      ko: 칫솔
    gender: f
    plural: die Zahnbürsten
    notes:
      en: der Zahn (tooth) + die Bürste (brush)
      ko: der Zahn (치아) + die Bürste (솔)
  - german: der Regenmantel
    translation:
      en: the raincoat
      ko: 우비
    gender: m
    plural: die Regenmäntel
    notes:
      en: der Regen (rain) + der Mantel (coat)
      ko: der Regen (비) + der Mantel (코트)
  - german: das Schlafzimmer
    translation:
      en: the bedroom
      ko: 침실
    gender: n
    plural: die Schlafzimmer
    notes:
      en: schlafen (to sleep) + das Zimmer (room)
      ko: schlafen (자다) + das Zimmer (방)
  - german: die Sonnenbrille
    translation:
      en: the sunglasses
      ko: 선글라스
    gender: f
    plural: die Sonnenbrillen
    notes:
      en: die Sonne (sun) + die Brille (glasses)
      ko: die Sonne (태양) + die Brille (안경)
  - german: der Briefkasten
    translation:
      en: the mailbox
      ko: 우편함
    gender: m
    plural: die Briefkästen
    notes:
      en: der Brief (letter) + der Kasten (box)
      ko: der Brief (편지) + der Kasten (상자)
  - german: das Badezimmer
    translation:
      en: the bathroom
      ko: 욕실
    gender: n
    plural: die Badezimmer
    notes:
      en: das Bad (bath) + das Zimmer (room)
      ko: das Bad (목욕) + das Zimmer (방)
  - german: die Waschmaschine
    translation:
      en: the washing machine
      ko: 세탁기
    gender: f
    plural: die Waschmaschinen
    notes:
      en: waschen (to wash) + die Maschine (machine)
      ko: waschen (씻다) + die Maschine (기계)
  - german: der Staubsauger
    translation:
      en: the vacuum cleaner
      ko: 진공청소기
    gender: m
    plural: die Staubsauger
    notes:
      en: "der Staub (dust) + saugen (to suck); lit. \"dust sucker\""
      ko: "der Staub (먼지) + saugen (빨다); 직역 \"먼지 빨개\""
