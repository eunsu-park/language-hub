      ko: 친구 (남성)
    gender: m
    plural: die Freunde
  - german: der Tag
    translation:
      en: the day
      ko: 날 / 하루
    gender: m
    plural: die Tage
    notes:
      en: Days of the week are always masculine
      ko: 요일은 항상 남성 명사
  - german: der Morgen
    translation:
      en: the morning
      ko: 아침
    gender: m
    plural: die Morgen
  - german: der Abend
    translation:
      en: the evening
      ko: 저녁
    gender: m
    plural: die Abende
  - german: der Tisch
    translation:
      en: the table
      ko: 탁자
    gender: m
    plural: die Tische
  - german: der Stuhl
    translation:
      en: the chair
      ko: 의자
    gender: m
    plural: die Stühle
  - german: der Baum
    translation:
      en: the tree
      ko: 나무
    gender: m
    plural: die Bäume
  - german: der Hund
    translation:
      en: the dog
      ko: 개
    gender: m
    plural: die Hunde
  - german: der Arzt
    translation:
      en: the doctor (male)
      ko: 의사 (남성)
    gender: m
    plural: die Ärzte
  - german: der Lehrer
    translation:
      en: the teacher (male)
      ko: 교사 (남성)
    gender: m
    plural: die Lehrer
    notes:
      en: -er agent nouns are typically masculine
      ko: -er 행위자 명사는 보통 남성
  - german: der Name
    translation:
      en: the name
      ko: 이름
    gender: m
    plural: die Namen
    notes:
      en: Exception to -e ending being feminine
      ko: -e 어미가 여성이라는 규칙의 예외
  - german: der Schlüssel
    translation:
      en: the key
      ko: 열쇠
    gender: m
    plural: die Schlüssel
  - german: der Schuh
    translation:
      en: the shoe
      ko: 신발
    gender: m
    plural: die Schuhe
  - german: der Garten
    translation:
      en: the garden
      ko: 정원
    gender: m
    plural: die Gärten
  - german: der Laden
    translation:
      en: the shop / store
      ko: 가게
    gender: m
    plural: die Läden
  - german: der Beruf
    translation:
      en: the profession / occupation
      ko: 직업
    gender: m
    plural: die Berufe
  - german: der Kugelschreiber
    translation:
      en: the ballpoint pen
      ko: 볼펜
    gender: m
    plural: die Kugelschreiber
    notes:
      en: Often shortened to "Kuli" in everyday speech
      ko: 일상에서 "Kuli"로 줄여 말함

- id: 32_feminine_nouns
