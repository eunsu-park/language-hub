- id: 55_negation
  label:
    en: 5.5 Negation
    ko: 5.5 부정
  type: vocabulary
  words:
  - german: nicht
    translation:
      en: not
      ko: ~이 아닌 / ~하지 않다
    gender: null
    plural: null
    notes:
      en: Placed after the verb to negate; Ich verstehe nicht.
      ko: 동사 뒤에 위치하여 부정; Ich verstehe nicht.
  - german: kein / keine
    translation:
      en: no / not a / not any
      ko: ~이 아닌 / 없는
    gender: null
    plural: null
    notes:
      en: "Used instead of nicht + ein; Ich habe kein Auto."
      ko: "nicht + ein 대신 사용; 나는 차가 없다."
  - german: nichts
    translation:
      en: nothing
      ko: 아무것도 (~아닌)
    gender: null
    plural: null
  - german: niemand
    translation:
      en: nobody / no one
      ko: 아무도 (~아닌)
    gender: null
    plural: null
  - german: nie / niemals
    translation:
      en: never
      ko: 절대 (~않다)
    gender: null
    plural: null
  - german: noch nicht
    translation:
      en: not yet
      ko: 아직 (~않다)
    gender: null
    plural: null
  - german: nicht mehr
    translation:
      en: no longer / not anymore
      ko: 더 이상 (~않다)
    gender: null
    plural: null

- id: 56_basic_connectors
  label:
    en: 5.6 Basic Connectors
    ko: 5.6 기본 접속사
  type: vocabulary
  words:
  - german: und
    translation:
      en: and
      ko: 그리고
    gender: null
    plural: null
  - german: oder
    translation:
      en: or
      ko: 또는
    gender: null
    plural: null
  - german: aber
    translation:
      en: but
      ko: 하지만
    gender: null
    plural: null
  - german: denn
    translation:
      en: because / for
      ko: 왜냐하면
    gender: null
    plural: null
    notes:
      en: Coordinating conjunction; does not change word order
      ko: 등위 접속사; 어순을 변경하지 않음
  - german: sondern
    translation:
      en: but rather (after negation)
      ko: 오히려 / ~가 아니라
    gender: null
    plural: null
    notes:
      en: "Only after nicht/kein; nicht A, sondern B"
      ko: "nicht/kein 뒤에만 사용; A가 아니라 B"

