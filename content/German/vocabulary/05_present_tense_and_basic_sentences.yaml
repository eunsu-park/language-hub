- id: 52_stem_changing_a_to_ae
  label:
    en: "5.2 Stem-Changing Verbs: a \u2192 \u00e4"
    ko: "5.2 어간 모음 변화 동사: a \u2192 \u00e4"
  type: vocabulary
  words:
  - german: fahren
    translation:
      en: to drive / to go (by vehicle)
      ko: 운전하다 / (탈것으로) 가다
    gender: null
    plural: null
    notes:
      en: "du fährst, er fährt — a changes to ä in du and er/sie/es"
      ko: "du fährst, er fährt — du와 er/sie/es에서 a가 ä로 변화"
  - german: schlafen
    translation:
      en: to sleep
      ko: 자다
    gender: null
    plural: null
    notes:
      en: du schläfst, er schläft
      ko: du schläfst, er schläft
  - german: tragen
    translation:
      en: to carry / to wear
      ko: 운반하다 / 입다
    gender: null
    plural: null
    notes:
      en: du trägst, er trägt
      ko: du trägst, er trägt
  - german: laufen
    translation:
      en: to run / to walk
      ko: 달리다 / 걷다
    gender: null
    plural: null
    notes:
      en: "du läufst, er läuft — au changes to äu"
      ko: "du läufst, er läuft — au가 äu로 변화"
  - german: fallen
    translation:
      en: to fall
      ko: 떨어지다
    gender: null
    plural: null
    notes:
      en: du fällst, er fällt
      ko: du fällst, er fällt
  - german: waschen
    translation:
      en: to wash
      ko: 씻다
    gender: null
    plural: null
    notes:
      en: du wäschst, er wäscht
      ko: du wäschst, er wäscht
  - german: halten
    translation:
      en: to hold / to stop
      ko: 잡다 / 멈추다
    gender: null
    plural: null
    notes:
      en: "du hältst, er hält; Der Bus hält hier."
      ko: "du hältst, er hält; 버스가 여기서 멈춘다."
  - german: fangen
    translation:
      en: to catch
      ko: 잡다
    gender: null
    plural: null
    notes:
      en: du fängst, er fängt
      ko: du fängst, er fängt
  - german: einladen
