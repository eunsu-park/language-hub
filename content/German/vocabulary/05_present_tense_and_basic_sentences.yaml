- id: 52_stem_changing_a_to_ae
  label:
    en: "5.2 Stem-Changing Verbs: a \u2192 \u00e4"
    ko: "5.2 어간 모음 변화 동사: a \u2192 \u00e4"
  type: vocabulary
  words:
  - german: fahren
    translation:
      en: to drive / to go (by vehicle)
      ko: 운전하다 / (탈것으로) 가다
    gender: null
    plural: null
    notes:
      en: "du fährst, er fährt — a changes to ä in du and er/sie/es"
      ko: "du fährst, er fährt — du와 er/sie/es에서 a가 ä로 변화"
  - german: schlafen
    translation:
      en: to sleep
      ko: 자다
    gender: null
    plural: null
    notes:
      en: du schläfst, er schläft
      ko: du schläfst, er schläft
  - german: tragen
    translation:
      en: to carry / to wear
      ko: 운반하다 / 입다
    gender: null
    plural: null
    notes:
      en: du trägst, er trägt
      ko: du trägst, er trägt
  - german: laufen
    translation:
      en: to run / to walk
      ko: 달리다 / 걷다
    gender: null
    plural: null
    notes:
      en: "du läufst, er läuft — au changes to äu"
      ko: "du läufst, er läuft — au가 äu로 변화"
  - german: fallen
    translation:
      en: to fall
      ko: 떨어지다
    gender: null
    plural: null
    notes:
      en: du fällst, er fällt
      ko: du fällst, er fällt
  - german: waschen
    translation:
      en: to wash
      ko: 씻다
    gender: null
    plural: null
    notes:
      en: du wäschst, er wäscht
      ko: du wäschst, er wäscht

- id: 53_stem_changing_e_to_i_ie
  label:
    en: "5.3 Stem-Changing Verbs: e \u2192 i / ie"
    ko: "5.3 어간 모음 변화 동사: e \u2192 i / ie"
  type: vocabulary
  words:
  - german: sprechen
    translation:
      en: to speak
      ko: 말하다
    gender: null
    plural: null
    notes:
      en: "e \u2192 i: du sprichst, er spricht"
      ko: "e \u2192 i: du sprichst, er spricht"
  - german: helfen
    translation:
      en: to help
      ko: 돕다
    gender: null
    plural: null
    notes:
      en: "e \u2192 i: du hilfst, er hilft"
      ko: "e \u2192 i: du hilfst, er hilft"
  - german: geben
    translation:
      en: to give
      ko: 주다
    gender: null
    plural: null
    notes:
      en: "e \u2192 i: du gibst, er gibt"
      ko: "e \u2192 i: du gibst, er gibt"
  - german: nehmen
    translation:
      en: to take
      ko: 가져가다 / 먹다
    gender: null
    plural: null
    notes:
      en: "Extra irregular: du nimmst, er nimmt (e \u2192 i, h drops, m doubles)"
      ko: "추가 불규칙: du nimmst, er nimmt (e \u2192 i, h 탈락, m 이중화)"
  - german: essen
    translation:
      en: to eat
      ko: 먹다
    gender: null
    plural: null
    notes:
      en: "e \u2192 i: du isst, er isst (du and er forms look the same)"
      ko: "e \u2192 i: du isst, er isst (du와 er 형태 동일)"
  - german: lesen
    translation:
      en: to read
      ko: 읽다
    gender: null
    plural: null
    notes:
      en: "e \u2192 ie: du liest, er liest"
      ko: "e \u2192 ie: du liest, er liest"
  - german: sehen
    translation:
      en: to see
      ko: 보다
    gender: null
    plural: null
    notes:
      en: "e \u2192 ie: du siehst, er sieht"
      ko: "e \u2192 ie: du siehst, er sieht"

