- id: 27_regional_greetings
  label:
    en: 2.7 Regional Greetings
    ko: 2.7 지역별 인사
  type: vocabulary
  words:
  - german: Moin!
    translation:
      en: Hello! (any time of day)
      ko: 안녕! (하루 중 아무 때나)
    gender: null
    plural: null
    notes:
      en: Northern Germany
      ko: 북부 독일
  - german: Grüß Gott!
    translation:
      en: Hello! (lit. "God greet you")
      ko: 안녕하세요! (직역 "신이 인사하시길")
    gender: null
    plural: null
    notes:
      en: Southern Germany and Austria
      ko: 남부 독일 및 오스트리아
  - german: Servus!
    translation:
      en: Hello / Goodbye
      ko: 안녕 / 잘 가
    gender: null
    plural: null
    notes:
      en: Southern Germany and Austria; both greeting and farewell
      ko: 남부 독일 및 오스트리아; 인사와 작별 모두 사용
  - german: Grüezi!
    translation:
      en: Hello! (Swiss German)
      ko: 안녕하세요! (스위스 독일어)
    gender: null
    plural: null
    notes:
      en: Switzerland, standard greeting
      ko: 스위스, 표준 인사
  - german: Tschau!
    translation:
      en: Ciao! / Bye!
      ko: 챠오! / 안녕!
    gender: null
    plural: null
    notes:
      en: Southern Germany and Switzerland; from Italian "ciao"
      ko: 남부 독일 및 스위스; 이탈리아어 "ciao"에서 유래

