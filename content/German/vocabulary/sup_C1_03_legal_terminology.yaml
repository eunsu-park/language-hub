      ko: "입법부, 행정부, 사법부"
  - german: "die Rechtsstaatlichkeit"
    translation:
      en: "rule of law"
      ko: "법치주의"
    gender: f
    notes:
      en: "das Rechtsstaatsprinzip = principle of the rule of law"
      ko: "das Rechtsstaatsprinzip = 법치주의 원칙"
  - german: "das Bundesverfassungsgericht"
    translation:
      en: "Federal Constitutional Court"
      ko: "연방헌법재판소"
    gender: n
    notes:
      en: "das BVerfG = abbreviation"
      ko: "das BVerfG = 약어"
  - german: "die Verfassungsbeschwerde, -n"
    translation:
      en: "constitutional complaint"
      ko: "헌법소원"
    gender: f
    notes:
      en: "eine Verfassungsbeschwerde einlegen = to file a constitutional complaint"
      ko: "eine Verfassungsbeschwerde einlegen = 헌법소원을 제기하다"
  - german: "die Souveränität"
    translation:
      en: "sovereignty"
      ko: "주권"
    gender: f
    notes:
      en: "die Volkssouveränität = popular sovereignty"
      ko: "die Volkssouveränität = 국민 주권"
  - german: "die Föderalismus"
    translation:
      en: "federalism"
      ko: "연방주의"
    gender: m
    notes:
      en: "föderalistisch = federalist"
      ko: "föderalistisch = 연방주의적인"
  - german: "die Unverletzlichkeit"
    translation:
      en: "inviolability"
      ko: "불가침성"
    gender: f
    notes:
      en: "die Unverletzlichkeit der Wohnung = inviolability of the home"
      ko: "die Unverletzlichkeit der Wohnung = 주거 불가침"
  - german: "die Meinungsfreiheit"
    translation:
      en: "freedom of speech"
      ko: "표현의 자유"
    gender: f
    notes:
