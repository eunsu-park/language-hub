      ko: "기본법 제5조"
  - german: "die Pressefreiheit"
    translation:
      en: "freedom of the press"
      ko: "언론의 자유"
    gender: f
    notes:
      en: "die Medienfreiheit = media freedom"
      ko: "die Medienfreiheit = 미디어 자유"
  - german: "die Gleichheit vor dem Gesetz"
    translation:
      en: "equality before the law"
      ko: "법 앞의 평등"
    gender: f
    notes:
      en: "Art. 3 GG = Article 3 of the Basic Law"
      ko: "기본법 제3조"
  - german: "die Religionsfreiheit"
    translation:
      en: "freedom of religion"
      ko: "종교의 자유"
    gender: f
    notes:
      en: "die Glaubensfreiheit = freedom of belief"
      ko: "die Glaubensfreiheit = 신앙의 자유"
  - german: "verfassungswidrig"
    translation:
      en: "unconstitutional"
      ko: "위헌의"
    gender: null
    notes:
      en: "die Verfassungswidrigkeit = unconstitutionality"
      ko: "die Verfassungswidrigkeit = 위헌성"
  - german: "die Normenkontrolle, -n"
    translation:
      en: "judicial review"
      ko: "규범 통제"
    gender: f
    notes:
      en: "die abstrakte Normenkontrolle = abstract judicial review"
      ko: "die abstrakte Normenkontrolle = 추상적 규범 통제"
  - german: "der Parlamentsvorbehalt"
    translation:
      en: "parliamentary reservation"
      ko: "의회 유보"
    gender: m
    notes:
      en: "wesentliche Entscheidungen bedürfen eines Gesetzes"
      ko: "중요한 결정은 법률을 필요로 한다"
  - german: "das Demokratieprinzip"
    translation:
      en: "principle of democracy"
      ko: "민주주의 원칙"
    gender: n
    notes:
      en: "alle Staatsgewalt geht vom Volke aus"
      ko: "모든 국가 권력은 국민으로부터 나온다"
  - german: "die Ewigkeitsklausel"
    translation:
      en: "eternity clause"
      ko: "영구 조항"
    gender: f
    notes:
      en: "Art. 79 Abs. 3 GG: unamendable core provisions"
      ko: "기본법 제79조 제3항: 수정 불가능한 핵심 조항"
  - german: "die Versammlungsfreiheit"
    translation:
      en: "freedom of assembly"
      ko: "집회의 자유"
    gender: f
    notes:
      en: "Art. 8 GG = Article 8 of the Basic Law"
      ko: "기본법 제8조"
  - german: "das Petitionsrecht"
    translation:
      en: "right of petition"
      ko: "청원권"
    gender: n
    notes:
      en: "Art. 17 GG = Article 17 of the Basic Law"
      ko: "기본법 제17조"
  - german: "die Verhältnismäßigkeit"
    translation:
      en: "proportionality"
      ko: "비례의 원칙"
    gender: f
    notes:
      en: "der Grundsatz der Verhältnismäßigkeit = principle of proportionality"
      ko: "der Grundsatz der Verhältnismäßigkeit = 비례의 원칙"
  - german: "die Gesetzmäßigkeit"
    translation:
      en: "legality / lawfulness"
      ko: "합법성"
    gender: f
    notes:
      en: "die Gesetzmäßigkeit der Verwaltung = legality of administration"
      ko: "die Gesetzmäßigkeit der Verwaltung = 행정의 합법성"
  - german: "der Gesetzgeber"
    translation:
      en: "legislator / legislature"
      ko: "입법자"
    gender: m
    notes:
      en: "der Bundesgesetzgeber = federal legislator"
      ko: "der Bundesgesetzgeber = 연방 입법자"
  - german: "die Abwägung, -en"
    translation:
      en: "weighing / balancing (of rights)"
      ko: "형량 (권리의)"
    gender: f
    notes:
      en: "die Grundrechtsabwägung = balancing of fundamental rights"
      ko: "die Grundrechtsabwägung = 기본권 형량"
  - german: "die Wesensgehaltsgarantie"
    translation:
      en: "guarantee of essential content"
      ko: "본질적 내용 보장"
    gender: f
    notes:
      en: "Art. 19 Abs. 2 GG: kein Grundrecht darf in seinem Wesensgehalt angetastet werden"
      ko: "기본법 제19조 제2항: 어떤 기본권도 그 본질적 내용이 침해되어서는 안 된다"
  - german: "die Staatsangehörigkeit"
    translation:
      en: "citizenship / nationality"
      ko: "국적"
    gender: f
    notes:
      en: "die deutsche Staatsangehörigkeit = German citizenship"
      ko: "die deutsche Staatsangehörigkeit = 독일 국적"
  - german: "die Grundrechtsbindung"
    translation:
      en: "binding force of fundamental rights"
      ko: "기본권 구속력"
    gender: f
    notes:
      en: "die unmittelbare Grundrechtsbindung der Staatsgewalt"
      ko: "국가 권력에 대한 기본권의 직접적 구속력"
  - german: "die Subsidiarität"
    translation:
      en: "subsidiarity"
      ko: "보충성"
    gender: f
    notes:
      en: "das Subsidiaritätsprinzip = principle of subsidiarity"
      ko: "das Subsidiaritätsprinzip = 보충성 원칙"
  - german: "die Kompetenzordnung"
    translation:
      en: "allocation of powers"
      ko: "권한 배분"
    gender: f
    notes:
      en: "die Kompetenzverteilung zwischen Bund und Ländern"
      ko: "연방과 주 간의 권한 배분"
  - german: "die Drittwirkung"
    translation:
      en: "horizontal effect (of fundamental rights)"
      ko: "제3자 효력"
    gender: f
    notes:
      en: "die mittelbare Drittwirkung = indirect horizontal effect"
      ko: "die mittelbare Drittwirkung = 간접적 제3자 효력"
  - german: "das Sozialstaatsprinzip"
    translation:
      en: "welfare state principle"
      ko: "사회국가 원칙"
    gender: n
    notes:
      en: "Art. 20 Abs. 1 GG"
      ko: "기본법 제20조 제1항"
  - german: "die Berufsfreiheit"
    translation:
      en: "freedom of occupation"
      ko: "직업의 자유"
    gender: f
    notes:
      en: "Art. 12 GG = Article 12 of the Basic Law"
      ko: "기본법 제12조"
  - german: "die Unschuldsvermutung"
    translation:
      en: "presumption of innocence"
      ko: "무죄 추정"
    gender: f
    notes:
      en: "in dubio pro reo = in doubt, for the accused"
      ko: "in dubio pro reo = 의심스러우면 피고인에게 유리하게"
  - german: "das Wahlrecht"
    translation:
      en: "right to vote / electoral law"
      ko: "선거권 / 선거법"
    gender: n
    notes:
      en: "das aktive/passive Wahlrecht = right to vote/stand for election"
      ko: "das aktive/passive Wahlrecht = 투표권/피선거권"
  - german: "der Grundrechtseingriff, -e"
    translation:
      en: "interference with fundamental rights"
      ko: "기본권 침해"
    gender: m
    notes:
      en: "einen Grundrechtseingriff rechtfertigen"
      ko: "기본권 침해를 정당화하다"
  - german: "die Verfassungskonformität"
    translation:
      en: "constitutional conformity"
      ko: "합헌성"
    gender: f
    notes:
      en: "verfassungskonform = constitutionally conforming"
      ko: "verfassungskonform = 헌법에 부합하는"
  - german: "die Koalitionsfreiheit"
    translation:
      en: "freedom of association"
      ko: "결사의 자유"
    gender: f
    notes:
      en: "Art. 9 GG = Article 9 of the Basic Law"
      ko: "기본법 제9조"
  - german: "die Gesetzgebungskompetenz, -en"
    translation:
      en: "legislative competence"
      ko: "입법 권한"
    gender: f
    notes:
      en: "die ausschließliche/konkurrierende Gesetzgebung"
      ko: "전속적/경합적 입법"
- id: vertragsrecht
  label:
    en: "Contract Law (Vertragsrecht)"
    ko: "계약법 (Vertragsrecht)"
  type: vocabulary
  words:
  - german: "der Vertrag, Verträge"
    translation:
      en: "contract"
      ko: "계약"
    gender: m
    notes:
      en: "einen Vertrag schließen = to conclude a contract"
      ko: "einen Vertrag schließen = 계약을 체결하다"
  - german: "die Willenserklärung, -en"
    translation:
      en: "declaration of intent"
      ko: "의사 표시"
    gender: f
    notes:
      en: "eine Willenserklärung abgeben = to make a declaration of intent"
      ko: "eine Willenserklärung abgeben = 의사 표시를 하다"
  - german: "die Leistung, -en"
    translation:
      en: "performance (contractual)"
      ko: "급부 / 이행"
    gender: f
    notes:
      en: "die Leistungspflicht = obligation to perform"
      ko: "die Leistungspflicht = 급부 의무"
  - german: "die Gegenleistung, -en"
    translation:
      en: "consideration / counter-performance"
      ko: "반대급부"
    gender: f
    notes:
      en: "Leistung und Gegenleistung = performance and counter-performance"
      ko: "급부와 반대급부"
  - german: "der Schadensersatz"
    translation:
      en: "damages / compensation"
      ko: "손해배상"
    gender: m
    notes:
      en: "Schadensersatz fordern = to claim damages"
      ko: "Schadensersatz fordern = 손해배상을 청구하다"
  - german: "die Haftung"
    translation:
      en: "liability"
      ko: "책임 / 배상 의무"
    gender: f
    notes:
      en: "die verschuldensunabhängige Haftung = strict liability"
      ko: "die verschuldensunabhängige Haftung = 무과실 책임"
  - german: "die Kündigung, -en"
    translation:
      en: "termination / cancellation"
      ko: "해지 / 해약"
    gender: f
    notes:
      en: "einen Vertrag kündigen = to terminate a contract"
      ko: "einen Vertrag kündigen = 계약을 해지하다"
  - german: "die Verjährung, -en"
    translation:
      en: "statute of limitations"
      ko: "소멸 시효"
    gender: f
    notes:
      en: "verjähren = to be time-barred"
      ko: "verjähren = 시효가 만료되다"
  - german: "die Nichtigkeit"
    translation:
      en: "nullity / voidness"
      ko: "무효"
    gender: f
    notes:
      en: "nichtig = void / null and void"
      ko: "nichtig = 무효인"
  - german: "die Anfechtung, -en"
    translation:
      en: "avoidance / contestation"
      ko: "취소"
    gender: f
    notes:
      en: "einen Vertrag anfechten = to contest a contract"
      ko: "einen Vertrag anfechten = 계약을 취소하다"
  - german: "die Vertragsfreiheit"
    translation:
      en: "freedom of contract"
      ko: "계약 자유"
    gender: f
    notes:
      en: "die Privatautonomie = private autonomy"
      ko: "die Privatautonomie = 사적 자치"
  - german: "die Gewährleistung, -en"
    translation:
      en: "warranty"
      ko: "하자 담보"
    gender: f
    notes:
      en: "die gesetzliche Gewährleistung = statutory warranty"
      ko: "die gesetzliche Gewährleistung = 법정 하자 담보"
  - german: "der Verzug"
    translation:
      en: "default / delay"
      ko: "지체 / 채무 불이행"
    gender: m
    notes:
      en: "in Verzug geraten = to fall into default"
      ko: "in Verzug geraten = 지체에 빠지다"
  - german: "die Vertragsstrafe, -n"
    translation:
      en: "contractual penalty"
      ko: "위약금"
    gender: f
    notes:
      en: "eine Vertragsstrafe vereinbaren = to agree on a penalty clause"
      ko: "eine Vertragsstrafe vereinbaren = 위약금을 약정하다"
  - german: "die Geschäftsfähigkeit"
    translation:
      en: "legal capacity"
      ko: "행위 능력"
    gender: f
    notes:
      en: "geschäftsfähig = legally competent"
      ko: "geschäftsfähig = 행위 능력이 있는"
  - german: "die Allgemeinen Geschäftsbedingungen (pl.)"
    translation:
      en: "general terms and conditions (GTC)"
      ko: "약관"
    gender: f
    notes:
      en: "Abbreviation: AGB"
      ko: "약어: AGB"
  - german: "die Rückabwicklung, -en"
    translation:
      en: "unwinding / reversal"
      ko: "원상 회복"
    gender: f
    notes:
      en: "die Rückabwicklung eines Vertrages"
      ko: "계약의 원상 회복"
  - german: "die Vertragserfüllung"
    translation:
      en: "performance of contract"
      ko: "계약 이행"
    gender: f
    notes:
      en: "den Vertrag erfüllen = to perform the contract"
      ko: "den Vertrag erfüllen = 계약을 이행하다"
  - german: "die Nebenpflicht, -en"
    translation:
      en: "ancillary obligation"
      ko: "부수적 의무"
    gender: f
    notes:
      en: "Schutz- und Nebenpflichten = protective and ancillary duties"
      ko: "보호 및 부수적 의무"
  - german: "der Vertragsbruch, Vertragsbrüche"
    translation:
      en: "breach of contract"
      ko: "계약 위반"
    gender: m
    notes:
      en: "einen Vertrag brechen = to breach a contract"
      ko: "einen Vertrag brechen = 계약을 위반하다"
  - german: "die Formvorschrift, -en"
    translation:
      en: "formal requirement"
      ko: "방식 요건"
    gender: f
    notes:
      en: "die Schriftform = written form"
      ko: "die Schriftform = 서면 방식"
  - german: "die Stellvertretung"
    translation:
      en: "representation / agency"
      ko: "대리"
    gender: f
    notes:
      en: "die Vollmacht = power of attorney"
      ko: "die Vollmacht = 위임장"
  - german: "die Unmöglichkeit"
    translation:
      en: "impossibility (of performance)"
      ko: "불능 (이행의)"
    gender: f
    notes:
      en: "anfängliche/nachträgliche Unmöglichkeit = initial/supervening impossibility"
      ko: "원시적/후발적 불능"
  - german: "der Rücktritt"
    translation:
      en: "withdrawal / rescission"
      ko: "해제"
    gender: m
    notes:
      en: "vom Vertrag zurücktreten = to withdraw from a contract"
      ko: "vom Vertrag zurücktreten = 계약에서 해제하다"
  - german: "die Sittenwidrigkeit"
    translation:
      en: "immorality / contra bonos mores"
      ko: "반사회성 / 공서양속 위반"
    gender: f
    notes:
      en: "ein sittenwidriger Vertrag = a contract contrary to public morals"
      ko: "ein sittenwidriger Vertrag = 공서양속에 위반하는 계약"
  - german: "die Rechtsmängelhaftung"
    translation:
      en: "liability for defects in title"
      ko: "권리 하자 담보 책임"
    gender: f
    notes:
      en: "die Sachmängelhaftung = liability for material defects"
      ko: "die Sachmängelhaftung = 물적 하자 담보 책임"
  - german: "die salvatorische Klausel, -n"
    translation:
      en: "severability clause"
      ko: "유효 조항"
    gender: f
    notes:
      en: "ensures remaining provisions stay valid if one is void"
      ko: "하나의 조항이 무효인 경우 나머지 조항의 유효성을 보장"
  - german: "die Schiedsklausel, -n"
    translation:
      en: "arbitration clause"
      ko: "중재 조항"
    gender: f
    notes:
      en: "das Schiedsgericht = arbitration court"
      ko: "das Schiedsgericht = 중재 법원"
