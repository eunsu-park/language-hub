type: supplementary
topic: "Legal Terminology"
categories:
- id: verfassungsrecht
  label:
    en: "Constitutional Law (Verfassungsrecht)"
    ko: "헌법 (Verfassungsrecht)"
  type: vocabulary
  words:
  - german: "das Grundgesetz"
    translation:
      en: "Basic Law (German constitution)"
      ko: "기본법 (독일 헌법)"
    gender: n
    notes:
      en: "das GG = abbreviation for Grundgesetz"
      ko: "das GG = Grundgesetz의 약어"
  - german: "die Verfassung, -en"
    translation:
      en: "constitution"
      ko: "헌법"
    gender: f
    notes:
      en: "verfassungsgemäß = constitutional"
      ko: "verfassungsgemäß = 합헌적인"
  - german: "das Grundrecht, -e"
    translation:
      en: "fundamental right"
      ko: "기본권"
    gender: n
    notes:
      en: "die Grundrechte sind im GG verankert"
      ko: "기본권은 기본법에 명시되어 있다"
  - german: "die Menschenwürde"
