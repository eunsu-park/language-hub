      ko: "그램"
    gender: n
    notes:
      en: "200 Gramm Käse = 200 grams of cheese"
      ko: "200 Gramm Käse = 치즈 200그램"
  - german: "der Liter, -"
    translation:
      en: "liter"
      ko: "리터"
    gender: m
    notes:
      en: "ein Liter Milch = one liter of milk"
      ko: "ein Liter Milch = 우유 1리터"
  - german: "die Packung, -en"
    translation:
      en: "pack / package"
      ko: "팩 / 묶음"
    gender: f
    notes:
      en: "eine Packung Nudeln = a pack of pasta"
      ko: "eine Packung Nudeln = 파스타 한 묶음"
  - german: "die Flasche, -n"
    translation:
      en: "bottle"
      ko: "병"
    gender: f
