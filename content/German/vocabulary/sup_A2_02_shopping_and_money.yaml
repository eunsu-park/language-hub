lesson: "sup_A2_Shopping_and_Money"
lesson_number: 122
cefr: A2
type: supplementary
topic: "Shopping and Money"
categories:
- id: geschaefte
  label:
    en: "Shops (Geschäfte)"
    ko: "상점 (Geschäfte)"
  type: vocabulary
  words:
