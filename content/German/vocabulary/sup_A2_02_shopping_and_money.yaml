      ko: "Größe S = 스몰 사이즈"
  - german: "mittel"
    translation:
      en: "medium"
      ko: "중간의"
    gender: null
    notes:
      en: "Größe M = medium size"
      ko: "Größe M = 미디엄 사이즈"
  - german: "groß"
    translation:
      en: "large / big"
      ko: "큰"
    gender: null
    notes:
      en: "Größe L = large size"
      ko: "Größe L = 라지 사이즈"
  - german: "das Stück, -e"
    translation:
      en: "piece / item"
      ko: "개 / 조각"
    gender: n
    notes:
      en: "zwei Stück = two pieces"
      ko: "zwei Stück = 두 개"
  - german: "das Kilogramm (kg)"
    translation:
      en: "kilogram"
      ko: "킬로그램"
    gender: n
    notes:
      en: "ein Kilo Äpfel = one kilo of apples"
      ko: "ein Kilo Äpfel = 사과 1킬로"
  - german: "das Gramm (g)"
    translation:
