    translation:
      en: "shop / store"
      ko: "가게 / 상점"
    gender: n
    notes:
      en: "Also means 'business' in a broader sense"
      ko: "더 넓은 의미에서 '사업'도 의미함"
  - german: "der Supermarkt, Supermärkte"
    translation:
      en: "supermarket"
      ko: "슈퍼마켓"
    gender: m
    notes:
      en: "Common chains: Aldi, Lidl, Rewe, Edeka"
      ko: "대표 체인: Aldi, Lidl, Rewe, Edeka"
  - german: "die Bäckerei, -en"
    translation:
      en: "bakery"
      ko: "빵집"
    gender: f
    notes:
      en: "der Bäcker = baker; fresh bread daily"
      ko: "der Bäcker = 제빵사; 매일 신선한 빵"
  - german: "die Metzgerei, -en"
    translation:
      en: "butcher shop"
      ko: "정육점"
    gender: f
    notes:
      en: "Also called 'die Fleischerei' in northern Germany"
      ko: "북부 독일에서는 'die Fleischerei'라고도 함"
  - german: "die Apotheke, -n"
    translation:
      en: "pharmacy"
      ko: "약국"
    gender: f
    notes:
      en: "Marked with a red 'A' sign; different from Drogerie"
      ko: "빨간 'A' 표시; Drogerie와 다름"
  - german: "die Drogerie, -n"
    translation:
      en: "drugstore (non-prescription)"
      ko: "드러그스토어 (비처방)"
    gender: f
    notes:
      en: "dm and Rossmann are popular chains"
      ko: "dm과 Rossmann이 인기 체인"
  - german: "das Kaufhaus, Kaufhäuser"
    translation:
      en: "department store"
      ko: "백화점"
    gender: n
    notes:
      en: "Galeria Kaufhof is a well-known chain"
      ko: "Galeria Kaufhof가 유명한 체인"
  - german: "das Einkaufszentrum, -zentren"
    translation:
      en: "shopping center / mall"
      ko: "쇼핑센터 / 몰"
    gender: n
    notes:
      en: "Plural: Einkaufszentren"
      ko: "복수형: Einkaufszentren"
  - german: "der Markt, Märkte"
    translation:
      en: "market"
      ko: "시장"
    gender: m
    notes:
      en: "der Wochenmarkt = weekly farmers' market"
      ko: "der Wochenmarkt = 주간 농산물 시장"
  - german: "der Flohmarkt, Flohmärkte"
    translation:
      en: "flea market"
      ko: "벼룩시장"
    gender: m
    notes:
      en: "Popular for second-hand goods on weekends"
      ko: "주말에 중고품 거래로 인기"
  - german: "der Buchladen, Buchläden"
    translation:
      en: "bookstore"
      ko: "서점"
    gender: m
    notes:
      en: "Also 'die Buchhandlung'"
      ko: "'die Buchhandlung'이라고도 함"
  - german: "das Blumengeschäft, -e"
    translation:
      en: "flower shop"
      ko: "꽃집"
    gender: n
    notes:
      en: "Flowers are a common gift when visiting someone"
      ko: "방문할 때 꽃은 흔한 선물"
  - german: "die Reinigung, -en"
    translation:
      en: "dry cleaner"
      ko: "세탁소"
    gender: f
    notes:
      en: "die chemische Reinigung = dry cleaning"
      ko: "die chemische Reinigung = 드라이클리닝"
  - german: "das Schreibwarengeschäft, -e"
    translation:
      en: "stationery shop"
      ko: "문구점"
    gender: n
    notes:
      en: "Sells pens, paper, notebooks etc."
      ko: "펜, 종이, 공책 등을 판매"
  - german: "der Kiosk, -e"
    translation:
      en: "kiosk / newsstand"
      ko: "키오스크 / 매점"
    gender: m
    notes:
      en: "Sells newspapers, snacks, drinks"
      ko: "신문, 간식, 음료를 판매"
  - german: "die Öffnungszeiten (pl.)"
    translation:
      en: "opening hours"
      ko: "영업시간"
    gender: null
    notes:
      en: "Most shops close on Sundays in Germany"
      ko: "독일에서 대부분의 가게는 일요일에 문을 닫음"
  - german: "der Juwelier, -e"
    translation:
      en: "jeweler / jewelry store"
      ko: "보석상"
    gender: m
    notes:
      en: "der Schmuck = jewelry"
      ko: "der Schmuck = 보석류"
  - german: "das Sportgeschäft, -e"
    translation:
      en: "sports shop"
      ko: "스포츠 용품점"
    gender: n
    notes:
      en: "Sportartikel kaufen = to buy sporting goods"
      ko: "Sportartikel kaufen = 스포츠 용품을 사다"
  - german: "das Möbelhaus, -häuser"
    translation:
      en: "furniture store"
      ko: "가구점"
    gender: n
    notes:
      en: "IKEA is popular in Germany"
      ko: "이케아가 독일에서 인기"
  - german: "der Optiker, -"
    translation:
      en: "optician"
      ko: "안경점"
    gender: m
    notes:
      en: "eine Brille kaufen = to buy glasses"
      ko: "eine Brille kaufen = 안경을 사다"
  - german: "die Baumschule, -n"
    translation:
      en: "garden center / nursery"
      ko: "원예점"
    gender: f
    notes:
      en: "das Gartencenter = garden center"
      ko: "das Gartencenter = 가든 센터"
  - german: "der Laden, Läden"
    translation:
      en: "shop / store"
      ko: "가게"
    gender: m
    notes:
      en: "More colloquial than 'das Geschäft'"
      ko: "'das Geschäft'보다 구어적 표현"

- id: geld_und_zahlung
  label:
    en: "Money and Payment (Geld/Zahlung)"
    ko: "돈과 결제 (Geld/Zahlung)"
  type: vocabulary
  words:
  - german: "das Geld, -er"
    translation:
      en: "money"
      ko: "돈"
    gender: n
    notes:
      en: "das Bargeld = cash; das Kleingeld = small change"
      ko: "das Bargeld = 현금; das Kleingeld = 잔돈"
  - german: "der Euro, -s"
    translation:
      en: "euro"
      ko: "유로"
    gender: m
    notes:
      en: "Currency used in Germany, Austria, and many EU countries"
      ko: "독일, 오스트리아, 다수의 EU 국가에서 사용하는 화폐"
  - german: "der Cent, -s"
    translation:
      en: "cent"
      ko: "센트"
    gender: m
    notes:
      en: "100 Cent = 1 Euro"
      ko: "100 Cent = 1 Euro"
  - german: "der Geldautomat, -en"
    translation:
      en: "ATM / cash machine"
      ko: "ATM / 현금 인출기"
    gender: m
    notes:
      en: "Geld abheben = to withdraw money"
      ko: "Geld abheben = 돈을 인출하다"
  - german: "die Kreditkarte, -n"
    translation:
      en: "credit card"
      ko: "신용카드"
    gender: f
    notes:
      en: "Less widely accepted in Germany than in other countries"
      ko: "독일에서는 다른 나라보다 덜 보편적"
  - german: "die EC-Karte, -n"
    translation:
      en: "debit card"
      ko: "직불카드"
    gender: f
    notes:
      en: "Also called 'die Girokarte'; most common payment card"
      ko: "'die Girokarte'라고도 함; 가장 흔한 결제카드"
  - german: "die Rechnung, -en"
    translation:
      en: "bill / invoice"
      ko: "계산서 / 청구서"
    gender: f
    notes:
      en: "die Rechnung bitte = the bill please"
      ko: "die Rechnung bitte = 계산서 주세요"
  - german: "die Quittung, -en"
    translation:
      en: "receipt"
      ko: "영수증"
    gender: f
    notes:
      en: "der Kassenbon = also receipt (from register)"
      ko: "der Kassenbon = 영수증 (계산대에서)"
  - german: "die Kasse, -n"
    translation:
      en: "checkout / cash register"
      ko: "계산대"
    gender: f
    notes:
      en: "an der Kasse zahlen = to pay at the checkout"
      ko: "an der Kasse zahlen = 계산대에서 결제하다"
  - german: "bar bezahlen"
    translation:
      en: "to pay in cash"
      ko: "현금으로 결제하다"
    gender: null
    notes:
      en: "Germans still prefer cash for many transactions"
      ko: "독일인은 여전히 많은 거래에서 현금을 선호함"
  - german: "das Wechselgeld"
    translation:
      en: "change (money returned)"
      ko: "거스름돈"
    gender: n
    notes:
      en: "Stimmt so = Keep the change (with tip)"
      ko: "Stimmt so = 거스름돈은 됐어요 (팁 포함)"
  - german: "das Konto, Konten"
    translation:
      en: "bank account"
      ko: "은행 계좌"
    gender: n
    notes:
      en: "das Girokonto = checking account"
      ko: "das Girokonto = 보통 예금 계좌"
  - german: "überweisen"
    translation:
      en: "to transfer (money)"
      ko: "이체하다 / 송금하다"
    gender: null
    notes:
      en: "die Überweisung = bank transfer"
      ko: "die Überweisung = 계좌 이체"
  - german: "sparen"
    translation:
      en: "to save (money)"
      ko: "저축하다 / 절약하다"
    gender: null
    notes:
      en: "das Sparkonto = savings account"
      ko: "das Sparkonto = 저축 계좌"
  - german: "die Schulden (pl.)"
    translation:
      en: "debts"
      ko: "빚"
    gender: null
    notes:
      en: "Schulden machen = to go into debt"
      ko: "Schulden machen = 빚을 지다"
  - german: "der Kredit, -e"
    translation:
      en: "loan / credit"
      ko: "대출"
    gender: m
    notes:
      en: "einen Kredit aufnehmen = to take out a loan"
      ko: "einen Kredit aufnehmen = 대출을 받다"
  - german: "die Zinsen (pl.)"
    translation:
      en: "interest (financial)"
      ko: "이자"
    gender: null
    notes:
      en: "der Zinssatz = interest rate"
      ko: "der Zinssatz = 이자율"
  - german: "die Währung, -en"
    translation:
      en: "currency"
      ko: "화폐 / 통화"
    gender: f
    notes:
      en: "die Fremdwährung = foreign currency"
      ko: "die Fremdwährung = 외화"
  - german: "wechseln"
    translation:
      en: "to exchange (money)"
      ko: "환전하다"
    gender: null
    notes:
      en: "die Wechselstube = currency exchange office"
      ko: "die Wechselstube = 환전소"
  - german: "der Preis, -e"
    translation:
      en: "price"
      ko: "가격"
    gender: m
    notes:
      en: "Was kostet das? / Was ist der Preis? = What does it cost?"
      ko: "Was kostet das? / Was ist der Preis? = 이거 얼마예요?"
  - german: "das Sonderangebot, -e"
    translation:
      en: "special offer / sale item"
      ko: "특가 상품"
    gender: n
    notes:
      en: "im Sonderangebot = on special offer"
      ko: "im Sonderangebot = 특가 중"
  - german: "der Rabatt, -e"
    translation:
      en: "discount"
      ko: "할인"
    gender: m
    notes:
      en: "einen Rabatt bekommen = to get a discount"
      ko: "einen Rabatt bekommen = 할인을 받다"
  - german: "das Trinkgeld, -er"
    translation:
      en: "tip / gratuity"
      ko: "팁"
    gender: n
    notes:
      en: "5-10% is customary in German restaurants"
      ko: "독일 식당에서 5-10%가 관례"

- id: einkaufsverben
  label:
    en: "Shopping Verbs (Einkaufsverben)"
    ko: "쇼핑 동사 (Einkaufsverben)"
  type: vocabulary
  words:
  - german: "einkaufen"
    translation:
      en: "to shop / to go shopping"
      ko: "쇼핑하다 / 장을 보다"
    gender: null
    notes:
      en: "Separable: Ich kaufe im Supermarkt ein"
      ko: "분리 동사: Ich kaufe im Supermarkt ein"
  - german: "kaufen"
    translation:
      en: "to buy"
      ko: "사다"
    gender: null
    notes:
      en: "etwas kaufen = to buy something"
      ko: "etwas kaufen = 무언가를 사다"
  - german: "verkaufen"
    translation:
      en: "to sell"
      ko: "팔다"
    gender: null
    notes:
      en: "der Verkäufer / die Verkäuferin = salesperson"
      ko: "der Verkäufer / die Verkäuferin = 판매원"
  - german: "bezahlen"
    translation:
      en: "to pay"
      ko: "지불하다 / 결제하다"
    gender: null
    notes:
      en: "die Bezahlung = payment"
      ko: "die Bezahlung = 결제"
  - german: "kosten"
    translation:
      en: "to cost"
      ko: "비용이 들다 / ~이다 (가격)"
    gender: null
    notes:
      en: "Was kostet das? = How much does this cost?"
      ko: "Was kostet das? = 이거 얼마예요?"
  - german: "umtauschen"
    translation:
      en: "to exchange / to return (an item)"
      ko: "교환하다 / 반품하다"
    gender: null
    notes:
      en: "der Umtausch = exchange/return"
      ko: "der Umtausch = 교환/반품"
  - german: "anprobieren"
    translation:
      en: "to try on (clothing)"
      ko: "입어보다 / 시착하다"
    gender: null
    notes:
      en: "die Umkleidekabine = fitting room"
      ko: "die Umkleidekabine = 탈의실"
  - german: "bestellen"
    translation:
      en: "to order"
      ko: "주문하다"
    gender: null
    notes:
      en: "die Bestellung = the order"
      ko: "die Bestellung = 주문"
  - german: "zurückgeben"
    translation:
      en: "to return / to give back"
      ko: "반환하다 / 돌려주다"
    gender: null
    notes:
      en: "Separable: Ich gebe das Buch zurück"
      ko: "분리 동사: Ich gebe das Buch zurück"
  - german: "vergleichen"
    translation:
      en: "to compare"
      ko: "비교하다"
    gender: null
    notes:
      en: "Preise vergleichen = to compare prices"
      ko: "Preise vergleichen = 가격을 비교하다"
  - german: "aussuchen"
    translation:
      en: "to pick out / to choose"
      ko: "고르다 / 선택하다"
    gender: null
    notes:
      en: "Separable: Such dir etwas aus! = Pick something out!"
      ko: "분리 동사: Such dir etwas aus! = 뭔가 골라봐!"
  - german: "empfehlen"
    translation:
      en: "to recommend"
      ko: "추천하다"
    gender: null
    notes:
      en: "Strong verb: empfiehlt (3rd person singular)"
      ko: "강변화 동사: empfiehlt (3인칭 단수)"
  - german: "sich leisten"
    translation:
      en: "to afford"
      ko: "여유가 되다 / 감당하다"
    gender: null
    notes:
      en: "Ich kann mir das nicht leisten = I can't afford it"
      ko: "Ich kann mir das nicht leisten = 그것을 살 여유가 없어"
  - german: "ausgeben"
    translation:
      en: "to spend (money)"
      ko: "쓰다 (돈)"
    gender: null
    notes:
      en: "Separable: Geld ausgeben = to spend money"
      ko: "분리 동사: Geld ausgeben = 돈을 쓰다"
  - german: "einpacken"
    translation:
      en: "to wrap / to bag"
      ko: "포장하다"
    gender: null
    notes:
      en: "Separable: Soll ich es einpacken? = Shall I wrap it?"
      ko: "분리 동사: Soll ich es einpacken? = 포장해 드릴까요?"
  - german: "probieren"
    translation:
      en: "to try / to taste"
      ko: "시도하다 / 맛보다"
    gender: null
    notes:
      en: "Darf ich probieren? = May I try/taste?"
      ko: "Darf ich probieren? = 맛봐도 될까요?"
  - german: "leihen"
    translation:
      en: "to lend / to borrow"
      ko: "빌려주다 / 빌리다"
    gender: null
    notes:
      en: "sich etwas leihen = to borrow something"
      ko: "sich etwas leihen = 무언가를 빌리다"
  - german: "tauschen"
    translation:
      en: "to swap / to exchange"
      ko: "교환하다"
    gender: null
    notes:
      en: "Kann ich das tauschen? = Can I exchange this?"
      ko: "Kann ich das tauschen? = 이것을 교환할 수 있나요?"
  - german: "suchen"
    translation:
      en: "to look for / to search"
      ko: "찾다"
    gender: null
    notes:
      en: "Ich suche ein Geschenk = I'm looking for a gift"
      ko: "Ich suche ein Geschenk = 선물을 찾고 있어요"
  - german: "finden"
    translation:
      en: "to find"
      ko: "발견하다 / 찾다"
    gender: null
    notes:
      en: "Ich finde das schön = I think that's nice"
      ko: "Ich finde das schön = 나는 그게 예쁘다고 생각해"
  - german: "das Sonderangebot, -e"
    translation:
      en: "special offer"
      ko: "특가 상품"
    gender: n
    notes:
      en: "im Sonderangebot = on special offer"
      ko: "im Sonderangebot = 특가 중"
  - german: "die Aktion, -en"
    translation:
      en: "promotion / special deal"
      ko: "프로모션 / 특별 행사"
    gender: f
    notes:
      en: "in der Aktion = on promotion"
      ko: "in der Aktion = 프로모션 중"

- id: groessen_und_mengen
  label:
    en: "Sizes and Quantities (Größen/Mengen)"
