      ko: "복수 Wörter = 개별 단어; Worte = 맥락 속 단어"
  - german: der Satz, -"e
    translation:
      en: sentence
      ko: 문장
    gender: m
    plural: die Sätze
  - german: die Bedeutung, -en
    translation:
      en: meaning
      ko: 의미
    gender: f
    plural: die Bedeutungen
  - german: die Übersetzung, -en
    translation:
      en: translation
      ko: 번역
    gender: f
    plural: die Übersetzungen
  - german: übersetzen
    translation:
