    gender: null
    plural: null

- id: 14_german_language_terms
  label:
    en: 1.4 German Language Terms
    ko: 1.4 독일어 언어 용어
  type: vocabulary
  words:
  - german: die Sprache, -n
    translation:
      en: language
      ko: 언어
    gender: f
    plural: die Sprachen
  - german: die Grammatik, -en
    translation:
      en: grammar
      ko: 문법
    gender: f
    plural: die Grammatiken
  - german: der Wortschatz
    translation:
      en: vocabulary
      ko: 어휘
    gender: m
    plural: null
    notes:
      en: "Lit. \"word treasure\"; uncountable in this sense"
      ko: "직역 \"단어 보물\"; 이 의미에서 불가산"
