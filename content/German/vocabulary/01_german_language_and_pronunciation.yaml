lesson: 01_German_Language_and_Pronunciation
lesson_number: 1
cefr: A1
categories:
- id: 11_alphabet_and_sounds
  label:
    en: 1.1 Alphabet and Sounds
    ko: 1.1 알파벳과 발음
  type: vocabulary
  words:
  - german: das Alphabet, -e
    translation:
      en: alphabet
      ko: 알파벳
    gender: n
    plural: die Alphabete
    notes:
      en: Also called "das Abc"
      ko: '"das Abc"라고도 함'
  - german: der Buchstabe, -n
    translation:
      en: letter (of the alphabet)
      ko: 글자 / 문자
    gender: m
    plural: die Buchstaben
  - german: der Großbuchstabe, -n
    translation:
      en: capital letter / uppercase letter
      ko: 대문자
    gender: m
    plural: die Großbuchstaben
    notes:
      en: All German nouns are capitalized
      ko: 모든 독일어 명사는 대문자로 시작
  - german: der Kleinbuchstabe, -n
    translation:
      en: lowercase letter
      ko: 소문자
    gender: m
    plural: die Kleinbuchstaben
  - german: der Umlaut, -e
    translation:
      en: umlaut (ä, ö, ü)
      ko: 움라우트 (ä, ö, ü)
    gender: m
    plural: die Umlaute
    notes:
      en: Modified vowels unique to German; changes pronunciation and meaning
      ko: 독일어 고유의 변모음; 발음과 의미를 변화시킴
  - german: das Eszett
    translation:
      en: the letter ß (sharp S)
      ko: 에스체트 (ß)
    gender: n
    plural: null
    notes:
      en: Also called "scharfes S"; used only in German
      ko: '"샤르페스 에스"라고도 함; 독일어에서만 사용'
  - german: das A-Umlaut (Ä / ä)
    translation:
      en: A-umlaut
      ko: A-움라우트
    gender: n
    plural: null
    notes:
      en: Pronounced like "e" in "bed"
      ko: '"bed"의 "e"처럼 발음'
  - german: das O-Umlaut (Ö / ö)
    translation:
      en: O-umlaut
      ko: O-움라우트
    gender: n
    plural: null
    notes:
      en: No English equivalent; rounded "e" sound
      ko: 영어에 동일한 발음 없음; 입을 둥글게 한 "에" 소리
  - german: das U-Umlaut (Ü / ü)
    translation:
      en: U-umlaut
      ko: U-움라우트
    gender: n
    plural: null
    notes:
      en: No English equivalent; rounded "ee" sound
      ko: 영어에 동일한 발음 없음; 입을 둥글게 한 "이" 소리
  - german: das Zeichen, -
    translation:
      en: sign / symbol / character
      ko: 기호 / 문자
    gender: n
    plural: die Zeichen
  - german: die Schrift, -en
    translation:
      en: writing / script
      ko: 글씨 / 서체
    gender: f
    plural: die Schriften
  - german: die Rechtschreibung, -en
    translation:
      en: spelling / orthography
      ko: 맞춤법 / 철자법
    gender: f
    plural: die Rechtschreibungen
    notes:
      en: "Compound: recht (right) + Schreibung (writing)"
      ko: "복합어: recht (올바른) + Schreibung (쓰기)"
  - german: das Satzzeichen, -
    translation:
      en: punctuation mark
      ko: 구두점 / 문장부호
    gender: n
    plural: die Satzzeichen
  - german: der Punkt, -e
    translation:
      en: period / dot
      ko: 마침표 / 점
    gender: m
    plural: die Punkte
  - german: das Komma, -s
    translation:
      en: comma
      ko: 쉼표
    gender: n
    plural: die Kommas
    notes:
      en: In German, commas are used before subordinate clauses
      ko: 독일어에서는 종속절 앞에 쉼표 사용
  - german: das Fragezeichen, -
    translation:
      en: question mark
      ko: 물음표
    gender: n
    plural: die Fragezeichen
  - german: das Ausrufezeichen, -
    translation:
      en: exclamation mark
      ko: 느낌표
    gender: n
    plural: die Ausrufezeichen
  - german: der Doppelpunkt, -e
    translation:
      en: colon
      ko: 콜론 / 쌍점
    gender: m
    plural: die Doppelpunkte
  - german: der Strichpunkt, -e
    translation:
      en: semicolon
      ko: 세미콜론
    gender: m
    plural: die Strichpunkte

- id: 12_basic_phonetics
  label:
    en: 1.2 Basic Phonetics
    ko: 1.2 기본 음성학
  type: vocabulary
  words:
  - german: die Aussprache, -n
    translation:
      en: pronunciation
      ko: 발음
    gender: f
    plural: die Aussprachen
  - german: der Vokal, -e
    translation:
      en: vowel
      ko: 모음
    gender: m
    plural: die Vokale
  - german: der Konsonant, -en
    translation:
      en: consonant
      ko: 자음
    gender: m
    plural: die Konsonanten
  - german: die Silbe, -n
    translation:
      en: syllable
      ko: 음절
    gender: f
    plural: die Silben
  - german: die Betonung, -en
    translation:
      en: stress / emphasis
      ko: 강세
    gender: f
    plural: die Betonungen
    notes:
      en: German stress typically falls on the first syllable
      ko: 독일어 강세는 보통 첫 번째 음절에 위치
  - german: der Laut, -e
    translation:
      en: sound (phonetic)
      ko: 소리 / 음
    gender: m
    plural: die Laute
  - german: der Doppellaut, -e
    translation:
      en: diphthong
      ko: 이중모음
    gender: m
    plural: die Doppellaute
    notes:
      en: "E.g., ei, au, eu/äu"
      ko: "예: ei, au, eu/äu"
  - german: aussprechen
    translation:
      en: to pronounce
      ko: 발음하다
    gender: null
    plural: null
    notes:
      en: Separable verb; "Wie spricht man das aus?"
      ko: 분리동사; "이것을 어떻게 발음하나요?"
  - german: buchstabieren
    translation:
      en: to spell
      ko: 철자하다
    gender: null
    plural: null
    notes:
      en: '"Können Sie das bitte buchstabieren?"'
      ko: '"그것을 철자해 주시겠어요?"'
  - german: der Klang, -"e
    translation:
      en: sound / tone
      ko: 소리 / 음색
    gender: m
    plural: die Klänge
    notes:
      en: Refers to musical or tonal quality, unlike Laut (phonetic sound)
      ko: Laut(음성 소리)와 달리 음악적/음색적 품질을 의미
  - german: lang
    translation:
      en: long (vowel/sound)
      ko: 긴 (모음/소리)
    gender: null
    plural: null
    notes:
      en: "Long vowels: a in Vater, e in Leben"
      ko: "장모음: Vater의 a, Leben의 e"
  - german: kurz
    translation:
      en: short (vowel/sound)
      ko: 짧은 (모음/소리)
    gender: null
    plural: null
    notes:
      en: "Short vowels: a in Mann, e in Bett"
      ko: "단모음: Mann의 a, Bett의 e"
  - german: der Selbstlaut, -e
    translation:
      en: vowel (alternative term)
      ko: 모음 (대체 용어)
    gender: m
    plural: die Selbstlaute
    notes:
      en: "Lit. \"self-sound\"; same as Vokal"
      ko: "직역 \"스스로의 소리\"; Vokal과 동일"
  - german: der Mitlaut, -e
    translation:
      en: consonant (alternative term)
      ko: 자음 (대체 용어)
    gender: m
    plural: die Mitlaute
    notes:
      en: "Lit. \"with-sound\"; same as Konsonant"
      ko: "직역 \"함께하는 소리\"; Konsonant과 동일"
  - german: die Stimme, -n
    translation:
      en: voice
      ko: 목소리
    gender: f
    plural: die Stimmen
  - german: stimmhaft
    translation:
      en: voiced (phonetics)
      ko: 유성의 (음성학)
    gender: null
    plural: null
    notes:
      en: "Voiced consonants vibrate the vocal cords, e.g., b, d, g"
      ko: "유성 자음은 성대를 진동시킴, 예: b, d, g"
  - german: stimmlos
    translation:
      en: voiceless / unvoiced
      ko: 무성의 (음성학)
    gender: null
    plural: null
    notes:
      en: "Voiceless consonants: p, t, k, f, s"
      ko: "무성 자음: p, t, k, f, s"
  - german: betonen
    translation:
      en: to stress / to emphasize
      ko: 강세를 두다
    gender: null
    plural: null
  - german: die Melodie, -n
    translation:
      en: melody / intonation
      ko: 멜로디 / 억양
    gender: f
    plural: die Melodien
    notes:
      en: German sentence melody rises in yes/no questions
      ko: 독일어 문장 멜로디는 예/아니오 질문에서 올라감
  - german: der Akzent, -e
    translation:
      en: accent
      ko: 악센트 / 억양
    gender: m
    plural: die Akzente
    notes:
      en: Can mean stress mark or foreign accent
      ko: 강세 표시 또는 외국어 억양을 의미

