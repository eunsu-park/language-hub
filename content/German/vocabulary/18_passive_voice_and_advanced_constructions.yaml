lesson: 18_Passive_Voice_and_Advanced_Constructions
lesson_number: 18
cefr: B2
categories:
- id: 1_passive_voice_expressions
  label:
    en: 1. Passive Voice Expressions
    ko: 1. 수동태 표현
  type: vocabulary
  words:
  - german: das Vorgangspassiv
    translation:
      en: process passive (werden + past participle)
      ko: 과정 수동태
    gender: n
    plural: null
  - german: das Zustandspassiv
    translation:
      en: state passive (sein + past participle)
      ko: 상태 수동태
    gender: n
    plural: null
  - german: erledigen
    translation:
      en: to complete / to take care of
      ko: 처리하다
    gender: null
    plural: null
  - german: korrigieren
    translation:
      en: to correct
      ko: 교정하다
    gender: null
    plural: null
  - german: die Prüfung, -en
    translation:
      en: exam / test
      ko: 시험
    gender: f
    plural: die Prüfungen
  - german: reparieren
    translation:
      en: to repair
      ko: 수리하다
    gender: null
    plural: null
  - german: zerstören
    translation:
      en: to destroy
      ko: 파괴하다
    gender: null
    plural: null
  - german: der Bote, -n
    translation:
      en: messenger
      ko: 전령 / 배달원
    gender: m
    plural: die Boten
  - german: übermitteln
    translation:
      en: to convey / to transmit
      ko: 전달하다
    gender: null
    plural: null
  - german: veröffentlichen
    translation:
      en: to publish
      ko: 출판하다
    gender: null
    plural: null
    notes:
      en: "Passive: Das Buch wurde veröffentlicht."
      ko: "수동태: 그 책이 출판되었다."
  - german: drehen
    translation:
      en: to shoot (a film) / to turn
      ko: (영화를) 촬영하다 / 돌리다
    gender: null
    plural: null
    notes:
      en: "Passive: Der Film wird gedreht."
      ko: "수동태: 그 영화가 촬영되고 있다."
  - german: bauen
    translation:
      en: to build
      ko: 건설하다
    gender: null
    plural: null
    notes:
      en: "Passive: Es wird gebaut. (impersonal passive)"
      ko: "수동태: 건설이 진행 중이다. (비인칭 수동태)"
  - german: eröffnen
    translation:
      en: to open (officially)
      ko: 개장하다
    gender: null
    plural: null
    notes:
      en: "Passive: Das Museum wurde eröffnet."
      ko: "수동태: 그 박물관이 개관되었다."
  - german: genehmigen
    translation:
      en: to approve / to authorize
      ko: 승인하다
    gender: null
    plural: null
    notes:
      en: "Passive: Der Antrag wurde genehmigt."
      ko: "수동태: 신청이 승인되었다."

- id: 2_relative_pronoun_words
  label:
    en: 2. Relative Pronoun Words
    ko: 2. 관계대명사 관련 어휘
  type: vocabulary
  words:
  - german: der Relativsatz, -̈e
    translation:
      en: relative clause
      ko: 관계절
    gender: m
    plural: die Relativsätze
  - german: dessen
    translation:
      en: whose (masculine/neuter genitive relative pronoun)
      ko: ~의 (남성/중성 소유격 관계대명사)
    gender: null
    plural: null
  - german: deren
    translation:
      en: whose (feminine/plural genitive relative pronoun)
      ko: ~의 (여성/복수 소유격 관계대명사)
    gender: null
    plural: null
  - german: denen
    translation:
      en: whom (dative plural relative pronoun)
      ko: ~에게 (여격 복수 관계대명사)
    gender: null
    plural: null
  - german: der Nebensatz, -̈e
    translation:
      en: subordinate clause
      ko: 종속절
    gender: m
    plural: die Nebensätze
  - german: was
    translation:
      en: what / which (relative pronoun after indefinite antecedents)
      ko: ~것 (부정 선행사 뒤의 관계대명사)
    gender: null
    plural: null
    notes:
      en: "Used after alles, etwas, nichts, das: Alles, was er sagte, war richtig."
      ko: "alles, etwas, nichts, das 뒤에 사용: 그가 말한 모든 것이 맞았다."
  - german: worin
    translation:
      en: in which (relative adverb)
      ko: 그 안에 (관계부사)
    gender: null
    plural: null
    notes:
      en: "Das Haus, worin sie wohnt, ist alt."
      ko: "그녀가 사는 집은 낡았다."
  - german: wofür
    translation:
      en: for which (relative adverb)
      ko: 그것을 위해 (관계부사)
    gender: null
    plural: null
    notes:
      en: "Das Projekt, wofür er arbeitet, ist wichtig."
      ko: "그가 일하는 프로젝트는 중요하다."
  - german: wobei
    translation:
      en: in doing which / whereby
      ko: 그 과정에서 / 그때
    gender: null
    plural: null
    notes:
      en: "Er las das Buch, wobei er einschlief."
      ko: "그는 책을 읽다가 잠이 들었다."
  - german: worüber
    translation:
      en: about which (relative adverb)
      ko: 그것에 대해 (관계부사)
    gender: null
    plural: null
    notes:
      en: "Das Thema, worüber wir sprachen, war interessant."
      ko: "우리가 이야기한 주제는 흥미로웠다."
  - german: woran
    translation:
      en: on/at which (relative adverb)
      ko: 그것에 (관계부사)
    gender: null
    plural: null
    notes:
      en: "Das Problem, woran er denkt, ist komplex."
      ko: "그가 생각하는 문제는 복잡하다."

- id: 3_zu_infinitiv_constructions
  label:
    en: 3. zu + Infinitiv Constructions
    ko: 3. zu + 부정사 구문
  type: vocabulary
  words:
  - german: um ... zu + Infinitiv
    translation:
      en: in order to
      ko: ~하기 위해
    gender: null
    plural: null
  - german: ohne ... zu + Infinitiv
    translation:
      en: without (doing)
      ko: ~하지 않고
    gender: null
    plural: null
  - german: (an)statt ... zu + Infinitiv
    translation:
      en: instead of (doing)
      ko: ~하는 대신에
    gender: null
    plural: null
  - german: sich verabschieden
    translation:
      en: to say goodbye
      ko: 작별 인사를 하다
    gender: null
    plural: null
  - german: versuchen
    translation:
      en: to try / to attempt
      ko: 시도하다
    gender: null
    plural: null
  - german: vorhaben
    translation:
      en: to plan / to intend
      ko: 계획하다
    gender: null
    plural: null
  - german: die indirekte Rede
    translation:
      en: indirect speech
      ko: 간접 화법
    gender: f
    plural: null
  - german: der Konjunktiv I
    translation:
      en: subjunctive I (for indirect speech)
      ko: 접속법 I (간접 화법용)
    gender: m
    plural: null
  - german: je ... desto
    translation:
      en: the ... the (comparative construction)
      ko: ~하면 할수록 ~하다
    gender: null
    plural: null
    notes:
      en: "Je mehr man übt, desto besser wird man."
      ko: "더 많이 연습할수록, 더 나아진다."
  - german: sowohl ... als auch
    translation:
      en: both ... and
      ko: ~뿐만 아니라 ~도
    gender: null
    plural: null
    notes:
      en: "Sowohl er als auch sie sprechen Deutsch."
      ko: "그뿐만 아니라 그녀도 독일어를 한다."
  - german: weder ... noch
    translation:
      en: neither ... nor
      ko: ~도 아니고 ~도 아닌
    gender: null
    plural: null
    notes:
      en: "Weder Fisch noch Fleisch."
      ko: "이것도 저것도 아닌."
  - german: der Konjunktiv II
    translation:
      en: subjunctive II (for unreal conditions)
      ko: 접속법 II (비현실적 조건용)
    gender: m
    plural: null
    notes:
      en: "Wenn ich reich wäre, würde ich reisen."
      ko: "내가 부자라면, 여행을 할 텐데."
