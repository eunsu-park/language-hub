      en: "Prefix: auf-. Ich stehe um 7 Uhr auf. Partizip II: aufgestanden"
  - german: ankommen
    translation:
      en: to arrive
      ko: 도착하다
    gender: null
    plural: null
    notes:
      en: "Prefix: an-. Der Zug kommt um 9 an. Partizip II: angekommen"
