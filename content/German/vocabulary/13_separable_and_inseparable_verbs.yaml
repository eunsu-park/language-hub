- id: dual_prefix_verbs
  label:
    en: Dual-Prefix Verbs (Separable or Inseparable)
    ko: 이중 접두사 동사 (분리/비분리)
  type: vocabulary
  words:
  - german: "uebersetzen (separable)"
    translation:
      en: to ferry across (literal)
      ko: 건너편으로 데려다주다
    gender: null
    plural: null
    notes:
      en: "Separable (literal): Das Boot setzt ueber. Partizip II: uebergesetzt"
  - german: "uebersetzen (inseparable)"
    translation:
      en: to translate (figurative)
      ko: 번역하다
    gender: null
    plural: null
    notes:
      en: "Inseparable (figurative): Er uebersetzt den Text. Partizip II: uebersetzt"
  - german: umziehen (separable)
    translation:
      en: to change clothes; to move (house)
      ko: 옷을 갈아입다; 이사하다
    gender: null
    plural: null
    notes:
      en: "Separable: Ich ziehe mich um. Partizip II: umgezogen"
  - german: unterschreiben (inseparable)
    translation:
      en: to sign (a document)
      ko: 서명하다
    gender: null
    plural: null
    notes:
      en: "Inseparable (figurative): Partizip II: unterschrieben (no ge-)"
  - german: wiederholen (inseparable)
    translation:
      en: to repeat
      ko: 반복하다
    gender: null
    plural: null
    notes:
      en: "Inseparable (figurative): Sie wiederholt die Lektion. Partizip II: wiederholt"
  - german: wiederkommen (separable)
    translation:
      en: to come back
      ko: 다시 오다
    gender: null
    plural: null
    notes:
      en: "Separable (literal): Er kommt morgen wieder. Partizip II: wiedergekommen"
