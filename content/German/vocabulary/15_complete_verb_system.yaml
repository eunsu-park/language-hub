      ko: 작별 인사를 하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Wir nehmen Abschied von unseren Freunden."
      ko: "연어. 우리는 친구들에게 작별 인사를 한다."
  - german: in Betracht ziehen
    translation:
      en: to take into consideration
      ko: 고려하다
    gender: null
    plural: null
    notes:
