lesson: 15_Complete_Verb_System
lesson_number: 15
cefr: B1
categories:
- id: 1_strong_verbs
  label:
    en: 1. Important Strong (Irregular) Verbs
    ko: 1. 주요 강변화(불규칙) 동사
  type: vocabulary
  words:
  - german: schließen
    translation:
      en: to close / to lock
      ko: 닫다 / 잠그다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschlossen. Er hat die Tür geschlossen."
      ko: "과거분사: geschlossen. 그는 문을 닫았다."
  - german: genießen
    translation:
      en: to enjoy
      ko: 즐기다
    gender: null
    plural: null
    notes:
      en: "Partizip II: genossen. Wir haben den Urlaub genossen."
      ko: "과거분사: genossen. 우리는 휴가를 즐겼다."
  - german: bieten
    translation:
      en: to offer
      ko: 제공하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geboten. Die Stadt bietet viele Möglichkeiten."
      ko: "과거분사: geboten. 그 도시는 많은 가능성을 제공한다."
  - german: ziehen
    translation:
      en: to pull / to move
      ko: 당기다 / 이사하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gezogen. Aux: haben (pull) or sein (move). Er ist nach Berlin gezogen."
      ko: "과거분사: gezogen. 조동사: haben (당기다) 또는 sein (이사하다)."
  - german: rufen
    translation:
      en: to call / to shout
      ko: 부르다 / 외치다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerufen. Sie hat laut gerufen."
      ko: "과거분사: gerufen. 그녀는 크게 불렀다."
  - german: werfen
    translation:
      en: to throw
      ko: 던지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geworfen. Stem change: e → i (du wirfst, er wirft)."
      ko: "과거분사: geworfen. 어간 변화: e → i (du wirfst, er wirft)."
  - german: leiden
    translation:
      en: to suffer
      ko: 고통받다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gelitten. Er hat unter Kopfschmerzen gelitten."
      ko: "과거분사: gelitten. 그는 두통으로 고통받았다."
  - german: streiten
    translation:
      en: to argue / to quarrel
      ko: 다투다 / 논쟁하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gestritten. Sie haben sich gestritten."
      ko: "과거분사: gestritten. 그들은 다투었다."
  - german: schneiden
    translation:
      en: to cut
      ko: 자르다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschnitten. Ich habe mir in den Finger geschnitten."
      ko: "과거분사: geschnitten. 나는 손가락을 베었다."
  - german: riechen
    translation:
      en: to smell
      ko: 냄새 맡다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerochen. Die Blumen riechen gut."
      ko: "과거분사: gerochen. 꽃들이 좋은 냄새가 난다."
  - german: sinken
    translation:
      en: to sink / to drop
      ko: 가라앉다 / 떨어지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gesunken. Aux: sein. Die Temperatur ist gesunken."
      ko: "과거분사: gesunken. 조동사: sein. 온도가 떨어졌다."
  - german: gewinnen
    translation:
      en: to win
      ko: 이기다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gewonnen. Wir haben das Spiel gewonnen."
      ko: "과거분사: gewonnen. 우리는 경기에서 이겼다."
  - german: verlieren
    translation:
      en: to lose
      ko: 잃다 / 지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: verloren. Inseparable prefix ver-. Ich habe meinen Schlüssel verloren."
      ko: "과거분사: verloren. 비분리 접두사 ver-. 나는 열쇠를 잃어버렸다."
  - german: beißen
    translation:
      en: to bite
      ko: 물다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gebissen. Präteritum: biss. Der Hund hat mich gebissen."
      ko: "과거분사: gebissen. 과거형: biss. 개가 나를 물었다."
  - german: greifen
    translation:
      en: to grab / to grasp
      ko: 잡다 / 쥐다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gegriffen. Präteritum: griff. Er griff nach dem Seil."
      ko: "과거분사: gegriffen. 과거형: griff. 그는 밧줄을 잡았다."
  - german: pfeifen
    translation:
      en: to whistle
      ko: 휘파람을 불다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gepfiffen. Präteritum: pfiff."
      ko: "과거분사: gepfiffen. 과거형: pfiff."
  - german: heben
    translation:
      en: to lift / to raise
      ko: 들어올리다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gehoben. Präteritum: hob. Er hat die Kiste gehoben."
      ko: "과거분사: gehoben. 과거형: hob. 그는 상자를 들어올렸다."
  - german: treten
    translation:
      en: to step / to kick
      ko: 밟다 / 차다
    gender: null
    plural: null
    notes:
      en: "Partizip II: getreten. Aux: sein (step) or haben (kick). Stem change: e → i."
      ko: "과거분사: getreten. 조동사: sein (밟다) 또는 haben (차다)."
  - german: messen
    translation:
      en: to measure
      ko: 측정하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gemessen. Stem change: e → i (du misst, er misst)."
      ko: "과거분사: gemessen. 어간 변화: e → i (du misst, er misst)."
  - german: schieben
    translation:
      en: to push / to shove
      ko: 밀다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschoben. Präteritum: schob."
      ko: "과거분사: geschoben. 과거형: schob."
  - german: schweigen
    translation:
      en: to be silent
      ko: 침묵하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschwiegen. Präteritum: schwieg. Er hat geschwiegen."
      ko: "과거분사: geschwiegen. 과거형: schwieg. 그는 침묵했다."
  - german: schaffen
    translation:
      en: to create (strong) / to manage (weak)
      ko: 창조하다 (강변화) / 해내다 (약변화)
    gender: null
    plural: null
    notes:
      en: "Strong: schuf/geschaffen (create). Weak: schaffte/geschafft (manage). Gott schuf die Welt. Ich habe es geschafft!"
      ko: "강변화: schuf/geschaffen (창조하다). 약변화: schaffte/geschafft (해내다)."
  - german: erschrecken
    translation:
      en: to be frightened (strong) / to frighten (weak)
      ko: 놀라다 (강변화) / 놀라게 하다 (약변화)
    gender: null
    plural: null
    notes:
      en: "Strong (intrans.): erschrak/erschrocken (sein). Weak (trans.): erschreckte/erschreckt (haben)."
      ko: "강변화 (자동사): erschrak/erschrocken (sein). 약변화 (타동사): erschreckte/erschreckt (haben)."

- id: 2_mixed_verbs
  label:
    en: 2. Mixed Verbs (Vowel Change + Weak Endings)
    ko: 2. 혼합 동사 (모음 변화 + 약변화 어미)
  type: vocabulary
  words:
  - german: brennen
    translation:
      en: to burn
      ko: 타다 / 불타다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gebrannt. Präteritum: brannte. Das Haus hat gebrannt."
      ko: "과거분사: gebrannt. 과거형: brannte. 집이 불탔다."
  - german: kennen
    translation:
      en: to know (a person/place)
      ko: 알다 (사람/장소를)
    gender: null
    plural: null
    notes:
      en: "Partizip II: gekannt. Präteritum: kannte. Ich habe ihn gut gekannt."
      ko: "과거분사: gekannt. 과거형: kannte. 나는 그를 잘 알았다."
  - german: nennen
    translation:
      en: to name / to call
      ko: 이름 짓다 / 부르다
    gender: null
    plural: null
    notes:
      en: "Partizip II: genannt. Präteritum: nannte. Man nennt ihn Max."
      ko: "과거분사: genannt. 과거형: nannte. 사람들은 그를 Max라고 부른다."
  - german: rennen
    translation:
      en: to run / to race
      ko: 달리다 / 뛰다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerannt. Präteritum: rannte. Aux: sein. Sie ist nach Hause gerannt."
      ko: "과거분사: gerannt. 과거형: rannte. 조동사: sein. 그녀는 집으로 뛰어갔다."
  - german: senden
    translation:
      en: to send
      ko: 보내다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gesandt (mixed) or gesendet (weak). Präteritum: sandte/sendete."
      ko: "과거분사: gesandt (혼합) 또는 gesendet (약변화). 과거형: sandte/sendete."
  - german: denken
    translation:
      en: to think
      ko: 생각하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gedacht. Präteritum: dachte. Ich habe an dich gedacht."
      ko: "과거분사: gedacht. 과거형: dachte. 나는 너를 생각했다."
  - german: bringen
    translation:
      en: to bring
      ko: 가져오다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gebracht. Präteritum: brachte. Er hat mir Blumen gebracht."
      ko: "과거분사: gebracht. 과거형: brachte. 그는 내게 꽃을 가져왔다."
  - german: wissen
    translation:
      en: to know (a fact)
      ko: 알다 (사실을)
    gender: null
    plural: null
    notes:
      en: "Partizip II: gewusst. Präteritum: wusste. Modal-like conjugation: ich weiß, du weißt."
      ko: "과거분사: gewusst. 과거형: wusste. 화법조동사식 변화: ich weiß, du weißt."
  - german: wenden
    translation:
      en: to turn
      ko: 돌리다
    gender: null
    plural: null
    notes:
      en: "Mixed: wandte/gewandt or wendete/gewendet. Sich an jemanden wenden (to turn to someone)."
      ko: "혼합: wandte/gewandt 또는 wendete/gewendet."

- id: 3_verb_prefixes
  label:
    en: 3. Common Verb Prefixes
    ko: 3. 주요 동사 접두사
  type: vocabulary
  words:
  - german: vor-
    translation:
      en: "before / forward (separable prefix)"
      ko: "~앞에 / 앞으로 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "vorstellen (to introduce), vorbereiten (to prepare), vorhaben (to plan)"
      ko: "vorstellen (소개하다), vorbereiten (준비하다), vorhaben (계획하다)"
  - german: nach-
    translation:
      en: "after / following (separable prefix)"
      ko: "~후에 / 뒤따르는 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "nachdenken (to reflect), nachmachen (to imitate), nachfragen (to inquire)"
      ko: "nachdenken (곰곰이 생각하다), nachmachen (따라 하다), nachfragen (문의하다)"
  - german: mit-
    translation:
      en: "along / with (separable prefix)"
      ko: "함께 / ~와 같이 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "mitkommen (to come along), mitmachen (to participate), mitbringen (to bring along)"
      ko: "mitkommen (함께 가다), mitmachen (참여하다), mitbringen (같이 가져오다)"
  - german: um-
    translation:
      en: "around / change (separable or inseparable)"
      ko: "~주위에 / 변화 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: umziehen (to move). Inseparable: umarmen (to hug). Stress determines meaning."
      ko: "분리: umziehen (이사하다). 비분리: umarmen (포옹하다). 강세가 의미를 결정한다."
  - german: wieder-
    translation:
      en: "again / back (separable or inseparable)"
      ko: "다시 / 되돌려 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: wiederkommen (to come back). Inseparable: wiederholen (to repeat)."
      ko: "분리: wiederkommen (다시 오다). 비분리: wiederholen (반복하다)."
  - german: zer-
    translation:
      en: "apart / to pieces (inseparable prefix)"
      ko: "산산이 / 파괴 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. zerstören (to destroy), zerbrechen (to shatter), zerreißen (to tear up)"
      ko: "항상 비분리. zerstören (파괴하다), zerbrechen (부수다), zerreißen (찢다)"
  - german: emp-
    translation:
      en: "receiving / feeling (inseparable prefix)"
      ko: "수령 / 감정 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. Variant of ent- before -f. empfehlen (to recommend), empfangen (to receive), empfinden (to feel)"
      ko: "항상 비분리. -f 앞에서 ent-의 변형. empfehlen (추천하다), empfangen (받다), empfinden (느끼다)"
  - german: ent-
    translation:
      en: "away / removal (inseparable prefix)"
      ko: "~로부터 / 제거 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. entdecken (to discover), entscheiden (to decide), entstehen (to arise)"
      ko: "항상 비분리. entdecken (발견하다), entscheiden (결정하다), entstehen (발생하다)"
  - german: "durch-"
    translation:
      en: "through (separable or inseparable)"
      ko: "~을 통해 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: durchlesen (to read through). Inseparable: durchsuchen (to search through)."
      ko: "분리: durchlesen (다 읽다). 비분리: durchsuchen (수색하다)."
  - german: "ueber-"
    translation:
      en: "over / across (separable or inseparable)"
      ko: "~위로 / 건너 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: überlaufen (to overflow). Inseparable: übersetzen (to translate)."
      ko: "분리: überlaufen (넘치다). 비분리: übersetzen (번역하다)."
  - german: an-
    translation:
      en: "at / on / to (separable prefix)"
      ko: "~에 / ~으로 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "ankommen (to arrive), anfangen (to begin), anrufen (to call), anziehen (to put on)"
      ko: "ankommen (도착하다), anfangen (시작하다), anrufen (전화하다), anziehen (입다)"
  - german: aus-
    translation:
      en: "out / out of (separable prefix)"
      ko: "밖으로 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "ausgehen (to go out), aussteigen (to get off), aussehen (to look/appear)"
      ko: "ausgehen (외출하다), aussteigen (내리다), aussehen (~처럼 보이다)"
  - german: ab-
    translation:
      en: "off / away / down (separable prefix)"
      ko: "떨어져 / 내려 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "abfahren (to depart), abholen (to pick up), abnehmen (to decrease/lose weight)"
      ko: "abfahren (출발하다), abholen (데리러 가다), abnehmen (줄다/살을 빼다)"
  - german: zu-
    translation:
      en: "to / closed (separable prefix)"
      ko: "~으로 / 닫힌 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "zumachen (to close), zuhören (to listen), zunehmen (to increase/gain weight)"
      ko: "zumachen (닫다), zuhören (경청하다), zunehmen (늘다/살이 찌다)"
  - german: ein-
    translation:
      en: "in / into (separable prefix)"
      ko: "안으로 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "einsteigen (to board), einkaufen (to shop), einladen (to invite)"
      ko: "einsteigen (탑승하다), einkaufen (장을 보다), einladen (초대하다)"

- id: 4_modal_verbs
  label:
    en: 4. Modal Verbs
    ko: 4. 화법조동사
  type: vocabulary
  words:
  - german: "koennen"
    translation:
      en: can, to be able to
      ko: ~할 수 있다
    gender: null
    plural: null
    notes:
      en: "Präteritum: konnte. Partizip II: gekonnt/können (double infinitive). Ich kann schwimmen."
      ko: "과거형: konnte. 과거분사: gekonnt/können (이중 부정사). 나는 수영할 수 있다."
  - german: "muessen"
    translation:
      en: must, to have to
      ko: ~해야 한다
    gender: null
    plural: null
    notes:
      en: "Präteritum: musste. Negation nicht müssen = don't have to (not 'must not')."
      ko: "과거형: musste. 부정 nicht müssen = ~하지 않아도 된다 (금지가 아님)."
  - german: "duerfen"
    translation:
      en: may, to be allowed to
      ko: ~해도 된다
    gender: null
    plural: null
    notes:
      en: "Präteritum: durfte. Negation nicht dürfen = must not. Darf ich? (May I?)"
      ko: "과거형: durfte. 부정 nicht dürfen = ~하면 안 된다."
  - german: sollen
    translation:
      en: should, to be supposed to
      ko: ~해야 한다, ~하는 것이 좋다
    gender: null
    plural: null
    notes:
      en: "Präteritum: sollte. No umlaut in Prät. Du sollst nicht lügen."
      ko: "과거형: sollte. 과거형에 움라우트 없음."
  - german: wollen
    translation:
      en: to want to
      ko: ~하고 싶다
    gender: null
    plural: null
    notes:
      en: "Präteritum: wollte. No umlaut in Prät. Ich will Deutsch lernen."
      ko: "과거형: wollte. 과거형에 움라우트 없음."
  - german: "moegen"
    translation:
      en: to like
      ko: 좋아하다
    gender: null
    plural: null
    notes:
      en: "Präteritum: mochte. Subjunctive möchte = would like. Ich mag Schokolade."
      ko: "과거형: mochte. 접속법 möchte = ~하고 싶다."

- id: 5_subjunctive_konjunktiv_ii
  label:
    en: 5. Subjunctive II (Konjunktiv II) Key Forms
    ko: 5. 접속법 II (Konjunktiv II) 주요 형태
  type: vocabulary
  words:
  - german: "waere"
    translation:
      en: would be (subj. of sein)
      ko: ~일 텐데 (sein의 접속법)
    gender: null
    plural: null
    notes:
      en: "Wenn ich reich wäre, ... (If I were rich, ...). Used for hypothetical situations."
      ko: "Wenn ich reich wäre, ... (내가 부자라면...). 가정적 상황에 사용."
  - german: "haette"
    translation:
      en: would have (subj. of haben)
      ko: ~가질 텐데 (haben의 접속법)
    gender: null
    plural: null
    notes:
      en: "Wenn ich Zeit hätte, ... (If I had time, ...). Also used in past subjunctive: hätte + PP."
      ko: "Wenn ich Zeit hätte, ... (시간이 있다면...). 과거 접속법에도 사용: hätte + 과거분사."
  - german: "wuerde + Infinitiv"
    translation:
      en: would + verb
      ko: ~할 텐데
    gender: null
    plural: null
    notes:
      en: "Replacement form for Konj. II. Ich würde gern nach Japan reisen."
      ko: "접속법 II 대체형. 나는 일본에 여행하고 싶을 텐데."
  - german: "koennte"
    translation:
      en: could (subj. of können)
      ko: ~할 수 있을 텐데
    gender: null
    plural: null
    notes:
      en: "Könnten Sie mir helfen? (Could you help me?). Polite request form."
      ko: "도와주실 수 있을까요? 정중한 요청 형태."
  - german: "muesste"
    translation:
      en: would have to (subj. of müssen)
      ko: ~해야 할 텐데
    gender: null
    plural: null
    notes:
      en: "Ich müsste eigentlich lernen. (I really should be studying.)"
      ko: "사실 공부를 해야 할 텐데."
  - german: "duerfte"
    translation:
      en: would be allowed to (subj. of dürfen)
      ko: ~해도 될 텐데
    gender: null
    plural: null
    notes:
      en: "Also used for probability: Das dürfte stimmen. (That's probably right.)"
      ko: "추측에도 사용: Das dürfte stimmen. (아마 맞을 것이다.)"
  - german: "sollte"
    translation:
      en: should (subj. of sollen)
      ko: ~해야 할 것이다
    gender: null
    plural: null
    notes:
      en: "Du solltest mehr schlafen. (You should sleep more.) Advice form."
      ko: "너는 더 자야 해. 조언 형태."
  - german: "wuesste"
    translation:
      en: would know (subj. of wissen)
      ko: 알 텐데
    gender: null
    plural: null
    notes:
      en: "Wenn ich es wüsste, würde ich es sagen. (If I knew, I would say it.)"
      ko: "내가 알았더라면 말했을 텐데."

- id: 6_passive_voice_verbs
  label:
    en: 6. Passive Voice Key Verbs and Expressions
    ko: 6. 수동태 주요 동사와 표현
  type: vocabulary
  words:
  - german: werden
    translation:
      en: to become (passive auxiliary)
      ko: 되다 (수동태 조동사)
    gender: null
    plural: null
    notes:
      en: "Passive: Das Buch wird gelesen. Präteritum: wurde. Partizip II (passive): worden."
      ko: "수동태: 그 책이 읽힌다. 과거형: wurde. 수동태 과거분사: worden."
  - german: "gebaut werden"
    translation:
      en: to be built
      ko: 건설되다
    gender: null
    plural: null
    notes:
      en: "Das Haus wird gebaut. (The house is being built.) werden + Partizip II."
      ko: "집이 건설된다. werden + 과거분사."
  - german: "gerufen werden"
    translation:
      en: to be called
      ko: 불리다
    gender: null
    plural: null
    notes:
      en: "Er wird Max gerufen. (He is called Max.) Passive voice."
      ko: "그는 Max라고 불린다."
  - german: "eingeladen werden"
    translation:
      en: to be invited
      ko: 초대되다
    gender: null
    plural: null
    notes:
      en: "Sie wurde zur Party eingeladen. (She was invited to the party.)"
      ko: "그녀는 파티에 초대받았다."
  - german: "lassen"
    translation:
      en: to let / to have something done
      ko: ~하게 하다 / ~을 시키다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gelassen/lassen. Ich lasse mir die Haare schneiden. (I have my hair cut.)"
      ko: "과거분사: gelassen/lassen. 나는 머리를 잘라 달라고 한다."
  - german: "sich lassen + Infinitiv"
    translation:
      en: can be done (passive alternative)
      ko: ~될 수 있다 (수동태 대체)
    gender: null
    plural: null
    notes:
      en: "Das lässt sich machen. (That can be done.) Alternative to passive voice."
      ko: "그것은 가능하다. 수동태의 대안 표현."

- id: 7_verb_noun_collocations
  label:
    en: 7. Important Verb-Noun Collocations
    ko: 7. 주요 동사-명사 연어
  type: vocabulary
  words:
  - german: eine Entscheidung treffen
    translation:
      en: to make a decision
      ko: 결정을 내리다
    gender: null
    plural: null
    notes:
      en: "Collocation. Wir muessen eine Entscheidung treffen."
      ko: "연어. 우리는 결정을 내려야 한다."
  - german: eine Frage stellen
    translation:
      en: to ask a question
      ko: 질문하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Darf ich eine Frage stellen?"
      ko: "연어. 질문해도 될까요?"
  - german: Bescheid geben
    translation:
      en: to let someone know
      ko: 알려주다
    gender: null
    plural: null
    notes:
      en: "Collocation. Gib mir bitte Bescheid!"
      ko: "연어. 나에게 알려 줘!"
  - german: Bescheid wissen
    translation:
      en: to be informed, to know about
      ko: 알고 있다
    gender: null
    plural: null
    notes:
      en: "Collocation. Ich weiß Bescheid."
      ko: "연어. 나는 알고 있다."
  - german: einen Fehler machen
    translation:
      en: to make a mistake
      ko: 실수하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Jeder macht mal Fehler."
      ko: "연어. 누구나 실수를 한다."
  - german: Fortschritte machen
    translation:
      en: to make progress
      ko: 진보하다, 발전하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Du machst grosse Fortschritte!"
      ko: "연어. 너는 큰 발전을 하고 있어!"
  - german: "eine Rolle spielen"
    translation:
      en: to play a role, to matter
      ko: 역할을 하다, 중요하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Das spielt keine Rolle. (That doesn't matter.)"
      ko: "연어. 그것은 중요하지 않다."
  - german: Ruecksicht nehmen auf + Akk.
    translation:
      en: to show consideration for
      ko: ~을 배려하다
    gender: null
    plural: null
    notes:
      en: "Collocation. Nimm Ruecksicht auf andere!"
      ko: "연어. 다른 사람들을 배려해!"
  - german: Abschied nehmen
    translation:
