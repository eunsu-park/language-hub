lesson: 15_Complete_Verb_System
lesson_number: 15
cefr: B1
categories:
- id: 1_strong_verbs
  label:
    en: 1. Important Strong (Irregular) Verbs
    ko: 1. 주요 강변화(불규칙) 동사
  type: vocabulary
  words:
  - german: schließen
    translation:
      en: to close / to lock
      ko: 닫다 / 잠그다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschlossen. Er hat die Tür geschlossen."
      ko: "과거분사: geschlossen. 그는 문을 닫았다."
  - german: genießen
    translation:
      en: to enjoy
      ko: 즐기다
    gender: null
    plural: null
    notes:
      en: "Partizip II: genossen. Wir haben den Urlaub genossen."
      ko: "과거분사: genossen. 우리는 휴가를 즐겼다."
  - german: bieten
    translation:
      en: to offer
      ko: 제공하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geboten. Die Stadt bietet viele Möglichkeiten."
      ko: "과거분사: geboten. 그 도시는 많은 가능성을 제공한다."
  - german: ziehen
    translation:
      en: to pull / to move
      ko: 당기다 / 이사하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gezogen. Aux: haben (pull) or sein (move). Er ist nach Berlin gezogen."
      ko: "과거분사: gezogen. 조동사: haben (당기다) 또는 sein (이사하다)."
  - german: rufen
    translation:
      en: to call / to shout
      ko: 부르다 / 외치다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerufen. Sie hat laut gerufen."
      ko: "과거분사: gerufen. 그녀는 크게 불렀다."
  - german: werfen
    translation:
      en: to throw
      ko: 던지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geworfen. Stem change: e → i (du wirfst, er wirft)."
      ko: "과거분사: geworfen. 어간 변화: e → i (du wirfst, er wirft)."
  - german: leiden
    translation:
      en: to suffer
      ko: 고통받다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gelitten. Er hat unter Kopfschmerzen gelitten."
      ko: "과거분사: gelitten. 그는 두통으로 고통받았다."
  - german: streiten
    translation:
      en: to argue / to quarrel
      ko: 다투다 / 논쟁하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gestritten. Sie haben sich gestritten."
      ko: "과거분사: gestritten. 그들은 다투었다."
  - german: schneiden
    translation:
      en: to cut
      ko: 자르다
    gender: null
    plural: null
    notes:
      en: "Partizip II: geschnitten. Ich habe mir in den Finger geschnitten."
      ko: "과거분사: geschnitten. 나는 손가락을 베었다."
  - german: riechen
    translation:
      en: to smell
      ko: 냄새 맡다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerochen. Die Blumen riechen gut."
      ko: "과거분사: gerochen. 꽃들이 좋은 냄새가 난다."
  - german: sinken
    translation:
      en: to sink / to drop
      ko: 가라앉다 / 떨어지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gesunken. Aux: sein. Die Temperatur ist gesunken."
      ko: "과거분사: gesunken. 조동사: sein. 온도가 떨어졌다."
  - german: gewinnen
    translation:
      en: to win
      ko: 이기다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gewonnen. Wir haben das Spiel gewonnen."
      ko: "과거분사: gewonnen. 우리는 경기에서 이겼다."
  - german: verlieren
    translation:
      en: to lose
      ko: 잃다 / 지다
    gender: null
    plural: null
    notes:
      en: "Partizip II: verloren. Inseparable prefix ver-. Ich habe meinen Schlüssel verloren."
      ko: "과거분사: verloren. 비분리 접두사 ver-. 나는 열쇠를 잃어버렸다."

- id: 2_mixed_verbs
  label:
    en: 2. Mixed Verbs (Vowel Change + Weak Endings)
    ko: 2. 혼합 동사 (모음 변화 + 약변화 어미)
  type: vocabulary
  words:
  - german: brennen
    translation:
      en: to burn
      ko: 타다 / 불타다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gebrannt. Präteritum: brannte. Das Haus hat gebrannt."
      ko: "과거분사: gebrannt. 과거형: brannte. 집이 불탔다."
  - german: kennen
    translation:
      en: to know (a person/place)
      ko: 알다 (사람/장소를)
    gender: null
    plural: null
    notes:
      en: "Partizip II: gekannt. Präteritum: kannte. Ich habe ihn gut gekannt."
      ko: "과거분사: gekannt. 과거형: kannte. 나는 그를 잘 알았다."
  - german: nennen
    translation:
      en: to name / to call
      ko: 이름 짓다 / 부르다
    gender: null
    plural: null
    notes:
      en: "Partizip II: genannt. Präteritum: nannte. Man nennt ihn Max."
      ko: "과거분사: genannt. 과거형: nannte. 사람들은 그를 Max라고 부른다."
  - german: rennen
    translation:
      en: to run / to race
      ko: 달리다 / 뛰다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gerannt. Präteritum: rannte. Aux: sein. Sie ist nach Hause gerannt."
      ko: "과거분사: gerannt. 과거형: rannte. 조동사: sein. 그녀는 집으로 뛰어갔다."
  - german: senden
    translation:
      en: to send
      ko: 보내다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gesandt (mixed) or gesendet (weak). Präteritum: sandte/sendete."
      ko: "과거분사: gesandt (혼합) 또는 gesendet (약변화). 과거형: sandte/sendete."
  - german: denken
    translation:
      en: to think
      ko: 생각하다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gedacht. Präteritum: dachte. Ich habe an dich gedacht."
      ko: "과거분사: gedacht. 과거형: dachte. 나는 너를 생각했다."
  - german: bringen
    translation:
      en: to bring
      ko: 가져오다
    gender: null
    plural: null
    notes:
      en: "Partizip II: gebracht. Präteritum: brachte. Er hat mir Blumen gebracht."
      ko: "과거분사: gebracht. 과거형: brachte. 그는 내게 꽃을 가져왔다."
  - german: wissen
    translation:
      en: to know (a fact)
      ko: 알다 (사실을)
    gender: null
    plural: null
    notes:
      en: "Partizip II: gewusst. Präteritum: wusste. Modal-like conjugation: ich weiß, du weißt."
      ko: "과거분사: gewusst. 과거형: wusste. 화법조동사식 변화: ich weiß, du weißt."

- id: 3_verb_prefixes
  label:
    en: 3. Common Verb Prefixes
    ko: 3. 주요 동사 접두사
  type: vocabulary
  words:
  - german: vor-
    translation:
      en: "before / forward (separable prefix)"
      ko: "~앞에 / 앞으로 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "vorstellen (to introduce), vorbereiten (to prepare), vorhaben (to plan)"
      ko: "vorstellen (소개하다), vorbereiten (준비하다), vorhaben (계획하다)"
  - german: nach-
    translation:
      en: "after / following (separable prefix)"
      ko: "~후에 / 뒤따르는 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "nachdenken (to reflect), nachmachen (to imitate), nachfragen (to inquire)"
      ko: "nachdenken (곰곰이 생각하다), nachmachen (따라 하다), nachfragen (문의하다)"
  - german: mit-
    translation:
      en: "along / with (separable prefix)"
      ko: "함께 / ~와 같이 (분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "mitkommen (to come along), mitmachen (to participate), mitbringen (to bring along)"
      ko: "mitkommen (함께 가다), mitmachen (참여하다), mitbringen (같이 가져오다)"
  - german: um-
    translation:
      en: "around / change (separable or inseparable)"
      ko: "~주위에 / 변화 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: umziehen (to move). Inseparable: umarmen (to hug). Stress determines meaning."
      ko: "분리: umziehen (이사하다). 비분리: umarmen (포옹하다). 강세가 의미를 결정한다."
  - german: wieder-
    translation:
      en: "again / back (separable or inseparable)"
      ko: "다시 / 되돌려 (분리 또는 비분리)"
    gender: null
    plural: null
    notes:
      en: "Separable: wiederkommen (to come back). Inseparable: wiederholen (to repeat)."
      ko: "분리: wiederkommen (다시 오다). 비분리: wiederholen (반복하다)."
  - german: zer-
    translation:
      en: "apart / to pieces (inseparable prefix)"
      ko: "산산이 / 파괴 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. zerstören (to destroy), zerbrechen (to shatter), zerreißen (to tear up)"
      ko: "항상 비분리. zerstören (파괴하다), zerbrechen (부수다), zerreißen (찢다)"
  - german: emp-
    translation:
      en: "receiving / feeling (inseparable prefix)"
      ko: "수령 / 감정 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. Variant of ent- before -f. empfehlen (to recommend), empfangen (to receive), empfinden (to feel)"
      ko: "항상 비분리. -f 앞에서 ent-의 변형. empfehlen (추천하다), empfangen (받다), empfinden (느끼다)"
  - german: ent-
    translation:
      en: "away / removal (inseparable prefix)"
      ko: "~로부터 / 제거 (비분리 접두사)"
    gender: null
    plural: null
    notes:
      en: "Always inseparable. entdecken (to discover), entscheiden (to decide), entstehen (to arise)"
      ko: "항상 비분리. entdecken (발견하다), entscheiden (결정하다), entstehen (발생하다)"
