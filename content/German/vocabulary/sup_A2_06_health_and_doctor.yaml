lesson: "sup_A2_Health_and_Doctor"
lesson_number: 126
cefr: A2
type: supplementary
topic: "Health and Doctor"
categories:
- id: symptome_und_krankheiten
  label:
    en: "Symptoms and Illnesses (Symptome/Krankheiten)"
    ko: "증상과 질병 (Symptome/Krankheiten)"
  type: vocabulary
  words:
  - german: "die Krankheit, -en"
    translation:
      en: "illness / disease"
      ko: "질병"
    gender: f
    notes:
      en: "krank sein = to be sick"
      ko: "krank sein = 아프다"
  - german: "die Erkältung, -en"
    translation:
      en: "cold (illness)"
      ko: "감기"
    gender: f
    notes:
      en: "sich erkälten = to catch a cold"
      ko: "sich erkälten = 감기에 걸리다"
  - german: "die Grippe, -n"
    translation:
      en: "flu / influenza"
      ko: "독감"
    gender: f
    notes:
      en: "die Grippeimpfung = flu shot"
      ko: "die Grippeimpfung = 독감 예방접종"
  - german: "das Fieber"
    translation:
      en: "fever"
      ko: "열"
    gender: n
    notes:
      en: "Fieber haben = to have a fever; Fieber messen = to take temperature"
      ko: "Fieber haben = 열이 있다; Fieber messen = 체온을 재다"
  - german: "der Husten"
    translation:
      en: "cough"
      ko: "기침"
    gender: m
    notes:
      en: "husten = to cough"
      ko: "husten = 기침하다"
  - german: "der Schnupfen"
    translation:
      en: "runny nose / cold"
      ko: "콧물 / 코감기"
    gender: m
    notes:
      en: "Schnupfen haben = to have a runny nose"
      ko: "Schnupfen haben = 콧물이 나다"
  - german: "die Halsschmerzen (pl.)"
    translation:
      en: "sore throat"
      ko: "인후통"
    gender: null
    notes:
      en: "Ich habe Halsschmerzen = I have a sore throat"
      ko: "Ich habe Halsschmerzen = 목이 아파요"
  - german: "die Kopfschmerzen (pl.)"
    translation:
      en: "headache"
      ko: "두통"
    gender: null
    notes:
      en: "die Migräne = migraine"
      ko: "die Migräne = 편두통"
  - german: "die Bauchschmerzen (pl.)"
    translation:
      en: "stomachache"
      ko: "복통"
    gender: null
    notes:
      en: "Magenschmerzen = stomach pain (more specific)"
      ko: "Magenschmerzen = 위통 (더 구체적)"
  - german: "die Rückenschmerzen (pl.)"
    translation:
      en: "back pain"
      ko: "요통 / 허리 통증"
    gender: null
    notes:
      en: "Very common complaint in Germany"
      ko: "독일에서 매우 흔한 증상"
  - german: "die Zahnschmerzen (pl.)"
    translation:
      en: "toothache"
      ko: "치통"
    gender: null
    notes:
      en: "zum Zahnarzt gehen = to go to the dentist"
      ko: "zum Zahnarzt gehen = 치과에 가다"
  - german: "der Schmerz, -en"
    translation:
      en: "pain"
      ko: "통증"
    gender: m
    notes:
      en: "Schmerzen haben = to be in pain"
      ko: "Schmerzen haben = 통증이 있다"
  - german: "der Durchfall"
    translation:
      en: "diarrhea"
      ko: "설사"
    gender: m
    notes:
      en: "Durchfall haben = to have diarrhea"
      ko: "Durchfall haben = 설사를 하다"
  - german: "die Übelkeit"
    translation:
      en: "nausea"
      ko: "메스꺼움"
    gender: f
    notes:
      en: "Mir ist übel = I feel nauseous"
      ko: "Mir ist übel = 메스꺼워요"
  - german: "sich erbrechen"
    translation:
      en: "to vomit"
      ko: "구토하다"
    gender: null
    notes:
      en: "Also colloquial: sich übergeben"
      ko: "구어체: sich übergeben"
  - german: "der Ausschlag, Ausschläge"
    translation:
      en: "rash"
      ko: "발진"
    gender: m
    notes:
      en: "einen Ausschlag bekommen = to get a rash"
      ko: "einen Ausschlag bekommen = 발진이 생기다"
  - german: "der Schwindel"
    translation:
      en: "dizziness"
      ko: "어지러움"
    gender: m
    notes:
      en: "Mir ist schwindelig = I feel dizzy"
      ko: "Mir ist schwindelig = 어지러워요"
  - german: "die Entzündung, -en"
    translation:
      en: "inflammation / infection"
      ko: "염증"
    gender: f
    notes:
      en: "die Halsentzündung = throat infection"
      ko: "die Halsentzündung = 인후 염증"
  - german: "die Allergie, -n"
    translation:
      en: "allergy"
      ko: "알레르기"
    gender: f
    notes:
      en: "allergisch gegen = allergic to"
      ko: "allergisch gegen = ~에 알레르기가 있는"
  - german: "niesen"
    translation:
      en: "to sneeze"
      ko: "재채기하다"
    gender: null
    notes:
      en: "Gesundheit! = Bless you! (said after sneezing)"
      ko: "Gesundheit! = (재채기 후에 하는 말)"
  - german: "die Ohrenschmerzen (pl.)"
    translation:
      en: "earache"
      ko: "귀 통증"
    gender: null
    notes:
      en: "Ohrenschmerzen haben = to have an earache"
      ko: "Ohrenschmerzen haben = 귀가 아프다"
  - german: "die Verstopfung"
    translation:
      en: "constipation"
      ko: "변비"
    gender: f
    notes:
      en: "an Verstopfung leiden = to suffer from constipation"
      ko: "an Verstopfung leiden = 변비를 앓다"
  - german: "die Blutung, -en"
    translation:
      en: "bleeding"
      ko: "출혈"
    gender: f
    notes:
      en: "die Nasenblutung = nosebleed"
      ko: "die Nasenblutung = 코피"
  - german: "die Schwellung, -en"
    translation:
      en: "swelling"
      ko: "부기"
    gender: f
    notes:
      en: "anschwellen = to swell up"
      ko: "anschwellen = 붓다"
  - german: "der Sonnenbrand"
    translation:
      en: "sunburn"
      ko: "햇볕에 탐"
    gender: m
    notes:
      en: "einen Sonnenbrand haben = to have a sunburn"
      ko: "einen Sonnenbrand haben = 햇볕에 탔다"
  - german: "die Prellung, -en"
    translation:
      en: "bruise / contusion"
      ko: "타박상"
    gender: f
    notes:
      en: "eine Prellung am Knie = a bruised knee"
      ko: "eine Prellung am Knie = 무릎 타박상"
  - german: "die Verstauchung, -en"
    translation:
      en: "sprain"
      ko: "염좌"
    gender: f
    notes:
      en: "den Knöchel verstauchen = to sprain the ankle"
      ko: "den Knöchel verstauchen = 발목을 삐다"
  - german: "der Insektenstich, -e"
    translation:
      en: "insect bite / sting"
      ko: "벌레 물림"
    gender: m
    notes:
      en: "der Mückenstich = mosquito bite; der Bienenstich = bee sting"
      ko: "der Mückenstich = 모기에 물림; der Bienenstich = 벌에 쏘임"
  - german: "die Lebensmittelvergiftung, -en"
    translation:
      en: "food poisoning"
      ko: "식중독"
    gender: f
    notes:
      en: "sich eine Lebensmittelvergiftung zuziehen"
      ko: "식중독에 걸리다"
  - german: "der Bruch, Brüche"
    translation:
      en: "fracture / break"
      ko: "골절"
    gender: m
    notes:
      en: "der Knochenbruch = bone fracture"
      ko: "der Knochenbruch = 골절"
  - german: "die Müdigkeit"
    translation:
      en: "tiredness / fatigue"
      ko: "피로 / 졸림"
    gender: f
    notes:
      en: "ständige Müdigkeit = chronic fatigue"
      ko: "ständige Müdigkeit = 만성 피로"

- id: beim_arzt
  label:
    en: "At the Doctor (beim Arzt)"
    ko: "병원에서 (beim Arzt)"
  type: vocabulary
  words:
  - german: "der Arzt, Ärzte"
    translation:
      en: "doctor"
      ko: "의사"
    gender: m
    notes:
      en: "die Ärztin = female doctor"
      ko: "die Ärztin = 여의사"
  - german: "der Hausarzt, Hausärzte"
    translation:
      en: "general practitioner (GP)"
      ko: "가정의 / 주치의"
    gender: m
    notes:
      en: "First point of contact for health issues"
      ko: "건강 문제의 첫 번째 상담 대상"
  - german: "der Facharzt, Fachärzte"
    translation:
      en: "specialist (doctor)"
      ko: "전문의"
    gender: m
    notes:
      en: "Usually needs a referral from Hausarzt"
      ko: "보통 가정의의 의뢰서가 필요함"
  - german: "die Praxis, Praxen"
    translation:
      en: "doctor's office / practice"
      ko: "진료소 / 병원"
    gender: f
    notes:
      en: "die Arztpraxis = doctor's office"
      ko: "die Arztpraxis = 의원"
  - german: "der Termin, -e"
    translation:
      en: "appointment"
      ko: "예약 / 진료 예약"
    gender: m
    notes:
      en: "einen Termin vereinbaren = to make an appointment"
      ko: "einen Termin vereinbaren = 예약을 잡다"
  - german: "das Wartezimmer, -"
    translation:
      en: "waiting room"
      ko: "대기실"
    gender: n
    notes:
      en: "im Wartezimmer warten = to wait in the waiting room"
      ko: "im Wartezimmer warten = 대기실에서 기다리다"
  - german: "die Untersuchung, -en"
    translation:
      en: "examination"
      ko: "검사 / 진찰"
    gender: f
    notes:
      en: "die Vorsorgeuntersuchung = preventive checkup"
      ko: "die Vorsorgeuntersuchung = 예방 검진"
  - german: "die Diagnose, -n"
    translation:
      en: "diagnosis"
      ko: "진단"
    gender: f
    notes:
      en: "eine Diagnose stellen = to make a diagnosis"
      ko: "eine Diagnose stellen = 진단을 내리다"
  - german: "die Krankenversicherung, -en"
    translation:
      en: "health insurance"
      ko: "건강 보험"
    gender: f
    notes:
      en: "Mandatory in Germany (gesetzlich or privat)"
      ko: "독일에서 의무 (법정 또는 민간)"
  - german: "die Versichertenkarte, -n"
    translation:
      en: "insurance card"
      ko: "보험 카드"
    gender: f
    notes:
      en: "Must be presented at every doctor visit"
      ko: "매 진료 시 제시해야 함"
  - german: "das Rezept, -e"
    translation:
      en: "prescription"
      ko: "처방전"
    gender: n
    notes:
      en: "ein Rezept ausstellen = to write a prescription"
      ko: "ein Rezept ausstellen = 처방전을 발급하다"
  - german: "die Krankschreibung, -en"
    translation:
      en: "sick note"
      ko: "진단서 / 병가 증명서"
    gender: f
    notes:
      en: "Needed for employer after 3 days of illness"
      ko: "3일 이상 질병 시 고용주에게 필요"
  - german: "die Sprechstunde, -n"
    translation:
      en: "office hours / consultation hours"
      ko: "진료 시간"
    gender: f
    notes:
      en: "die Sprechstunde des Arztes = doctor's office hours"
      ko: "die Sprechstunde des Arztes = 의사의 진료 시간"
  - german: "untersuchen"
    translation:
      en: "to examine"
      ko: "진찰하다 / 검사하다"
    gender: null
    notes:
      en: "Der Arzt untersucht den Patienten"
      ko: "의사가 환자를 진찰하다"
  - german: "der Patient, -en"
    translation:
      en: "patient"
      ko: "환자"
    gender: m
    notes:
      en: "die Patientin = female patient"
      ko: "die Patientin = 여성 환자"
  - german: "der Blutdruck"
    translation:
      en: "blood pressure"
      ko: "혈압"
    gender: m
    notes:
      en: "den Blutdruck messen = to measure blood pressure"
      ko: "den Blutdruck messen = 혈압을 재다"
  - german: "der Überweisungsschein, -e"
    translation:
      en: "referral form"
      ko: "의뢰서"
    gender: m
    notes:
      en: "eine Überweisung zum Facharzt = a referral to a specialist"
      ko: "eine Überweisung zum Facharzt = 전문의에게 의뢰"
  - german: "der Zahnarzt, Zahnärzte"
    translation:
      en: "dentist"
      ko: "치과 의사"
    gender: m
    notes:
      en: "die Zahnärztin = female dentist"
      ko: "die Zahnärztin = 여성 치과 의사"
  - german: "der Augenarzt, Augenärzte"
    translation:
      en: "eye doctor / ophthalmologist"
      ko: "안과 의사"
    gender: m
    notes:
      en: "die Brille = glasses; die Kontaktlinse = contact lens"
      ko: "die Brille = 안경; die Kontaktlinse = 콘택트렌즈"
  - german: "die Behandlung, -en"
    translation:
      en: "treatment"
      ko: "치료"
    gender: f
    notes:
      en: "eine Behandlung bekommen = to receive treatment"
      ko: "eine Behandlung bekommen = 치료를 받다"
  - german: "die Sprechstundenhilfe, -n"
    translation:
      en: "medical receptionist"
      ko: "의원 접수원"
    gender: f
    notes:
      en: "Also die medizinische Fachangestellte (MFA)"
      ko: "die medizinische Fachangestellte (MFA)라고도 함"
  - german: "das Stethoskop, -e"
    translation:
      en: "stethoscope"
      ko: "청진기"
    gender: n
    notes:
      en: "das Herz abhören = to listen to the heart"
      ko: "das Herz abhören = 심장 소리를 듣다"
  - german: "die Blutprobe, -n"
    translation:
      en: "blood test / blood sample"
      ko: "혈액 검사"
    gender: f
    notes:
      en: "Blut abnehmen = to draw blood"
      ko: "Blut abnehmen = 채혈하다"
  - german: "die Röntgenaufnahme, -n"
    translation:
      en: "X-ray image"
      ko: "엑스레이 사진"
    gender: f
    notes:
      en: "eine Röntgenaufnahme machen = to take an X-ray"
      ko: "eine Röntgenaufnahme machen = 엑스레이를 찍다"
  - german: "der Kinderarzt, Kinderärzte"
    translation:
      en: "pediatrician"
      ko: "소아과 의사"
    gender: m
    notes:
      en: "die Kinderärztin = female pediatrician"
      ko: "die Kinderärztin = 여성 소아과 의사"
  - german: "der Orthopäde, -n"
    translation:
      en: "orthopedist"
      ko: "정형외과 의사"
    gender: m
    notes:
      en: "bei Knochen- und Gelenkproblemen = for bone and joint issues"
      ko: "뼈와 관절 문제에 대해"
  - german: "die Ultraschalluntersuchung, -en"
    translation:
      en: "ultrasound examination"
      ko: "초음파 검사"
    gender: f
    notes:
      en: "der Ultraschall = ultrasound"
      ko: "der Ultraschall = 초음파"
  - german: "der Befund, -e"
    translation:
      en: "findings / test results"
      ko: "검사 결과"
    gender: m
    notes:
      en: "der Laborbefund = lab results"
      ko: "der Laborbefund = 검사 결과"
  - german: "die Krankmeldung, -en"
    translation:
      en: "sick notification"
      ko: "병가 신고"
    gender: f
    notes:
      en: "sich krankmelden = to call in sick"
      ko: "sich krankmelden = 병가를 내다"
  - german: "die Physiotherapie"
    translation:
      en: "physiotherapy / physical therapy"
      ko: "물리치료"
    gender: f
    notes:
      en: "der Physiotherapeut = physiotherapist"
      ko: "der Physiotherapeut = 물리치료사"

- id: apotheke_und_medikamente
  label:
    en: "Pharmacy and Medication (Apotheke/Medikamente)"
    ko: "약국과 약 (Apotheke/Medikamente)"
  type: vocabulary
  words:
  - german: "die Apotheke, -n"
    translation:
      en: "pharmacy"
      ko: "약국"
    gender: f
    notes:
      en: "der Apotheker / die Apothekerin = pharmacist"
      ko: "der Apotheker / die Apothekerin = 약사"
  - german: "das Medikament, -e"
    translation:
      en: "medication / medicine"
      ko: "약 / 의약품"
    gender: n
    notes:
      en: "Medikamente einnehmen = to take medication"
      ko: "Medikamente einnehmen = 약을 복용하다"
  - german: "die Tablette, -n"
    translation:
      en: "tablet / pill"
      ko: "알약"
    gender: f
    notes:
      en: "eine Tablette nehmen = to take a pill"
      ko: "eine Tablette nehmen = 알약을 먹다"
  - german: "die Salbe, -n"
    translation:
      en: "ointment / cream"
      ko: "연고"
    gender: f
    notes:
      en: "eine Salbe auftragen = to apply ointment"
      ko: "eine Salbe auftragen = 연고를 바르다"
  - german: "der Sirup, -e"
    translation:
      en: "syrup"
      ko: "시럽"
    gender: m
    notes:
      en: "der Hustensaft / Hustensirup = cough syrup"
      ko: "der Hustensaft / Hustensirup = 기침 시럽"
  - german: "die Tropfen (pl.)"
    translation:
      en: "drops"
      ko: "드롭 / 점안액"
    gender: null
    notes:
      en: "die Augentropfen = eye drops; die Nasentropfen = nose drops"
      ko: "die Augentropfen = 안약; die Nasentropfen = 코 점비약"
  - german: "das Pflaster, -"
    translation:
      en: "bandage / band-aid"
      ko: "반창고"
    gender: n
    notes:
      en: "ein Pflaster aufkleben = to put on a band-aid"
      ko: "ein Pflaster aufkleben = 반창고를 붙이다"
  - german: "die Spritze, -n"
    translation:
      en: "injection / syringe"
      ko: "주사"
    gender: f
    notes:
      en: "eine Spritze bekommen = to get an injection"
      ko: "eine Spritze bekommen = 주사를 맞다"
  - german: "das Schmerzmittel, -"
    translation:
      en: "painkiller"
      ko: "진통제"
    gender: n
    notes:
      en: "Ibuprofen and Paracetamol are common in Germany"
      ko: "이부프로펜과 파라세타몰이 독일에서 일반적"
  - german: "das Antibiotikum, Antibiotika"
    translation:
      en: "antibiotic"
      ko: "항생제"
    gender: n
    notes:
      en: "Only available by prescription in Germany"
      ko: "독일에서 처방전으로만 구입 가능"
  - german: "die Nebenwirkung, -en"
    translation:
      en: "side effect"
      ko: "부작용"
    gender: f
    notes:
      en: "den Beipackzettel lesen = to read the package insert"
      ko: "den Beipackzettel lesen = 약 설명서를 읽다"
  - german: "rezeptfrei"
    translation:
      en: "over-the-counter (without prescription)"
      ko: "비처방 / 일반의약품"
    gender: null
    notes:
      en: "rezeptpflichtig = prescription-required"
      ko: "rezeptpflichtig = 처방전 필요"
  - german: "die Impfung, -en"
    translation:
      en: "vaccination"
      ko: "예방접종"
    gender: f
    notes:
      en: "sich impfen lassen = to get vaccinated"
      ko: "sich impfen lassen = 예방접종을 받다"
  - german: "das Fieberthermometer, -"
    translation:
      en: "thermometer"
      ko: "체온계"
    gender: n
    notes:
      en: "die Temperatur messen = to take temperature"
      ko: "die Temperatur messen = 체온을 재다"
  - german: "das Nasenspray, -s"
    translation:
      en: "nasal spray"
      ko: "코 스프레이"
    gender: n
    notes:
      en: "das Nasenspray benutzen = to use nasal spray"
      ko: "das Nasenspray benutzen = 코 스프레이를 사용하다"
  - german: "die Wärmflasche, -n"
    translation:
      en: "hot water bottle"
      ko: "핫워터 보틀"
    gender: f
