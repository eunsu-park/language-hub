topic: "Travel and Transportation"
categories:
- id: flughafen_und_reise
  label:
    en: "Airport and Travel (Flughafen/Reise)"
    ko: "공항과 여행 (Flughafen/Reise)"
  type: vocabulary
  words:
  - german: "der Flughafen, Flughäfen"
    translation:
      en: "airport"
      ko: "공항"
    gender: m
    notes:
      en: "Compound: Flug (flight) + Hafen (port)"
      ko: "합성어: Flug (비행) + Hafen (항구)"
  - german: "das Flugzeug, -e"
    translation:
      en: "airplane"
      ko: "비행기"
    gender: n
    notes:
      en: "Compound: Flug (flight) + Zeug (thing/stuff)"
      ko: "합성어: Flug (비행) + Zeug (물건)"
  - german: "der Flug, Flüge"
    translation:
      en: "flight"
      ko: "항공편"
    gender: m
    notes:
      en: "der Hin- und Rückflug = round-trip flight"
      ko: "der Hin- und Rückflug = 왕복 항공편"
  - german: "die Bordkarte, -n"
    translation:
      en: "boarding pass"
      ko: "탑승권"
    gender: f
    notes:
      en: "Must be shown before boarding the plane"
      ko: "비행기 탑승 전에 제시해야 함"
  - german: "der Reisepass, Reisepässe"
    translation:
      en: "passport"
      ko: "여권"
    gender: m
    notes:
      en: "Required for international travel"
      ko: "해외여행 시 필수"
  - german: "das Visum, Visa"
    translation:
      en: "visa"
      ko: "비자"
    gender: n
    notes:
      en: "Plural is Latin: Visa"
      ko: "복수형은 라틴어식: Visa"
  - german: "der Koffer, -"
    translation:
      en: "suitcase"
      ko: "여행 가방"
    gender: m
    notes:
      en: "den Koffer packen = to pack the suitcase"
      ko: "den Koffer packen = 가방을 싸다"
  - german: "das Gepäck"
    translation:
      en: "luggage / baggage"
      ko: "짐 / 수하물"
    gender: n
    notes:
      en: "No plural form; das Handgepäck = carry-on"
      ko: "복수형 없음; das Handgepäck = 기내 수하물"
  - german: "die Passkontrolle, -n"
    translation:
      en: "passport control"
      ko: "출입국 심사"
    gender: f
    notes:
      en: "Also called 'die Grenzkontrolle' at borders"
      ko: "국경에서는 'die Grenzkontrolle'라고도 함"
  - german: "der Zoll, Zölle"
    translation:
      en: "customs"
      ko: "세관"
    gender: m
    notes:
      en: "zollfrei = duty-free"
      ko: "zollfrei = 면세"
  - german: "die Abfahrt, -en"
    translation:
      en: "departure"
      ko: "출발"
    gender: f
    notes:
      en: "Used for trains and buses; die Abflughalle for flights"
      ko: "기차와 버스에 사용; 비행기는 die Abflughalle"
  - german: "die Ankunft, Ankünfte"
    translation:
      en: "arrival"
      ko: "도착"
    gender: f
    notes:
      en: "die Ankunftszeit = arrival time"
      ko: "die Ankunftszeit = 도착 시간"
  - german: "die Verspätung, -en"
    translation:
      en: "delay"
      ko: "지연 / 연착"
    gender: f
    notes:
      en: "Der Zug hat Verspätung = The train is delayed"
      ko: "Der Zug hat Verspätung = 기차가 연착이다"
  - german: "die Reise, -n"
    translation:
      en: "trip / journey"
      ko: "여행"
    gender: f
    notes:
      en: "Gute Reise! = Have a good trip!"
      ko: "Gute Reise! = 좋은 여행 되세요!"
  - german: "der Rucksack, Rucksäcke"
    translation:
      en: "backpack"
      ko: "배낭"
    gender: m
    notes:
      en: "Compound: Rücken (back) + Sack (bag)"
      ko: "합성어: Rücken (등) + Sack (자루)"
  - german: "buchen"
    translation:
      en: "to book / to reserve"
      ko: "예약하다"
    gender: null
    notes:
      en: "einen Flug buchen = to book a flight"
      ko: "einen Flug buchen = 항공편을 예약하다"
  - german: "umsteigen"
    translation:
      en: "to transfer / to change (transport)"
      ko: "환승하다"
    gender: null
    notes:
      en: "Separable verb: Ich steige in München um"
      ko: "분리 동사: Ich steige in München um"
  - german: "landen"
    translation:
      en: "to land"
      ko: "착륙하다"
    gender: null
    notes:
      en: "die Landung = the landing"
      ko: "die Landung = 착륙"
  - german: "abfliegen"
    translation:
      en: "to depart (by plane)"
      ko: "이륙하다 / 출발하다"
    gender: null
    notes:
      en: "Separable: Das Flugzeug fliegt um 10 Uhr ab"
      ko: "분리 동사: Das Flugzeug fliegt um 10 Uhr ab"
  - german: "das Gate, -s"
    translation:
      en: "gate (at airport)"
      ko: "탑승구"
    gender: n
    notes:
      en: "English loanword commonly used in German airports"
      ko: "독일 공항에서 흔히 사용되는 영어 차용어"
  - german: "die Sicherheitskontrolle, -n"
    translation:
      en: "security check"
      ko: "보안 검색"
    gender: f
    notes:
      en: "Mandatory before entering the departure area"
      ko: "출발 구역 진입 전 필수"
  - german: "der Fensterplatz, -plätze"
    translation:
      en: "window seat"
      ko: "창가 좌석"
    gender: m
    notes:
      en: "der Gangplatz = aisle seat"
      ko: "der Gangplatz = 통로 좌석"
  - german: "einchecken"
    translation:
      en: "to check in"
      ko: "체크인하다"
    gender: null
    notes:
      en: "der Online-Check-in = online check-in"
      ko: "der Online-Check-in = 온라인 체크인"
  - german: "die Wartehalle, -n"
    translation:
      en: "departure lounge / waiting hall"
      ko: "대합실"
    gender: f
    notes:
      en: "in der Wartehalle sitzen = to sit in the lounge"
      ko: "in der Wartehalle sitzen = 대합실에 앉아 있다"
  - german: "das Gepäckband, -bänder"
    translation:
      en: "baggage carousel"
      ko: "수하물 컨베이어"
    gender: n
    notes:
      en: "am Gepäckband warten = to wait at the carousel"
      ko: "am Gepäckband warten = 수하물 컨베이어에서 기다리다"
  - german: "der Transitbereich, -e"
    translation:
      en: "transit area"
      ko: "환승 구역"
    gender: m
    notes:
      en: "im Transitbereich bleiben = to stay in the transit area"
      ko: "im Transitbereich bleiben = 환승 구역에 머무르다"
  - german: "der Direktflug, -flüge"
    translation:
      en: "direct flight"
      ko: "직항편"
    gender: m
    notes:
      en: "Es gibt einen Direktflug = There is a direct flight"
      ko: "Es gibt einen Direktflug = 직항편이 있다"
  - german: "die Turbulenz, -en"
    translation:
      en: "turbulence"
      ko: "난기류"
    gender: f
    notes:
      en: "Bitte anschnallen bei Turbulenzen"
      ko: "난기류 시 안전벨트를 매주세요"
  - german: "der Gurt, -e"
    translation:
      en: "seatbelt"
      ko: "안전벨트"
    gender: m
    notes:
      en: "den Gurt anlegen = to fasten the seatbelt"
      ko: "den Gurt anlegen = 안전벨트를 매다"
  - german: "die Notlandung, -en"
    translation:
      en: "emergency landing"
      ko: "비상 착륙"
    gender: f
    notes:
      en: "eine Notlandung machen = to make an emergency landing"
      ko: "eine Notlandung machen = 비상 착륙을 하다"
  - german: "der Zwischenstopp, -s"
    translation:
      en: "stopover / layover"
      ko: "경유"
    gender: m
    notes:
      en: "mit Zwischenstopp in Frankfurt = with a layover in Frankfurt"
      ko: "mit Zwischenstopp in Frankfurt = 프랑크푸르트 경유"

