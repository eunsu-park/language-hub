lesson: 22_Writing_in_German
lesson_number: 22
cefr: B2
categories:
- id: 1_letter_and_email_vocabulary
  label:
    en: 1. Letter and Email Vocabulary
    ko: 1. 편지 및 이메일 어휘
  type: vocabulary
  words:
  - german: der Absender, -
    translation:
      en: sender
      ko: 발신인
    gender: m
    plural: die Absender
  - german: der Empfänger, -
    translation:
      en: recipient
      ko: 수신인
    gender: m
    plural: die Empfänger
  - german: der Betreff
    translation:
      en: subject (line)
      ko: 제목
    gender: m
    plural: null
  - german: die Anrede
    translation:
      en: salutation / greeting
      ko: 인사말
    gender: f
    plural: null
  - german: die Grußformel, -n
    translation:
      en: closing formula / sign-off
      ko: 맺음말
    gender: f
    plural: die Grußformeln
  - german: die Anlage, -n
    translation:
      en: attachment / enclosure
      ko: 첨부
    gender: f
    plural: die Anlagen
  - german: die Rückmeldung, -en
    translation:
      en: feedback / response
      ko: 회신 / 피드백
    gender: f
    plural: die Rückmeldungen
  - german: Sehr geehrte Damen und Herren
    translation:
      en: Dear Sir or Madam (formal greeting)
      ko: 귀하 (공식 인사)
    gender: null
    plural: null
  - german: Mit freundlichen Grüßen
    translation:
      en: Yours sincerely / Best regards (formal closing)
      ko: 경의를 표하며 (공식 맺음말)
    gender: null
    plural: null
  - german: Bezug nehmend auf
    translation:
      en: with reference to (formal)
      ko: ~에 관하여 (공식)
    gender: null
    plural: null
    notes:
      en: "Bezug nehmend auf Ihr Schreiben vom 5. März..."
      ko: "3월 5일자 귀하의 서신과 관련하여..."
  - german: im Anhang finden Sie
    translation:
      en: please find attached
      ko: 첨부 파일에서 확인하시기 바랍니다
    gender: null
    plural: null
    notes:
      en: Common formal email phrase for enclosing documents.
      ko: 문서 첨부 시 사용하는 공식 이메일 표현.
  - german: Ich möchte Sie darauf hinweisen, dass...
    translation:
      en: I would like to draw your attention to the fact that...
      ko: ~라는 점을 알려드리고자 합니다
    gender: null
    plural: null
  - german: Für Rückfragen stehe ich Ihnen gerne zur Verfügung.
    translation:
      en: I am at your disposal for any questions.
      ko: 궁금하신 점이 있으시면 언제든 연락해 주십시오.
    gender: null
    plural: null
  - german: die Betreffzeile, -n
    translation:
      en: subject line
      ko: 제목 줄
    gender: f
    plural: die Betreffzeilen
  - german: die Unterschrift, -en
    translation:
      en: signature
      ko: 서명
    gender: f
    plural: die Unterschriften

