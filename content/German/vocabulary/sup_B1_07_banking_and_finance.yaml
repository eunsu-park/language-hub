  - german: "die Steuer, -n"
    translation:
      en: "tax"
      ko: "세금"
    gender: f
    notes:
      en: "Steuern zahlen = to pay taxes"
      ko: "Steuern zahlen = 세금을 내다"
  - german: "die Einkommensteuer"
    translation:
      en: "income tax"
      ko: "소득세"
    gender: f
    notes:
      en: "die Einkommensteuererklärung = income tax return"
      ko: "die Einkommensteuererklärung = 소득세 신고서"
  - german: "die Mehrwertsteuer (MwSt.)"
    translation:
      en: "value-added tax (VAT)"
      ko: "부가가치세"
    gender: f
    notes:
      en: "19% MwSt. in Deutschland = 19% VAT in Germany"
      ko: "19% MwSt. in Deutschland = 독일의 19% 부가가치세"
  - german: "die Lohnsteuer"
    translation:
      en: "wage tax / payroll tax"
      ko: "근로 소득세"
    gender: f
    notes:
      en: "die Lohnsteuer wird vom Arbeitgeber einbehalten"
      ko: "근로 소득세는 고용주가 원천징수한다"
  - german: "die Steuererklärung, -en"
    translation:
      en: "tax return / tax declaration"
      ko: "세금 신고서"
    gender: f
    notes:
      en: "die Steuererklärung abgeben = to submit a tax return"
      ko: "die Steuererklärung abgeben = 세금 신고서를 제출하다"
  - german: "das Finanzamt, -ämter"
    translation:
      en: "tax office"
      ko: "세무서"
    gender: n
    notes:
      en: "beim Finanzamt melden = to register with the tax office"
      ko: "beim Finanzamt melden = 세무서에 신고하다"
  - german: "der Steuerbescheid, -e"
    translation:
      en: "tax assessment notice"
      ko: "세금 고지서"
    gender: m
    notes:
      en: "den Steuerbescheid prüfen = to review the tax assessment"
      ko: "den Steuerbescheid prüfen = 세금 고지서를 확인하다"
  - german: "die Steuerklasse, -n"
    translation:
      en: "tax bracket / tax class"
      ko: "세금 등급"
    gender: f
    notes:
      en: "die Steuerklasse wechseln = to change tax class"
      ko: "die Steuerklasse wechseln = 세금 등급을 변경하다"
  - german: "der Freibetrag, -beträge"
    translation:
      en: "tax-free allowance"
      ko: "비과세 공제액"
    gender: m
    notes:
      en: "der Grundfreibetrag = basic tax-free allowance"
      ko: "der Grundfreibetrag = 기본 비과세 공제액"
  - german: "die Absetzbarkeit"
    translation:
      en: "tax deductibility"
      ko: "세금 공제 가능성"
    gender: f
    notes:
      en: "steuerlich absetzbar = tax-deductible"
      ko: "steuerlich absetzbar = 세금 공제 가능한"
  - german: "die Kirchensteuer"
    translation:
      en: "church tax"
      ko: "교회세"
    gender: f
    notes:
      en: "8-9% der Einkommensteuer"
      ko: "소득세의 8-9%"
  - german: "der Solidaritätszuschlag"
    translation:
      en: "solidarity surcharge"
      ko: "통일 부담금"
    gender: m
    notes:
      en: "seit 2021 für die meisten Bürger abgeschafft"
      ko: "2021년부터 대부분의 시민에게 폐지"
  - german: "die Abgabe, -n"
    translation:
      en: "levy / contribution"
      ko: "공과금 / 부담금"
    gender: f
    notes:
      en: "Steuern und Abgaben = taxes and levies"
      ko: "Steuern und Abgaben = 세금과 공과금"
  - german: "der Steuerberater, -"
    translation:
      en: "tax advisor"
      ko: "세무사"
    gender: m
    notes:
      en: "die Steuerberaterin = female tax advisor"
      ko: "die Steuerberaterin = 여성 세무사"
  - german: "die Kapitalertragssteuer"
    translation:
      en: "capital gains tax"
      ko: "자본이득세"
    gender: f
    notes:
      en: "25% Abgeltungsteuer = 25% flat rate withholding tax"
      ko: "25% Abgeltungsteuer = 25% 정률 원천세"
  - german: "die Erbschaftsteuer"
    translation:
      en: "inheritance tax"
      ko: "상속세"
    gender: f
    notes:
      en: "der Erbschaftsteuerfreibetrag = inheritance tax allowance"
      ko: "der Erbschaftsteuerfreibetrag = 상속세 비과세 한도"
  - german: "die Grundsteuer"
    translation:
      en: "property tax"
      ko: "재산세"
    gender: f
    notes:
      en: "die Grundsteuerreform = property tax reform"
      ko: "die Grundsteuerreform = 재산세 개혁"
  - german: "der Steuerausgleich"
    translation:
      en: "tax refund / tax adjustment"
      ko: "세금 환급 / 조정"
    gender: m
    notes:
      en: "eine Steuererstattung bekommen = to receive a tax refund"
      ko: "eine Steuererstattung bekommen = 세금 환급을 받다"
  - german: "die Umsatzsteuer"
    translation:
      en: "sales tax / turnover tax"
      ko: "매출세"
    gender: f
    notes:
      en: "die Umsatzsteuervoranmeldung = VAT advance return"
      ko: "die Umsatzsteuervoranmeldung = 부가세 예정 신고"
  - german: "die Gewerbesteuer"
    translation:
      en: "trade tax / business tax"
      ko: "영업세"
    gender: f
    notes:
      en: "von Gewerbetreibenden gezahlt = paid by businesses"
      ko: "von Gewerbetreibenden gezahlt = 사업자가 납부"
  - german: "die Schwarzarbeit"
    translation:
      en: "undeclared work / moonlighting"
      ko: "불법 고용 / 무신고 노동"
    gender: f
    notes:
      en: "Schwarzarbeit ist illegal = undeclared work is illegal"
      ko: "Schwarzarbeit ist illegal = 무신고 노동은 불법이다"
  - german: "die Beitragsbemessungsgrenze"
    translation:
      en: "contribution assessment ceiling"
      ko: "보험료 산정 상한"
    gender: f
    notes:
      en: "Obergrenze für Sozialversicherungsbeiträge"
      ko: "사회보험료의 상한선"
  - german: "versteuern"
    translation:
      en: "to pay tax on"
      ko: "세금을 내다"
    gender: null
    notes:
      en: "Einkünfte versteuern = to pay tax on income"
      ko: "Einkünfte versteuern = 소득에 세금을 내다"
  - german: "absetzen"
    translation:
      en: "to deduct (from taxes)"
      ko: "공제하다"
    gender: null
    notes:
      en: "Ausgaben von der Steuer absetzen = to deduct expenses from taxes"
      ko: "Ausgaben von der Steuer absetzen = 비용을 세금에서 공제하다"
  - german: "steuerfrei"
    translation:
      en: "tax-free"
      ko: "비과세"
    gender: null
    notes:
      en: "steuerfreie Einkünfte = tax-free income"
      ko: "steuerfreie Einkünfte = 비과세 소득"
  - german: "steuerpflichtig"
    translation:
      en: "taxable / liable to tax"
      ko: "과세 대상인"
    gender: null
    notes:
      en: "steuerpflichtiges Einkommen = taxable income"
      ko: "steuerpflichtiges Einkommen = 과세 소득"
  - german: "brutto"
    translation:
      en: "gross (before tax)"
      ko: "세전"
    gender: null
    notes:
      en: "das Bruttogehalt = gross salary"
      ko: "das Bruttogehalt = 세전 급여"
  - german: "netto"
    translation:
      en: "net (after tax)"
      ko: "세후"
    gender: null
    notes:
      en: "das Nettogehalt = net salary"
      ko: "das Nettogehalt = 세후 급여"
