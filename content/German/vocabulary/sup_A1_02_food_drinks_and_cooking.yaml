    gender: m
    notes:
      en: "die Kaffeepause = coffee break (very German tradition)"
      ko: "die Kaffeepause = 커피 휴식 (독일의 전통)"
  - german: "der Tee, -s"
    translation:
      en: "tea"
      ko: "차"
    gender: m
    notes:
      en: "Very popular in northern Germany (Ostfriesland)"
      ko: "북부 독일(동프리슬란트)에서 매우 인기"
  - german: "der Saft, Säfte"
    translation:
      en: "juice"
      ko: "주스"
    gender: m
    notes:
      en: "der Apfelsaft = apple juice (Germany's favorite)"
      ko: "der Apfelsaft = 사과 주스 (독일인이 가장 좋아하는 음료)"
  - german: "das Bier, -e"
    translation:
      en: "beer"
      ko: "맥주"
    gender: n
    notes:
      en: "Germany is famous for its Reinheitsgebot (beer purity law)"
      ko: "독일은 맥주순수령(Reinheitsgebot)으로 유명"
  - german: "der Wein, -e"
    translation:
      en: "wine"
      ko: "와인"
    gender: m
    notes:
      en: "Rotwein = red wine; Weißwein = white wine"
      ko: "Rotwein = 적포도주; Weißwein = 백포도주"
  - german: "die Limonade, -n"
    translation:
      en: "lemonade / soft drink"
      ko: "레모네이드 / 탄산음료"
    gender: f
    notes:
      en: "Often shortened to 'die Limo'"
      ko: "흔히 'die Limo'로 줄여 말함"
  - german: "die Cola"
    translation:
      en: "cola"
      ko: "콜라"
    gender: f
    notes:
      en: "die Apfelschorle is more popular in Germany"
      ko: "독일에서는 die Apfelschorle가 더 인기"
  - german: "das Mineralwasser"
    translation:
      en: "mineral water"
      ko: "미네랄워터 / 탄산수"
    gender: n
    notes:
      en: "Germans prefer sparkling water (mit Kohlensäure)"
      ko: "독일인들은 탄산수(mit Kohlensäure)를 선호함"
  - german: "der Kakao"
    translation:
      en: "cocoa / hot chocolate"
      ko: "코코아 / 핫초콜릿"
    gender: m
    notes:
      en: "Popular children's drink"
      ko: "아이들에게 인기 있는 음료"
  - german: "die Apfelschorle, -n"
    translation:
      en: "apple spritzer"
      ko: "사과 탄산음료"
    gender: f
    notes:
      en: "Uniquely German; apple juice mixed with sparkling water"
      ko: "독일 고유의 음료; 사과 주스와 탄산수를 섞은 것"
  - german: "der Orangensaft"
    translation:
      en: "orange juice"
      ko: "오렌지 주스"
    gender: m
    notes:
      en: "Commonly abbreviated as O-Saft"
      ko: "흔히 O-Saft로 줄여 말함"
  - german: "der Eistee"
    translation:
      en: "iced tea"
      ko: "아이스티"
    gender: m
    notes:
      en: "Very popular in summer"
      ko: "여름에 매우 인기 있음"
  - german: "der Espresso, Espressi"
    translation:
      en: "espresso"
      ko: "에스프레소"
    gender: m
    notes:
      en: "Italian loanword; common in German cafes"
      ko: "이탈리아어 차용어; 독일 카페에서 흔함"
  - german: "der Schnaps, Schnäpse"
    translation:
      en: "schnapps / spirits"
      ko: "슈납스 / 증류주"
    gender: m
    notes:
      en: "Strong spirit; various fruit flavors"
      ko: "독한 술; 다양한 과일 맛"
  - german: "der Glühwein"
    translation:
      en: "mulled wine"
      ko: "글뤼바인 (뜨거운 와인)"
    gender: m
    notes:
      en: "Popular at Christmas markets"
      ko: "크리스마스 마켓에서 인기 있는 음료"
  - german: "die Schorle, -n"
    translation:
      en: "spritzer (juice + sparkling water)"
      ko: "스프리처 (주스 + 탄산수)"
    gender: f
    notes:
      en: "Uniquely German way to dilute juice"
      ko: "주스를 희석하는 독일 고유의 방식"

- id: kochen_kueche
  label:
    en: "Cooking Verbs and Kitchen Items"
    ko: "요리 동사와 주방 용품"
  type: vocabulary
  words:
  - german: "kochen"
    translation:
      en: "to cook / to boil"
      ko: "요리하다 / 끓이다"
    gender: null
    notes:
      en: "Ich koche gern = I like to cook"
      ko: "Ich koche gern = 나는 요리하는 것을 좋아해"
  - german: "backen"
    translation:
      en: "to bake"
      ko: "굽다 (빵, 케이크)"
    gender: null
    notes:
      en: "der Bäcker = baker; die Bäckerei = bakery"
      ko: "der Bäcker = 제빵사; die Bäckerei = 빵집"
  - german: "braten"
    translation:
      en: "to fry / to roast"
      ko: "굽다 / 볶다"
    gender: null
    notes:
      en: "die Bratpfanne = frying pan"
      ko: "die Bratpfanne = 프라이팬"
  - german: "schneiden"
    translation:
      en: "to cut"
      ko: "자르다"
    gender: null
    notes:
      en: "Irregular: schneiden, schnitt, geschnitten"
      ko: "불규칙: schneiden, schnitt, geschnitten"
  - german: "rühren"
    translation:
      en: "to stir"
      ko: "젓다 / 섞다"
    gender: null
    notes:
      en: "das Rührei = scrambled eggs"
      ko: "das Rührei = 스크램블 에그"
  - german: "schälen"
    translation:
      en: "to peel"
      ko: "껍질을 벗기다"
    gender: null
    notes:
      en: "Kartoffeln schälen = to peel potatoes"
      ko: "Kartoffeln schälen = 감자 껍질을 벗기다"
  - german: "würzen"
    translation:
      en: "to season / to spice"
      ko: "양념하다"
    gender: null
    notes:
      en: "das Gewürz = spice"
      ko: "das Gewürz = 양념 / 향신료"
  - german: "grillen"
    translation:
      en: "to grill / to barbecue"
      ko: "굽다 (그릴)"
    gender: null
    notes:
      en: "Germans love grilling in summer"
      ko: "독일인들은 여름에 그릴 요리를 좋아함"
  - german: "mischen"
    translation:
      en: "to mix"
      ko: "섞다"
    gender: null
    notes:
      en: "die Mischung = mixture"
      ko: "die Mischung = 혼합물"
  - german: "gießen"
    translation:
      en: "to pour"
      ko: "붓다"
    gender: null
    notes:
      en: "Also: to water plants"
      ko: "또한: 식물에 물을 주다"
  - german: "der Topf, Töpfe"
    translation:
      en: "pot"
      ko: "냄비"
    gender: m
    notes:
      en: "der Kochtopf = cooking pot"
      ko: "der Kochtopf = 요리용 냄비"
  - german: "die Pfanne, -n"
    translation:
      en: "pan / frying pan"
      ko: "프라이팬"
    gender: f
    notes:
      en: "die Bratpfanne = frying pan specifically"
      ko: "die Bratpfanne = 프라이팬 (구체적)"
  - german: "das Messer, -"
    translation:
      en: "knife"
      ko: "칼"
    gender: n
    notes:
      en: "das Küchenmesser = kitchen knife"
      ko: "das Küchenmesser = 부엌칼"
  - german: "die Gabel, -n"
    translation:
      en: "fork"
      ko: "포크"
    gender: f
    notes:
      en: "Part of das Besteck (cutlery set)"
      ko: "das Besteck (식기 세트)의 일부"
  - german: "der Löffel, -"
    translation:
      en: "spoon"
      ko: "숟가락"
    gender: m
    notes:
      en: "der Teelöffel = teaspoon; der Esslöffel = tablespoon"
      ko: "der Teelöffel = 찻숟가락; der Esslöffel = 밥숟가락"
  - german: "der Teller, -"
    translation:
      en: "plate"
      ko: "접시"
    gender: m
    notes:
      en: "der Suppenteller = soup plate"
      ko: "der Suppenteller = 수프 접시"
  - german: "die Tasse, -n"
    translation:
      en: "cup"
      ko: "컵 (찻잔)"
    gender: f
    notes:
      en: "eine Tasse Kaffee = a cup of coffee"
      ko: "eine Tasse Kaffee = 커피 한 잔"
  - german: "das Glas, Gläser"
    translation:
      en: "glass"
      ko: "유리잔"
    gender: n
    notes:
      en: "Also means glass (material)"
      ko: "유리 (재료)를 의미하기도 함"
  - german: "der Ofen, Öfen"
    translation:
      en: "oven"
      ko: "오븐"
    gender: m
    notes:
      en: "der Backofen = baking oven"
      ko: "der Backofen = 제빵용 오븐"
  - german: "der Herd, -e"
    translation:
      en: "stove / cooktop"
      ko: "가스레인지 / 쿡탑"
    gender: m
    notes:
      en: "der Elektroherd = electric stove"
      ko: "der Elektroherd = 전기레인지"
  - german: "der Kühlschrank, Kühlschränke"
    translation:
      en: "refrigerator"
      ko: "냉장고"
    gender: m
    notes:
      en: "Compound: kühl (cool) + Schrank (cabinet)"
      ko: "합성어: kühl (시원한) + Schrank (장)"
  - german: "das Rezept, -e"
    translation:
      en: "recipe / prescription"
      ko: "레시피 / 처방전"
    gender: n
    notes:
      en: "Context determines meaning: cooking or medical"
      ko: "문맥에 따라 의미 결정: 요리 또는 의학"
  - german: "schmecken"
    translation:
      en: "to taste"
      ko: "맛이 나다 / 맛보다"
    gender: null
    notes:
      en: "Es schmeckt gut! = It tastes good!"
      ko: "Es schmeckt gut! = 맛있어요!"
  - german: "probieren"
    translation:
      en: "to try / to taste"
      ko: "시도하다 / 맛보다"
    gender: null
    notes:
      en: "Probieren geht über Studieren = practice beats theory"
      ko: "Probieren geht über Studieren = 백문이 불여일견"
  - german: "das Frühstück"
    translation:
      en: "breakfast"
      ko: "아침 식사"
    gender: n
    notes:
      en: "frühstücken = to have breakfast"
      ko: "frühstücken = 아침을 먹다"
  - german: "das Mittagessen"
    translation:
      en: "lunch"
      ko: "점심 식사"
    gender: n
    notes:
      en: "Traditionally the main meal in Germany"
      ko: "전통적으로 독일에서 주요 식사"
  - german: "das Abendessen"
    translation:
      en: "dinner / supper"
      ko: "저녁 식사"
    gender: n
    notes:
      en: "Often cold (Abendbrot) in German tradition"
      ko: "독일 전통에서 흔히 차가운 식사 (Abendbrot)"
  - german: "der Nachtisch"
    translation:
      en: "dessert"
      ko: "디저트"
    gender: m
    notes:
      en: "Also: die Nachspeise"
      ko: "또한: die Nachspeise"
  - german: "die Mahlzeit, -en"
    translation:
      en: "meal"
      ko: "식사"
    gender: f
    notes:
      en: "Also used as greeting around lunchtime"
      ko: "점심시간 즈음에 인사말로도 사용됨"
  - german: "lecker"
    translation:
      en: "delicious / yummy"
      ko: "맛있는"
    gender: null
    notes:
      en: "Das ist lecker! = That is delicious!"
      ko: "Das ist lecker! = 맛있어요!"
  - german: "satt"
    translation:
      en: "full (not hungry)"
      ko: "배부른"
    gender: null
    notes:
      en: "Ich bin satt = I am full"
      ko: "Ich bin satt = 배불러요"
  - german: "hungrig"
    translation:
      en: "hungry"
      ko: "배고픈"
    gender: null
    notes:
      en: "Ich bin hungrig / Ich habe Hunger"
      ko: "Ich bin hungrig / Ich habe Hunger = 배고파요"
  - german: "durstig"
    translation:
      en: "thirsty"
      ko: "목마른"
    gender: null
    notes:
      en: "Ich bin durstig / Ich habe Durst"
      ko: "Ich bin durstig / Ich habe Durst = 목마르다"
