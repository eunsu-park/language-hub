- id: 43_werden_expressions
  label:
    en: 4.3 WERDEN (to become) Expressions
    ko: 4.3 WERDEN (되다) 표현
  type: vocabulary
  words:
  - german: werden
    translation:
      en: to become / will
      ko: ~이 되다 / ~할 것이다
    gender: null
    plural: null
    notes:
      en: "Stem-vowel change e->i; conjugation: werde, wirst, wird, werden, werdet, werden"
      ko: "어간모음 변화 e->i; 변화: werde, wirst, wird, werden, werdet, werden"
  - german: Es wird kalt.
    translation:
      en: It's getting cold.
      ko: 추워지고 있다.
    gender: null
    plural: null
    notes:
      en: Change of state — contrast with "Es ist kalt" (it IS cold)
      ko: 상태 변화 — "Es ist kalt" (춥다)와 대조
  - german: Es wird spät.
    translation:
      en: It's getting late.
      ko: 늦어지고 있다.
    gender: null
    plural: null
  - german: Ich werde müde.
    translation:
      en: I'm getting tired.
      ko: 나는 피곤해지고 있다.
    gender: null
    plural: null
  - german: Sie wird Ärztin.
    translation:
      en: She is becoming a doctor.
      ko: 그녀는 의사가 되고 있다.
    gender: null
    plural: null
  - german: Es wird schon.
    translation:
      en: It'll be fine. / It'll work out.
      ko: 다 잘 될 거야.
    gender: null
    plural: null
    notes:
      en: Common reassuring expression
      ko: 흔한 위로 표현
  - german: Wird gemacht!
    translation:
      en: Will do! / Consider it done!
      ko: 하겠습니다! / 알겠습니다!
    gender: null
    plural: null
    notes:
      en: Informal affirmative response
      ko: 비격식 긍정적 대답
  - german: Es wird dunkel.
    translation:
      en: It's getting dark.
      ko: 어두워지고 있다.
    gender: null
    plural: null
  - german: Das Wetter wird besser.
    translation:
      en: The weather is getting better.
      ko: 날씨가 좋아지고 있다.
    gender: null
    plural: null

