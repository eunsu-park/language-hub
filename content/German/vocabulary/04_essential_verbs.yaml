lesson: 04_Essential_Verbs_SEIN_HABEN_WERDEN
lesson_number: 4
cefr: A1
categories:
- id: 41_sein_expressions
  label:
    en: 4.1 SEIN (to be) Expressions
    ko: 4.1 SEIN (이다/있다) 표현
  type: vocabulary
  words:
  - german: sein
    translation:
      en: to be
      ko: ~이다 / ~있다
    gender: null
    plural: null
    notes:
      en: "Most irregular verb in German; conjugation: bin, bist, ist, sind, seid, sind"
      ko: "독일어에서 가장 불규칙적인 동사; 변화: bin, bist, ist, sind, seid, sind"
  - german: Ich bin müde.
    translation:
      en: I am tired.
      ko: 나는 피곤하다.
    gender: null
    plural: null
  - german: Ich bin hungrig.
    translation:
      en: I am hungry.
      ko: 나는 배고프다.
    gender: null
    plural: null
  - german: Ich bin krank.
    translation:
      en: I am sick.
      ko: 나는 아프다.
    gender: null
    plural: null
  - german: Ich bin fertig.
    translation:
      en: I am done / finished.
      ko: 나는 끝났다 / 다 했다.
    gender: null
    plural: null
  - german: Ich bin bereit.
    translation:
      en: I am ready.
      ko: 나는 준비됐다.
    gender: null
    plural: null
  - german: Das ist richtig.
    translation:
      en: That is correct.
      ko: 그것은 맞다.
    gender: null
    plural: null
  - german: Das ist falsch.
    translation:
      en: That is wrong.
      ko: 그것은 틀리다.
    gender: null
    plural: null
  - german: Mir ist kalt.
    translation:
      en: I am cold.
      ko: 나는 춥다.
    gender: null
    plural: null
    notes:
      en: "Dative construction; lit. \"to me it is cold\""
      ko: "여격 구문; 직역 \"나에게 춥다\""

- id: 42_haben_expressions
  label:
    en: 4.2 HABEN (to have) Expressions
    ko: 4.2 HABEN (가지다) 표현
  type: vocabulary
  words:
  - german: haben
    translation:
      en: to have
      ko: 가지다
    gender: null
    plural: null
    notes:
      en: "Irregular in du/er forms; conjugation: habe, hast, hat, haben, habt, haben"
      ko: "du/er 형태에서 불규칙; 변화: habe, hast, hat, haben, habt, haben"
  - german: Ich habe Hunger.
    translation:
      en: I am hungry.
      ko: 나는 배고프다.
    gender: null
    plural: null
    notes:
      en: "More natural than \"Ich bin hungrig\" in everyday German"
      ko: "일상 독일어에서 \"Ich bin hungrig\"보다 더 자연스러운 표현"
  - german: Ich habe Durst.
    translation:
      en: I am thirsty.
      ko: 나는 목마르다.
    gender: null
    plural: null
  - german: Ich habe Angst.
    translation:
      en: I am afraid.
      ko: 나는 두렵다.
    gender: null
    plural: null
  - german: Ich habe Recht.
    translation:
      en: I am right.
      ko: 내가 맞다.
    gender: null
    plural: null
  - german: Ich habe Glück.
    translation:
      en: I am lucky.
      ko: 나는 운이 좋다.
    gender: null
    plural: null
  - german: Ich habe Pech.
    translation:
      en: I am unlucky.
      ko: 나는 운이 나쁘다.
    gender: null
    plural: null
  - german: Ich habe Zeit.
    translation:
      en: I have time. / I am free.
      ko: 나는 시간이 있다.
    gender: null
    plural: null
  - german: Ich habe keine Ahnung.
    translation:
      en: I have no idea.
      ko: 전혀 모르겠다.
    gender: null
    plural: null

- id: 43_werden_expressions
  label:
    en: 4.3 WERDEN (to become) Expressions
    ko: 4.3 WERDEN (되다) 표현
  type: vocabulary
  words:
  - german: werden
    translation:
      en: to become / will
      ko: ~이 되다 / ~할 것이다
    gender: null
    plural: null
    notes:
      en: "Stem-vowel change e->i; conjugation: werde, wirst, wird, werden, werdet, werden"
      ko: "어간모음 변화 e->i; 변화: werde, wirst, wird, werden, werdet, werden"
  - german: Es wird kalt.
    translation:
      en: It's getting cold.
      ko: 추워지고 있다.
    gender: null
    plural: null
    notes:
      en: Change of state — contrast with "Es ist kalt" (it IS cold)
      ko: 상태 변화 — "Es ist kalt" (춥다)와 대조
  - german: Es wird spät.
    translation:
      en: It's getting late.
      ko: 늦어지고 있다.
    gender: null
    plural: null
  - german: Ich werde müde.
    translation:
      en: I'm getting tired.
      ko: 나는 피곤해지고 있다.
    gender: null
    plural: null
  - german: Sie wird Ärztin.
    translation:
      en: She is becoming a doctor.
      ko: 그녀는 의사가 되고 있다.
    gender: null
    plural: null
  - german: Es wird schon.
    translation:
      en: It'll be fine. / It'll work out.
      ko: 다 잘 될 거야.
    gender: null
    plural: null
    notes:
      en: Common reassuring expression
      ko: 흔한 위로 표현
  - german: Wird gemacht!
    translation:
      en: Will do! / Consider it done!
      ko: 하겠습니다! / 알겠습니다!
    gender: null
    plural: null
    notes:
      en: Informal affirmative response
      ko: 비격식 긍정적 대답
