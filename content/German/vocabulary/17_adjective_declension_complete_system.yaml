- id: 3_compound_adjectives
  label:
    en: 3. Compound Adjectives
    ko: 3. 복합 형용사
  type: vocabulary
  words:
  - german: lebenslustig
    translation:
      en: fun-loving / vivacious
      ko: 쾌활한 / 삶을 즐기는
    gender: null
    plural: null
    notes:
      en: "Leben (life) + lustig (fun). Ein lebenslustiger Mensch."
      ko: "Leben (삶) + lustig (재미있는). 쾌활한 사람."
  - german: zeitaufwendig
    translation:
      en: time-consuming
      ko: 시간이 많이 드는
    gender: null
    plural: null
    notes:
      en: "Zeit (time) + aufwendig (costly). Eine zeitaufwendige Aufgabe."
      ko: "Zeit (시간) + aufwendig (비용이 많이 드는). 시간이 많이 드는 과제."
  - german: umweltfreundlich
    translation:
      en: environmentally friendly / eco-friendly
      ko: 환경 친화적인
    gender: null
    plural: null
    notes:
      en: "Umwelt (environment) + freundlich (friendly). Umweltfreundliche Produkte."
      ko: "Umwelt (환경) + freundlich (친절한). 환경 친화적인 제품들."
  - german: selbstständig
    translation:
      en: independent / self-employed
      ko: 독립적인 / 자영업의
    gender: null
    plural: null
    notes:
      en: "Selbst (self) + ständig (constant). Also spelled selbständig."
      ko: "Selbst (자기) + ständig (지속적인). selbständig으로도 표기."
  - german: vielseitig
    translation:
      en: versatile / multifaceted
      ko: 다재다능한 / 다방면의
    gender: null
    plural: null
    notes:
      en: "Viel (much) + seitig (sided). Ein vielseitiger Künstler."
      ko: "Viel (많은) + seitig (~면의). 다재다능한 예술가."
  - german: leistungsfähig
    translation:
      en: efficient / high-performing
      ko: 성능이 좋은 / 유능한
    gender: null
    plural: null
    notes:
      en: "Leistung (performance) + fähig (capable). Ein leistungsfähiger Computer."
      ko: "Leistung (성능) + fähig (능력 있는). 성능이 좋은 컴퓨터."
  - german: kostengünstig
    translation:
      en: cost-effective / affordable
      ko: 비용 효율적인 / 저렴한
    gender: null
    plural: null
    notes:
      en: "Kosten (costs) + günstig (favorable). Eine kostengünstige Lösung."
      ko: "Kosten (비용) + günstig (유리한). 비용 효율적인 해결책."
