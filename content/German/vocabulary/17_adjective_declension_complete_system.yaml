lesson: 17_Adjective_Declension_Complete_System
lesson_number: 17
cefr: B2
categories:
- id: 1_comparative_adjectives
  label:
    en: 1. Adjectives with Irregular Comparative/Superlative
    ko: 1. 불규칙 비교급/최상급 형용사
  type: vocabulary
  words:
  - german: gut
    translation:
      en: good
      ko: 좋은
    gender: null
    plural: null
    notes:
      en: "Comparative: besser. Superlative: am besten. Fully irregular stem change."
      ko: "비교급: besser. 최상급: am besten. 완전히 불규칙적인 어간 변화."
  - german: viel
    translation:
      en: much / a lot
      ko: 많은
    gender: null
    plural: null
    notes:
      en: "Comparative: mehr. Superlative: am meisten. Suppletive forms."
      ko: "비교급: mehr. 최상급: am meisten. 보충형."
  - german: gern
    translation:
      en: gladly / with pleasure
      ko: 기꺼이 / 즐겨
    gender: null
    plural: null
    notes:
      en: "Comparative: lieber. Superlative: am liebsten. Ich trinke am liebsten Kaffee."
      ko: "비교급: lieber. 최상급: am liebsten. 나는 커피를 가장 즐겨 마신다."
  - german: hoch
    translation:
      en: high / tall
      ko: 높은
    gender: null
    plural: null
    notes:
      en: "Comparative: höher. Superlative: am höchsten. Drops -c- in comparative."
      ko: "비교급: höher. 최상급: am höchsten. 비교급에서 -c- 탈락."
  - german: nah
    translation:
      en: near / close
      ko: 가까운
    gender: null
    plural: null
    notes:
      en: "Comparative: näher. Superlative: am nächsten. Consonant change h → chs in superlative."
      ko: "비교급: näher. 최상급: am nächsten. 최상급에서 자음 변화 h → chs."
  - german: groß
    translation:
      en: big / tall
      ko: 큰 / 키가 큰
    gender: null
    plural: null
    notes:
      en: "Comparative: größer. Superlative: am größten. Umlaut + no extra -e."
      ko: "비교급: größer. 최상급: am größten. 움라우트 + 추가 -e 없음."
  - german: alt
    translation:
      en: old
      ko: 나이 든 / 오래된
    gender: null
    plural: null
    notes:
      en: "Comparative: älter. Superlative: am ältesten. Umlaut in comparative/superlative."
      ko: "비교급: älter. 최상급: am ältesten. 비교급/최상급에서 움라우트."
  - german: jung
    translation:
      en: young
      ko: 젊은
    gender: null
    plural: null
    notes:
      en: "Comparative: jünger. Superlative: am jüngsten. Umlaut in comparative/superlative."
      ko: "비교급: jünger. 최상급: am jüngsten. 비교급/최상급에서 움라우트."
  - german: stark
    translation:
      en: strong
      ko: 강한
    gender: null
    plural: null
    notes:
      en: "Comparative: stärker. Superlative: am stärksten. Umlaut in comparative/superlative."
      ko: "비교급: stärker. 최상급: am stärksten. 비교급/최상급에서 움라우트."
  - german: kalt
    translation:
      en: cold
      ko: 차가운 / 추운
    gender: null
    plural: null
    notes:
      en: "Comparative: kälter. Superlative: am kältesten. Umlaut in comparative/superlative."
      ko: "비교급: kälter. 최상급: am kältesten. 비교급/최상급에서 움라우트."

- id: 2_participial_adjectives
  label:
    en: 2. Participial Adjectives (Present & Past Participles as Adjectives)
    ko: 2. 분사 형용사 (현재분사 & 과거분사의 형용사적 사용)
  type: vocabulary
  words:
  - german: anstrengend
    translation:
      en: exhausting / strenuous
      ko: 힘든 / 피곤한
    gender: null
    plural: null
    notes:
      en: "Present participle of anstrengen. Eine anstrengende Arbeit."
      ko: "anstrengen의 현재분사. 힘든 일."
  - german: überraschend
    translation:
      en: surprising
      ko: 놀라운
    gender: null
    plural: null
    notes:
      en: "Present participle of überraschen. Ein überraschendes Ergebnis."
      ko: "überraschen의 현재분사. 놀라운 결과."
  - german: spannend
    translation:
      en: exciting / thrilling
      ko: 흥미진진한
    gender: null
    plural: null
    notes:
      en: "Present participle of spannen. Ein spannender Film."
      ko: "spannen의 현재분사. 흥미진진한 영화."
  - german: enttäuschend
    translation:
      en: disappointing
      ko: 실망스러운
    gender: null
    plural: null
    notes:
      en: "Present participle of enttäuschen. Ein enttäuschendes Ergebnis."
      ko: "enttäuschen의 현재분사. 실망스러운 결과."
  - german: begeistert
    translation:
      en: enthusiastic / excited
      ko: 열광적인 / 흥분한
    gender: null
    plural: null
    notes:
      en: "Past participle of begeistern. Die begeisterten Zuschauer applaudierten."
      ko: "begeistern의 과거분사. 열광한 관객들이 박수를 쳤다."
  - german: gelangweilt
    translation:
      en: bored
      ko: 지루해하는
    gender: null
    plural: null
    notes:
      en: "Past participle of langweilen. Das gelangweilte Kind gähnte."
      ko: "langweilen의 과거분사. 지루해하는 아이가 하품했다."
  - german: erschöpft
    translation:
      en: exhausted
      ko: 기진맥진한
    gender: null
    plural: null
    notes:
      en: "Past participle of erschöpfen. Der erschöpfte Läufer brach zusammen."
      ko: "erschöpfen의 과거분사. 기진맥진한 주자가 쓰러졌다."
  - german: erfahren
    translation:
      en: experienced
      ko: 경험 많은
    gender: null
    plural: null
    notes:
      en: "Past participle of erfahren. Ein erfahrener Arzt."
      ko: "erfahren의 과거분사. 경험이 풍부한 의사."
  - german: ausgezeichnet
    translation:
      en: excellent / outstanding
      ko: 뛰어난 / 우수한
    gender: null
    plural: null
    notes:
      en: "Past participle of auszeichnen. Eine ausgezeichnete Leistung."
      ko: "auszeichnen의 과거분사. 뛰어난 성과."
  - german: besorgt
    translation:
      en: worried / concerned
      ko: 걱정하는
    gender: null
    plural: null
    notes:
      en: "Past participle of besorgen. Die besorgten Eltern warteten."
      ko: "besorgen의 과거분사. 걱정하는 부모가 기다렸다."

- id: 3_compound_adjectives
  label:
    en: 3. Compound Adjectives
    ko: 3. 복합 형용사
  type: vocabulary
  words:
  - german: lebenslustig
    translation:
      en: fun-loving / vivacious
      ko: 쾌활한 / 삶을 즐기는
    gender: null
    plural: null
    notes:
      en: "Leben (life) + lustig (fun). Ein lebenslustiger Mensch."
      ko: "Leben (삶) + lustig (재미있는). 쾌활한 사람."
  - german: zeitaufwendig
    translation:
      en: time-consuming
      ko: 시간이 많이 드는
    gender: null
    plural: null
    notes:
      en: "Zeit (time) + aufwendig (costly). Eine zeitaufwendige Aufgabe."
      ko: "Zeit (시간) + aufwendig (비용이 많이 드는). 시간이 많이 드는 과제."
  - german: umweltfreundlich
    translation:
      en: environmentally friendly / eco-friendly
      ko: 환경 친화적인
    gender: null
    plural: null
    notes:
      en: "Umwelt (environment) + freundlich (friendly). Umweltfreundliche Produkte."
      ko: "Umwelt (환경) + freundlich (친절한). 환경 친화적인 제품들."
  - german: selbstständig
    translation:
      en: independent / self-employed
      ko: 독립적인 / 자영업의
    gender: null
    plural: null
    notes:
      en: "Selbst (self) + ständig (constant). Also spelled selbständig."
      ko: "Selbst (자기) + ständig (지속적인). selbständig으로도 표기."
  - german: vielseitig
    translation:
      en: versatile / multifaceted
      ko: 다재다능한 / 다방면의
    gender: null
    plural: null
    notes:
      en: "Viel (much) + seitig (sided). Ein vielseitiger Künstler."
      ko: "Viel (많은) + seitig (~면의). 다재다능한 예술가."
  - german: leistungsfähig
    translation:
      en: efficient / high-performing
      ko: 성능이 좋은 / 유능한
    gender: null
    plural: null
    notes:
      en: "Leistung (performance) + fähig (capable). Ein leistungsfähiger Computer."
      ko: "Leistung (성능) + fähig (능력 있는). 성능이 좋은 컴퓨터."
  - german: kostengünstig
    translation:
      en: cost-effective / affordable
      ko: 비용 효율적인 / 저렴한
    gender: null
    plural: null
    notes:
      en: "Kosten (costs) + günstig (favorable). Eine kostengünstige Lösung."
      ko: "Kosten (비용) + günstig (유리한). 비용 효율적인 해결책."
  - german: handlungsfähig
    translation:
      en: capable of acting / operational
      ko: 행동 가능한 / 기능하는
    gender: null
    plural: null
    notes:
      en: "Handlung (action) + fähig (capable). Die Regierung muss handlungsfähig bleiben."
      ko: "Handlung (행동) + fähig (능력 있는). 정부는 행동 가능한 상태를 유지해야 한다."
  - german: hilfsbereit
    translation:
      en: helpful / ready to help
      ko: 잘 도와주는 / 도움을 주려는
    gender: null
    plural: null
    notes:
      en: "Hilfe (help) + bereit (ready). Sie ist immer hilfsbereit."
      ko: "Hilfe (도움) + bereit (준비된). 그녀는 항상 잘 도와준다."
  - german: wahrscheinlich
    translation:
      en: probable / likely
      ko: 아마도 / 그럴듯한
    gender: null
    plural: null
    notes:
      en: "Wahr (true) + scheinlich (seeming). Also used as adverb: Es regnet wahrscheinlich."
      ko: "Wahr (진실한) + scheinlich (보이는). 부사로도 사용: 아마 비가 올 것이다."
