lesson: "sup_A1_Animals_and_Nature"
lesson_number: 101
cefr: A1
type: supplementary
topic: "Animals and Nature"
categories:
- id: haustiere
  label:
    en: "Domestic Animals (Haustiere)"
    ko: "반려동물 / 가축 (Haustiere)"
  type: vocabulary
  words:
  - german: "die Katze, -n"
    translation:
      en: "cat"
      ko: "고양이"
    gender: f
    notes:
      en: "One of the most common pets in Germany"
      ko: "독일에서 가장 흔한 반려동물 중 하나"
  - german: "der Hund, -e"
    translation:
      en: "dog"
      ko: "개"
    gender: m
    notes:
      en: "Dogs are very popular in German culture"
      ko: "독일 문화에서 개는 매우 인기 있음"
  - german: "der Vogel, Vögel"
    translation:
      en: "bird"
      ko: "새"
    gender: m
    notes:
      en: "Plural uses umlaut: Vögel"
      ko: "복수형은 움라우트 사용: Vögel"
  - german: "der Fisch, -e"
    translation:
      en: "fish"
      ko: "물고기"
    gender: m
    notes:
      en: "Also used for fish as food"
      ko: "음식으로서의 생선도 의미함"
  - german: "das Pferd, -e"
    translation:
      en: "horse"
      ko: "말"
    gender: n
    notes:
      en: "Also called 'das Ross' in southern dialects"
      ko: "남부 방언에서는 'das Ross'라고도 함"
  - german: "die Kuh, Kühe"
    translation:
      en: "cow"
      ko: "소 (암소)"
    gender: f
    notes:
      en: "Plural uses umlaut: Kühe"
      ko: "복수형은 움라우트 사용: Kühe"
  - german: "das Schwein, -e"
    translation:
      en: "pig"
      ko: "돼지"
    gender: n
    notes:
      en: "Also used figuratively like in English"
      ko: "영어처럼 비유적으로도 사용됨"
  - german: "das Schaf, -e"
    translation:
      en: "sheep"
      ko: "양"
    gender: n
    notes:
      en: "das schwarze Schaf = the black sheep"
      ko: "das schwarze Schaf = 이단아, 문제아"
  - german: "die Ziege, -n"
    translation:
      en: "goat"
      ko: "염소"
    gender: f
    notes:
      en: "Also slang for a stubborn person"
      ko: "고집 센 사람을 가리키는 속어로도 사용"
  - german: "das Huhn, Hühner"
    translation:
      en: "chicken / hen"
      ko: "닭"
    gender: n
    notes:
      en: "Plural is irregular: Hühner"
      ko: "복수형이 불규칙: Hühner"
  - german: "der Hahn, Hähne"
    translation:
      en: "rooster"
      ko: "수탉"
    gender: m
    notes:
      en: "Also appears in 'der Wasserhahn' (faucet)"
      ko: "'der Wasserhahn' (수도꼭지)에도 사용됨"
  - german: "die Ente, -n"
    translation:
      en: "duck"
      ko: "오리"
    gender: f
    notes:
      en: "Common in German fairy tales and parks"
      ko: "독일 동화와 공원에서 흔히 볼 수 있음"
  - german: "das Kaninchen, -"
    translation:
      en: "rabbit"
      ko: "토끼"
    gender: n
    notes:
      en: "Plural is the same as singular"
      ko: "복수형이 단수형과 같음"
  - german: "der Hamster, -"
    translation:
      en: "hamster"
      ko: "햄스터"
    gender: m
    notes:
      en: "The word 'hamster' comes from German"
      ko: "'hamster'라는 단어는 독일어에서 유래함"
  - german: "die Schildkröte, -n"
    translation:
      en: "turtle / tortoise"
      ko: "거북이"
    gender: f
    notes:
      en: "Literally 'shield toad'"
      ko: "직역하면 '방패 두꺼비'"
  - german: "der Esel, -"
    translation:
      en: "donkey"
      ko: "당나귀"
    gender: m
    notes:
      en: "Famous from 'Die Bremer Stadtmusikanten'"
      ko: "'브레멘 음악대'에 등장하는 동물"
  - german: "der Goldfisch, -e"
    translation:
      en: "goldfish"
      ko: "금붕어"
    gender: m
    notes:
      en: "Popular pet for children"
      ko: "어린이에게 인기 있는 반려동물"
  - german: "die Gans, Gänse"
    translation:
      en: "goose"
      ko: "거위"
    gender: f
    notes:
      en: "der Gänsebraten = roast goose (Christmas dish)"
      ko: "der Gänsebraten = 거위 구이 (크리스마스 요리)"
  - german: "der Wellensittich, -e"
    translation:
      en: "budgerigar / parakeet"
      ko: "잉꼬 / 사랑앵무"
    gender: m
    notes:
      en: "Popular cage bird in Germany"
      ko: "독일에서 인기 있는 새장 새"
  - german: "das Meerschweinchen, -"
    translation:
      en: "guinea pig"
      ko: "기니피그"
    gender: n
    notes:
      en: "Literally 'little sea pig'"
      ko: "직역하면 '작은 바다 돼지'"
  - german: "der Stall, Ställe"
    translation:
      en: "stable / barn"
      ko: "마구간 / 축사"
    gender: m
    notes:
      en: "der Pferdestall = horse stable"
      ko: "der Pferdestall = 마구간"
  - german: "das Futter"
    translation:
      en: "animal feed / food"
      ko: "사료 / 먹이"
    gender: n
    notes:
      en: "füttern = to feed (animals)"
      ko: "füttern = (동물에게) 먹이를 주다"
  - german: "das Haustier, -e"
    translation:
      en: "pet"
      ko: "반려동물"
    gender: n
    notes:
      en: "Compound: Haus (house) + Tier (animal)"
      ko: "합성어: Haus (집) + Tier (동물)"
  - german: "das Tier, -e"
    translation:
      en: "animal"
      ko: "동물"
    gender: n
    notes:
      en: "der Tierpark = zoo; der Tierarzt = veterinarian"
      ko: "der Tierpark = 동물원; der Tierarzt = 수의사"
  - german: "der Papagei, -en"
    translation:
      en: "parrot"
      ko: "앵무새"
    gender: m
    notes:
      en: "Known for mimicking speech"
      ko: "말을 따라 하는 것으로 유명함"
  - german: "die Taube, -n"
    translation:
      en: "pigeon / dove"
      ko: "비둘기"
    gender: f
    notes:
      en: "die Friedenstaube = dove of peace"
      ko: "die Friedenstaube = 평화의 비둘기"
  - german: "der Truthahn, Truthähne"
    translation:
      en: "turkey"
      ko: "칠면조"
    gender: m
    notes:
      en: "Not as traditional as in American cuisine"
      ko: "미국 요리만큼 전통적이지 않음"
  - german: "der Stier, -e"
    translation:
      en: "bull"
      ko: "황소"
    gender: m
    notes:
      en: "den Stier bei den Hörnern packen = to take the bull by the horns"
      ko: "den Stier bei den Hörnern packen = 문제에 정면으로 맞서다"

- id: wildtiere
  label:
    en: "Wild Animals (Wildtiere)"
    ko: "야생 동물 (Wildtiere)"
  type: vocabulary
  words:
  - german: "der Bär, -en"
    translation:
      en: "bear"
      ko: "곰"
    gender: m
    notes:
      en: "Symbol of Berlin"
      ko: "베를린의 상징"
  - german: "der Wolf, Wölfe"
    translation:
      en: "wolf"
      ko: "늑대"
    gender: m
    notes:
      en: "Wolves have returned to Germany in recent decades"
      ko: "최근 수십 년간 늑대가 독일에 다시 돌아옴"
  - german: "der Fuchs, Füchse"
    translation:
      en: "fox"
      ko: "여우"
    gender: m
    notes:
      en: "Also means a clever person"
      ko: "영리한 사람을 뜻하기도 함"
  - german: "der Hirsch, -e"
    translation:
      en: "deer / stag"
      ko: "사슴 (수사슴)"
    gender: m
    notes:
      en: "Common in German forests"
      ko: "독일 숲에서 흔히 볼 수 있음"
  - german: "das Reh, -e"
    translation:
      en: "roe deer"
      ko: "노루"
    gender: n
    notes:
      en: "Smaller than Hirsch; very common in Germany"
      ko: "Hirsch보다 작으며 독일에서 매우 흔함"
  - german: "das Eichhörnchen, -"
    translation:
      en: "squirrel"
      ko: "다람쥐"
    gender: n
    notes:
      en: "Notoriously hard for non-natives to pronounce"
      ko: "외국인이 발음하기 어렵기로 유명한 단어"
  - german: "der Elefant, -en"
    translation:
      en: "elephant"
      ko: "코끼리"
    gender: m
    notes:
      en: "Weak noun: der Elefant, den Elefanten"
      ko: "약변화 명사: der Elefant, den Elefanten"
  - german: "der Löwe, -n"
    translation:
      en: "lion"
      ko: "사자"
    gender: m
    notes:
      en: "Weak noun; common in heraldry"
      ko: "약변화 명사; 문장(紋章)에 자주 사용됨"
  - german: "der Tiger, -"
    translation:
      en: "tiger"
      ko: "호랑이"
    gender: m
    notes:
      en: "Plural is the same as singular"
      ko: "복수형이 단수형과 같음"
  - german: "der Affe, -n"
    translation:
      en: "monkey / ape"
      ko: "원숭이"
    gender: m
    notes:
      en: "Colloquially: 'Ich glaub, mich laust der Affe!'"
      ko: "구어: 'Ich glaub, mich laust der Affe!' (깜짝 놀랐다!)"
  - german: "die Schlange, -n"
    translation:
      en: "snake"
      ko: "뱀"
    gender: f
    notes:
      en: "Also means 'queue / line'"
      ko: "'줄 (대기줄)'이라는 뜻도 있음"
  - german: "der Frosch, Frösche"
    translation:
      en: "frog"
      ko: "개구리"
    gender: m
    notes:
      en: "Appears in many German fairy tales"
      ko: "독일 동화에 자주 등장함"
  - german: "die Maus, Mäuse"
    translation:
      en: "mouse"
      ko: "쥐 (생쥐)"
    gender: f
    notes:
      en: "Also used for computer mouse"
      ko: "컴퓨터 마우스에도 사용됨"
  - german: "der Hase, -n"
    translation:
      en: "hare / rabbit"
      ko: "산토끼"
    gender: m
    notes:
      en: "der Osterhase = the Easter Bunny"
      ko: "der Osterhase = 부활절 토끼"
  - german: "die Giraffe, -n"
    translation:
      en: "giraffe"
      ko: "기린"
    gender: f
    notes:
      en: "Tallest living animal"
      ko: "가장 키가 큰 동물"
  - german: "das Krokodil, -e"
    translation:
      en: "crocodile"
      ko: "악어"
    gender: n
    notes:
      en: "Krokodilstränen weinen = to cry crocodile tears"
      ko: "Krokodilstränen weinen = 거짓 눈물을 흘리다"
  - german: "der Wal, -e"
    translation:
      en: "whale"
      ko: "고래"
    gender: m
    notes:
      en: "der Blauwal = blue whale"
      ko: "der Blauwal = 대왕고래"
  - german: "der Hai, -e"
    translation:
      en: "shark"
      ko: "상어"
    gender: m
    notes:
      en: "der weiße Hai = great white shark"
      ko: "der weiße Hai = 백상아리"
  - german: "der Delfin, -e"
    translation:
      en: "dolphin"
      ko: "돌고래"
    gender: m
    notes:
      en: "Known for their intelligence"
      ko: "지능이 높은 것으로 유명"
  - german: "der Igel, -"
    translation:
      en: "hedgehog"
      ko: "고슴도치"
    gender: m
    notes:
      en: "Common in German gardens and fairy tales"
      ko: "독일 정원과 동화에서 흔히 등장"
  - german: "der Dachs, -e"
    translation:
      en: "badger"
      ko: "오소리"
    gender: m
    notes:
      en: "frech wie ein Dachs = bold as a badger"
      ko: "frech wie ein Dachs = 뻔뻔한"
  - german: "die Ratte, -n"
    translation:
      en: "rat"
      ko: "쥐 (시궁쥐)"
    gender: f
    notes:
      en: "Larger than die Maus"
      ko: "die Maus보다 큰 쥐"
  - german: "der Adler, -"
    translation:
      en: "eagle"
      ko: "독수리"
    gender: m
    notes:
      en: "Symbol on the German coat of arms"
      ko: "독일 국장에 있는 상징"
  - german: "die Eule, -n"
    translation:
      en: "owl"
      ko: "올빼미 / 부엉이"
    gender: f
    notes:
      en: "Eulen nach Athen tragen = to carry coals to Newcastle"
      ko: "Eulen nach Athen tragen = 불필요한 일을 하다"
  - german: "der Storch, Störche"
    translation:
      en: "stork"
      ko: "황새"
    gender: m
    notes:
      en: "Said to bring babies in German tradition"
      ko: "독일 전통에서 아기를 가져다준다고 함"
  - german: "der Schwan, Schwäne"
    translation:
      en: "swan"
      ko: "백조"
    gender: m
    notes:
      en: "Common on German lakes"
      ko: "독일 호수에서 흔히 볼 수 있음"
  - german: "der Pinguin, -e"
    translation:
      en: "penguin"
      ko: "펭귄"
    gender: m
    notes:
      en: "Popular at the zoo"
      ko: "동물원에서 인기 있는 동물"
  - german: "das Nilpferd, -e"
    translation:
      en: "hippopotamus"
      ko: "하마"
    gender: n
    notes:
      en: "Literally 'Nile horse'"
      ko: "직역하면 '나일강의 말'"
  - german: "das Zebra, -s"
    translation:
      en: "zebra"
      ko: "얼룩말"
    gender: n
    notes:
      en: "der Zebrastreifen = zebra crossing / crosswalk"
      ko: "der Zebrastreifen = 횡단보도"
  - german: "das Kamel, -e"
    translation:
      en: "camel"
      ko: "낙타"
    gender: n
    notes:
      en: "Also colloquial for a clumsy person"
      ko: "구어로 어리석은 사람을 가리키기도 함"
  - german: "der Panther, -"
    translation:
      en: "panther"
      ko: "표범"
    gender: m
    notes:
      en: "der schwarze Panther = black panther"
      ko: "der schwarze Panther = 검은 표범"

- id: insekten
  label:
    en: "Insects and Small Creatures"
    ko: "곤충과 작은 생물"
  type: vocabulary
  words:
  - german: "die Biene, -n"
    translation:
      en: "bee"
      ko: "꿀벌"
    gender: f
    notes:
      en: "fleißig wie eine Biene = busy as a bee"
      ko: "fleißig wie eine Biene = 벌처럼 부지런한"
  - german: "die Wespe, -n"
    translation:
      en: "wasp"
      ko: "말벌"
    gender: f
    notes:
      en: "Common in summer in Germany"
      ko: "독일 여름에 흔히 볼 수 있음"
  - german: "die Fliege, -n"
    translation:
      en: "fly"
      ko: "파리"
    gender: f
    notes:
      en: "Also means 'bow tie'"
      ko: "'나비넥타이'라는 뜻도 있음"
  - german: "die Mücke, -n"
    translation:
      en: "mosquito"
      ko: "모기"
    gender: f
    notes:
      en: "aus einer Mücke einen Elefanten machen = to make a mountain out of a molehill"
      ko: "aus einer Mücke einen Elefanten machen = 사소한 일을 크게 만들다"
  - german: "die Ameise, -n"
    translation:
      en: "ant"
      ko: "개미"
    gender: f
    notes:
      en: "Symbol of hard work in German culture"
      ko: "독일 문화에서 근면의 상징"
  - german: "der Schmetterling, -e"
    translation:
      en: "butterfly"
      ko: "나비"
    gender: m
    notes:
      en: "A beautifully expressive German word"
      ko: "아름다운 표현의 독일어 단어"
  - german: "die Spinne, -n"
    translation:
      en: "spider"
      ko: "거미"
    gender: f
    notes:
      en: "spinnen = to spin (thread) or to be crazy (colloquial)"
      ko: "spinnen = 실을 잣다 또는 미치다 (구어)"
  - german: "der Käfer, -"
    translation:
      en: "beetle / bug"
      ko: "딱정벌레"
    gender: m
    notes:
      en: "VW Käfer = Volkswagen Beetle"
      ko: "VW Käfer = 폭스바겐 비틀"
  - german: "die Schnecke, -n"
    translation:
      en: "snail"
      ko: "달팽이"
    gender: f
    notes:
      en: "Also means 'slow person' colloquially"
      ko: "구어로 '느린 사람'이라는 뜻도 있음"
  - german: "der Wurm, Würmer"
    translation:
      en: "worm"
      ko: "벌레"
    gender: m
    notes:
      en: "der frühe Vogel fängt den Wurm = the early bird catches the worm"
      ko: "der frühe Vogel fängt den Wurm = 일찍 일어나는 새가 벌레를 잡는다"
  - german: "die Libelle, -n"
    translation:
      en: "dragonfly"
      ko: "잠자리"
    gender: f
    notes:
      en: "Often seen near lakes and rivers"
      ko: "호수와 강 근처에서 자주 볼 수 있음"
  - german: "der Marienkäfer, -"
    translation:
      en: "ladybug"
      ko: "무당벌레"
    gender: m
    notes:
      en: "Considered a good luck symbol"
      ko: "행운의 상징으로 여겨짐"
  - german: "die Grille, -n"
    translation:
      en: "cricket"
      ko: "귀뚜라미"
    gender: f
    notes:
      en: "Chirps in summer evenings"
      ko: "여름 저녁에 울음소리를 냄"
  - german: "die Raupe, -n"
    translation:
      en: "caterpillar"
      ko: "애벌레 / 유충"
    gender: f
    notes:
      en: "Becomes a Schmetterling (butterfly)"
      ko: "Schmetterling (나비)이 됨"
  - german: "die Hummel, -n"
    translation:
      en: "bumblebee"
      ko: "호박벌"
    gender: f
    notes:
      en: "Larger and fuzzier than a Biene"
      ko: "Biene보다 크고 털이 많음"
  - german: "die Zecke, -n"
    translation:
      en: "tick"
      ko: "진드기"
    gender: f
    notes:
      en: "Watch out for ticks when hiking in Germany"
      ko: "독일에서 하이킹할 때 진드기 주의"
  - german: "der Floh, Flöhe"
    translation:
      en: "flea"
      ko: "벼룩"
    gender: m
    notes:
      en: "der Flohmarkt = flea market"
      ko: "der Flohmarkt = 벼룩시장"
  - german: "die Laus, Läuse"
    translation:
      en: "louse"
      ko: "이 (기생충)"
    gender: f
    notes:
      en: "jemandem eine Laus in den Pelz setzen = to cause trouble"
      ko: "jemandem eine Laus in den Pelz setzen = 문제를 일으키다"
  - german: "der Regenwurm, Regenwürmer"
    translation:
      en: "earthworm"
      ko: "지렁이"
    gender: m
    notes:
      en: "Compound: Regen (rain) + Wurm (worm)"
      ko: "합성어: Regen (비) + Wurm (벌레)"
  - german: "die Heuschrecke, -n"
    translation:
      en: "grasshopper / locust"
      ko: "메뚜기"
    gender: f
    notes:
      en: "Common in fields during summer"
      ko: "여름 들판에서 흔히 볼 수 있음"

- id: pflanzen
  label:
    en: "Plants and Trees (Pflanzen und Bäume)"
    ko: "식물과 나무 (Pflanzen und Bäume)"
  type: vocabulary
  words:
  - german: "der Baum, Bäume"
    translation:
      en: "tree"
      ko: "나무"
    gender: m
    notes:
      en: "Germany is famous for its forests"
      ko: "독일은 숲으로 유명함"
  - german: "die Blume, -n"
    translation:
      en: "flower"
      ko: "꽃"
    gender: f
    notes:
      en: "der Blumenstrauß = bouquet of flowers"
      ko: "der Blumenstrauß = 꽃다발"
  - german: "das Gras, Gräser"
    translation:
      en: "grass"
      ko: "풀 / 잔디"
    gender: n
    notes:
      en: "ins Gras beißen = to bite the dust (idiom)"
      ko: "ins Gras beißen = 죽다 (관용구)"
  - german: "das Blatt, Blätter"
    translation:
      en: "leaf"
      ko: "잎"
    gender: n
    notes:
      en: "Also means 'sheet of paper'"
      ko: "'종이 한 장'이라는 뜻도 있음"
  - german: "die Rose, -n"
    translation:
      en: "rose"
      ko: "장미"
    gender: f
    notes:
      en: "Very popular flower in German gardens"
      ko: "독일 정원에서 매우 인기 있는 꽃"
  - german: "die Sonnenblume, -n"
    translation:
      en: "sunflower"
      ko: "해바라기"
    gender: f
    notes:
      en: "Compound: Sonne (sun) + Blume (flower)"
      ko: "합성어: Sonne (태양) + Blume (꽃)"
  - german: "der Pilz, -e"
    translation:
      en: "mushroom / fungus"
      ko: "버섯"
    gender: m
    notes:
      en: "wie Pilze aus dem Boden schießen = to spring up like mushrooms"
      ko: "wie Pilze aus dem Boden schießen = 우후죽순으로 생겨나다"
  - german: "die Eiche, -n"
    translation:
      en: "oak tree"
      ko: "참나무 / 떡갈나무"
    gender: f
    notes:
      en: "Symbol of strength in German culture"
      ko: "독일 문화에서 힘의 상징"
  - german: "die Tanne, -n"
    translation:
      en: "fir tree"
      ko: "전나무"
    gender: f
    notes:
      en: "der Tannenbaum = Christmas tree (traditional)"
      ko: "der Tannenbaum = 크리스마스 트리 (전통적 표현)"
  - german: "der Samen, -"
    translation:
      en: "seed"
      ko: "씨앗"
    gender: m
    notes:
      en: "Used in gardening and biology"
      ko: "정원 가꾸기와 생물학에서 사용됨"
  - german: "die Wurzel, -n"
    translation:
      en: "root"
      ko: "뿌리"
    gender: f
    notes:
      en: "Also used figuratively: die Wurzel des Problems"
      ko: "비유적으로도 사용됨: die Wurzel des Problems (문제의 근원)"
  - german: "die Pflanze, -n"
    translation:
      en: "plant"
      ko: "식물"
    gender: f
    notes:
      en: "die Zimmerpflanze = houseplant"
      ko: "die Zimmerpflanze = 실내 식물"
  - german: "der Busch, Büsche"
    translation:
      en: "bush / shrub"
      ko: "관목 / 덤불"
    gender: m
    notes:
      en: "auf den Busch klopfen = to beat around the bush"
      ko: "auf den Busch klopfen = 떠보다"
  - german: "der Ast, Äste"
    translation:
      en: "branch"
      ko: "나뭇가지"
    gender: m
    notes:
      en: "den Ast absägen, auf dem man sitzt = to saw off the branch you sit on"
      ko: "자기가 앉아 있는 나뭇가지를 자르다 = 자충수를 두다"
  - german: "die Birke, -n"
    translation:
      en: "birch tree"
      ko: "자작나무"
    gender: f
    notes:
      en: "Common tree in northern Germany"
      ko: "북부 독일에서 흔한 나무"
  - german: "die Linde, -n"
    translation:
      en: "linden tree / lime tree"
      ko: "보리수 / 린덴나무"
    gender: f
    notes:
      en: "Unter den Linden = famous Berlin boulevard"
      ko: "Unter den Linden = 유명한 베를린 대로"
  - german: "das Moos, -e"
    translation:
      en: "moss"
      ko: "이끼"
    gender: n
    notes:
      en: "Common in German forests"
      ko: "독일 숲에서 흔히 볼 수 있음"
  - german: "die Tulpe, -n"
    translation:
      en: "tulip"
      ko: "튤립"
    gender: f
    notes:
      en: "Popular spring flower"
      ko: "인기 있는 봄 꽃"
  - german: "das Veilchen, -"
    translation:
      en: "violet"
      ko: "제비꽃"
    gender: n
    notes:
      en: "ein blaues Veilchen = a black eye (colloquial)"
      ko: "ein blaues Veilchen = 멍든 눈 (구어)"
  - german: "das Gänseblümchen, -"
    translation:
      en: "daisy"
      ko: "데이지"
    gender: n
    notes:
      en: "Literally 'little goose flower'"
      ko: "직역하면 '작은 거위 꽃'"
  - german: "der Klee"
    translation:
      en: "clover"
      ko: "클로버 / 토끼풀"
    gender: m
    notes:
      en: "vierblättriger Klee = four-leaf clover (lucky)"
      ko: "vierblättriger Klee = 네잎 클로버 (행운)"
  - german: "das Unkraut, Unkräuter"
    translation:
      en: "weed"
      ko: "잡초"
    gender: n
    notes:
      en: "Unkraut vergeht nicht = weeds don't perish (idiom)"
      ko: "Unkraut vergeht nicht = 잡초는 죽지 않는다 (관용구)"
  - german: "die Ernte, -n"
    translation:
      en: "harvest"
      ko: "수확"
    gender: f
    notes:
      en: "ernten = to harvest"
      ko: "ernten = 수확하다"

- id: natur_landschaft
  label:
    en: "Nature and Landscape (Natur und Landschaft)"
    ko: "자연과 풍경 (Natur und Landschaft)"
  type: vocabulary
  words:
  - german: "der Wald, Wälder"
    translation:
      en: "forest / woods"
      ko: "숲"
    gender: m
    notes:
      en: "Central to German culture and Romanticism"
      ko: "독일 문화와 낭만주의의 핵심 요소"
  - german: "der Berg, -e"
    translation:
      en: "mountain"
      ko: "산"
    gender: m
    notes:
      en: "die Alpen (Alps) are in southern Germany"
      ko: "알프스산맥은 독일 남부에 위치"
  - german: "der See, -n"
    translation:
      en: "lake"
      ko: "호수"
    gender: m
    notes:
      en: "Masculine = lake; die See (feminine) = sea"
      ko: "남성형 = 호수; die See (여성형) = 바다"
  - german: "die See"
    translation:
      en: "sea / ocean"
      ko: "바다"
    gender: f
    notes:
      en: "die Nordsee = North Sea; die Ostsee = Baltic Sea"
      ko: "die Nordsee = 북해; die Ostsee = 발트해"
  - german: "der Fluss, Flüsse"
    translation:
      en: "river"
      ko: "강"
    gender: m
    notes:
      en: "der Rhein, die Donau, die Elbe are major German rivers"
      ko: "라인강, 도나우강, 엘베강이 독일의 주요 강"
  - german: "der Strand, Strände"
    translation:
      en: "beach"
      ko: "해변"
    gender: m
    notes:
      en: "der Strandkorb = hooded beach chair (typical German)"
      ko: "der Strandkorb = 지붕 달린 해변 의자 (독일 고유)"
  - german: "die Wiese, -n"
    translation:
      en: "meadow"
      ko: "초원 / 목초지"
    gender: f
    notes:
      en: "Common landscape in rural Germany"
      ko: "독일 시골에서 흔한 풍경"
  - german: "das Tal, Täler"
    translation:
      en: "valley"
      ko: "계곡 / 골짜기"
    gender: n
    notes:
      en: "Many German towns end in '-tal' (e.g., Wuppertal)"
      ko: "많은 독일 도시명이 '-tal'로 끝남 (예: Wuppertal)"
  - german: "die Insel, -n"
    translation:
      en: "island"
      ko: "섬"
    gender: f
    notes:
      en: "Sylt and Rügen are famous German islands"
      ko: "질트와 뤼겐이 유명한 독일 섬"
  - german: "der Himmel, -"
    translation:
      en: "sky / heaven"
      ko: "하늘 / 천국"
    gender: m
    notes:
      en: "unter freiem Himmel = outdoors, in the open air"
      ko: "unter freiem Himmel = 야외에서"
  - german: "die Erde"
    translation:
      en: "earth / ground / soil"
      ko: "지구 / 땅 / 흙"
    gender: f
    notes:
      en: "Capitalized when referring to planet Earth"
      ko: "지구를 가리킬 때는 대문자로 씀"
  - german: "der Sumpf, Sümpfe"
    translation:
      en: "swamp / marsh"
      ko: "늪 / 습지"
    gender: m
    notes:
      en: "das Sumpfgebiet = marshland"
      ko: "das Sumpfgebiet = 습지대"
  - german: "das Feld, -er"
    translation:
      en: "field"
      ko: "들판 / 밭"
    gender: n
    notes:
      en: "Agricultural fields are common in German countryside"
      ko: "독일 시골에서 흔히 볼 수 있는 농경지"
  - german: "der Garten, Gärten"
    translation:
      en: "garden"
      ko: "정원"
    gender: m
    notes:
      en: "der Kindergarten literally means 'children's garden'"
      ko: "der Kindergarten은 직역하면 '아이들의 정원'"
  - german: "die Luft, Lüfte"
    translation:
      en: "air"
      ko: "공기"
    gender: f
    notes:
      en: "frische Luft = fresh air"
      ko: "frische Luft = 신선한 공기"
  - german: "die Natur"
    translation:
      en: "nature"
      ko: "자연"
    gender: f
    notes:
      en: "der Naturschutz = nature conservation"
      ko: "der Naturschutz = 자연 보호"
  - german: "die Landschaft, -en"
    translation:
      en: "landscape / scenery"
      ko: "풍경 / 경치"
    gender: f
    notes:
      en: "eine schöne Landschaft = a beautiful landscape"
      ko: "eine schöne Landschaft = 아름다운 풍경"
  - german: "der Bach, Bäche"
    translation:
      en: "stream / creek"
      ko: "시내 / 개울"
    gender: m
    notes:
      en: "Smaller than a Fluss (river)"
      ko: "Fluss (강)보다 작음"
  - german: "der Wasserfall, Wasserfälle"
    translation:
      en: "waterfall"
      ko: "폭포"
    gender: m
    notes:
      en: "Compound: Wasser (water) + Fall (fall)"
      ko: "합성어: Wasser (물) + Fall (떨어짐)"
  - german: "die Wüste, -n"
    translation:
      en: "desert"
      ko: "사막"
    gender: f
    notes:
      en: "Not found in Germany but a useful basic word"
      ko: "독일에는 없지만 유용한 기본 어휘"
  - german: "der Hügel, -"
    translation:
      en: "hill"
      ko: "언덕"
    gender: m
    notes:
      en: "Smaller than a Berg (mountain)"
      ko: "Berg (산)보다 작음"
  - german: "die Höhle, -n"
    translation:
      en: "cave"
      ko: "동굴"
    gender: f
    notes:
      en: "die Tropfsteinhöhle = stalactite cave"
      ko: "die Tropfsteinhöhle = 종유석 동굴"
  - german: "der Dschungel, -"
    translation:
      en: "jungle"
      ko: "정글"
    gender: m
    notes:
      en: "der Großstadtdschungel = urban jungle"
      ko: "der Großstadtdschungel = 도시 정글"
  - german: "die Küste, -n"
    translation:
      en: "coast"
      ko: "해안"
    gender: f
    notes:
      en: "die Nordseeküste = North Sea coast"
      ko: "die Nordseeküste = 북해 해안"
  - german: "das Ufer, -"
    translation:
      en: "bank / shore"
      ko: "강가 / 기슭"
    gender: n
    notes:
      en: "am Ufer spazieren = to walk along the shore"
      ko: "am Ufer spazieren = 기슭을 따라 산책하다"
  - german: "der Pfad, -e"
    translation:
      en: "path / trail"
      ko: "오솔길 / 산책로"
    gender: m
    notes:
      en: "der Wanderpfad = hiking trail"
      ko: "der Wanderpfad = 등산로"
  - german: "der Teich, -e"
    translation:
      en: "pond"
      ko: "연못"
    gender: m
    notes:
      en: "Smaller than a See (lake)"
      ko: "See (호수)보다 작음"
  - german: "der Felsen, -"
    translation:
      en: "rock / cliff"
      ko: "바위 / 절벽"
    gender: m
    notes:
      en: "die Loreley is a famous rock on the Rhine"
      ko: "로렐라이는 라인강의 유명한 바위"
  - german: "der Sand"
    translation:
      en: "sand"
      ko: "모래"
    gender: m
    notes:
      en: "der Sandkasten = sandbox"
      ko: "der Sandkasten = 모래놀이터"
  - german: "der Mond"
    translation:
      en: "moon"
      ko: "달"
    gender: m
    notes:
      en: "der Vollmond = full moon; der Halbmond = half moon"
      ko: "der Vollmond = 보름달; der Halbmond = 반달"
  - german: "die Quelle, -n"
    translation:
      en: "spring / source"
      ko: "샘 / 원천"
    gender: f
    notes:
      en: "die Wasserquelle = water spring"
      ko: "die Wasserquelle = 수원"
