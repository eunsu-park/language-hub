lesson: 16_Future_Conditional_and_Konjunktiv_II
lesson_number: 16
cefr: B2
categories:
- id: konjunktiv_ii_forms
  label:
    en: Konjunktiv II Forms
    ko: 접속법 II식 형태
  type: vocabulary
  words:
  - german: "waere"
    translation:
      en: would be (Konj. II of sein)
      ko: ~일 텐데 (sein의 접속법 II)
    gender: null
    plural: null
    notes:
      en: "Always synthetic. Ich waere gern in Deutschland."
  - german: "haette"
    translation:
      en: would have (Konj. II of haben)
      ko: ~을 가질 텐데 (haben의 접속법 II)
    gender: null
    plural: null
    notes:
      en: "Always synthetic. Haetten Sie einen Moment Zeit?"
  - german: "wuerde"
    translation:
      en: would (Konj. II of werden)
      ko: ~할 것이다 (werden의 접속법 II)
    gender: null
    plural: null
    notes:
      en: "Used for periphrastic form: wuerde + Infinitiv"
  - german: "koennte"
    translation:
      en: could (Konj. II of koennen)
      ko: ~할 수 있을 텐데
    gender: null
    plural: null
    notes:
      en: "Always synthetic. Das koennte schwierig sein."
  - german: "muesste"
    translation:
      en: would have to (Konj. II of muessen)
      ko: ~해야 할 텐데
    gender: null
    plural: null
    notes:
      en: "Always synthetic. Ich muesste eigentlich arbeiten."
  - german: "duerfte"
    translation:
      en: might, would be allowed to (Konj. II of duerfen)
      ko: ~해도 될 텐데, ~일지도 모른다
    gender: null
    plural: null
    notes:
      en: "Always synthetic. Duerfte ich Sie etwas fragen?"
  - german: sollte
    translation:
      en: should (Konj. II of sollen)
      ko: ~해야 한다
    gender: null
    plural: null
    notes:
      en: "Identical to Praeteritum form. Du solltest das nicht sagen."
  - german: "gaebe"
    translation:
      en: would give; there would be (Konj. II of geben)
      ko: 줄 텐데; ~이 있을 텐데
    gender: null
    plural: null
    notes:
      en: "Synthetic preferred. Es gaebe eine andere Moeglichkeit."
  - german: "kaeme"
    translation:
      en: would come (Konj. II of kommen)
      ko: 올 텐데
    gender: null
    plural: null
    notes:
      en: "Synthetic preferred. Wenn er nur kaeme!"
  - german: "wuesste"
    translation:
      en: would know (Konj. II of wissen)
      ko: 알 텐데
    gender: null
    plural: null
    notes:
      en: "Synthetic preferred. Ich wuesste gern, ob..."
- id: conditional_expressions
  label:
    en: Conditional Expressions
    ko: 조건문 표현
  type: vocabulary
  words:
  - german: wenn
    translation:
      en: if, when
      ko: 만약 ~라면, ~할 때
    gender: null
    plural: null
    notes:
      en: "Introduces conditional clauses. Verb goes to end."
  - german: als ob
    translation:
      en: as if, as though
      ko: 마치 ~인 것처럼
    gender: null
    plural: null
    notes:
      en: "Followed by Konjunktiv II. Er tut so, als ob er krank waere."
  - german: an deiner/Ihrer Stelle
    translation:
      en: in your place
      ko: 네/당신의 입장이라면
    gender: null
    plural: null
    notes:
      en: "An deiner Stelle wuerde ich das nicht machen."
  - german: sonst
    translation:
      en: otherwise
      ko: 그렇지 않으면
    gender: null
    plural: null
    notes:
      en: "Beeil dich, sonst kommen wir zu spaet."
  - german: falls
    translation:
      en: in case, if
      ko: ~할 경우에
    gender: null
    plural: null
    notes:
      en: "More uncertain than wenn. Falls es regnet, ..."
  - german: Ich wuenschte, ...
    translation:
      en: I wish ...
      ko: ~이면 좋겠다
    gender: null
    plural: null
    notes:
      en: "Followed by Konjunktiv II. Ich wuenschte, ich haette mehr Geld."
  - german: Wenn ... doch nur ...!
    translation:
      en: If only ...!
      ko: ~이기만 하다면!
    gender: null
    plural: null
    notes:
      en: "Wish intensifier. Wenn ich doch nur fliegen koennte!"
- id: polite_request_phrases
  label:
    en: Polite Request Phrases
    ko: 공손한 요청 표현
  type: vocabulary
  words:
  - german: "Koennten Sie mir bitte helfen?"
    translation:
      en: Could you please help me?
      ko: 도와주시겠어요?
    gender: null
    plural: null
    notes:
      en: "koennen -> koennten (Konjunktiv II) for politeness"
  - german: "Haetten Sie einen Moment Zeit?"
    translation:
      en: Would you have a moment?
      ko: 잠시 시간이 되시겠습니까?
    gender: null
    plural: null
    notes:
      en: "haben -> haetten (Konjunktiv II) for politeness"
  - german: "Wuerden Sie bitte das Fenster oeffnen?"
    translation:
      en: Would you please open the window?
      ko: 창문을 열어주시겠습니까?
    gender: null
    plural: null
    notes:
      en: "wuerde + Infinitiv for polite requests"
  - german: "Duerfte ich Sie etwas fragen?"
    translation:
      en: Might I ask you something?
      ko: 질문 하나 해도 될까요?
    gender: null
    plural: null
    notes:
      en: "duerfen -> duerfte (Konjunktiv II) for politeness"
  - german: "Ich haette gern eine Tasse Kaffee."
    translation:
      en: I would like a cup of coffee.
      ko: 커피 한 잔 주시겠습니까.
    gender: null
    plural: null
    notes:
      en: "Standard polite ordering phrase. haette gern = would like"
  - german: "Waere es moeglich, einen Termin zu machen?"
    translation:
      en: Would it be possible to make an appointment?
      ko: 약속을 잡을 수 있을까요?
    gender: null
    plural: null
    notes:
      en: "waere + moeglich for polite possibility"
  - german: "Es waere nett, wenn Sie mir helfen koennten."
    translation:
      en: It would be nice if you could help me.
      ko: 도와주시면 감사하겠습니다.
    gender: null
    plural: null
    notes:
      en: "waere + wenn-clause with koennten for polite request"
  - german: "Ich brauchte Ihre Hilfe."
    translation:
      en: I would need your help.
      ko: 도움이 필요할 것 같습니다.
    gender: null
    plural: null
    notes:
      en: "brauchen -> braeuchte/brauchte (Konjunktiv II)"

- id: hypothetical_sentences
  label:
    en: Hypothetical Sentences and Wishes
    ko: 가정문과 소망 표현
  type: vocabulary
  words:
  - german: "An Ihrer Stelle wuerde ich zum Arzt gehen."
    translation:
      en: In your place, I would go to the doctor.
      ko: 당신의 입장이라면 의사에게 가겠습니다.
    gender: null
    plural: null
    notes:
      en: "an + possessive + Stelle = in someone's place; very common advice pattern"
      ko: "an + 소유격 + Stelle = ~의 입장에서; 매우 흔한 조언 패턴"
  - german: "Es waere schoen, wenn du kommen koenntest."
    translation:
      en: It would be nice if you could come.
      ko: 네가 올 수 있으면 좋겠다.
    gender: null
    plural: null
    notes:
      en: "waere + schoen + wenn-clause with Konjunktiv II"
      ko: "waere + schoen + wenn절과 접속법 II"
  - german: "Haetten Sie einen Moment?"
    translation:
      en: Would you have a moment?
      ko: 잠깐 시간 되시겠습니까?
    gender: null
    plural: null
    notes:
      en: "Shortened polite form; even more concise than Haetten Sie einen Moment Zeit?"
      ko: "축약된 정중한 표현; Haetten Sie einen Moment Zeit?보다 더 간결"
  - german: "Wenn ich reich waere, wuerde ich um die Welt reisen."
    translation:
      en: If I were rich, I would travel around the world.
      ko: 내가 부자라면 세계 여행을 할 텐데.
    gender: null
    plural: null
    notes:
      en: "Classic irreal conditional: wenn + Konj. II, ... wuerde + Inf."
      ko: "전형적인 비현실 조건문: wenn + 접속법 II, ... wuerde + 부정사"
  - german: "Ich wuerde an deiner Stelle mehr lernen."
    translation:
      en: I would study more if I were you.
      ko: 내가 너라면 더 공부할 텐데.
    gender: null
    plural: null
    notes:
      en: "an deiner Stelle with informal du form"
      ko: "an deiner Stelle를 비격식 du 형태로 사용"
  - german: "Wenn es moeglich waere, wuerde ich gern bleiben."
    translation:
      en: If it were possible, I would like to stay.
      ko: 가능하다면 머물고 싶습니다.
    gender: null
    plural: null
    notes:
      en: "moeglich waere = were possible; conditional politeness"
      ko: "moeglich waere = 가능하다면; 조건부 정중 표현"
  - german: "Das haette ich nicht erwartet."
    translation:
      en: I would not have expected that.
      ko: 그것은 예상하지 못했습니다.
    gender: null
    plural: null
    notes:
      en: "Konjunktiv II Vergangenheit: haette + Partizip II for past hypothetical"
      ko: "접속법 II 과거형: haette + 과거분사로 과거 가정 표현"
  - german: "Wenn ich das gewusst haette, waere ich gekommen."
    translation:
      en: If I had known that, I would have come.
      ko: 그걸 알았더라면 왔을 텐데.
    gender: null
    plural: null
    notes:
      en: "Past unreal conditional: haette + PP in wenn-clause, waere + PP in main clause"
      ko: "과거 비현실 조건문: wenn절에 haette + PP, 주절에 waere + PP"
  - german: "Es waere besser gewesen, wenn ..."
    translation:
      en: It would have been better if ...
      ko: ~했더라면 더 좋았을 텐데.
    gender: null
    plural: null
    notes:
      en: "Past hypothetical with waere + Partizip II (gewesen)"
      ko: "waere + 과거분사(gewesen)를 사용한 과거 가정"
  - german: "Ich haette gern mehr Zeit."
    translation:
      en: I would like to have more time.
      ko: 시간이 더 있으면 좋겠다.
    gender: null
    plural: null
    notes:
      en: "haette gern = would like (to have); common wish expression"
      ko: "haette gern = ~이 있으면 좋겠다; 흔한 소망 표현"
  - german: "Koenntest du mir einen Gefallen tun?"
    translation:
      en: Could you do me a favor?
      ko: 부탁 하나 해도 될까?
    gender: null
    plural: null
    notes:
      en: "koenntest = Konj. II of kannst; informal polite request"
      ko: "koenntest = kannst의 접속법 II; 비격식 정중한 요청"
  - german: "Wenn ich du waere, wuerde ich das nicht tun."
    translation:
      en: If I were you, I would not do that.
      ko: 내가 너라면 그렇게 하지 않을 텐데.
    gender: null
    plural: null
    notes:
      en: "wenn ich du waere = if I were you; alternative to an deiner Stelle"
      ko: "wenn ich du waere = 내가 너라면; an deiner Stelle의 대안"
  - german: "Man koennte sagen, dass ..."
    translation:
      en: One could say that ...
      ko: ~라고 말할 수 있을 것이다.
    gender: null
    plural: null
    notes:
      en: "koennte for tentative/hedged statements in academic or polite speech"
      ko: "koennte로 학술적 또는 정중한 담화에서 조심스러운 진술"
  - german: "Ich wuerde vorschlagen, dass ..."
    translation:
      en: I would suggest that ...
      ko: ~을 제안하고 싶습니다.
    gender: null
    plural: null
    notes:
      en: "Polite suggestion with wuerde + Infinitiv; dass-clause follows"
      ko: "wuerde + 부정사로 정중한 제안; dass절이 뒤따름"
  - german: "Angenommen, es wuerde regnen, ..."
    translation:
      en: Supposing it would rain, ...
      ko: 비가 온다고 가정하면, ...
    gender: null
    plural: null
    notes:
      en: "angenommen introduces hypothetical scenarios; literary/formal style"
      ko: "angenommen은 가정 시나리오 도입; 문어체/격식 표현"
