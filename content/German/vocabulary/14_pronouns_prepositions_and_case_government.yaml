- id: prepositional_verbs_accusative
  label:
    en: Prepositional Verbs (Accusative)
    ko: 전치사 동사 (4격/대격)
  type: vocabulary
  words:
  - german: warten auf + Akk.
    translation:
      en: to wait for
      ko: ~을 기다리다
    gender: null
    plural: null
    notes:
      en: "Ich warte auf den Bus. Wo-compound: Worauf wartest du?"
  - german: sich freuen auf + Akk.
    translation:
      en: to look forward to
      ko: ~을 고대하다
    gender: null
    plural: null
    notes:
      en: "Future event. Ich freue mich auf die Ferien."
  - german: sich freuen ueber + Akk.
    translation:
      en: to be happy about
      ko: ~에 대해 기뻐하다
    gender: null
    plural: null
    notes:
      en: "Present/past event. Ich freue mich ueber das Geschenk."
  - german: denken an + Akk.
    translation:
      en: to think of
      ko: ~을 생각하다
    gender: null
    plural: null
    notes:
