      en: to be fed up (lit. to have the nose full)
      ko: 지긋지긋하다
    gender: null
    plural: null
  - german: den Kopf verlieren
    translation:
      en: to panic (lit. to lose one's head)
      ko: 당황하다
    gender: null
    plural: null
  - german: kalte Füße bekommen
    translation:
