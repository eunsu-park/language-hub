    gender: null
    plural: null

- id: 2_animal_idioms
  label:
    en: 2. Animal Idioms
    ko: 2. 동물 관련 관용구
  type: vocabulary
  words:
  - german: einen Kater haben
    translation:
      en: to have a hangover (lit. to have a tomcat)
      ko: 숙취가 있다
    gender: null
    plural: null
  - german: Da liegt der Hund begraben.
    translation:
      en: That's the crux of the matter. (lit. That's where the dog is buried.)
      ko: 그것이 핵심이다.
    gender: null
    plural: null
  - german: Schwein haben
    translation:
      en: to be lucky (lit. to have a pig)
      ko: 운이 좋다
    gender: null
    plural: null
  - german: eine Gänsehaut bekommen
    translation:
      en: to get goosebumps (lit. to get goose skin)
      ko: 소름이 끼치다
    gender: null
    plural: null
  - german: einen Bärenhunger haben
    translation:
      en: to be extremely hungry (lit. to have a bear's hunger)
      ko: 배가 매우 고프다
    gender: null
    plural: null
  - german: die Katze aus dem Sack lassen
    translation:
      en: to let the cat out of the bag (lit. to let the cat out of the sack)
      ko: 비밀을 폭로하다
    gender: null
    plural: null
  - german: einen Vogel haben
    translation:
      en: to be crazy (lit. to have a bird)
      ko: 정신이 나가다
    gender: null
    plural: null

- id: 3_proverbs
  label:
    en: 3. Proverbs (Sprichwörter)
    ko: 3. 속담
  type: vocabulary
  words:
  - german: Übung macht den Meister.
    translation:
      en: Practice makes perfect.
      ko: 연습이 완벽을 만든다.
    gender: null
    plural: null
  - german: Aller Anfang ist schwer.
    translation:
      en: Every beginning is hard.
      ko: 모든 시작은 어렵다.
    gender: null
    plural: null
  - german: Ohne Fleiß kein Preis.
    translation:
      en: No pain, no gain. (lit. Without diligence, no prize.)
      ko: 노력 없이 대가 없다.
    gender: null
    plural: null
  - german: Der Apfel fällt nicht weit vom Stamm.
    translation:
      en: The apple doesn't fall far from the tree.
      ko: 부전자전.
    gender: null
    plural: null
  - german: Viele Köche verderben den Brei.
    translation:
      en: Too many cooks spoil the broth.
      ko: 사공이 많으면 배가 산으로 간다.
    gender: null
    plural: null
  - german: Reden ist Silber, Schweigen ist Gold.
    translation:
      en: Speech is silver, silence is golden.
      ko: 말은 은이요, 침묵은 금이다.
    gender: null
    plural: null
  - german: Wer zuletzt lacht, lacht am besten.
    translation:
      en: He who laughs last, laughs best.
      ko: 마지막에 웃는 자가 가장 잘 웃는다.
    gender: null
    plural: null
  - german: Aus den Augen, aus dem Sinn.
    translation:
      en: Out of sight, out of mind.
      ko: 눈에서 멀어지면 마음에서도 멀어진다.
    gender: null
    plural: null

- id: 4_discourse_particles
  label:
    en: 4. Discourse Particles (Modalpartikeln)
    ko: 4. 화법 조사 (양태 불변화사)
  type: vocabulary
  words:
  - german: halt
    translation:
      en: just / that's just how it is (resignation)
      ko: 그냥 / 어쩔 수 없이
    gender: null
    plural: null
  - german: eben
    translation:
      en: exactly / precisely (emphasis)
      ko: 바로 / 정확히
    gender: null
    plural: null
  - german: eigentlich
    translation:
      en: actually / come to think of it
      ko: 사실은 / 원래
    gender: null
    plural: null
  - german: doch
    translation:
      en: but / indeed / on the contrary (emphasis or contradiction)
      ko: 그래도 / 오히려
    gender: null
    plural: null
  - german: mal
    translation:
      en: just / once (softening particle)
      ko: 한번 / 좀
    gender: null
    plural: null
  - german: schon
    translation:
      en: already / surely (reassurance particle)
      ko: 이미 / 분명히
    gender: null
    plural: null
  - german: denn
    translation:
      en: then (curiosity / interest particle in questions)
      ko: 도대체 / 그래서
    gender: null
    plural: null
  - german: wohl
    translation:
      en: probably / I suppose (probability particle)
      ko: 아마도
    gender: null
    plural: null
  - german: bloß
    translation:
      en: just / only (emphasis / warning particle)
      ko: 제발 / 단지
    gender: null
    plural: null
  - german: ruhig
    translation:
      en: feel free to / go ahead (permission particle)
      ko: 편하게 / 마음대로
    gender: null
    plural: null
