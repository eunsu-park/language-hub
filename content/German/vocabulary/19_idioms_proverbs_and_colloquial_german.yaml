- id: 3_proverbs
  label:
    en: 3. Proverbs (Sprichwörter)
    ko: 3. 속담
  type: vocabulary
  words:
  - german: Übung macht den Meister.
    translation:
      en: Practice makes perfect.
      ko: 연습이 완벽을 만든다.
    gender: null
    plural: null
  - german: Aller Anfang ist schwer.
    translation:
      en: Every beginning is hard.
      ko: 모든 시작은 어렵다.
    gender: null
    plural: null
  - german: Ohne Fleiß kein Preis.
    translation:
      en: No pain, no gain. (lit. Without diligence, no prize.)
      ko: 노력 없이 대가 없다.
    gender: null
    plural: null
  - german: Der Apfel fällt nicht weit vom Stamm.
    translation:
      en: The apple doesn't fall far from the tree.
      ko: 부전자전.
    gender: null
    plural: null
  - german: Viele Köche verderben den Brei.
    translation:
      en: Too many cooks spoil the broth.
      ko: 사공이 많으면 배가 산으로 간다.
    gender: null
    plural: null
  - german: Reden ist Silber, Schweigen ist Gold.
    translation:
      en: Speech is silver, silence is golden.
      ko: 말은 은이요, 침묵은 금이다.
    gender: null
    plural: null
  - german: Wer zuletzt lacht, lacht am besten.
    translation:
      en: He who laughs last, laughs best.
      ko: 마지막에 웃는 자가 가장 잘 웃는다.
    gender: null
    plural: null
  - german: Aus den Augen, aus dem Sinn.
    translation:
      en: Out of sight, out of mind.
      ko: 눈에서 멀어지면 마음에서도 멀어진다.
    gender: null
    plural: null
  - german: Morgenstund hat Gold im Mund.
    translation:
      en: The early bird catches the worm. (lit. The morning hour has gold in its mouth.)
      ko: 일찍 일어나는 새가 벌레를 잡는다.
    gender: null
    plural: null
  - german: Wer anderen eine Grube gräbt, fällt selbst hinein.
    translation:
      en: He who digs a pit for others falls in himself.
      ko: 남을 해치려는 자가 스스로 해를 입는다.
    gender: null
    plural: null
  - german: Lügen haben kurze Beine.
    translation:
      en: Lies have short legs. (Lies don't get far.)
      ko: 거짓말은 오래가지 못한다.
    gender: null
    plural: null
  - german: Stille Wasser sind tief.
    translation:
      en: Still waters run deep.
      ko: 잔잔한 물이 깊다.
    gender: null
    plural: null
  - german: Kleinvieh macht auch Mist.
    translation:
      en: Every little bit helps. (lit. Small livestock also makes dung.)
      ko: 티끌 모아 태산.
    gender: null
    plural: null
  - german: Man soll den Tag nicht vor dem Abend loben.
    translation:
      en: Don't count your chickens before they hatch. (lit. Don't praise the day before evening.)
      ko: 김칫국부터 마시지 마라.
    gender: null
    plural: null
  - german: Wer den Pfennig nicht ehrt, ist des Talers nicht wert.
    translation:
      en: Take care of the pennies and the pounds will take care of themselves.
      ko: 작은 것을 아끼지 않으면 큰 것도 얻지 못한다.
    gender: null
    plural: null

- id: 4_discourse_particles
  label:
    en: 4. Discourse Particles (Modalpartikeln)
    ko: 4. 화법 조사 (양태 불변화사)
  type: vocabulary
  words:
  - german: halt
    translation:
      en: just / that's just how it is (resignation)
      ko: 그냥 / 어쩔 수 없이
    gender: null
    plural: null
  - german: eben
    translation:
      en: exactly / precisely (emphasis)
      ko: 바로 / 정확히
    gender: null
    plural: null
  - german: eigentlich
    translation:
      en: actually / come to think of it
      ko: 사실은 / 원래
    gender: null
    plural: null
  - german: doch
    translation:
      en: but / indeed / on the contrary (emphasis or contradiction)
      ko: 그래도 / 오히려
    gender: null
    plural: null
  - german: mal
    translation:
      en: just / once (softening particle)
      ko: 한번 / 좀
    gender: null
    plural: null
  - german: schon
    translation:
      en: already / surely (reassurance particle)
      ko: 이미 / 분명히
    gender: null
    plural: null
  - german: denn
    translation:
      en: then (curiosity / interest particle in questions)
      ko: 도대체 / 그래서
    gender: null
    plural: null
  - german: wohl
    translation:
      en: probably / I suppose (probability particle)
      ko: 아마도
    gender: null
    plural: null
  - german: bloß
    translation:
      en: just / only (emphasis / warning particle)
      ko: 제발 / 단지
    gender: null
    plural: null
  - german: ruhig
    translation:
      en: feel free to / go ahead (permission particle)
      ko: 편하게 / 마음대로
    gender: null
    plural: null
  - german: ja
    translation:
      en: indeed / you know (emphasis / shared knowledge particle)
      ko: 알다시피 / 정말
    gender: null
    plural: null
    notes:
      en: "Das ist ja unglaublich! (surprise/emphasis)"
      ko: "그건 정말 믿을 수 없다! (놀라움/강조)"
  - german: etwa
    translation:
      en: by any chance / perhaps (skeptical question particle)
      ko: 설마 / 혹시
    gender: null
    plural: null
    notes:
      en: "Du willst doch nicht etwa gehen? (incredulous)"
      ko: "설마 가려는 건 아니지? (의심)"
  - german: nun mal
    translation:
      en: just the way it is (resignation particle)
      ko: 원래 그런 것이다
    gender: null
    plural: null
    notes:
      en: "Das ist nun mal so. (acceptance of reality)"
      ko: "원래 그런 거야. (현실 수용)"
  - german: übrigens
    translation:
      en: by the way (topic-shifting particle)
      ko: 그런데 / 참고로
    gender: null
    plural: null
    notes:
      en: "Übrigens, hast du das gehört?"
      ko: "그런데, 너 그거 들었어?"

