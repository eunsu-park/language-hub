    notes:
      en: "eine Rede halten = to give a speech"
      ko: "eine Rede halten = 연설하다"
  - german: "das Bankett, -e"
    translation:
      en: "banquet"
      ko: "연회"
    gender: n
    notes:
      en: "ein festliches Bankett = a festive banquet"
      ko: "ein festliches Bankett = 축하 연회"
  - german: "die Tombola, -s"
    translation:
      en: "raffle / tombola"
      ko: "추첨 / 경품 행사"
    gender: f
    notes:
      en: "ein Los ziehen = to draw a ticket"
      ko: "ein Los ziehen = 제비를 뽑다"
  - german: "der DJ, -s"
    translation:
      en: "DJ"
      ko: "DJ"
