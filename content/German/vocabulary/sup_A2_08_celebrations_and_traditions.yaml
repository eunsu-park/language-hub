    notes:
      en: "eine Überraschungsparty planen = to plan a surprise party"
      ko: "eine Überraschungsparty planen = 깜짝 파티를 계획하다"
  - german: "das Feuerwerk, -e"
    translation:
      en: "fireworks"
      ko: "불꽃놀이"
    gender: n
    notes:
      en: "ein Feuerwerk abschießen = to set off fireworks"
      ko: "ein Feuerwerk abschießen = 불꽃놀이를 하다"
  - german: "die Rede, -n"
