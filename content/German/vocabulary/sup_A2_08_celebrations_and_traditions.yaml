    notes:
      en: "Pfingstmontag is a public holiday"
      ko: "성령강림절 월요일은 공휴일"
  - german: "der Nikolaustag"
    translation:
      en: "St. Nicholas Day (Dec 6)"
      ko: "성 니콜라스의 날 (12월 6일)"
    gender: m
    notes:
      en: "Children put shoes out for sweets"
      ko: "아이들이 사탕을 위해 신발을 내놓음"
  - german: "der Muttertag"
    translation:
      en: "Mother's Day"
      ko: "어머니의 날"
    gender: m
    notes:
      en: "Second Sunday in May"
      ko: "5월 두 번째 일요일"
  - german: "der Vatertag"
    translation:
      en: "Father's Day"
      ko: "아버지의 날"
    gender: m
    notes:
      en: "On Ascension Day (Christi Himmelfahrt)"
      ko: "예수 승천일 (Christi Himmelfahrt)에"
  - german: "der Valentinstag"
    translation:
      en: "Valentine's Day"
      ko: "발렌타인데이"
    gender: m
    notes:
      en: "February 14th; increasingly popular in Germany"
      ko: "2월 14일; 독일에서 점점 인기"
  - german: "der Maifeiertag"
    translation:
      en: "May Day (May 1st)"
      ko: "노동절 (5월 1일)"
    gender: m
    notes:
      en: "Tag der Arbeit = Labor Day; public holiday"
      ko: "Tag der Arbeit = 근로자의 날; 공휴일"
  - german: "Christi Himmelfahrt"
    translation:
      en: "Ascension Day"
      ko: "예수 승천일"
    gender: null
    notes:
      en: "Public holiday; 40 days after Easter"
      ko: "공휴일; 부활절 후 40일째"
  - german: "Allerheiligen"
    translation:
      en: "All Saints' Day (Nov 1)"
      ko: "만성절 (11월 1일)"
    gender: n
    notes:
      en: "Public holiday in some German states"
      ko: "일부 독일 주에서 공휴일"
  - german: "der Reformationstag"
    translation:
      en: "Reformation Day (Oct 31)"
      ko: "종교개혁 기념일 (10월 31일)"
    gender: m
    notes:
      en: "Public holiday in northern/eastern German states"
      ko: "독일 북부/동부 주에서 공휴일"
  - german: "Fronleichnam"
    translation:
      en: "Corpus Christi"
      ko: "성체축일"
    gender: n
    notes:
      en: "Catholic holiday; public holiday in some states"
      ko: "가톨릭 축일; 일부 주에서 공휴일"
  - german: "der Buß- und Bettag"
    translation:
      en: "Day of Repentance and Prayer"
      ko: "참회의 날"
    gender: m
    notes:
      en: "Public holiday only in Saxony"
      ko: "작센 주에서만 공휴일"
  - german: "Mariä Himmelfahrt"
    translation:
      en: "Assumption of Mary (Aug 15)"
      ko: "성모 승천일 (8월 15일)"
    gender: null
    notes:
      en: "Public holiday in Saarland and parts of Bavaria"
      ko: "자를란트와 바이에른 일부에서 공휴일"
  - german: "der Martinstag"
    translation:
      en: "St. Martin's Day (Nov 11)"
      ko: "성 마르틴의 날 (11월 11일)"
    gender: m
    notes:
      en: "der Laternenumzug = lantern procession for children"
      ko: "der Laternenumzug = 아이들을 위한 등불 행진"
  - german: "Halloween"
    translation:
      en: "Halloween (Oct 31)"
      ko: "할로윈 (10월 31일)"
    gender: n
    notes:
      en: "Increasingly popular in Germany, especially for children"
      ko: "독일에서 특히 아이들 사이에서 점점 인기"
  - german: "der Weltkindertag"
    translation:
      en: "World Children's Day (Sep 20)"
      ko: "세계 어린이날 (9월 20일)"
    gender: m
    notes:
      en: "Public holiday in Thuringia since 2019"
      ko: "2019년부터 튀링엔 주 공휴일"
  - german: "der Dreikönigstag"
    translation:
      en: "Epiphany / Three Kings' Day (Jan 6)"
      ko: "주현절 / 동방박사의 날 (1월 6일)"
    gender: m
    notes:
      en: "Public holiday in Bavaria, Baden-Württemberg, Saxony-Anhalt"
      ko: "바이에른, 바덴뷔르템베르크, 작센안할트에서 공휴일"
  - german: "der Karfreitag"
    translation:
      en: "Good Friday"
      ko: "성금요일"
    gender: m
    notes:
      en: "Public holiday throughout Germany; two days before Easter"
      ko: "독일 전역 공휴일; 부활절 이틀 전"
  - german: "der Ostermontag"
    translation:
      en: "Easter Monday"
      ko: "부활절 월요일"
    gender: m
    notes:
      en: "Public holiday; day after Easter Sunday"
      ko: "공휴일; 부활절 일요일 다음 날"
  - german: "der Aschermittwoch"
    translation:
      en: "Ash Wednesday"
      ko: "재의 수요일"
    gender: m
