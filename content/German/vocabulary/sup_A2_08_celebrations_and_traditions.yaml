      en: "Beginning of Lent; end of carnival season"
      ko: "사순절의 시작; 카니발 시즌의 끝"
  - german: "der Erntedank"
    translation:
      en: "harvest thanksgiving"
      ko: "추수감사"
    gender: m
    notes:
      en: "Celebrated first Sunday of October"
      ko: "10월 첫째 일요일에 기념"
  - german: "der Gedenktag, -e"
    translation:
      en: "memorial day / day of remembrance"
      ko: "추모일"
    gender: m
    notes:
      en: "der Volkstrauertag = national day of mourning"
      ko: "der Volkstrauertag = 국민 추모의 날"

- id: feier_und_party
  label:
    en: "Celebration and Party (Feier/Party)"
    ko: "축하와 파티 (Feier/Party)"
  type: vocabulary
  words:
  - german: "die Feier, -n"
    translation:
      en: "celebration / party"
      ko: "축하 행사 / 파티"
    gender: f
    notes:
      en: "eine Feier veranstalten = to organize a celebration"
      ko: "eine Feier veranstalten = 축하 행사를 열다"
  - german: "feiern"
    translation:
      en: "to celebrate"
      ko: "축하하다"
    gender: null
    notes:
      en: "Geburtstag feiern = to celebrate a birthday"
      ko: "Geburtstag feiern = 생일을 축하하다"
  - german: "die Einladung, -en"
    translation:
      en: "invitation"
      ko: "초대"
    gender: f
    notes:
      en: "eine Einladung verschicken = to send an invitation"
      ko: "eine Einladung verschicken = 초대장을 보내다"
  - german: "der Gast, Gäste"
    translation:
      en: "guest"
      ko: "손님"
    gender: m
    notes:
      en: "Gäste einladen = to invite guests"
      ko: "Gäste einladen = 손님을 초대하다"
  - german: "der Gastgeber, -"
    translation:
      en: "host"
      ko: "주인 / 호스트"
    gender: m
    notes:
      en: "die Gastgeberin = female host"
      ko: "die Gastgeberin = 여성 주인"
  - german: "der Kuchen, -"
    translation:
      en: "cake"
      ko: "케이크"
    gender: m
    notes:
      en: "die Geburtstagstorte = birthday cake"
      ko: "die Geburtstagstorte = 생일 케이크"
  - german: "die Kerze, -n"
    translation:
      en: "candle"
      ko: "초"
    gender: f
    notes:
      en: "die Geburtstagskerzen auspusten = to blow out birthday candles"
      ko: "die Geburtstagskerzen auspusten = 생일 초를 끄다"
  - german: "der Luftballon, -s"
    translation:
      en: "balloon"
      ko: "풍선"
    gender: m
    notes:
      en: "Luftballons aufblasen = to blow up balloons"
      ko: "Luftballons aufblasen = 풍선을 불다"
  - german: "das Lied, -er"
    translation:
      en: "song"
      ko: "노래"
    gender: n
    notes:
      en: "ein Lied singen = to sing a song"
      ko: "ein Lied singen = 노래를 부르다"
  - german: "anstoßen"
    translation:
      en: "to toast / to clink glasses"
      ko: "건배하다"
