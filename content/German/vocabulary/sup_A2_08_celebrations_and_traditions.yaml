      en: "New Year's Day"
      ko: "새해 첫날"
    gender: n
    notes:
      en: "Frohes neues Jahr! = Happy New Year!"
      ko: "Frohes neues Jahr! = 새해 복 많이 받으세요!"
  - german: "der Karneval"
