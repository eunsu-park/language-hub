    notes:
      en: "Prost! / Zum Wohl! = Cheers!"
      ko: "Prost! / Zum Wohl! = 건배!"
  - german: "das Buffet, -s"
    translation:
      en: "buffet"
      ko: "뷔페"
    gender: n
    notes:
      en: "ein Buffet aufbauen = to set up a buffet"
      ko: "ein Buffet aufbauen = 뷔페를 차리다"
  - german: "die Musik"
    translation:
      en: "music"
      ko: "음악"
    gender: f
    notes:
      en: "Musik auflegen / spielen = to play music"
      ko: "Musik auflegen / spielen = 음악을 틀다"
  - german: "tanzen"
    translation:
      en: "to dance"
      ko: "춤추다"
    gender: null
    notes:
      en: "die Tanzfläche = dance floor"
      ko: "die Tanzfläche = 댄스 플로어"
  - german: "gratulieren"
    translation:
      en: "to congratulate"
      ko: "축하하다"
    gender: null
    notes:
      en: "Herzlichen Glückwunsch! = Congratulations!"
      ko: "Herzlichen Glückwunsch! = 축하합니다!"
  - german: "die Überraschungsparty, -s"
    translation:
      en: "surprise party"
      ko: "깜짝 파티"
