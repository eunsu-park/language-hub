    notes:
      en: "der DJ legt Musik auf = the DJ plays music"
      ko: "der DJ legt Musik auf = DJ가 음악을 틀다"
  - german: "die Choreografie, -n"
    translation:
      en: "choreography"
      ko: "안무"
    gender: f
    notes:
      en: "einen Tanz einstudieren = to rehearse a dance"
      ko: "einen Tanz einstudieren = 춤을 연습하다"
  - german: "der Applaus"
    translation:
      en: "applause"
      ko: "박수"
