    notes:
      en: "Applaus bekommen = to receive applause"
      ko: "Applaus bekommen = 박수를 받다"
  - german: "die Stimmung"
    translation:
      en: "atmosphere / mood"
      ko: "분위기"
    gender: f
    notes:
      en: "gute Stimmung = good atmosphere"
      ko: "gute Stimmung = 좋은 분위기"
  - german: "die Girlande, -n"
    translation:
      en: "garland / streamer"
      ko: "가랜드 / 장식 줄"
    gender: f
    notes:
      en: "Girlanden aufhängen = to hang garlands"
      ko: "Girlanden aufhängen = 가랜드를 걸다"
  - german: "die Torte, -n"
    translation:
      en: "gateau / fancy cake"
      ko: "토르테 / 케이크"
    gender: f
    notes:
      en: "die Geburtstagstorte = birthday cake"
      ko: "die Geburtstagstorte = 생일 케이크"
  - german: "die Getränke (pl.)"
    translation:
      en: "beverages / drinks"
      ko: "음료"
    gender: null
    notes:
      en: "Getränke bereitstellen = to provide drinks"
      ko: "Getränke bereitstellen = 음료를 제공하다"
  - german: "die Kostümparty, -s"
    translation:
      en: "costume party"
      ko: "코스튬 파티"
    gender: f
    notes:
      en: "sich verkleiden = to dress up in costume"
      ko: "sich verkleiden = 변장하다"
  - german: "die Mitternacht"
    translation:
      en: "midnight"
      ko: "자정"
    gender: f
    notes:
      en: "um Mitternacht = at midnight (especially Silvester)"
      ko: "um Mitternacht = 자정에 (특히 새해 전야)"
  - german: "die Einweihungsfeier, -n"
    translation:
      en: "inauguration / opening ceremony"
      ko: "개업식 / 낙성식"
    gender: f
    notes:
      en: "die Einweihungsparty = housewarming party"
      ko: "die Einweihungsparty = 집들이 파티"
  - german: "der Sekt"
    translation:
      en: "sparkling wine / champagne"
      ko: "샴페인 / 스파클링 와인"
    gender: m
    notes:
      en: "mit Sekt anstoßen = to toast with sparkling wine"
      ko: "mit Sekt anstoßen = 샴페인으로 건배하다"

