topic: "Celebrations and Traditions"
categories:
- id: feiertage_und_feste
  label:
    en: "Holidays and Festivals (Feiertage/Feste)"
    ko: "공휴일과 축제 (Feiertage/Feste)"
  type: vocabulary
  words:
  - german: "der Feiertag, -e"
    translation:
      en: "public holiday"
      ko: "공휴일"
    gender: m
    notes:
      en: "gesetzlicher Feiertag = official public holiday"
      ko: "gesetzlicher Feiertag = 법정 공휴일"
  - german: "das Weihnachten"
    translation:
      en: "Christmas"
      ko: "크리스마스"
    gender: n
    notes:
      en: "Frohe Weihnachten! = Merry Christmas!"
      ko: "Frohe Weihnachten! = 메리 크리스마스!"
  - german: "der Heiligabend"
    translation:
      en: "Christmas Eve"
      ko: "크리스마스 이브"
