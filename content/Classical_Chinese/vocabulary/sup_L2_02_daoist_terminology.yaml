lesson: sup_L2_Daoist_Terminology
lesson_number: 120
hanja_level: L2
type: supplementary
topic: Daoist Terminology
categories:
- id: core_daoist
  label:
    en: Core Daoist Concepts
    ko: 도교 핵심 개념
  type: vocabulary
  words:
  - classical_chinese: 道
    reading: 도
    meaning_kun: 길
    translation:
      en: the Dao; the Way; path
      ko: "도; 길; 원리"
    gender: null
    plural: null
    notes:
      en: "辶 + 首. The nameless source of all. 道可道非常道."
      ko: "辶 + 首. 만물의 이름 없는 근원. 道可道非常道."
  - classical_chinese: 德
    reading: 덕
    meaning_kun: 덕
    translation:
      en: virtue; power; moral force
      ko: "덕; 힘; 도덕적 힘"
    gender: null
    plural: null
    notes:
      en: "彳 + 直 + 心. Inherent power from following the Dao. 道德經."
      ko: "彳 + 直 + 心. 도를 따를 때 생기는 힘. 道德經."
  - classical_chinese: 無
    reading: 무
    meaning_kun: 없을
    translation:
      en: nothingness; non-being; without
      ko: "없음; 무; 비존재"
    gender: null
    plural: null
    notes:
      en: "天下萬物生於有, 有生於無. All comes from non-being."
      ko: "천하만물생어유, 유생어무. 모든 것은 무에서 생김."
  - classical_chinese: 虛
    reading: 허
    meaning_kun: 빌
    translation:
      en: void; empty; vacuous; humble
      ko: "허; 비어 있는; 겸허한"
    gender: null
    plural: null
    notes:
      en: "虍 (tiger) + 丘. Tiger's roar in empty valley. 虛無 = void."
      ko: "虍(범) + 丘. 빈 골짜기에서 범의 포효. 虛無 = 허무."
  - classical_chinese: 靜
    reading: 정
    meaning_kun: 고요할
    translation:
      en: stillness; quiet; tranquility
      ko: "고요한; 정적; 평온"
    gender: null
    plural: null
    notes:
      en: "青 + 爭. Paradox of striving for stillness. 清靜 = purity and calm."
      ko: "靑 + 爭. 고요함을 추구하는 역설. 清靜 = 청정."
  - classical_chinese: 柔
    reading: 유
    meaning_kun: 부드러울
    translation:
      en: soft; supple; yielding
      ko: "부드러운; 유연한"
    gender: null
    plural: null
    notes:
      en: "矛 + 木. Soft wood bends but doesn't break. 柔弱勝剛強."
      ko: "矛 + 木. 부드러운 나무는 휘어도 부러지지 않음. 柔弱勝剛強."
  - classical_chinese: 朴
    reading: 박
    meaning_kun: 통나무
    translation:
      en: uncarved block; simplicity; plain
      ko: "통나무; 소박함; 질박"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 卜. Uncarved wood: symbol of natural simplicity."
      ko: "나무(木) + 卜. 다듬지 않은 나무: 자연적 소박함의 상징."
  - classical_chinese: 玄
    reading: 현
    meaning_kun: 검을
    translation:
      en: dark; mysterious; profound
      ko: "현묘한; 검은; 심오한"
    gender: null
    plural: null
    notes:
      en: "玄之又玄, 衆妙之門. Mystery upon mystery, gate of all wonders."
      ko: "현지우현, 중묘지문. 현묘하고 또 현묘한, 모든 오묘함의 문."
  - classical_chinese: 妙
    reading: 묘
    meaning_kun: 묘할
    translation:
      en: subtle; wonderful; mysterious
      ko: "미묘한; 오묘한; 신묘한"
    gender: null
    plural: null
    notes:
      en: "Woman (女) + 少. Subtle wonder of the Dao."
      ko: "여자(女) + 少. 도의 미묘한 신비."
  - classical_chinese: 化
    reading: 화
    meaning_kun: 될
    translation:
      en: transformation; change; to convert
      ko: "변화; 화하다; 교화"
    gender: null
    plural: null
    notes:
      en: "亻 + 匕. Natural transformation. 造化 = creation/nature."
      ko: "亻 + 匕. 자연의 변화. 造化 = 조화(자연의 조화)."
- id: daoist_practice
  label:
    en: Daoist Practice and Concepts
    ko: 도교 수행과 개념
  type: vocabulary
  words:
  - classical_chinese: 仙
    reading: 선
    meaning_kun: 신선
    translation:
      en: immortal; fairy; celestial being
      ko: "신선; 선인"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + mountain (山). Person who lives on mountains."
      ko: "사람(亻) + 산(山). 산에 사는 사람."
  - classical_chinese: 丹
    reading: 단
    meaning_kun: 붉을
    translation:
      en: elixir; cinnabar; alchemy
      ko: "단약; 주사(단사); 연단"
    gender: null
    plural: null
    notes:
      en: "Cinnabar used in alchemical elixirs. 煉丹 = alchemical refinement."
      ko: "연단술 영약에 쓰이는 주사. 煉丹 = 연단."
  - classical_chinese: 煉
    reading: 련
    meaning_kun: 단련할
    translation:
      en: to refine; to smelt; to temper
      ko: "단련하다; 제련하다"
    gender: null
    plural: null
    notes:
      en: "Fire (火) + 柬. To refine through fire. 修煉 = spiritual cultivation."
      ko: "불(火) + 柬. 불로 제련. 修煉 = 수련."
  - classical_chinese: 符
    reading: 부
    meaning_kun: 부적
    translation:
      en: talisman; charm; to match
      ko: "부적; 부호; 맞다"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 付. Written charm on bamboo. 符籙 = Daoist charms."
      ko: "대(竹) + 付. 대나무에 쓴 부적. 符籙 = 부록."
  - classical_chinese: 咒
    reading: 주
    meaning_kun: 빌
    translation:
      en: incantation; spell; curse
      ko: "주문; 주술; 저주"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) + 祝. Spoken magical formula."
      ko: "입(口) + 祝. 구술 주술 의식."
  - classical_chinese: 陰
    reading: 음
    meaning_kun: 그늘
    translation:
      en: yin; dark; feminine; passive
      ko: "음; 어두운; 여성적; 수동적"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 侌. Shady side. 陰陽 = yin and yang."
      ko: "언덕(阝) + 侌. 그늘진 면. 陰陽 = 음양."
  - classical_chinese: 陽
    reading: 양
    meaning_kun: 볕
    translation:
      en: yang; bright; masculine; active
      ko: "양; 밝은; 남성적; 능동적"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 昜. Sunny side. Complementary to 陰."
      ko: "언덕(阝) + 昜. 양지. 陰의 보완."
  - classical_chinese: 吐
    reading: 토
    meaning_kun: 뱉을
    translation:
      en: to exhale; to expel; to spit
      ko: "뱉다; 내쉬다; 토하다"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) + 土. 吐納 = breathing exercise (exhale and inhale)."
      ko: "입(口) + 土. 吐納 = 토납(내쉬고 들이쉼)."
  - classical_chinese: 納
    reading: 납
    meaning_kun: 들일
    translation:
      en: to inhale; to receive; to accept
      ko: "들이쉬다; 받아들이다; 납부하다"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 内. 吐納 = Daoist breathing practice."
      ko: "실(糸) + 内. 吐納 = 도교 호흡 수련."
  - classical_chinese: 逍遙
    reading: 소요
    meaning_kun: 소요
    translation:
      en: wandering freely; carefree roaming
      ko: "소요; 자유로이 거닐다"
    gender: null
    plural: null
    notes:
      en: "逍 + 遙. Free wandering. 莊子 first chapter: 逍遙遊."
      ko: "逍 + 遙. 자유로운 소요. 장자 첫 편: 逍遙遊."
- id: daoist_cosmology
  label:
    en: Daoist Cosmology
    ko: 도교 우주론
  type: vocabulary
  words:
  - classical_chinese: 太
    reading: 태
    meaning_kun: 클
    translation:
      en: great; supreme; grand
      ko: "크다; 지극한; 태(太)"
    gender: null
    plural: null
    notes:
      en: "大 + dot. Greater than great. 太極 = Supreme Ultimate."
      ko: "大 + 점. 큰 것보다 큰. 太極 = 태극."
  - classical_chinese: 極
    reading: 극
    meaning_kun: 다할
    translation:
      en: ultimate; pole; extreme
      ko: "극; 극점; 다하다"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 亟. Ridgepole of a roof = highest point."
      ko: "나무(木) + 亟. 지붕의 마룻대 = 최고점."
  - classical_chinese: 氣
    reading: 기
    meaning_kun: 기운
    translation:
      en: qi; vital breath; energy
      ko: "기; 생명 에너지; 기운"
    gender: null
    plural: null
    notes:
      en: "Steam from rice. Universal life force in Daoism."
      ko: "밥에서 올라오는 김. 도교의 우주적 생명력."
  - classical_chinese: 精
    reading: 정
    meaning_kun: 정할
    translation:
      en: essence; spirit; refined
      ko: "정기; 정수; 정제된"
    gender: null
    plural: null
    notes:
      en: "Rice (米) + 青. Refined essence. 精氣神 = essence, qi, spirit."
      ko: "쌀(米) + 靑. 정제된 정수. 精氣神 = 정기신."
  - classical_chinese: 神
    reading: 신
    meaning_kun: 귀신
    translation:
      en: spirit; deity; divine
      ko: "신; 정신; 신령"
    gender: null
    plural: null
    notes:
      en: "Altar (示) + 申. 精氣神 = the three treasures of the body."
      ko: "제단(示) + 申. 精氣神 = 몸의 세 보물."
  - classical_chinese: 萬
    reading: 만
    meaning_kun: 일만
    translation:
      en: ten thousand; myriad; all
      ko: "만; 수많은; 모든"
    gender: null
    plural: null
    notes:
      en: "萬物 = all things. 道生一, 一生二, 二生三, 三生萬物."
      ko: "萬物 = 만물. 도생일, 일생이, 이생삼, 삼생만물."
  - classical_chinese: 返
    reading: 반
    meaning_kun: 돌아갈
    translation:
      en: to return; to revert
      ko: "돌아가다; 되돌리다"
    gender: null
    plural: null
    notes:
      en: "辶 + 反. 反者道之動 = Reversal is the movement of the Dao."
      ko: "辶 + 反. 反者道之動 = 반대로 돌아감이 도의 움직임."
  - classical_chinese: 樸
    reading: 박
    meaning_kun: 순박할
    translation:
      en: simple; unadorned; natural
      ko: "순박한; 꾸미지 않은; 자연스러운"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 菐. Return to simplicity. 見素抱樸."
      ko: "나무(木) + 菐. 소박함으로 돌아감. 見素抱樸."
  - classical_chinese: 谷
    reading: 곡
    meaning_kun: 골
    translation:
      en: valley; ravine; empty space
      ko: "골짜기; 빈 공간"
    gender: null
    plural: null
    notes:
      en: "Valley spirit in Laozi. 谷神不死 = Valley spirit never dies."
      ko: "노자의 곡신. 谷神不死 = 골짜기 신은 죽지 않는다."
  - classical_chinese: 嬰
    reading: 영
    meaning_kun: 아기
    translation:
      en: infant; baby
      ko: "갓난아이; 아기"
    gender: null
    plural: null
    notes:
      en: "專心若嬰兒. Return to infant-like simplicity."
      ko: "전심약영아. 갓난아이 같은 순수함으로 돌아감."
