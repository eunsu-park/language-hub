lesson: sup_L2_Classical_Allusions
lesson_number: 124
hanja_level: L2
type: supplementary
topic: Classical Allusions
categories:
- id: idioms_from_history
  label:
    en: Idioms from Historical Events
    ko: 역사 고사에서 유래한 성어
  type: vocabulary
  words:
  - classical_chinese: 臥薪嘗膽
    reading: 와신상담
    meaning_kun: 와신상담
    translation:
      en: sleeping on brushwood and tasting gall
      ko: "섶 위에 눕고 쓸개를 맛봄"
    gender: null
    plural: null
    notes:
      en: "King Goujian of Yue endured hardship to avenge defeat. Perseverance for revenge."
      ko: "월왕 구천이 복수를 위해 고난을 견딘 고사. 원수를 갚기 위한 인내."
  - classical_chinese: 四面楚歌
    reading: 사면초가
    meaning_kun: 사면초가
    translation:
      en: surrounded by Chu songs on all sides
      ko: "사방에서 초나라 노래가 들림"
    gender: null
    plural: null
    notes:
      en: "Xiang Yu's final defeat. Completely surrounded and isolated."
      ko: "항우의 최후. 완전히 포위되어 고립됨."
  - classical_chinese: 背水之陣
    reading: 배수지진
    meaning_kun: 배수지진
    translation:
      en: battle formation with river behind
      ko: "물을 등지고 진을 침"
    gender: null
    plural: null
    notes:
      en: "Han Xin's strategy. Fighting with no retreat = desperate determination."
      ko: "한신의 전략. 퇴로 없이 싸움 = 필사적 결의."
  - classical_chinese: 完璧歸趙
    reading: 완벽귀조
    meaning_kun: 완벽귀조
    translation:
      en: returning the jade intact to Zhao
      ko: "옥벽을 온전히 조나라에 돌려줌"
    gender: null
    plural: null
    notes:
      en: "Lin Xiangru's diplomatic triumph. Accomplishing a mission perfectly."
      ko: "인상여의 외교적 승리. 임무를 완벽히 수행함."
  - classical_chinese: 刻舟求劍
    reading: 각주구검
    meaning_kun: 각주구검
    translation:
      en: carving the boat to find the sword
      ko: "배에 표시하여 칼을 찾음"
    gender: null
    plural: null
    notes:
      en: "From Lüshi Chunqiu. Stubbornly clinging to outdated methods."
      ko: "여씨춘추에서. 낡은 방법에 고집스레 매달림."
  - classical_chinese: 守株待兔
    reading: 수주대토
    meaning_kun: 수주대토
    translation:
      en: guarding a tree stump waiting for rabbits
      ko: "그루터기를 지키며 토끼를 기다림"
    gender: null
    plural: null
    notes:
      en: "From 韓非子. Relying on luck instead of effort."
      ko: "한비자에서. 노력 대신 요행에 기대는 것."
  - classical_chinese: 朝三暮四
    reading: 조삼모사
    meaning_kun: 조삼모사
    translation:
      en: three in morning, four in evening
      ko: "아침에 셋, 저녁에 넷"
    gender: null
    plural: null
    notes:
      en: "From 莊子. Deceived by superficial changes; same result."
      ko: "장자에서. 겉모습의 변화에 속음; 결과는 같음."
  - classical_chinese: 塞翁之馬
    reading: 새옹지마
    meaning_kun: 새옹지마
    translation:
      en: the old man at the fort's horse
      ko: "변방 노인의 말"
    gender: null
    plural: null
    notes:
      en: "From 淮南子. Fortune and misfortune are unpredictable."
      ko: "회남자에서. 행운과 불행은 예측할 수 없음."
  - classical_chinese: 矛盾
    reading: 모순
    meaning_kun: 모순
    translation:
      en: contradiction (spear and shield)
      ko: "모순(창과 방패)"
    gender: null
    plural: null
    notes:
      en: "From 韓非子. A merchant claimed his spear and shield were both invincible."
      ko: "한비자에서. 상인이 자기 창과 방패가 둘 다 무적이라 주장."
  - classical_chinese: 杞憂
    reading: 기우
    meaning_kun: 기우
    translation:
      en: needless worry (of Qi man)
      ko: "기나라 사람의 걱정"
    gender: null
    plural: null
    notes:
      en: "From 列子. A man of Qi feared the sky would fall. Groundless anxiety."
      ko: "열자에서. 기나라 사람이 하늘이 무너질까 걱정. 쓸데없는 근심."
- id: idioms_from_classics
  label:
    en: Idioms from Classical Texts
    ko: 경전에서 유래한 성어
  type: vocabulary
  words:
  - classical_chinese: 溫故知新
    reading: 온고지신
    meaning_kun: 온고지신
    translation:
      en: review the old, learn the new
      ko: "옛것을 익혀 새것을 앎"
    gender: null
    plural: null
    notes:
      en: "From 論語. A teacher reviews the old to discover the new."
      ko: "논어에서. 옛것을 복습하여 새것을 발견하는 스승."
  - classical_chinese: 切磋琢磨
    reading: 절차탁마
    meaning_kun: 절차탁마
    translation:
      en: cutting, filing, chiseling, polishing
      ko: "자르고, 다듬고, 쪼고, 갈다"
    gender: null
    plural: null
    notes:
      en: "From 詩經. Refining oneself through mutual study and effort."
      ko: "시경에서. 서로 배우고 노력하여 자신을 갈고닦음."
  - classical_chinese: 知己知彼
    reading: 지기지피
    meaning_kun: 지기지피
    translation:
      en: know yourself, know your enemy
      ko: "자신을 알고 적을 알다"
    gender: null
    plural: null
    notes:
      en: "From 孫子兵法. 百戰不殆 = never in danger in a hundred battles."
      ko: "손자병법에서. 百戰不殆 = 백 번 싸워도 위태롭지 않음."
  - classical_chinese: 大器晩成
    reading: 대기만성
    meaning_kun: 대기만성
    translation:
      en: great vessel takes long to complete
      ko: "큰 그릇은 늦게 이루어짐"
    gender: null
    plural: null
    notes:
      en: "From 道德經. Great talent matures slowly."
      ko: "도덕경에서. 큰 재능은 천천히 성숙함."
  - classical_chinese: 上善若水
    reading: 상선약수
    meaning_kun: 상선약수
    translation:
      en: supreme goodness is like water
      ko: "최고의 선은 물과 같다"
    gender: null
    plural: null
    notes:
      en: "From 道德經. Water benefits all without competing."
      ko: "도덕경에서. 물은 다투지 않으면서 만물을 이롭게 함."
  - classical_chinese: 天下爲公
    reading: 천하위공
    meaning_kun: 천하위공
    translation:
      en: all under heaven is for the public
      ko: "천하는 공적인 것"
    gender: null
    plural: null
    notes:
      en: "From 禮記. Ideal of public governance."
      ko: "예기에서. 공적 통치의 이상."
  - classical_chinese: 學而時習
    reading: 학이시습
    meaning_kun: 학이시습
    translation:
      en: to learn and practice in due time
      ko: "배우고 때때로 익히다"
    gender: null
    plural: null
    notes:
      en: "Opening of 論語. Joy of continuous learning and practice."
      ko: "논어의 첫 구절. 꾸준히 배우고 익히는 기쁨."
  - classical_chinese: 鵬程萬里
    reading: 붕정만리
    meaning_kun: 붕정만리
    translation:
      en: Peng bird's journey of ten thousand li
      ko: "붕새의 만 리 여정"
    gender: null
    plural: null
    notes:
      en: "From 莊子. Grand ambition and boundless future."
      ko: "장자에서. 원대한 포부와 끝없는 앞날."
  - classical_chinese: 畫龍點睛
    reading: 화룡점정
    meaning_kun: 화룡점정
    translation:
      en: painting the dragon, dotting the eyes
      ko: "용을 그리고 눈동자를 찍다"
    gender: null
    plural: null
    notes:
      en: "Adding the crucial finishing touch that brings a work to life."
      ko: "작품에 생명을 불어넣는 결정적 마무리."
  - classical_chinese: 畫蛇添足
    reading: 화사첨족
    meaning_kun: 화사첨족
    translation:
      en: drawing a snake and adding legs
      ko: "뱀을 그리고 발을 더하다"
    gender: null
    plural: null
    notes:
      en: "From 戰國策. Ruining something by adding unnecessary extras."
      ko: "전국책에서. 불필요한 것을 더하여 일을 그르침."
- id: proverbial_expressions
  label:
    en: Proverbial Expressions
    ko: 격언적 표현
  type: vocabulary
  words:
  - classical_chinese: 百聞不如一見
    reading: 백문불여일견
    meaning_kun: 백문불여일견
    translation:
      en: hearing a hundred times is not as good as seeing once
      ko: "백 번 듣는 것이 한 번 보는 것만 못하다"
    gender: null
    plural: null
    notes:
      en: "From 漢書. Seeing is believing."
      ko: "한서에서. 직접 보는 것이 최고."
  - classical_chinese: 他山之石
    reading: 타산지석
    meaning_kun: 타산지석
    translation:
      en: stone from another mountain
      ko: "다른 산의 돌"
    gender: null
    plural: null
    notes:
      en: "From 詩經. Others' mistakes can polish one's own jade."
      ko: "시경에서. 남의 잘못도 자신의 옥을 갈 수 있음."
  - classical_chinese: 三人行必有我師
    reading: 삼인행필유아사
    meaning_kun: 삼인행필유아사
    translation:
      en: among three walking, one must be my teacher
      ko: "세 사람이 가면 반드시 나의 스승이 있다"
    gender: null
    plural: null
    notes:
      en: "From 論語. Everyone has something to teach."
      ko: "논어에서. 누구에게나 배울 점이 있음."
  - classical_chinese: 逆水行舟
    reading: 역수행주
    meaning_kun: 역수행주
    translation:
      en: sailing upstream
      ko: "물을 거슬러 배를 젓다"
    gender: null
    plural: null
    notes:
      en: "If you don't advance, you fall behind. Constant effort needed."
      ko: "나아가지 않으면 뒤처짐. 끊임없는 노력이 필요."
  - classical_chinese: 亡羊補牢
    reading: 망양보뢰
    meaning_kun: 망양보뢰
    translation:
      en: mending the pen after the sheep is lost
      ko: "양을 잃고 우리를 고치다"
    gender: null
    plural: null
    notes:
      en: "From 戰國策. Better late than never to fix a problem."
      ko: "전국책에서. 문제를 바로잡기에 늦은 때는 없음."
  - classical_chinese: 千里之行始於足下
    reading: 천리지행시어족하
    meaning_kun: 천리지행시어족하
    translation:
      en: a journey of a thousand li begins with one step
      ko: "천 리 길도 발 아래에서 시작된다"
    gender: null
    plural: null
    notes:
      en: "From 道德經. Great achievements start with small steps."
      ko: "도덕경에서. 위대한 성취는 작은 걸음에서 시작."
  - classical_chinese: 鶴立鷄群
    reading: 학립계군
    meaning_kun: 학립계군
    translation:
      en: a crane standing among chickens
      ko: "닭 무리 속의 학"
    gender: null
    plural: null
    notes:
      en: "From 世說新語. Outstanding person among ordinary ones."
      ko: "세설신어에서. 평범한 사람들 사이의 뛰어난 인물."
  - classical_chinese: 愚公移山
    reading: 우공이산
    meaning_kun: 우공이산
    translation:
      en: Foolish Old Man removes the mountains
      ko: "우공이 산을 옮기다"
    gender: null
    plural: null
    notes:
      en: "From 列子. Perseverance conquers all obstacles."
      ko: "열자에서. 인내와 끈기는 모든 장애를 극복."
  - classical_chinese: 螳螂捕蟬
    reading: 당랑포선
    meaning_kun: 당랑포선
    translation:
      en: mantis catches the cicada
      ko: "사마귀가 매미를 잡다"
    gender: null
    plural: null
    notes:
      en: "黃雀在後. Unaware of danger behind while pursuing prey."
      ko: "黃雀在後. 먹이를 쫓으면서 뒤의 위험을 모름."
  - classical_chinese: 掩耳盜鈴
    reading: 엄이도령
    meaning_kun: 엄이도령
    translation:
      en: covering ears to steal a bell
      ko: "귀를 막고 방울을 훔치다"
    gender: null
    plural: null
    notes:
      en: "From 呂氏春秋. Self-deception; fooling only oneself."
      ko: "여씨춘추에서. 자기기만; 자기 자신만 속임."
