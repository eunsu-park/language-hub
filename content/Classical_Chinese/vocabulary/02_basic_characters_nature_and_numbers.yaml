    meaning_kun: 가까울
    translation:
      en: near; close
      ko: 가깝다
    gender: null
    plural: null
    notes:
      en: "Walk radical (辶) + 斤 (sound). A short distance."
      ko: "갈 부수(辶) + 斤(음). 가까운 거리."
