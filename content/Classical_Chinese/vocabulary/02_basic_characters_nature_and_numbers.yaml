    reading: 만
    meaning_kun: 일만
    translation:
      en: ten thousand
      ko: 만
    gender: null
    plural: null
    notes:
      en: "Originally depicted a scorpion; borrowed for 'ten thousand'."
      ko: "원래 전갈을 나타냈으나 '만(10000)'으로 가차됨."
