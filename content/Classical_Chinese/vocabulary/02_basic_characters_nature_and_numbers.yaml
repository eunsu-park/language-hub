      ko: "一이 白 위에 있는 형태. 백(100)을 나타냄."
  - classical_chinese: 千
    reading: 천
    meaning_kun: 즈믄
    translation:
      en: thousand
      ko: 천
    gender: null
    plural: null
    notes:
