- id: number_characters
  label:
    en: Number Characters
    ko: 숫자 한자
  type: vocabulary
  words:
  - classical_chinese: 一
    reading: 일
    meaning_kun: 한
    translation:
      en: one
      ko: 하나
    gender: null
    plural: null
    notes:
      en: "A single horizontal stroke represents the number one."
      ko: "하나의 가로획으로 숫자 1을 나타냄."
  - classical_chinese: 二
    reading: 이
    meaning_kun: 두
    translation:
      en: two
      ko: 둘
    gender: null
    plural: null
    notes:
      en: "Two horizontal strokes represent the number two."
      ko: "두 개의 가로획으로 숫자 2를 나타냄."
  - classical_chinese: 三
    reading: 삼
    meaning_kun: 석
    translation:
      en: three
      ko: 셋
    gender: null
    plural: null
    notes:
      en: "Three horizontal strokes represent the number three."
      ko: "세 개의 가로획으로 숫자 3을 나타냄."
  - classical_chinese: 四
    reading: 사
    meaning_kun: 넉
    translation:
      en: four
      ko: 넷
    gender: null
    plural: null
    notes:
