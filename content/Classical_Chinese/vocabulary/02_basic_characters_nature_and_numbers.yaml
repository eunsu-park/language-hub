    reading: 육
    meaning_kun: 여섯
    translation:
      en: six
      ko: 여섯
    gender: null
    plural: null
    notes:
      en: "Originally depicted a shelter; borrowed for the number six."
      ko: "원래 집을 나타냈으나 숫자 6으로 가차됨."
