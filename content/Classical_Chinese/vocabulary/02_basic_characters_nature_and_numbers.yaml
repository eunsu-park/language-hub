    reading: 구
    meaning_kun: 아홉
    translation:
      en: nine
      ko: 아홉
    gender: null
    plural: null
    notes:
      en: "Pictograph of a bent arm. Borrowed for the number nine."
      ko: "구부린 팔의 상형자. 숫자 9로 가차됨."
  - classical_chinese: 十
    reading: 십
    meaning_kun: 열
    translation:
      en: ten
      ko: 열
    gender: null
    plural: null
    notes:
      en: "A cross shape representing completeness; the number ten."
      ko: "완전함을 나타내는 십자 모양. 숫자 10."
  - classical_chinese: 百
    reading: 백
    meaning_kun: 온
    translation:
      en: hundred
      ko: 백
    gender: null
    plural: null
    notes:
