lesson: sup_L4_Geography_and_Places
lesson_number: 110
hanja_level: L4
type: supplementary
topic: Geography and Places
categories:
- id: landforms
  label:
    en: Landforms
    ko: 지형
  type: vocabulary
  words:
  - classical_chinese: 嶽
    reading: 악
    meaning_kun: 큰산
    translation:
      en: great mountain; sacred peak
      ko: "큰 산; 명산"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 獄. Sacred mountains. 五嶽 = Five Sacred Peaks."
      ko: "산(山) + 獄. 신성한 산. 五嶽 = 오악."
  - classical_chinese: 峰
    reading: 봉
    meaning_kun: 봉우리
    translation:
      en: peak; summit
      ko: "봉우리; 정상"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 夆. Pointed mountain top."
      ko: "산(山) + 夆. 뾰족한 산꼭대기."
  - classical_chinese: 谷
    reading: 곡
    meaning_kun: 골
    translation:
      en: valley; gorge
      ko: "골짜기; 계곡"
    gender: null
    plural: null
    notes:
      en: "Pictograph of water flowing between mountains. Radical #150."
      ko: "산 사이로 물이 흐르는 상형자. 부수 제150번."
  - classical_chinese: 崖
    reading: 애
    meaning_kun: 낭떠러지
    translation:
      en: cliff; precipice
      ko: "절벽; 낭떠러지"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 厓. Steep rock face."
      ko: "산(山) + 厓. 가파른 바위 면."
  - classical_chinese: 丘
    reading: 구
    meaning_kun: 언덕
    translation:
      en: hill; mound
      ko: "언덕; 구릉"
    gender: null
    plural: null
    notes:
      en: "Pictograph of two hills. Also Confucius's given name (孔丘)."
      ko: "두 언덕의 상형자. 공자(孔丘)의 이름이기도 함."
  - classical_chinese: 原
    reading: 원
    meaning_kun: 벌
    translation:
      en: plain; plateau; origin
      ko: "평원; 들; 근원"
    gender: null
    plural: null
    notes:
      en: "Cliff (厂) + spring (泉). Source of a spring. Also 'origin.'"
      ko: "절벽(厂) + 샘(泉). 샘의 원천. '근원'의 뜻도."
  - classical_chinese: 野
    reading: 야
    meaning_kun: 들
    translation:
      en: field; wild; countryside
      ko: "들; 들판; 야생"
    gender: null
    plural: null
    notes:
      en: "里 (village) + 予. Land outside the village. 野人 = rustic person."
      ko: "마을(里) + 予. 마을 밖의 땅. 野人 = 시골 사람."
  - classical_chinese: 洲
    reading: 주
    meaning_kun: 섬
    translation:
      en: islet; continent; sandbar
      ko: "모래섬; 대륙; 하중도"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 州. Land surrounded by water."
      ko: "물(氵) + 州. 물로 둘러싸인 땅."
  - classical_chinese: 岸
    reading: 안
    meaning_kun: 언덕
    translation:
      en: shore; bank; cliff
      ko: "강가; 해안; 기슭"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 厂 + 干. High bank of a river."
      ko: "산(山) + 厂 + 干. 강의 높은 기슭."
  - classical_chinese: 沙
    reading: 사
    meaning_kun: 모래
    translation:
      en: sand; gravel
      ko: 모래
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 少. Fine particles in water."
      ko: "물(氵) + 少. 물속의 작은 알갱이."
- id: water_features
  label:
    en: Water Features
    ko: 수계
  type: vocabulary
  words:
  - classical_chinese: 江
    reading: 강
    meaning_kun: 강
    translation:
      en: river (large); Yangtze
      ko: "강; 장강(양쯔강)"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 工. Originally referred to the Yangtze River."
      ko: "물(氵) + 工. 원래 장강(양쯔강)을 지칭."
  - classical_chinese: 河
    reading: 하
    meaning_kun: 물
    translation:
      en: river; Yellow River
      ko: "강; 황하"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 可. Originally referred to the Yellow River."
      ko: "물(氵) + 可. 원래 황하(黃河)를 지칭."
  - classical_chinese: 湖
    reading: 호
    meaning_kun: 호수
    translation:
      en: lake
      ko: 호수
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 胡. Body of still water."
      ko: "물(氵) + 胡. 고인 물."
  - classical_chinese: 海
    reading: 해
    meaning_kun: 바다
    translation:
      en: sea; ocean
      ko: 바다
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 每. Vast body of water. 四海 = the whole world."
      ko: "물(氵) + 每. 광활한 물. 四海 = 온 세상."
  - classical_chinese: 溪
    reading: 계
    meaning_kun: 시내
    translation:
      en: stream; brook; creek
      ko: "시내; 개울"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 奚. Mountain stream."
      ko: "물(氵) + 奚. 산속 시내."
  - classical_chinese: 瀑
    reading: 폭
    meaning_kun: 폭포
    translation:
      en: waterfall; cascade
      ko: 폭포
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 暴 (violent). Violently falling water."
      ko: "물(氵) + 暴(사나울 폭). 세차게 떨어지는 물."
  - classical_chinese: 池
    reading: 지
    meaning_kun: 못
    translation:
      en: pond; pool
      ko: "못; 연못"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 也. Still water. 池塘 = pond."
      ko: "물(氵) + 也. 고인 물. 池塘 = 연못."
- id: places_and_structures
  label:
    en: Places and Structures
    ko: 장소와 건축
  type: vocabulary
  words:
  - classical_chinese: 城
    reading: 성
    meaning_kun: 성
    translation:
      en: city wall; fortress; city
      ko: "성; 성벽; 도시"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 成. Walled settlement."
      ko: "흙(土) + 成. 성벽으로 둘러싸인 거주지."
  - classical_chinese: 宮
    reading: 궁
    meaning_kun: 집
    translation:
      en: palace; temple
      ko: "궁궐; 궁전"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 呂. Grand building. Originally any dwelling."
      ko: "지붕(宀) + 呂. 웅장한 건물. 원래는 일반 거처."
  - classical_chinese: 殿
    reading: 전
    meaning_kun: 전각
    translation:
      en: hall; palace hall; temple
      ko: "전각; 대전"
    gender: null
    plural: null
    notes:
      en: "尸 + 共 + 殳. Grand ceremonial hall."
      ko: "尸 + 共 + 殳. 웅장한 의식 홀."
  - classical_chinese: 閣
    reading: 각
    meaning_kun: 누각
    translation:
      en: pavilion; tower; cabinet
      ko: "누각; 다락; 내각"
    gender: null
    plural: null
    notes:
      en: "Gate (門) + 各. Multi-story building. Also 'cabinet' (government)."
      ko: "문(門) + 各. 여러 층의 건물. '내각'의 뜻도."
  - classical_chinese: 塔
    reading: 탑
    meaning_kun: 탑
    translation:
      en: pagoda; tower
      ko: "탑; 탑파"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 荅. Buddhist pagoda. Transliteration from Sanskrit stūpa."
      ko: "흙(土) + 荅. 불교 탑. 산스크리트 stūpa의 음역."
  - classical_chinese: 廟
    reading: 묘
    meaning_kun: 사당
    translation:
      en: temple; ancestral shrine
      ko: "사당; 종묘"
    gender: null
    plural: null
    notes:
      en: "Shelter (广) + 朝. Building for ancestral worship."
      ko: "엄호(广) + 朝. 조상 제사를 위한 건물."
  - classical_chinese: 墓
    reading: 묘
    meaning_kun: 무덤
    translation:
      en: grave; tomb
      ko: "무덤; 묘"
    gender: null
    plural: null
    notes:
      en: "莫 (sunset) + earth (土). Burial place."
      ko: "莫(저물 막) + 흙(土). 매장 장소."
  - classical_chinese: 園
    reading: 원
    meaning_kun: 동산
    translation:
      en: garden; park; orchard
      ko: "동산; 정원; 과수원"
    gender: null
    plural: null
    notes:
      en: "Enclosure (囗) + 袁. Enclosed cultivated area."
      ko: "에워쌀(囗) + 袁. 울타리 친 경작지."
  - classical_chinese: 路
    reading: 로
    meaning_kun: 길
    translation:
      en: road; path; route
      ko: "길; 도로; 노선"
    gender: null
    plural: null
    notes:
      en: "Foot (足) + 各. Path walked upon. 道路 = road."
      ko: "발(足) + 各. 걸어 다니는 길. 道路 = 도로."
  - classical_chinese: 郊
    reading: 교
    meaning_kun: 들
    translation:
      en: suburb; outskirts
      ko: "교외; 변두리"
    gender: null
    plural: null
    notes:
      en: "City radical (阝) + 交. Area outside city walls."
      ko: "읍(阝) + 交. 성벽 밖의 지역."
