lesson: sup_L1_Historical_Institutions
lesson_number: 128
hanja_level: L1
type: supplementary
topic: Historical Institutions
categories:
- id: central_government
  label:
    en: Central Government Institutions
    ko: 중앙 관제
  type: vocabulary
  words:
  - classical_chinese: 丞相
    reading: 승상
    meaning_kun: 승상
    translation:
      en: prime minister; chancellor
      ko: "승상; 재상"
    gender: null
    plural: null
    notes:
      en: "丞 (assist) + 相 (minister). Highest civil official. Qin-Han period."
      ko: "丞(돕다) + 相(서로). 최고 문관. 진·한 시대."
  - classical_chinese: 御史
    reading: 어사
    meaning_kun: 어사
    translation:
      en: censor; inspector
      ko: "어사; 감찰관"
    gender: null
    plural: null
    notes:
      en: "御 (imperial) + 史 (historian). 御史臺 = Censorate."
      ko: "御(모실 어) + 史(역사). 御史臺 = 어사대."
  - classical_chinese: 尙書
    reading: 상서
    meaning_kun: 상서
    translation:
      en: minister; secretary of state
      ko: "상서; 장관"
    gender: null
    plural: null
    notes:
      en: "尙 (esteem) + 書 (documents). Head of Six Ministries (六部)."
      ko: "尙(높일 상) + 書(글). 육부(六部)의 수장."
  - classical_chinese: 翰林
    reading: 한림
    meaning_kun: 한림
    translation:
      en: Hanlin Academy; imperial scholar
      ko: "한림원; 한림 학사"
    gender: null
    plural: null
    notes:
      en: "翰 (feather/pen) + 林 (forest). Forest of pens = scholars."
      ko: "翰(붓) + 林(숲). 붓의 숲 = 학자들."
  - classical_chinese: 內閣
    reading: 내각
    meaning_kun: 내각
    translation:
      en: grand secretariat; cabinet
      ko: "내각; 대학사부"
    gender: null
    plural: null
    notes:
      en: "內 (inner) + 閣 (pavilion). Ming-Qing central advisory body."
      ko: "內(안) + 閣(누각). 명·청 중앙 자문 기구."
  - classical_chinese: 太守
    reading: 태수
    meaning_kun: 태수
    translation:
      en: prefect; governor of a commandery
      ko: "태수; 군(郡)의 장관"
    gender: null
    plural: null
    notes:
      en: "太 (great) + 守 (guard). Han dynasty local administrator."
      ko: "太(크다) + 守(지킬 수). 한대 지방 행정관."
  - classical_chinese: 刺史
    reading: 자사
    meaning_kun: 자사
    translation:
      en: regional inspector; provincial governor
      ko: "자사; 주(州)의 감찰관"
    gender: null
    plural: null
    notes:
      en: "刺 (inspect) + 史 (clerk). Provincial overseer in Han-Tang."
      ko: "刺(찌를 자) + 史(역사). 한·당 시대의 주 감독관."
  - classical_chinese: 節度使
    reading: 절도사
    meaning_kun: 절도사
    translation:
      en: military governor; jiedushi
      ko: "절도사; 군사 총독"
    gender: null
    plural: null
    notes:
      en: "節 (token) + 度 (manage) + 使 (envoy). Tang frontier military governors."
      ko: "節(부절) + 度(다스리다) + 使(사신). 당대 변방 군사 총독."
  - classical_chinese: 宦
    reading: 환
    meaning_kun: 벼슬
    translation:
      en: eunuch; court official
      ko: "환관; 내시; 벼슬"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 臣. 宦官 = eunuch. Palace attendant."
      ko: "지붕(宀) + 臣. 宦官 = 환관. 궁중 시종."
  - classical_chinese: 諫
    reading: 간
    meaning_kun: 간할
    translation:
      en: to remonstrate; to advise against
      ko: "간하다; 충고하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 柬. 諫官 = remonstrance official. 諫言 = admonition."
      ko: "말씀(言) + 柬. 諫官 = 간관. 諫言 = 간언."
- id: examination_system
  label:
    en: Examination System
    ko: 과거 제도
  type: vocabulary
  words:
  - classical_chinese: 科擧
    reading: 과거
    meaning_kun: 과거
    translation:
      en: imperial examination system
      ko: "과거; 과거 제도"
    gender: null
    plural: null
    notes:
      en: "科 (subject) + 擧 (to raise). Civil service exam system (Sui-Qing)."
      ko: "科(과목) + 擧(들 거). 관리 선발 시험 제도(수~청)."
  - classical_chinese: 狀元
    reading: 장원
    meaning_kun: 장원
    translation:
      en: top scorer; zhuangyuan
      ko: "장원; 수석 합격자"
    gender: null
    plural: null
    notes:
      en: "狀 (appearance) + 元 (first). First-place finisher in palace exam."
      ko: "狀(형상) + 元(으뜸). 전시(殿試) 1등."
  - classical_chinese: 進士
    reading: 진사
    meaning_kun: 진사
    translation:
      en: presented scholar; jinshi degree
      ko: "진사; 진사 급제자"
    gender: null
    plural: null
    notes:
      en: "進 (advance) + 士 (scholar). Highest regular exam degree."
      ko: "進(나아갈 진) + 士(선비). 최고 정규 시험 학위."
  - classical_chinese: 擧人
    reading: 거인
    meaning_kun: 거인
    translation:
      en: recommended scholar; juren degree
      ko: "거인; 향시 합격자"
    gender: null
    plural: null
    notes:
      en: "擧 (to raise) + 人 (person). Provincial exam passer."
      ko: "擧(들 거) + 人(사람). 향시 합격자."
  - classical_chinese: 秀才
    reading: 수재
    meaning_kun: 수재
    translation:
      en: cultivated talent; xiucai degree
      ko: "수재; 생원"
    gender: null
    plural: null
    notes:
      en: "秀 (excellent) + 才 (talent). Lowest exam degree."
      ko: "秀(빼어날 수) + 才(재주). 가장 낮은 시험 학위."
  - classical_chinese: 監
    reading: 감
    meaning_kun: 볼
    translation:
      en: to supervise; school; prison
      ko: "감독; 학교; 감옥"
    gender: null
    plural: null
    notes:
      en: "臣 + 皿. 國子監 = Imperial Academy (highest school)."
      ko: "臣 + 皿. 國子監 = 국자감(최고 교육 기관)."
- id: historical_systems
  label:
    en: Historical Administrative Systems
    ko: 역대 행정 제도
  type: vocabulary
  words:
  - classical_chinese: 郡
    reading: 군
    meaning_kun: 고을
    translation:
      en: commandery; district
      ko: "군; 고을"
    gender: null
    plural: null
    notes:
      en: "尹 + city (阝). 郡縣制 = commandery-county system (Qin)."
      ko: "尹 + 읍(阝). 郡縣制 = 군현제(진)."
  - classical_chinese: 縣
    reading: 현
    meaning_kun: 고을
    translation:
      en: county; district
      ko: "현; 고을"
    gender: null
    plural: null
    notes:
      en: "县 + 糸. Basic administrative unit. 知縣 = county magistrate."
      ko: "县 + 糸. 기본 행정 단위. 知縣 = 지현(현의 장관)."
  - classical_chinese: 州
    reading: 주
    meaning_kun: 고을
    translation:
      en: province; prefecture; state
      ko: "주; 고을"
    gender: null
    plural: null
    notes:
      en: "Islets in a river. 九州 = Nine Provinces (ancient China)."
      ko: "강 속의 섬들. 九州 = 구주(고대 중국)."
  - classical_chinese: 府
    reading: 부
    meaning_kun: 관청
    translation:
      en: prefecture; government office; storehouse
      ko: "부; 관청; 창고"
    gender: null
    plural: null
    notes:
      en: "Shelter (广) + 付. 知府 = prefect. 政府 = government."
      ko: "엄호(广) + 付. 知府 = 지부(부의 장관). 政府 = 정부."
  - classical_chinese: 道
    reading: 도
    meaning_kun: 길
    translation:
      en: circuit; province; the Way
      ko: "도(행정구역); 길; 도"
    gender: null
    plural: null
    notes:
      en: "Tang administrative division. Korea's 道 (province) derives from this."
      ko: "당대 행정 구역. 한국의 道(도)는 여기서 유래."
  - classical_chinese: 省
    reading: 성
    meaning_kun: 살필
    translation:
      en: province; ministry; to examine
      ko: "성(행정구역); 부(관청); 살피다"
    gender: null
    plural: null
    notes:
      en: "少 + 目. 行省 = branch secretariat (Yuan). Modern 省 = province."
      ko: "少 + 目. 行省 = 행성(원). 현대 省 = 성(省)."
  - classical_chinese: 井田
    reading: 정전
    meaning_kun: 정전
    translation:
      en: well-field system
      ko: "정전제; 우물 밭 제도"
    gender: null
    plural: null
    notes:
      en: "井 (well) + 田 (field). Ancient land distribution system dividing into 9 plots."
      ko: "井(우물) + 田(밭). 9구획으로 나눈 고대 토지 분배 제도."
  - classical_chinese: 均田
    reading: 균전
    meaning_kun: 균전
    translation:
      en: equal-field system
      ko: "균전제; 균등 토지 분배"
    gender: null
    plural: null
    notes:
      en: "均 (equal) + 田 (field). North Wei to Tang land distribution."
      ko: "均(고를 균) + 田(밭). 북위~당 토지 분배 제도."
  - classical_chinese: 幕
    reading: 막
    meaning_kun: 장막
    translation:
      en: curtain; screen; staff office
      ko: "장막; 막부; 막료"
    gender: null
    plural: null
    notes:
      en: "莫 + 巾. 幕府 = military headquarters. 幕僚 = staff member."
      ko: "莫 + 巾. 幕府 = 막부. 幕僚 = 막료."
  - classical_chinese: 璽書
    reading: 새서
    meaning_kun: 새서
    translation:
      en: sealed imperial document
      ko: "새서; 옥새로 봉인한 칙서"
    gender: null
    plural: null
    notes:
      en: "璽 (seal) + 書 (document). Emperor's sealed letter."
      ko: "璽(옥새) + 書(글). 황제가 옥새로 봉인한 서신."
