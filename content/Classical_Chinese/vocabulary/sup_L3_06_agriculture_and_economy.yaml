      ko: "화폐; 폐백; 비단 예물"
    gender: null
    plural: null
    notes:
      en: "敝 + 巾. Cloth used as currency. 貨幣 = money."
      ko: "敝 + 巾. 화폐로 사용된 천. 貨幣 = 화폐."
  - classical_chinese: 賣
    reading: 매
    meaning_kun: 팔
    translation:
      en: to sell
      ko: "팔다; 매도하다"
    gender: null
    plural: null
    notes:
      en: "出 + 買 variant. To put out for sale."
      ko: "出 + 買 변형. 내다 팔다."
