      ko: "거두다; 수확하다; 받다"
    gender: null
    plural: null
    notes:
      en: "收 + 攵. To gather crops. 收穫 = harvest."
      ko: "收 + 攵. 곡식을 거두다. 收穫 = 수확."
  - classical_chinese: 稼
    reading: 가
    meaning_kun: 심을
    translation:
