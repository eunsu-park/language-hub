    reading: 상
    meaning_kun: 뽕나무
    translation:
      en: mulberry tree
      ko: 뽕나무
    gender: null
    plural: null
    notes:
      en: "Mulberry leaves feed silkworms. 農桑 = farming and sericulture."
      ko: "뽕잎은 누에의 먹이. 農桑 = 농상(농사와 양잠)."
