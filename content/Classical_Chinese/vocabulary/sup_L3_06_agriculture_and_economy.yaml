      ko: "값; 가격; 가치"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 賈. 物價 = commodity prices."
      ko: "사람(亻) + 賈. 物價 = 물가."
  - classical_chinese: 貸
    reading: 대
    meaning_kun: 빌릴
    translation:
