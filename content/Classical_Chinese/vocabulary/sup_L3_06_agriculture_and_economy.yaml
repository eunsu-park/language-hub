      ko: "이익; 이로운; 날카로운"
    gender: null
    plural: null
    notes:
      en: "禾 (grain) + 刂 (knife). Cutting grain = harvest profit."
      ko: "벼(禾) + 刂(칼). 곡식을 베다 = 수확의 이익."
