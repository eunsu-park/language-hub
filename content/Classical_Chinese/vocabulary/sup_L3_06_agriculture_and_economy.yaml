    meaning_kun: 뿌릴
    translation:
      en: to sow; to broadcast; to spread
      ko: "뿌리다; 파종하다"
    gender: null
    plural: null
    notes:
      en: "Hand (扌) + 番. To scatter seeds. 播種 = sowing."
      ko: "손(扌) + 番. 씨를 뿌리다. 播種 = 파종."
  - classical_chinese: 收
