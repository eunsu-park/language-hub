    reading: 잠
    meaning_kun: 누에
    translation:
      en: silkworm
      ko: 누에
    gender: null
    plural: null
    notes:
      en: "Also written 蠶/蚕. 養蠶 = sericulture (silkworm raising)."
      ko: "蠶/蚕으로도 씀. 養蠶 = 양잠(누에치기)."
