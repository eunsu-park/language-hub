      ko: "빌려주다; 빌리다; 대출"
    gender: null
    plural: null
    notes:
      en: "代 + 貝. 貸出 = to lend. 借貸 = borrowing and lending."
      ko: "代 + 貝. 貸出 = 대출. 借貸 = 차대."
  - classical_chinese: 債
    reading: 채
    meaning_kun: 빚
    translation:
      en: debt; obligation
      ko: "빚; 채무"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 責. 負債 = to be in debt."
      ko: "사람(亻) + 責. 負債 = 부채."
  - classical_chinese: 旱
    reading: 한
    meaning_kun: 가물
    translation:
      en: drought; dry spell
      ko: "가뭄; 한발"
    gender: null
    plural: null
    notes:
      en: "Sun (日) + 干. 旱災 = drought disaster. 旱魃 = drought demon."
      ko: "해(日) + 干. 旱災 = 한재. 旱魃 = 한발."
