      ko: "가축; 기르다"
    gender: null
    plural: null
    notes:
      en: "玄 + 田. Domesticated animals. 牧畜 = animal husbandry."
      ko: "玄 + 田. 길들인 동물. 牧畜 = 목축."
  - classical_chinese: 牧
    reading: 목
    meaning_kun: 칠
    translation:
      en: to herd; to pasture; shepherd
      ko: "치다; 방목하다; 목자"
    gender: null
    plural: null
    notes:
      en: "Cow (牛) + 攵. To tend cattle. 牧場 = pasture."
      ko: "소(牛) + 攵. 소를 돌보다. 牧場 = 목장."
  - classical_chinese: 灌
    reading: 관
    meaning_kun: 물댈
    translation:
      en: to irrigate; to pour
      ko: "물을 대다; 관개하다"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 雚. To channel water to fields. 灌漑 = irrigation."
      ko: "물(氵) + 雚. 밭에 물을 대다. 灌漑 = 관개."
  - classical_chinese: 肥
    reading: 비
    meaning_kun: 살찔
    translation:
      en: fertile; fat; manure
      ko: "비옥한; 살찐; 거름"
    gender: null
    plural: null
    notes:
      en: "Meat (月) + 巴. Fat/fertile. 肥料 = fertilizer."
      ko: "고기(月) + 巴. 살찐/비옥한. 肥料 = 비료."
- id: economy_trade
