      ko: "세; 조세; 임대하다"
    gender: null
    plural: null
    notes:
      en: "Grain (禾) + 且. Grain tax. 租稅 = taxes."
      ko: "벼(禾) + 且. 곡식 세금. 租稅 = 조세."
  - classical_chinese: 賦
