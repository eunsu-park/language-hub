    gender: null
    plural: null
    notes:
      en: "貝 + 武. Tax levied for military. 賦稅 = taxation."
      ko: "貝 + 武. 군사를 위한 세금. 賦稅 = 부세."
  - classical_chinese: 市
    reading: 시
    meaning_kun: 저자
    translation:
      en: market; city; to trade
      ko: "시장; 도시; 장사하다"
    gender: null
    plural: null
    notes:
      en: "巾 + 亠. Cloth hung as sign of marketplace."
      ko: "巾(수건) + 亠. 장터의 표시로 건 천."
  - classical_chinese: 錢
