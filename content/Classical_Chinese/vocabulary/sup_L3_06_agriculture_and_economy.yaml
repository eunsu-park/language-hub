      ko: "지붕(宀) + 畐(가득). 가득 찬 창고. 富貴 = 부귀."
  - classical_chinese: 貧
    reading: 빈
    meaning_kun: 가난할
    translation:
      en: poor; impoverished
      ko: "가난한; 빈곤한"
    gender: null
    plural: null
    notes:
