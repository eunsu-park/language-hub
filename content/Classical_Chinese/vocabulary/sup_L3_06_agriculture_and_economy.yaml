    meaning_kun: 돈
    translation:
      en: money; coin; cash
      ko: "돈; 동전"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 戔. Metal coins. 金錢 = money."
      ko: "쇠(金) + 戔. 금속 동전. 金錢 = 금전."
