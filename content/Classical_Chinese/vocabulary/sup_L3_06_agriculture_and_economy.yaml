      ko: "심다; 곡식; 농사"
    gender: null
    plural: null
    notes:
      en: "Grain (禾) + 家 (home). Home crops. 稼穡 = farming."
      ko: "벼(禾) + 家(집). 집의 곡식. 稼穡 = 가색(농사)."
  - classical_chinese: 穡
    reading: 색
    meaning_kun: 거둘
    translation:
      en: to harvest; to reap
      ko: "거두다; 수확하다"
    gender: null
    plural: null
    notes:
      en: "Grain (禾) + 嗇 (stingy). Careful harvesting."
      ko: "벼(禾) + 嗇(아낄 색). 조심스러운 수확."
  - classical_chinese: 畜
    reading: 축
    meaning_kun: 기를
    translation:
