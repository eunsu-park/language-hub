  type: vocabulary
  words:
  - classical_chinese: 耕
    reading: 경
    meaning_kun: 갈
    translation:
      en: to plow; to cultivate
      ko: "갈다; 경작하다"
    gender: null
    plural: null
    notes:
      en: "Plow radical (耒) + 井. To plow fields. 耕作 = farming."
