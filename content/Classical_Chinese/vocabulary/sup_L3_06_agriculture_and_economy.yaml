    meaning_kun: 곳집
    translation:
      en: storehouse; treasury; depot
      ko: "창고; 곳집; 금고"
    gender: null
    plural: null
    notes:
      en: "Shelter (广) + 車. Chariot storage. 國庫 = national treasury."
      ko: "엄호(广) + 車. 수레 보관소. 國庫 = 국고."
  - classical_chinese: 租
