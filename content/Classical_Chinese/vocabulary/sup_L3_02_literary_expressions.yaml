lesson: sup_L3_Literary_Expressions
lesson_number: 114
hanja_level: L3
type: supplementary
topic: Literary Expressions
categories:
- id: literary_vocabulary
  label:
    en: Literary Vocabulary
    ko: 문학 어휘
  type: vocabulary
  words:
  - classical_chinese: 韻
    reading: 운
    meaning_kun: 운
    translation:
      en: rhyme; rhythm; charm
      ko: "운; 운율; 운치"
    gender: null
    plural: null
    notes:
      en: "Sound (音) + 員. Rhyming sounds in poetry. 押韻 = to rhyme."
      ko: "소리(音) + 員. 시에서의 각운. 押韻 = 압운."
  - classical_chinese: 賦
    reading: 부
    meaning_kun: 읊을
    translation:
      en: rhapsody; rhyme-prose; to recite
      ko: "부(장르); 읊다; 세금"
    gender: null
    plural: null
    notes:
      en: "貝 (shell) + 武. A literary genre. Also 'tax' or 'to bestow.'"
      ko: "조개(貝) + 武. 문학 장르. '세금' 또는 '주다'의 뜻도."
  - classical_chinese: 詠
    reading: 영
    meaning_kun: 읊을
    translation:
      en: to chant; to recite poetry
      ko: "읊다; 시를 노래하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 永 (eternal). To sing words with prolonged tones."
      ko: "말씀(言) + 永(길 영). 길게 늘여 노래하다."
  - classical_chinese: 吟
    reading: 음
    meaning_kun: 읊을
    translation:
      en: to chant; to recite; to hum
      ko: "읊다; 흥얼거리다"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) + 今. To murmur or chant poems."
      ko: "입(口) + 今. 시를 중얼거리거나 읊다."
  - classical_chinese: 詞
    reading: 사
    meaning_kun: 말
    translation:
      en: ci-poetry; lyrics; words
      ko: "사(詞, 장르); 가사; 말"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 司. A lyric poetry form set to music."
      ko: "말씀(言) + 司. 음악에 맞춘 서정시 형식."
  - classical_chinese: 曲
    reading: 곡
    meaning_kun: 노래
    translation:
      en: song; melody; qu-drama
      ko: "노래; 곡조; 곡(장르)"
    gender: null
    plural: null
    notes:
      en: "A genre of song-drama. Also 'curved' or 'wrong.'"
      ko: "노래극의 장르. '굽은' 또는 '그릇된'의 뜻도."
  - classical_chinese: 序
    reading: 서
    meaning_kun: 차례
    translation:
      en: preface; order; sequence
      ko: "서문; 차례; 서열"
    gender: null
    plural: null
    notes:
      en: "广 + 予. Introduction to a work. Also 'order.'"
      ko: "广 + 予. 작품의 서론. '차례'의 뜻도."
  - classical_chinese: 跋
    reading: 발
    meaning_kun: 밟을
    translation:
      en: postscript; epilogue
      ko: "발문; 후기; 밟다"
    gender: null
    plural: null
    notes:
      en: "Foot (足) + 犮. Afterword appended to a text."
      ko: "발(足) + 犮. 문서 뒤에 덧붙인 글."
  - classical_chinese: 銘
    reading: 명
    meaning_kun: 새길
    translation:
      en: inscription; motto; to engrave
      ko: "명문; 새기다; 좌우명"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 名. Words engraved on metal. A literary form."
      ko: "쇠(金) + 名. 금속에 새긴 글. 문학 장르의 하나."
  - classical_chinese: 誌
    reading: 지
    meaning_kun: 기록할
    translation:
      en: record; journal; to remember
      ko: "기록; 지(장르); 기억하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 志. Written record. 墓誌 = epitaph."
      ko: "말씀(言) + 志. 글로 된 기록. 墓誌 = 묘지명."
- id: stylistic_terms
  label:
    en: Stylistic Terms
    ko: 문체 용어
  type: vocabulary
  words:
  - classical_chinese: 雅
    reading: 아
    meaning_kun: 바를
    translation:
      en: elegant; refined; proper
      ko: "우아한; 바른; 고상한"
    gender: null
    plural: null
    notes:
      en: "牙 (tooth/ivory) + 隹. Refined like carved ivory. 典雅 = classical elegance."
      ko: "牙(상아) + 隹. 조각한 상아처럼 정제된. 典雅 = 전아."
  - classical_chinese: 俗
    reading: 속
    meaning_kun: 풍속
    translation:
      en: common; vulgar; custom
      ko: "속된; 풍속; 세속"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 谷. Common people's ways. Opposite of 雅."
      ko: "사람(亻) + 谷. 일반인의 방식. 雅의 반대."
  - classical_chinese: 麗
    reading: 려
    meaning_kun: 고울
    translation:
      en: beautiful; elegant; splendid
      ko: "아름다운; 화려한"
    gender: null
    plural: null
    notes:
      en: "Deer (鹿) + 丽. Beautiful like a deer. 華麗 = magnificent."
      ko: "사슴(鹿) + 丽. 사슴처럼 아름다운. 華麗 = 화려."
  - classical_chinese: 奇
    reading: 기
    meaning_kun: 기이할
    translation:
      en: strange; rare; wonderful
      ko: "기이한; 드문; 기묘한"
    gender: null
    plural: null
    notes:
      en: "大 (big) + 可. Extraordinarily great. 奇文 = remarkable prose."
      ko: "大(클 대) + 可. 비범하게 큰. 奇文 = 기문."
  - classical_chinese: 幽
    reading: 유
    meaning_kun: 그윽할
    translation:
      en: secluded; profound; dim; ghostly
      ko: "그윽한; 깊은; 어두운"
    gender: null
    plural: null
    notes:
      en: "山 + 幺幺. Deep and secluded mountain. Subtle beauty."
      ko: "山(산) + 幺幺. 깊고 은밀한 산. 은은한 아름다움."
  - classical_chinese: 壯
    reading: 장
    meaning_kun: 씩씩할
    translation:
      en: grand; majestic; robust
      ko: "장한; 웅장한; 씩씩한"
    gender: null
    plural: null
    notes:
      en: "爿 + 士. Strong like a warrior. 壯麗 = grand and beautiful."
      ko: "爿 + 士. 무사처럼 강한. 壯麗 = 장려."
  - classical_chinese: 婉
    reading: 완
    meaning_kun: 아름다울
    translation:
      en: gentle; graceful; indirect
      ko: "아름다운; 완곡한; 부드러운"
    gender: null
    plural: null
    notes:
      en: "Woman (女) + 宛. Gentle and winding expression. 婉約 = delicate style."
      ko: "여자(女) + 宛. 부드럽고 완곡한 표현. 婉約 = 완약."
  - classical_chinese: 寓
    reading: 우
    meaning_kun: 부칠
    translation:
      en: allegory; to reside; to entrust
      ko: "우언; 머물다; 맡기다"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 禺. To lodge meaning within. 寓言 = fable/allegory."
      ko: "지붕(宀) + 禺. 뜻을 기탁함. 寓言 = 우언."
  - classical_chinese: 諷
    reading: 풍
    meaning_kun: 풍자할
    translation:
      en: satire; to admonish indirectly
      ko: "풍자; 간접적으로 충고하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 風 (wind). To influence through indirect speech."
      ko: "말씀(言) + 風(바람). 간접적 말로 교화."
  - classical_chinese: 諧
    reading: 해
    meaning_kun: 화할
    translation:
      en: humorous; harmonious; witty
      ko: "해학적인; 조화로운; 익살"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 皆 (all). Words that make all laugh. 諧謔 = humor."
      ko: "말씀(言) + 皆(모두). 모두를 웃기는 말. 諧謔 = 해학."
- id: rhetorical_devices
  label:
    en: Rhetorical Devices
    ko: 수사법
  type: vocabulary
  words:
  - classical_chinese: 喩
    reading: 유
    meaning_kun: 비유할
    translation:
      en: metaphor; analogy; to compare
      ko: "비유; 비유하다"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) + 兪. To illustrate by comparison. 比喩 = metaphor."
      ko: "입(口) + 兪. 비교하여 설명. 比喩 = 비유."
  - classical_chinese: 興
    reading: 흥
    meaning_kun: 일어날
    translation:
      en: evocation; to rise; excitement
      ko: "흥기; 일어나다; 흥취"
    gender: null
    plural: null
    notes:
      en: "舁 + 同. Poetic device: beginning with a natural image to evoke emotion."
      ko: "舁 + 同. 시적 기법: 자연 이미지로 감정을 불러일으킴."
  - classical_chinese: 比
    reading: 비
    meaning_kun: 견줄
    translation:
      en: comparison; simile; to compare
      ko: "비교; 비유; 견주다"
    gender: null
    plural: null
    notes:
      en: "Two people side by side. Direct comparison in poetry."
      ko: "두 사람이 나란히. 시에서의 직접 비교."
  - classical_chinese: 典
    reading: 전
    meaning_kun: 법
    translation:
      en: allusion; canon; ceremony
      ko: "전고; 경전; 의식"
    gender: null
    plural: null
    notes:
      en: "用典 = to use allusions from classical texts."
      ko: "用典 = 고전의 전고를 사용함."
  - classical_chinese: 對
    reading: 대
    meaning_kun: 대할
    translation:
      en: couplet; antithesis; to face
      ko: "대구; 대조; 마주하다"
    gender: null
    plural: null
    notes:
      en: "寸 + 業 variant. Parallel structure in poetry. 對偶 = parallelism."
      ko: "寸 + 業 변형. 시에서의 병행 구조. 對偶 = 대우."
  - classical_chinese: 仗
    reading: 장
    meaning_kun: 믿을
    translation:
      en: to rely on; guard; weaponry
      ko: "의지하다; 장병; 의장"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 丈. 排仗 = lined-up guards. Literary: reliance."
      ko: "사람(亻) + 丈. 排仗 = 의장대. 문학: 의지함."
  - classical_chinese: 誇
    reading: 과
    meaning_kun: 자랑할
    translation:
      en: to exaggerate; to boast; hyperbole
      ko: "과장하다; 자랑하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 夸. Exaggerated speech. 誇張 = hyperbole."
      ko: "말씀(言) + 夸. 과장된 말. 誇張 = 과장."
  - classical_chinese: 諷
    reading: 풍
    meaning_kun: 풍할
    translation:
      en: irony; indirect criticism
      ko: "풍자; 간접 비판"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 風. To criticize through implication."
      ko: "말씀(言) + 風. 암시를 통한 비판."
  - classical_chinese: 象
    reading: 상
    meaning_kun: 코끼리
    translation:
      en: elephant; image; symbol
      ko: "코끼리; 형상; 상징"
    gender: null
    plural: null
    notes:
      en: "Pictograph of an elephant. 意象 = poetic image/imagery."
      ko: "코끼리의 상형자. 意象 = 시적 이미지."
  - classical_chinese: 境
    reading: 경
    meaning_kun: 지경
    translation:
      en: realm; state; boundary
      ko: "경지; 경계; 상태"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 竟. 意境 = artistic conception/mood."
      ko: "흙(土) + 竟. 意境 = 의경(예술적 경지)."
