lesson: sup_L3_Music_and_Arts
lesson_number: 115
hanja_level: L3
type: supplementary
topic: Music and Arts
categories:
- id: music
  label:
    en: Music
    ko: 음악
  type: vocabulary
  words:
  - classical_chinese: 琴
    reading: 금
    meaning_kun: 거문고
    translation:
      en: zither; qin (stringed instrument)
      ko: "거문고; 금(현악기)"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a stringed instrument. One of the 'four arts' (琴棋書畫)."
      ko: "현악기의 상형자. 사예(四藝, 琴棋書畫) 중 하나."
  - classical_chinese: 瑟
    reading: 슬
    meaning_kun: 비파
    translation:
      en: se (large zither); 25-string instrument
      ko: "슬(대형 현악기); 비파"
    gender: null
    plural: null
    notes:
      en: "珡 + 必. 25-string zither. 琴瑟 = marital harmony."
      ko: "珡 + 必. 25현 현악기. 琴瑟 = 부부 화합."
  - classical_chinese: 笛
    reading: 적
    meaning_kun: 피리
    translation:
      en: flute; bamboo flute
      ko: "피리; 대금"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 由. Transverse bamboo flute."
      ko: "대(竹) + 由. 가로로 부는 대나무 피리."
  - classical_chinese: 簫
    reading: 소
    meaning_kun: 퉁소
    translation:
      en: vertical bamboo flute; panpipe
      ko: "퉁소; 소(악기)"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 肅. Vertical end-blown flute."
      ko: "대(竹) + 肅. 세로로 부는 관악기."
  - classical_chinese: 鐘
    reading: 종
    meaning_kun: 종
    translation:
      en: bell; chime
      ko: "종; 편종"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 中. Bronze bell struck for music or ceremony."
      ko: "쇠(金) + 中. 음악이나 의식을 위해 치는 청동 종."
  - classical_chinese: 磬
    reading: 경
    meaning_kun: 경쇠
    translation:
      en: stone chime; musical stone
      ko: "경쇠; 편경"
    gender: null
    plural: null
    notes:
      en: "殸 + stone (石). L-shaped stone struck for music."
      ko: "殸 + 돌(石). 음악을 위해 치는 ㄱ자 돌."
  - classical_chinese: 歌
    reading: 가
    meaning_kun: 노래
    translation:
      en: song; to sing
      ko: "노래; 노래하다"
    gender: null
    plural: null
    notes:
      en: "哥 + 欠 (mouth open). To sing with open mouth."
      ko: "哥 + 欠(입 벌림). 입을 벌려 노래하다."
  - classical_chinese: 舞
    reading: 무
    meaning_kun: 춤
    translation:
      en: dance; to dance
      ko: "춤; 춤추다"
    gender: null
    plural: null
    notes:
      en: "舛 (feet) + 無 variant. Moving feet in rhythm."
      ko: "舛(발) + 無 변형. 리듬에 맞추어 발을 움직이다."
  - classical_chinese: 調
    reading: 조
    meaning_kun: 고를
    translation:
      en: tune; mode; to adjust
      ko: "곡조; 음률; 조절하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 周. Musical key or mode."
      ko: "말씀(言) + 周. 음악의 조(調)나 선법."
  - classical_chinese: 律
    reading: 률
    meaning_kun: 법칙
    translation:
      en: pitch pipe; law; rule; meter
      ko: "음률; 법칙; 율(시의 운율)"
    gender: null
    plural: null
    notes:
      en: "Step (彳) + 聿. Twelve pitch pipes (十二律)."
      ko: "걸음(彳) + 聿. 12율관(十二律)."
- id: visual_arts
  label:
    en: Visual Arts
    ko: 시각 예술
  type: vocabulary
  words:
  - classical_chinese: 畫
    reading: 화
    meaning_kun: 그림
    translation:
      en: painting; to draw; to plan
      ko: "그림; 그리다; 획"
    gender: null
    plural: null
    notes:
      en: "聿 (brush) + 田. To draw with a brush. Part of four arts."
      ko: "聿(붓) + 田. 붓으로 그리다. 사예의 하나."
  - classical_chinese: 彫
    reading: 조
    meaning_kun: 새길
    translation:
      en: to carve; to sculpt; to engrave
      ko: "새기다; 조각하다"
    gender: null
    plural: null
    notes:
      en: "周 + 彡 (feathers). Intricate carving like feather patterns."
      ko: "周 + 彡(터럭). 깃털 무늬처럼 정교한 조각."
  - classical_chinese: 繡
    reading: 수
    meaning_kun: 수놓을
    translation:
      en: embroidery; to embroider
      ko: "자수; 수놓다"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 秀. Fine needlework on silk."
      ko: "실(糸) + 秀. 비단 위의 정교한 바느질."
  - classical_chinese: 染
    reading: 염
    meaning_kun: 물들일
    translation:
      en: to dye; to tint; to infect
      ko: "물들이다; 염색하다"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 木 + 九. Soaking wood for dye."
      ko: "물(氵) + 木(나무) + 九. 나무를 물에 담가 물들이다."
  - classical_chinese: 拓
    reading: 탁
    meaning_kun: 찍을
    translation:
      en: rubbing; to expand; to open up
      ko: "탁본; 넓히다"
    gender: null
    plural: null
    notes:
      en: "Hand (扌) + 石. To make rubbings of stone inscriptions."
      ko: "손(扌) + 石. 석각의 탁본을 뜨다."
  - classical_chinese: 棋
    reading: 기
    meaning_kun: 바둑
    translation:
      en: board game; chess; go
      ko: "바둑; 장기"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 其. Board game pieces. Part of four arts."
      ko: "나무(木) + 其. 판 위의 기물. 사예의 하나."
  - classical_chinese: 陶
    reading: 도
    meaning_kun: 질그릇
    translation:
      en: pottery; ceramics; to mold
      ko: "도자기; 질그릇; 빚다"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 匋. Kiln on a hillside. 陶磁器 = ceramics."
      ko: "언덕(阝) + 匋. 언덕의 가마. 陶磁器 = 도자기."
  - classical_chinese: 印
    reading: 인
    meaning_kun: 도장
    translation:
      en: seal; stamp; to print
      ko: "도장; 인쇄하다; 찍다"
    gender: null
    plural: null
    notes:
      en: "Hand pressing down on 卩. Official seal. 印章 = seal/stamp."
      ko: "손으로 卩을 누르는 모양. 관인. 印章 = 인장."
  - classical_chinese: 軸
    reading: 축
    meaning_kun: 굴대
    translation:
      en: scroll; axis; roller
      ko: "축; 두루마리; 굴대"
    gender: null
    plural: null
    notes:
      en: "Cart (車) + 由. Scroll roller for paintings. 掛軸 = hanging scroll."
      ko: "수레(車) + 由. 그림의 두루마리 축. 掛軸 = 족자."
  - classical_chinese: 額
    reading: 액
    meaning_kun: 이마
    translation:
      en: forehead; framed inscription; amount
      ko: "이마; 액자; 편액"
    gender: null
    plural: null
    notes:
      en: "客 + 頁 (head). Inscribed board hung over doorways."
      ko: "客 + 頁(머리). 문 위에 걸어 놓는 글씨 판."
- id: aesthetic_concepts
  label:
    en: Aesthetic Concepts
    ko: 미학 개념
  type: vocabulary
  words:
  - classical_chinese: 美
    reading: 미
    meaning_kun: 아름다울
    translation:
      en: beautiful; fine; good
      ko: "아름다운; 훌륭한"
    gender: null
    plural: null
    notes:
      en: "羊 (sheep) + 大 (big). Big sheep = beautiful/good."
      ko: "羊(양) + 大(클 대). 큰 양 = 아름다운/좋은."
  - classical_chinese: 醜
    reading: 추
    meaning_kun: 추할
    translation:
      en: ugly; shameful; clown
      ko: "추한; 못생긴; 부끄러운"
    gender: null
    plural: null
    notes:
      en: "酉 + 鬼 variant. Opposite of 美."
      ko: "酉 + 鬼 변형. 美의 반대."
  - classical_chinese: 妙
    reading: 묘
    meaning_kun: 묘할
    translation:
      en: wonderful; subtle; mysterious
      ko: "묘한; 오묘한; 신묘한"
    gender: null
    plural: null
    notes:
      en: "Woman (女) + 少. Young woman's beauty. Subtle excellence."
      ko: "여자(女) + 少. 젊은 여인의 아름다움. 미묘한 탁월함."
  - classical_chinese: 趣
    reading: 취
    meaning_kun: 뜻
    translation:
      en: interest; charm; taste; fun
      ko: "취미; 재미; 정취"
    gender: null
    plural: null
    notes:
      en: "走 (run) + 取. What one runs toward. Aesthetic appeal."
      ko: "走(달릴 주) + 取. 달려가는 대상. 심미적 매력."
  - classical_chinese: 韻
    reading: 운
    meaning_kun: 운치
    translation:
      en: charm; resonance; elegance
      ko: "운치; 여운; 우아함"
    gender: null
    plural: null
    notes:
      en: "Sound (音) + 員. Lingering beauty. 風韻 = charm and elegance."
      ko: "소리(音) + 員. 여운이 있는 아름다움. 風韻 = 풍운."
  - classical_chinese: 逸
    reading: 일
    meaning_kun: 편안할
    translation:
      en: leisurely; free; outstanding
      ko: "한가한; 뛰어난; 일탈"
    gender: null
    plural: null
    notes:
      en: "辶 + 兔 (rabbit). Escaping like a rabbit. 逸品 = masterpiece."
      ko: "辶 + 兔(토끼). 토끼처럼 빠져나감. 逸品 = 일품."
