      ko: "북두; 말(용량); 국자"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a ladle. 北斗 = Big Dipper."
      ko: "국자의 상형자. 北斗 = 북두칠성."
- id: cosmological_concepts
  label:
