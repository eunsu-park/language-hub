    meaning_kun: 하늘
    translation:
      en: heaven; creative; yang principle
      ko: "하늘; 건(괘); 양의 원리"
    gender: null
    plural: null
    notes:
      en: "First hexagram of I Ching (☰). Pure yang. Creative force."
      ko: "주역의 첫 번째 괘(☰). 순양. 창조의 힘."
  - classical_chinese: 坤
    reading: 곤
    meaning_kun: 땅
    translation:
      en: earth; receptive; yin principle
      ko: "땅; 곤(괘); 음의 원리"
    gender: null
    plural: null
    notes:
      en: "Second hexagram of I Ching (☷). Pure yin. Receptive force."
      ko: "주역의 두 번째 괘(☷). 순음. 수용의 힘."
  - classical_chinese: 陰
    reading: 음
    meaning_kun: 그늘
    translation:
      en: yin; shade; dark; female principle
      ko: "음; 그늘; 어두운; 음의 원리"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + cloud/shade. Passive cosmic principle."
      ko: "언덕(阝) + 구름/그늘. 수동적 우주 원리."
  - classical_chinese: 陽
    reading: 양
    meaning_kun: 볕
    translation:
      en: yang; sunlight; bright; male principle
      ko: "양; 햇빛; 밝은; 양의 원리"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 昜 (sun rising). Active cosmic principle."
      ko: "언덕(阝) + 昜(해 뜨는). 능동적 우주 원리."
  - classical_chinese: 卦
    reading: 괘
    meaning_kun: 점괘
    translation:
      en: trigram; hexagram; divination sign
      ko: "괘; 점괘; 점치는 기호"
    gender: null
    plural: null
    notes:
      en: "圭 + 卜 (divination). Eight trigrams (八卦) of I Ching."
      ko: "圭 + 卜(점). 주역의 팔괘(八卦)."
  - classical_chinese: 易
    reading: 역
    meaning_kun: 바꿀
    translation:
      en: change; I Ching; easy
      ko: "변화; 주역; 쉬운"
    gender: null
    plural: null
    notes:
      en: "Sun + moon (lizard). 周易 = Book of Changes."
      ko: "해 + 달(도마뱀). 周易 = 주역."
  - classical_chinese: 太極
    reading: 태극
    meaning_kun: 태극
    translation:
      en: Supreme Ultimate; Great Polarity
      ko: "태극; 지극한 원리"
    gender: null
    plural: null
    notes:
      en: "太 (great) + 極 (ultimate). Origin of yin and yang."
      ko: "太(클 태) + 極(다할 극). 음양의 근원."
  - classical_chinese: 混沌
    reading: 혼돈
    meaning_kun: 혼돈
    translation:
      en: chaos; primordial state
      ko: "혼돈; 원초적 상태"
    gender: null
    plural: null
    notes:
      en: "混 (mix) + 沌 (turbid). State before heaven and earth separated."
      ko: "混(섞일 혼) + 沌(흐릴 돈). 천지가 나뉘기 전의 상태."
