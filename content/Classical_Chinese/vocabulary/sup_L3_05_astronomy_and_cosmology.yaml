      ko: "혜성; 살별"
    gender: null
    plural: null
    notes:
      en: "彐 + 彐 + 丰. Broom-like tail. 彗星 = comet."
      ko: "彐 + 彐 + 丰. 빗자루 같은 꼬리. 彗星 = 혜성."
