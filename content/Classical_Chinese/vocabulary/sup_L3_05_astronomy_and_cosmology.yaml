      ko: "상극; 서로 이김"
    gender: null
    plural: null
    notes:
      en: "Wood→Earth→Water→Fire→Metal→Wood. Controlling cycle."
      ko: "木→土→水→火→金→木. 제어의 순환."
  - classical_chinese: 運
