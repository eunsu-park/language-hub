lesson: sup_L1_Exam_Advanced_Characters
lesson_number: 130
hanja_level: L1
type: supplementary
topic: Exam Advanced Characters
categories:
- id: high_frequency_exam
  label:
    en: High-Frequency Exam Characters
    ko: 고빈도 시험 한자
  type: vocabulary
  words:
  - classical_chinese: 鑑
    reading: 감
    meaning_kun: 거울
    translation:
      en: mirror; to examine; to learn from
      ko: "거울; 감별하다; 교훈으로 삼다"
    gender: null
    plural: null
    notes:
      en: "Gold (金) + 監. To mirror and learn. 以史爲鑑 = learn from history."
      ko: "쇠(金) + 監. 비추어 배우다. 以史爲鑑 = 역사를 거울로 삼다."
  - classical_chinese: 辟
    reading: 벽
    meaning_kun: 법
    translation:
      en: to open; to refute; law; perverse
      ko: "열다; 반박하다; 법; 치우친"
    gender: null
    plural: null
    notes:
      en: "尸 + 辛 + 口. Multiple readings: 벽 (open), 피 (avoid). 開闢 = creation."
      ko: "尸 + 辛 + 口. 여러 독음: 벽(열다), 피(피하다). 開闢 = 개벽."
  - classical_chinese: 踐
    reading: 천
    meaning_kun: 밟을
    translation:
      en: to tread; to carry out; to practice
      ko: "밟다; 실천하다; 이행하다"
    gender: null
    plural: null
    notes:
      en: "Foot (足) + 戔. 實踐 = practice; to put into action."
      ko: "발(足) + 戔. 實踐 = 실천."
  - classical_chinese: 弊
    reading: 폐
    meaning_kun: 해질
    translation:
      en: abuse; malpractice; worn out
      ko: "폐단; 해진; 부정"
    gender: null
    plural: null
    notes:
      en: "敝 + 廾. 弊害 = harmful practice. 弊端 = corrupt practice."
      ko: "敝 + 廾. 弊害 = 폐해. 弊端 = 폐단."
  - classical_chinese: 遽
    reading: 거
    meaning_kun: 급할
    translation:
      en: hurriedly; suddenly; startled
      ko: "급히; 갑자기; 놀라서"
    gender: null
    plural: null
    notes:
      en: "辶 + 豦. Rushing in alarm. 不遽 = not hastily."
      ko: "辶 + 豦. 놀라서 급히 달려감. 不遽 = 급하지 않게."
  - classical_chinese: 譬
    reading: 비
    meaning_kun: 비유할
    translation:
      en: analogy; metaphor; to compare
      ko: "비유; 비유하다; 예를 들다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 辟. To explain through comparison. 譬如 = for example."
      ko: "말씀(言) + 辟. 비교를 통한 설명. 譬如 = 비유하면."
  - classical_chinese: 闡
    reading: 천
    meaning_kun: 열
    translation:
      en: to elucidate; to expound; to open
      ko: "밝히다; 해명하다; 열다"
    gender: null
    plural: null
    notes:
      en: "Gate (門) + 單. To open wide. 闡明 = to elucidate."
      ko: "문(門) + 單. 활짝 열다. 闡明 = 천명(밝혀 설명)."
  - classical_chinese: 瀆
    reading: 독
    meaning_kun: 더럽힐
    translation:
      en: to desecrate; to insult; ditch
      ko: "더럽히다; 모독; 도랑"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 賣. To pollute. 褻瀆 = to desecrate."
      ko: "물(氵) + 賣. 더럽히다. 褻瀆 = 설독(모독)."
  - classical_chinese: 詣
    reading: 예
    meaning_kun: 이를
    translation:
      en: to visit; to reach; attainment
      ko: "방문하다; 이르다; 경지"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 旨 variant. 造詣 = attainment, proficiency."
      ko: "말씀(言) + 旨 변형. 造詣 = 조예(깊은 경지)."
  - classical_chinese: 斡
    reading: 알
    meaning_kun: 돌릴
    translation:
      en: to manage; to revolve; hub
      ko: "돌리다; 관리하다; 축"
    gender: null
    plural: null
    notes:
      en: "斗 + 倝. 斡旋 = mediation. Turning the axis of events."
      ko: "斗 + 倝. 斡旋 = 알선(중재). 사건의 축을 돌림."
- id: compound_characters
  label:
    en: Advanced Compound Characters
    ko: 고급 합성 한자
  type: vocabulary
  words:
  - classical_chinese: 巍
    reading: 위
    meaning_kun: 높을
    translation:
      en: lofty; towering; majestic
      ko: "높은; 우뚝한; 장엄한"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 魏. Towering height. 巍然 = majestically."
      ko: "산(山) + 魏. 우뚝한 높이. 巍然 = 위연(장엄하게)."
  - classical_chinese: 澹
    reading: 담
    meaning_kun: 맑을
    translation:
      en: tranquil; placid; indifferent
      ko: "담담한; 맑은; 무심한"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 詹. Still water. 澹泊 = serene detachment."
      ko: "물(氵) + 詹. 고요한 물. 澹泊 = 담박(고요한 초연)."
  - classical_chinese: 儼
    reading: 엄
    meaning_kun: 엄숙할
    translation:
      en: solemn; dignified; as if
      ko: "엄숙한; 근엄한; 마치"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 嚴. 儼然 = solemnly, as if."
      ko: "사람(亻) + 嚴. 儼然 = 엄연(엄숙하게, 마치)."
  - classical_chinese: 矗
    reading: 축
    meaning_kun: 곧을
    translation:
      en: towering; erect; standing tall
      ko: "우뚝 선; 곧게 선"
    gender: null
    plural: null
    notes:
      en: "Three 直 (straight). Standing perfectly upright. 矗立 = standing tall."
      ko: "세 개의 直(곧을 직). 완전히 곧게 서 있음. 矗立 = 축립."
  - classical_chinese: 瞻
    reading: 첨
    meaning_kun: 볼
    translation:
      en: to gaze; to look up at; to revere
      ko: "바라보다; 우러러보다; 존경"
    gender: null
    plural: null
    notes:
      en: "Eye (目) + 詹. To look up with reverence. 瞻仰 = to look up to."
      ko: "눈(目) + 詹. 우러러보다. 瞻仰 = 첨앙(우러러 봄)."
  - classical_chinese: 磅礴
    reading: 방박
    meaning_kun: 가득할
    translation:
      en: vast; boundless; magnificent
      ko: "광대한; 기세가 넘치는; 웅장한"
    gender: null
    plural: null
    notes:
      en: "磅 (pound) + 礴 (boulder). Overwhelming grandeur."
      ko: "磅 + 礴. 압도적인 웅장함."
  - classical_chinese: 嶷
    reading: 의
    meaning_kun: 어릴
    translation:
      en: lofty; young and clever; prominent
      ko: "높은; 어리지만 영특한; 우뚝한"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 疑. A distinctive mountain peak."
      ko: "산(山) + 疑. 뚜렷한 산봉우리."
  - classical_chinese: 懿
    reading: 의
    meaning_kun: 아름다울
    translation:
      en: virtuous; excellent; beautiful
      ko: "아름다운; 덕이 높은; 훌륭한"
    gender: null
    plural: null
    notes:
      en: "壹 + 心. 懿德 = beautiful virtue. Used in posthumous names."
      ko: "壹 + 心. 懿德 = 의덕(아름다운 덕). 시호에 사용."
  - classical_chinese: 翼
    reading: 익
    meaning_kun: 날개
    translation:
      en: wing; to assist; flank
      ko: "날개; 돕다; 측면"
    gender: null
    plural: null
    notes:
      en: "羽 + 異. Bird's wing. 翼贊 = to assist and support."
      ko: "羽(깃) + 異. 새의 날개. 翼贊 = 익찬(보좌)."
  - classical_chinese: 纂
    reading: 찬
    meaning_kun: 엮을
    translation:
      en: to compile; to edit; to inherit
      ko: "엮다; 편찬하다; 잇다"
    gender: null
    plural: null
    notes:
      en: "糸 + 算. 編纂 = compilation. 纂修 = to compile and edit."
      ko: "糸 + 算. 編纂 = 편찬. 纂修 = 찬수(편찬)."
- id: exam_differentiation
  label:
    en: Easily Confused Characters
    ko: 혼동하기 쉬운 한자
  type: vocabulary
  words:
  - classical_chinese: 己
    reading: 기
    meaning_kun: 자기
    translation:
      en: self; oneself
      ko: "자기; 자신"
    gender: null
    plural: null
    notes:
      en: "Open at top. 6th Heavenly Stem. Distinguished from 已 and 巳."
      ko: "위가 열린 형태. 제6천간. 已, 巳와 구별."
  - classical_chinese: 已
    reading: 이
    meaning_kun: 이미
    translation:
      en: already; to cease; too (much)
      ko: "이미; 그치다; 너무"
    gender: null
    plural: null
    notes:
      en: "Half-closed. 已經 = already. Distinguished from 己 and 巳."
      ko: "반쯤 닫힌 형태. 已經 = 이미. 己, 巳와 구별."
  - classical_chinese: 巳
    reading: 사
    meaning_kun: 뱀
    translation:
      en: 6th Earthly Branch (Snake)
      ko: "제6지지(뱀)"
    gender: null
    plural: null
    notes:
      en: "Fully closed. Distinguished from 己 (open) and 已 (half-open)."
      ko: "완전히 닫힌 형태. 己(열린)와 已(반 열린)와 구별."
  - classical_chinese: 戊
    reading: 무
    meaning_kun: 다섯째
    translation:
      en: 5th Heavenly Stem
      ko: 다섯째 천간
    gender: null
    plural: null
    notes:
      en: "No central dot. Distinguished from 戌 (dot) and 戍 (person)."
      ko: "가운데 점 없음. 戌(점)과 戍(사람)과 구별."
  - classical_chinese: 戌
    reading: 술
    meaning_kun: 개
    translation:
      en: 11th Earthly Branch (Dog)
      ko: "제11지지(개)"
    gender: null
    plural: null
    notes:
      en: "With a dot inside. Distinguished from 戊 (no dot) and 戍 (person)."
      ko: "안에 점이 있음. 戊(점 없음)와 戍(사람)과 구별."
  - classical_chinese: 戍
    reading: 수
    meaning_kun: 지킬
    translation:
      en: to garrison; to guard the border
      ko: "수비하다; 변방을 지키다"
    gender: null
    plural: null
    notes:
      en: "人 (person) inside 戈. Person guarding with weapon. 戍邊."
      ko: "戈 안의 人(사람). 무기로 지키는 사람. 戍邊 = 수변."
  - classical_chinese: 衷
    reading: 충
    meaning_kun: 속마음
    translation:
      en: innermost; sincere; center
      ko: "속마음; 진심; 중심"
    gender: null
    plural: null
    notes:
      en: "衣 + 中. Heart within clothing. Distinguished from 哀 and 衰."
      ko: "衣(옷) + 中(가운데). 옷 속의 마음. 哀, 衰와 구별."
  - classical_chinese: 衰
    reading: 쇠
    meaning_kun: 쇠할
    translation:
      en: to decline; to wane; mourning
      ko: "쇠하다; 쇠퇴; 상복"
    gender: null
    plural: null
    notes:
      en: "衣 + 中 variant (with extra stroke). Distinguished from 衷 and 哀."
      ko: "衣 + 中 변형(가로획 추가). 衷, 哀와 구별."
  - classical_chinese: 幣
    reading: 폐
    meaning_kun: 폐백
    translation:
      en: currency; coin; silk gift
      ko: "화폐; 폐백"
    gender: null
    plural: null
    notes:
      en: "敝 + 巾. Distinguished from 弊 (abuse) and 蔽 (cover)."
      ko: "敝 + 巾. 弊(폐단)와 蔽(가리다)와 구별."
  - classical_chinese: 蔽
    reading: 폐
    meaning_kun: 가릴
    translation:
      en: to cover; to conceal; to obstruct
      ko: "가리다; 덮다; 차단하다"
    gender: null
    plural: null
    notes:
      en: "Grass (艹) + 敝. To screen with vegetation. 蒙蔽 = to deceive."
      ko: "초(艹) + 敝. 초목으로 가리다. 蒙蔽 = 기만."
