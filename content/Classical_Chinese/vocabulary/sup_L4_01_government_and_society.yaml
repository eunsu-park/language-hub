lesson: sup_L4_Government_and_Society
lesson_number: 107
hanja_level: L4
type: supplementary
topic: Government and Society
categories:
- id: government_titles
  label:
    en: Government Titles and Ranks
    ko: 관직과 품계
  type: vocabulary
  words:
  - classical_chinese: 帝
    reading: 제
    meaning_kun: 임금
    translation:
      en: emperor; supreme ruler
      ko: 황제; 임금
    gender: null
    plural: null
    notes:
      en: "Originally meant 'supreme deity.' Later applied to human rulers."
      ko: "원래 '최고 신'을 의미. 후에 인간 통치자에게 적용."
  - classical_chinese: 皇
    reading: 황
    meaning_kun: 임금
    translation:
      en: emperor; august; magnificent
      ko: "황제; 크고 빛나는"
    gender: null
    plural: null
    notes:
      en: "白 (white/bright) + 王 (king). Radiant sovereign."
      ko: "白(밝을 백) + 王(임금 왕). 빛나는 군주."
  - classical_chinese: 王
    reading: 왕
    meaning_kun: 임금
    translation:
      en: king; ruler
      ko: 왕; 임금
    gender: null
    plural: null
    notes:
      en: "Three horizontal lines (heaven, man, earth) connected by vertical. Radical #96."
      ko: "세 가로획(천·인·지)을 세로로 이은 것. 부수 제96번."
  - classical_chinese: 侯
    reading: 후
    meaning_kun: 제후
    translation:
      en: marquis; feudal lord
      ko: 제후; 후작
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 矦. Feudal lord. One of five noble ranks."
      ko: "사람(亻) + 矦. 봉건 영주. 오등작 중 하나."
  - classical_chinese: 臣
    reading: 신
    meaning_kun: 신하
    translation:
      en: minister; official; subject
      ko: "신하; 관리"
    gender: null
    plural: null
    notes:
      en: "Pictograph of an eye looking down. Submission to authority."
      ko: "아래를 보는 눈의 상형자. 권위에 복종."
  - classical_chinese: 宰
    reading: 재
    meaning_kun: 재상
    translation:
      en: prime minister; to govern; to slaughter
      ko: "재상; 다스리다; 잡다"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 辛. One who manages affairs under a roof."
      ko: "지붕(宀) + 辛. 지붕 아래에서 일을 관리하는 사람."
  - classical_chinese: 卿
    reading: 경
    meaning_kun: 벼슬
    translation:
      en: minister; high official
      ko: "고위 관리; 경"
    gender: null
    plural: null
    notes:
      en: "Two people facing each other at a banquet. Senior court official."
      ko: "연회에서 마주 앉은 두 사람. 고위 조정 관리."
  - classical_chinese: 吏
    reading: 리
    meaning_kun: 관리
    translation:
      en: official; clerk; functionary
      ko: "관리; 아전"
    gender: null
    plural: null
    notes:
      en: "Lower-ranking government official. 官吏 = officials."
      ko: "하급 관리. 官吏 = 관리들."
  - classical_chinese: 令
    reading: 령
    meaning_kun: 하여금
    translation:
      en: order; command; magistrate
      ko: "명령; 시키다; 현령"
    gender: null
    plural: null
    notes:
      en: "Person kneeling before an official. Also 'to make/cause.'"
      ko: "관리 앞에 무릎 꿇은 사람. '~하게 하다'의 뜻도."
  - classical_chinese: 守
    reading: 수
    meaning_kun: 지킬
    translation:
      en: to guard; to defend; governor
      ko: "지키다; 수비하다; 태수"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 寸. To protect what is under the roof. Also a title."
      ko: "지붕(宀) + 寸. 지붕 아래를 보호. 관직명이기도 함."
- id: social_structure
  label:
    en: Social Structure
    ko: 사회 구조
  type: vocabulary
  words:
  - classical_chinese: 民
    reading: 민
    meaning_kun: 백성
    translation:
      en: people; citizens
      ko: "백성; 국민"
    gender: null
    plural: null
    notes:
      en: "Pictograph possibly of an eye being pierced. The governed masses."
      ko: "눈을 찌르는 모양의 상형자. 통치받는 대중."
  - classical_chinese: 官
    reading: 관
    meaning_kun: 벼슬
    translation:
      en: official; government office
      ko: "관리; 관청"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 㠯. Office under government authority."
      ko: "지붕(宀) + 㠯. 정부 권위 아래의 관청."
  - classical_chinese: 貴
    reading: 귀
    meaning_kun: 귀할
    translation:
      en: noble; precious; expensive
      ko: "귀한; 고귀한; 비싼"
    gender: null
    plural: null
    notes:
      en: "Cowrie shell (貝) + 臾 variant. Valuable like shells (ancient currency)."
      ko: "조개(貝) + 臾 변형. 조개(고대 화폐)처럼 귀한."
  - classical_chinese: 賤
    reading: 천
    meaning_kun: 천할
    translation:
      en: lowly; cheap; humble
      ko: "천한; 비천한"
    gender: null
    plural: null
    notes:
      en: "Cowrie shell (貝) + 戔. Low value. Opposite of 貴."
      ko: "조개(貝) + 戔. 가치가 낮은. 貴의 반대."
  - classical_chinese: 奴
    reading: 노
    meaning_kun: 종
    translation:
      en: slave; servant
      ko: "종; 노비"
    gender: null
    plural: null
    notes:
      en: "Woman (女) + 又 (hand). Person seized as property."
      ko: "여자(女) + 又(손). 소유물로 잡힌 사람."
  - classical_chinese: 士
    reading: 사
    meaning_kun: 선비
    translation:
      en: scholar; gentleman; warrior
      ko: "선비; 학자; 무사"
    gender: null
    plural: null
    notes:
      en: "Pictograph of an axe. Educated class. 士大夫 = scholar-official."
      ko: "도끼의 상형자. 교양 계층. 士大夫 = 사대부."
  - classical_chinese: 商
    reading: 상
    meaning_kun: 장사
    translation:
      en: merchant; commerce; Shang dynasty
      ko: "상인; 장사; 상나라"
    gender: null
    plural: null
    notes:
      en: "Also refers to the Shang Dynasty. Merchants named after Shang people."
      ko: "상(商)나라도 지칭. 상나라 유민이 장사를 하여 유래."
  - classical_chinese: 農
    reading: 농
    meaning_kun: 농사
    translation:
      en: agriculture; farmer
      ko: "농업; 농부"
    gender: null
    plural: null
    notes:
      en: "曲 + 辰. Working the land. One of the four occupations (士農工商)."
      ko: "曲 + 辰. 땅을 일구다. 사민(士農工商) 중 하나."
  - classical_chinese: 工
    reading: 공
    meaning_kun: 장인
    translation:
      en: artisan; work; craft
      ko: "장인; 기술; 공사"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a carpenter's square. Skilled labor."
      ko: "목수의 자(곱자)의 상형자. 숙련 노동."
  - classical_chinese: 稅
    reading: 세
    meaning_kun: 세금
    translation:
      en: tax; levy
      ko: 세금
    gender: null
    plural: null
    notes:
      en: "Grain radical (禾) + 兌. Tax paid in grain."
      ko: "벼(禾) + 兌. 곡식으로 납부하는 세금."
- id: governance
  label:
    en: Governance and Law
    ko: 통치와 법
  type: vocabulary
  words:
  - classical_chinese: 政
    reading: 정
    meaning_kun: 정사
    translation:
      en: government; politics; to govern
      ko: "정치; 정사; 다스리다"
    gender: null
    plural: null
    notes:
      en: "正 (correct) + 攵 (to strike). To correct with authority."
      ko: "正(바를 정) + 攵(칠 복). 권위로 바로잡다."
  - classical_chinese: 法
    reading: 법
    meaning_kun: 법
    translation:
      en: law; method; model
      ko: "법; 방법; 본보기"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 去. Fair as flowing water. 法律 = law."
      ko: "물(氵) + 去. 흐르는 물처럼 공평한. 法律 = 법률."
  - classical_chinese: 令
    reading: 령
    meaning_kun: 명령
    translation:
      en: decree; ordinance; to command
      ko: "법령; 명령하다"
    gender: null
    plural: null
    notes:
      en: "Imperial or governmental order. 命令 = command."
      ko: "황제 또는 정부의 명령. 命令 = 명령."
  - classical_chinese: 封
    reading: 봉
    meaning_kun: 봉할
    translation:
      en: to enfeoff; to seal; boundary
      ko: "봉하다; 봉인; 경계"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 寸. To plant a tree as boundary marker. Feudal system."
      ko: "흙(土) + 寸. 경계 표시로 나무를 심다. 봉건 제도."
  - classical_chinese: 制
    reading: 제
    meaning_kun: 지을
    translation:
      en: system; to make; to control
      ko: "제도; 만들다; 통제하다"
    gender: null
    plural: null
    notes:
      en: "未 + knife (刂). To cut and shape. 制度 = system."
      ko: "未 + 칼(刂). 자르고 다듬다. 制度 = 제도."
  - classical_chinese: 朝
    reading: 조
    meaning_kun: 아침
    translation:
      en: court; dynasty; morning
      ko: "조정; 왕조; 아침"
    gender: null
    plural: null
    notes:
      en: "Morning audience at court. 朝廷 = royal court. 朝代 = dynasty."
      ko: "아침 조회. 朝廷 = 조정. 朝代 = 왕조."
  - classical_chinese: 廷
    reading: 정
    meaning_kun: 조정
    translation:
      en: court; courtyard
      ko: "조정; 궁정"
    gender: null
    plural: null
    notes:
      en: "Shelter radical (廴) + 壬. Extended hall for court audiences."
      ko: "끌 인(廴) + 壬. 조회를 위한 넓은 대청."
  - classical_chinese: 詔
    reading: 조
    meaning_kun: 조서
    translation:
      en: imperial edict; decree
      ko: "조서; 칙령"
    gender: null
    plural: null
    notes:
      en: "Speech radical (言) + 召 (to summon). Emperor's spoken command."
      ko: "말씀(言) + 召(부를 소). 황제의 구두 명령."
  - classical_chinese: 貢
    reading: 공
    meaning_kun: 바칠
    translation:
      en: tribute; to offer; to contribute
      ko: "공물; 바치다; 공헌하다"
    gender: null
    plural: null
    notes:
      en: "Work (工) + cowrie (貝). Offering valuables to a superior."
      ko: "工 + 조개(貝). 윗사람에게 귀중품을 바침."
  - classical_chinese: 爵
    reading: 작
    meaning_kun: 벼슬
    translation:
      en: noble rank; peerage; wine vessel
      ko: "작위; 벼슬; 술잔"
    gender: null
    plural: null
    notes:
      en: "Originally a ritual wine vessel. Five ranks: 公侯伯子男."
      ko: "원래 제사용 술잔. 오등작: 公侯伯子男."
