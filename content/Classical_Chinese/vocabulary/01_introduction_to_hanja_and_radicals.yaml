- id: character_types
  label:
    en: Six Categories of Characters (六書 Examples)
    ko: 육서(六書) 예시
  type: vocabulary
  words:
  - classical_chinese: 象
    reading: 상
    meaning_kun: 코끼리
    translation:
      en: elephant; image
      ko: 코끼리; 형상
    gender: null
    plural: null
    notes:
      en: "Pictograph (象形). Originally depicted an elephant."
      ko: "상형(象形)의 예. 원래 코끼리를 본뜬 글자."
