    reading: 상
    meaning_kun: 윗
    translation:
      en: above; upper
      ko: 위
    gender: null
    plural: null
    notes:
      en: "Indicative character (指事). A mark above a baseline indicates 'up'."
      ko: "지사(指事)의 예. 기준선 위의 표시가 '위'를 나타냄."
  - classical_chinese: 下
