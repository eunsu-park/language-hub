lesson: sup_L2_Legal_Terminology
lesson_number: 121
hanja_level: L2
type: supplementary
topic: Legal Terminology
categories:
- id: legal_system
  label:
    en: Legal System
    ko: 법률 체계
  type: vocabulary
  words:
  - classical_chinese: 律
    reading: 률
    meaning_kun: 법칙
    translation:
      en: statute; law; regulation
      ko: "율; 법률; 규정"
    gender: null
    plural: null
    notes:
      en: "彳 + 聿. Written legal code. 律令 = laws and ordinances."
      ko: "彳 + 聿. 성문 법전. 律令 = 율령."
  - classical_chinese: 刑
    reading: 형
    meaning_kun: 형벌
    translation:
      en: punishment; penalty; criminal law
      ko: "형벌; 형법"
    gender: null
    plural: null
    notes:
      en: "开 + knife (刂). To cut as punishment. 刑罰 = punishment."
      ko: "开 + 칼(刂). 벌로 베다. 刑罰 = 형벌."
  - classical_chinese: 罰
    reading: 벌
    meaning_kun: 벌할
    translation:
      en: to punish; penalty; fine
      ko: "벌하다; 처벌; 벌금"
    gender: null
    plural: null
    notes:
      en: "网 (net) + 言 + 刂. Verbal judgment and blade. 刑罰 = penalty."
      ko: "网(그물) + 言 + 刂. 말의 판결과 칼. 刑罰 = 형벌."
  - classical_chinese: 獄
    reading: 옥
    meaning_kun: 옥
    translation:
      en: prison; lawsuit; litigation
      ko: "감옥; 옥사; 소송"
    gender: null
    plural: null
    notes:
      en: "犭 + 言 + 犬. Dogs guarding verbal disputes. 牢獄 = prison."
      ko: "犭 + 言 + 犬. 개가 말다툼을 지키는 모양. 牢獄 = 감옥."
  - classical_chinese: 訟
    reading: 송
    meaning_kun: 다툴
    translation:
      en: lawsuit; litigation; to dispute
      ko: "소송; 다투다; 송사"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 公 (public). Public verbal dispute. 訴訟 = lawsuit."
      ko: "말씀(言) + 公(공적). 공적 언쟁. 訴訟 = 소송."
  - classical_chinese: 訴
    reading: 소
    meaning_kun: 호소할
    translation:
      en: to accuse; to sue; to appeal
      ko: "호소하다; 고소하다; 소송하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 斥 variant. To speak against someone."
      ko: "말씀(言) + 斥 변형. 누군가에 대해 말하다."
  - classical_chinese: 審
    reading: 심
    meaning_kun: 살필
    translation:
      en: to examine; to judge; trial
      ko: "심리하다; 심판; 재판"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 番. Careful examination under a roof. 審判 = judgment."
      ko: "지붕(宀) + 番. 지붕 아래에서의 세밀한 심리. 審判 = 심판."
  - classical_chinese: 判
    reading: 판
    meaning_kun: 판단할
    translation:
      en: to judge; to decide; verdict
      ko: "판결하다; 판단; 결정"
    gender: null
    plural: null
    notes:
      en: "半 + knife (刂). To cut in half = to decide. 判決 = verdict."
      ko: "半 + 칼(刂). 반으로 가르다 = 결정. 判決 = 판결."
  - classical_chinese: 證
    reading: 증
    meaning_kun: 증거
    translation:
      en: evidence; proof; to testify
      ko: "증거; 증명; 증언하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 登. Words that ascend to truth. 證據 = evidence."
      ko: "말씀(言) + 登. 진실에 이르는 말. 證據 = 증거."
  - classical_chinese: 赦
    reading: 사
    meaning_kun: 용서할
    translation:
      en: to pardon; amnesty; to forgive
      ko: "사면하다; 용서; 대사면"
    gender: null
    plural: null
    notes:
      en: "赤 (red) + 攵. Imperial pardon. 大赦 = general amnesty."
      ko: "赤(붉을 적) + 攵. 황제의 사면. 大赦 = 대사."
- id: crimes_offenses
  label:
    en: Crimes and Offenses
    ko: 범죄
  type: vocabulary
  words:
  - classical_chinese: 罪
    reading: 죄
    meaning_kun: 허물
    translation:
      en: crime; sin; guilt; offense
      ko: "죄; 범죄; 허물"
    gender: null
    plural: null
    notes:
      en: "网 (net) + 非 (wrong). Caught in a net of wrongdoing."
      ko: "网(그물) + 非(아닐 비). 잘못의 그물에 걸림."
  - classical_chinese: 犯
    reading: 범
    meaning_kun: 범할
    translation:
      en: to violate; to commit (crime); criminal
      ko: "범하다; 위반; 범인"
    gender: null
    plural: null
    notes:
      en: "Dog (犭) + 卩 variant. To transgress. 犯罪 = to commit crime."
      ko: "개(犭) + 卩 변형. 범하다. 犯罪 = 범죄."
  - classical_chinese: 盜
    reading: 도
    meaning_kun: 도둑
    translation:
      en: thief; robbery; to steal
      ko: "도둑; 도적; 훔치다"
    gender: null
    plural: null
    notes:
      en: "欠 (desire) + dish (皿). Desiring another's possessions."
      ko: "欠(부족) + 그릇(皿). 남의 소유물을 탐냄."
  - classical_chinese: 賊
    reading: 적
    meaning_kun: 도둑
    translation:
      en: bandit; traitor; rebel
      ko: "도적; 역적; 반역자"
    gender: null
    plural: null
    notes:
      en: "貝 + 戎. Armed robber. More serious than 盜."
      ko: "貝 + 戎. 무장 도적. 盜보다 더 심각."
  - classical_chinese: 殺
    reading: 살
    meaning_kun: 죽일
    translation:
      en: to kill; to murder; to slaughter
      ko: "죽이다; 살해하다"
    gender: null
    plural: null
    notes:
      en: "殳 + 殺. To strike with lethal force."
      ko: "殳 + 殺. 치명적 힘으로 치다."
  - classical_chinese: 逆
    reading: 역
    meaning_kun: 거스를
    translation:
      en: to rebel; treason; to disobey
      ko: "거스르다; 역적; 반역"
    gender: null
    plural: null
    notes:
      en: "辶 + 屰. To go against. 叛逆 = rebellion."
      ko: "辶 + 屰. 거스르다. 叛逆 = 반역."
  - classical_chinese: 詐
    reading: 사
    meaning_kun: 속일
    translation:
      en: fraud; deceit; to cheat
      ko: "사기; 속이다; 거짓"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 乍. False speech. 詐欺 = fraud."
      ko: "말씀(言) + 乍. 거짓 말. 詐欺 = 사기."
  - classical_chinese: 誣
    reading: 무
    meaning_kun: 무함할
    translation:
      en: to slander; false accusation; to frame
      ko: "무고하다; 모함; 무함"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 巫 (shaman). Witch-like false speech."
      ko: "말씀(言) + 巫(무당). 무당 같은 거짓말."
- id: punishments
  label:
    en: Punishments
    ko: 형벌
  type: vocabulary
  words:
  - classical_chinese: 笞
    reading: 태
    meaning_kun: 때릴
    translation:
      en: flogging with bamboo (light)
      ko: "태형; 대나무로 때리기"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 台. Lightest of five punishments. 笞刑."
      ko: "대(竹) + 台. 오형(五刑) 중 가장 가벼운. 笞刑."
  - classical_chinese: 杖
    reading: 장
    meaning_kun: 지팡이
    translation:
      en: flogging with thick rod; cane
      ko: "장형; 큰 막대로 때리기; 지팡이"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 丈. Second of five punishments. 杖刑."
      ko: "나무(木) + 丈. 오형 중 둘째. 杖刑."
  - classical_chinese: 徒
    reading: 도
    meaning_kun: 무리
    translation:
      en: penal servitude; follower; on foot
      ko: "도형(노역); 무리; 도보"
    gender: null
    plural: null
    notes:
      en: "彳 + 走 variant. Forced labor. Third of five punishments."
      ko: "彳 + 走 변형. 강제 노역. 오형 중 셋째."
  - classical_chinese: 流
    reading: 류
    meaning_kun: 흐를
    translation:
      en: exile; banishment; to flow
      ko: "유배; 유형; 흐르다"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 𠫓. Cast away like flowing water. Fourth punishment."
      ko: "물(氵) + 𠫓. 물처럼 쫓아냄. 넷째 형벌."
  - classical_chinese: 斬
    reading: 참
    meaning_kun: 벨
    translation:
      en: to behead; to execute; to cut
      ko: "참수하다; 처형; 베다"
    gender: null
    plural: null
    notes:
      en: "車 + 斤 (axe). To cut with an axe. Capital punishment."
      ko: "車 + 斤(도끼). 도끼로 베다. 사형."
  - classical_chinese: 囚
    reading: 수
    meaning_kun: 가둘
    translation:
      en: prisoner; to imprison; captive
      ko: "죄수; 가두다; 포로"
    gender: null
    plural: null
    notes:
      en: "Person (人) in enclosure (囗). Person confined in a cell."
      ko: "에워쌀(囗) 안의 사람(人). 감방에 갇힌 사람."
  - classical_chinese: 縛
    reading: 박
    meaning_kun: 묶을
    translation:
      en: to bind; to tie up; to restrain
      ko: "묶다; 속박하다; 결박"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 尃. To bind with rope."
      ko: "실(糸) + 尃. 밧줄로 묶다."
  - classical_chinese: 免
    reading: 면
    meaning_kun: 면할
    translation:
      en: to exempt; to avoid; to dismiss
      ko: "면하다; 피하다; 면직"
    gender: null
    plural: null
    notes:
      en: "兔 variant (rabbit escaping). To escape punishment."
      ko: "兔(토끼) 변형. 형벌을 피하다."
