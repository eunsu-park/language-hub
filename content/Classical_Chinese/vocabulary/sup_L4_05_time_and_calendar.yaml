      ko: "일곱째 천간; 나이"
    gender: null
    plural: null
    notes:
      en: "7th Heavenly Stem. Associated with metal and west."
      ko: "제7천간. 쇠와 서쪽에 배속."
  - classical_chinese: 辛
    reading: 신
    meaning_kun: 매울
    translation:
      en: eighth (heavenly stem); spicy; bitter
      ko: "여덟째 천간; 매운; 괴로운"
    gender: null
    plural: null
    notes:
      en: "8th Heavenly Stem. Pungent taste. 辛苦 = hardship."
      ko: "제8천간. 매운맛. 辛苦 = 신고."
  - classical_chinese: 壬
    reading: 임
    meaning_kun: 아홉째
    translation:
