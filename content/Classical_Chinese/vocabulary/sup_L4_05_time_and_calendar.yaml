      ko: "여섯째 천간; 자기"
    gender: null
    plural: null
    notes:
      en: "6th Heavenly Stem. Also means 'oneself.' Distinguished from 已 and 巳."
      ko: "제6천간. '자기'의 뜻도. 已, 巳와 구별."
  - classical_chinese: 庚
    reading: 경
    meaning_kun: 나이
