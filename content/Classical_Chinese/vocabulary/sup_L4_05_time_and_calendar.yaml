      ko: "제12지지. 띠: 돼지(豬). 시간: 밤 9-11시."
- id: time_expressions
  label:
    en: Time Expressions
    ko: 시간 표현
  type: vocabulary
  words:
  - classical_chinese: 曆
    reading: 력
    meaning_kun: 책력
    translation:
      en: calendar; almanac
      ko: "역법; 책력"
    gender: null
    plural: null
    notes:
      en: "厂 + 禾 + 日. Record of astronomical cycles."
      ko: "厂 + 禾 + 日. 천문 주기의 기록."
  - classical_chinese: 紀
    reading: 기
    meaning_kun: 기록할
    translation:
      en: era; to record; discipline
      ko: "기원; 기록하다; 기강"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 己. Thread of time. 世紀 = century."
      ko: "실(糸) + 己. 시간의 실. 世紀 = 세기."
  - classical_chinese: 昔
    reading: 석
    meaning_kun: 옛
    translation:
      en: past; former times; long ago
      ko: "옛날; 예전"
    gender: null
    plural: null
    notes:
      en: "共 (together) + 日 (sun). Accumulated days. The past."
      ko: "共 + 日(해). 쌓인 날들. 과거."
  - classical_chinese: 今
    reading: 금
    meaning_kun: 이제
    translation:
      en: now; present; today
      ko: "지금; 현재; 오늘"
    gender: null
    plural: null
    notes:
      en: "Variant of a mouth giving commands. The present moment."
      ko: "명령하는 입의 변형. 현재의 순간."
  - classical_chinese: 古
    reading: 고
    meaning_kun: 옛
    translation:
      en: ancient; old; former
      ko: "옛; 고대의"
    gender: null
    plural: null
    notes:
      en: "十 (ten) + 口 (mouth). Passed through ten mouths (generations)."
      ko: "十(열) + 口(입). 열 입(세대)을 거친."
  - classical_chinese: 永
    reading: 영
    meaning_kun: 길
    translation:
      en: eternal; forever; long
      ko: "영원한; 길다"
    gender: null
    plural: null
    notes:
      en: "Pictograph of water flowing long. 永遠 = eternity."
      ko: "길게 흐르는 물의 상형자. 永遠 = 영원."
  - classical_chinese: 瞬
    reading: 순
    meaning_kun: 눈깜짝할
    translation:
      en: instant; blink; moment
      ko: "순간; 눈 깜짝할 사이"
    gender: null
    plural: null
    notes:
      en: "Eye (目) + 舜. A blink of an eye. 瞬間 = instant."
      ko: "눈(目) + 舜. 눈 깜짝할 사이. 瞬間 = 순간."
  - classical_chinese: 刻
    reading: 각
    meaning_kun: 새길
    translation:
      en: quarter hour; to carve; moment
      ko: "각(15분); 새기다; 순간"
    gender: null
    plural: null
    notes:
      en: "亥 + knife (刂). To carve marks for time-keeping."
      ko: "亥 + 칼(刂). 시간 표시를 새기다."
