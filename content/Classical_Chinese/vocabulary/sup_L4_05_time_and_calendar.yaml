      ko: 아홉째 천간
    gender: null
    plural: null
    notes:
      en: "9th Heavenly Stem. Associated with water and north."
      ko: "제9천간. 물과 북쪽에 배속."
  - classical_chinese: 癸
    reading: 계
    meaning_kun: 열째
    translation:
      en: tenth (heavenly stem)
      ko: 열째 천간
    gender: null
    plural: null
    notes:
      en: "10th Heavenly Stem. Last of the stems, associated with water."
      ko: "제10천간. 천간의 마지막, 물에 배속."
- id: earthly_branches
