lesson: sup_L1_Rare_Characters
lesson_number: 125
hanja_level: L1
type: supplementary
topic: Rare Characters
categories:
- id: rare_nouns
  label:
    en: Rare Noun Characters
    ko: 희귀 명사 한자
  type: vocabulary
  words:
  - classical_chinese: 鼎
    reading: 정
    meaning_kun: 솥
    translation:
      en: tripod cauldron; symbol of power
      ko: "세발 솥; 권력의 상징"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a three-legged bronze vessel. 問鼎 = to covet the throne."
      ko: "세 다리 청동 솥의 상형자. 問鼎 = 왕위를 넘보다."
  - classical_chinese: 麟
    reading: 린
    meaning_kun: 기린
    translation:
      en: qilin (mythical beast); outstanding
      ko: "기린(상상의 동물); 뛰어난"
    gender: null
    plural: null
    notes:
      en: "Deer (鹿) + 粦. Auspicious beast. 麒麟 = qilin."
      ko: "사슴(鹿) + 粦. 상서로운 짐승. 麒麟 = 기린."
  - classical_chinese: 鳳
    reading: 봉
    meaning_kun: 봉황
    translation:
      en: phoenix (male); mythical bird
      ko: "봉황(수컷); 상상의 새"
    gender: null
    plural: null
    notes:
      en: "鳥 variant. 鳳凰 = phoenix. Symbol of empress."
      ko: "鳥 변형. 鳳凰 = 봉황. 황후의 상징."
  - classical_chinese: 龜
    reading: 구
    meaning_kun: 거북
    translation:
      en: turtle; tortoise
      ko: "거북; 남생이"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a turtle. Used in divination (龜卜)."
      ko: "거북의 상형자. 점(龜卜)에 사용."
  - classical_chinese: 璽
    reading: 새
    meaning_kun: 옥새
    translation:
      en: imperial seal; jade seal
      ko: "옥새; 국새"
    gender: null
    plural: null
    notes:
      en: "玉 + 爾. Emperor's official seal. 玉璽 = imperial jade seal."
      ko: "玉 + 爾. 황제의 공식 인장. 玉璽 = 옥새."
  - classical_chinese: 璧
    reading: 벽
    meaning_kun: 둥근옥
    translation:
      en: jade disk; precious jade
      ko: "벽옥; 둥근 옥"
    gender: null
    plural: null
    notes:
      en: "辟 + 玉. Ceremonial jade with hole. 完璧 = perfect, flawless."
      ko: "辟 + 玉. 구멍이 있는 의례용 옥. 完璧 = 완벽."
  - classical_chinese: 饕餮
    reading: 도철
    meaning_kun: 도철
    translation:
      en: taotie; gluttonous beast
      ko: "도철; 탐욕스러운 짐승"
    gender: null
    plural: null
    notes:
      en: "Mythical gluttonous beast depicted on bronze vessels."
      ko: "청동기에 묘사된 신화 속 탐욕의 짐승."
  - classical_chinese: 鑄
    reading: 주
    meaning_kun: 부을
    translation:
      en: to cast metal; to mint
      ko: "주조하다; 부어 만들다"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 壽. To pour molten metal. 鑄造 = casting."
      ko: "쇠(金) + 壽. 녹인 금속을 붓다. 鑄造 = 주조."
  - classical_chinese: 驥
    reading: 기
    meaning_kun: 천리마
    translation:
      en: thoroughbred horse; talented person
      ko: "천리마; 뛰어난 인재"
    gender: null
    plural: null
    notes:
      en: "Horse (馬) + 冀. Famed horse traveling 1,000 li per day."
      ko: "말(馬) + 冀. 하루에 천 리를 가는 명마."
  - classical_chinese: 瓊
    reading: 경
    meaning_kun: 아름다운 옥
    translation:
      en: fine jade; exquisite
      ko: "아름다운 옥; 정교한"
    gender: null
    plural: null
    notes:
      en: "Jade (玉) + 夐 variant. Finest quality jade."
      ko: "옥(玉) + 夐 변형. 최상급 옥."
- id: rare_verbs_adjectives
  label:
    en: Rare Verbs and Adjectives
    ko: 희귀 동사와 형용사
  type: vocabulary
  words:
  - classical_chinese: 斟
    reading: 짐
    meaning_kun: 따를
    translation:
      en: to pour (wine); to deliberate
      ko: "따르다; 헤아리다"
    gender: null
    plural: null
    notes:
      en: "Dipper (斗) + 甚. To carefully pour. 斟酌 = to deliberate."
      ko: "말(斗) + 甚. 조심스럽게 따르다. 斟酌 = 짐작."
  - classical_chinese: 酌
    reading: 작
    meaning_kun: 따를
    translation:
      en: to pour wine; to consider
      ko: "술을 따르다; 참작하다"
    gender: null
    plural: null
    notes:
      en: "酉 (wine) + 勺. To ladle wine. 參酌 = to take into consideration."
      ko: "酉(술) + 勺(국자). 술을 뜨다. 參酌 = 참작."
  - classical_chinese: 翱翔
    reading: 고상
    meaning_kun: 높이 날
    translation:
      en: to soar; to glide
      ko: "높이 날다; 날아오르다"
    gender: null
    plural: null
    notes:
      en: "翱 (to soar) + 翔 (to glide). Majestic flight."
      ko: "翱(솟을 고) + 翔(날 상). 웅장하게 나는 것."
  - classical_chinese: 躊躇
    reading: 주저
    meaning_kun: 머뭇거릴
    translation:
      en: to hesitate; to waver
      ko: "주저하다; 망설이다"
    gender: null
    plural: null
    notes:
      en: "Foot (足) + 壽/著. Feet not moving forward. 躊躇不前."
      ko: "발(足) + 壽/著. 발이 앞으로 나아가지 못함. 躊躇不前."
  - classical_chinese: 彷徨
    reading: 방황
    meaning_kun: 서성거릴
    translation:
      en: to wander; to be at a loss
      ko: "방황하다; 서성거리다"
    gender: null
    plural: null
    notes:
      en: "彳 (step) + 方/皇. Wandering without direction."
      ko: "彳(걸음) + 方/皇. 방향 없이 떠돎."
  - classical_chinese: 嶔崎
    reading: 금기
    meaning_kun: 험할
    translation:
      en: steep and rugged; outstanding
      ko: "험준한; 뛰어난"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 欽/奇. Steep terrain. Also 'unconventional talent.'"
      ko: "산(山) + 欽/奇. 험한 지형. '비범한 재능'의 뜻도."
  - classical_chinese: 齟齬
    reading: 저어
    meaning_kun: 어긋날
    translation:
      en: discord; disagreement; misalignment
      ko: "어긋남; 불화; 불일치"
    gender: null
    plural: null
    notes:
      en: "Tooth (齒) + 且/吾. Teeth not meeting properly."
      ko: "이(齒) + 且/吾. 이가 맞물리지 않음."
  - classical_chinese: 蹉跎
    reading: 차타
    meaning_kun: 허송할
    translation:
      en: to waste time; to stumble
      ko: "시간을 허비하다; 비틀거리다"
    gender: null
    plural: null
    notes:
      en: "Foot (足) + 差/它. Stumbling through time. 蹉跎歲月."
      ko: "발(足) + 差/它. 세월을 헛되이 보냄. 蹉跎歲月."
  - classical_chinese: 窈窕
    reading: 요조
    meaning_kun: 아름다울
    translation:
      en: graceful; beautiful; secluded
      ko: "요조한; 아름다운; 그윽한"
    gender: null
    plural: null
    notes:
      en: "穴 + 幼/兆. 窈窕淑女 = gentle and graceful lady (詩經)."
      ko: "穴 + 幼/兆. 窈窕淑女 = 요조숙녀(시경)."
  - classical_chinese: 嫋嫋
    reading: 요요
    meaning_kun: 가냘플
    translation:
      en: slender; willowy; swaying gently
      ko: "가냘픈; 버들처럼 흔들리는"
    gender: null
    plural: null
    notes:
      en: "Woman (女) + 鳥. Delicately swaying like willow branches."
      ko: "여자(女) + 鳥. 버들가지처럼 부드럽게 흔들리는."
- id: rare_abstract
  label:
    en: Rare Abstract Characters
    ko: 희귀 추상 한자
  type: vocabulary
  words:
  - classical_chinese: 翳
    reading: 예
    meaning_kun: 가릴
    translation:
      en: to shade; to screen; hidden
      ko: "가리다; 은폐; 숨겨진"
    gender: null
    plural: null
    notes:
      en: "殹 + 羽. Feathers screening something. To conceal."
      ko: "殹 + 羽(깃). 깃털로 가리다. 은폐하다."
  - classical_chinese: 邃
    reading: 수
    meaning_kun: 깊을
    translation:
      en: deep; profound; abstruse
      ko: "깊은; 심오한; 난해한"
    gender: null
    plural: null
    notes:
      en: "辶 + 遂 variant. Deeply profound. 深邃 = profoundly deep."
      ko: "辶 + 遂 변형. 매우 깊은. 深邃 = 심수."
  - classical_chinese: 皓
    reading: 호
    meaning_kun: 흴
    translation:
      en: bright white; radiant; vast
      ko: "밝고 흰; 환한; 넓은"
    gender: null
    plural: null
    notes:
      en: "White (白) + 告. Brilliantly white. 皓月 = bright moon."
      ko: "白(흰) + 告. 눈부시게 흰. 皓月 = 환한 달."
  - classical_chinese: 燦
    reading: 찬
    meaning_kun: 빛날
    translation:
      en: brilliant; dazzling; radiant
      ko: "찬란한; 눈부신; 빛나는"
    gender: null
    plural: null
    notes:
      en: "Fire (火) + 粲. Brilliantly shining. 燦爛 = dazzling."
      ko: "불(火) + 粲. 찬란하게 빛남. 燦爛 = 찬란."
  - classical_chinese: 鬱
    reading: 울
    meaning_kun: 답답할
    translation:
      en: melancholy; dense; luxuriant
      ko: "울적한; 울창한; 답답한"
    gender: null
    plural: null
    notes:
      en: "One of the most complex Chinese characters. 憂鬱 = depression."
      ko: "가장 복잡한 한자 중 하나. 憂鬱 = 우울."
  - classical_chinese: 曖
    reading: 애
    meaning_kun: 어두울
    translation:
      en: dim; unclear; ambiguous
      ko: "어두운; 불분명한; 애매한"
    gender: null
    plural: null
    notes:
      en: "Sun (日) + 愛. Dim sunlight. 曖昧 = ambiguous."
      ko: "해(日) + 愛. 희미한 햇빛. 曖昧 = 애매."
  - classical_chinese: 靄
    reading: 애
    meaning_kun: 안개
    translation:
      en: mist; haze; misty
      ko: "안개; 아지랑이; 안개 낀"
    gender: null
    plural: null
    notes:
      en: "Rain (雨) + 謁 variant. Misty haze. 雲靄 = clouds and mist."
      ko: "비(雨) + 謁 변형. 안개 자욱한. 雲靄 = 운애."
  - classical_chinese: 瀟
    reading: 소
    meaning_kun: 맑을
    translation:
      en: clear; natural; unrestrained
      ko: "맑은; 자연스러운; 쇄락한"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 蕭. Clear water. 瀟灑 = elegant and free."
      ko: "물(氵) + 蕭. 맑은 물. 瀟灑 = 소쇄(우아하고 자유로운)."
  - classical_chinese: 睿
    reading: 예
    meaning_kun: 슬기로울
    translation:
      en: wise; sagacious; perspicacious
      ko: "슬기로운; 총명한; 예지"
    gender: null
    plural: null
    notes:
      en: "目 (eye) + 叡 variant. Far-seeing wisdom. 睿智 = sagacity."
      ko: "눈(目) + 叡 변형. 멀리 내다보는 지혜. 睿智 = 예지."
  - classical_chinese: 驪
    reading: 려
    meaning_kun: 가무스름할
    translation:
      en: black horse; beautiful; paired
      ko: "검은 말; 아름다운; 쌍을 이룬"
    gender: null
    plural: null
    notes:
      en: "Horse (馬) + 麗. Dark beautiful horse. 驪龍 = black dragon."
      ko: "말(馬) + 麗. 검고 아름다운 말. 驪龍 = 여룡."
