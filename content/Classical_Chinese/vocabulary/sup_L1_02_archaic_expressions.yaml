lesson: sup_L1_Archaic_Expressions
lesson_number: 126
hanja_level: L1
type: supplementary
topic: Archaic Expressions
categories:
- id: archaic_pronouns
  label:
    en: Archaic Pronouns and Particles
    ko: 고어 대명사와 조사
  type: vocabulary
  words:
  - classical_chinese: 朕
    reading: 짐
    meaning_kun: 나
    translation:
      en: I (imperial); we (royal)
      ko: "짐(황제의 1인칭); 나"
    gender: null
    plural: null
    notes:
      en: "Originally common first-person pronoun. After Qin Shihuang, reserved for emperor."
      ko: "원래 일반적인 1인칭. 진시황 이후 황제 전용."
  - classical_chinese: 寡人
    reading: 과인
    meaning_kun: 과인
    translation:
      en: I (humble royal); the lonely ruler
      ko: "과인(왕의 겸칭); 덕이 부족한 사람"
    gender: null
    plural: null
    notes:
      en: "寡 (few) + 人. 'Person of few virtues.' Used by pre-Qin rulers."
      ko: "寡(적을 과) + 人. '덕이 적은 사람.' 선진(先秦) 군주가 사용."
  - classical_chinese: 孤
    reading: 고
    meaning_kun: 외로울
    translation:
      en: I (humble royal); orphan; lone
      ko: "고(왕의 겸칭); 고아; 외로운"
    gender: null
    plural: null
    notes:
      en: "Child (子) + 瓜. Self-deprecating term used by rulers."
      ko: "아이(子) + 瓜. 통치자가 쓰는 겸양의 자칭."
  - classical_chinese: 吾
    reading: 오
    meaning_kun: 나
    translation:
      en: I; my; we
      ko: "나; 나의; 우리"
    gender: null
    plural: null
    notes:
      en: "五 + 口. Common first-person in classical texts. Often more literary than 我."
      ko: "五 + 口. 고전의 일반적 1인칭. 我보다 문어적."
  - classical_chinese: 汝
    reading: 여
    meaning_kun: 너
    translation:
      en: you (informal); thou
      ko: "너; 그대"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 女. Informal second-person. 汝等 = you (plural)."
      ko: "물(氵) + 女. 비격식 2인칭. 汝等 = 너희."
  - classical_chinese: 爾
    reading: 이
    meaning_kun: 너
    translation:
      en: you; your; that; thus
      ko: "너; 너의; 그; 이와 같이"
    gender: null
    plural: null
    notes:
      en: "Common second-person in classical texts. Also demonstrative 'thus.'"
      ko: "고전의 흔한 2인칭. '이와 같이'의 지시사로도 사용."
  - classical_chinese: 彼
    reading: 피
    meaning_kun: 저
    translation:
      en: that; he/she; the other
      ko: "저; 그; 저쪽"
    gender: null
    plural: null
    notes:
      en: "彳 + 皮. That person/thing over there. 彼此 = each other."
      ko: "彳 + 皮. 저쪽의 사람/사물. 彼此 = 피차(서로)."
  - classical_chinese: 夫
    reading: 부
    meaning_kun: 대저
    translation:
      en: (sentence-initial particle); that; well
      ko: "대저; 무릇; 저"
    gender: null
    plural: null
    notes:
      en: "As particle: 'now,' 'well then.' 夫天地者 = As for heaven and earth..."
      ko: "조사로: '무릇,' '대저.' 夫天地者 = 무릇 천지란..."
  - classical_chinese: 蓋
    reading: 개
    meaning_kun: 대개
    translation:
      en: probably; perhaps; for; a cover
      ko: "대개; 아마; 뚜껑"
    gender: null
    plural: null
    notes:
      en: "艹 + 盍. Sentence-initial: 'probably' or 'the reason is.'"
      ko: "艹 + 盍. 문두에서: '대개' 또는 '그 이유는.'"
  - classical_chinese: 竊
    reading: 절
    meaning_kun: 훔칠
    translation:
      en: humbly; privately; to steal
      ko: "외람되이; 남몰래; 훔치다"
    gender: null
    plural: null
    notes:
      en: "穴 + 切 + 廾. Humble first-person marker: 'I venture to say.'"
      ko: "穴 + 切 + 廾. 겸양의 1인칭 표지: '외람되이 아뢰건대.'"
- id: archaic_verbs
  label:
    en: Archaic Verbs
    ko: 고어 동사
  type: vocabulary
  words:
  - classical_chinese: 曰
    reading: 왈
    meaning_kun: 가로
    translation:
      en: to say; to speak; said
      ko: "가로되; 말하다; 이르기를"
    gender: null
    plural: null
    notes:
      en: "Mouth with words coming out. Primary speech verb in classical texts."
      ko: "입에서 말이 나오는 모양. 고전의 주요 발화 동사."
  - classical_chinese: 謂
    reading: 위
    meaning_kun: 이를
    translation:
      en: to call; to say; to consider
      ko: "이르다; ~라고 하다; 일컫다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 胃. To address or refer to. 所謂 = so-called."
      ko: "말씀(言) + 胃. 부르거나 가리키다. 所謂 = 소위."
  - classical_chinese: 云
    reading: 운
    meaning_kun: 이를
    translation:
      en: to say; to speak; cloud (archaic)
      ko: "이르다; 말하다; 구름(고어)"
    gender: null
    plural: null
    notes:
      en: "Archaic speech verb. Often at end: 子曰...云."
      ko: "고어 발화 동사. 종종 문말에: 子曰...云."
  - classical_chinese: 弗
    reading: 불
    meaning_kun: 아닐
    translation:
      en: not (archaic negation)
      ko: "~아니다(고어 부정)"
    gender: null
    plural: null
    notes:
      en: "Negates verbs. More emphatic than 不 in some contexts."
      ko: "동사를 부정. 일부 문맥에서 不보다 강조적."
  - classical_chinese: 毋
    reading: 무
    meaning_kun: 말
    translation:
      en: do not; must not (prohibition)
      ko: "~하지 마라; ~해서는 안 된다"
    gender: null
    plural: null
    notes:
      en: "Prohibitive particle. Stronger than 勿. 毋忘 = do not forget."
      ko: "금지사. 勿보다 강함. 毋忘 = 잊지 마라."
  - classical_chinese: 勿
    reading: 물
    meaning_kun: 말
    translation:
      en: do not; must not
      ko: "~하지 마라; ~말라"
    gender: null
    plural: null
    notes:
      en: "Prohibitive particle. 勿論 = regardless."
      ko: "금지사. 勿論 = 물론."
  - classical_chinese: 盍
    reading: 합
    meaning_kun: 어찌
    translation:
      en: why not; how about
      ko: "어찌 ~않는가; ~하는 것이 어떤가"
    gender: null
    plural: null
    notes:
      en: "Contraction of 何不. 盍歸乎來 = why not come home?"
      ko: "何不의 축약형. 盍歸乎來 = 어찌 돌아오지 않는가?"
  - classical_chinese: 焉
    reading: 언
    meaning_kun: 어찌
    translation:
      en: where; how; therein; (sentence-final)
      ko: "어찌; 어디; 거기에; (문말조사)"
    gender: null
    plural: null
    notes:
      en: "Multi-function word: question (where/how), pronoun (there), particle."
      ko: "다기능어: 의문(어찌/어디), 대명사(거기), 어기사."
  - classical_chinese: 矣
    reading: 의
    meaning_kun: 어조사
    translation:
      en: (sentence-final particle); indeed; already
      ko: "(문말 어기사); 이미; 과연"
    gender: null
    plural: null
    notes:
      en: "Expresses completion or certainty. 可矣 = it will do."
      ko: "완료나 확실함을 표현. 可矣 = 됐다."
  - classical_chinese: 歟
    reading: 여
    meaning_kun: 어조사
    translation:
      en: (interrogative/exclamatory particle)
      ko: "(의문/감탄 어기사)"
    gender: null
    plural: null
    notes:
      en: "Question or exclamation marker. 然歟 = is it not so?"
      ko: "의문이나 감탄 표지. 然歟 = 그러한가?"
- id: archaic_connectives
  label:
    en: Archaic Connectives and Adverbs
    ko: 고어 접속사와 부사
  type: vocabulary
  words:
  - classical_chinese: 雖
    reading: 수
    meaning_kun: 비록
    translation:
      en: although; even though
      ko: "비록; ~이지만"
    gender: null
    plural: null
    notes:
      en: "虫 + 唯. Concessive: 'even if.' 雖然 = although."
      ko: "虫 + 唯. 양보: '비록 ~일지라도.' 雖然 = 비록 그렇지만."
  - classical_chinese: 苟
    reading: 구
    meaning_kun: 진실로
    translation:
      en: if; supposing; carelessly
      ko: "만약; 진실로; 구차하게"
    gender: null
    plural: null
    notes:
      en: "艹 + 句. Conditional: 'if only.' 苟且 = careless, sloppy."
      ko: "艹 + 句. 조건: '만일.' 苟且 = 구차."
  - classical_chinese: 殆
    reading: 태
    meaning_kun: 위태할
    translation:
      en: almost; probably; dangerous
      ko: "거의; 아마; 위태로운"
    gender: null
    plural: null
    notes:
      en: "歹 + 台. 'Nearly' or 'dangerously close to.' 百戰不殆."
      ko: "歹 + 台. '거의' 또는 '위태롭게.' 百戰不殆."
  - classical_chinese: 豈
    reading: 기
    meaning_kun: 어찌
    translation:
      en: how could; surely not; is it possible
      ko: "어찌; 설마; ~할 수 있겠는가"
    gender: null
    plural: null
    notes:
      en: "Rhetorical question marker. 豈不 = isn't it?"
      ko: "수사 의문 표지. 豈不 = ~하지 않는가?"
  - classical_chinese: 庶幾
    reading: 서기
    meaning_kun: 거의
    translation:
      en: perhaps; nearly; hopefully
      ko: "거의; 바라건대; 아마"
    gender: null
    plural: null
    notes:
      en: "庶 (many) + 幾 (how many). 'Hopefully' or 'close to.'"
      ko: "庶(여러) + 幾(거의). '바라건대' 또는 '거의.'"
  - classical_chinese: 遂
    reading: 수
    meaning_kun: 드디어
    translation:
      en: thereupon; consequently; then
      ko: "드디어; 마침내; 그래서"
    gender: null
    plural: null
    notes:
      en: "辶 + 㒸. Sequential: 'and then.' 遂成 = thus accomplished."
      ko: "辶 + 㒸. 순차: '그리하여.' 遂成 = 마침내 이루다."
  - classical_chinese: 甫
    reading: 보
    meaning_kun: 처음
    translation:
      en: just; barely; beginning
      ko: "막; 비로소; 처음"
    gender: null
    plural: null
    notes:
      en: "用 + 父. Just beginning. Also a male courtesy name suffix."
      ko: "用 + 父. 막 시작. 남자의 자(字) 접미사이기도."
  - classical_chinese: 乃
    reading: 내
    meaning_kun: 이에
    translation:
      en: then; thereupon; is; your
      ko: "이에; 곧; ~이다; 너의"
    gender: null
    plural: null
    notes:
      en: "Multi-function: 'then,' copula 'is,' or possessive 'your.'"
      ko: "다기능: '이에,' 계사 '~이다,' 또는 소유격 '너의.'"
  - classical_chinese: 其
    reading: 기
    meaning_kun: 그
    translation:
      en: his; her; its; that; (modal particle)
      ko: "그; 그의; 그것의; (어기사)"
    gender: null
    plural: null
    notes:
      en: "Third-person possessive. As particle: optative or speculative mood."
      ko: "3인칭 소유격. 조사로: 희망이나 추측의 어기."
  - classical_chinese: 或
    reading: 혹
    meaning_kun: 혹
    translation:
      en: perhaps; someone; or; some
      ko: "혹; 어떤; 또는; 혹시"
    gender: null
    plural: null
    notes:
      en: "戈 + 口 + 一. Indefinite: 'someone,' 'perhaps.' 或曰 = some say."
      ko: "戈 + 口 + 一. 부정: '어떤 사람,' '혹시.' 或曰 = 혹자가 말하기를."
