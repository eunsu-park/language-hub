lesson: sup_L4_Education_and_Scholarship
lesson_number: 109
hanja_level: L4
type: supplementary
topic: Education and Scholarship
categories:
- id: education
  label:
    en: Education
    ko: 교육
  type: vocabulary
  words:
  - classical_chinese: 學
    reading: 학
    meaning_kun: 배울
    translation:
      en: to learn; study; school
      ko: "배우다; 학문; 학교"
    gender: null
    plural: null
    notes:
      en: "Hands teaching a child (子) under a roof. 學問 = learning."
      ko: "지붕 아래에서 아이(子)를 가르치는 손. 學問 = 학문."
  - classical_chinese: 敎
    reading: 교
    meaning_kun: 가르칠
    translation:
      en: to teach; to instruct; religion
      ko: "가르치다; 교육; 종교"
    gender: null
    plural: null
    notes:
      en: "孝 (filial) + 攵 (strike). Teaching through discipline."
      ko: "孝(효도) + 攵(칠 복). 훈육을 통한 가르침."
  - classical_chinese: 師
    reading: 사
    meaning_kun: 스승
    translation:
      en: teacher; master; army
      ko: "스승; 선생; 군대"
    gender: null
    plural: null
    notes:
      en: "𠂤 + 帀. Originally 'army.' Extended to 'one who leads.'"
      ko: "𠂤 + 帀. 원래 '군대.' '이끄는 사람'으로 확장."
  - classical_chinese: 弟子
    reading: 제자
    meaning_kun: 제자
    translation:
      en: disciple; student; follower
      ko: "제자; 학생"
    gender: null
    plural: null
    notes:
      en: "弟 (younger) + 子 (child). One who follows a master."
      ko: "弟(아우) + 子(아이). 스승을 따르는 사람."
  - classical_chinese: 讀
    reading: 독
    meaning_kun: 읽을
    translation:
      en: to read; to study
      ko: "읽다; 공부하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 賣 variant. To vocalize written words."
      ko: "말씀(言) + 賣 변형. 글을 소리 내어 읽다."
  - classical_chinese: 誦
    reading: 송
    meaning_kun: 외울
    translation:
      en: to recite; to chant
      ko: "외우다; 읊다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 甬. To recite from memory aloud."
      ko: "말씀(言) + 甬. 소리 내어 암송하다."
  - classical_chinese: 問
    reading: 문
    meaning_kun: 물을
    translation:
      en: to ask; to inquire; question
      ko: "묻다; 질문"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) inside gate (門). Knocking at the gate to ask."
      ko: "문(門) 안의 입(口). 문을 두드려 묻다."
  - classical_chinese: 答
    reading: 답
    meaning_kun: 대답할
    translation:
      en: to answer; to reply
      ko: "대답하다; 응답"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 合. Joining bamboo tablets in response."
      ko: "대(竹) + 合. 대나무 서간을 합쳐 답하다."
  - classical_chinese: 論
    reading: 론
    meaning_kun: 논할
    translation:
      en: to discuss; to debate; treatise
      ko: "논하다; 토론; 논문"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 侖 (order). Orderly discussion. 論語 = Analerta."
      ko: "말씀(言) + 侖(차례). 질서 있는 토론. 論語 = 논어."
  - classical_chinese: 辯
    reading: 변
    meaning_kun: 분별할
    translation:
      en: to argue; to debate; eloquent
      ko: "변론하다; 논변; 말 잘하는"
    gender: null
    plural: null
    notes:
      en: "辡 + speech (言). Two sides arguing with words."
      ko: "辡 + 말씀(言). 양쪽이 말로 다투다."
- id: scholarship
  label:
    en: Scholarship and Texts
    ko: 학문과 서적
  type: vocabulary
  words:
  - classical_chinese: 經
    reading: 경
    meaning_kun: 지날
    translation:
      en: classic; scripture; to pass through
      ko: "경전; 지나다; 다스리다"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 巠. Warp threads. Foundational texts (e.g., 五經)."
      ko: "실(糸) + 巠. 날실. 기본 경전(예: 五經)."
  - classical_chinese: 傳
    reading: 전
    meaning_kun: 전할
    translation:
      en: to transmit; biography; commentary
      ko: "전하다; 전기; 전(주석)"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 專. To pass knowledge on. Also read 전/전."
      ko: "사람(亻) + 專. 지식을 전하다."
  - classical_chinese: 記
    reading: 기
    meaning_kun: 기록할
    translation:
      en: to record; to remember; record
      ko: "기록하다; 기억하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 己 (self). Personal account. 記錄 = record."
      ko: "말씀(言) + 己(자기). 개인 기록. 記錄 = 기록."
  - classical_chinese: 註
    reading: 주
    meaning_kun: 풀이할
    translation:
      en: annotation; commentary; to explain
      ko: "주석; 풀이; 설명하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 主. Explanatory notes on a text."
      ko: "말씀(言) + 主. 경문에 대한 풀이."
  - classical_chinese: 疏
    reading: 소
    meaning_kun: 성길
    translation:
      en: commentary; memorial; sparse
      ko: "소(상소); 주소(주석); 성긴"
    gender: null
    plural: null
    notes:
      en: "疋 + 流 variant. Sub-commentary on 註. Also 'memorial to throne.'"
      ko: "疋 + 流 변형. 註에 대한 재주석. '상소문'의 뜻도."
  - classical_chinese: 志
    reading: 지
    meaning_kun: 뜻
    translation:
      en: will; ambition; record; annals
      ko: "뜻; 지향; 지(기록)"
    gender: null
    plural: null
    notes:
      en: "士 (scholar) + heart (心). Scholar's aspiration."
      ko: "士(선비) + 마음(心). 선비의 뜻."
  - classical_chinese: 才
    reading: 재
    meaning_kun: 재주
    translation:
      en: talent; ability; just (barely)
      ko: "재주; 능력; 겨우"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a sprout. Natural ability emerging."
      ko: "싹의 상형자. 자연적으로 나타나는 능력."
  - classical_chinese: 藝
    reading: 예
    meaning_kun: 재주
    translation:
      en: art; skill; craft
      ko: "예술; 재주; 기예"
    gender: null
    plural: null
    notes:
      en: "艹 + 埶 + 云. Originally 'to plant.' Extended to 'skill' and 'art.'"
      ko: "艹 + 埶 + 云. 원래 '심다.' '기예'와 '예술'로 확장."
  - classical_chinese: 試
    reading: 시
    meaning_kun: 시험할
    translation:
      en: to test; to try; examination
      ko: "시험; 시도하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 式. To test through questioning. 科擧試 = civil exam."
      ko: "말씀(言) + 式. 물어서 시험하다. 科擧試 = 과거 시험."
  - classical_chinese: 科
    reading: 과
    meaning_kun: 과목
    translation:
      en: subject; branch; section
      ko: "과목; 분야; 부문"
    gender: null
    plural: null
    notes:
      en: "Grain (禾) + 斗. Classifying grain. 科擧 = civil service exam."
      ko: "벼(禾) + 斗. 곡식을 분류. 科擧 = 과거."
  - classical_chinese: 塾
    reading: 숙
    meaning_kun: 글방
    translation:
      en: private school; academy
      ko: "서당; 서숙"
    gender: null
    plural: null
    notes:
      en: "孰 + earth (土). Private study hall. 私塾 = private school."
      ko: "孰 + 흙(土). 사설 강학소. 私塾 = 사숙."
  - classical_chinese: 院
    reading: 원
    meaning_kun: 집
    translation:
      en: academy; institute; courtyard
      ko: "원; 서원; 마당"
    gender: null
    plural: null
    notes:
      en: "Wall radical (阝) + 完. Enclosed institution. 書院 = Confucian academy."
      ko: "언덕(阝) + 完. 둘러싸인 기관. 書院 = 서원."
  - classical_chinese: 圖
    reading: 도
    meaning_kun: 그림
    translation:
      en: picture; map; plan; to scheme
      ko: "그림; 지도; 도모하다"
    gender: null
    plural: null
    notes:
      en: "Enclosure (囗) + 啚. Enclosed drawing. 圖書 = books."
      ko: "에워쌀(囗) + 啚. 에워싼 그림. 圖書 = 도서."
  - classical_chinese: 典
    reading: 전
    meaning_kun: 법
    translation:
      en: canon; classic; law; ceremony
      ko: "전적; 법전; 의식"
    gender: null
    plural: null
    notes:
      en: "冊 (book) on a stand (丌). Books placed with reverence. 古典 = classics."
      ko: "책(冊)을 받침대(丌) 위에 놓은 모양. 古典 = 고전."
  - classical_chinese: 翰
    reading: 한
    meaning_kun: 깃
    translation:
      en: writing brush; literary; feather
      ko: "붓; 문한; 깃털"
    gender: null
    plural: null
    notes:
      en: "羽 (feather) + 倝. Feather pen. 翰林 = Imperial Academy."
      ko: "깃(羽) + 倝. 깃털 붓. 翰林 = 한림원."
  - classical_chinese: 賢
    reading: 현
    meaning_kun: 어질
    translation:
      en: wise; virtuous; talented
      ko: "어진; 현명한; 유능한"
    gender: null
    plural: null
    notes:
      en: "臤 + 貝. Person of worth. 賢者 = wise person."
      ko: "臤 + 貝. 뛰어난 인물. 賢者 = 현자."
  - classical_chinese: 愚
    reading: 우
    meaning_kun: 어리석을
    translation:
      en: foolish; stupid; ignorant
      ko: "어리석은; 우둔한; 무지한"
    gender: null
    plural: null
    notes:
      en: "禺 + heart (心). Opposite of 賢. 愚公 = Foolish Old Man."
      ko: "禺 + 마음(心). 賢의 반대. 愚公 = 우공."
  - classical_chinese: 博
    reading: 박
    meaning_kun: 넓을
    translation:
      en: broad; extensive; learned
      ko: "넓은; 박식한; 광범위한"
    gender: null
    plural: null
    notes:
      en: "十 + 尃. 博學 = broad learning. 博士 = doctorate/scholar."
      ko: "十 + 尃. 博學 = 박학. 博士 = 박사."
  - classical_chinese: 覽
    reading: 람
    meaning_kun: 볼
    translation:
      en: to read; to view; to survey
      ko: "보다; 읽다; 열람하다"
    gender: null
    plural: null
    notes:
      en: "監 + 見. To look over carefully. 博覽 = to read widely."
      ko: "監 + 見. 주의 깊게 살펴보다. 博覽 = 박람."
  - classical_chinese: 講
    reading: 강
    meaning_kun: 말씀할
    translation:
      en: to lecture; to explain; to discuss
      ko: "강의하다; 설명; 토론하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 冓. 講學 = to give lectures on learning."
      ko: "말씀(言) + 冓. 講學 = 강학(학문을 강의)."
