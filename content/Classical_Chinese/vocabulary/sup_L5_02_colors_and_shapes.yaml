lesson: sup_L5_Colors_and_Shapes
lesson_number: 102
hanja_level: L5
type: supplementary
topic: Colors and Shapes
categories:
- id: colors
  label:
    en: Colors
    ko: 색상
  type: vocabulary
  words:
  - classical_chinese: 赤
    reading: 적
    meaning_kun: 붉을
    translation:
      en: red; scarlet
      ko: 붉은색
    gender: null
    plural: null
    notes:
      en: "Combination of 大 (big) + 火 (fire). Bright red color."
      ko: "大(클 대) + 火(불 화)의 결합. 밝은 붉은색."
  - classical_chinese: 青
    reading: 청
    meaning_kun: 푸를
    translation:
      en: blue; green; young
      ko: 푸른색; 젊은
    gender: null
    plural: null
    notes:
      en: "Can mean blue, green, or black depending on context. Also means 'youth.'"
      ko: "문맥에 따라 파랑, 초록, 검정을 의미. '젊음'의 뜻도 있음."
  - classical_chinese: 黃
    reading: 황
    meaning_kun: 누를
    translation:
      en: yellow
      ko: 누런색
    gender: null
    plural: null
    notes:
      en: "Color of the earth. Associated with the emperor and the center."
      ko: "흙의 색. 황제와 중앙을 상징."
  - classical_chinese: 白
    reading: 백
    meaning_kun: 흰
    translation:
      en: white; plain; clear
      ko: 흰색; 밝은
    gender: null
    plural: null
    notes:
      en: "Also means 'plain,' 'empty,' or 'to state.' Radical #106."
      ko: "또한 '비어 있는,' '아뢰다'의 뜻. 부수 제106번."
  - classical_chinese: 黑
    reading: 흑
    meaning_kun: 검을
    translation:
      en: black; dark
      ko: 검은색
    gender: null
    plural: null
    notes:
      en: "Depicts soot from fire. Radical #203."
      ko: "불에서 나온 그을음을 형상화. 부수 제203번."
  - classical_chinese: 紅
    reading: 홍
    meaning_kun: 붉을
    translation:
      en: red; crimson
      ko: 붉은색; 홍색
    gender: null
    plural: null
    notes:
      en: "Silk radical (糸) + 工. Dyed silk. More common than 赤 in later texts."
      ko: "실(糸) 부수 + 工. 물들인 비단. 후대 문헌에서 赤보다 더 흔함."
  - classical_chinese: 綠
    reading: 록
    meaning_kun: 초록
    translation:
      en: green
      ko: 초록색
    gender: null
    plural: null
    notes:
      en: "Silk radical (糸) + 錄. Green-dyed silk."
      ko: "실(糸) 부수 + 錄. 초록으로 물들인 비단."
  - classical_chinese: 紫
    reading: 자
    meaning_kun: 자주
    translation:
      en: purple; violet
      ko: 자주색; 보라색
    gender: null
    plural: null
    notes:
      en: "此 + 糸. Historically a color of nobility."
      ko: "此 + 糸. 역사적으로 귀족의 색."
  - classical_chinese: 碧
    reading: 벽
    meaning_kun: 푸를
    translation:
      en: jade-green; azure
      ko: 벽색; 푸른빛
    gender: null
    plural: null
    notes:
      en: "珀 (jade) + 石 (stone). Blue-green color of jade."
      ko: "옥(珀) + 돌(石). 옥의 푸른빛."
  - classical_chinese: 玄
    reading: 현
    meaning_kun: 검을
    translation:
      en: black; dark; mysterious
      ko: "검은색; 신비로운"
    gender: null
    plural: null
    notes:
      en: "Deep black, also means 'profound' or 'mysterious.' Used in Daoist texts."
      ko: "깊은 검정, '오묘한,' '현묘한'의 뜻. 도교 문헌에서 사용."
  - classical_chinese: 丹
    reading: 단
    meaning_kun: 붉을
    translation:
      en: cinnabar; red; sincere
      ko: "붉은색; 단사(주사); 정성"
    gender: null
    plural: null
    notes:
      en: "Cinnabar ore used for red pigment. 丹心 means 'sincere heart.'"
      ko: "붉은 안료로 쓰는 주사(朱砂). 丹心은 '충심'을 뜻함."
  - classical_chinese: 朱
    reading: 주
    meaning_kun: 붉을
    translation:
      en: vermilion; cinnabar red
      ko: 주홍색; 주색
    gender: null
    plural: null
    notes:
      en: "Bright red-orange color. 朱門 (vermilion gate) symbolized wealthy families."
      ko: "밝은 적색. 朱門(주문)은 부유한 집안을 상징."
  - classical_chinese: 蒼
    reading: 창
    meaning_kun: 푸를
    translation:
      en: pale blue; gray-green; vast
      ko: "창백한 푸른색; 넓은"
    gender: null
    plural: null
    notes:
      en: "Grass radical (艹) + 倉. Dark blue-green, like the sky or old age."
      ko: "초(艹) + 倉. 하늘이나 노인의 머리색처럼 짙은 푸른빛."
- id: shapes_and_forms
  label:
    en: Shapes and Forms
    ko: 형태
  type: vocabulary
  words:
  - classical_chinese: 圓
    reading: 원
    meaning_kun: 둥글
    translation:
      en: round; circle
      ko: 둥근; 원형
    gender: null
    plural: null
    notes:
      en: "Enclosure radical (囗) + 員. Complete, perfect."
      ko: "에워쌀(囗) 부수 + 員. 완전한, 완벽한."
  - classical_chinese: 方
    reading: 방
    meaning_kun: 모
    translation:
      en: square; direction; method
      ko: "네모; 방향; 방법"
    gender: null
    plural: null
    notes:
      en: "Pictograph of two boats lashed together. Also means 'just' (방금)."
      ko: "두 배를 묶은 모양의 상형자. '바야흐로'의 뜻도 있음."
  - classical_chinese: 直
    reading: 직
    meaning_kun: 곧을
    translation:
      en: straight; upright; honest
      ko: "곧은; 정직한"
    gender: null
    plural: null
    notes:
      en: "Eye (目) + vertical line. Looking straight ahead. Also means 'honest.'"
      ko: "눈(目) + 세로 획. 똑바로 바라봄. '정직한'의 뜻도 있음."
  - classical_chinese: 曲
    reading: 곡
    meaning_kun: 굽을
    translation:
      en: curved; bent; song
      ko: "굽은; 곡조"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a bent object. Also means 'tune' or 'melody.'"
      ko: "굽은 물건의 상형자. '가락,' '곡조'의 뜻도 있음."
  - classical_chinese: 尖
    reading: 첨
    meaning_kun: 뾰족할
    translation:
      en: pointed; sharp; tip
      ko: "뾰족한; 끝"
    gender: null
    plural: null
    notes:
      en: "小 (small) on top of 大 (big). Small at the top, big at the base."
      ko: "小(작을 소) 위에 大(클 대). 위가 작고 아래가 큰 모양."
  - classical_chinese: 平
    reading: 평
    meaning_kun: 평평할
    translation:
      en: flat; level; peaceful
      ko: "평평한; 평화로운"
    gender: null
    plural: null
    notes:
      en: "Dry (干) + balance stroke. Level surface, also 'peace.'"
      ko: "干 + 균형 획. 수평면, '평화'의 뜻도 있음."
  - classical_chinese: 廣
    reading: 광
    meaning_kun: 넓을
    translation:
      en: wide; broad; extensive
      ko: "넓은; 광활한"
    gender: null
    plural: null
    notes:
      en: "Shelter radical (广) + 黃. A wide building."
      ko: "엄호(广) 부수 + 黃. 넓은 건물."
  - classical_chinese: 細
    reading: 세
    meaning_kun: 가늘
    translation:
      en: thin; fine; detailed
      ko: "가는; 세밀한"
    gender: null
    plural: null
    notes:
      en: "Silk radical (糸) + 田. Fine as a silk thread."
      ko: "실(糸) 부수 + 田. 비단실처럼 가는."
  - classical_chinese: 深
    reading: 심
    meaning_kun: 깊을
    translation:
      en: deep; profound
      ko: "깊은; 심오한"
    gender: null
    plural: null
    notes:
      en: "Water radical (氵) + 穴 + 木. Deep water."
      ko: "물(氵) 부수 + 穴 + 木. 깊은 물."
  - classical_chinese: 厚
    reading: 후
    meaning_kun: 두꺼울
    translation:
      en: thick; generous; kind
      ko: "두꺼운; 후한"
    gender: null
    plural: null
    notes:
      en: "Cliff radical (厂) + 㫗 + 子. Also means 'generous' or 'substantial.'"
      ko: "언덕(厂) 부수 + 㫗 + 子. '후한,' '너그러운'의 뜻도 있음."
  - classical_chinese: 薄
    reading: 박
    meaning_kun: 얇을
    translation:
      en: thin; slight; mean
      ko: "얇은; 박한"
    gender: null
    plural: null
    notes:
      en: "Grass radical (艹) + 溥. Opposite of 厚. Also means 'stingy.'"
      ko: "초(艹) + 溥. 厚의 반대. '인색한'의 뜻도 있음."
  - classical_chinese: 高
    reading: 고
    meaning_kun: 높을
    translation:
      en: high; tall; lofty
      ko: "높은; 고귀한"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a tall building. Radical #189."
      ko: "높은 건물의 상형자. 부수 제189번."
  - classical_chinese: 低
    reading: 저
    meaning_kun: 낮을
    translation:
      en: low; short
      ko: "낮은; 짧은"
    gender: null
    plural: null
    notes:
      en: "Person radical (亻) + 氐 (bottom). Opposite of 高."
      ko: "사람(亻) 부수 + 氐(밑). 高의 반대."
  - classical_chinese: 短
    reading: 단
    meaning_kun: 짧을
    translation:
      en: short; brief
      ko: "짧은; 간단한"
    gender: null
    plural: null
    notes:
      en: "Arrow radical (矢) + 豆. Opposite of 長."
      ko: "화살(矢) 부수 + 豆. 長의 반대."
  - classical_chinese: 輕
    reading: 경
    meaning_kun: 가벼울
    translation:
      en: light; slight
      ko: "가벼운; 경쾌한"
    gender: null
    plural: null
    notes:
      en: "Cart radical (車) + 巠. Light as an empty cart."
      ko: "수레(車) 부수 + 巠. 빈 수레처럼 가벼운."
  - classical_chinese: 重
    reading: 중
    meaning_kun: 무거울
    translation:
      en: heavy; important; to repeat
      ko: "무거운; 중요한; 거듭하다"
    gender: null
    plural: null
    notes:
      en: "Also read 중/충. 重要 (important), 重複 (duplicate)."
      ko: "중/충으로도 읽음. 重要(중요), 重複(중복)."
  - classical_chinese: 狹
    reading: 협
    meaning_kun: 좁을
    translation:
      en: narrow; cramped
      ko: "좁은; 비좁은"
    gender: null
    plural: null
    notes:
      en: "Dog radical (犭) + 夾. Narrow space. Opposite of 廣."
      ko: "개(犭) 부수 + 夾. 좁은 공간. 廣의 반대."
