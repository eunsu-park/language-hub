lesson: sup_L4_Emotions_and_Virtues
lesson_number: 108
hanja_level: L4
type: supplementary
topic: Emotions and Virtues
categories:
- id: emotions
  label:
    en: Emotions
    ko: 감정
  type: vocabulary
  words:
  - classical_chinese: 喜
    reading: 희
    meaning_kun: 기쁠
    translation:
      en: joy; delight; to be happy
      ko: "기쁨; 기뻐하다"
    gender: null
    plural: null
    notes:
      en: "壴 (drum) + 口. Joy expressed with music and voice."
      ko: "壴(북) + 口(입). 음악과 소리로 표현하는 기쁨."
  - classical_chinese: 怒
    reading: 노
    meaning_kun: 성낼
    translation:
      en: anger; rage; fury
      ko: "분노; 성내다"
    gender: null
    plural: null
    notes:
      en: "奴 (slave) + heart (心). Anger rising in the heart."
      ko: "奴 + 마음(心). 마음에서 솟아오르는 분노."
  - classical_chinese: 哀
    reading: 애
    meaning_kun: 슬플
    translation:
      en: sorrow; grief; to mourn
      ko: "슬픔; 애통; 슬퍼하다"
    gender: null
    plural: null
    notes:
      en: "衣 (clothing) + 口. Mourning clothes. Deep sorrow."
      ko: "衣(옷) + 口(입). 상복. 깊은 슬픔."
  - classical_chinese: 樂
    reading: 락
    meaning_kun: 즐길
    translation:
      en: joy; music; pleasure
      ko: "즐거움; 음악; 즐기다"
    gender: null
    plural: null
    notes:
      en: "Pictograph of drums on a wooden stand. Also read 악 (music), 요 (to enjoy)."
      ko: "나무 받침 위의 북 상형자. 악(음악), 요(좋아하다)로도 읽음."
  - classical_chinese: 懼
    reading: 구
    meaning_kun: 두려울
    translation:
      en: fear; dread; terror
      ko: "두려움; 무서워하다"
    gender: null
    plural: null
    notes:
      en: "Heart radical (忄) + 瞿. Eyes wide with fear."
      ko: "마음(忄) + 瞿. 두려움에 눈이 커진 모양."
  - classical_chinese: 愁
    reading: 수
    meaning_kun: 근심
    translation:
      en: worry; sorrow; melancholy
      ko: "근심; 시름; 수심"
    gender: null
    plural: null
    notes:
      en: "Autumn (秋) + heart (心). Autumn melancholy in the heart."
      ko: "가을(秋) + 마음(心). 마음속 가을의 수심."
  - classical_chinese: 恨
    reading: 한
    meaning_kun: 한할
    translation:
      en: regret; resentment; to hate
      ko: "한; 원한; 한탄하다"
    gender: null
    plural: null
    notes:
      en: "Heart radical (忄) + 艮. Deep-seated regret or resentment."
      ko: "마음(忄) + 艮. 깊은 유감이나 원한."
  - classical_chinese: 憂
    reading: 우
    meaning_kun: 근심
    translation:
      en: worry; anxiety; grief
      ko: "근심; 걱정; 우울"
    gender: null
    plural: null
    notes:
      en: "Head bowed with worry. 憂患 = hardship and worry."
      ko: "걱정에 고개를 숙인 모양. 憂患 = 우환."
  - classical_chinese: 慕
    reading: 모
    meaning_kun: 사모할
    translation:
      en: to admire; to yearn for; to long
      ko: "사모하다; 그리워하다"
    gender: null
    plural: null
    notes:
      en: "莫 (evening) + heart (心). Longing as evening falls."
      ko: "莫(저녁) + 마음(心). 저녁이 되면 그리워하는 마음."
  - classical_chinese: 恥
    reading: 치
    meaning_kun: 부끄러울
    translation:
      en: shame; disgrace
      ko: "부끄러움; 치욕"
    gender: null
    plural: null
    notes:
      en: "Ear (耳) + heart (心). Shame heard and felt in the heart."
      ko: "귀(耳) + 마음(心). 듣고 마음으로 느끼는 부끄러움."
- id: virtues
  label:
    en: Confucian Virtues
    ko: 유교 덕목
  type: vocabulary
  words:
  - classical_chinese: 仁
    reading: 인
    meaning_kun: 어질
    translation:
      en: benevolence; humanity; kindness
      ko: "어질다; 인자; 사랑"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 二 (two). Kindness between two people. Core Confucian virtue."
      ko: "사람(亻) + 二(둘). 두 사람 사이의 어짐. 유교 핵심 덕목."
  - classical_chinese: 義
    reading: 의
    meaning_kun: 옳을
    translation:
      en: righteousness; justice; meaning
      ko: "의로움; 정의; 뜻"
    gender: null
    plural: null
    notes:
      en: "羊 (sheep/good) + 我 (I). Doing what is right."
      ko: "羊(양/선) + 我(나). 올바른 일을 하는 것."
  - classical_chinese: 禮
    reading: 례
    meaning_kun: 예도
    translation:
      en: ritual; propriety; etiquette
      ko: "예절; 예의; 의식"
    gender: null
    plural: null
    notes:
      en: "Altar (示) + 豊. Offering at an altar. Social and ritual propriety."
      ko: "제단(示) + 豊. 제단에서의 제물. 사회적 예절과 의식."
  - classical_chinese: 智
    reading: 지
    meaning_kun: 슬기
    translation:
      en: wisdom; knowledge; intelligence
      ko: "지혜; 슬기; 지식"
    gender: null
    plural: null
    notes:
      en: "知 (to know) + 日 (sun). Bright knowledge. One of Five Constants."
      ko: "知(알 지) + 日(해). 밝은 지식. 오상(五常) 중 하나."
  - classical_chinese: 信
    reading: 신
    meaning_kun: 믿을
    translation:
      en: trust; faith; to believe
      ko: "신뢰; 믿다; 편지"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + speech (言). A person true to their word."
      ko: "사람(亻) + 말씀(言). 말에 진실한 사람."
  - classical_chinese: 忠
    reading: 충
    meaning_kun: 충성
    translation:
      en: loyalty; devotion; faithfulness
      ko: "충성; 충실"
    gender: null
    plural: null
    notes:
      en: "Center (中) + heart (心). Heart centered on duty."
      ko: "가운데(中) + 마음(心). 도리에 중심을 둔 마음."
  - classical_chinese: 恕
    reading: 서
    meaning_kun: 용서할
    translation:
      en: forgiveness; empathy; reciprocity
      ko: "용서; 너그러움"
    gender: null
    plural: null
    notes:
      en: "如 (like) + heart (心). Feeling as if in another's place."
      ko: "如(같을 여) + 마음(心). 남의 처지를 내 것처럼 느끼는 마음."
  - classical_chinese: 廉
    reading: 렴
    meaning_kun: 청렴할
    translation:
      en: honest; incorruptible; frugal
      ko: "청렴한; 깨끗한"
    gender: null
    plural: null
    notes:
      en: "Shelter radical (广) + 兼. Honest governance. 廉潔 = integrity."
      ko: "엄호(广) + 兼. 정직한 통치. 廉潔 = 청렴."
  - classical_chinese: 謙
    reading: 겸
    meaning_kun: 겸손할
    translation:
      en: humble; modest
      ko: "겸손한; 겸허한"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 兼. Moderate speech. 謙遜 = humility."
      ko: "말씀(言) + 兼. 절제된 말. 謙遜 = 겸손."
  - classical_chinese: 勇
    reading: 용
    meaning_kun: 날랠
    translation:
      en: brave; courageous; valor
      ko: "용감한; 용기"
    gender: null
    plural: null
    notes:
      en: "甬 + strength (力). Strength and daring combined."
      ko: "甬 + 힘(力). 힘과 담력의 결합."
  - classical_chinese: 寬
    reading: 관
    meaning_kun: 너그러울
    translation:
      en: tolerant; generous; wide
      ko: "너그러운; 관대한; 넓은"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 萈. Spacious heart. 寬大 = magnanimous."
      ko: "지붕(宀) + 萈. 넓은 마음. 寬大 = 관대."
  - classical_chinese: 敬
    reading: 경
    meaning_kun: 공경할
    translation:
      en: respect; reverence; to honor
      ko: "공경; 존경하다"
    gender: null
    plural: null
    notes:
      en: "苟 + 攵 (action). Respectful action. 敬意 = respect."
      ko: "苟 + 攵(칠 복). 공경하는 행동. 敬意 = 경의."
  - classical_chinese: 誠
    reading: 성
    meaning_kun: 정성
    translation:
      en: sincerity; honesty; truly
      ko: "정성; 성실; 참으로"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 成 (to accomplish). Words that are genuine."
      ko: "말씀(言) + 成(이룰 성). 진실된 말."
  - classical_chinese: 節
    reading: 절
    meaning_kun: 절개
    translation:
      en: integrity; chastity; moderation
      ko: "절개; 절조; 절제"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 即. Straight like bamboo joints. Moral steadfastness."
      ko: "대(竹) + 即. 대나무 마디처럼 곧은. 도덕적 굳건함."
  - classical_chinese: 德
    reading: 덕
    meaning_kun: 덕
    translation:
      en: virtue; moral power; goodness
      ko: "덕; 도덕적 힘"
    gender: null
    plural: null
    notes:
      en: "Step (彳) + 直 + heart (心). Walking with a straight heart."
      ko: "걸음(彳) + 直 + 마음(心). 곧은 마음으로 걷다."
  - classical_chinese: 悅
    reading: 열
    meaning_kun: 기쁠
    translation:
      en: pleased; delighted; joy
      ko: "기쁜; 즐거운; 기뻐하다"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 兌. Inner joy. 喜悅 = delight."
      ko: "마음(忄) + 兌. 내면의 기쁨. 喜悅 = 희열."
  - classical_chinese: 慚
    reading: 참
    meaning_kun: 부끄러울
    translation:
      en: ashamed; embarrassed
      ko: "부끄러운; 창피한"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 斬. Deep shame. 慚愧 = ashamed."
      ko: "마음(忄) + 斬. 깊은 부끄러움. 慚愧 = 참괴."
  - classical_chinese: 悲
    reading: 비
    meaning_kun: 슬플
    translation:
      en: sorrow; grief; compassion
      ko: "슬픔; 비통; 자비"
    gender: null
    plural: null
    notes:
      en: "非 + heart (心). Heart's negation = sorrow. 悲劇 = tragedy."
      ko: "非 + 마음(心). 마음의 부정 = 슬픔. 悲劇 = 비극."
  - classical_chinese: 怠
    reading: 태
    meaning_kun: 게으를
    translation:
      en: lazy; negligent; idle
      ko: "게으른; 태만한; 나태한"
    gender: null
    plural: null
    notes:
      en: "台 + heart (心). 怠惰 = laziness. Opposite of 勤."
      ko: "台 + 마음(心). 怠惰 = 태타. 勤의 반대."
  - classical_chinese: 勤
    reading: 근
    meaning_kun: 부지런할
    translation:
      en: diligent; industrious; hardworking
      ko: "부지런한; 근면한"
    gender: null
    plural: null
    notes:
      en: "堇 + 力 (strength). 勤勉 = diligence. Core Confucian work ethic."
      ko: "堇 + 力(힘). 勤勉 = 근면. 유교적 근로 윤리."
