lesson: 09_Sentence_Patterns_III_Questions
lesson_number: 9
hanja_level: L4
categories:
- id: interrogative_words
  label:
    en: Interrogative Words
    ko: 의문사
  type: vocabulary
  words:
  - classical_chinese: 何
    reading: 하
    meaning_kun: 어찌
    translation:
      en: what; why; how
      ko: 무엇; 왜; 어찌
    gender: null
    plural: null
    notes:
      en: "Most common interrogative. 何人 = what person; 何故 = why; 何如 = how about."
      ko: "가장 흔한 의문사. 何人 = 누구; 何故 = 왜; 何如 = 어떠한가."
  - classical_chinese: 誰
    reading: 수
    meaning_kun: 누구
    translation:
      en: who; whom
      ko: 누구
    gender: null
    plural: null
    notes:
      en: "Words radical (言) + 隹. Interrogative pronoun for persons: 'who'."
      ko: "말씀 부수(言) + 隹. 사람에 대한 의문 대명사: '누구'."
  - classical_chinese: 孰
    reading: 숙
    meaning_kun: 누구
    translation:
      en: who; which (of two); how
      ko: 누구; 어느 것; 어찌
    gender: null
    plural: null
    notes:
      en: "Selective interrogative: 'which one of two'. 孰與 = compared to which."
      ko: "선택 의문사: '둘 중 어느 것'. 孰與 = 어느 것에 비교하면."
  - classical_chinese: 安
    reading: 안
    meaning_kun: 편안할
    translation:
      en: where; how; peaceful
      ko: 어디; 어찌; 편안하다
    gender: null
    plural: null
    notes:
      en: "Woman (女) under a roof (宀). 'Peaceful'. As interrogative: 'where/how'."
      ko: "지붕(宀) 아래 여인(女). '편안하다'. 의문사로: '어디/어찌'."
  - classical_chinese: 焉
    reading: 언
    meaning_kun: 어찌
    translation:
      en: where; how; there (= 於之)
      ko: 어디에; 어찌; 거기에
    gender: null
    plural: null
    notes:
      en: "Interrogative 'where/how'. Also pronominal adverb = 於之 (at it/there)."
      ko: "의문사 '어디/어찌'. 대명사적 부사 = 於之(거기에)."
  - classical_chinese: 豈
    reading: 기
    meaning_kun: 어찌
    translation:
      en: how could; surely not (rhetorical)
      ko: 어찌 ~하겠는가 (반어)
    gender: null
    plural: null
    notes:
      en: "Rhetorical question marker. Implies 'surely not' or 'how could it be that'."
      ko: "반어적 의문 표지. '어찌 ~하겠는가'(할 리 없다)."
  - classical_chinese: 曷
    reading: 갈
    meaning_kun: 어찌
    translation:
      en: why; how; when
      ko: 어찌; 왜; 언제
    gender: null
    plural: null
    notes:
      en: "Interrogative adverb meaning 'why/how/when'. Less common than 何."
      ko: "의문 부사 '어찌/왜/언제'. 何보다 드묾."
  - classical_chinese: 奚
    reading: 해
    meaning_kun: 어찌
    translation:
      en: why; what; how
      ko: 어찌; 무엇; 왜
    gender: null
    plural: null
    notes:
      en: "Interrogative adverb. 奚爲 = why do. Found often in philosophical texts."
      ko: "의문 부사. 奚爲 = 왜 ~하는가. 철학 문헌에 자주 등장."
  - classical_chinese: 胡
    reading: 호
    meaning_kun: 어찌
    translation:
      en: why; what; how
      ko: 어찌; 왜
    gender: null
    plural: null
    notes:
      en: "Interrogative 'why/how'. Also means 'barbarian' or 'beard'. 胡爲 = why."
      ko: "의문사 '어찌/왜'. '오랑캐' 또는 '턱수염'의 뜻도 있음. 胡爲 = 왜."
  - classical_chinese: 幾
    reading: 기
    meaning_kun: 몇
    translation:
      en: how many; how much; nearly
      ko: 몇; 얼마나; 거의
    gender: null
    plural: null
    notes:
      en: "Interrogative of quantity: 'how many/much'. Also: 'nearly/almost'."
      ko: "수량 의문사: '몇/얼마나'. 또한: '거의'."
- id: question_markers
  label:
    en: Question Markers
    ko: 의문 어조사
  type: vocabulary
  words:
  - classical_chinese: 乎
    reading: 호
    meaning_kun: 어조사
    translation:
      en: (question particle)
      ko: ~인가? ~인저?
    gender: null
    plural: null
    notes:
      en: "Most common question particle. Placed at sentence end: 可乎 = is it acceptable?"
      ko: "가장 흔한 의문 조사. 문장 끝에 위치: 可乎 = 가한가?"
  - classical_chinese: 邪
    reading: 야
    meaning_kun: 간사할
    translation:
      en: (question particle, doubt); wicked
      ko: ~인가? (의심); 간사하다
    gender: null
    plural: null
    notes:
      en: "Question particle expressing doubt or disbelief. Also written 耶. Also means 'wicked'."
      ko: "의심이나 불신을 나타내는 의문 조사. 耶로도 씀. '간사하다'는 뜻도 있음."
  - classical_chinese: 耶
    reading: 야
    meaning_kun: 어조사
    translation:
      en: (question particle, doubt)
      ko: ~인가? ~이냐?
    gender: null
    plural: null
    notes:
      en: "Question particle similar to 邪. Expresses uncertainty. 是耶非耶 = is it or isn't it?"
      ko: "邪와 유사한 의문 조사. 불확실함을 표현. 是耶非耶 = 맞는가 아닌가?"
  - classical_chinese: 歟
    reading: 여
    meaning_kun: 어조사
    translation:
      en: (question particle, gentle inquiry)
      ko: ~인가요? (부드러운 의문)
    gender: null
    plural: null
    notes:
      en: "Gentle question particle. Softer than 乎. Used for polite inquiry."
      ko: "부드러운 의문 조사. 乎보다 온화함. 공손한 질문에 사용."
  - classical_chinese: 與
    reading: 여
    meaning_kun: 어조사
    translation:
      en: (question particle); with; and
      ko: ~인가? (의문); ~와
    gender: null
    plural: null
    notes:
      en: "As question particle (same as 歟): gentle inquiry. Also means 'with/and/give'."
      ko: "의문 조사(歟와 동일): 부드러운 질문. '~와/주다'의 뜻도 있음."
  - classical_chinese: 哉
    reading: 재
    meaning_kun: 어조사
    translation:
      en: (rhetorical question/exclamation)
      ko: ~인저! ~이랴!
    gender: null
    plural: null
    notes:
      en: "Exclamatory or rhetorical question particle. 善哉 = how good! 可乎哉 = is it really right?"
      ko: "감탄이나 반어적 의문 조사. 善哉 = 좋도다! 可乎哉 = 정말 옳은가?"
- id: response_words
  label:
    en: Response Words
    ko: 응답어
  type: vocabulary
  words:
  - classical_chinese: 然
    reading: 연
    meaning_kun: 그러할
    translation:
      en: yes; so; correct; thus
      ko: 그렇다; 옳다; 그러하다
    gender: null
    plural: null
    notes:
      en: "Affirmative response: 'yes, that is so'. Also means 'thus/in that way'."
      ko: "긍정 응답: '예, 그러합니다'. '그렇게/그런 식으로'라는 뜻도 있음."
  - classical_chinese: 否
    reading: 부
    meaning_kun: 아닐
    translation:
      en: no; not so; to deny
      ko: 아니다; 그렇지 않다
    gender: null
    plural: null
    notes:
      en: "Negative response: 'no, that is not so'. Opposite of 然."
      ko: "부정 응답: '아니오, 그렇지 않습니다'. 然의 반대."
  - classical_chinese: 唯
    reading: 유
    meaning_kun: 오직
    translation:
      en: yes (respectful); only; solely
      ko: 예(공손한 대답); 오직
    gender: null
    plural: null
    notes:
      en: "Respectful 'yes' from subordinate to superior. Also adverb: 'only/solely'."
      ko: "아랫사람이 윗사람에게 하는 공손한 '예'. 부사: '오직'."
  - classical_chinese: 諾
    reading: 낙
    meaning_kun: 허락할
    translation:
      en: yes; to consent; to promise
      ko: 예; 승낙하다; 허락하다
    gender: null
    plural: null
    notes:
      en: "Agreement from equal or superior. To consent or approve. 허諾 = permission."
      ko: "동등하거나 윗사람의 동의. 승낙하다. 허락 = 허락."
  - classical_chinese: 是
    reading: 시
    meaning_kun: 이
    translation:
      en: this; correct; yes; to be
      ko: 이것; 옳다; 그렇다
    gender: null
    plural: null
    notes:
      en: "Demonstrative 'this'. Also 'correct/right'. 是非 = right and wrong."
      ko: "지시사 '이것'. '옳다/맞다'의 뜻도 있음. 是非 = 옳고 그름."
  - classical_chinese: 非
    reading: 비
    meaning_kun: 아닐
    translation:
      en: not; wrong; to be wrong
      ko: 아니다; 그르다
    gender: null
    plural: null
    notes:
      en: "Negation of identity: 'is not'. Also 'wrong'. 是非 = right and wrong."
      ko: "정체 부정: '~이 아니다'. '그르다'의 뜻도 있음. 是非 = 시비."
  - classical_chinese: 固
    reading: 고
    meaning_kun: 굳을
    translation:
      en: certainly; indeed; firm; solid
      ko: 진실로; 굳다; 본래
    gender: null
    plural: null
    notes:
      en: "Enclosure (囗) + 古 (old). Firm; solid. As adverb: 'certainly/indeed'."
      ko: "울타리(囗) + 古(옛). 굳다; 단단하다. 부사: '진실로/본래'."
  - classical_chinese: 誠
    reading: 성
    meaning_kun: 정성
    translation:
      en: truly; sincerely; sincerity
      ko: 진실로; 정성; 성실하다
    gender: null
    plural: null
    notes:
      en: "Words (言) + 成 (complete). Sincere speech; truly. A core Confucian virtue."
      ko: "말(言) + 成(이루다). 진실된 말; 진정으로. 유교의 핵심 덕목."
