      ko: "수; 세다; 여러 번"
    gender: null
    plural: null
    notes:
      en: "婁 + 攵. 數學 = mathematics. Also read 삭 (frequently)."
      ko: "婁 + 攵. 數學 = 수학. 삭(자주)으로도 읽음."
  - classical_chinese: 衡
    reading: 형
    meaning_kun: 저울
    translation:
      en: balance; to weigh; to assess
      ko: "저울; 균형; 재다"
    gender: null
    plural: null
    notes:
      en: "行 + 魚 variant + 大. Weighing instrument. 度量衡 = weights and measures."
      ko: "行 + 魚 변형 + 大. 저울 기구. 度量衡 = 도량형."
  - classical_chinese: 度
    reading: 도
    meaning_kun: 법도
    translation:
      en: measure; degree; limit; to estimate
      ko: "도; 정도; 법도; 헤아리다"
    gender: null
    plural: null
    notes:
      en: "广 + 廿 + 又. Measurement system. 度量衡."
      ko: "广 + 廿 + 又. 측량 체계. 度量衡."
  - classical_chinese: 量
    reading: 량
    meaning_kun: 헤아릴
    translation:
      en: to measure; quantity; capacity
      ko: "헤아리다; 양; 용량"
    gender: null
    plural: null
    notes:
      en: "旦 + 里. Volume measurement. 度量衡 = the three measures."
      ko: "旦 + 里. 부피 측정. 度量衡 = 세 가지 측정."
  - classical_chinese: 圓
    reading: 원
    meaning_kun: 둥글
    translation:
      en: circle; round; circumference
      ko: "원; 둥근; 둘레"
    gender: null
    plural: null
    notes:
      en: "Enclosure (囗) + 員. 圓周率 = pi (π). 祖沖之 calculated pi."
      ko: "에워쌀(囗) + 員. 圓周率 = 원주율(π). 조충지가 원주율을 계산."
  - classical_chinese: 餘
    reading: 여
    meaning_kun: 나머지
    translation:
      en: remainder; surplus; extra
      ko: "나머지; 여분; 남은"
    gender: null
    plural: null
    notes:
      en: "Food (飠) + 余. Mathematical remainder. 餘數 = remainder."
      ko: "음식(飠) + 余. 수학적 나머지. 餘數 = 나머지."
