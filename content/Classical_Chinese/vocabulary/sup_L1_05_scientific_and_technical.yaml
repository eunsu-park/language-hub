      en: lacquer; to varnish; paint
      ko: "옻; 칠하다; 칠"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 桼. Lacquer from lacquer tree. 漆器 = lacquerware."
      ko: "물(氵) + 桼. 옻나무에서 나오는 옻. 漆器 = 칠기."
  - classical_chinese: 磁
    reading: 자
    meaning_kun: 자석
    translation:
      en: magnet; porcelain; magnetic
      ko: "자석; 자기(瓷器); 자기적"
    gender: null
    plural: null
    notes:
      en: "Stone (石) + 茲. 磁石 = magnet. 指南針 = compass."
      ko: "돌(石) + 茲. 磁石 = 자석. 指南針 = 지남침(나침반)."
  - classical_chinese: 刷
    reading: 쇄
    meaning_kun: 인쇄할
    translation:
      en: to print; to brush; to scrub
      ko: "인쇄하다; 솔질하다"
    gender: null
    plural: null
    notes:
      en: "尸 + 巾 + 刂. 印刷 = printing. 活字 = movable type."
      ko: "尸 + 巾 + 刂. 印刷 = 인쇄. 活字 = 활자."
  - classical_chinese: 帆
    reading: 범
    meaning_kun: 돛
    translation:
      en: sail; canvas
      ko: "돛; 범포"
    gender: null
    plural: null
    notes:
      en: "Cloth (巾) + 凡. Ship's sail. 帆船 = sailing ship."
      ko: "천(巾) + 凡. 배의 돛. 帆船 = 범선."
  - classical_chinese: 舵
    reading: 타
    meaning_kun: 키
    translation:
      en: rudder; helm
      ko: "키; 방향타"
    gender: null
    plural: null
    notes:
      en: "Boat (舟) + 它. Ship's steering device."
      ko: "배(舟) + 它. 배의 조향 장치."
- id: natural_sciences
  label:
    en: Natural Sciences
    ko: 자연 과학
  type: vocabulary
  words:
  - classical_chinese: 礦
    reading: 광
    meaning_kun: 광석
    translation:
      en: ore; mineral; mine
      ko: "광석; 광물; 광산"
    gender: null
    plural: null
    notes:
      en: "Stone (石) + 廣. Rock containing metals. 礦物 = mineral."
      ko: "돌(石) + 廣. 금속을 함유한 암석. 礦物 = 광물."
  - classical_chinese: 晶
    reading: 정
    meaning_kun: 밝을
    translation:
      en: crystal; bright; clear
      ko: "수정; 밝은; 맑은"
    gender: null
    plural: null
    notes:
      en: "Three suns (日). Brilliantly sparkling. 水晶 = crystal."
      ko: "세 개의 해(日). 찬란하게 빛남. 水晶 = 수정."
  - classical_chinese: 蟲
    reading: 충
    meaning_kun: 벌레
    translation:
      en: insect; worm; creature
      ko: "벌레; 충; 생물"
    gender: null
    plural: null
    notes:
      en: "Three 虫. General term for small creatures. Radical #142."
      ko: "세 개의 虫. 작은 생물의 총칭. 부수 제142번."
  - classical_chinese: 鑛
    reading: 광
    meaning_kun: 쇳물
    translation:
      en: ore; raw metal; mine
      ko: "광석; 쇳물; 광산"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 廣. Metal ore. Variant of 礦."
      ko: "쇠(金) + 廣. 금속 광석. 礦의 이체자."
  - classical_chinese: 銅
    reading: 동
    meaning_kun: 구리
    translation:
      en: copper; bronze
      ko: "구리; 청동"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 同. 青銅 = bronze. Essential in ancient metallurgy."
      ko: "쇠(金) + 同. 靑銅 = 청동. 고대 야금술의 필수 재료."
  - classical_chinese: 鐵
    reading: 철
    meaning_kun: 쇠
    translation:
      en: iron; steel
      ko: "철; 쇠"
    gender: null
    plural: null
    notes:
      en: "Metal (金) + 截 variant. Iron. 鑄鐵 = cast iron."
      ko: "쇠(金) + 截 변형. 철. 鑄鐵 = 주철."
  - classical_chinese: 硝
    reading: 초
    meaning_kun: 초석
    translation:
      en: saltpeter; niter
      ko: "초석; 질산칼륨"
    gender: null
    plural: null
    notes:
      en: "Stone (石) + 肖. Key ingredient in gunpowder (火藥)."
      ko: "돌(石) + 肖. 화약(火藥)의 핵심 원료."
  - classical_chinese: 硫
    reading: 류
    meaning_kun: 유황
    translation:
      en: sulfur
      ko: 유황
    gender: null
    plural: null
    notes:
      en: "Stone (石) + 流. Sulfur. Another gunpowder ingredient."
      ko: "돌(石) + 流. 유황. 화약의 또 다른 원료."
  - classical_chinese: 炭
    reading: 탄
    meaning_kun: 숯
    translation:
      en: charcoal; carbon
      ko: "숯; 탄소"
    gender: null
    plural: null
    notes:
      en: "Mountain (山) + 火 + 灬. Burnt wood. Third gunpowder ingredient."
      ko: "산(山) + 불(火) + 灬. 태운 나무. 화약의 세 번째 원료."
  - classical_chinese: 爆
    reading: 폭
    meaning_kun: 터질
    translation:
      en: to explode; to burst; sudden
      ko: "폭발하다; 터지다; 갑작스러운"
    gender: null
    plural: null
    notes:
      en: "Fire (火) + 暴. 爆發 = explosion. 火藥 = gunpowder."
      ko: "불(火) + 暴. 爆發 = 폭발. 火藥 = 화약."
