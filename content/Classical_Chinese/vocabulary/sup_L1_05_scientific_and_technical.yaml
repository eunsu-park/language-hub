- id: mathematics
  label:
    en: Mathematics
    ko: 수학
  type: vocabulary
  words:
  - classical_chinese: 算
    reading: 산
    meaning_kun: 셈
    translation:
      en: to calculate; arithmetic; counting
      ko: "셈; 계산; 산술"
    gender: null
    plural: null
    notes:
      en: "Bamboo (竹) + 目 + 廾. Counting with bamboo rods. 算術 = arithmetic."
      ko: "대(竹) + 目 + 廾. 대나무 산대로 계산. 算術 = 산술."
  - classical_chinese: 數
    reading: 수
    meaning_kun: 셈
    translation:
