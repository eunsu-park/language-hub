    meaning_kun: 가마
    translation:
      en: kiln; furnace; pottery kiln
      ko: "가마; 요"
    gender: null
    plural: null
    notes:
      en: "Hole (穴) + 缶 + 灬. Pottery-firing kiln. 窯業 = ceramics industry."
      ko: "구멍(穴) + 缶 + 灬. 도자기 굽는 가마. 窯業 = 요업."
  - classical_chinese: 漆
    reading: 칠
    meaning_kun: 옻
