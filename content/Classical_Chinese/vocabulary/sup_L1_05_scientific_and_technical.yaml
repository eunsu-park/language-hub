    reading: 직
    meaning_kun: 짤
    translation:
      en: to weave; textile; to organize
      ko: "짜다; 직물; 조직하다"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 戠. Weaving cloth on a loom."
      ko: "실(糸) + 戠. 베틀로 천을 짬."
