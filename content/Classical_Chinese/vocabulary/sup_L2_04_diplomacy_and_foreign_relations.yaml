lesson: sup_L2_Diplomacy_and_Foreign_Relations
lesson_number: 122
hanja_level: L2
type: supplementary
topic: Diplomacy and Foreign Relations
categories:
- id: diplomacy
  label:
    en: Diplomatic Terms
    ko: 외교 용어
  type: vocabulary
  words:
  - classical_chinese: 使
    reading: 사
    meaning_kun: 부릴
    translation:
      en: envoy; ambassador; to send
      ko: "사신; 사절; 보내다"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 吏 variant. One sent on a mission. 使臣 = envoy."
      ko: "사람(亻) + 吏 변형. 임무에 파견된 사람. 使臣 = 사신."
  - classical_chinese: 聘
    reading: 빙
    meaning_kun: 부를
    translation:
      en: to invite; diplomatic visit; to employ
      ko: "초빙하다; 외교 방문; 고용"
    gender: null
    plural: null
    notes:
      en: "Ear (耳) + 甹. Formal diplomatic visit between states."
      ko: "귀(耳) + 甹. 국가 간 공식 외교 방문."
  - classical_chinese: 盟
    reading: 맹
    meaning_kun: 맹세
    translation:
      en: alliance; oath; covenant
      ko: "동맹; 맹약; 맹세"
    gender: null
    plural: null
    notes:
      en: "明 + dish (皿). Blood oath over a vessel. 同盟 = alliance."
      ko: "明 + 그릇(皿). 그릇 위의 혈맹. 同盟 = 동맹."
  - classical_chinese: 約
    reading: 약
    meaning_kun: 맺을
    translation:
      en: treaty; agreement; to bind
      ko: "조약; 약속; 맺다"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 勺. Binding agreement. 條約 = treaty."
      ko: "실(糸) + 勺. 구속력 있는 약속. 條約 = 조약."
  - classical_chinese: 和
    reading: 화
    meaning_kun: 화할
    translation:
      en: peace; harmony; to reconcile
      ko: "화평; 조화; 화해"
    gender: null
    plural: null
    notes:
      en: "禾 (grain) + 口. Voice of harvest = peace. 和親 = marriage alliance."
      ko: "벼(禾) + 口. 수확의 소리 = 평화. 和親 = 화친."
  - classical_chinese: 貢
    reading: 공
    meaning_kun: 바칠
    translation:
      en: tribute; to offer tribute
      ko: "공물; 조공하다"
    gender: null
    plural: null
    notes:
      en: "工 + 貝. 朝貢 = tributary system."
      ko: "工 + 貝. 朝貢 = 조공 체제."
  - classical_chinese: 冊封
    reading: 책봉
    meaning_kun: 책봉
    translation:
      en: investiture; to enfeoff
      ko: "책봉; 봉인"
    gender: null
    plural: null
    notes:
      en: "冊 (book) + 封 (seal). Emperor's formal appointment of vassal rulers."
      ko: "冊(책) + 封(봉할 봉). 황제가 제후를 공식 임명."
  - classical_chinese: 藩
    reading: 번
    meaning_kun: 울타리
    translation:
      en: vassal state; fence; barrier
      ko: "번국; 울타리; 번병"
    gender: null
    plural: null
    notes:
      en: "Grass (艹) + 潘. Protective hedge. 藩國 = vassal/tributary state."
      ko: "초(艹) + 潘. 보호 울타리. 藩國 = 번국."
  - classical_chinese: 質
    reading: 질
    meaning_kun: 바탕
    translation:
      en: hostage; pledge; nature; quality
      ko: "인질; 볼모; 바탕; 질"
    gender: null
    plural: null
    notes:
      en: "斤 + 貝. Person or object given as guarantee. 人質 = hostage."
      ko: "斤 + 貝. 보증으로 주는 사람이나 물건. 人質 = 인질."
  - classical_chinese: 歸
    reading: 귀
    meaning_kun: 돌아갈
    translation:
      en: to return; to submit; to marry
      ko: "돌아가다; 귀순; 시집가다"
    gender: null
    plural: null
    notes:
      en: "帚 + 止. To return home. 歸順 = to submit/surrender."
      ko: "帚 + 止. 집으로 돌아가다. 歸順 = 귀순."
- id: foreign_relations
  label:
    en: Foreign Relations
    ko: 대외 관계
  type: vocabulary
  words:
  - classical_chinese: 夷
    reading: 이
    meaning_kun: 오랑캐
    translation:
      en: eastern barbarian; foreign; level
      ko: "동쪽 이민족; 오랑캐; 평평한"
    gender: null
    plural: null
    notes:
      en: "大 + 弓. Eastern non-Chinese peoples. Four directions: 東夷南蠻西戎北狄."
      ko: "大 + 弓. 동쪽의 비중국계 민족. 사방: 東夷南蠻西戎北狄."
  - classical_chinese: 蠻
    reading: 만
    meaning_kun: 오랑캐
    translation:
      en: southern barbarian; savage; wild
      ko: "남쪽 이민족; 야만인"
    gender: null
    plural: null
    notes:
      en: "虫 + 䜌. Southern non-Chinese peoples."
      ko: "虫 + 䜌. 남쪽의 비중국계 민족."
  - classical_chinese: 戎
    reading: 융
    meaning_kun: 병장기
    translation:
      en: western barbarian; military; weapon
      ko: "서쪽 이민족; 군사; 병기"
    gender: null
    plural: null
    notes:
      en: "戈 (halberd) + 十. Western non-Chinese peoples. Also 'military.'"
      ko: "戈(창) + 十. 서쪽의 비중국계 민족. '군사'의 뜻도."
  - classical_chinese: 狄
    reading: 적
    meaning_kun: 오랑캐
    translation:
      en: northern barbarian; nomadic peoples
      ko: "북쪽 이민족; 유목민"
    gender: null
    plural: null
    notes:
      en: "Dog (犭) + 火. Northern non-Chinese peoples."
      ko: "개(犭) + 火. 북쪽의 비중국계 민족."
  - classical_chinese: 華
    reading: 화
    meaning_kun: 빛날
    translation:
      en: Chinese civilization; splendid; flower
      ko: "중화; 화려한; 꽃"
    gender: null
    plural: null
    notes:
      en: "艹 + 花 variant. 中華 = Central Splendor. 華夷 = civilized vs. barbarian."
      ko: "艹 + 花 변형. 中華 = 중화. 華夷 = 화이(문명과 야만)."
  - classical_chinese: 邦
    reading: 방
    meaning_kun: 나라
    translation:
      en: country; state; nation
      ko: "나라; 방국"
    gender: null
    plural: null
    notes:
      en: "丰 + city (阝). Feudal state. 邦交 = diplomatic relations."
      ko: "丰 + 읍(阝). 봉건 국가. 邦交 = 방교(외교 관계)."
  - classical_chinese: 域
    reading: 역
    meaning_kun: 나라
    translation:
      en: territory; region; domain
      ko: "영토; 지역; 구역"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 或 (perhaps/region). Bounded territory."
      ko: "흙(土) + 或(혹). 경계가 있는 영토."
  - classical_chinese: 侵
    reading: 침
    meaning_kun: 침범할
    translation:
      en: to invade; to encroach; to violate
      ko: "침범하다; 침입; 침략"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 帚 + 又. Gradually encroaching. 侵略 = invasion."
      ko: "사람(亻) + 帚 + 又. 점차 침범. 侵略 = 침략."
  - classical_chinese: 擄
    reading: 로
    meaning_kun: 사로잡을
    translation:
      en: to capture; to take prisoner
      ko: "사로잡다; 포로로 잡다"
    gender: null
    plural: null
    notes:
      en: "Hand (扌) + 虜. To seize captives. 俘擄 = to take prisoners."
      ko: "손(扌) + 虜. 포로를 잡다. 俘擄 = 포로를 잡다."
  - classical_chinese: 贖
    reading: 속
    meaning_kun: 속죄할
    translation:
      en: to ransom; to redeem; to atone
      ko: "몸값; 속죄; 되사다"
    gender: null
    plural: null
    notes:
      en: "貝 + 賣. To buy back. 贖罪 = atonement."
      ko: "貝 + 賣. 되사다. 贖罪 = 속죄."
  - classical_chinese: 叛
    reading: 반
    meaning_kun: 배반할
    translation:
      en: to rebel; to betray; treason
      ko: "반란; 배반하다; 반역"
    gender: null
    plural: null
    notes:
      en: "半 + 反. To turn against. 叛亂 = rebellion."
      ko: "半 + 反. 등을 돌리다. 叛亂 = 반란."
  - classical_chinese: 降
    reading: 항
    meaning_kun: 항복할
    translation:
      en: to surrender; to submit
      ko: "항복하다; 굴복하다"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 夅. To come down. 投降 = to surrender."
      ko: "언덕(阝) + 夅. 내려오다. 投降 = 투항."
  - classical_chinese: 朝貢
    reading: 조공
    meaning_kun: 조공
    translation:
      en: tributary system; paying tribute
      ko: "조공; 공물을 바침"
    gender: null
    plural: null
    notes:
      en: "朝 (court) + 貢 (tribute). Vassal states paying tribute to the emperor."
      ko: "朝(조정) + 貢(바칠 공). 속국이 황제에게 공물을 바치는 제도."
  - classical_chinese: 割
    reading: 할
    meaning_kun: 벨
    translation:
      en: to cede; to cut; to divide
      ko: "할양하다; 베다; 나누다"
    gender: null
    plural: null
    notes:
      en: "害 + knife (刂). 割地 = to cede territory."
      ko: "害 + 칼(刂). 割地 = 할지(영토를 떼어 줌)."
  - classical_chinese: 款
    reading: 관
    meaning_kun: 정성
    translation:
      en: clause; sincerity; to entertain
      ko: "조관; 정성; 접대하다"
    gender: null
    plural: null
    notes:
      en: "士 + 示 + 欠. Treaty clause. 條款 = terms and conditions."
      ko: "士 + 示 + 欠. 조약 조항. 條款 = 조관."
  - classical_chinese: 撫
    reading: 무
    meaning_kun: 어루만질
    translation:
      en: to pacify; to soothe; to stroke
      ko: "어루만지다; 달래다; 무마하다"
    gender: null
    plural: null
    notes:
      en: "Hand (扌) + 無. 安撫 = to pacify. 撫恤 = to comfort."
      ko: "손(扌) + 無. 安撫 = 안무(달래다). 撫恤 = 무휼."
  - classical_chinese: 互
    reading: 호
    meaning_kun: 서로
    translation:
      en: mutual; each other; reciprocal
      ko: "서로; 상호; 호혜"
    gender: null
    plural: null
    notes:
      en: "Pictograph of interlocking. 互市 = border trade between states."
      ko: "맞물리는 모양의 상형자. 互市 = 호시(국경 무역)."
  - classical_chinese: 遣
    reading: 견
    meaning_kun: 보낼
    translation:
      en: to dispatch; to send; to banish
      ko: "보내다; 파견하다; 내쫓다"
    gender: null
    plural: null
    notes:
      en: "辶 + 遣. 派遣 = to dispatch. 遣使 = to send an envoy."
      ko: "辶 + 遣. 派遣 = 파견. 遣使 = 견사(사신을 보냄)."
  - classical_chinese: 弔
    reading: 조
    meaning_kun: 조상할
    translation:
      en: to condole; to mourn; to console
      ko: "조상하다; 위문하다; 조문"
    gender: null
    plural: null
    notes:
      en: "弓 + person. Diplomatic mourning visit. 弔問 = condolence call."
      ko: "弓 + 사람. 외교적 조문 방문. 弔問 = 조문."
