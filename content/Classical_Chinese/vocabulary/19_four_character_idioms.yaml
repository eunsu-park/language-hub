lesson: "19_Four_Character_Idioms"
lesson_number: 19
hanja_level: L2
categories:
  - id: learning_idioms
    label:
      en: "Learning and Study Idioms"
      ko: "학습 관련 사자성어"
    type: vocabulary
    words:
      - classical_chinese: 溫
        reading: 온
        meaning_kun: 따뜻할
        translation:
          en: warm; to review
          ko: 따뜻하다; 복습하다
        gender: null
        plural: null
        notes:
          en: "Warm. In 溫故知新: review the old to know the new (Analerta 2.11)."
          ko: "따뜻하다. 溫故知新에서: 옛것을 익혀 새것을 안다(논어 2.11)."
      - classical_chinese: 故
        reading: 고
        meaning_kun: 옛
        translation:
          en: old, former
          ko: 옛, 이전의
        gender: null
        plural: null
        notes:
          en: "Old. 溫故知新: reviewing old knowledge leads to new understanding."
          ko: "옛것. 溫故知新: 옛 지식을 복습하면 새로운 이해에 이름."
      - classical_chinese: 知
        reading: 지
        meaning_kun: 알
        translation:
          en: to know, knowledge
          ko: 알다, 지식
        gender: null
        plural: null
        notes:
          en: "To know. 矢 (arrow) + 口 (mouth): words that hit the mark."
          ko: "알다. 矢(화살 시) + 口(입 구): 표적을 맞히는 말."
      - classical_chinese: 新
        reading: 신
        meaning_kun: 새
        translation:
          en: new
          ko: 새로운
        gender: null
        plural: null
        notes:
          en: "New. 溫故知新: 'warm up the old, know the new.'"
          ko: "새롭다. 溫故知新: '옛것을 익혀 새것을 안다.'"
      - classical_chinese: 切
        reading: 절
        meaning_kun: 끊을
        translation:
          en: to cut; earnest, eager
          ko: 끊다; 간절한
        gender: null
        plural: null
        notes:
          en: "To cut. In 切磋琢磨: to cut, file, carve, and polish (diligent study)."
          ko: "끊다. 切磋琢磨에서: 자르고, 갈고, 쪼고, 닦다(부지런한 학습)."
      - classical_chinese: 磋
        reading: 차
        meaning_kun: 갈
        translation:
          en: to polish, to file
          ko: 갈다
        gender: null
        plural: null
        notes:
          en: "To file or grind. 切磋 = to refine through study and discussion."
          ko: "갈다. 切磋 = 학습과 토론을 통해 연마하다."
      - classical_chinese: 琢
        reading: 탁
        meaning_kun: 쪼을
        translation:
          en: to carve, to chisel
          ko: 쪼다, 다듬다
        gender: null
        plural: null
        notes:
          en: "To carve jade. 琢磨 = to refine and perfect one's character."
          ko: "옥을 다듬다. 琢磨 = 인격을 연마하고 완성하다."
      - classical_chinese: 磨
        reading: 마
        meaning_kun: 갈
        translation:
          en: to grind, to polish
          ko: 갈다
        gender: null
        plural: null
        notes:
          en: "To grind or polish. 切磋琢磨 = diligent self-improvement."
          ko: "갈다, 닦다. 切磋琢磨 = 부지런한 자기 연마."
      - classical_chinese: 敎
        reading: 교
        meaning_kun: 가르칠
        translation:
          en: to teach, teaching
          ko: 가르치다
        gender: null
        plural: null
        notes:
          en: "To teach. 敎學相長: teaching and learning promote each other."
          ko: "가르치다. 敎學相長: 가르치고 배우며 함께 성장한다."
      - classical_chinese: 學
        reading: 학
        meaning_kun: 배울
        translation:
          en: to study, learning
          ko: 배우다
        gender: null
        plural: null
        notes:
          en: "To study. 學而不思則罔: study without thought is in vain."
          ko: "배우다. 學而不思則罔: 배우되 생각하지 않으면 헛되다."
      - classical_chinese: 相
        reading: 상
        meaning_kun: 서로
        translation:
          en: mutual, each other
          ko: 서로
        gender: null
        plural: null
        notes:
          en: "Mutual. 相長 = to grow together. 木 + 目 = to observe."
          ko: "서로. 相長 = 함께 성장하다."
      - classical_chinese: 長
        reading: 장
        meaning_kun: 긴
        translation:
          en: long; to grow; elder
          ko: 길다; 자라다; 어른
        gender: null
        plural: null
        notes:
          en: "To grow. 敎學相長: teaching and learning enhance each other."
          ko: "자라다. 敎學相長: 교학상장."
      - classical_chinese: 不
        reading: 불
        meaning_kun: 아니
        translation:
          en: not, no
          ko: 아니다
        gender: null
        plural: null
        notes:
          en: "Negation. 不恥下問: not ashamed to ask those below."
          ko: "부정. 不恥下問: 아랫사람에게 묻기를 부끄러워하지 않다."
      - classical_chinese: 恥
        reading: 치
        meaning_kun: 부끄러울
        translation:
          en: shame, to be ashamed
          ko: 부끄럽다
        gender: null
        plural: null
        notes:
          en: "Shame. 不恥下問: not ashamed to ask inferiors (Analects 5.15)."
          ko: "부끄럽다. 不恥下問: 아랫사람에게 묻기를 부끄러워하지 않다(논어 5.15)."
      - classical_chinese: 問
        reading: 문
        meaning_kun: 물을
        translation:
          en: to ask, to inquire
          ko: 묻다
        gender: null
        plural: null
        notes:
          en: "To ask. 門 (gate) + 口 (mouth): asking at the gate."
          ko: "묻다. 門(문 문) + 口(입 구): 문 앞에서 묻다."

  - id: character_idioms
    label:
      en: "Character and Integrity Idioms"
      ko: "인격 관련 사자성어"
    type: vocabulary
    words:
      - classical_chinese: 言
        reading: 언
        meaning_kun: 말씀
        translation:
          en: speech, words
          ko: 말
        gender: null
        plural: null
        notes:
          en: "Speech. 言行一致: words and deeds are consistent."
          ko: "말. 言行一致: 말과 행동이 일치한다."
      - classical_chinese: 行
        reading: 행
        meaning_kun: 다닐
        translation:
          en: to go, to act, conduct
          ko: 다니다, 행하다
        gender: null
        plural: null
        notes:
          en: "Action or conduct. 言行一致: consistency of word and deed."
          ko: "행동. 言行一致: 언행일치."
      - classical_chinese: 一
        reading: 일
        meaning_kun: 한
        translation:
          en: one, whole, uniform
          ko: 하나
        gender: null
        plural: null
        notes:
          en: "One. 一致 = to be consistent, unified."
          ko: "하나. 一致 = 일치하다."
      - classical_chinese: 致
        reading: 치
        meaning_kun: 이를
        translation:
          en: to reach, to attain
          ko: 이르다
        gender: null
        plural: null
        notes:
          en: "To reach. 一致 = consistent, in agreement."
          ko: "이르다. 一致 = 일치."
      - classical_chinese: 自
        reading: 자
        meaning_kun: 스스로
        translation:
          en: self
          ko: 스스로
        gender: null
        plural: null
        notes:
          en: "Self. 自強不息: ceaselessly strengthening oneself (I Ching)."
          ko: "스스로. 自強不息: 쉬지 않고 스스로를 강하게 한다(주역)."
      - classical_chinese: 強
        reading: 강
        meaning_kun: 강할
        translation:
          en: strong, powerful
          ko: 강한
        gender: null
        plural: null
        notes:
          en: "Strong. 自強 = self-strengthening."
          ko: "강하다. 自強 = 자강(스스로 강해짐)."
      - classical_chinese: 息
        reading: 식
        meaning_kun: 쉴
        translation:
          en: to rest, to cease; breath
          ko: 쉬다; 숨
        gender: null
        plural: null
        notes:
          en: "To rest. 不息 = without cease. 自 (nose/self) + 心 (heart) = breath."
          ko: "쉬다. 不息 = 쉬지 않고."
      - classical_chinese: 克
        reading: 극
        meaning_kun: 이길
        translation:
          en: to overcome, to be able
          ko: 이기다
        gender: null
        plural: null
        notes:
          en: "To overcome. 克己復禮: overcome the self, return to propriety (Analects 12.1)."
          ko: "이기다. 克己復禮: 자기를 이기고 예로 돌아간다(논어 12.1)."
      - classical_chinese: 己
        reading: 기
        meaning_kun: 몸
        translation:
          en: self, oneself
          ko: 자기
        gender: null
        plural: null
        notes:
          en: "Self. 克己 = to overcome oneself, self-discipline."
          ko: "자기. 克己 = 극기(자기를 이김)."
      - classical_chinese: 復
        reading: 복
        meaning_kun: 다시
        translation:
          en: to return, to restore, again
          ko: 돌아가다, 다시
        gender: null
        plural: null
        notes:
          en: "To return. 復禮 = to return to propriety."
          ko: "돌아가다. 復禮 = 예로 돌아감."
      - classical_chinese: 禮
        reading: 례
        meaning_kun: 예도
        translation:
          en: ritual, propriety, manners
          ko: 예, 예법
        gender: null
        plural: null
        notes:
          en: "Ritual propriety. One of the Five Confucian Virtues. 克己復禮 = self-mastery and propriety."
          ko: "예법. 유교 오상(五常) 중 하나. 克己復禮 = 극기복례."
      - classical_chinese: 信
        reading: 신
        meaning_kun: 믿을
        translation:
          en: trust, faith, sincerity
          ko: 믿다, 신의
        gender: null
        plural: null
        notes:
          en: "Trust. 亻(person) + 言 (speech): a person's word. 信義 = faithfulness."
          ko: "믿다. 亻(사람 인) + 言(말씀 언): 사람의 말. 信義 = 신의."

  - id: nature_idioms
    label:
      en: "Nature Idioms"
      ko: "자연 관련 사자성어"
    type: vocabulary
    words:
      - classical_chinese: 山
        reading: 산
        meaning_kun: 뫼
        translation:
          en: mountain
          ko: 산
        gender: null
        plural: null
        notes:
          en: "Mountain. 山高水長: the mountain is high, the water flows far."
          ko: "산. 山高水長: 산이 높고 물이 멀리 흐른다."
      - classical_chinese: 高
        reading: 고
        meaning_kun: 높을
        translation:
          en: high, tall
          ko: 높은
        gender: null
        plural: null
        notes:
          en: "High. 山高水長: a person's virtue is lofty and enduring."
          ko: "높다. 山高水長: 사람의 덕이 높고 오래감."
      - classical_chinese: 水
        reading: 수
        meaning_kun: 물
        translation:
          en: water
          ko: 물
        gender: null
        plural: null
        notes:
          en: "Water. Symbolizes flowing, adaptable virtue in Daoism."
          ko: "물. 도교에서 유연하고 적응하는 덕을 상징."
      - classical_chinese: 鳥
        reading: 조
        meaning_kun: 새
        translation:
          en: bird
          ko: 새
        gender: null
        plural: null
        notes:
          en: "Bird. 花鳥風月: flowers, birds, wind, and moon (natural beauty)."
          ko: "새. 花鳥風月: 꽃, 새, 바람, 달(자연의 아름다움)."
      - classical_chinese: 花
        reading: 화
        meaning_kun: 꽃
        translation:
          en: flower
          ko: 꽃
        gender: null
        plural: null
        notes:
          en: "Flower. 花鳥風月: appreciation of natural beauty."
          ko: "꽃. 花鳥風月: 자연미의 감상."
      - classical_chinese: 風
        reading: 풍
        meaning_kun: 바람
        translation:
          en: wind
          ko: 바람
        gender: null
        plural: null
        notes:
          en: "Wind. 花鳥風月: the elegant enjoyment of nature."
          ko: "바람. 花鳥風月: 자연의 풍류."
      - classical_chinese: 月
        reading: 월
        meaning_kun: 달
        translation:
          en: moon
          ko: 달
        gender: null
        plural: null
        notes:
          en: "Moon. 花鳥風月: appreciating the beauty of the four seasons."
          ko: "달. 花鳥風月: 사계절의 아름다움을 감상."
      - classical_chinese: 明
        reading: 명
        meaning_kun: 밝을
        translation:
          en: bright, clear
          ko: 밝은
        gender: null
        plural: null
        notes:
          en: "Bright. 明鏡止水: a clear mirror and still water (calm mind)."
          ko: "밝다. 明鏡止水: 맑은 거울과 고요한 물(고요한 마음)."
      - classical_chinese: 鏡
        reading: 경
        meaning_kun: 거울
        translation:
          en: mirror
          ko: 거울
        gender: null
        plural: null
        notes:
          en: "Mirror. 明鏡止水: tranquil and reflective state of mind."
          ko: "거울. 明鏡止水: 고요하고 반조하는 마음의 상태."

  - id: adversity_idioms
    label:
      en: "Adversity and Perseverance Idioms"
      ko: "역경 관련 사자성어"
    type: vocabulary
    words:
      - classical_chinese: 臥
        reading: 와
        meaning_kun: 누울
        translation:
          en: to lie down, to recline
          ko: 눕다
        gender: null
        plural: null
        notes:
          en: "To lie down. 臥薪嘗膽: sleeping on firewood and tasting gall."
          ko: "눕다. 臥薪嘗膽: 섶 위에 눕고 쓸개를 핥다."
      - classical_chinese: 薪
        reading: 신
        meaning_kun: 섶
        translation:
          en: firewood, kindling
          ko: 섶, 장작
        gender: null
        plural: null
        notes:
          en: "Firewood. 臥薪 = lying on firewood to remember hardship."
          ko: "섶. 臥薪 = 고난을 잊지 않으려 섶 위에 눕다."
      - classical_chinese: 嘗
        reading: 상
        meaning_kun: 맛볼
        translation:
          en: to taste, to try
          ko: 맛보다
        gender: null
        plural: null
        notes:
          en: "To taste. 嘗膽 = tasting gall to fuel revenge (King Goujian)."
          ko: "맛보다. 嘗膽 = 복수심을 불태우려 쓸개를 핥다(월왕 구천)."
      - classical_chinese: 膽
        reading: 담
        meaning_kun: 쓸개
        translation:
          en: gallbladder, courage
          ko: 쓸개, 담력
        gender: null
        plural: null
        notes:
          en: "Gallbladder. 臥薪嘗膽: enduring hardship for future revenge."
          ko: "쓸개. 臥薪嘗膽: 장래의 복수를 위해 고난을 감내하다."
      - classical_chinese: 塞
        reading: 새
        meaning_kun: 변방
        translation:
          en: border, frontier; to block
          ko: 변방; 막다
        gender: null
        plural: null
        notes:
          en: "Border. In 塞翁之馬: the old man of the border's horse."
          ko: "변방. 塞翁之馬에서: 변방 노인의 말."
      - classical_chinese: 翁
        reading: 옹
        meaning_kun: 늙은이
        translation:
          en: old man, elderly gentleman
          ko: 늙은이
        gender: null
        plural: null
        notes:
          en: "Old man. 塞翁之馬: misfortune may be a blessing in disguise."
          ko: "늙은이. 塞翁之馬: 불행이 행운이 될 수 있다(새옹지마)."
      - classical_chinese: 馬
        reading: 마
        meaning_kun: 말
        translation:
          en: horse
          ko: 말
        gender: null
        plural: null
        notes:
          en: "Horse. 塞翁之馬: one cannot know if events are good or bad."
          ko: "말. 塞翁之馬: 일의 좋고 나쁨을 알 수 없다."
      - classical_chinese: 磨
        reading: 마
        meaning_kun: 갈
        translation:
          en: to grind, to polish
          ko: 갈다
        gender: null
        plural: null
        notes:
          en: "To grind. 百折不撓: never yield despite a hundred setbacks."
          ko: "갈다. 百折不撓: 백 번 꺾여도 굽히지 않는다."
      - classical_chinese: 百
        reading: 백
        meaning_kun: 일백
        translation:
          en: hundred
          ko: 백
        gender: null
        plural: null
        notes:
          en: "Hundred. 百折不撓: unyielding spirit despite many setbacks."
          ko: "백. 百折不撓: 많은 좌절에도 굴하지 않는 정신."
      - classical_chinese: 折
        reading: 절
        meaning_kun: 꺾을
        translation:
          en: to break, to bend
          ko: 꺾다
        gender: null
        plural: null
        notes:
          en: "To break or bend. 百折 = a hundred breaks (many setbacks)."
          ko: "꺾다. 百折 = 백 번 꺾임(많은 좌절)."
      - classical_chinese: 撓
        reading: 뇨
        meaning_kun: 굽힐
        translation:
          en: to yield, to bend, to give way
          ko: 굽히다
        gender: null
        plural: null
        notes:
          en: "To yield. 不撓 = unyielding. 百折不撓 = indomitable spirit."
          ko: "굽히다. 不撓 = 굽히지 않는. 百折不撓 = 불굴의 정신."
      - classical_chinese: 忍
        reading: 인
        meaning_kun: 참을
        translation:
          en: to endure, patience
          ko: 참다
        gender: null
        plural: null
        notes:
          en: "To endure. 刃 (blade) + 心 (heart): a blade over the heart. 忍耐 = patience."
          ko: "참다. 刃(칼날 인) + 心(마음 심): 마음 위의 칼날. 忍耐 = 인내."
      - classical_chinese: 耐
        reading: 내
        meaning_kun: 견딜
        translation:
          en: to endure, to withstand
          ko: 견디다
        gender: null
        plural: null
        notes:
          en: "To withstand. 忍耐 = patience and endurance."
          ko: "견디다. 忍耐 = 인내."
