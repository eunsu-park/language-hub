lesson: sup_L3_Confucian_Terminology
lesson_number: 113
hanja_level: L3
type: supplementary
topic: Confucian Terminology
categories:
- id: core_concepts
  label:
    en: Core Confucian Concepts
    ko: 유교 핵심 개념
  type: vocabulary
  words:
  - classical_chinese: 道
    reading: 도
    meaning_kun: 길
    translation:
      en: the Way; path; principle
      ko: "도; 길; 원리"
    gender: null
    plural: null
    notes:
      en: "辶 (walk) + 首 (head). The path one follows. Central philosophical concept."
      ko: "辶(쉬엄쉬엄 갈 착) + 首(머리). 따르는 길. 철학의 핵심 개념."
  - classical_chinese: 理
    reading: 리
    meaning_kun: 다스릴
    translation:
      en: principle; reason; to govern
      ko: "이치; 도리; 다스리다"
    gender: null
    plural: null
    notes:
      en: "Jade (玉) + 里. Veins in jade. Neo-Confucian 'principle.'"
      ko: "옥(玉) + 里. 옥의 결. 성리학의 '리(理).'"
  - classical_chinese: 氣
    reading: 기
    meaning_kun: 기운
    translation:
      en: vital force; energy; spirit
      ko: "기운; 기; 정기"
    gender: null
    plural: null
    notes:
      en: "Steam rising from rice. Material force in Neo-Confucianism."
      ko: "밥에서 김이 오르는 모양. 성리학의 '기(氣).'"
  - classical_chinese: 性
    reading: 성
    meaning_kun: 성품
    translation:
      en: nature; innate character; disposition
      ko: "성품; 본성; 성질"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 生 (birth). Inborn nature. 性善 = human nature is good."
      ko: "마음(忄) + 生(날 생). 타고난 본성. 性善 = 성선설."
  - classical_chinese: 命
    reading: 명
    meaning_kun: 목숨
    translation:
      en: mandate; fate; life; command
      ko: "명; 운명; 목숨; 명령"
    gender: null
    plural: null
    notes:
      en: "口 (mouth) + 令 (order). Heaven's Mandate. 天命 = Mandate of Heaven."
      ko: "口(입) + 令(명할 령). 하늘의 명. 天命 = 천명."
  - classical_chinese: 心
    reading: 심
    meaning_kun: 마음
    translation:
      en: heart; mind; center
      ko: "마음; 심장; 중심"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a heart. Seat of emotions and thought in Chinese philosophy."
      ko: "심장의 상형자. 중국 철학에서 감정과 사유의 자리."
  - classical_chinese: 情
    reading: 정
    meaning_kun: 뜻
    translation:
      en: feeling; emotion; reality
      ko: "정; 감정; 사정"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 青. Natural feelings arising from nature (性)."
      ko: "마음(忄) + 靑. 본성(性)에서 나오는 자연스러운 감정."
  - classical_chinese: 欲
    reading: 욕
    meaning_kun: 하고자 할
    translation:
      en: desire; wish; greed
      ko: "욕망; 바라다; 탐욕"
    gender: null
    plural: null
    notes:
      en: "谷 + 欠. Desire rising like air from a valley. 私欲 = selfish desire."
      ko: "谷 + 欠. 골짜기에서 올라오는 기운 같은 욕망. 私欲 = 사욕."
  - classical_chinese: 善
    reading: 선
    meaning_kun: 착할
    translation:
      en: good; virtuous; kind
      ko: "착한; 선한; 잘하다"
    gender: null
    plural: null
    notes:
      en: "羊 (sheep) + 言 variant. Sheep symbolizes goodness."
      ko: "羊(양) + 言 변형. 양은 선함을 상징."
  - classical_chinese: 惡
    reading: 악
    meaning_kun: 악할
    translation:
      en: evil; bad; to hate
      ko: "악한; 나쁜; 미워하다"
    gender: null
    plural: null
    notes:
      en: "亞 + heart (心). Also read 오 (to hate). Opposite of 善."
      ko: "亞 + 마음(心). 오(미워하다)로도 읽음. 善의 반대."
- id: five_relationships
  label:
    en: Five Relationships and Ethics
    ko: 오륜과 윤리
  type: vocabulary
  words:
  - classical_chinese: 倫
    reading: 륜
    meaning_kun: 인륜
    translation:
      en: ethics; human relations; order
      ko: "인륜; 도리; 차서"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 侖 (order). Proper human relationships. 五倫 = Five Relations."
      ko: "사람(亻) + 侖(차례). 올바른 인간관계. 五倫 = 오륜."
  - classical_chinese: 綱
    reading: 강
    meaning_kun: 벼리
    translation:
      en: guiding principle; headrope of net
      ko: "강령; 벼리; 그물의 벼리"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 岡. Main rope. 三綱 = Three Bonds."
      ko: "실(糸) + 岡. 그물의 큰 줄. 三綱 = 삼강."
  - classical_chinese: 常
    reading: 상
    meaning_kun: 항상
    translation:
      en: constant; regular; virtue
      ko: "항상; 떳떳한; 덕"
    gender: null
    plural: null
    notes:
      en: "尚 + 巾. Enduring value. 五常 = Five Constants (仁義禮智信)."
      ko: "尚 + 巾. 변하지 않는 가치. 五常 = 오상(仁義禮智信)."
  - classical_chinese: 忠
    reading: 충
    meaning_kun: 충성할
    translation:
      en: loyalty; devotion to ruler
      ko: "충성; 충심"
    gender: null
    plural: null
    notes:
      en: "中 (center) + 心 (heart). 君臣有義 = ruler-minister have righteousness."
      ko: "中(가운데) + 心(마음). 君臣有義 = 군신유의."
  - classical_chinese: 恕
    reading: 서
    meaning_kun: 용서할
    translation:
      en: empathy; reciprocity; forgiveness
      ko: "서; 용서; 남을 헤아림"
    gender: null
    plural: null
    notes:
      en: "如 (like) + 心 (heart). The Golden Rule: treat others as yourself."
      ko: "如(같을 여) + 心(마음). 황금률: 자기처럼 남을 대하라."
  - classical_chinese: 敎
    reading: 교
    meaning_kun: 가르칠
    translation:
      en: teaching; doctrine; religion
      ko: "가르침; 교화; 종교"
    gender: null
    plural: null
    notes:
      en: "孝 + 攵. Teaching filial values. 儒敎 = Confucianism."
      ko: "孝 + 攵. 효도의 가치를 가르침. 儒敎 = 유교."
- id: self_cultivation
  label:
    en: Self-Cultivation
    ko: 수양
  type: vocabulary
  words:
  - classical_chinese: 修
    reading: 수
    meaning_kun: 닦을
    translation:
      en: to cultivate; to repair; to study
      ko: "닦다; 수양하다; 고치다"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 攸. Self-improvement. 修身 = self-cultivation."
      ko: "사람(亻) + 攸. 자기 수양. 修身 = 수신."
  - classical_chinese: 齊
    reading: 제
    meaning_kun: 가지런할
    translation:
      en: to regulate; orderly; even
      ko: "가지런한; 고르다; 다스리다"
    gender: null
    plural: null
    notes:
      en: "Grain ears aligned. 齊家 = to regulate the family."
      ko: "곡식 이삭이 가지런한 모양. 齊家 = 제가."
  - classical_chinese: 治
    reading: 치
    meaning_kun: 다스릴
    translation:
      en: to govern; to cure; order
      ko: "다스리다; 치료하다; 질서"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 台. To manage like water flow. 治國 = to govern a state."
      ko: "물(氵) + 台. 물 흐름처럼 관리. 治國 = 치국."
  - classical_chinese: 平
    reading: 평
    meaning_kun: 평평할
    translation:
      en: peace; level; to pacify
      ko: "평화; 평평한; 평정하다"
    gender: null
    plural: null
    notes:
      en: "干 + 八. Level surface. 平天下 = bring peace to all under heaven."
      ko: "干 + 八. 수평면. 平天下 = 평천하."
  - classical_chinese: 格
    reading: 격
    meaning_kun: 격식
    translation:
      en: to investigate; standard; pattern
      ko: "이르다; 격식; 법식"
    gender: null
    plural: null
    notes:
      en: "Wood (木) + 各. 格物 = investigation of things."
      ko: "나무(木) + 各. 格物 = 격물(사물의 이치를 궁구함)."
  - classical_chinese: 致
    reading: 치
    meaning_kun: 이를
    translation:
      en: to extend; to bring about; to express
      ko: "이르다; 이루다; 극진히 하다"
    gender: null
    plural: null
    notes:
      en: "至 (arrive) + 攵. 致知 = extension of knowledge."
      ko: "至(이를 지) + 攵. 致知 = 치지(앎을 이룸)."
  - classical_chinese: 誠
    reading: 성
    meaning_kun: 정성
    translation:
      en: sincerity; genuineness
      ko: "정성; 성실; 참됨"
    gender: null
    plural: null
    notes:
      en: "言 (speech) + 成. 誠意 = making intentions sincere."
      ko: "言(말씀) + 成. 誠意 = 성의(뜻을 성실히 함)."
  - classical_chinese: 正
    reading: 정
    meaning_kun: 바를
    translation:
      en: correct; upright; to rectify
      ko: "바른; 올바른; 바로잡다"
    gender: null
    plural: null
    notes:
      en: "一 + 止 (stop). Stopping at the right point. 正心 = rectifying the heart."
      ko: "一 + 止(그칠 지). 바른 곳에 멈춤. 正心 = 정심."
  - classical_chinese: 克
    reading: 극
    meaning_kun: 이길
    translation:
      en: to overcome; to restrain; to be able
      ko: "이기다; 억제하다; 능히"
    gender: null
    plural: null
    notes:
      en: "十 + 兄 variant. 克己復禮 = Overcome self, return to ritual."
      ko: "十 + 兄 변형. 克己復禮 = 극기복례."
  - classical_chinese: 復
    reading: 복
    meaning_kun: 돌아갈
    translation:
      en: to return; to restore; again
      ko: "돌아가다; 회복하다; 다시"
    gender: null
    plural: null
    notes:
      en: "彳 + 復. To go back. 克己復禮 = return to propriety."
      ko: "彳 + 復. 돌아가다. 克己復禮 = 극기복례."
