lesson: sup_L4_Warfare_and_Military
lesson_number: 112
hanja_level: L4
type: supplementary
topic: Warfare and Military
categories:
- id: military_ranks
  label:
    en: Military Ranks and Roles
    ko: 군사 직책
  type: vocabulary
  words:
  - classical_chinese: 將
    reading: 장
    meaning_kun: 장수
    translation:
      en: general; commander; to lead
      ko: "장수; 장군; 이끌다"
    gender: null
    plural: null
    notes:
      en: "爿 + 寸 (hand). One who commands. Also 'will' (future marker)."
      ko: "爿 + 寸(손). 지휘하는 사람. '장차'의 뜻도."
  - classical_chinese: 軍
    reading: 군
    meaning_kun: 군사
    translation:
      en: army; military; troops
      ko: "군대; 군사"
    gender: null
    plural: null
    notes:
      en: "Cart (車) + wrap (冖). Wagons encircling a camp."
      ko: "수레(車) + 덮을(冖). 수레로 진영을 에워싼 모양."
  - classical_chinese: 兵
    reading: 병
    meaning_kun: 군사
    translation:
      en: soldier; weapon; military
      ko: "군사; 병사; 무기"
    gender: null
    plural: null
    notes:
      en: "斤 (axe) + 廾 (two hands). Hands holding a weapon."
      ko: "斤(도끼) + 廾(두 손). 두 손으로 무기를 잡은 모양."
  - classical_chinese: 卒
    reading: 졸
    meaning_kun: 군사
    translation:
      en: foot soldier; to finish; suddenly
      ko: "병졸; 마치다; 갑자기"
    gender: null
    plural: null
    notes:
      en: "衣 with 十. Marked uniform. Also 'to die' or 'finally.'"
      ko: "衣(옷)에 十. 표시 있는 군복. '죽다,' '마침내'의 뜻도."
  - classical_chinese: 帥
    reading: 수
    meaning_kun: 장수
    translation:
      en: commander-in-chief; to lead
      ko: "원수; 총사령관; 이끌다"
    gender: null
    plural: null
    notes:
      en: "巾 + 帀. One who leads the cloth banner. Supreme commander."
      ko: "巾(수건) + 帀. 깃발을 이끄는 사람. 최고 지휘관."
  - classical_chinese: 尉
    reading: 위
    meaning_kun: 벼슬
    translation:
      en: military officer; lieutenant
      ko: "위(군관); 위관"
    gender: null
    plural: null
    notes:
      en: "尸 + 示 + 寸. Military rank. 太尉 = Grand Commandant."
      ko: "尸 + 示 + 寸. 군사 직위. 太尉 = 태위."
  - classical_chinese: 候
    reading: 후
    meaning_kun: 기다릴
    translation:
      en: scout; to wait; to observe
      ko: "정찰병; 기다리다; 살피다"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 矦. To watch and report. 斥候 = scout."
      ko: "사람(亻) + 矦. 감시하고 보고하다. 斥候 = 척후."
- id: warfare
  label:
    en: Warfare Terms
    ko: 전쟁 용어
  type: vocabulary
  words:
  - classical_chinese: 戰
    reading: 전
    meaning_kun: 싸울
    translation:
      en: battle; war; to fight
      ko: "전투; 전쟁; 싸우다"
    gender: null
    plural: null
    notes:
      en: "單 + 戈 (halberd). Combat with weapons."
      ko: "單 + 戈(창). 무기를 들고 싸움."
  - classical_chinese: 攻
    reading: 공
    meaning_kun: 칠
    translation:
      en: to attack; to assault
      ko: "공격하다; 치다"
    gender: null
    plural: null
    notes:
      en: "工 + 攵 (strike). To strike with effort."
      ko: "工 + 攵(칠 복). 힘을 들여 치다."
  - classical_chinese: 守
    reading: 수
    meaning_kun: 지킬
    translation:
      en: to defend; to guard
      ko: "지키다; 방어하다"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 寸. To protect what is inside."
      ko: "지붕(宀) + 寸. 안에 있는 것을 보호하다."
  - classical_chinese: 圍
    reading: 위
    meaning_kun: 에워쌀
    translation:
      en: to surround; to besiege
      ko: "에워싸다; 포위하다"
    gender: null
    plural: null
    notes:
      en: "Enclosure (囗) + 韋. To encircle an enemy."
      ko: "에워쌀(囗) + 韋. 적을 에워싸다."
  - classical_chinese: 陣
    reading: 진
    meaning_kun: 진
    translation:
      en: battle formation; camp; position
      ko: "진(陣); 진영; 전열"
    gender: null
    plural: null
    notes:
      en: "Hill radical (阝) + 車. Formation on high ground."
      ko: "언덕(阝) + 車. 높은 곳에서의 진형."
  - classical_chinese: 伐
    reading: 벌
    meaning_kun: 칠
    translation:
      en: to attack; to cut down; expedition
      ko: "치다; 정벌하다; 베다"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 戈 (halberd). To strike a person. Military campaign."
      ko: "사람(亻) + 戈(창). 사람을 치다. 군사 원정."
  - classical_chinese: 征
    reading: 정
    meaning_kun: 칠
    translation:
      en: to campaign; to conquer; to levy
      ko: "정벌하다; 원정; 거두다"
    gender: null
    plural: null
    notes:
      en: "Step (彳) + 正 (correct). Righteous military expedition."
      ko: "걸음(彳) + 正(바를 정). 의로운 군사 원정."
  - classical_chinese: 降
    reading: 항
    meaning_kun: 항복할
    translation:
      en: to surrender; to descend; to fall
      ko: "항복하다; 내리다"
    gender: null
    plural: null
    notes:
      en: "Hill (阝) + 夅. To come down from a hill. Also read 강 (descend)."
      ko: "언덕(阝) + 夅. 언덕에서 내려오다. 강(내려오다)으로도 읽음."
  - classical_chinese: 勝
    reading: 승
    meaning_kun: 이길
    translation:
      en: to win; to conquer; victory
      ko: "이기다; 승리"
    gender: null
    plural: null
    notes:
      en: "朕 + 力 (strength). Superior strength prevailing."
      ko: "朕 + 力(힘). 우세한 힘이 이김."
  - classical_chinese: 敗
    reading: 패
    meaning_kun: 패할
    translation:
      en: to lose; to defeat; to fail
      ko: "패하다; 패배; 실패"
    gender: null
    plural: null
    notes:
      en: "貝 (shell) + 攵 (strike). Breaking shells (valuables). Destruction."
      ko: "조개(貝) + 攵(칠 복). 조개(귀중품)를 깨뜨림. 파괴."
- id: weapons_fortifications
  label:
    en: Weapons and Fortifications
    ko: 무기와 방어시설
  type: vocabulary
  words:
  - classical_chinese: 戈
    reading: 과
    meaning_kun: 창
    translation:
      en: halberd; dagger-axe
      ko: "창; 과(무기)"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a dagger-axe. Radical #62. Ancient Chinese weapon."
      ko: "과(戈)의 상형자. 부수 제62번. 고대 중국 무기."
  - classical_chinese: 盾
    reading: 순
    meaning_kun: 방패
    translation:
      en: shield
      ko: 방패
    gender: null
    plural: null
    notes:
      en: "Pictograph of a shield. 矛盾 = contradiction (spear vs. shield)."
      ko: "방패의 상형자. 矛盾 = 모순(창과 방패)."
  - classical_chinese: 矛
    reading: 모
    meaning_kun: 창
    translation:
      en: spear; lance
      ko: "창; 모(무기)"
    gender: null
    plural: null
    notes:
      en: "Pictograph of a spear. 矛盾 = contradiction."
      ko: "창의 상형자. 矛盾 = 모순."
  - classical_chinese: 甲
    reading: 갑
    meaning_kun: 갑옷
    translation:
      en: armor; shell
      ko: "갑옷; 껍데기"
    gender: null
    plural: null
    notes:
      en: "Pictograph of armor plates. Protective covering."
      ko: "갑옷 조각의 상형자. 보호 덮개."
  - classical_chinese: 砲
    reading: 포
    meaning_kun: 대포
    translation:
      en: cannon; catapult; firecracker
      ko: "대포; 투석기"
    gender: null
    plural: null
    notes:
      en: "Stone (石) + 包. Originally stone-throwing device, later cannon."
      ko: "돌(石) + 包. 원래 투석기, 후에 대포."
  - classical_chinese: 壘
    reading: 루
    meaning_kun: 보루
    translation:
      en: rampart; fortress; to pile up
      ko: "보루; 성루; 쌓다"
    gender: null
    plural: null
    notes:
      en: "畾 (stacked fields) + 土. Piled earth fortification."
      ko: "畾(겹친 밭) + 土. 흙을 쌓은 방어 시설."
  - classical_chinese: 糧
    reading: 량
    meaning_kun: 양식
    translation:
      en: provisions; food supply; rations
      ko: "양식; 군량; 식량"
    gender: null
    plural: null
    notes:
      en: "Rice (米) + 量 (measure). Measured grain for troops."
      ko: "쌀(米) + 量(헤아릴 량). 군대를 위해 재어 놓은 곡식."
  - classical_chinese: 謀
    reading: 모
    meaning_kun: 꾀할
    translation:
      en: strategy; to plan; to scheme
      ko: "계략; 도모하다; 꾀하다"
    gender: null
    plural: null
    notes:
      en: "Speech (言) + 某. To discuss plans in secret. 陰謀 = conspiracy."
      ko: "말씀(言) + 某. 은밀히 계획을 논의. 陰謀 = 음모."
  - classical_chinese: 略
    reading: 략
    meaning_kun: 간략할
    translation:
      en: strategy; to abbreviate; to seize
      ko: "전략; 간략한; 빼앗다"
    gender: null
    plural: null
    notes:
      en: "Field (田) + 各. To plan field operations. 戰略 = strategy."
      ko: "밭(田) + 各. 전장 작전을 세우다. 戰略 = 전략."
  - classical_chinese: 援
    reading: 원
    meaning_kun: 도울
    translation:
      en: to aid; to reinforce; support
      ko: "돕다; 구원하다; 지원"
    gender: null
    plural: null
    notes:
      en: "Hand radical (扌) + 爰. To extend a hand in help. 支援 = support."
      ko: "손(扌) + 爰. 도움의 손을 내밀다. 支援 = 지원."
  - classical_chinese: 旗
    reading: 기
    meaning_kun: 기
    translation:
      en: flag; banner; standard
      ko: "깃발; 기"
    gender: null
    plural: null
    notes:
      en: "Square (方) + 其. Cloth on a pole. Military banner."
      ko: "방(方) + 其. 막대에 단 천. 군기."
  - classical_chinese: 鼓
    reading: 고
    meaning_kun: 북
    translation:
      en: drum; to beat; to encourage
      ko: "북; 두드리다; 고무하다"
    gender: null
    plural: null
    notes:
      en: "壴 (drum) + 支. War drum for signaling. 鼓舞 = to inspire."
      ko: "壴(북) + 支. 신호를 위한 전쟁 북. 鼓舞 = 고무."
  - classical_chinese: 凱
    reading: 개
    meaning_kun: 이길
    translation:
      en: triumph; victory celebration
      ko: "개선; 승리 축하"
    gender: null
    plural: null
    notes:
      en: "几 + 豈. Celebratory return. 凱旋 = triumphant return."
      ko: "几 + 豈. 축하하며 돌아옴. 凱旋 = 개선."
