lesson: sup_L2_Buddhist_Terminology
lesson_number: 119
hanja_level: L2
type: supplementary
topic: Buddhist Terminology
categories:
- id: core_buddhist
  label:
    en: Core Buddhist Concepts
    ko: 불교 핵심 개념
  type: vocabulary
  words:
  - classical_chinese: 佛
    reading: 불
    meaning_kun: 부처
    translation:
      en: Buddha; the Awakened One
      ko: "부처; 깨달은 이"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 弗. Transliteration of Sanskrit 'Buddha.'"
      ko: "사람(亻) + 弗. 산스크리트 'Buddha'의 음역."
  - classical_chinese: 法
    reading: 법
    meaning_kun: 법
    translation:
      en: dharma; law; teaching; method
      ko: "법; 가르침; 진리"
    gender: null
    plural: null
    notes:
      en: "Water (氵) + 去. Buddha's teaching. Part of Three Jewels (三寶)."
      ko: "물(氵) + 去. 부처의 가르침. 삼보(三寶) 중 하나."
  - classical_chinese: 僧
    reading: 승
    meaning_kun: 중
    translation:
      en: monk; sangha; clergy
      ko: "승려; 중; 승가"
    gender: null
    plural: null
    notes:
      en: "Person (亻) + 曾. Transliteration of Sanskrit 'sangha.' Three Jewels."
      ko: "사람(亻) + 曾. 산스크리트 'sangha'의 음역. 삼보."
  - classical_chinese: 菩薩
    reading: 보살
    meaning_kun: 보살
    translation:
      en: bodhisattva
      ko: 보살
    gender: null
    plural: null
    notes:
      en: "Transliteration of 'bodhisattva.' Enlightenment being."
      ko: "'보리살타(bodhisattva)'의 음역. 깨달음의 존재."
  - classical_chinese: 禪
    reading: 선
    meaning_kun: 선
    translation:
      en: meditation; Zen/Chan; to abdicate
      ko: "선; 참선; 양위하다"
    gender: null
    plural: null
    notes:
      en: "Altar (示) + 單. Transliteration of 'dhyāna.' 禪定 = meditation."
      ko: "제단(示) + 單. 'dhyāna'의 음역. 禪定 = 선정."
  - classical_chinese: 涅槃
    reading: 열반
    meaning_kun: 열반
    translation:
      en: nirvana; extinction of suffering
      ko: "열반; 고통의 소멸"
    gender: null
    plural: null
    notes:
      en: "Transliteration of 'nirvāṇa.' Ultimate liberation."
      ko: "'nirvāṇa'의 음역. 궁극적 해탈."
  - classical_chinese: 般若
    reading: 반야
    meaning_kun: 반야
    translation:
      en: prajña; transcendent wisdom
      ko: "반야; 초월적 지혜"
    gender: null
    plural: null
    notes:
      en: "Transliteration of 'prajñā.' Wisdom seeing emptiness."
      ko: "'prajñā'의 음역. 공(空)을 보는 지혜."
  - classical_chinese: 空
    reading: 공
    meaning_kun: 빌
    translation:
      en: emptiness; void; śūnyatā
      ko: "공; 비어 있음; 공성"
    gender: null
    plural: null
    notes:
      en: "Hole (穴) + 工. Central Buddhist concept. 色卽是空."
      ko: "구멍(穴) + 工. 불교 핵심 개념. 色卽是空."
  - classical_chinese: 色
    reading: 색
    meaning_kun: 빛
    translation:
      en: form; matter; color; desire
      ko: "색; 형상; 물질; 빛깔"
    gender: null
    plural: null
    notes:
      en: "巴 + 刀. Material form. 色卽是空 = form is emptiness."
      ko: "巴 + 刀. 물질적 형상. 色卽是空 = 색즉시공."
  - classical_chinese: 業
    reading: 업
    meaning_kun: 업
    translation:
      en: karma; action; deed; profession
      ko: "업; 업보; 직업"
    gender: null
    plural: null
    notes:
      en: "業 from 叢 variant. Accumulated actions and their results."
      ko: "叢 변형의 業. 쌓인 행위와 그 결과."
- id: buddhist_practice
  label:
    en: Buddhist Practice
    ko: 불교 수행
  type: vocabulary
  words:
  - classical_chinese: 悟
    reading: 오
    meaning_kun: 깨달을
    translation:
      en: to awaken; to realize; enlightenment
      ko: "깨닫다; 각성; 오도"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 吾 (I). Self-realization. 覺悟 = awakening."
      ko: "마음(忄) + 吾(나). 자기 깨달음. 覺悟 = 각오."
  - classical_chinese: 覺
    reading: 각
    meaning_kun: 깨달을
    translation:
      en: to awaken; perception; consciousness
      ko: "깨닫다; 지각; 의식"
    gender: null
    plural: null
    notes:
      en: "學 variant + 見. To see and know. 自覺 = self-awareness."
      ko: "學 변형 + 見. 보고 알다. 自覺 = 자각."
  - classical_chinese: 迷
    reading: 미
    meaning_kun: 미혹할
    translation:
      en: to be deluded; to lose the way
      ko: "미혹하다; 길을 잃다"
    gender: null
    plural: null
    notes:
      en: "辶 + 米. Lost on the path. Opposite of 悟."
      ko: "辶 + 米. 길에서 길을 잃다. 悟의 반대."
  - classical_chinese: 執
    reading: 집
    meaning_kun: 잡을
    translation:
      en: to cling; attachment; to hold
      ko: "집착하다; 잡다; 붙들다"
    gender: null
    plural: null
    notes:
      en: "幸 + 丸. To hold fast. 執着 = attachment (cause of suffering)."
      ko: "幸 + 丸. 단단히 잡다. 執着 = 집착(고통의 원인)."
  - classical_chinese: 戒
    reading: 계
    meaning_kun: 경계할
    translation:
      en: precept; discipline; to warn
      ko: "계율; 경계하다; 삼가다"
    gender: null
    plural: null
    notes:
      en: "戈 + 廾. Hands holding a weapon with care. 五戒 = Five Precepts."
      ko: "戈 + 廾. 무기를 조심히 드는 손. 五戒 = 오계."
  - classical_chinese: 定
    reading: 정
    meaning_kun: 정할
    translation:
      en: concentration; samādhi; fixed
      ko: "정; 삼매; 정하다"
    gender: null
    plural: null
    notes:
      en: "Roof (宀) + 正. Settled mind. 禪定 = meditation concentration."
      ko: "지붕(宀) + 正. 안정된 마음. 禪定 = 선정."
  - classical_chinese: 慧
    reading: 혜
    meaning_kun: 슬기
    translation:
      en: wisdom; insight; discernment
      ko: "지혜; 혜안; 슬기"
    gender: null
    plural: null
    notes:
      en: "彗 + heart (心). Sweeping the heart clean. 智慧 = wisdom."
      ko: "彗 + 마음(心). 마음을 깨끗이 쓸어냄. 智慧 = 지혜."
  - classical_chinese: 輪
    reading: 륜
    meaning_kun: 바퀴
    translation:
      en: wheel; cycle; to turn
      ko: "바퀴; 윤회; 돌다"
    gender: null
    plural: null
    notes:
      en: "Cart (車) + 侖. 輪廻 = samsara (cycle of rebirth)."
      ko: "수레(車) + 侖. 輪廻 = 윤회(생사의 순환)."
  - classical_chinese: 苦
    reading: 고
    meaning_kun: 쓸
    translation:
      en: suffering; dukkha; bitter
      ko: "고통; 괴로움; 쓴"
    gender: null
    plural: null
    notes:
      en: "Grass (艹) + 古. First Noble Truth: life is suffering."
      ko: "초(艹) + 古. 제1성제: 삶은 고통."
  - classical_chinese: 慈悲
    reading: 자비
    meaning_kun: 자비
    translation:
      en: compassion; mercy; loving-kindness
      ko: "자비; 자애와 동정"
    gender: null
    plural: null
    notes:
      en: "慈 (loving-kindness) + 悲 (compassion). Core Buddhist virtue."
      ko: "慈(자) + 悲(비). 불교 핵심 덕목."
- id: buddhist_institutions
  label:
    en: Buddhist Institutions
    ko: 불교 사찰
  type: vocabulary
  words:
  - classical_chinese: 寺
    reading: 사
    meaning_kun: 절
    translation:
      en: temple; monastery
      ko: "절; 사찰"
    gender: null
    plural: null
    notes:
      en: "土 + 寸. Originally a government office. Later 'Buddhist temple.'"
      ko: "土 + 寸. 원래 관청. 후에 '불교 사찰.'"
  - classical_chinese: 塔
    reading: 탑
    meaning_kun: 탑
    translation:
      en: pagoda; stupa
      ko: "탑; 탑파"
    gender: null
    plural: null
    notes:
      en: "Earth (土) + 荅. From Sanskrit 'stūpa.' Houses relics."
      ko: "흙(土) + 荅. 산스크리트 'stūpa'에서. 사리를 안치."
  - classical_chinese: 經
    reading: 경
    meaning_kun: 경전
    translation:
      en: sutra; scripture; warp thread
      ko: "경전; 수트라; 날실"
    gender: null
    plural: null
    notes:
      en: "Silk (糸) + 巠. Buddhist scripture. 般若心經 = Heart Sutra."
      ko: "실(糸) + 巠. 불교 경전. 般若心經 = 반야심경."
  - classical_chinese: 咒
    reading: 주
    meaning_kun: 빌
    translation:
      en: mantra; incantation; spell
      ko: "주문; 진언; 다라니"
    gender: null
    plural: null
    notes:
      en: "Mouth (口) + 祝. Spoken formula. 眞言 = mantra."
      ko: "입(口) + 祝. 말하는 의식문. 眞言 = 진언."
  - classical_chinese: 香
    reading: 향
    meaning_kun: 향기
    translation:
      en: incense; fragrance; aroma
      ko: "향; 향기"
    gender: null
    plural: null
    notes:
      en: "禾 + 日. Grain drying in sun. Incense offering. 燒香 = burn incense."
      ko: "禾 + 日. 햇빛에 곡식 말림. 향 공양. 燒香 = 분향."
  - classical_chinese: 齋
    reading: 재
    meaning_kun: 재계할
    translation:
      en: to fast; to purify; vegetarian
      ko: "재계하다; 단식; 채식"
    gender: null
    plural: null
    notes:
      en: "齊 + 示. Purification through fasting. 齋戒 = fasting and discipline."
      ko: "齊 + 示. 금식을 통한 정화. 齋戒 = 재계."
  - classical_chinese: 施
    reading: 시
    meaning_kun: 베풀
    translation:
      en: to give alms; charity; to bestow
      ko: "베풀다; 보시; 시주"
    gender: null
    plural: null
    notes:
      en: "Square (方) + 也. 布施 = dāna (giving/charity)."
      ko: "方 + 也. 布施 = 보시(베풂)."
  - classical_chinese: 願
    reading: 원
    meaning_kun: 원할
    translation:
      en: vow; prayer; wish
      ko: "서원; 원; 바람"
    gender: null
    plural: null
    notes:
      en: "原 + 頁. Bodhisattva's vow. 四弘誓願 = Four Great Vows."
      ko: "原 + 頁. 보살의 서원. 四弘誓願 = 사홍서원."
  - classical_chinese: 懺
    reading: 참
    meaning_kun: 뉘우칠
    translation:
      en: repentance; confession
      ko: "참회; 뉘우침"
    gender: null
    plural: null
    notes:
      en: "Heart (忄) + 懺. From Sanskrit 'kṣamā.' 懺悔 = repentance."
      ko: "마음(忄) + 懺. 산스크리트 'kṣamā'에서. 懺悔 = 참회."
  - classical_chinese: 解脫
    reading: 해탈
    meaning_kun: 해탈
    translation:
      en: liberation; release; moksha
      ko: "해탈; 벗어남"
    gender: null
    plural: null
    notes:
      en: "解 (untie) + 脫 (escape). Freedom from cycle of rebirth."
      ko: "解(풀 해) + 脫(벗을 탈). 윤회에서의 해방."
