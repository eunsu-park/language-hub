categories:
- id: 51_are_verbs
  label:
    en: 5.1 First Conjugation (-are verbs)
    ko: 5.1 제1변화 (-are 동사)
  type: vocabulary
  words:
  - italian: parlare
    translation:
      en: to speak / to talk
      ko: 말하다
    gender: null
    notes:
      en: "Regular -are; Parlo italiano. — I speak Italian."
      ko: "규칙 -are; Parlo italiano. — 이탈리아어를 말합니다."
  - italian: mangiare
    translation:
      en: to eat
      ko: 먹다
    gender: null
    notes:
      en: Drops the 'i' before endings starting with i or e
      ko: i나 e로 시작하는 어미 앞에서 'i'가 탈락
  - italian: guardare
    translation:
      en: to look at / to watch
      ko: 보다 / 바라보다
    gender: null
  - italian: ascoltare
    translation:
      en: to listen to
      ko: 듣다
    gender: null
    notes:
      en: Takes a direct object (no preposition needed)
      ko: 직접 목적어를 취함 (전치사 불필요)
  - italian: lavorare
    translation:
      en: to work
      ko: 일하다
    gender: null
  - italian: studiare
    translation:
      en: to study
      ko: 공부하다
    gender: null
  - italian: giocare
    translation:
      en: to play
      ko: 놀다 / 경기하다
    gender: null
    notes:
      en: "Giocare a + sport; giocare con + toy"
      ko: "giocare a + 스포츠; giocare con + 장난감"
  - italian: comprare
    translation:
      en: to buy
      ko: 사다
    gender: null
  - italian: pagare
    translation:
      en: to pay
      ko: 지불하다
    gender: null
    notes:
      en: Adds 'h' before i/e to keep hard 'g' sound (pago, paghi)
      ko: 경음 'g'를 유지하기 위해 i/e 앞에 'h' 추가 (pago, paghi)
  - italian: cercare
    translation:
      en: to look for / to search
      ko: 찾다 / 검색하다
    gender: null
    notes:
      en: Adds 'h' before i/e to keep hard 'c' sound (cerco, cerchi)
      ko: 경음 'c'를 유지하기 위해 i/e 앞에 'h' 추가 (cerco, cerchi)
  - italian: trovare
    translation:
      en: to find
      ko: 찾다 / 발견하다
    gender: null
  - italian: chiamare
    translation:
      en: to call
      ko: 부르다 / 전화하다
    gender: null
    notes:
      en: "Chiamarsi (reflexive) = to be called / to call oneself"
      ko: "Chiamarsi (재귀) = ~라고 불리다"
  - italian: abitare
    translation:
      en: to live / to reside
      ko: 살다 / 거주하다
    gender: null
  - italian: arrivare
    translation:
      en: to arrive
      ko: 도착하다
    gender: null
  - italian: aspettare
    translation:
      en: to wait for
      ko: 기다리다
    gender: null
  - italian: pensare
    translation:
      en: to think
      ko: 생각하다
    gender: null
    notes:
      en: "Pensare a = to think about; pensare di = to think (opinion)"
      ko: "pensare a = ~에 대해 생각하다; pensare di = ~라고 생각하다 (의견)"
  - italian: tornare
    translation:
      en: to return / to go back
      ko: 돌아오다 / 돌아가다
    gender: null
  - italian: cambiare
    translation:
      en: to change
      ko: 바꾸다 / 변하다
    gender: null
  - italian: portare
    translation:
      en: to bring / to carry / to wear
      ko: 가져오다 / 나르다 / 입다
    gender: null
  - italian: lasciare
    translation:
      en: to leave / to let
      ko: 놓아두다 / ~하게 하다
    gender: null
  - italian: usare
    translation:
      en: to use
      ko: 사용하다
    gender: null
  - italian: provare
    translation:
      en: to try / to feel
      ko: 시도하다 / 느끼다
    gender: null
  - italian: ricordare
    translation:
      en: to remember
      ko: 기억하다
    gender: null
    notes:
      en: "Reflexive 'ricordarsi di' is also common"
      ko: "재귀형 'ricordarsi di'도 흔히 사용"
  - italian: dimenticare
    translation:
      en: to forget
      ko: 잊다
    gender: null
  - italian: spiegare
    translation:
      en: to explain
      ko: 설명하다
    gender: null
