- id: 55_modal_verbs
  label:
    en: 5.5 Modal Verbs
    ko: 5.5 조동사
  type: vocabulary
  words:
  - italian: potere
    translation:
      en: can / to be able to
      ko: ~할 수 있다
    gender: null
    notes:
      en: "Posso, puoi, può, possiamo, potete, possono"
      ko: "posso, puoi, può, possiamo, potete, possono"
  - italian: volere
    translation:
      en: to want
      ko: 원하다
    gender: null
    notes:
      en: "Voglio, vuoi, vuole, vogliamo, volete, vogliono"
      ko: "voglio, vuoi, vuole, vogliamo, volete, vogliono"
  - italian: dovere
    translation:
      en: must / to have to
      ko: ~해야 하다
    gender: null
    notes:
      en: "Devo, devi, deve, dobbiamo, dovete, devono"
      ko: "devo, devi, deve, dobbiamo, dovete, devono"
  - italian: sapere
    translation:
      en: to know (a fact) / can (ability)
      ko: 알다 (사실) / ~할 줄 알다
    gender: null
    notes:
      en: "So, sai, sa, sappiamo, sapete, sanno; sapere + inf = to know how to"
      ko: "so, sai, sa, sappiamo, sapete, sanno; sapere + 부정사 = ~할 줄 알다"
- id: 56_question_words
  label:
    en: 5.6 Question Words
    ko: 5.6 의문사
  type: vocabulary
  words:
  - italian: chi
    translation:
      en: who
      ko: 누구
    gender: null
  - italian: che / che cosa
    translation:
      en: what
      ko: 무엇
    gender: null
    notes:
      en: "'Che', 'che cosa', and 'cosa' are all used for 'what'"
      ko: "'che', 'che cosa', 'cosa' 모두 '무엇'으로 사용"
  - italian: quale
    translation:
      en: which
      ko: 어느 / 어떤
    gender: null
    notes:
      en: "Qual è (not quale è) before 'è'"
      ko: "'è' 앞에서 'qual è' (quale è가 아님)"
  - italian: quanto / quanta
    translation:
      en: how much (m/f)
      ko: 얼마나 (남/여)
    gender: null
  - italian: dove
    translation:
      en: where
      ko: 어디
    gender: null
    notes:
      en: "Dov'è = dove è (where is)"
      ko: "Dov'è = dove è (어디에 있나요)"
  - italian: quando
    translation:
      en: when
      ko: 언제
    gender: null
  - italian: come
    translation:
      en: how
      ko: 어떻게
    gender: null
  - italian: perché
    translation:
      en: why / because
      ko: 왜 / 왜냐하면
    gender: null
    notes:
      en: Same word for both 'why' and 'because'
      ko: "'왜'와 '왜냐하면' 모두 같은 단어"
  - italian: quanti / quante
    translation:
      en: how many (m/f)
      ko: 얼마나 많은 (남/여)
    gender: null
  - italian: di chi
    translation:
      en: whose
      ko: 누구의
    gender: null
    notes:
      en: "Di chi è questo libro? — Whose book is this?"
      ko: "Di chi è questo libro? — 이 책은 누구의 것인가요?"
  - italian: a che ora
    translation:
      en: at what time
      ko: 몇 시에
    gender: null
  - italian: da dove
    translation:
      en: from where
      ko: 어디에서
    gender: null
  - italian: per quanto tempo
    translation:
      en: for how long
      ko: 얼마 동안
    gender: null
  - italian: da quanto tempo
    translation:
      en: since when / for how long (ongoing)
      ko: 언제부터 / 얼마나 오래 (진행 중)
    gender: null
    notes:
      en: "Da quanto tempo studi italiano? — How long have you been studying Italian?"
      ko: "Da quanto tempo studi italiano? — 이탈리아어를 얼마나 오래 공부했나요?"
