lesson: 04_Essential_Verbs
lesson_number: 4
cefr: A1
categories:
- id: 41_essere_conjugation
  label:
    en: 4.1 Essere (to be) — Present Tense
    ko: 4.1 Essere (이다) — 현재 시제
  type: vocabulary
  words:
  - italian: essere
    translation:
      en: to be
      ko: ~이다
    gender: null
    notes:
      en: One of the two most important Italian verbs; irregular
      ko: 이탈리아어에서 가장 중요한 두 동사 중 하나; 불규칙
  - italian: (io) sono
    translation:
      en: I am
      ko: 나는 ~이다
    gender: null
  - italian: (tu) sei
    translation:
      en: you are (informal)
      ko: 너는 ~이다
    gender: null
  - italian: (lui/lei) è
    translation:
      en: he/she is
      ko: 그/그녀는 ~이다
    gender: null
  - italian: (noi) siamo
    translation:
      en: we are
      ko: 우리는 ~이다
    gender: null
  - italian: (voi) siete
    translation:
      en: you are (plural)
      ko: 너희는 ~이다
    gender: null
  - italian: (loro) sono
    translation:
      en: they are
      ko: 그들은 ~이다
    gender: null
    notes:
      en: Same form as 'io sono'; context determines meaning
      ko: "'io sono'와 형태 동일; 문맥으로 구분"
- id: 42_avere_conjugation
  label:
    en: 4.2 Avere (to have) — Present Tense
    ko: 4.2 Avere (가지다) — 현재 시제
  type: vocabulary
  words:
  - italian: avere
    translation:
      en: to have
      ko: 가지다
    gender: null
    notes:
      en: Essential auxiliary verb; the 'h' in conjugated forms is silent
      ko: 필수 보조동사; 활용형의 'h'는 묵음
  - italian: (io) ho
    translation:
      en: I have
      ko: 나는 가지고 있다
    gender: null
  - italian: (tu) hai
    translation:
      en: you have (informal)
      ko: 너는 가지고 있다
    gender: null
  - italian: (lui/lei) ha
    translation:
      en: he/she has
      ko: 그/그녀는 가지고 있다
    gender: null
  - italian: (noi) abbiamo
    translation:
      en: we have
      ko: 우리는 가지고 있다
    gender: null
  - italian: (voi) avete
    translation:
      en: you have (plural)
      ko: 너희는 가지고 있다
    gender: null
  - italian: (loro) hanno
    translation:
      en: they have
      ko: 그들은 가지고 있다
    gender: null
