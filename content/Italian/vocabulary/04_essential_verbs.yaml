      ko: 장을 보다
    gender: null
  - italian: fare una passeggiata
    translation:
      en: to take a walk
      ko: 산책하다
    gender: null
  - italian: fare il bagno
    translation:
      en: to take a bath
      ko: 목욕하다
    gender: null
  - italian: fare bel tempo
