    gender: null
  - italian: fare finta
    translation:
      en: to pretend
      ko: ~인 척하다
    gender: null
  - italian: fare attenzione
    translation:
      en: to pay attention / be careful
      ko: 주의하다 / 조심하다
    gender: null
  - italian: fare la doccia
    translation:
      en: to take a shower
      ko: 샤워하다
    gender: null
  - italian: fare un viaggio
    translation:
      en: to take a trip
      ko: 여행하다
    gender: null
  - italian: fare una foto
    translation:
      en: to take a photo
      ko: 사진을 찍다
    gender: null
- id: 44_avere_expressions
  label:
    en: 4.4 Avere Expressions (Idiomatic)
    ko: 4.4 Avere 관용 표현
  type: vocabulary
  words:
  - italian: avere fame
    translation:
      en: to be hungry
      ko: 배가 고프다
    gender: null
    notes:
      en: "Literally 'to have hunger'; Ho fame. — I'm hungry."
      ko: "직역 '배고픔을 가지다'; Ho fame. — 배가 고프다."
  - italian: avere sete
    translation:
      en: to be thirsty
      ko: 목이 마르다
    gender: null
  - italian: avere freddo
    translation:
      en: to be cold (person)
      ko: 춥다 (사람)
    gender: null
  - italian: avere caldo
    translation:
      en: to be hot (person)
      ko: 덥다 (사람)
    gender: null
  - italian: avere sonno
    translation:
      en: to be sleepy
      ko: 졸리다
    gender: null
  - italian: avere fretta
    translation:
      en: to be in a hurry
      ko: 서두르다
    gender: null
  - italian: avere paura
    translation:
      en: to be afraid
      ko: 무섭다 / 두렵다
    gender: null
  - italian: avere ragione
    translation:
      en: to be right
      ko: 옳다
    gender: null
  - italian: avere torto
    translation:
      en: to be wrong
      ko: 틀리다
    gender: null
  - italian: avere bisogno di
    translation:
      en: to need (lit. to have need of)
      ko: ~이 필요하다
    gender: null
    notes:
      en: "Ho bisogno di aiuto. — I need help."
      ko: "Ho bisogno di aiuto. — 도움이 필요합니다."
  - italian: avere voglia di
    translation:
      en: to feel like / to want
      ko: ~하고 싶다
    gender: null
    notes:
      en: "Ho voglia di un gelato. — I feel like having an ice cream."
      ko: "Ho voglia di un gelato. — 아이스크림이 먹고 싶다."
  - italian: avere mal di testa
    translation:
      en: to have a headache
      ko: 두통이 있다
    gender: null
  - italian: avere mal di stomaco
    translation:
      en: to have a stomachache
      ko: 배가 아프다
    gender: null
  - italian: avere fortuna
    translation:
      en: to be lucky
      ko: 운이 좋다
    gender: null
  - italian: avere pazienza
    translation:
      en: to have patience / be patient
      ko: 인내심이 있다
    gender: null
- id: 45_andare_stare
  label:
    en: 4.5 Movement and State Verbs
    ko: 4.5 이동 및 상태 동사
  type: vocabulary
  words:
  - italian: andare
    translation:
      en: to go
      ko: 가다
    gender: null
    notes:
      en: Irregular; io vado, tu vai, lui va, noi andiamo, voi andate, loro vanno
      ko: 불규칙; io vado, tu vai, lui va, noi andiamo, voi andate, loro vanno
  - italian: stare
    translation:
      en: to stay / to be (health/mood)
      ko: 머무르다 / ~이다 (건강/기분)
    gender: null
    notes:
      en: "Come stai? — How are you? (health/mood)"
      ko: "Come stai? — 어떻게 지내? (건강/기분)"
  - italian: venire
    translation:
      en: to come
      ko: 오다
    gender: null
    notes:
      en: Irregular; io vengo, tu vieni, lui viene
      ko: 불규칙; io vengo, tu vieni, lui viene
  - italian: uscire
    translation:
      en: to go out / to exit
      ko: 나가다
    gender: null
    notes:
      en: Irregular; io esco, tu esci, lui esce
      ko: 불규칙; io esco, tu esci, lui esce
  - italian: tornare
    translation:
      en: to return / to go back
      ko: 돌아오다 / 돌아가다
    gender: null
  - italian: restare
    translation:
      en: to stay / to remain
      ko: 머무르다 / 남다
    gender: null
  - italian: entrare
    translation:
      en: to enter / to go in
      ko: 들어가다
    gender: null
  - italian: salire
    translation:
      en: to go up / to climb
      ko: 올라가다
    gender: null
    notes:
      en: Irregular; io salgo
      ko: 불규칙; io salgo
  - italian: scendere
    translation:
      en: to go down / to descend
      ko: 내려가다
    gender: null
    notes:
      en: Irregular past participle — sceso
      ko: 불규칙 과거분사 — sceso
  - italian: camminare
    translation:
      en: to walk
      ko: 걷다
    gender: null
  - italian: cadere
    translation:
      en: to fall
      ko: 넘어지다 / 떨어지다
    gender: null
    notes:
      en: Irregular; io cado (regular), but future — cadrò
      ko: 미래형 불규칙 — cadrò
  - italian: arrivare
    translation:
      en: to arrive
      ko: 도착하다
    gender: null
  - italian: partire
    translation:
      en: to leave / to depart
      ko: 출발하다 / 떠나다
    gender: null
  - italian: passare
    translation:
      en: to pass / to spend (time)
      ko: 지나가다 / (시간을) 보내다
    gender: null
  - italian: fermarsi
    translation:
      en: to stop (oneself)
      ko: 멈추다
    gender: null
    notes:
      en: Reflexive verb; mi fermo, ti fermi, si ferma
      ko: 재귀동사; mi fermo, ti fermi, si ferma
  - italian: portare
    translation:
      en: to bring / to carry / to wear
      ko: 가져오다 / 나르다 / 입다
    gender: null
    notes:
      en: Very versatile; context determines meaning
      ko: 매우 다용도; 문맥으로 의미 구분
  - italian: dare
    translation:
      en: to give
      ko: 주다
    gender: null
    notes:
      en: Irregular; io do, tu dai, lui dà, noi diamo
      ko: 불규칙; io do, tu dai, lui dà, noi diamo
  - italian: dire
    translation:
      en: to say / to tell
      ko: 말하다
    gender: null
    notes:
      en: Irregular; io dico, tu dici, lui dice
      ko: 불규칙; io dico, tu dici, lui dice
- id: 46_c_e_ci_sono
  label:
    en: 4.6 C'è and Ci sono
    ko: 4.6 C'è와 Ci sono
  type: vocabulary
  words:
  - italian: c'è
    translation:
      en: there is
      ko: ~이 있다 (단수)
    gender: null
    notes:
      en: "Contraction of 'ci è'; C'è un problema. — There is a problem."
      ko: "'ci è'의 축약형; C'è un problema. — 문제가 있다."
  - italian: ci sono
    translation:
      en: there are
      ko: ~이 있다 (복수)
    gender: null
    notes:
      en: "Ci sono molti studenti. — There are many students."
      ko: "Ci sono molti studenti. — 많은 학생들이 있다."
  - italian: ecco
    translation:
      en: here is / here are / there you go
      ko: 여기 있습니다
    gender: null
    notes:
      en: Used to point out or present something
      ko: 무언가를 가리키거나 제시할 때 사용
  - italian: non c'è
    translation:
      en: there is not
      ko: ~이 없다 (단수)
    gender: null
  - italian: non ci sono
    translation:
      en: there are not
      ko: ~이 없다 (복수)
    gender: null
  - italian: quanti ce ne sono
    translation:
      en: how many are there
      ko: 몇 개가 있나요
    gender: null
  - italian: c'era / c'erano
    translation:
      en: there was / there were
      ko: ~이 있었다 (단수/복수)
    gender: null
    notes:
      en: Imperfect tense of c'è / ci sono
      ko: c'è / ci sono의 반과거 시제
  - italian: bisogna
    translation:
      en: it is necessary / one must
      ko: ~해야 한다 (비인칭)
    gender: null
    notes:
      en: "Impersonal verb; bisogna studiare — one must study"
      ko: "비인칭 동사; bisogna studiare — 공부해야 한다"
  - italian: basta
    translation:
      en: it is enough / that's enough
      ko: 충분하다 / 그만
    gender: null
    notes:
      en: "Basta! — Enough! / Stop!"
      ko: "Basta! — 그만! / 충분해!"
  - italian: sembra
    translation:
      en: it seems
      ko: ~인 것 같다
    gender: null
    notes:
      en: "Sembra bello. — It seems nice."
      ko: "Sembra bello. — 좋아 보인다."
  - italian: piace / piacciono
    translation:
      en: is pleasing / are pleasing
      ko: 좋아하다 (단수/복수)
    gender: null
    notes:
      en: "Mi piace il caffè. — I like coffee. (lit. Coffee is pleasing to me.)"
      ko: "Mi piace il caffè. — 커피를 좋아한다. (직역: 커피가 나를 기쁘게 한다.)"
  - italian: mancare
    translation:
      en: to miss / to lack
      ko: 그리워하다 / 부족하다
    gender: null
    notes:
      en: "Mi manchi. — I miss you. (lit. You are lacking to me.)"
      ko: "Mi manchi. — 네가 그리워. (직역: 네가 나에게 부족하다.)"
  - italian: piacere
    translation:
      en: to like / to be pleasing
      ko: 좋아하다 / 기쁘게 하다
    gender: null
    notes:
      en: Works like 'gustar' in Spanish; indirect object + piace/piacciono
      ko: 스페인어 'gustar'처럼 작동; 간접목적어 + piace/piacciono
  - italian: servire
    translation:
      en: to need / to serve
      ko: 필요하다 / 봉사하다
    gender: null
    notes:
      en: "Mi serve un libro. — I need a book."
      ko: "Mi serve un libro. — 책이 필요하다."
  - italian: succedere
    translation:
      en: to happen
      ko: 일어나다 / 발생하다
    gender: null
    notes:
      en: "Che cosa è successo? — What happened?"
      ko: "Che cosa è successo? — 무슨 일이 있었나요?"
  - italian: sembrare
    translation:
      en: to seem / to appear
      ko: ~인 것 같다 / 보이다
    gender: null
