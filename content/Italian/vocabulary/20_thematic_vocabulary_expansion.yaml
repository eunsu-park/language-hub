      ko: 환경
    gender: m
  - italian: l'inquinamento
    translation:
      en: pollution
      ko: 오염
    gender: m
  - italian: il riciclaggio
    translation:
      en: recycling
      ko: 재활용
    gender: m
    notes:
      en: Also 'il riciclo' in everyday speech
      ko: 일상에서 'il riciclo'도 사용
  - italian: l'energia rinnovabile
    translation:
      en: renewable energy
      ko: 재생 에너지
    gender: f
  - italian: il riscaldamento globale
    translation:
      en: global warming
      ko: 지구 온난화
    gender: m
  - italian: la sostenibilità
    translation:
      en: sustainability
      ko: 지속 가능성
    gender: f
  - italian: i rifiuti
    translation:
      en: waste / rubbish
      ko: 쓰레기 / 폐기물
    gender: m
    notes:
      en: Plural noun; 'il rifiuto' (singular) means 'refusal'
      ko: 복수 명사; 'il rifiuto'(단수)는 '거절'을 의미
  - italian: la raccolta differenziata
    translation:
      en: waste sorting / recycling collection
      ko: 분리수거
    gender: f
    notes:
      en: Very important in Italian daily life; separate bins for each material
      ko: 이탈리아 일상에서 매우 중요; 재질별 분리 수거함
  - italian: il cambiamento climatico
    translation:
      en: climate change
      ko: 기후 변화
    gender: m
  - italian: l'effetto serra
    translation:
      en: the greenhouse effect
      ko: 온실 효과
    gender: m
  - italian: la biodiversità
    translation:
      en: biodiversity
      ko: 생물 다양성
    gender: f
  - italian: lo smaltimento
    translation:
      en: disposal (of waste)
      ko: (폐기물) 처리
    gender: m
- id: health
  label:
    en: Health and Medicine
    ko: 건강과 의학
  type: vocabulary
  words:
  - italian: la salute
    translation:
      en: health
      ko: 건강
    gender: f
    notes:
      en: "'Salute!' is also said when someone sneezes"
      ko: "'Salute!'는 재채기할 때도 사용"
  - italian: il medico
    translation:
      en: the doctor
      ko: 의사
    gender: m
    notes:
      en: "'La medica' is increasingly used for female doctors"
      ko: 여성 의사에게 'la medica'가 점점 더 많이 사용됨
  - italian: la ricetta
    translation:
      en: the prescription / recipe
      ko: 처방전 / 레시피
    gender: f
    notes:
      en: Context determines meaning; medical or cooking
      ko: 문맥에 따라 의미가 결정됨; 의료 또는 요리
  - italian: la medicina
    translation:
      en: the medicine / medication
      ko: 약 / 의학
    gender: f
  - italian: il sintomo
    translation:
      en: the symptom
      ko: 증상
    gender: m
  - italian: la diagnosi
    translation:
      en: the diagnosis
      ko: 진단
    gender: f
    notes:
      en: Invariable; same form in singular and plural
      ko: 불변; 단수와 복수가 같은 형태
  - italian: la terapia
    translation:
      en: the therapy / treatment
      ko: 치료 / 요법
    gender: f
  - italian: l'intervento
    translation:
      en: the surgery / intervention
      ko: 수술 / 개입
    gender: m
    notes:
      en: "'Intervento chirurgico' for surgical operation"
      ko: 외과 수술은 'intervento chirurgico'
  - italian: guarire
    translation:
      en: to heal / to recover
      ko: 치유되다 / 회복하다
    gender: null
    notes:
      en: Conjugates with -isc- (guarisco, guarisci...)
      ko: -isc-로 활용 (guarisco, guarisci...)
  - italian: ammalarsi
    translation:
      en: to get sick / to fall ill
      ko: 병에 걸리다
    gender: null
    notes:
      en: Reflexive verb; 'mi sono ammalato/a'
      ko: 재귀 동사; 'mi sono ammalato/a'
  - italian: il pronto soccorso
    translation:
      en: the emergency room
      ko: 응급실
    gender: m
    notes:
      en: Lit. 'first aid'; the ER in Italian hospitals
      ko: 직역 '응급 처치'; 이탈리아 병원의 응급실
  - italian: la visita medica
    translation:
      en: the medical examination
      ko: 진찰 / 건강 검진
    gender: f
- id: word_formation
  label:
    en: Word Formation Patterns
    ko: 단어 형성 패턴
  type: vocabulary
  words:
  - italian: "-ino / -ina (diminutive)"
    translation:
      en: "small, little, cute (e.g., gatto → gattino)"
      ko: "작은, 귀여운 (예: gatto → gattino)"
    gender: null
    notes:
      en: Most common diminutive suffix; 'un momentino' = just a moment
      ko: 가장 흔한 축소 접미사; 'un momentino' = 잠깐만
  - italian: "-etto / -etta (diminutive)"
    translation:
      en: "small, little (e.g., casa → casetta)"
      ko: "작은 (예: casa → casetta)"
    gender: null
    notes:
      en: Often implies affection; 'una cosetta' = a little thing
      ko: 종종 애정을 내포; 'una cosetta' = 작은 것
  - italian: "-ello / -ella (diminutive)"
    translation:
      en: "small (e.g., paese → paesello)"
      ko: "작은 (예: paese → paesello)"
    gender: null
    notes:
      en: Less common; more literary flavor
      ko: 덜 흔함; 더 문학적인 느낌
  - italian: "-one / -ona (augmentative)"
    translation:
      en: "big, large (e.g., libro → librone)"
      ko: "큰 (예: libro → librone)"
    gender: null
    notes:
      en: Can change gender; 'la donna → il donnone'
      ko: 성이 바뀔 수 있음; 'la donna → il donnone'
  - italian: "-accio / -accia (pejorative)"
    translation:
      en: "bad, ugly (e.g., tempo → tempaccio)"
      ko: "나쁜, 못생긴 (예: tempo → tempaccio)"
    gender: null
    notes:
      en: Adds negative connotation; 'una parolaccia' = a bad word
      ko: 부정적 의미 추가; 'una parolaccia' = 나쁜 말
  - italian: "ri- (prefix: again)"
    translation:
      en: "again, re- (e.g., fare → rifare)"
      ko: "다시, 재- (예: fare → rifare)"
    gender: null
    notes:
      en: Same as English 're-'; very productive prefix
      ko: 영어 're-'와 동일; 매우 생산적인 접두사
  - italian: "s- (prefix: un-, dis-)"
    translation:
      en: "un-, dis- (e.g., fare → sfare, fortuna → sfortuna)"
      ko: "부정-, 반- (예: fare → sfare, fortuna → sfortuna)"
    gender: null
    notes:
      en: Reverses or negates the base word
      ko: 기본 단어를 반전시키거나 부정함
  - italian: "in- / im- (prefix: not)"
    translation:
      en: "not, un- (e.g., possibile → impossibile)"
      ko: "불-, 비- (예: possibile → impossibile)"
    gender: null
    notes:
      en: "'In-' before most consonants; 'im-' before b, m, p"
      ko: 대부분의 자음 앞에서 'in-'; b, m, p 앞에서 'im-'
  - italian: "-mente (adverb suffix)"
    translation:
      en: "-ly (e.g., lento → lentamente)"
      ko: "-하게 (예: lento → lentamente)"
    gender: null
    notes:
      en: Added to feminine form of adjective; drop final -e for -le/-re adjectives
      ko: 형용사의 여성형에 추가; -le/-re 형용사는 어미 -e를 탈락
