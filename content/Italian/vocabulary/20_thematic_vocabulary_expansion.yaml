lesson: 20_Thematic_Vocabulary_Expansion
lesson_number: 20
cefr: B2
categories:
- id: technology
  label:
    en: Technology
    ko: 기술
  type: vocabulary
  words:
  - italian: il computer
    translation:
      en: the computer
      ko: 컴퓨터
    gender: m
    notes:
      en: Also 'il calcolatore' (formal/technical)
      ko: "'il calcolatore'도 사용 (격식/기술용어)"
  - italian: lo schermo
    translation:
      en: the screen / monitor
      ko: 화면 / 모니터
    gender: m
  - italian: la tastiera
    translation:
      en: the keyboard
      ko: 키보드
    gender: f
  - italian: il mouse
    translation:
      en: the mouse
      ko: 마우스
    gender: m
    notes:
      en: English loanword; invariable plural ('i mouse')
      ko: 영어 차용어; 복수형 불변 ('i mouse')
  - italian: il software
    translation:
      en: the software
      ko: 소프트웨어
    gender: m
    notes:
      en: English loanword; invariable
      ko: 영어 차용어; 불변
  - italian: l'applicazione
    translation:
      en: the application / app
      ko: 애플리케이션 / 앱
    gender: f
    notes:
      en: Shortened to 'la app' in informal speech
      ko: 비격식에서 'la app'으로 줄여 사용
  - italian: il sito web
    translation:
      en: the website
      ko: 웹사이트
    gender: m
  - italian: la password
    translation:
      en: the password
      ko: 비밀번호
    gender: f
    notes:
      en: English loanword; also 'la parola d'ordine' or 'la chiave d'accesso'
      ko: 영어 차용어; 'la parola d'ordine'나 'la chiave d'accesso'도 사용
  - italian: scaricare
    translation:
      en: to download
      ko: 다운로드하다
    gender: null
    notes:
      en: Also means 'to unload' in general sense
      ko: 일반적으로 '내리다'라는 뜻도 있음
  - italian: caricare
    translation:
      en: to upload / to charge
      ko: 업로드하다 / 충전하다
    gender: null
  - italian: cliccare
    translation:
      en: to click
      ko: 클릭하다
    gender: null
    notes:
      en: Italianized from English 'click'
      ko: 영어 'click'에서 이탈리아어화
  - italian: navigare
    translation:
      en: to browse / to navigate (the web)
      ko: (웹을) 탐색하다 / 검색하다
    gender: null
    notes:
      en: "'Navigare in Internet' = to browse the Internet"
      ko: "'navigare in Internet' = 인터넷을 탐색하다"
  - italian: la rete
    translation:
      en: the network / the internet
      ko: 네트워크 / 인터넷
    gender: f
    notes:
      en: "'La Rete' (capitalized) often means the Internet"
      ko: "'La Rete'(대문자)는 종종 인터넷을 의미"
  - italian: il collegamento
    translation:
      en: the connection / link
      ko: 연결 / 링크
    gender: m
  - italian: il file
    translation:
      en: the file
      ko: 파일
    gender: m
    notes:
      en: English loanword; invariable plural
      ko: 영어 차용어; 복수형 불변
  - italian: la stampante
    translation:
      en: the printer
      ko: 프린터
    gender: f
  - italian: il dispositivo
    translation:
      en: the device
      ko: 장치
    gender: m
- id: social_media
  label:
    en: Social Media
    ko: 소셜 미디어
  type: vocabulary
  words:
  - italian: il profilo
    translation:
      en: the profile
      ko: 프로필
    gender: m
  - italian: il post
    translation:
      en: the post
      ko: 게시물
    gender: m
    notes:
      en: English loanword; 'pubblicare un post' = to publish a post
      ko: 영어 차용어; 'pubblicare un post' = 게시물을 올리다
  - italian: il follower
    translation:
      en: the follower
      ko: 팔로워
    gender: m
    notes:
      en: English loanword; also 'il seguace' (less common online)
      ko: 영어 차용어; 'il seguace'도 사용 (온라인에서 덜 흔함)
  - italian: il like / il mi piace
    translation:
      en: the like
      ko: 좋아요
    gender: m
    notes:
      en: "'Mi piace' is the Italian translation used on Facebook"
      ko: "'mi piace'는 페이스북에서 사용하는 이탈리아어 번역"
  - italian: condividere
    translation:
      en: to share
      ko: 공유하다
    gender: null
    notes:
      en: Irregular past participle 'condiviso'
      ko: 불규칙 과거분사 'condiviso'
  - italian: commentare
    translation:
      en: to comment
      ko: 댓글 달다
    gender: null
  - italian: pubblicare
    translation:
      en: to publish / to post
      ko: 게시하다 / 올리다
    gender: null
  - italian: l'hashtag
    translation:
      en: the hashtag
      ko: 해시태그
    gender: m
    notes:
      en: English loanword; widely used in Italian social media
      ko: 영어 차용어; 이탈리아 소셜 미디어에서 널리 사용
  - italian: la storia
    translation:
      en: the story (social media)
      ko: 스토리 (소셜 미디어)
    gender: f
    notes:
      en: Instagram/Facebook stories; also means 'story/history'
      ko: 인스타그램/페이스북 스토리; '이야기/역사'라는 뜻도 있음
  - italian: il reel
    translation:
      en: the reel (short video)
      ko: 릴 (짧은 동영상)
    gender: m
  - italian: il contenuto
    translation:
      en: the content
      ko: 콘텐츠
    gender: m
  - italian: l'influencer
    translation:
      en: the influencer
      ko: 인플루언서
    gender: m/f
    notes:
      en: English loanword; gender follows the person
      ko: 영어 차용어; 성별은 사람에 따름
- id: environment
  label:
    en: Environment
