      ko: 이탈리아에서는 법적으로 가게를 나올 때 영수증을 소지해야 함
  - italian: provare
    translation:
      en: to try / to try on
      ko: 시도하다 / 입어보다
    gender: null
  - italian: costare
    translation:
      en: to cost
      ko: 비용이 들다
    gender: null
    notes:
      en: "Quanto costa? — How much does it cost?"
      ko: "Quanto costa? — 얼마예요?"
  - italian: comprare
    translation:
      en: to buy
      ko: 사다
    gender: null
  - italian: vendere
    translation:
      en: to sell
      ko: 팔다
    gender: null
  - italian: i saldi
    translation:
      en: the sales (seasonal)
      ko: 세일 (시즌)
    gender: m
  - italian: la vetrina
    translation:
      en: the shop window / display
      ko: 진열장 / 쇼윈도
    gender: f
  - italian: il camerino
    translation:
      en: the fitting room
      ko: 탈의실
    gender: m
  - italian: la cassa
    translation:
      en: the cash register / checkout
      ko: 계산대
    gender: f
  - italian: il sacchetto
    translation:
      en: the bag (shopping)
      ko: 봉투 (쇼핑)
    gender: m
- id: 95_directions
  label:
    en: 9.5 Directions
    ko: 9.5 길 안내
  type: vocabulary
  words:
  - italian: a destra
    translation:
      en: to the right
      ko: 오른쪽으로
    gender: null
  - italian: a sinistra
    translation:
      en: to the left
      ko: 왼쪽으로
    gender: null
  - italian: dritto / diritto
    translation:
      en: straight ahead
      ko: 직진
    gender: null
    notes:
      en: Both forms are acceptable
      ko: 두 형태 모두 사용 가능
  - italian: vicino
    translation:
      en: near / close
      ko: 가까운
    gender: null
    notes:
      en: "Vicino a = near to"
      ko: "vicino a = ~에 가까운"
  - italian: lontano
    translation:
      en: far
      ko: 먼
    gender: null
    notes:
      en: "Lontano da = far from"
      ko: "lontano da = ~에서 먼"
  - italian: l'angolo
    translation:
      en: the corner
      ko: 모퉁이
    gender: m
  - italian: la fermata
    translation:
      en: the stop (bus/tram)
      ko: 정류장 (버스/트램)
    gender: f
  - italian: il semaforo
    translation:
      en: the traffic light
      ko: 신호등
    gender: m
  - italian: attraversare
    translation:
      en: to cross
      ko: 건너다
    gender: null
    notes:
      en: "Attraversare la strada — to cross the street"
      ko: "attraversare la strada — 길을 건너다"
  - italian: girare
    translation:
      en: to turn
      ko: 돌다 / 회전하다
    gender: null
    notes:
      en: "Girare a destra — turn right"
      ko: "girare a destra — 오른쪽으로 돌다"
  - italian: continuare
    translation:
      en: to continue
      ko: 계속하다
    gender: null
  - italian: la mappa
    translation:
      en: the map
      ko: 지도
    gender: f
  - italian: l'incrocio
    translation:
      en: the intersection / crossroads
      ko: 교차로
    gender: m
  - italian: la rotonda
    translation:
      en: the roundabout
      ko: 로터리
    gender: f
  - italian: il marciapiede
    translation:
      en: the sidewalk
      ko: 인도 / 보도
    gender: m
  - italian: la via
    translation:
      en: the street / way
      ko: 거리 / 길
    gender: f
    notes:
      en: Often used in addresses — Via Roma, Via Dante
      ko: 주소에서 자주 사용 — Via Roma, Via Dante
