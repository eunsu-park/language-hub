lesson: 19_Idioms_Proverbs_and_Colloquial_Expressions
lesson_number: 19
cefr: B2
categories:
- id: body_idioms
  label:
    en: Body-Related Idioms
    ko: 신체 관련 관용구
  type: vocabulary
  words:
  - italian: In bocca al lupo!
    translation:
      en: Good luck! (lit. 'In the mouth of the wolf')
      ko: 행운을 빌어! (직역 '늑대의 입 속에')
    gender: null
    notes:
      en: "Reply: 'Crepi il lupo!' (May the wolf die!)"
      ko: "대답: 'Crepi il lupo!' (늑대가 죽기를!)"
  - italian: avere le mani in pasta
    translation:
      en: to have a finger in every pie
      ko: 모든 일에 관여하다
    gender: null
    notes:
      en: Lit. 'to have hands in the dough'; to be involved in everything
      ko: 직역 '반죽에 손을 넣다'; 모든 일에 관여하다
  - italian: costare un occhio della testa
    translation:
      en: to cost an arm and a leg
      ko: 엄청나게 비싸다
    gender: null
    notes:
      en: Lit. 'to cost an eye from the head'
      ko: 직역 '머리에서 눈 하나만큼 비싸다'
  - italian: non avere peli sulla lingua
    translation:
      en: to not mince words / to be blunt
      ko: 직설적으로 말하다
    gender: null
    notes:
      en: Lit. 'to have no hairs on the tongue'
      ko: 직역 '혀에 털이 없다'
  - italian: avere il cuore in gola
    translation:
      en: to have one's heart in one's throat
      ko: 가슴이 두근거리다 / 매우 긴장하다
    gender: null
    notes:
      en: To be extremely anxious or excited
      ko: 극도로 불안하거나 흥분한 상태
  - italian: dare una mano
    translation:
      en: to lend a hand / to help
      ko: 도움을 주다
    gender: null
    notes:
      en: Lit. 'to give a hand'
      ko: 직역 '손을 주다'
  - italian: a occhio e croce
    translation:
      en: roughly / approximately
      ko: 대충 / 대략
    gender: null
    notes:
      en: Lit. 'by eye and cross'; to estimate
      ko: 직역 '눈과 십자가로'; 어림잡다
  - italian: alzare il gomito
    translation:
      en: to drink too much
      ko: 술을 너무 많이 마시다
    gender: null
    notes:
      en: Lit. 'to raise the elbow'
      ko: 직역 '팔꿈치를 올리다'
  - italian: avere la testa fra le nuvole
    translation:
      en: to have one's head in the clouds
      ko: 멍하게 있다 / 딴 생각을 하다
    gender: null
    notes:
      en: To be absent-minded or daydreaming
      ko: 멍하거나 공상에 빠진 상태
  - italian: chiudere un occhio
    translation:
      en: to turn a blind eye
      ko: 눈감아 주다
    gender: null
    notes:
      en: Lit. 'to close one eye'
      ko: 직역 '한쪽 눈을 감다'
  - italian: avere le mani bucate
    translation:
      en: to be a spendthrift
      ko: 돈을 물 쓰듯 하다
    gender: null
    notes:
      en: Lit. 'to have holey hands'; money slips through
      ko: 직역 '구멍 뚫린 손을 가지다'; 돈이 빠져나감
  - italian: metterci il naso
    translation:
      en: to stick one's nose in / to be nosy
      ko: 참견하다 / 코를 들이밀다
    gender: null
    notes:
      en: Lit. 'to put one's nose in it'
      ko: 직역 '코를 거기에 넣다'
  - italian: essere in gamba
    translation:
      en: to be capable / smart
      ko: 유능하다 / 똑똑하다
    gender: null
    notes:
      en: Lit. 'to be in leg'; a very common compliment
      ko: 직역 '다리 안에 있다'; 매우 흔한 칭찬
  - italian: rompere le scatole
    translation:
      en: to annoy / to bother
      ko: 성가시게 하다 / 귀찮게 하다
    gender: null
    notes:
      en: Lit. 'to break the boxes'; polite version of a vulgar idiom
      ko: 직역 '상자를 깨다'; 속된 관용구의 공손한 버전
- id: food_idioms
  label:
    en: Food-Related Idioms
    ko: 음식 관련 관용구
  type: vocabulary
  words:
  - italian: rendere pan per focaccia
    translation:
      en: to give tit for tat / to get even
      ko: 눈에는 눈 이에는 이
    gender: null
    notes:
      en: Lit. 'to return bread for focaccia'
      ko: 직역 '포카치아에 대해 빵으로 갚다'
  - italian: essere al verde
    translation:
      en: to be broke
      ko: 무일푼이다
    gender: null
    notes:
      en: Lit. 'to be at the green'; origin from candle bottoms being green
      ko: 직역 '초록에 있다'; 양초 바닥이 초록색이었던 것에서 유래
  - italian: fare il portoghese
    translation:
      en: to sneak in without paying
      ko: 무임승차하다
    gender: null
    notes:
      en: Lit. 'to act like a Portuguese'; historical origin from a diplomatic event
      ko: 직역 '포르투갈인처럼 행동하다'; 외교 행사에서 유래
  - italian: salvare capra e cavoli
    translation:
      en: to have your cake and eat it too
      ko: 두 마리 토끼를 잡다
    gender: null
    notes:
      en: Lit. 'to save the goat and the cabbages'
      ko: 직역 '염소와 양배추를 모두 구하다'
  - italian: acqua in bocca!
    translation:
      en: keep it a secret! / mum's the word!
      ko: 비밀이야! / 말하지 마!
    gender: null
    notes:
      en: Lit. 'water in the mouth!'
      ko: 직역 '입에 물을!'
  - italian: non è farina del suo sacco
    translation:
      en: it's not his/her own work
      ko: 본인의 작품이 아니다
    gender: null
    notes:
      en: Lit. 'it's not flour from his bag'; implies plagiarism
      ko: 직역 '그의 자루에서 나온 밀가루가 아니다'; 표절을 암시
  - italian: avere sale in zucca
    translation:
      en: to have common sense
      ko: 상식이 있다
    gender: null
    notes:
      en: Lit. 'to have salt in the pumpkin (head)'
      ko: 직역 '호박(머리)에 소금이 있다'
  - italian: essere come il prezzemolo
    translation:
      en: to be everywhere / to show up everywhere
      ko: 어디에나 나타나다
    gender: null
    notes:
      en: Lit. 'to be like parsley'; parsley appears in many dishes
      ko: 직역 '파슬리 같다'; 파슬리가 많은 요리에 등장하므로
  - italian: fare le nozze con i fichi secchi
    translation:
      en: to do something on the cheap
      ko: 적은 비용으로 무언가를 하다
    gender: null
    notes:
      en: Lit. 'to have a wedding with dried figs'
      ko: 직역 '말린 무화과로 결혼식을 하다'
- id: proverbs
  label:
    en: Italian Proverbs
    ko: 이탈리아 속담
  type: vocabulary
  words:
  - italian: Chi dorme non piglia pesci.
    translation:
      en: The early bird catches the worm.
      ko: 일찍 일어나는 새가 벌레를 잡는다.
    gender: null
    notes:
      en: Lit. 'He who sleeps doesn't catch fish.'
      ko: 직역 '자는 자는 물고기를 잡지 못한다.'
  - italian: Tra il dire e il fare c'è di mezzo il mare.
    translation:
      en: Easier said than done.
      ko: 말하기는 쉽지만 행하기는 어렵다.
    gender: null
    notes:
      en: Lit. 'Between saying and doing, there's the sea in between.'
      ko: 직역 '말하는 것과 행하는 것 사이에 바다가 있다.'
  - italian: L'appetito vien mangiando.
    translation:
      en: Appetite comes with eating. / The more you have, the more you want.
      ko: 먹다 보면 식욕이 생긴다. / 많이 가질수록 더 원한다.
    gender: null
    notes:
      en: Also used figuratively about ambition or desire
      ko: 야망이나 욕망에 대해서도 비유적으로 사용
  - italian: Chi la fa l'aspetti.
    translation:
      en: What goes around comes around.
      ko: 뿌린 대로 거둔다.
    gender: null
    notes:
      en: Lit. 'He who does it should expect it (in return).'
      ko: 직역 '그렇게 하는 자는 (되돌아오는 것을) 기대해야 한다.'
  - italian: Tutto il mondo è paese.
    translation:
      en: People are the same everywhere.
      ko: 세상 어디나 다 마찬가지다.
    gender: null
    notes:
      en: Lit. 'The whole world is a village.'
      ko: 직역 '온 세상이 하나의 마을이다.'
  - italian: Chi trova un amico trova un tesoro.
    translation:
      en: A friend in need is a friend indeed.
      ko: 친구를 찾는 자는 보물을 찾는다.
    gender: null
    notes:
      en: Lit. 'He who finds a friend finds a treasure.'
      ko: 직역 '친구를 찾은 자는 보물을 찾은 것이다.'
  - italian: Meglio tardi che mai.
    translation:
      en: Better late than never.
      ko: 안 하는 것보다 늦게라도 하는 게 낫다.
    gender: null
    notes:
      en: Universal proverb with the same meaning in many languages
      ko: 여러 언어에서 같은 의미를 가진 보편적 속담
  - italian: Non tutte le ciambelle riescono col buco.
    translation:
      en: Things don't always turn out as planned.
      ko: 일이 항상 계획대로 되지는 않는다.
    gender: null
    notes:
      en: Lit. 'Not all doughnuts come out with a hole.'
      ko: 직역 '모든 도넛이 구멍이 뚫려 나오지는 않는다.'
  - italian: L'erba del vicino è sempre più verde.
    translation:
      en: The grass is always greener on the other side.
      ko: 남의 떡이 커 보인다.
    gender: null
    notes:
      en: Lit. 'The neighbor's grass is always greener.'
      ko: 직역 '이웃의 잔디가 항상 더 푸르다.'
  - italian: Paese che vai, usanza che trovi.
    translation:
      en: When in Rome, do as the Romans do.
      ko: 로마에서는 로마법을 따르라.
    gender: null
    notes:
      en: Lit. 'Whatever country you go to, you find its customs.'
      ko: 직역 '가는 나라마다 그 풍습을 발견한다.'
- id: colloquial
  label:
    en: Colloquial Expressions
    ko: 구어 표현
  type: vocabulary
  words:
  - italian: figurati
    translation:
      en: don't mention it / no problem / imagine that
      ko: 천만에요 / 괜찮아 / 생각해 봐
    gender: null
    notes:
      en: Informal; formal form is 'si figuri'
      ko: 비격식; 격식체는 'si figuri'
  - italian: magari
    translation:
      en: if only / I wish / maybe
      ko: 그랬으면 좋겠다 / 아마도
    gender: null
    notes:
      en: One of the most versatile Italian words; expresses desire or possibility
      ko: 가장 다재다능한 이탈리아어 단어 중 하나; 소망이나 가능성 표현
  - italian: boh
    translation:
      en: I dunno / who knows
      ko: 모르겠어 / 누가 알겠어
    gender: null
    notes:
      en: Very common filler expressing uncertainty; accompanied by a shrug
      ko: 불확실함을 나타내는 매우 흔한 표현; 어깨를 으쓱하며 사용
  - italian: mah
    translation:
      en: well... / I'm not sure
      ko: 글쎄... / 잘 모르겠어
    gender: null
    notes:
      en: Expresses doubt or hesitation
      ko: 의심이나 망설임 표현
  - italian: dai
    translation:
      en: come on! / really?
      ko: 어서! / 정말?
    gender: null
    notes:
      en: From 'dare' (to give); extremely common in conversation
      ko: "'dare'(주다)에서 유래; 대화에서 매우 흔함"
  - italian: basta
    translation:
      en: enough! / that's it!
      ko: 그만! / 됐어!
    gender: null
    notes:
      en: Can express frustration or simply mean 'that's sufficient'
      ko: 좌절감을 표현하거나 단순히 '충분하다'를 의미
  - italian: che figata!
    translation:
      en: how cool! / awesome!
      ko: 대박! / 멋지다!
    gender: null
    notes:
      en: Informal/slang; very common among younger speakers
      ko: 비격식/속어; 젊은 화자들 사이에서 매우 흔함
  - italian: che palle!
    translation:
      en: what a drag! / how annoying!
      ko: 짜증나! / 귀찮아!
    gender: null
    notes:
      en: Mildly vulgar expression of frustration
      ko: 약간 속된 좌절감 표현
  - italian: roba da matti
    translation:
      en: it's crazy / unbelievable stuff
      ko: 미친 짓이야 / 말도 안 돼
    gender: null
    notes:
      en: Lit. 'stuff for crazy people'
      ko: 직역 '미친 사람들을 위한 것'
  - italian: macché
    translation:
      en: no way! / not at all!
      ko: 절대 아니야! / 전혀!
    gender: null
    notes:
      en: Strong denial or dismissal
      ko: 강한 부정 또는 거부
  - italian: che cavolo!
    translation:
      en: what the heck!
      ko: 이게 뭐야! / 도대체!
    gender: null
    notes:
      en: Lit. 'what cabbage!'; euphemistic substitute for a vulgar word
      ko: 직역 '이게 무슨 양배추야!'; 속된 표현의 완곡한 대체어
  - italian: mica
    translation:
      en: not at all / by no means
      ko: 전혀 ~아니다
    gender: null
    notes:
      en: Reinforces negation; 'Non è mica facile' = It's not easy at all
      ko: 부정을 강화; 'Non è mica facile' = 전혀 쉽지 않다
  - italian: per carità!
    translation:
      en: for goodness' sake! / absolutely not!
      ko: 제발! / 절대 안 돼!
    gender: null
    notes:
      en: Lit. 'for charity!'; strong refusal or exclamation
      ko: 직역 '자선을 위해!'; 강한 거부 또는 감탄
