- id: past_tense_example_phrases
  label:
    en: Past Tense Example Phrases
    ko: 과거 시제 예문
  type: vocabulary
  words:
  - italian: Ieri sono andato al cinema.
    translation:
      en: Yesterday I went to the cinema.
      ko: 어제 영화관에 갔다.
    gender: null
    notes:
      en: Passato prossimo -- completed action with specific time
      ko: 근과거 -- 특정 시점의 완료된 행동
  - italian: Quando ero bambino, giocavo molto.
    translation:
      en: When I was a child, I used to play a lot.
      ko: 어렸을 때 많이 놀곤 했다.
    gender: null
    notes:
      en: Imperfetto -- habitual past action
      ko: 반과거 -- 습관적 과거 행동
  - italian: Pioveva quando sono uscito di casa.
    translation:
      en: It was raining when I left the house.
      ko: 내가 집을 나섰을 때 비가 오고 있었다.
    gender: null
    notes:
      en: Imperfetto (background) + passato prossimo (interruption)
      ko: 반과거 (배경) + 근과거 (중단)
  - italian: Ho conosciuto mia moglie nel 2010.
    translation:
      en: I met my wife in 2010.
      ko: 2010년에 아내를 만났다.
    gender: null
    notes:
      en: Passato prossimo -- 'conoscere' in p.p. means 'met'
      ko: 근과거 -- 'conoscere'의 근과거는 '만나다'
  - italian: Faceva caldo e il sole brillava.
    translation:
      en: It was hot and the sun was shining.
      ko: 날씨가 덥고 해가 빛나고 있었다.
    gender: null
    notes:
      en: Imperfetto -- setting/weather description
      ko: 반과거 -- 배경/날씨 묘사
  - italian: Mentre studiavo, è arrivato il mio amico.
    translation:
      en: While I was studying, my friend arrived.
      ko: 내가 공부하는 동안 친구가 왔다.
    gender: null
    notes:
      en: Imperfetto (ongoing) interrupted by passato prossimo
      ko: 반과거 (진행) 중 근과거로 중단
  - italian: Ogni estate andavamo al mare.
    translation:
      en: Every summer we used to go to the seaside.
      ko: 매 여름마다 바다에 가곤 했다.
    gender: null
    notes:
      en: Imperfetto -- recurring past action
      ko: 반과거 -- 반복적 과거 행동
  - italian: Mi sono svegliato e ho fatto colazione.
    translation:
      en: I woke up and had breakfast.
      ko: 나는 일어나서 아침을 먹었다.
    gender: null
    notes:
      en: Passato prossimo -- chain of completed actions
      ko: 근과거 -- 완료된 행동의 연쇄
  - italian: Aveva paura ma lo ha fatto.
    translation:
      en: She was afraid but she did it.
      ko: 그녀는 무서웠지만 해냈다.
    gender: null
    notes:
      en: Imperfetto (emotion) + passato prossimo (action)
      ko: 반과거 (감정) + 근과거 (행동)
  - italian: Sapevo la verità.
    translation:
      en: I knew the truth.
      ko: 나는 진실을 알고 있었다.
    gender: null
    notes:
      en: Imperfetto -- ongoing state of knowledge
      ko: 반과거 -- 지속적인 앎의 상태
  - italian: Ho saputo la verità.
    translation:
      en: I found out the truth.
      ko: 나는 진실을 알게 되었다.
    gender: null
    notes:
      en: Passato prossimo -- moment of discovery
      ko: 근과거 -- 알게 된 순간
  - italian: Erano le tre quando è arrivato.
    translation:
      en: It was three o'clock when he arrived.
      ko: 그가 도착했을 때 세 시였다.
    gender: null
    notes:
      en: Imperfetto for time + passato prossimo for event
      ko: 시간은 반과거 + 사건은 근과거
