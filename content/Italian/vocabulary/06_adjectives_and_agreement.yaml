    translation:
      en: nice / likeable (m/f)
      ko: 호감가는 / 상냥한 (남/여)
    gender: null
    notes:
      en: False friend — does NOT mean 'sympathetic'
      ko: "거짓 동족어 — '동정적인'이라는 뜻이 아님"
