    ko: 6.1 서술 형용사
  type: vocabulary
  words:
  - italian: grande
    translation:
      en: big / large / great
      ko: 큰 / 위대한
    gender: null
    notes:
      en: Same form for m/f; can precede noun for emphasis
      ko: 남/녀 형태 동일; 강조를 위해 명사 앞에 올 수 있음
  - italian: piccolo / piccola
    translation:
      en: small / little (m/f)
      ko: 작은 (남/여)
