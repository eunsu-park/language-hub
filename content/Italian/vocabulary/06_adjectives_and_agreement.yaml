- id: 64_comparatives
  label:
    en: 6.4 Comparatives and Superlatives
    ko: 6.4 비교급과 최상급
  type: vocabulary
  words:
  - italian: più
    translation:
      en: more
      ko: 더
    gender: null
    notes:
      en: "più + adj + di = more ... than"
      ko: "più + 형용사 + di = ~보다 더 ..."
  - italian: meno
    translation:
      en: less
      ko: 덜
    gender: null
    notes:
      en: "meno + adj + di = less ... than"
      ko: "meno + 형용사 + di = ~보다 덜 ..."
  - italian: come
    translation:
      en: as / like
      ko: ~처럼 / ~만큼
    gender: null
    notes:
      en: "così ... come = as ... as (così is often omitted)"
      ko: "così ... come = ~만큼 ... (così는 종종 생략)"
  - italian: tanto / tanta
    translation:
      en: as much / so much (m/f)
      ko: ~만큼 / 그만큼 (남/여)
    gender: null
    notes:
      en: "tanto ... quanto = as much ... as"
      ko: "tanto ... quanto = ~만큼 ..."
  - italian: quanto / quanta
    translation:
      en: as much as (m/f)
      ko: ~만큼 (남/여)
    gender: null
  - italian: migliore
    translation:
      en: better (adj)
      ko: 더 좋은
    gender: null
    notes:
      en: Irregular comparative of 'buono'
      ko: "'buono'의 불규칙 비교급"
  - italian: peggiore
    translation:
      en: worse (adj)
      ko: 더 나쁜
    gender: null
    notes:
      en: Irregular comparative of 'cattivo'
      ko: "'cattivo'의 불규칙 비교급"
  - italian: maggiore
    translation:
      en: greater / older (sibling)
      ko: 더 큰 / 손위의
    gender: null
    notes:
      en: Irregular comparative of 'grande'
      ko: "'grande'의 불규칙 비교급"
  - italian: minore
    translation:
      en: lesser / younger (sibling)
      ko: 더 작은 / 손아래의
    gender: null
    notes:
      en: Irregular comparative of 'piccolo'
      ko: "'piccolo'의 불규칙 비교급"
  - italian: il/la più
    translation:
      en: the most (superlative)
      ko: 가장 (최상급)
    gender: null
    notes:
      en: "il più grande = the biggest"
      ko: "il più grande = 가장 큰"
  - italian: meglio
    translation:
      en: better (adv)
      ko: 더 잘
    gender: null
    notes:
      en: "Adverb form; migliore is the adjective"
      ko: "부사 형태; 형용사는 migliore"
  - italian: peggio
    translation:
      en: worse (adv)
      ko: 더 나쁘게
    gender: null
    notes:
      en: "Adverb form; peggiore is the adjective"
      ko: "부사 형태; 형용사는 peggiore"
  - italian: ottimo / ottima
    translation:
      en: excellent / very good (m/f)
      ko: 훌륭한 / 매우 좋은 (남/여)
    gender: null
    notes:
      en: Absolute superlative of 'buono'
      ko: "'buono'의 절대 최상급"
  - italian: pessimo / pessima
    translation:
      en: terrible / very bad (m/f)
      ko: 최악의 / 매우 나쁜 (남/여)
    gender: null
    notes:
      en: Absolute superlative of 'cattivo'
      ko: "'cattivo'의 절대 최상급"
  - italian: bellissimo / bellissima
    translation:
      en: very beautiful (m/f)
      ko: 매우 아름다운 (남/여)
    gender: null
    notes:
      en: "-issimo suffix creates absolute superlative"
      ko: "-issimo 접미사가 절대 최상급을 만듦"
