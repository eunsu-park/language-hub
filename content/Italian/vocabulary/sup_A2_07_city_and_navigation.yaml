- id: asking_directions
  label:
    en: "Asking for Directions"
    ko: "길 묻기 표현"
  type: vocabulary
  words:
  - italian: "Scusi, dov'è...?"
    translation:
      en: "Excuse me, where is...?"
      ko: "실례합니다, ~은/는 어디에 있나요?"
    gender: null
    notes:
      en: "Formal; Scusa for informal"
      ko: "격식체; 비격식은 Scusa"
  - italian: "Come si arriva a...?"
    translation:
      en: "How do you get to...?"
      ko: "~에 어떻게 가나요?"
    gender: null
  - italian: "Quanto è lontano?"
    translation:
      en: "How far is it?"
      ko: "얼마나 먼가요?"
    gender: null
  - italian: "C'è un/una... qui vicino?"
    translation:
      en: "Is there a... nearby?"
      ko: "근처에 ~이/가 있나요?"
    gender: null
  - italian: "Mi sono perso/persa"
    translation:
      en: "I'm lost (m/f)"
      ko: "길을 잃었습니다"
    gender: null
    notes:
      en: "perso for male, persa for female"
      ko: "남성은 perso, 여성은 persa"
  - italian: "Può indicarmi la strada per...?"
    translation:
      en: "Can you show me the way to...?"
      ko: "~로 가는 길을 알려주시겠어요?"
    gender: null
  - italian: "È lontano a piedi?"
    translation:
      en: "Is it far on foot?"
      ko: "걸어서 먼가요?"
    gender: null
  - italian: "la prima a destra"
    translation:
      en: "the first on the right"
      ko: "오른쪽 첫 번째"
    gender: null
  - italian: "la seconda a sinistra"
    translation:
      en: "the second on the left"
      ko: "왼쪽 두 번째"
    gender: null
  - italian: "in fondo alla strada"
    translation:
      en: "at the end of the street"
      ko: "길 끝에"
    gender: null
  - italian: "dopo il semaforo"
    translation:
      en: "after the traffic light"
      ko: "신호등 지나서"
    gender: null
  - italian: "all'incrocio"
    translation:
      en: "at the intersection"
      ko: "교차로에서"
    gender: null
  - italian: "a cinque minuti a piedi"
    translation:
      en: "five minutes on foot"
      ko: "걸어서 5분"
    gender: null
