lesson: 16_Complex_Sentences_and_Advanced_Grammar
lesson_number: 16
cefr: B2
categories:
- id: relative_pronouns
  label:
    en: Relative Pronouns
    ko: 관계 대명사
  type: vocabulary
  words:
  - italian: che
    translation:
      en: that / which / who
      ko: ~하는 (것/사람)
    gender: null
    notes:
      en: Most common relative pronoun; invariable; subject or direct object
      ko: 가장 일반적인 관계대명사; 불변; 주어 또는 직접 목적어
  - italian: cui
    translation:
      en: whom / which (after preposition)
      ko: ~에게/~의 (전치사 뒤)
    gender: null
    notes:
      en: Used after prepositions; 'la persona di cui parlo' = the person I'm talking about
      ko: 전치사 뒤에 사용; 'la persona di cui parlo' = 내가 말하는 사람
  - italian: il quale
    translation:
      en: which / who (m. sg.)
      ko: ~하는 (남성 단수)
    gender: m
    notes:
      en: More formal; agrees in gender/number; often used after prepositions
      ko: 더 격식적; 성/수에 일치; 전치사 뒤에 자주 사용
  - italian: la quale
    translation:
      en: which / who (f. sg.)
      ko: ~하는 (여성 단수)
    gender: f
  - italian: i quali
    translation:
      en: which / who (m. pl.)
      ko: ~하는 (남성 복수)
    gender: m
  - italian: le quali
    translation:
      en: which / who (f. pl.)
      ko: ~하는 (여성 복수)
    gender: f
  - italian: chi
    translation:
      en: whoever / he/she who
      ko: ~하는 사람
    gender: null
    notes:
      en: "'chi dorme non piglia pesci' = the early bird catches the worm (lit. who sleeps doesn't catch fish)"
      ko: "'chi dorme non piglia pesci' = 잠자는 자는 물고기를 못 잡는다 (속담)"
  - italian: ciò che
    translation:
      en: that which / what
      ko: ~하는 것
    gender: null
  - italian: quello che
    translation:
      en: that which / what
      ko: ~하는 것
    gender: null
    notes:
      en: More colloquial synonym of 'ciò che'
      ko: "'ciò che'의 좀 더 구어적인 동의어"
  - italian: quanto
    translation:
      en: as much as / all that
      ko: ~하는 만큼
    gender: null
    notes:
      en: "'tutto quanto' = everything; 'per quanto' = as far as"
      ko: "'tutto quanto' = 모든 것; 'per quanto' = ~하는 한"
  - italian: dove
    translation:
      en: where (relative)
      ko: ~하는 곳
    gender: null
    notes:
      en: Used as relative pronoun for place; 'la città dove vivo'
      ko: 장소의 관계대명사; 'la città dove vivo' = 내가 사는 도시
  - italian: il che
    translation:
      en: which (referring to a whole clause)
      ko: 그것이 (~한다는 것)
    gender: null
    notes:
      en: Refers to an entire preceding clause, not a single noun
      ko: 단일 명사가 아닌 앞의 전체 절을 지칭
