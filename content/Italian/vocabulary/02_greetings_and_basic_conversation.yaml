- id: 26_polite_expressions
  label:
    en: 2.6 Polite Expressions
    ko: 2.6 공손한 표현
  type: vocabulary
  words:
  - italian: grazie mille
    translation:
      en: thank you very much
      ko: 정말 감사합니다
    gender: null
    notes:
      en: Literally 'a thousand thanks'
      ko: 직역하면 '천 번의 감사'
  - italian: prego
    translation:
      en: you're welcome
      ko: 천만에요
    gender: null
  - italian: mi scusi
    translation:
      en: excuse me (formal)
      ko: 실례합니다 (격식)
    gender: null
    notes:
      en: Uses Lei form; for getting attention or apologizing
      ko: Lei 형태 사용; 주의를 끌거나 사과할 때
  - italian: permesso
    translation:
      en: excuse me (to pass through)
      ko: 지나갈게요 / 실례합니다
    gender: null
    notes:
      en: Used when entering a room or passing someone
      ko: 방에 들어가거나 사람 사이를 지나갈 때 사용
  - italian: non c'è di che
    translation:
      en: don't mention it
      ko: 별말씀을요
    gender: null
    notes:
      en: Literally 'there is nothing of what'; alternative to 'prego'
      ko: 직역하면 '무엇이 있는 것이 아닙니다'; 'prego'의 대안
  - italian: mi dispiace
    translation:
      en: I'm sorry
      ko: 죄송합니다
    gender: null
    notes:
      en: For sincere apologies; literally 'it displeases me'
      ko: 진심 어린 사과에 사용; 직역하면 '그것이 저를 유감스럽게 합니다'
  - italian: figurati
    translation:
      en: don't worry about it (informal)
      ko: 신경 쓰지 마 (비격식)
    gender: null
    notes:
      en: "Formal form: 'si figuri'"
      ko: "격식체: 'si figuri'"
  - italian: per cortesia
    translation:
      en: please (formal)
      ko: 부탁드립니다 (격식)
    gender: null
    notes:
      en: More formal than 'per favore'
      ko: "'per favore'보다 격식적"
  - italian: buona giornata
    translation:
      en: have a good day
      ko: 좋은 하루 되세요
    gender: null
  - italian: buona serata
    translation:
      en: have a good evening
      ko: 좋은 저녁 되세요
    gender: null
  - italian: auguri
    translation:
      en: best wishes / congratulations
      ko: 축하합니다 / 좋은 소원
    gender: null
    notes:
      en: Used for birthdays, holidays, and celebrations
      ko: 생일, 명절, 축하 시 사용
  - italian: complimenti
    translation:
      en: congratulations / compliments
      ko: 축하합니다 / 칭찬
    gender: null
