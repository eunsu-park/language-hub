lesson: 13_Imperative_and_Subjunctive_Introduction
lesson_number: 13
cefr: B1
categories:
- id: command_words
  label:
    en: Command Words (Imperative)
    ko: 명령어 (명령법)
  type: vocabulary
  words:
  - italian: ascolta!
    translation:
      en: listen! (tu)
      ko: 들어! (너)
    gender: null
    notes:
      en: Regular tu imperative of 'ascoltare'
      ko: "'ascoltare'의 규칙 tu 명령형"
  - italian: guarda!
    translation:
      en: look! (tu)
      ko: 봐! (너)
    gender: null
  - italian: aspetta!
    translation:
      en: wait! (tu)
      ko: 기다려! (너)
    gender: null
  - italian: vieni!
    translation:
      en: come! (tu)
      ko: 와! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'venire'
      ko: "'venire'의 불규칙 tu 명령형"
  - italian: vai! / va'!
    translation:
      en: go! (tu)
      ko: 가! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'andare'
      ko: "'andare'의 불규칙 tu 명령형"
  - italian: fai! / fa'!
    translation:
      en: do! / make! (tu)
      ko: 해! / 만들어! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'fare'
      ko: "'fare'의 불규칙 tu 명령형"
  - italian: di'!
    translation:
      en: say! / tell! (tu)
      ko: 말해! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'dire'
      ko: "'dire'의 불규칙 tu 명령형"
  - italian: sta'! / stai!
    translation:
      en: stay! / be! (tu)
      ko: 있어! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'stare'
      ko: "'stare'의 불규칙 tu 명령형"
  - italian: sii!
    translation:
      en: be! (tu)
      ko: ~이 되어라! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'essere'
      ko: "'essere'의 불규칙 tu 명령형"
  - italian: abbi!
    translation:
      en: have! (tu)
      ko: 가져! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'avere'
      ko: "'avere'의 불규칙 tu 명령형"
  - italian: dammi!
    translation:
      en: give me!
      ko: 나에게 줘!
    gender: null
    notes:
      en: "'da'' + 'mi'; pronoun attached to shortened imperative"
      ko: "'da'' + 'mi'; 대명사가 축약된 명령형에 붙음"
  - italian: dimmi!
    translation:
      en: tell me!
      ko: 말해 봐!
    gender: null
    notes:
      en: "'di'' + 'mi'; pronoun doubles the consonant"
      ko: "'di'' + 'mi'; 대명사가 자음을 겹치게 함"
  - italian: scrivimi!
    translation:
      en: write to me!
      ko: 나에게 써!
    gender: null
  - italian: scusa! / scusi!
    translation:
      en: excuse me! (informal/formal)
      ko: 미안! / 실례합니다!
    gender: null
    notes:
      en: "'scusa' for tu, 'scusi' for Lei (formal)"
      ko: "'scusa'는 tu용, 'scusi'는 Lei(격식)용"
  - italian: non toccare!
    translation:
      en: don't touch!
      ko: 만지지 마!
    gender: null
    notes:
      en: Negative tu imperative uses infinitive
      ko: 부정 tu 명령형은 부정사를 사용
  - italian: non ti preoccupare!
    translation:
      en: don't worry!
      ko: 걱정하지 마!
    gender: null
  - italian: stai attento/a!
    translation:
      en: be careful!
      ko: 조심해!
    gender: null
  - italian: sbrigati!
    translation:
      en: hurry up!
      ko: 서둘러!
    gender: null
    notes:
      en: Reflexive tu imperative of 'sbrigarsi'
      ko: "'sbrigarsi'의 재귀 tu 명령형"
  - italian: andiamo!
    translation:
      en: let's go!
      ko: 가자!
    gender: null
    notes:
      en: Noi imperative of 'andare'
      ko: "'andare'의 noi 명령형"
  - italian: prendi!
    translation:
      en: take! (tu)
      ko: 가져! (너)
    gender: null
  - italian: apri!
    translation:
      en: open! (tu)
      ko: 열어! (너)
    gender: null
  - italian: chiudi!
    translation:
      en: close! (tu)
      ko: 닫아! (너)
    gender: null
  - italian: metti!
    translation:
      en: put! (tu)
      ko: 놔! (너)
    gender: null
  - italian: esci!
    translation:
      en: go out! / leave! (tu)
      ko: 나가! (너)
    gender: null
    notes:
      en: Irregular tu imperative of 'uscire'
      ko: "'uscire'의 불규칙 tu 명령형"
  - italian: mangia!
    translation:
      en: eat! (tu)
      ko: 먹어! (너)
    gender: null
  - italian: bevi!
    translation:
      en: drink! (tu)
      ko: 마셔! (너)
    gender: null
  - italian: corri!
    translation:
      en: run! (tu)
      ko: 뛰어! (너)
    gender: null
  - italian: fermati!
    translation:
      en: stop! (tu)
      ko: 멈춰! (너)
    gender: null
    notes:
      en: Reflexive tu imperative of 'fermarsi'
      ko: "'fermarsi'의 재귀 tu 명령형"
  - italian: taci! / sta' zitto!
    translation:
      en: be quiet! / shut up!
      ko: 조용히 해!
    gender: null
- id: subjunctive_triggers
  label:
    en: Subjunctive Triggers
    ko: 접속법 유발 동사/표현
  type: vocabulary
  words:
  - italian: pensare (che)
    translation:
      en: to think (that)
      ko: (~라고) 생각하다
    gender: null
    notes:
      en: Triggers subjunctive in subordinate clause
      ko: 종속절에서 접속법을 유발
  - italian: credere (che)
    translation:
      en: to believe (that)
      ko: (~라고) 믿다
    gender: null
  - italian: sperare (che)
    translation:
      en: to hope (that)
      ko: (~하기를) 바라다
    gender: null
  - italian: volere (che)
    translation:
      en: to want (that)
      ko: (~하기를) 원하다
    gender: null
  - italian: desiderare (che)
    translation:
      en: to wish / to desire (that)
      ko: (~하기를) 소원하다
    gender: null
  - italian: temere (che)
    translation:
      en: to fear (that)
      ko: (~할까 봐) 두려워하다
    gender: null
  - italian: dubitare (che)
    translation:
      en: to doubt (that)
      ko: (~인지) 의심하다
    gender: null
  - italian: immaginare (che)
    translation:
      en: to imagine (that)
      ko: (~라고) 상상하다
    gender: null
  - italian: preferire (che)
    translation:
      en: to prefer (that)
      ko: (~하기를) 선호하다
    gender: null
  - italian: è necessario (che)
    translation:
      en: it is necessary (that)
      ko: (~하는 것이) 필요하다
    gender: null
  - italian: è importante (che)
    translation:
      en: it is important (that)
      ko: (~하는 것이) 중요하다
    gender: null
  - italian: è possibile (che)
    translation:
      en: it is possible (that)
      ko: (~일) 수 있다
    gender: null
  - italian: bisogna (che)
    translation:
      en: it is necessary (that) / one must
      ko: (~해야) 한다
    gender: null
    notes:
      en: Impersonal verb; always 3rd person singular
      ko: 비인칭 동사; 항상 3인칭 단수
  - italian: magari
    translation:
      en: I wish / if only / maybe
      ko: ~하면 좋겠다 / 혹시
    gender: null
    notes:
      en: Can trigger subjunctive; also used as 'maybe' or enthusiastic 'yes!'
      ko: 접속법을 유발할 수 있음; '어쩌면' 또는 열정적인 '좋지!' 의미로도 사용
- id: conjunctions
  label:
    en: Conjunctions
    ko: 접속사
  type: vocabulary
  words:
  - italian: che
    translation:
      en: that
      ko: ~라는 것
    gender: null
    notes:
      en: Most common conjunction introducing subjunctive clauses
      ko: 접속법절을 도입하는 가장 일반적인 접속사
  - italian: affinché
    translation:
      en: so that / in order that
      ko: ~하기 위해
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: benché
    translation:
      en: although / even though
      ko: 비록 ~이지만
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: sebbene
    translation:
      en: although / even though
      ko: 비록 ~일지라도
    gender: null
    notes:
      en: Always triggers subjunctive; synonym of 'benché'
      ko: 항상 접속법을 유발; 'benché'의 동의어
  - italian: prima che
    translation:
      en: before
      ko: ~하기 전에
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: senza che
    translation:
      en: without
      ko: ~하지 않고
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: a meno che (non)
    translation:
      en: unless
      ko: ~하지 않는 한
    gender: null
    notes:
      en: Always triggers subjunctive; 'non' is expletive (doesn't negate)
      ko: 항상 접속법을 유발; 'non'은 허사 (부정의 의미 없음)
  - italian: purché
    translation:
      en: provided that / as long as
      ko: ~하는 한
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: perché
    translation:
      en: because; so that
      ko: 왜냐하면; ~하기 위해
    gender: null
    notes:
      en: Triggers subjunctive when meaning 'so that'; indicative when 'because'
      ko: "'~하기 위해' 의미일 때 접속법 유발; '왜냐하면' 의미일 때 직설법"
  - italian: in modo che
    translation:
      en: so that / in such a way that
      ko: ~하도록
    gender: null
    notes:
      en: Always triggers subjunctive
      ko: 항상 접속법을 유발
  - italian: nonostante
    translation:
      en: despite / in spite of
      ko: ~에도 불구하고
    gender: null
    notes:
      en: Triggers subjunctive when followed by 'che'
      ko: "'che'가 뒤따를 때 접속법을 유발"
- id: subjunctive_expressions
  label:
    en: Subjunctive Expressions and Phrases
    ko: 접속법 표현 및 구문
  type: vocabulary
  words:
  - italian: Spero che tu stia bene.
    translation:
      en: I hope you are well.
      ko: 네가 잘 지내길 바란다.
    gender: null
    notes:
      en: Common greeting using congiuntivo
      ko: 접속법을 사용한 일반적인 인사
  - italian: Voglio che tu sappia la verità.
    translation:
      en: I want you to know the truth.
      ko: 네가 진실을 알기를 원해.
    gender: null
  - italian: È necessario che studi di più.
    translation:
      en: It is necessary that you study more.
      ko: 네가 더 공부해야 한다.
    gender: null
  - italian: Magari piovesse domani.
    translation:
      en: I wish it would rain tomorrow.
      ko: 내일 비가 왔으면 좋겠다.
    gender: null
  - italian: Non credo che sia vero.
    translation:
      en: I don't think it's true.
      ko: 그것이 사실이라고 생각하지 않는다.
    gender: null
  - italian: Mi fa piacere che tu venga.
    translation:
      en: I'm glad you're coming.
      ko: 네가 와서 기쁘다.
    gender: null
  - italian: Dubito che abbia ragione.
    translation:
      en: I doubt he/she is right.
      ko: 그/그녀가 옳은지 의심한다.
    gender: null
  - italian: È possibile che nevichi.
    translation:
      en: It's possible that it will snow.
      ko: 눈이 올 수도 있다.
    gender: null
  - italian: Ti chiedo che mi aiuti.
    translation:
      en: I ask you to help me.
      ko: 나를 도와달라고 부탁한다.
    gender: null
  - italian: Suggerisco che tu vada dal medico.
    translation:
      en: I suggest you go to the doctor.
      ko: 병원에 가는 것을 제안한다.
    gender: null
  - italian: Temo che sia troppo tardi.
    translation:
      en: I fear it may be too late.
      ko: 너무 늦을까 봐 두렵다.
    gender: null
  - italian: È un peccato che non possa venire.
    translation:
      en: It's a shame you can't come.
      ko: 네가 올 수 없다니 안타깝다.
    gender: null
  - italian: È meglio che tu resti a casa.
    translation:
      en: It's better that you stay home.
      ko: 집에 있는 것이 더 나아.
    gender: null
- id: command_phrases
  label:
    en: Common Command Phrases
    ko: 일반적인 명령 구문
  type: vocabulary
  words:
  - italian: Stai attento!
    translation:
      en: Be careful!
      ko: 조심해!
    gender: null
  - italian: Lasciami in pace!
    translation:
      en: Leave me alone!
      ko: 나를 혼자 놔 둬!
    gender: null
  - italian: Ascoltami!
    translation:
      en: Listen to me!
      ko: 내 말 들어!
    gender: null
  - italian: Aiutami!
    translation:
      en: Help me!
      ko: 도와줘!
    gender: null
  - italian: Ripeti, per favore!
    translation:
      en: Please repeat!
      ko: 다시 말해 줘!
    gender: null
  - italian: Non gridare!
    translation:
      en: Don't shout!
      ko: 소리 지르지 마!
    gender: null
  - italian: Siediti!
    translation:
      en: Sit down! (tu)
      ko: 앉아! (너)
    gender: null
  - italian: Stammi bene!
    translation:
      en: Take care!
      ko: 몸 조심해!
    gender: null
    notes:
      en: Common farewell expression
      ko: 일반적인 작별 인사
  - italian: Passamelo!
    translation:
      en: Pass it to me!
      ko: 그것 좀 줘!
    gender: null
    notes:
      en: Double pronoun (me + lo) attached to imperative
      ko: 이중 대명사 (me + lo)가 명령형에 붙음
  - italian: Non farlo!
    translation:
      en: Don't do it!
      ko: 하지 마!
    gender: null
  - italian: Smettila!
    translation:
      en: Stop it! / Cut it out!
      ko: 그만해!
    gender: null
    notes:
      en: Very common colloquial command
      ko: 매우 일반적인 구어체 명령
  - italian: Dai, forza!
    translation:
      en: Come on! / Let's go!
      ko: 자, 힘내! / 가자!
    gender: null
    notes:
      en: Very common encouragement expression
      ko: 매우 일반적인 격려 표현
