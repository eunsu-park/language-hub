lesson: 25_CILS_and_CELI_Exam_Preparation
lesson_number: 25
cefr: B2-C1
categories:
- id: exam_terms
  label:
    en: Exam Terminology
    ko: 시험 용어
  type: vocabulary
  words:
  - italian: l'esame
    translation:
      en: the exam
      ko: 시험
    gender: m
  - italian: la prova
    translation:
      en: the test / section
      ko: 시험 / 과목
    gender: f
    notes:
      en: "'Prova di ascolto' = listening test; 'prova scritta' = written test"
      ko: "'prova di ascolto' = 듣기 시험; 'prova scritta' = 필기 시험"
  - italian: il livello
    translation:
      en: the level
      ko: 수준 / 레벨
    gender: m
    notes:
      en: "CILS levels: A1, A2, UNO (B1), DUE (B2), TRE (C1), QUATTRO (C2)"
      ko: CILS 수준 A1, A2, UNO(B1), DUE(B2), TRE(C1), QUATTRO(C2)
  - italian: il punteggio
    translation:
      en: the score
      ko: 점수
    gender: m
  - italian: la certificazione
    translation:
      en: the certification
      ko: 자격증 / 인증
    gender: f
    notes:
      en: "Major Italian certifications: CILS (Siena), CELI (Perugia), PLIDA (Dante Alighieri)"
      ko: "주요 이탈리아어 인증: CILS(시에나), CELI(페루자), PLIDA(단테 알리기에리)"
  - italian: la sessione
    translation:
      en: the session / sitting
      ko: 시험 회차
    gender: f
    notes:
      en: CILS is held in June and December each year
      ko: CILS는 매년 6월과 12월에 시행
  - italian: l'iscrizione
    translation:
      en: the registration / enrollment
      ko: 등록 / 신청
    gender: f
  - italian: il candidato / la candidata
    translation:
      en: the candidate (m/f)
      ko: 응시자 (남/여)
    gender: m/f
  - italian: superare
    translation:
      en: to pass (an exam)
      ko: 합격하다
    gender: null
    notes:
      en: "'Superare l'esame' = to pass the exam"
      ko: "'superare l'esame' = 시험에 합격하다"
  - italian: bocciare
    translation:
      en: to fail (someone) / to reject
      ko: 불합격시키다 / 거부하다
    gender: null
    notes:
      en: "'Essere bocciato/a' = to fail (passive); very common in Italian school system"
      ko: "'essere bocciato/a' = 불합격하다 (수동); 이탈리아 학교 시스템에서 매우 흔함"
  - italian: il diploma
    translation:
      en: the diploma / certificate
      ko: 수료증 / 졸업장
    gender: m
  - italian: la valutazione
    translation:
      en: the evaluation / assessment
      ko: 평가
    gender: f
  - italian: idoneo / non idoneo
    translation:
      en: pass / fail (result)
      ko: 합격 / 불합격 (결과)
    gender: null
    notes:
      en: Used in CILS results; each module is graded separately
      ko: CILS 결과에 사용; 각 모듈이 별도로 채점됨
- id: skills
  label:
    en: Language Skills
    ko: 언어 기능
  type: vocabulary
  words:
  - italian: l'ascolto
    translation:
      en: listening
      ko: 듣기
    gender: m
    notes:
      en: "'Comprensione dell'ascolto' = listening comprehension"
      ko: "'comprensione dell'ascolto' = 듣기 이해"
  - italian: la comprensione
    translation:
      en: comprehension / understanding
      ko: 이해력
    gender: f
  - italian: la produzione scritta
    translation:
      en: written production / writing
      ko: 쓰기 / 작문
    gender: f
  - italian: la produzione orale
    translation:
      en: oral production / speaking
      ko: 말하기
    gender: f
  - italian: la grammatica
    translation:
      en: grammar
      ko: 문법
    gender: f
  - italian: il lessico
    translation:
      en: the lexicon / vocabulary
      ko: 어휘
    gender: m
    notes:
      en: More formal than 'vocabolario'; used in academic/exam context
      ko: "'vocabolario'보다 격식적; 학술/시험 맥락에서 사용"
  - italian: la lettura
    translation:
      en: reading
      ko: 읽기
    gender: f
    notes:
      en: "'Comprensione della lettura' = reading comprehension"
      ko: "'comprensione della lettura' = 읽기 이해"
  - italian: la competenza linguistica
    translation:
      en: language competence
      ko: 언어 능력
    gender: f
  - italian: la padronanza
    translation:
      en: mastery / proficiency
      ko: 숙달 / 능숙도
    gender: f
    notes:
      en: C2 level is often called 'padronanza' in Italian CEFR descriptions
      ko: C2 수준은 이탈리아 CEFR 설명에서 종종 'padronanza'로 불림
  - italian: la fluenza
    translation:
      en: fluency
      ko: 유창성
    gender: f
  - italian: la pronuncia
    translation:
      en: pronunciation
      ko: 발음
    gender: f
  - italian: l'ortografia
    translation:
      en: spelling / orthography
      ko: 철자법 / 맞춤법
    gender: f
  - italian: la struttura grammaticale
    translation:
      en: grammatical structure
      ko: 문법 구조
    gender: f
  - italian: il registro linguistico
    translation:
      en: the language register
      ko: 언어 사용역
    gender: m
    notes:
      en: Formal, informal, technical registers tested at B2+ levels
      ko: 격식, 비격식, 전문 사용역이 B2+ 수준에서 시험됨
- id: exam_strategies
  label:
    en: Exam Strategies
    ko: 시험 전략
  type: vocabulary
  words:
  - italian: rileggere
    translation:
      en: to reread / to review
      ko: 다시 읽다 / 검토하다
    gender: null
    notes:
      en: Always reread your answers before submitting
      ko: 제출 전에 항상 답을 다시 읽을 것
  - italian: eliminare
    translation:
      en: to eliminate / to rule out
      ko: 제거하다 / 배제하다
    gender: null
    notes:
      en: Strategy for multiple-choice; eliminate wrong answers first
      ko: 객관식 전략; 먼저 오답을 제거
  - italian: indovinare
    translation:
      en: to guess
      ko: 추측하다
    gender: null
    notes:
      en: No penalty for guessing in CILS/CELI; always answer every question
      ko: CILS/CELI에서 추측에 대한 감점 없음; 항상 모든 문제에 답할 것
  - italian: parafrasare
    translation:
      en: to paraphrase
      ko: 의역하다
    gender: null
    notes:
      en: Essential skill for writing and speaking sections
      ko: 쓰기와 말하기 영역에서 필수적인 기술
  - italian: strutturare
    translation:
      en: to structure / to organize
      ko: 구조화하다 / 정리하다
    gender: null
  - italian: argomentare
    translation:
      en: to argue / to make a case
      ko: 논증하다 / 주장하다
    gender: null
    notes:
      en: Key skill for C1 writing and speaking tasks
      ko: C1 쓰기 및 말하기 과제의 핵심 기술
  - italian: concludere
    translation:
      en: to conclude
      ko: 결론짓다
    gender: null
    notes:
      en: Irregular past participle 'concluso'
      ko: 불규칙 과거분사 'concluso'
  - italian: citare
    translation:
      en: to cite / to quote
      ko: 인용하다
    gender: null
  - italian: confrontare
    translation:
      en: to compare
      ko: 비교하다
    gender: null
  - italian: sintetizzare
    translation:
      en: to synthesize / to summarize
      ko: 종합하다 / 요약하다
    gender: null
  - italian: collegare
    translation:
      en: to connect / to link
      ko: 연결하다 / 관련짓다
    gender: null
    notes:
      en: Linking ideas is important for coherent writing
      ko: 아이디어를 연결하는 것은 일관된 글쓰기에 중요
  - italian: gestire il tempo
    translation:
      en: to manage time
      ko: 시간을 관리하다
    gender: null
    notes:
      en: Time management is critical in timed exams
      ko: 제한 시간이 있는 시험에서 시간 관리는 필수적
  - italian: prendere appunti
    translation:
      en: to take notes
      ko: 메모하다
    gender: null
    notes:
      en: Important during the listening comprehension section
      ko: 듣기 이해 영역에서 중요
- id: academic_italian
  label:
    en: Academic Italian
    ko: 학술 이탈리아어
  type: vocabulary
  words:
  - italian: la tesi
    translation:
      en: the thesis / dissertation
      ko: 논문
    gender: f
    notes:
      en: "'Tesi di laurea' = bachelor's/master's thesis"
      ko: "'tesi di laurea' = 학사/석사 논문"
  - italian: la ricerca
    translation:
      en: the research
      ko: 연구
    gender: f
  - italian: il dato
    translation:
      en: the data point / piece of data
      ko: 데이터 / 자료
    gender: m
    notes:
      en: Plural 'i dati'; 'i dati mostrano che...' = the data show that...
      ko: 복수형 'i dati'; 'i dati mostrano che...' = 데이터가 보여주기를...
  - italian: il risultato
    translation:
      en: the result
      ko: 결과
    gender: m
  - italian: l'analisi
    translation:
      en: the analysis
      ko: 분석
    gender: f
    notes:
      en: Invariable; same form in singular and plural
      ko: 불변; 단수와 복수가 같은 형태
  - italian: la metodologia
    translation:
      en: the methodology
      ko: 방법론
    gender: f
  - italian: il campione
    translation:
      en: the sample / specimen
      ko: 표본 / 샘플
    gender: m
    notes:
      en: Also means 'champion' in sports context
      ko: 스포츠 맥락에서 '챔피언'이라는 뜻도 있음
  - italian: l'ipotesi
    translation:
      en: the hypothesis
      ko: 가설
    gender: f
    notes:
      en: Invariable; same form in singular and plural
      ko: 불변; 단수와 복수가 같은 형태
  - italian: la bibliografia
    translation:
      en: the bibliography / references
      ko: 참고 문헌
    gender: f
  - italian: la fonte
    translation:
      en: the source
      ko: 출처
    gender: f
    notes:
      en: "'Citare le fonti' = to cite the sources"
      ko: "'citare le fonti' = 출처를 인용하다"
  - italian: il saggio
    translation:
      en: the essay / academic paper
      ko: 학술 논문 / 에세이
    gender: m
  - italian: la statistica
    translation:
      en: the statistic / statistics
      ko: 통계
    gender: f
  - italian: il fenomeno
    translation:
      en: the phenomenon
      ko: 현상
    gender: m
    notes:
      en: Plural 'i fenomeni'; from Greek
      ko: 복수형 'i fenomeni'; 그리스어에서 유래
  - italian: lo studio
    translation:
      en: the study
      ko: 연구 / 학습
    gender: m
    notes:
      en: "'Secondo uno studio recente...' = According to a recent study..."
      ko: "'secondo uno studio recente...' = 최근 연구에 따르면..."
  - italian: la conclusione
    translation:
      en: the conclusion
      ko: 결론
    gender: f
    notes:
      en: "'In conclusione' = in conclusion; essential in academic writing"
      ko: "'in conclusione' = 결론적으로; 학술 글쓰기에서 필수적"
  - italian: l'abstract
    translation:
      en: the abstract
      ko: 초록
    gender: m
    notes:
      en: English loanword; brief summary of a research paper
      ko: 영어 차용어; 연구 논문의 간략한 요약
