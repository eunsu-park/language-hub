lesson: 23_Italian_Culture_and_History
lesson_number: 23
cefr: B2-C1
categories:
- id: history
  label:
    en: Italian History
    ko: 이탈리아 역사
  type: vocabulary
  words:
  - italian: l'Impero Romano
    translation:
      en: the Roman Empire
      ko: 로마 제국
    gender: m
    notes:
      en: 27 BC - 476 AD (Western); foundation of Western civilization
      ko: 기원전 27년 - 기원후 476년 (서로마); 서양 문명의 기초
  - italian: il Rinascimento
    translation:
      en: the Renaissance
      ko: 르네상스
    gender: m
    notes:
      en: 14th-17th century; began in Florence; rebirth of classical art and learning
      ko: 14-17세기; 피렌체에서 시작; 고전 예술과 학문의 부활
  - italian: il Risorgimento
    translation:
      en: the Risorgimento (Italian unification movement)
      ko: 리소르지멘토 (이탈리아 통일 운동)
    gender: m
    notes:
      en: 19th-century movement; key figures include Garibaldi, Cavour, Mazzini
      ko: 19세기 운동; 가리발디, 카부르, 마치니가 핵심 인물
  - italian: l'Unità d'Italia
    translation:
      en: the Unification of Italy
      ko: 이탈리아 통일
    gender: f
    notes:
      en: Proclaimed in 1861; Rome became capital in 1871
      ko: 1861년 선포; 1871년 로마가 수도가 됨
  - italian: la Repubblica
    translation:
      en: the Republic
      ko: 공화국
    gender: f
    notes:
      en: Italian Republic established June 2, 1946 by referendum
      ko: 1946년 6월 2일 국민투표로 이탈리아 공화국 수립
  - italian: la Resistenza
    translation:
      en: the Resistance
      ko: 레지스탕스 (저항 운동)
    gender: f
    notes:
      en: Anti-fascist movement during WWII (1943-1945); 'i partigiani' = the partisans
      ko: 2차 세계대전 중 반파시즘 운동 (1943-1945); 'i partigiani' = 빨치산
  - italian: il Fascismo
    translation:
      en: Fascism
      ko: 파시즘
    gender: m
    notes:
      en: Mussolini's regime (1922-1943); originated in Italy
      ko: 무솔리니 정권 (1922-1943); 이탈리아에서 시작됨
  - italian: la Costituzione
    translation:
      en: the Constitution
      ko: 헌법
    gender: f
    notes:
      en: Italian Constitution came into effect January 1, 1948
      ko: 이탈리아 헌법은 1948년 1월 1일 발효
  - italian: il Medioevo
    translation:
      en: the Middle Ages
      ko: 중세
    gender: m
    notes:
      en: Period of city-states (comuni), Dante, and early banking
      ko: 도시 국가(코무네), 단테, 초기 은행업의 시대
  - italian: il Comune
    translation:
      en: the commune / city-state / municipality
      ko: 코무네 / 도시 국가 / 지방자치단체
    gender: m
    notes:
      en: Medieval self-governing cities; today means 'municipality'
      ko: 중세 자치 도시; 현재는 '지방자치단체'를 의미
  - italian: il Senato
    translation:
      en: the Senate
      ko: 상원
    gender: m
    notes:
      en: Upper house of Italian Parliament; from Roman 'Senatus'
      ko: 이탈리아 의회 상원; 로마 'Senatus'에서 유래
  - italian: la monarchia
    translation:
      en: the monarchy
      ko: 군주제
    gender: f
    notes:
      en: House of Savoy ruled until the 1946 republic referendum
      ko: 사보이 왕가가 1946년 공화국 국민투표까지 통치
- id: art
  label:
    en: Art and Architecture
    ko: 예술과 건축
  type: vocabulary
  words:
  - italian: l'affresco
    translation:
      en: the fresco
      ko: 프레스코
    gender: m
    notes:
      en: Painting on wet plaster; Michelangelo's Sistine Chapel is the most famous
      ko: 젖은 회반죽 위에 그림; 미켈란젤로의 시스티나 성당이 가장 유명
  - italian: la scultura
    translation:
      en: the sculpture
      ko: 조각
    gender: f
  - italian: il dipinto
    translation:
      en: the painting
      ko: 그림
    gender: m
    notes:
      en: From 'dipingere' (to paint); also 'il quadro' (framed painting)
      ko: "'dipingere'(그리다)에서 유래; 'il quadro'(액자 그림)도 사용"
  - italian: il capolavoro
    translation:
      en: the masterpiece
      ko: 걸작
    gender: m
    notes:
      en: Lit. 'chief work'; plural 'i capolavori'
      ko: 직역 '으뜸 작품'; 복수형 'i capolavori'
  - italian: il museo
    translation:
      en: the museum
      ko: 박물관 / 미술관
    gender: m
  - italian: la galleria
    translation:
      en: the gallery
      ko: 갤러리
    gender: f
    notes:
      en: La Galleria degli Uffizi in Florence is world-renowned
      ko: 피렌체의 우피치 미술관은 세계적으로 유명
  - italian: il Barocco
    translation:
      en: the Baroque
      ko: 바로크
    gender: m
    notes:
      en: 17th-18th century; ornate, dramatic style (e.g., Bernini, Caravaggio)
      ko: "17-18세기; 화려하고 극적인 양식 (예: 베르니니, 카라바조)"
  - italian: il pittore / la pittrice
    translation:
      en: the painter (m/f)
      ko: 화가 (남/여)
    gender: m/f
  - italian: lo scultore / la scultrice
    translation:
      en: the sculptor (m/f)
      ko: 조각가 (남/여)
    gender: m/f
  - italian: l'opera d'arte
    translation:
      en: the work of art
      ko: 예술 작품
    gender: f
  - italian: il mosaico
    translation:
      en: the mosaic
      ko: 모자이크
    gender: m
    notes:
      en: Ravenna is famous for its Byzantine mosaics
      ko: 라벤나는 비잔틴 모자이크로 유명
  - italian: il restauro
    translation:
      en: the restoration
      ko: 복원
    gender: m
    notes:
      en: Italy leads in art restoration techniques
      ko: 이탈리아는 예술 복원 기술을 선도
  - italian: il patrimonio culturale
    translation:
      en: the cultural heritage
      ko: 문화유산
    gender: m
    notes:
      en: Italy has the most UNESCO World Heritage Sites in the world
      ko: 이탈리아는 세계에서 유네스코 세계유산이 가장 많음
- id: cuisine
  label:
    en: Italian Cuisine
    ko: 이탈리아 요리
  type: vocabulary
  words:
  - italian: la pasta
    translation:
      en: pasta
      ko: 파스타
    gender: f
    notes:
      en: Hundreds of shapes; each region has its specialties
      ko: 수백 가지 모양; 각 지역마다 특산 파스타가 있음
  - italian: la pizza
    translation:
      en: pizza
      ko: 피자
    gender: f
    notes:
      en: UNESCO Intangible Cultural Heritage (Neapolitan pizza-making)
      ko: 유네스코 무형문화유산 (나폴리 피자 제조)
  - italian: il risotto
    translation:
      en: risotto
      ko: 리소토
    gender: m
  - italian: il gelato
    translation:
      en: gelato (Italian ice cream)
      ko: 젤라토 (이탈리아 아이스크림)
    gender: m
    notes:
      en: Denser and less fat than American ice cream
      ko: 미국 아이스크림보다 밀도가 높고 지방이 적음
  - italian: l'espresso
    translation:
      en: espresso
      ko: 에스프레소
    gender: m
    notes:
      en: The standard coffee in Italy; ordered simply as 'un caffè'
      ko: 이탈리아의 기본 커피; 간단히 'un caffè'로 주문
  - italian: il cappuccino
    translation:
      en: cappuccino
      ko: 카푸치노
    gender: m
    notes:
      en: Italians only drink cappuccino in the morning, never after a meal
      ko: 이탈리아인은 카푸치노를 아침에만 마시고, 식후에는 절대 마시지 않음
  - italian: l'antipasto
    translation:
      en: the appetizer / starter
      ko: 전채 요리
    gender: m
    notes:
      en: Lit. 'before the meal'; plural 'gli antipasti'
      ko: 직역 '식사 전'; 복수형 'gli antipasti'
  - italian: il primo (piatto)
    translation:
      en: the first course
      ko: 첫 번째 코스 (파스타/리소토/수프)
    gender: m
    notes:
      en: Usually pasta, risotto, or soup
      ko: 보통 파스타, 리소토 또는 수프
  - italian: il secondo (piatto)
    translation:
      en: the second course (main)
      ko: 두 번째 코스 (메인)
    gender: m
    notes:
      en: Meat or fish; served with 'il contorno' (side dish)
      ko: 고기 또는 생선; 'il contorno'(곁들이 요리)와 함께 제공
  - italian: il dolce
    translation:
      en: the dessert
      ko: 디저트
    gender: m
    notes:
      en: Also means 'sweet' as an adjective
      ko: 형용사로 '달콤한'이라는 뜻도 있음
  - italian: il vino
    translation:
      en: wine
      ko: 와인
    gender: m
    notes:
      en: Italy is the world's largest wine producer
      ko: 이탈리아는 세계 최대 와인 생산국
  - italian: l'olio d'oliva
    translation:
      en: olive oil
      ko: 올리브 오일
    gender: m
    notes:
      en: Essential ingredient; 'olio extra vergine' is the highest quality
      ko: 필수 재료; 'olio extra vergine'가 최고 품질
  - italian: il contorno
    translation:
      en: the side dish
      ko: 곁들이 요리
    gender: m
    notes:
      en: Vegetables or salad served alongside the 'secondo'
      ko: "'세콘도'와 함께 제공되는 채소 또는 샐러드"
- id: traditions
  label:
    en: Italian Traditions and Customs
    ko: 이탈리아 전통과 관습
  type: vocabulary
  words:
  - italian: il Natale
    translation:
      en: Christmas
      ko: 크리스마스
    gender: m
    notes:
      en: December 25; 'il cenone di Natale' = Christmas Eve dinner
      ko: 12월 25일; 'il cenone di Natale' = 크리스마스 이브 만찬
  - italian: la Pasqua
    translation:
      en: Easter
      ko: 부활절
    gender: f
    notes:
      en: "'Pasquetta' (Easter Monday) is a national holiday for outdoor picnics"
      ko: "'Pasquetta'(부활절 월요일)은 야외 소풍을 위한 국경일"
  - italian: il Ferragosto
    translation:
      en: Ferragosto (August 15 holiday)
      ko: 페라고스토 (8월 15일 공휴일)
    gender: m
    notes:
      en: Assumption of Mary; most Italians take vacation around this date
      ko: 성모 승천일; 대부분의 이탈리아인이 이 날 전후로 휴가
  - italian: il Carnevale
    translation:
      en: Carnival
      ko: 카니발
    gender: m
    notes:
      en: Venice Carnival is the most famous; pre-Lent celebrations
      ko: 베니스 카니발이 가장 유명; 사순절 전 축제
  - italian: la Befana
    translation:
      en: the Befana (Epiphany witch)
      ko: 베파나 (주현절 마녀)
    gender: f
    notes:
      en: January 6; brings gifts to children; 'La Befana vien di notte...'
      ko: 1월 6일; 어린이에게 선물을 가져옴; 'La Befana vien di notte...'
  - italian: la passeggiata
    translation:
      en: the evening stroll
      ko: 저녁 산책
    gender: f
    notes:
      en: Daily ritual of walking through town in the evening; deeply cultural
      ko: 저녁에 마을을 거니는 일상 의식; 깊은 문화적 의미
  - italian: l'aperitivo
    translation:
      en: the aperitif / pre-dinner drinks
      ko: 아페리티보 (식전 음료)
    gender: m
    notes:
      en: Social ritual; 'Spritz' in the North, 'Negroni' in Florence
      ko: 사교 의식; 북부에서 '스프리츠', 피렌체에서 '네그로니'
  - italian: il caffè
    translation:
      en: coffee (the ritual)
      ko: 커피 (의식)
    gender: m
    notes:
      en: Drinking coffee at the bar (counter) is a daily Italian ritual
      ko: 바(카운터)에서 커피를 마시는 것은 이탈리아의 일상 의식
  - italian: il brindisi
    translation:
      en: the toast (with drinks)
      ko: 건배
    gender: m
    notes:
      en: "'Cin cin!' = Cheers!; look people in the eye while toasting"
      ko: "'Cin cin!' = 건배!; 건배할 때 상대방의 눈을 봐야 함"
  - italian: il presepe
    translation:
      en: the nativity scene
      ko: 성탄 구유
    gender: m
    notes:
      en: Naples is famous for elaborate handmade nativity scenes
      ko: 나폴리는 정교한 수제 성탄 구유로 유명
  - italian: la tombola
    translation:
      en: Italian bingo / tombola
      ko: 톰볼라 (이탈리아 빙고)
    gender: f
    notes:
      en: Traditional Christmas game played with family
      ko: 가족과 함께 하는 전통 크리스마스 게임
  - italian: il Palio
    translation:
      en: the Palio (horse race)
      ko: 팔리오 (경마)
    gender: m
    notes:
      en: Famous horse race in Siena; held twice a year (July 2, August 16)
      ko: 시에나의 유명한 경마; 연 2회 개최 (7월 2일, 8월 16일)
