- id: 12_pronunciation_concepts
  label:
    en: 1.2 Pronunciation Concepts
    ko: 1.2 발음 개념
  type: vocabulary
  words:
  - italian: il suono
    translation:
      en: the sound
      ko: 소리
    gender: m
  - italian: il tono
    translation:
      en: the tone
      ko: 음조
    gender: m
  - italian: la doppia
    translation:
      en: the double consonant
      ko: 겹자음
    gender: f
    notes:
      en: Double consonants are pronounced longer in Italian (e.g., palla vs. pala)
      ko: 이탈리아어에서 겹자음은 길게 발음됨 (예 palla vs. pala)
  - italian: l'accento grave
    translation:
      en: the grave accent
      ko: 억음 악센트
    gender: m
    notes:
      en: "Opens the vowel; used on à, è, ì, ò, ù"
      ko: "모음을 열리게 함; à, è, ì, ò, ù에 사용"
  - italian: l'accento acuto
    translation:
      en: the acute accent
      ko: 양음 악센트
    gender: m
    notes:
      en: "Closes the vowel; used mainly on é (perché, poiché)"
      ko: "모음을 닫히게 함; 주로 é에 사용 (perché, poiché)"
  - italian: il dittongo
    translation:
      en: the diphthong
      ko: 이중모음
    gender: m
    notes:
      en: Two vowels in one syllable (e.g., uo, ie)
      ko: 한 음절에 두 개의 모음 (예 uo, ie)
  - italian: l'intonazione
    translation:
      en: the intonation
      ko: 억양
    gender: f
  - italian: il ritmo
    translation:
      en: the rhythm
      ko: 리듬
    gender: m
  - italian: la voce
    translation:
      en: the voice
      ko: 목소리
    gender: f
  - italian: la pausa
    translation:
      en: the pause
      ko: 멈춤
    gender: f
  - italian: lo iato
    translation:
      en: the hiatus
      ko: 모음 분리
    gender: m
    notes:
      en: Two vowels pronounced in separate syllables
      ko: 두 모음이 각각 다른 음절로 발음됨
  - italian: pronunciare
    translation:
      en: to pronounce
      ko: 발음하다
    gender: null
  - italian: compitare
    translation:
      en: to spell
      ko: 철자하다
    gender: null
    notes:
      en: "Come si compita? — How do you spell it?"
      ko: "Come si compita? — 어떻게 철자하나요?"
