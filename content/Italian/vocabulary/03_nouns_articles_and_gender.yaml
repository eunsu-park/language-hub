    translation:
      en: the man
      ko: 남자
    gender: m
    notes:
      en: Irregular plural — gli uomini
      ko: 불규칙 복수형 — gli uomini
  - italian: la donna
    translation:
      en: the woman
      ko: 여자
    gender: f
