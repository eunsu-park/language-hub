  piacere:
    infinitive: piacere
    type: irregular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to like / to be pleasing to
      ko: 좋아하다 / 마음에 들다
    past_participle: piaciuto
    gerund: piacendo
    tenses:
      presente:
        io: piaccio
        tu: piaci
        lui: piace
        noi: piacciamo
        voi: piacete
        loro: piacciono
      passato_remoto:
        io: piacqui
        tu: piacesti
        lui: piacque
        noi: piacemmo
        voi: piaceste
        loro: piacquero
      imperfetto:
        io: piacevo
        tu: piacevi
        lui: piaceva
        noi: piacevamo
        voi: piacevate
        loro: piacevano
      futuro_semplice:
        io: "piacer\xF2"
        tu: piacerai
        lui: "piacer\xE0"
        noi: piaceremo
        voi: piacerete
        loro: piaceranno
      condizionale_presente:
        io: piacerei
        tu: piaceresti
        lui: piacerebbe
        noi: piaceremmo
        voi: piacereste
        loro: piacerebbero
      congiuntivo_presente:
        io: piaccia
        tu: piaccia
        lui: piaccia
        noi: piacciamo
        voi: piacciate
        loro: piacciano
      congiuntivo_imperfetto:
        io: piacessi
        tu: piacessi
        lui: piacesse
        noi: piacessimo
        voi: piaceste
        loro: piacessero
    irregular_imperative:
      tu: piaci
      Lei: piaccia
      noi: piacciamo
      voi: piacete
    notes:
      en: "Piacere works like 'gustar' in Spanish: the subject is what is liked, and the person who likes uses indirect object pronouns (mi piace = I like it, literally 'it pleases me'). Most commonly used in 3rd person: piace (singular) / piacciono (plural). Uses essere as auxiliary: mi e piaciuto."
      ko: "Piacere는 스페인어 'gustar'처럼 작동: 주어는 좋아하는 대상이고, 좋아하는 사람은 간접목적격 대명사 사용 (mi piace = 나는 그것을 좋아한다, 직역: '그것이 나를 기쁘게 한다'). 3인칭으로 가장 많이 사용: piace (단수) / piacciono (복수). essere를 조동사로 사용."

# ============================================================
# IRREGULAR PAST PARTICIPLES
# ============================================================
irregular_past_participles:
  aprire: aperto
  bere: bevuto
  chiedere: chiesto
  chiudere: chiuso
  correre: corso
  cuocere: cotto
  decidere: deciso
  dire: detto
  essere: stato
  fare: fatto
  leggere: letto
  mettere: messo
  morire: morto
  nascere: nato
  offrire: offerto
  perdere: perso
  piacere: piaciuto
  piangere: pianto
  prendere: preso
  ridere: riso
  rimanere: rimasto
  rispondere: risposto
  rompere: rotto
  scendere: sceso
  scrivere: scritto
  spendere: speso
  succedere: successo
  vedere: visto
  venire: venuto
  vincere: vinto
  vivere: vissuto
  notes:
    en: >
      Past participles are used with AVERE or ESSERE for compound tenses.
      When used with ESSERE, the past participle agrees in gender/number
      with the subject: -o (masc. sg.), -a (fem. sg.), -i (masc. pl.),
      -e (fem. pl.). Example: Lei e andata. Loro sono arrivati.
    ko: >
      과거분사는 복합 시제에서 AVERE 또는 ESSERE와 함께 사용.
      ESSERE와 함께 사용할 때 과거분사는 주어의 성/수와 일치:
      -o (남성 단수), -a (여성 단수), -i (남성 복수), -e (여성 복수).
      예: Lei e andata. Loro sono arrivati.

# ============================================================
# IRREGULAR GERUNDS (PRESENT PARTICIPLES)
# ============================================================
irregular_gerunds:
  bere: bevendo
  dire: dicendo
  fare: facendo
  porre: ponendo
  tradurre: traducendo
  trarre: traendo
  notes:
    en: >
      Regular gerund formation: -ARE -> -ando, -ERE/-IRE -> -endo.
      Verbs derived from Latin contractions (dire<dicere, fare<facere,
      bere<bevere) use the original Latin stem for the gerund.
    ko: >
      규칙적 현재분사 형성: -ARE -> -ando, -ERE/-IRE -> -endo.
      라틴어 축약에서 파생된 동사(dire<dicere, fare<facere,
      bere<bevere)는 현재분사에서 원래 라틴어 어간을 사용.
