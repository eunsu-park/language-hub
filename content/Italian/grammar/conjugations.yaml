# Italian Verb Conjugation Paradigms
# All tenses: presente, passato_remoto, imperfetto, futuro_semplice,
#             condizionale_presente, congiuntivo_presente, congiuntivo_imperfetto

verbs:
  # ============================================================
  # REGULAR VERBS
  # ============================================================
  parlare:
    infinitive: parlare
    type: regular
    group: "-ARE"
    stem_change: null
    meaning:
      en: to speak
      ko: 말하다
    past_participle: parlato
    gerund: parlando
    tenses:
      presente:
        io: parlo
        tu: parli
        lui: parla
        noi: parliamo
        voi: parlate
        loro: parlano
      passato_remoto:
        io: parlai
        tu: parlasti
        lui: "parl\xF2"
        noi: parlammo
        voi: parlaste
        loro: parlarono
      imperfetto:
        io: parlavo
        tu: parlavi
        lui: parlava
        noi: parlavamo
        voi: parlavate
        loro: parlavano
      futuro_semplice:
        io: "parler\xF2"
        tu: parlerai
        lui: "parler\xE0"
        noi: parleremo
        voi: parlerete
        loro: parleranno
      condizionale_presente:
        io: parlerei
        tu: parleresti
        lui: parlerebbe
        noi: parleremmo
        voi: parlereste
        loro: parlerebbero
      congiuntivo_presente:
        io: parli
        tu: parli
        lui: parli
        noi: parliamo
        voi: parliate
        loro: parlino
      congiuntivo_imperfetto:
        io: parlassi
        tu: parlassi
        lui: parlasse
        noi: parlassimo
        voi: parlaste
        loro: parlassero
    irregular_imperative:
      tu: parla
      Lei: parli
      noi: parliamo
      voi: parlate

  mangiare:
    infinitive: mangiare
    type: regular
    group: "-ARE"
    stem_change: null
    meaning:
      en: to eat
      ko: 먹다
    past_participle: mangiato
    gerund: mangiando
    tenses:
      presente:
        io: mangio
        tu: mangi
        lui: mangia
        noi: mangiamo
        voi: mangiate
        loro: mangiano
      passato_remoto:
        io: mangiai
        tu: mangiasti
        lui: "mangi\xF2"
        noi: mangiammo
        voi: mangiaste
        loro: mangiarono
      imperfetto:
        io: mangiavo
        tu: mangiavi
        lui: mangiava
        noi: mangiavamo
        voi: mangiavate
        loro: mangiavano
      futuro_semplice:
        io: "manger\xF2"
        tu: mangerai
        lui: "manger\xE0"
        noi: mangeremo
        voi: mangerete
        loro: mangeranno
      condizionale_presente:
        io: mangerei
        tu: mangeresti
        lui: mangerebbe
        noi: mangeremmo
        voi: mangereste
        loro: mangerebbero
      congiuntivo_presente:
        io: mangi
        tu: mangi
        lui: mangi
        noi: mangiamo
        voi: mangiate
        loro: mangino
      congiuntivo_imperfetto:
        io: mangiassi
        tu: mangiassi
        lui: mangiasse
        noi: mangiassimo
        voi: mangiaste
        loro: mangiassero
    irregular_imperative:
      tu: mangia
      Lei: mangi
      noi: mangiamo
      voi: mangiate
    notes:
      en: "Verbs ending in -iare (mangiare, cominciare) drop the -i- before endings starting with -i or -e to avoid double i: mangi (not mangii), mangeremo (not mangieremo)."
      ko: "-iare로 끝나는 동사(mangiare, cominciare)는 -i 또는 -e로 시작하는 어미 앞에서 -i-를 탈락: mangi (mangii 아님), mangeremo (mangieremo 아님)."

  credere:
    infinitive: credere
    type: regular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to believe
      ko: 믿다
    past_participle: creduto
    gerund: credendo
    tenses:
      presente:
        io: credo
        tu: credi
        lui: crede
        noi: crediamo
        voi: credete
        loro: credono
      passato_remoto:
        io: credei
        tu: credesti
        lui: "cred\xE9"
        noi: credemmo
        voi: credeste
        loro: crederono
      imperfetto:
        io: credevo
        tu: credevi
        lui: credeva
        noi: credevamo
        voi: credevate
        loro: credevano
      futuro_semplice:
        io: "creder\xF2"
        tu: crederai
        lui: "creder\xE0"
        noi: crederemo
        voi: crederete
        loro: crederanno
      condizionale_presente:
        io: crederei
        tu: crederesti
        lui: crederebbe
        noi: crederemmo
        voi: credereste
        loro: crederebbero
      congiuntivo_presente:
        io: creda
        tu: creda
        lui: creda
        noi: crediamo
        voi: crediate
        loro: credano
      congiuntivo_imperfetto:
        io: credessi
        tu: credessi
        lui: credesse
        noi: credessimo
        voi: credeste
        loro: credessero
    irregular_imperative:
      tu: credi
      Lei: creda
      noi: crediamo
      voi: credete

  dormire:
    infinitive: dormire
    type: regular
    group: "-IRE"
    stem_change: null
    meaning:
      en: to sleep
      ko: 자다
    past_participle: dormito
    gerund: dormendo
    tenses:
      presente:
        io: dormo
        tu: dormi
        lui: dorme
        noi: dormiamo
        voi: dormite
        loro: dormono
      passato_remoto:
        io: dormii
        tu: dormisti
        lui: "dorm\xEC"
        noi: dormimmo
        voi: dormiste
        loro: dormirono
      imperfetto:
        io: dormivo
        tu: dormivi
        lui: dormiva
        noi: dormivamo
        voi: dormivate
        loro: dormivano
      futuro_semplice:
        io: "dormir\xF2"
        tu: dormirai
        lui: "dormir\xE0"
        noi: dormiremo
        voi: dormirete
        loro: dormiranno
      condizionale_presente:
        io: dormirei
        tu: dormiresti
        lui: dormirebbe
        noi: dormiremmo
        voi: dormireste
        loro: dormirebbero
      congiuntivo_presente:
        io: dorma
        tu: dorma
        lui: dorma
        noi: dormiamo
        voi: dormiate
        loro: dormano
      congiuntivo_imperfetto:
        io: dormissi
        tu: dormissi
        lui: dormisse
        noi: dormissimo
        voi: dormiste
        loro: dormissero
    irregular_imperative:
      tu: dormi
      Lei: dorma
      noi: dormiamo
      voi: dormite

  capire:
    infinitive: capire
    type: regular
    group: "-IRE (-ISC-)"
    stem_change: null
    meaning:
      en: to understand
      ko: 이해하다
    past_participle: capito
    gerund: capendo
    tenses:
      presente:
        io: capisco
        tu: capisci
        lui: capisce
        noi: capiamo
        voi: capite
        loro: capiscono
      passato_remoto:
        io: capii
        tu: capisti
        lui: "cap\xEC"
        noi: capimmo
        voi: capiste
        loro: capirono
      imperfetto:
        io: capivo
        tu: capivi
        lui: capiva
        noi: capivamo
        voi: capivate
        loro: capivano
      futuro_semplice:
        io: "capir\xF2"
        tu: capirai
        lui: "capir\xE0"
        noi: capiremo
        voi: capirete
        loro: capiranno
      condizionale_presente:
        io: capirei
        tu: capiresti
        lui: capirebbe
        noi: capiremmo
        voi: capireste
        loro: capirebbero
      congiuntivo_presente:
        io: capisca
        tu: capisca
        lui: capisca
        noi: capiamo
        voi: capiate
        loro: capiscano
      congiuntivo_imperfetto:
        io: capissi
        tu: capissi
        lui: capisse
        noi: capissimo
        voi: capiste
        loro: capissero
    irregular_imperative:
      tu: capisci
      Lei: capisca
      noi: capiamo
      voi: capite
    notes:
      en: "Many -IRE verbs insert -isc- between stem and ending in presente (io/tu/lui/loro), congiuntivo presente, and imperative (tu/Lei/loro). Examples: finire, preferire, pulire, spedire, costruire."
      ko: "많은 -IRE 동사가 현재형(io/tu/lui/loro), 접속법 현재, 명령법(tu/Lei/loro)에서 어간과 어미 사이에 -isc-를 삽입. 예: finire, preferire, pulire, spedire, costruire."

  # ============================================================
  # KEY IRREGULAR VERBS
  # ============================================================
  essere:
    infinitive: essere
    type: irregular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to be
      ko: ~이다
    past_participle: stato
    gerund: essendo
    tenses:
      presente:
        io: sono
        tu: sei
        lui: "\xE8"
        noi: siamo
        voi: siete
        loro: sono
      passato_remoto:
        io: fui
        tu: fosti
        lui: fu
        noi: fummo
        voi: foste
        loro: furono
      imperfetto:
        io: ero
        tu: eri
        lui: era
        noi: eravamo
        voi: eravate
        loro: erano
      futuro_semplice:
        io: "sar\xF2"
        tu: sarai
        lui: "sar\xE0"
        noi: saremo
        voi: sarete
        loro: saranno
      condizionale_presente:
        io: sarei
        tu: saresti
        lui: sarebbe
        noi: saremmo
        voi: sareste
        loro: sarebbero
      congiuntivo_presente:
        io: sia
        tu: sia
        lui: sia
        noi: siamo
        voi: siate
        loro: siano
      congiuntivo_imperfetto:
        io: fossi
        tu: fossi
        lui: fosse
        noi: fossimo
        voi: foste
        loro: fossero
    irregular_imperative:
      tu: sii
      Lei: sia
      noi: siamo
      voi: siate
    notes:
      en: "ESSERE is the most irregular Italian verb. Used as auxiliary for intransitive/motion verbs and reflexive verbs in compound tenses. Past participle agrees with subject when using essere as auxiliary."
      ko: "ESSERE는 가장 불규칙한 이탈리아어 동사. 복합 시제에서 자동사/이동 동사 및 재귀 동사의 조동사로 사용. essere를 조동사로 사용할 때 과거분사는 주어와 일치."

  avere:
    infinitive: avere
    type: irregular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to have
      ko: 가지다
    past_participle: avuto
    gerund: avendo
    tenses:
      presente:
        io: ho
        tu: hai
        lui: ha
        noi: abbiamo
        voi: avete
        loro: hanno
      passato_remoto:
        io: ebbi
        tu: avesti
        lui: ebbe
        noi: avemmo
        voi: aveste
        loro: ebbero
      imperfetto:
        io: avevo
        tu: avevi
        lui: aveva
        noi: avevamo
        voi: avevate
        loro: avevano
      futuro_semplice:
        io: "avr\xF2"
        tu: avrai
        lui: "avr\xE0"
        noi: avremo
        voi: avrete
        loro: avranno
      condizionale_presente:
        io: avrei
        tu: avresti
        lui: avrebbe
        noi: avremmo
        voi: avreste
        loro: avrebbero
      congiuntivo_presente:
        io: abbia
        tu: abbia
        lui: abbia
        noi: abbiamo
        voi: abbiate
        loro: abbiano
      congiuntivo_imperfetto:
        io: avessi
        tu: avessi
        lui: avesse
        noi: avessimo
        voi: aveste
        loro: avessero
    irregular_imperative:
      tu: abbi
      Lei: abbia
      noi: abbiamo
      voi: abbiate
    notes:
      en: "AVERE is the auxiliary for transitive verbs in compound tenses. The h- in ho, hai, ha, hanno is silent but written to distinguish from o (or), ai (to the), a (to), anno (year)."
      ko: "AVERE는 복합 시제에서 타동사의 조동사. ho, hai, ha, hanno의 h-는 묵음이지만 o(또는), ai(~에게), a(~에), anno(년)와 구별하기 위해 표기."

  andare:
    infinitive: andare
    type: irregular
    group: "-ARE"
    stem_change: null
    meaning:
      en: to go
      ko: 가다
    past_participle: andato
    gerund: andando
    tenses:
      presente:
        io: vado
        tu: vai
        lui: va
        noi: andiamo
        voi: andate
        loro: vanno
      passato_remoto:
        io: andai
        tu: andasti
        lui: "and\xF2"
        noi: andammo
        voi: andaste
        loro: andarono
      imperfetto:
        io: andavo
        tu: andavi
        lui: andava
        noi: andavamo
        voi: andavate
        loro: andavano
      futuro_semplice:
        io: "andr\xF2"
        tu: andrai
        lui: "andr\xE0"
        noi: andremo
        voi: andrete
        loro: andranno
      condizionale_presente:
        io: andrei
        tu: andresti
        lui: andrebbe
        noi: andremmo
        voi: andreste
        loro: andrebbero
      congiuntivo_presente:
        io: vada
        tu: vada
        lui: vada
        noi: andiamo
        voi: andiate
        loro: vadano
      congiuntivo_imperfetto:
        io: andassi
        tu: andassi
        lui: andasse
        noi: andassimo
        voi: andaste
        loro: andassero
    irregular_imperative:
      tu: va'
      Lei: vada
      noi: andiamo
      voi: andate
    notes:
      en: "Andare uses essere as auxiliary in compound tenses. Irregular in presente (vado/vai/va/vanno), futuro (andr-), condizionale (andr-), and congiuntivo presente (vada). Tu imperative is va' (with apostrophe) or vai."
      ko: "Andare는 복합 시제에서 essere를 조동사로 사용. 현재(vado/vai/va/vanno), 미래(andr-), 조건법(andr-), 접속법 현재(vada)에서 불규칙. Tu 명령형은 va'(아포스트로피 포함) 또는 vai."

  fare:
    infinitive: fare
    type: irregular
    group: "-ARE"
    stem_change: null
    meaning:
      en: to do / to make
      ko: 하다 / 만들다
    past_participle: fatto
    gerund: facendo
    tenses:
      presente:
        io: faccio
        tu: fai
        lui: fa
        noi: facciamo
        voi: fate
        loro: fanno
      passato_remoto:
        io: feci
        tu: facesti
        lui: fece
        noi: facemmo
        voi: faceste
        loro: fecero
      imperfetto:
        io: facevo
        tu: facevi
        lui: faceva
        noi: facevamo
        voi: facevate
        loro: facevano
      futuro_semplice:
        io: "far\xF2"
        tu: farai
        lui: "far\xE0"
        noi: faremo
        voi: farete
        loro: faranno
      condizionale_presente:
        io: farei
        tu: faresti
        lui: farebbe
        noi: faremmo
        voi: fareste
        loro: farebbero
      congiuntivo_presente:
        io: faccia
        tu: faccia
        lui: faccia
        noi: facciamo
        voi: facciate
        loro: facciano
      congiuntivo_imperfetto:
        io: facessi
        tu: facessi
        lui: facesse
        noi: facessimo
        voi: faceste
        loro: facessero
    irregular_imperative:
      tu: fa'
      Lei: faccia
      noi: facciamo
      voi: fate
    notes:
      en: "Fare derives from Latin FACERE. Highly irregular: uses fac- stem in many forms. Imperfetto and congiuntivo imperfetto use facev-/facess- (from the old infinitive facere). Tu imperative is fa' or fai."
      ko: "Fare는 라틴어 FACERE에서 파생. 매우 불규칙: 많은 형태에서 fac- 어간 사용. 불완료와 접속법 불완료는 facev-/facess- 사용 (옛 부정사 facere에서). Tu 명령형은 fa' 또는 fai."

  dire:
    infinitive: dire
    type: irregular
    group: "-IRE"
    stem_change: null
    meaning:
      en: to say / to tell
      ko: 말하다 / 이야기하다
    past_participle: detto
    gerund: dicendo
    tenses:
      presente:
        io: dico
        tu: dici
        lui: dice
        noi: diciamo
        voi: dite
        loro: dicono
      passato_remoto:
        io: dissi
        tu: dicesti
        lui: disse
        noi: dicemmo
        voi: diceste
        loro: dissero
      imperfetto:
        io: dicevo
        tu: dicevi
        lui: diceva
        noi: dicevamo
        voi: dicevate
        loro: dicevano
      futuro_semplice:
        io: "dir\xF2"
        tu: dirai
        lui: "dir\xE0"
        noi: diremo
        voi: direte
        loro: diranno
      condizionale_presente:
        io: direi
        tu: diresti
        lui: direbbe
        noi: diremmo
        voi: direste
        loro: direbbero
      congiuntivo_presente:
        io: dica
        tu: dica
        lui: dica
        noi: diciamo
        voi: diciate
        loro: dicano
      congiuntivo_imperfetto:
        io: dicessi
        tu: dicessi
        lui: dicesse
        noi: dicessimo
        voi: diceste
        loro: dicessero
    irregular_imperative:
      tu: di'
      Lei: dica
      noi: diciamo
      voi: dite
    notes:
      en: "Dire derives from Latin DICERE. Uses dic- stem in most forms. Past participle is detto (irregular). Tu imperative is di' (with apostrophe)."
      ko: "Dire는 라틴어 DICERE에서 파생. 대부분의 형태에서 dic- 어간 사용. 과거분사는 detto (불규칙). Tu 명령형은 di' (아포스트로피 포함)."

  potere:
    infinitive: potere
    type: irregular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to be able to / can
      ko: 할 수 있다
    past_participle: potuto
    gerund: potendo
    tenses:
      presente:
        io: posso
        tu: puoi
        lui: "pu\xF2"
        noi: possiamo
        voi: potete
        loro: possono
      passato_remoto:
        io: potei
        tu: potesti
        lui: "pot\xE9"
        noi: potemmo
        voi: poteste
        loro: poterono
      imperfetto:
        io: potevo
        tu: potevi
        lui: poteva
        noi: potevamo
        voi: potevate
        loro: potevano
      futuro_semplice:
        io: "potr\xF2"
        tu: potrai
        lui: "potr\xE0"
        noi: potremo
        voi: potrete
        loro: potranno
      condizionale_presente:
        io: potrei
        tu: potresti
        lui: potrebbe
        noi: potremmo
        voi: potreste
        loro: potrebbero
      congiuntivo_presente:
        io: possa
        tu: possa
        lui: possa
        noi: possiamo
        voi: possiate
        loro: possano
      congiuntivo_imperfetto:
        io: potessi
        tu: potessi
        lui: potesse
        noi: potessimo
        voi: poteste
        loro: potessero
    irregular_imperative: null
    notes:
      en: "Potere is a modal verb with no imperative forms. Takes essere or avere as auxiliary depending on the main verb it accompanies. Irregular in presente (posso/puoi/puo/possono), futuro (potr-), and congiuntivo presente (possa)."
      ko: "Potere는 명령형이 없는 조동사. 함께 사용되는 본동사에 따라 essere 또는 avere를 조동사로 취함. 현재(posso/puoi/puo/possono), 미래(potr-), 접속법 현재(possa)에서 불규칙."

  volere:
    infinitive: volere
    type: irregular
    group: "-ERE"
    stem_change: null
    meaning:
      en: to want
      ko: 원하다
    past_participle: voluto
    gerund: volendo
    tenses:
      presente:
        io: voglio
        tu: vuoi
        lui: vuole
        noi: vogliamo
        voi: volete
        loro: vogliono
      passato_remoto:
        io: volli
        tu: volesti
        lui: volle
        noi: volemmo
        voi: voleste
        loro: vollero
      imperfetto:
        io: volevo
        tu: volevi
        lui: voleva
        noi: volevamo
        voi: volevate
        loro: volevano
      futuro_semplice:
        io: "vorr\xF2"
        tu: vorrai
        lui: "vorr\xE0"
        noi: vorremo
        voi: vorrete
        loro: vorranno
      condizionale_presente:
        io: vorrei
        tu: vorresti
        lui: vorrebbe
        noi: vorremmo
        voi: vorreste
        loro: vorrebbero
      congiuntivo_presente:
        io: voglia
        tu: voglia
        lui: voglia
        noi: vogliamo
        voi: vogliate
        loro: vogliano
      congiuntivo_imperfetto:
        io: volessi
        tu: volessi
        lui: volesse
        noi: volessimo
        voi: voleste
