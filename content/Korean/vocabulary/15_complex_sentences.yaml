- id: sentence_final_patterns
  label:
    en: Sentence-Final Patterns
    ko: 종결 표현
  type: vocabulary
  words:
  - korean: -거든요
    reading: null
    translation:
      en: you see / the reason is (explanatory)
      ko: 이유를 설명하는 종결 어미
    gender: null
    plural: null
    notes:
      en: "Provides background explanation for something"
      ko: "앞의 내용에 대한 배경 설명을 제공"
  - korean: -잖아요
    reading: null
    translation:
      en: you know / as you know
      ko: 상대방도 아는 사실을 환기하는 종결 어미
    gender: null
    plural: null
    notes:
      en: "Reminds the listener of something they should know"
      ko: "듣는 사람이 이미 알고 있는 사실을 상기시킴"
  - korean: -네요
    reading: null
    translation:
      en: oh! / I see (surprise/realization)
      ko: 새로 깨달은 사실에 대한 감탄
    gender: null
    plural: null
    notes:
      en: "Expresses mild surprise or new realization"
      ko: "가벼운 놀라움이나 새로운 깨달음 표현"
  - korean: -군요/구나
    reading: null
    translation:
      en: I see / so it is (realization)
      ko: 새로 알게 된 사실에 대한 감탄
    gender: null
    plural: null
    notes:
      en: "-군요 (polite), -구나 (casual)"
      ko: "-군요 (높임), -구나 (낮춤)"
  - korean: -(으)ㄹ게요
    reading: null
    translation:
      en: I will (promise/intention to listener)
      ko: 듣는 사람에게 약속/의지를 나타냄
    gender: null
    plural: null
    notes:
      en: "First person only; shows intention with consideration for listener"
      ko: "1인칭만 사용; 듣는 사람을 배려한 의지 표현"
  - korean: -(으)ㄹ까요
    reading: null
    translation:
      en: shall we / do you think
      ko: 제안이나 추측을 나타냄
    gender: null
    plural: null
    notes:
      en: "Suggestion or speculation"
      ko: "제안 또는 추측 표현"
  - korean: -(으)ㄹ 텐데
    reading: null
    translation:
      en: I expect that / it will probably
      ko: 추측이나 예상을 나타냄
    gender: null
    plural: null
  - korean: -나 보다
    reading: null
    translation:
      en: it seems / it appears
      ko: 추측을 나타냄
    gender: null
    plural: null
    notes:
      en: "Inference based on observation"
      ko: "관찰에 근거한 추측"
  - korean: -(으)ㄴ/는 모양이다
    reading: null
    translation:
      en: it looks like / it appears that
      ko: ~인 것 같다 (추측)
    gender: null
    plural: null

