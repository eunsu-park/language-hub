# Korean Verb and Adjective Conjugation Paradigms
# Verb forms: present_polite (해요체), present_formal (합쇼체), past_polite, past_formal, future_polite, imperative, propositive
# Adjective forms: present_polite, present_formal, past_polite, past_formal, future_polite (imperative/propositive N/A)

verbs:
  # ============================================================
  # REGULAR VERBS (규칙 동사)
  # ============================================================
  gada:
    dictionary: 가다
    reading: null
    type: regular
    group: a-ending-stem
    meaning:
      en: to go
      ko: 가다
    forms:
      present_polite: 가요
      present_formal: 갑니다
      past_polite: 갔어요
      past_formal: 갔습니다
      future_polite: 갈 거예요
      imperative: 가세요
      propositive: 갑시다
    notes:
      en: "Regular verb. Stem 가 ends in ㅏ, so 아요 contracts: 가+아요 → 가요."
      ko: "규칙 동사. 어간 '가'가 ㅏ로 끝나므로 아요가 축약됨: 가+아요 → 가요."

  oda:
    dictionary: 오다
    reading: null
    type: regular
    group: o-ending-stem
    meaning:
      en: to come
      ko: 오다
    forms:
      present_polite: 와요
      present_formal: 옵니다
      past_polite: 왔어요
      past_formal: 왔습니다
      future_polite: 올 거예요
      imperative: 오세요
      propositive: 옵시다
    notes:
      en: "Regular verb. Stem 오 ends in ㅗ, so 아요 contracts: 오+아요 → 와요."
      ko: "규칙 동사. 어간 '오'가 ㅗ로 끝나므로 아요가 축약됨: 오+아요 → 와요."

  meokda:
    dictionary: 먹다
    reading: null
    type: regular
    group: consonant-ending-stem
    meaning:
      en: to eat
      ko: 먹다
    forms:
      present_polite: 먹어요
      present_formal: 먹습니다
      past_polite: 먹었어요
      past_formal: 먹었습니다
      future_polite: 먹을 거예요
      imperative: 드세요
      propositive: 먹읍시다
    notes:
      en: "Regular verb with consonant-ending stem 먹. Uses 어요 (dark vowel stem). Honorific imperative uses 드시다 stem (드세요) instead of 먹으세요."
      ko: "자음으로 끝나는 규칙 동사. 어간 '먹'은 어두운 모음이므로 어요 사용. 존칭 명령형은 먹으세요 대신 드세요 사용."

  masida:
    dictionary: 마시다
    reading: null
    type: regular
    group: i-ending-stem
    meaning:
      en: to drink
      ko: 마시다
    forms:
      present_polite: 마셔요
      present_formal: 마십니다
      past_polite: 마셨어요
      past_formal: 마셨습니다
      future_polite: 마실 거예요
      imperative: 마시세요
      propositive: 마십시다
    notes:
      en: "Regular verb. Stem 마시 ends in ㅣ, so 어요 contracts: 마시+어요 → 마셔요."
      ko: "규칙 동사. 어간 '마시'가 ㅣ로 끝나므로 어요가 축약됨: 마시+어요 → 마셔요."

  hada:
    dictionary: 하다
    reading: null
    type: regular
    group: hada-verb
    meaning:
      en: to do
      ko: 하다
    forms:
      present_polite: 해요
      present_formal: 합니다
      past_polite: 했어요
      past_formal: 했습니다
      future_polite: 할 거예요
      imperative: 하세요
      propositive: 합시다
    notes:
      en: "하다 verb — the most common verb type. 하+여요 contracts to 해요. Many nouns combine with 하다 to form compound verbs: 공부하다 (to study), 요리하다 (to cook), 운동하다 (to exercise)."
      ko: "하다 동사 — 가장 흔한 동사 유형. 하+여요가 해요로 축약됨. 많은 명사가 하다와 결합하여 복합 동사를 형성: 공부하다, 요리하다, 운동하다."

  boda:
    dictionary: 보다
    reading: null
    type: regular
    group: o-ending-stem
    meaning:
      en: to see, to watch
      ko: 보다
    forms:
      present_polite: 봐요
      present_formal: 봅니다
      past_polite: 봤어요
      past_formal: 봤습니다
      future_polite: 볼 거예요
      imperative: 보세요
      propositive: 봅시다
    notes:
      en: "Regular verb. Stem 보 ends in ㅗ, so 아요 contracts: 보+아요 → 봐요."
      ko: "규칙 동사. 어간 '보'가 ㅗ로 끝나므로 아요가 축약됨: 보+아요 → 봐요."

  ikda:
    dictionary: 읽다
    reading: null
    type: regular
    group: consonant-ending-stem
    meaning:
      en: to read
      ko: 읽다
    forms:
      present_polite: 읽어요
      present_formal: 읽습니다
      past_polite: 읽었어요
      past_formal: 읽었습니다
      future_polite: 읽을 거예요
      imperative: 읽으세요
      propositive: 읽읍시다
    notes:
      en: "Regular verb with consonant cluster ending (ㄺ). Pronunciation: the ㄹ is silent before consonants ([익다]), but pronounced before vowels ([일거요])."
      ko: "겹받침(ㄺ)으로 끝나는 규칙 동사. 발음: 자음 앞에서 ㄹ 탈락 ([익다]), 모음 앞에서는 ㄹ 발음 ([일거요])."

  sseuda:
    dictionary: 쓰다
    reading: null
    type: regular
    group: eu-ending-stem
    meaning:
      en: to write, to use
      ko: 쓰다
    forms:
      present_polite: 써요
      present_formal: 씁니다
      past_polite: 썼어요
      past_formal: 썼습니다
      future_polite: 쓸 거예요
      imperative: 쓰세요
      propositive: 씁시다
    notes:
      en: "Regular verb with ㅡ-ending stem. The ㅡ drops before 어요: 쓰+어요 → 써요 (ㅡ deletion rule)."
      ko: "ㅡ로 끝나는 규칙 동사. ㅡ가 어요 앞에서 탈락: 쓰+어요 → 써요 (ㅡ 탈락 규칙)."

  sada:
    dictionary: 사다
    reading: null
    type: regular
    group: a-ending-stem
    meaning:
      en: to buy
      ko: 사다
    forms:
      present_polite: 사요
      present_formal: 삽니다
      past_polite: 샀어요
      past_formal: 샀습니다
      future_polite: 살 거예요
      imperative: 사세요
      propositive: 삽시다
    notes:
      en: "Regular verb. Stem 사 ends in ㅏ, so 아요 contracts: 사+아요 → 사요. Past: 사+았 → 샀."
      ko: "규칙 동사. 어간 '사'가 ㅏ로 끝나므로 아요가 축약됨: 사+아요 → 사요. 과거: 사+았 → 샀."

  ilhada:
    dictionary: 일하다
    reading: null
    type: regular
    group: hada-compound
    meaning:
      en: to work
      ko: 일하다
    forms:
      present_polite: 일해요
      present_formal: 일합니다
      past_polite: 일했어요
      past_formal: 일했습니다
      future_polite: 일할 거예요
      imperative: 일하세요
      propositive: 일합시다
    notes:
      en: "하다 compound verb (일 + 하다). Conjugates exactly like 하다: 하+여요 → 해요."
      ko: "하다 복합 동사 (일 + 하다). 하다와 동일하게 활용: 하+여요 → 해요."

  baeuda:
    dictionary: 배우다
    reading: null
    type: regular
    group: u-ending-stem
    meaning:
      en: to learn
      ko: 배우다
    forms:
      present_polite: 배워요
      present_formal: 배웁니다
      past_polite: 배웠어요
      past_formal: 배웠습니다
      future_polite: 배울 거예요
      imperative: 배우세요
      propositive: 배웁시다
    notes:
      en: "Regular verb. Stem 배우 ends in ㅜ, so 어요 contracts: 배우+어요 → 배워요."
      ko: "규칙 동사. 어간 '배우'가 ㅜ로 끝나므로 어요가 축약됨: 배우+어요 → 배워요."

  # ============================================================
  # ㄹ IRREGULAR VERBS (ㄹ 불규칙 동사)
  # ============================================================
  mandeulda:
    dictionary: 만들다
    reading: null
    type: irregular_ㄹ
    group: l-irregular
    meaning:
      en: to make, to create
      ko: 만들다
    forms:
      present_polite: 만들어요
      present_formal: 만듭니다
      past_polite: 만들었어요
      past_formal: 만들었습니다
      future_polite: 만들 거예요
      imperative: 만드세요
      propositive: 만듭시다
    notes:
      en: "ㄹ irregular verb. The final ㄹ drops before suffixes starting with ㄴ, ㅂ, or ㅅ: 만듭니다 (not 만들습니다), 만드세요 (not 만들세요). ㄹ is retained before vowel suffixes: 만들어요."
      ko: "ㄹ 불규칙 동사. ㄹ이 ㄴ, ㅂ, ㅅ으로 시작하는 어미 앞에서 탈락: 만듭니다 (만들습니다가 아님), 만드세요 (만들세요가 아님). 모음 어미 앞에서는 ㄹ 유지: 만들어요."

  # ============================================================
  # ㄷ IRREGULAR VERBS (ㄷ 불규칙 동사)
  # ============================================================
  deutda:
    dictionary: 듣다
    reading: null
    type: irregular_ㄷ
    group: d-irregular
    meaning:
      en: to listen, to hear
      ko: 듣다
    forms:
      present_polite: 들어요
      present_formal: 듣습니다
      past_polite: 들었어요
      past_formal: 들었습니다
      future_polite: 들을 거예요
      imperative: 들으세요
      propositive: 들읍시다
    notes:
      en: "ㄷ irregular verb. The final ㄷ changes to ㄹ before vowel-initial suffixes: 듣+어요 → 들어요. Before consonant suffixes, ㄷ is retained: 듣습니다. Not all ㄷ-ending verbs are irregular; 받다 (to receive) is regular."
      ko: "ㄷ 불규칙 동사. 모음으로 시작하는 어미 앞에서 ㄷ이 ㄹ로 변함: 듣+어요 → 들어요. 자음 어미 앞에서는 ㄷ 유지: 듣습니다. 모든 ㄷ 받침 동사가 불규칙인 것은 아님; 받다는 규칙 동사."

  geotda:
    dictionary: 걷다
    reading: null
    type: irregular_ㄷ
    group: d-irregular
    meaning:
      en: to walk
      ko: 걷다
    forms:
      present_polite: 걸어요
      present_formal: 걷습니다
      past_polite: 걸었어요
      past_formal: 걸었습니다
      future_polite: 걸을 거예요
      imperative: 걸으세요
      propositive: 걸읍시다
    notes:
      en: "ㄷ irregular verb. Same pattern as 듣다: ㄷ→ㄹ before vowels. 걷+어요 → 걸어요."
      ko: "ㄷ 불규칙 동사. 듣다와 같은 패턴: 모음 앞에서 ㄷ→ㄹ. 걷+어요 → 걸어요."

  # ============================================================
  # ㅂ IRREGULAR VERBS (ㅂ 불규칙 동사)
  # ============================================================
  dopda:
    dictionary: 돕다
    reading: null
    type: irregular_ㅂ
    group: b-irregular
    meaning:
      en: to help
      ko: 돕다
    forms:
      present_polite: 도와요
      present_formal: 돕습니다
      past_polite: 도왔어요
      past_formal: 도왔습니다
      future_polite: 도울 거예요
      imperative: 도우세요
      propositive: 도웁시다
    notes:
      en: "ㅂ irregular verb. The final ㅂ changes to 우 before vowel suffixes: 돕+아요 → 도우+아요 → 도와요 (우+아 contracts to 와). Special case: 돕다 uses 오/와 contraction (not 워) because the preceding vowel is ㅗ."
      ko: "ㅂ 불규칙 동사. 모음 어미 앞에서 ㅂ이 우로 변함: 돕+아요 → 도우+아요 → 도와요 (우+아가 와로 축약). 특수: 돕다는 앞 모음이 ㅗ이므로 워가 아닌 와로 축약됨."

  deopda:
    dictionary: 덥다
    reading: null
    type: irregular_ㅂ
    group: b-irregular
    meaning:
      en: to be hot (weather)
      ko: 덥다
    forms:
      present_polite: 더워요
      present_formal: 덥습니다
      past_polite: 더웠어요
      past_formal: 더웠습니다
      future_polite: 더울 거예요
      imperative: 더우세요
      propositive: 덥읍시다
    notes:
      en: "ㅂ irregular adjective-like verb. ㅂ→우 before vowels: 덥+어요 → 더우+어요 → 더워요 (우+어 contracts to 워). Imperative and propositive are grammatically unusual for weather adjectives but included for pattern reference."
      ko: "ㅂ 불규칙 형용사성 동사. 모음 앞에서 ㅂ→우: 덥+어요 → 더우+어요 → 더워요 (우+어가 워로 축약). 날씨 형용사의 명령형/청유형은 문법적으로 드물지만 패턴 참고용으로 포함."

  # ============================================================
  # ㅅ IRREGULAR VERBS (ㅅ 불규칙 동사)
  # ============================================================
  jitda:
    dictionary: 짓다
    reading: null
    type: irregular_ㅅ
    group: s-irregular
    meaning:
      en: to build, to construct
      ko: 짓다
    forms:
      present_polite: 지어요
      present_formal: 짓습니다
      past_polite: 지었어요
      past_formal: 지었습니다
      future_polite: 지을 거예요
      imperative: 지으세요
      propositive: 지읍시다
    notes:
      en: "ㅅ irregular verb. The final ㅅ drops before vowel suffixes: 짓+어요 → 지어요. Before consonant suffixes, ㅅ is retained: 짓습니다. Not all ㅅ-ending verbs are irregular; 웃다 (to laugh) is regular."
      ko: "ㅅ 불규칙 동사. 모음 어미 앞에서 ㅅ이 탈락: 짓+어요 → 지어요. 자음 어미 앞에서는 ㅅ 유지: 짓습니다. 모든 ㅅ 받침 동사가 불규칙인 것은 아님; 웃다는 규칙 동사."

  natda:
    dictionary: 낫다
    reading: null
    type: irregular_ㅅ
    group: s-irregular
    meaning:
      en: to be better, to recover
      ko: 낫다
    forms:
      present_polite: 나아요
      present_formal: 낫습니다
      past_polite: 나았어요
      past_formal: 나았습니다
      future_polite: 나을 거예요
      imperative: 나으세요
      propositive: 나읍시다
    notes:
      en: "ㅅ irregular verb. Same pattern as 짓다: ㅅ drops before vowels. 낫+아요 → 나아요."
      ko: "ㅅ 불규칙 동사. 짓다와 같은 패턴: 모음 앞에서 ㅅ 탈락. 낫+아요 → 나아요."

  # ============================================================
  # 르 IRREGULAR VERBS (르 불규칙 동사)
  # ============================================================
  ppareuda:
    dictionary: 빠르다
    reading: null
    type: irregular_르
    group: reu-irregular
    meaning:
      en: to be fast, to be quick
      ko: 빠르다
    forms:
      present_polite: 빨라요
      present_formal: 빠릅니다
      past_polite: 빨랐어요
      past_formal: 빨랐습니다
      future_polite: 빠를 거예요
      imperative: 빠르세요
      propositive: 빠릅시다
    notes:
      en: "르 irregular verb. Before 아/어, 르 becomes ㄹ라/ㄹ러: 빠르+아요 → 빨라요 (ㄹ is added to the preceding syllable, and 르 becomes 라). Since the preceding vowel is ㅏ, the suffix is 라 (not 러)."
      ko: "르 불규칙 동사. 아/어 앞에서 르가 ㄹ라/ㄹ러로 변함: 빠르+아요 → 빨라요 (앞 음절에 ㄹ이 추가되고 르가 라로 변함). 앞 모음이 ㅏ이므로 라 사용 (러가 아님)."

  moreuda:
    dictionary: 모르다
    reading: null
    type: irregular_르
    group: reu-irregular
    meaning:
      en: to not know, to be unaware
      ko: 모르다
    forms:
      present_polite: 몰라요
      present_formal: 모릅니다
      past_polite: 몰랐어요
      past_formal: 몰랐습니다
      future_polite: 모를 거예요
      imperative: 모르세요
      propositive: 모릅시다
    notes:
      en: "르 irregular verb. Same pattern as 빠르다: 모르+아요 → 몰라요. The preceding vowel ㅗ triggers the 아 suffix (양성 모음)."
      ko: "르 불규칙 동사. 빠르다와 같은 패턴: 모르+아요 → 몰라요. 앞 모음 ㅗ가 양성 모음이므로 아 사용."

# ============================================================
# KOREAN VERB CONJUGATION RULES SUMMARY
# ============================================================
verb_conjugation_rules:
  description:
    en: "Korean verbs conjugate by attaching endings to the verb stem (dictionary form minus 다). The choice of ending depends on the final vowel of the stem (vowel harmony) and whether the stem ends in a consonant or vowel."
    ko: "한국어 동사는 어간(사전형에서 다를 뺀 형태)에 어미를 붙여 활용한다. 어미의 선택은 어간의 마지막 모음(모음 조화)과 어간이 자음/모음으로 끝나는지에 따라 달라진다."
  vowel_harmony:
    bright_vowels:
      description:
        en: "Stems with ㅏ or ㅗ as the last vowel take 아-series endings"
        ko: "마지막 모음이 ㅏ 또는 ㅗ인 어간은 아 계열 어미 사용"
      examples: ["가다 → 가+아요 → 가요", "오다 → 오+아요 → 와요"]
    dark_vowels:
      description:
        en: "All other vowels take 어-series endings"
        ko: "그 외의 모음은 어 계열 어미 사용"
      examples: ["먹다 → 먹+어요 → 먹어요", "배우다 → 배우+어요 → 배워요"]
    hada_exception:
      description:
        en: "하다 verbs take 여 which contracts to 해: 하+여요 → 해요"
        ko: "하다 동사는 여를 취하며 해로 축약: 하+여요 → 해요"
  contraction_rules:
    - pattern: "ㅏ + 아 → ㅏ"
      example: "가+아요 → 가요"
    - pattern: "ㅗ + 아 → 와"
      example: "오+아요 → 와요"
    - pattern: "ㅜ + 어 → 워"
      example: "배우+어요 → 배워요"
    - pattern: "ㅣ + 어 → 여"
      example: "마시+어요 → 마셔요"
    - pattern: "ㅡ + 어 → 어 (ㅡ drops)"
      example: "쓰+어요 → 써요"
    - pattern: "하 + 여 → 해"
      example: "하+여요 → 해요"
  irregular_types:
    ㄷ_irregular:
      rule:
        en: "Final ㄷ → ㄹ before vowel endings"
        ko: "받침 ㄷ이 모음 어미 앞에서 ㄹ로 변함"
      examples: ["듣다 → 들어요", "걷다 → 걸어요"]
      regular_exceptions: ["받다 → 받아요", "닫다 → 닫아요"]
    ㅂ_irregular:
      rule:
        en: "Final ㅂ → 우 before vowel endings (우+아→와, 우+어→워)"
        ko: "받침 ㅂ이 모음 어미 앞에서 우로 변함 (우+아→와, 우+어→워)"
      examples: ["돕다 → 도와요", "덥다 → 더워요"]
      regular_exceptions: ["입다 → 입어요", "잡다 → 잡아요"]
    ㅅ_irregular:
      rule:
        en: "Final ㅅ drops before vowel endings"
        ko: "받침 ㅅ이 모음 어미 앞에서 탈락"
      examples: ["짓다 → 지어요", "낫다 → 나아요"]
      regular_exceptions: ["웃다 → 웃어요", "씻다 → 씻어요"]
    르_irregular:
      rule:
        en: "르 → ㄹ라/ㄹ러 before 아/어 (ㄹ added to preceding syllable)"
        ko: "르가 아/어 앞에서 ㄹ라/ㄹ러로 변함 (앞 음절에 ㄹ 추가)"
      examples: ["빠르다 → 빨라요", "모르다 → 몰라요"]
    ㄹ_irregular:
      rule:
        en: "Final ㄹ drops before ㄴ, ㅂ, ㅅ-initial endings"
        ko: "받침 ㄹ이 ㄴ, ㅂ, ㅅ으로 시작하는 어미 앞에서 탈락"
      examples: ["만들다 → 만듭니다", "만들다 → 만드세요"]

# ============================================================
# ADJECTIVES (형용사)
# ============================================================
adjectives:
  # ============================================================
  # REGULAR ADJECTIVES (규칙 형용사)
  # ============================================================
  keuda:
    dictionary: 크다
    reading: null
    type: regular
    group: eu-ending-stem
    meaning:
      en: big, large
      ko: 크다
    forms:
      present_polite: 커요
      present_formal: 큽니다
      past_polite: 컸어요
      past_formal: 컸습니다
      future_polite: 클 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "Regular adjective with ㅡ-ending stem. ㅡ drops before 어요: 크+어요 → 커요. Imperative and propositive are not applicable for adjectives."
      ko: "ㅡ로 끝나는 규칙 형용사. ㅡ가 어요 앞에서 탈락: 크+어요 → 커요. 형용사는 명령형과 청유형 해당 없음."

  jakda:
    dictionary: 작다
    reading: null
    type: regular
    group: consonant-ending-stem
    meaning:
      en: small, little
      ko: 작다
    forms:
      present_polite: 작아요
      present_formal: 작습니다
      past_polite: 작았어요
      past_formal: 작았습니다
      future_polite: 작을 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "Regular adjective. Stem 작 ends in a consonant with bright vowel ㅏ, so 아요 is used."
      ko: "규칙 형용사. 어간 '작'이 양성 모음 ㅏ를 포함하므로 아요 사용."

  jota:
    dictionary: 좋다
    reading: null
    type: regular
    group: consonant-ending-stem
    meaning:
      en: good, nice
      ko: 좋다
    forms:
      present_polite: 좋아요
      present_formal: 좋습니다
      past_polite: 좋았어요
      past_formal: 좋았습니다
      future_polite: 좋을 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "Regular adjective. Stem 좋 has the bright vowel ㅗ, so 아요 is used. The ㅎ batchim is pronounced but does not trigger irregularity."
      ko: "규칙 형용사. 어간 '좋'이 양성 모음 ㅗ를 포함하므로 아요 사용. ㅎ 받침은 발음되지만 불규칙을 유발하지 않음."

  manta:
    dictionary: 많다
    reading: null
    type: regular
    group: consonant-ending-stem
    meaning:
      en: many, much, a lot
      ko: 많다
    forms:
      present_polite: 많아요
      present_formal: 많습니다
      past_polite: 많았어요
      past_formal: 많았습니다
      future_polite: 많을 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "Regular adjective. Stem 많 has the bright vowel ㅏ, so 아요 is used."
      ko: "규칙 형용사. 어간 '많'이 양성 모음 ㅏ를 포함하므로 아요 사용."

  # ============================================================
  # ㅡ IRREGULAR ADJECTIVES (ㅡ 불규칙 형용사)
  # ============================================================
  nappuda:
    dictionary: 나쁘다
    reading: null
    type: irregular_ㅡ
    group: eu-irregular
    meaning:
      en: bad
      ko: 나쁘다
    forms:
      present_polite: 나빠요
      present_formal: 나쁩니다
      past_polite: 나빴어요
      past_formal: 나빴습니다
      future_polite: 나쁠 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㅡ irregular adjective. When ㅡ drops, the vowel harmony looks at the preceding syllable 나 (ㅏ, bright), so 아요 is used: 나쁘+아요 → 나빠요."
      ko: "ㅡ 불규칙 형용사. ㅡ가 탈락하면 앞 음절 나(ㅏ, 양성 모음)를 참조하여 아요 사용: 나쁘+아요 → 나빠요."

  yeppeuda:
    dictionary: 예쁘다
    reading: null
    type: irregular_ㅡ
    group: eu-irregular
    meaning:
      en: pretty, beautiful
      ko: 예쁘다
    forms:
      present_polite: 예뻐요
      present_formal: 예쁩니다
      past_polite: 예뻤어요
      past_formal: 예뻤습니다
      future_polite: 예쁠 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㅡ irregular adjective. When ㅡ drops, the preceding syllable 예 has a dark vowel, so 어요 is used: 예쁘+어요 → 예뻐요."
      ko: "ㅡ 불규칙 형용사. ㅡ가 탈락하면 앞 음절 예(음성 모음)를 참조하여 어요 사용: 예쁘+어요 → 예뻐요."

  # ============================================================
  # ㄹ IRREGULAR ADJECTIVES (ㄹ 불규칙 형용사)
  # ============================================================
  meolda:
    dictionary: 멀다
    reading: null
    type: irregular_ㄹ
    group: l-irregular
    meaning:
      en: far, distant
      ko: 멀다
    forms:
      present_polite: 멀어요
      present_formal: 멉니다
      past_polite: 멀었어요
      past_formal: 멀었습니다
      future_polite: 멀 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㄹ irregular adjective. The final ㄹ drops before ㄴ, ㅂ, ㅅ-initial endings: 멉니다 (not 멀습니다). ㄹ is retained before vowel endings: 멀어요."
      ko: "ㄹ 불규칙 형용사. ㄹ이 ㄴ, ㅂ, ㅅ으로 시작하는 어미 앞에서 탈락: 멉니다 (멀습니다가 아님). 모음 어미 앞에서는 ㄹ 유지: 멀어요."

  # ============================================================
  # ㅂ IRREGULAR ADJECTIVES (ㅂ 불규칙 형용사)
  # ============================================================
  gakkapda:
    dictionary: 가깝다
    reading: null
    type: irregular_ㅂ
    group: b-irregular
    meaning:
      en: close, near
      ko: 가깝다
    forms:
      present_polite: 가까워요
      present_formal: 가깝습니다
      past_polite: 가까웠어요
      past_formal: 가까웠습니다
      future_polite: 가까울 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㅂ irregular adjective. ㅂ→우 before vowels: 가깝+어요 → 가까우+어요 → 가까워요 (우+어 contracts to 워)."
      ko: "ㅂ 불규칙 형용사. 모음 앞에서 ㅂ→우: 가깝+어요 → 가까우+어요 → 가까워요 (우+어가 워로 축약)."

  eoryeopda:
    dictionary: 어렵다
    reading: null
    type: irregular_ㅂ
    group: b-irregular
    meaning:
      en: difficult, hard
      ko: 어렵다
    forms:
      present_polite: 어려워요
      present_formal: 어렵습니다
      past_polite: 어려웠어요
      past_formal: 어려웠습니다
      future_polite: 어려울 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㅂ irregular adjective. Same pattern as 가깝다: ㅂ→우 before vowels, then 우+어 → 워."
      ko: "ㅂ 불규칙 형용사. 가깝다와 같은 패턴: 모음 앞에서 ㅂ→우, 그 후 우+어 → 워."

  swipda:
    dictionary: 쉽다
    reading: null
    type: irregular_ㅂ
    group: b-irregular
    meaning:
      en: easy
      ko: 쉽다
    forms:
      present_polite: 쉬워요
      present_formal: 쉽습니다
      past_polite: 쉬웠어요
      past_formal: 쉬웠습니다
      future_polite: 쉬울 거예요
      imperative: "-"
      propositive: "-"
    notes:
      en: "ㅂ irregular adjective. Same pattern: ㅂ→우, then 우+어 → 워. 쉽+어요 → 쉬우+어요 → 쉬워요."
      ko: "ㅂ 불규칙 형용사. 같은 패턴: ㅂ→우, 그 후 우+어 → 워. 쉽+어요 → 쉬우+어요 → 쉬워요."

# ============================================================
# ADJECTIVE CONJUGATION RULES
# ============================================================
adjective_conjugation_rules:
  description:
    en: "Korean adjectives (형용사) conjugate using the same endings as verbs for declarative forms. However, adjectives cannot take imperative (-(으)세요) or propositive (-(으)ㅂ시다) endings, as these are exclusive to action verbs. Adjectives follow the same vowel harmony and irregular rules as verbs."
    ko: "한국어 형용사는 서술형에서 동사와 같은 어미를 사용하여 활용한다. 그러나 형용사는 명령형(-(으)세요)이나 청유형(-(으)ㅂ시다)을 취할 수 없으며, 이는 동작 동사 전용이다. 형용사는 동사와 같은 모음 조화 및 불규칙 규칙을 따른다."
  patterns:
    present_polite: "stem + 아/어요 (same vowel harmony as verbs)"
    present_formal: "stem + ㅂ니다/습니다"
    past_polite: "stem + 았/었어요"
    past_formal: "stem + 았/었습니다"
    future_polite: "stem + (으)ㄹ 거예요"
    imperative: "N/A (not applicable for adjectives)"
    propositive: "N/A (not applicable for adjectives)"
  key_differences_from_verbs:
    en: "1) No imperative or propositive forms. 2) Present tense describes a state, not an action. 3) When modifying nouns, adjectives use -(으)ㄴ (present) instead of -는 (which verbs use): 좋은 사람 (good person), 큰 집 (big house)."
    ko: "1) 명령형, 청유형 없음. 2) 현재 시제가 동작이 아닌 상태를 나타냄. 3) 명사 수식 시 동사의 -는 대신 -(으)ㄴ 사용: 좋은 사람, 큰 집."
