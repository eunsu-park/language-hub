# Korean Tense and Form Rules
# 해요체 (Informal Polite) and 합쇼체 (Formal Polite) speech levels
# Basic tenses + Compound forms + Voice + Special constructions

tenses:
  # ============================================================
  # BASIC TENSES
  # ============================================================
  present:
    id: present
    label:
      en: "Present Tense (현재형)"
      ko: "현재형 (Present Tense)"
    topik: TOPIK_I_1
    formation:
      en: "Verb stem + -아/어요 (polite) or stem + -ㅂ니다/-습니다 (formal). For 하다 verbs: 하다 → 해요 (polite) / 합니다 (formal). Vowel harmony determines -아 vs -어: stems ending in ㅏ/ㅗ take -아, all others take -어."
      ko: "어간 + -아/어요 (해요체) 또는 어간 + -ㅂ니다/-습니다 (합쇼체). 하다 동사: 하다 → 해요 (해요체) / 합니다 (합쇼체). 모음 조화에 따라 -아/-어 결정: ㅏ/ㅗ로 끝나는 어간은 -아, 나머지는 -어."
    patterns:
      polite:
        regular: "stem + -아/어요: 가다 → 가요, 먹다 → 먹어요, 오다 → 와요"
        hada: "하다 → 해요: 공부하다 → 공부해요, 운동하다 → 운동해요"
        copula: "이다 → 이에요/예요: 학생이에요"
      formal:
        consonant_stem: "stem + -습니다: 먹다 → 먹습니다, 읽다 → 읽습니다"
        vowel_stem: "stem + -ㅂ니다: 가다 → 갑니다, 오다 → 옵니다"
        hada: "하다 → 합니다: 공부하다 → 공부합니다"
        copula: "이다 → 입니다: 학생입니다"
    uses:
      - en: "Current states and conditions"
        ko: "현재 상태 및 조건"
        example: "저는 학생이에요. (I am a student.)"
      - en: "Habitual actions and routines"
        ko: "습관적 행동과 일상"
        example: "매일 커피를 마셔요. (I drink coffee every day.)"
      - en: "General truths and facts"
        ko: "일반적 진리와 사실"
        example: "지구는 태양 주위를 돕니다. (The Earth orbits the sun.)"
      - en: "Future events with time context"
        ko: "시간 맥락이 있는 미래 사건"
        example: "내일 서울에 가요. (I'm going to Seoul tomorrow.)"
    trigger_words: [지금, 매일, 항상, 보통, 자주, 요즘, 늘, 언제나]
    notes:
      en: "Korean present tense can express future meaning when accompanied by a future time expression, similar to Japanese non-past. The distinction between 해요체 and 합쇼체 is crucial: 해요체 is used in everyday polite conversation, while 합쇼체 is used in formal settings like news broadcasts, military, and business presentations."
      ko: "한국어 현재형은 미래 시간 표현과 함께 쓰이면 미래 의미를 나타낼 수 있으며, 이는 일본어 비과거형과 유사하다. 해요체와 합쇼체의 구분이 중요하다: 해요체는 일상적 정중 대화에서, 합쇼체는 뉴스 방송, 군대, 비즈니스 발표 등 격식 상황에서 사용."

  past:
    id: past
    label:
      en: "Past Tense (과거형)"
      ko: "과거형 (Past Tense)"
    topik: TOPIK_I_1
    formation:
      en: "Verb stem + -았/었어요 (polite) or stem + -았/었습니다 (formal). Vowel harmony applies: stems with ㅏ/ㅗ take -았, others take -었. For 하다 verbs: 하다 → 했."
      ko: "어간 + -았/었어요 (해요체) 또는 어간 + -았/었습니다 (합쇼체). 모음 조화 적용: ㅏ/ㅗ 어간은 -았, 나머지는 -었. 하다 동사: 하다 → 했."
    patterns:
      polite:
        regular: "stem + -았/었어요: 가다 → 갔어요, 먹다 → 먹었어요, 오다 → 왔어요"
        hada: "하다 → 했어요: 공부하다 → 공부했어요"
        copula: "이다 → 이었어요/였어요: 학생이었어요"
      formal:
        regular: "stem + -았/었습니다: 가다 → 갔습니다, 먹다 → 먹었습니다"
        hada: "하다 → 했습니다: 공부하다 → 공부했습니다"
        copula: "이다 → 이었습니다/였습니다: 학생이었습니다"
    uses:
      - en: "Completed actions in the past"
        ko: "과거에 완료된 행동"
        example: "어제 영화를 봤어요. (I watched a movie yesterday.)"
      - en: "Past experiences"
        ko: "과거 경험"
        example: "작년에 일본에 갔습니다. (I went to Japan last year.)"
      - en: "Discovery or realization"
        ko: "발견 또는 깨달음"
        example: "아, 버스가 왔어요! (Oh, the bus came!)"
    trigger_words: [어제, 지난주, 작년, 아까, 이미, 전에, 방금, 지난달, 예전에]
    notes:
      en: "Contraction is common: 가 + 았 → 갔, 오 + 았 → 왔, 마시 + 었 → 마셨, 하 + 였 → 했. The past tense marker -았/었 fuses with the preceding vowel."
      ko: "축약이 일반적: 가 + 았 → 갔, 오 + 았 → 왔, 마시 + 었 → 마셨, 하 + 였 → 했. 과거 시제 표지 -았/었이 앞의 모음과 융합."

  future:
    id: future
    label:
      en: "Future Tense (미래형)"
      ko: "미래형 (Future Tense)"
    topik: TOPIK_I_2
    formation:
      en: "Verb stem + -(으)ㄹ 거예요 (polite) or stem + -(으)ㄹ 겁니다 (formal). Also: stem + -겠- for speaker's will or conjecture. Consonant-ending stems take -을, vowel-ending stems take -ㄹ."
      ko: "어간 + -(으)ㄹ 거예요 (해요체) 또는 어간 + -(으)ㄹ 겁니다 (합쇼체). 또한: 어간 + -겠- (화자의 의지/추측). 자음 어간은 -을, 모음 어간은 -ㄹ."
    patterns:
      polite:
        regular: "stem + -(으)ㄹ 거예요: 가다 → 갈 거예요, 먹다 → 먹을 거예요"
        hada: "하다 → 할 거예요: 공부하다 → 공부할 거예요"
      formal:
        regular: "stem + -(으)ㄹ 겁니다: 가다 → 갈 겁니다, 먹다 → 먹을 겁니다"
        hada: "하다 → 할 겁니다: 공부하다 → 공부할 겁니다"
      gess:
        polite: "stem + -겠어요: 가다 → 가겠어요, 먹다 → 먹겠어요"
        formal: "stem + -겠습니다: 가다 → 가겠습니다, 먹다 → 먹겠습니다"
    uses:
      - en: "Plans and intentions"
        ko: "계획과 의도"
        example: "내일 도서관에 갈 거예요. (I'm going to the library tomorrow.)"
      - en: "Predictions about the future"
        ko: "미래에 대한 예측"
        example: "내년에 졸업할 겁니다. (I will graduate next year.)"
      - en: "Speaker's strong will or determination (-겠-)"
        ko: "화자의 강한 의지 또는 결심 (-겠-)"
        example: "제가 하겠습니다. (I will do it.)"
      - en: "Conjecture or supposition (-겠-)"
        ko: "추측 또는 짐작 (-겠-)"
        example: "맛있겠어요. (It must be delicious. / That looks delicious.)"
    trigger_words: [내일, 다음 주, 내년, 나중에, 곧, 앞으로, 다음 달, 이따가]
    notes:
      en: "-(으)ㄹ 거예요 is the most common future expression for plans and predictions. -겠- has two main uses: (1) first-person will/determination, (2) conjecture about any subject. In formal service contexts, -겠습니다 is standard: 알겠습니다 (understood), 도와드리겠습니다 (I will help you)."
      ko: "-(으)ㄹ 거예요는 계획과 예측에 가장 흔한 미래 표현. -겠-은 두 가지 주요 용법: (1) 1인칭 의지/결심, (2) 모든 주어에 대한 추측. 격식 서비스 맥락에서 -겠습니다가 표준: 알겠습니다 (알겠음), 도와드리겠습니다 (도와드리겠음)."

  # ============================================================
  # COMPOUND TENSES
  # ============================================================
  progressive:
    id: progressive
    label:
      en: "Progressive Form (진행형)"
      ko: "진행형 (Progressive Form)"
    topik: TOPIK_I_2
    formation:
      en: "Verb stem + -고 있다. Polite: -고 있어요. Formal: -고 있습니다. Expresses an action currently in progress."
      ko: "어간 + -고 있다. 해요체: -고 있어요. 합쇼체: -고 있습니다. 현재 진행 중인 동작 표현."
    patterns:
      polite:
        regular: "stem + -고 있어요: 먹다 → 먹고 있어요, 읽다 → 읽고 있어요"
        hada: "하다 → 하고 있어요: 공부하다 → 공부하고 있어요"
      formal:
        regular: "stem + -고 있습니다: 먹다 → 먹고 있습니다, 읽다 → 읽고 있습니다"
        hada: "하다 → 하고 있습니다: 공부하다 → 공부하고 있습니다"
    uses:
      - en: "Action in progress at the moment of speaking"
        ko: "발화 시점에 진행 중인 동작"
        example: "지금 밥을 먹고 있어요. (I am eating now.)"
      - en: "Temporary ongoing situation"
        ko: "일시적으로 진행 중인 상황"
        example: "요즘 한국어를 배우고 있습니다. (I am learning Korean these days.)"
      - en: "Wearing/carrying (state verbs)"
        ko: "착용/소지 (상태 동사)"
        example: "모자를 쓰고 있어요. (I am wearing a hat.)"
    trigger_words: [지금, 현재, 아직, 요즘]
    notes:
      en: "Unlike English, Korean does not require progressive for current actions — present tense alone is often sufficient. -고 있다 emphasizes the ongoing nature. For some verbs like 알다 (to know) and 살다 (to live), -고 있다 indicates a continuing state rather than an action in progress."
      ko: "영어와 달리 한국어는 현재 동작에 반드시 진행형을 쓸 필요가 없으며, 현재형만으로 충분한 경우가 많다. -고 있다는 진행의 측면을 강조. 알다, 살다 같은 동사는 -고 있다가 진행이 아닌 지속 상태를 나타냄."

  past_progressive:
    id: past_progressive
    label:
      en: "Past Progressive Form (과거 진행형)"
      ko: "과거 진행형 (Past Progressive Form)"
    topik: TOPIK_I_2
    formation:
      en: "Verb stem + -고 있었다. Polite: -고 있었어요. Formal: -고 있었습니다. Expresses an action that was in progress at a past point in time."
      ko: "어간 + -고 있었다. 해요체: -고 있었어요. 합쇼체: -고 있었습니다. 과거 특정 시점에 진행 중이었던 동작 표현."
    patterns:
      polite:
        regular: "stem + -고 있었어요: 먹다 → 먹고 있었어요, 자다 → 자고 있었어요"
        hada: "하다 → 하고 있었어요: 공부하다 → 공부하고 있었어요"
      formal:
        regular: "stem + -고 있었습니다: 먹다 → 먹고 있었습니다, 자다 → 자고 있었습니다"
        hada: "하다 → 하고 있었습니다: 공부하다 → 공부하고 있었습니다"
    uses:
      - en: "Action was in progress at a specific past moment"
        ko: "과거 특정 시점에 동작이 진행 중이었음"
        example: "그때 저는 자고 있었어요. (I was sleeping at that time.)"
      - en: "Background action interrupted by another event"
        ko: "다른 사건에 의해 중단된 배경 동작"
        example: "텔레비전을 보고 있었는데 전화가 왔어요. (I was watching TV when the phone rang.)"
    trigger_words: [그때, 그 시간에, 그 순간]
    notes:
      en: "Less commonly used than in English. Korean often uses simple past tense where English would use past progressive, relying on context for the progressive meaning."
      ko: "영어보다 사용 빈도가 낮다. 한국어는 영어에서 과거 진행형을 쓸 자리에 단순 과거형을 쓰는 경우가 많으며, 진행 의미는 문맥에 의존."

  past_perfect:
    id: past_perfect
    label:
      en: "Past Perfect / Discontinuous Past (대과거)"
      ko: "대과거 (Past Perfect)"
    topik: TOPIK_II_3
    formation:
      en: "Verb stem + -았/었었다. Polite: -았/었었어요. Formal: -았/었었습니다. Double past tense marker indicates a past state that is no longer true or an action completed before another past event."
      ko: "어간 + -았/었었다. 해요체: -았/었었어요. 합쇼체: -았/었었습니다. 이중 과거 시제 표지로 더 이상 사실이 아닌 과거 상태 또는 다른 과거 사건보다 먼저 완료된 행동 표현."
    patterns:
      polite:
        regular: "stem + -았/었었어요: 가다 → 갔었어요, 먹다 → 먹었었어요"
        hada: "하다 → 했었어요: 공부하다 → 공부했었어요"
      formal:
        regular: "stem + -았/었었습니다: 가다 → 갔었습니다, 먹다 → 먹었었습니다"
        hada: "하다 → 했었습니다: 공부하다 → 공부했었습니다"
    uses:
      - en: "Past state that no longer holds (discontinuity)"
        ko: "더 이상 유효하지 않은 과거 상태 (불연속)"
        example: "예전에 여기 공원이 있었었어요. (There used to be a park here before.)"
      - en: "Action completed before another past event"
        ko: "다른 과거 사건보다 먼저 완료된 행동"
        example: "그가 도착했을 때 저는 이미 떠났었어요. (When he arrived, I had already left.)"
      - en: "Nostalgic recollection of past experiences"
        ko: "과거 경험에 대한 향수적 회상"
        example: "어렸을 때 이 동네에서 살았었어요. (I used to live in this neighborhood when I was young.)"
    notes:
      en: "The double past -았/었었- emphasizes that the past situation has changed — it is no longer the case. Compare: 서울에 살았어요 (I lived in Seoul — may still live there) vs. 서울에 살았었어요 (I lived in Seoul — but not anymore). Less common in spoken Korean; used mainly for emphasis on discontinuity."
      ko: "-았/었었-은 과거 상황이 변했음을 강조 — 현재는 더 이상 그렇지 않다. 비교: 서울에 살았어요 (서울에 살았다 — 지금도 살 수 있음) vs. 서울에 살았었어요 (서울에 살았다 — 하지만 지금은 아님). 구어에서는 덜 흔하며 주로 불연속성 강조에 사용."

  # ============================================================
  # INTENTION & CONJECTURE
  # ============================================================
  prospective:
    id: prospective
    label:
      en: "Prospective / Intention Form (예정/의도)"
      ko: "예정/의도 (Prospective Form)"
    topik: TOPIK_II_3
    formation:
      en: "Verb stem + -(으)려고 하다. Polite: -(으)려고 해요. Formal: -(으)려고 합니다. Expresses the intention or plan to do something, or being about to do something."
      ko: "어간 + -(으)려고 하다. 해요체: -(으)려고 해요. 합쇼체: -(으)려고 합니다. 무엇을 하려는 의도나 계획, 또는 막 하려는 상황 표현."
    patterns:
      polite:
        consonant_stem: "stem + -으려고 해요: 먹다 → 먹으려고 해요, 읽다 → 읽으려고 해요"
        vowel_stem: "stem + -려고 해요: 가다 → 가려고 해요, 보다 → 보려고 해요"
        hada: "하다 → 하려고 해요: 공부하다 → 공부하려고 해요"
      formal:
        consonant_stem: "stem + -으려고 합니다: 먹다 → 먹으려고 합니다"
        vowel_stem: "stem + -려고 합니다: 가다 → 가려고 합니다"
        hada: "하다 → 하려고 합니다: 공부하다 → 공부하려고 합니다"
    uses:
      - en: "Expressing intention or plan"
        ko: "의도나 계획 표현"
        example: "주말에 등산을 하려고 해요. (I'm planning to go hiking on the weekend.)"
      - en: "About to do something (imminent action)"
        ko: "막 무엇을 하려는 참 (임박한 동작)"
        example: "지금 막 나가려고 해요. (I'm just about to go out.)"
      - en: "Softening a statement of intent"
        ko: "의도 표현의 완곡화"
        example: "이번 학기에 한국어를 배우려고 합니다. (I intend to learn Korean this semester.)"
    trigger_words: [곧, 이제, 막, 앞으로]
    notes:
      en: "-(으)려고 하다 is softer than -(으)ㄹ 거예요 for expressing plans. Related form: -(으)려면 (if one intends to) combines intention with conditional."
      ko: "-(으)려고 하다는 계획 표현에서 -(으)ㄹ 거예요보다 부드럽다. 관련 형태: -(으)려면 (의도와 조건의 결합)."

  presumptive:
    id: presumptive
    label:
      en: "Presumptive / Conjecture Form (추측)"
      ko: "추측 (Presumptive Form)"
    topik: TOPIK_II_3
    formation:
      en: "Verb/adjective stem + -(으)ㄹ 것 같다. Polite: -(으)ㄹ 것 같아요. Also: stem + -나 보다 (inference from evidence), stem + -(으)ㄴ/는 모양이다 (inference from appearance)."
      ko: "동사/형용사 어간 + -(으)ㄹ 것 같다. 해요체: -(으)ㄹ 것 같아요. 또한: 어간 + -나 보다 (증거에 근거한 추론), 어간 + -(으)ㄴ/는 모양이다 (외양에 근거한 추론)."
    patterns:
      future_guess:
        polite: "stem + -(으)ㄹ 것 같아요: 비가 올 것 같아요 (It seems like it will rain)"
        formal: "stem + -(으)ㄹ 것 같습니다: 비가 올 것 같습니다"
      present_guess:
        polite: "stem + -는 것 같아요: 지금 자는 것 같아요 (It seems like they're sleeping now)"
      past_guess:
        polite: "stem + -(으)ㄴ 것 같아요: 벌써 간 것 같아요 (It seems like they already left)"
      inference:
        na_boda: "stem + -나 봐요: 바쁜가 봐요 (It seems they're busy — from evidence)"
        moyang: "stem + -는 모양이에요: 좋아하는 모양이에요 (It appears they like it)"
    uses:
      - en: "Guessing or supposing about a situation"
        ko: "상황에 대한 추측 또는 짐작"
        example: "내일 비가 올 것 같아요. (It looks like it will rain tomorrow.)"
      - en: "Inference based on observed evidence"
        ko: "관찰된 증거에 기반한 추론"
        example: "많이 피곤한가 봐요. (It seems you're very tired.)"
      - en: "Hedging or softening a statement"
        ko: "발언의 완화 또는 부드러운 표현"
        example: "이게 더 좋을 것 같아요. (I think this one might be better.)"
    trigger_words: [아마, 혹시, 어쩌면, 아무래도, 글쎄]
    notes:
      en: "-(으)ㄹ 것 같다 is extremely common in everyday Korean for softening assertions. Koreans frequently use it even when fairly certain, as a politeness strategy. -나 보다 implies the speaker has some evidence but did not directly witness it."
      ko: "-(으)ㄹ 것 같다는 일상 한국어에서 주장을 부드럽게 하는 데 매우 흔하다. 한국인들은 꽤 확신이 있을 때도 공손함의 전략으로 자주 사용. -나 보다는 화자가 증거를 가지고 있지만 직접 목격하지는 않았음을 암시."

  # ============================================================
  # RETROSPECTIVE & HABITUAL
  # ============================================================
  retrospective:
    id: retrospective
    label:
      en: "Retrospective Form (회상)"
      ko: "회상 (Retrospective Form)"
    topik: TOPIK_II_4
    formation:
      en: "Verb stem + -더라 (recalling past observation), stem + -더니 (past observation leading to result), stem + -던 (modifier: past habitual/incomplete). These forms indicate the speaker is recalling something they personally witnessed or experienced."
      ko: "어간 + -더라 (과거 관찰 회상), 어간 + -더니 (과거 관찰 → 결과), 어간 + -던 (관형사: 과거 습관/미완료). 이 형태들은 화자가 직접 목격하거나 경험한 것을 회상함을 나타냄."
    patterns:
      dera:
        usage: "Sentence-final: recalling a past observation"
        example: "그 식당 음식이 맛있더라. (That restaurant's food was good — I recall from experience.)"
      deoni:
        usage: "Connective: past observation leads to a result"
        example: "열심히 공부하더니 시험에 합격했어요. (They studied hard, and so they passed the exam.)"
      deon:
        usage: "Modifier: past habitual or incomplete past action"
        example: "자주 가던 카페가 문을 닫았어요. (The cafe I used to go to has closed.)"
    uses:
      - en: "Recalling something the speaker personally witnessed"
        ko: "화자가 직접 목격한 것을 회상"
        example: "서울은 정말 사람이 많더라. (Seoul really had a lot of people — I saw it myself.)"
      - en: "Contrasting a past observation with the present"
        ko: "과거 관찰과 현재를 대조"
        example: "어렸을 때는 키가 작더니 지금은 많이 컸어요. (They were short as a child, but now they've grown a lot.)"
      - en: "Describing past habitual actions (as modifier)"
        ko: "과거 습관적 행동 기술 (관형사로)"
        example: "매일 읽던 책을 다 읽었어요. (I finished the book I used to read every day.)"
    notes:
      en: "-더라 is a first-person observation marker — the speaker is reporting what they personally witnessed, not hearsay. It is generally not used for one's own intentional actions (you wouldn't normally say 내가 먹더라). -던 vs -은: 가던 길 (the road I was going on / used to go on) vs 간 길 (the road I went on — completed)."
      ko: "-더라는 1인칭 관찰 표지 — 화자가 직접 목격한 것을 보고하는 것이지 전문(傳聞)이 아님. 일반적으로 자신의 의도적 행동에는 사용하지 않음 (보통 '내가 먹더라'라고 하지 않음). -던 vs -은: 가던 길 (가고 있었던/가곤 했던 길) vs 간 길 (간 길 — 완료)."

  habitual_past:
    id: habitual_past
    label:
      en: "Habitual Past Form (습관 과거)"
      ko: "습관 과거 (Habitual Past Form)"
    topik: TOPIK_II_4
    formation:
      en: "Verb stem + -곤 하다. Polite: -곤 했어요. Formal: -곤 했습니다. Expresses actions that were done habitually or repeatedly in the past."
      ko: "어간 + -곤 하다. 해요체: -곤 했어요. 합쇼체: -곤 했습니다. 과거에 습관적 또는 반복적으로 했던 행동 표현."
    patterns:
      polite:
        regular: "stem + -곤 했어요: 가다 → 가곤 했어요, 먹다 → 먹곤 했어요"
        hada: "하다 → 하곤 했어요: 운동하다 → 운동하곤 했어요"
      formal:
        regular: "stem + -곤 했습니다: 가다 → 가곤 했습니다, 먹다 → 먹곤 했습니다"
        hada: "하다 → 하곤 했습니다: 운동하다 → 운동하곤 했습니다"
    uses:
      - en: "Actions done habitually in the past (used to)"
        ko: "과거에 습관적으로 했던 행동"
        example: "어렸을 때 매일 바다에 가곤 했어요. (When I was young, I used to go to the sea every day.)"
      - en: "Nostalgic recollection of past routines"
        ko: "과거 일상에 대한 향수적 회상"
        example: "대학 시절에 친구들과 밤새 이야기하곤 했습니다. (During college, we used to talk all night with friends.)"
    trigger_words: [예전에, 어렸을 때, 그때, 옛날에, 학생 때]
    notes:
      en: "-곤 하다 specifically emphasizes the habitual/repetitive nature of the past action. Compare: 갔어요 (went — single or habitual) vs 가곤 했어요 (used to go — clearly habitual). Similar to English 'used to' or 'would (habitually)'."
      ko: "-곤 하다는 과거 행동의 습관적/반복적 성격을 특별히 강조. 비교: 갔어요 (갔다 — 일회성 또는 습관적) vs 가곤 했어요 (가곤 했다 — 명확히 습관적). 영어의 'used to' 또는 'would (habitually)'와 유사."

  # ============================================================
  # VOICE
  # ============================================================
  passive:
    id: passive
    label:
      en: "Passive Voice (피동)"
      ko: "피동 (Passive Voice)"
    topik: TOPIK_II_3
    formation:
      en: "Two types: (1) Short passive — stem + -이/히/리/기 (lexicalized, limited set of verbs). (2) Long passive — stem + -아/어지다 (productive, usable with most verbs). The short passive suffixes are not predictable and must be memorized."
      ko: "두 가지: (1) 짧은 피동 — 어간 + -이/히/리/기 (어휘화, 제한된 동사). (2) 긴 피동 — 어간 + -아/어지다 (생산적, 대부분의 동사에 사용 가능). 짧은 피동 접미사는 예측 불가능하며 암기 필요."
    patterns:
      short_passive:
        i: "보다 → 보이다 (to be seen), 쌓다 → 쌓이다 (to be piled up), 놓다 → 놓이다 (to be placed)"
        hi: "잡다 → 잡히다 (to be caught), 읽다 → 읽히다 (to be read), 막다 → 막히다 (to be blocked)"
        ri: "열다 → 열리다 (to be opened), 풀다 → 풀리다 (to be solved), 걸다 → 걸리다 (to be hung/caught)"
        gi: "끊다 → 끊기다 (to be cut off), 안다 → 안기다 (to be held), 쫓다 → 쫓기다 (to be chased)"
      long_passive:
        regular: "stem + -아/어지다: 만들다 → 만들어지다 (to be made), 깨다 → 깨지다 (to be broken)"
        hada: "하다 verbs generally do not take short passive; use -되다: 발견하다 → 발견되다 (to be discovered)"
    uses:
      - en: "The subject receives the action"
        ko: "주어가 동작을 받음"
        example: "문이 열렸어요. (The door was opened.)"
      - en: "Natural occurrence or spontaneous change"
        ko: "자연적 발생 또는 자발적 변화"
        example: "날씨가 추워졌어요. (The weather got cold.)"
      - en: "Focus on the result rather than the agent"
        ko: "행위자보다 결과에 초점"
        example: "이 책은 많은 사람들에게 읽히고 있어요. (This book is being read by many people.)"
    notes:
      en: "Not all verbs have short passive forms — the suffix (-이/히/리/기) is lexically determined and must be memorized. -아/어지다 is the productive alternative and works with most action verbs. For 하다 compound verbs, the passive is typically formed with -되다: 건설하다 → 건설되다 (to be constructed). Avoid double passives like *잡혀지다 (잡히다 is already passive)."
      ko: "모든 동사에 짧은 피동형이 있는 것은 아님 — 접미사(-이/히/리/기)는 어휘적으로 결정되며 암기 필요. -아/어지다는 생산적 대안으로 대부분의 동작 동사와 사용 가능. 하다 합성 동사는 주로 -되다로 피동: 건설하다 → 건설되다. *잡혀지다 같은 이중 피동 사용은 피할 것 (잡히다가 이미 피동)."

  causative:
    id: causative
    label:
      en: "Causative Voice (사동)"
      ko: "사동 (Causative Voice)"
    topik: TOPIK_II_4
    formation:
      en: "Two types: (1) Short causative — stem + -이/히/리/기/우/추 (lexicalized, limited set). (2) Long causative — stem + -게 하다 (productive, usable with any verb). Short causative suffixes are not predictable."
      ko: "두 가지: (1) 짧은 사동 — 어간 + -이/히/리/기/우/추 (어휘화, 제한된 동사). (2) 긴 사동 — 어간 + -게 하다 (생산적, 모든 동사에 사용 가능). 짧은 사동 접미사는 예측 불가능."
    patterns:
      short_causative:
        i: "먹다 → 먹이다 (to feed), 보다 → 보이다 (to show), 죽다 → 죽이다 (to kill)"
        hi: "읽다 → 읽히다 (to make read), 앉다 → 앉히다 (to seat), 입다 → 입히다 (to dress someone)"
        ri: "살다 → 살리다 (to save/revive), 알다 → 알리다 (to inform), 울다 → 울리다 (to make cry)"
        gi: "웃다 → 웃기다 (to make laugh), 벗다 → 벗기다 (to undress someone), 숨다 → 숨기다 (to hide something)"
        u: "자다 → 재우다 (to put to sleep), 타다 → 태우다 (to give a ride/burn), 깨다 → 깨우다 (to wake someone)"
        chu: "낮다 → 낮추다 (to lower), 맞다 → 맞추다 (to match/adjust), 늦다 → 늦추다 (to delay)"
      long_causative:
        regular: "stem + -게 하다: 공부하다 → 공부하게 하다 (to make someone study)"
        examples: "먹다 → 먹게 하다 (to let/make eat), 가다 → 가게 하다 (to let/make go)"
    uses:
      - en: "Making someone do something (compulsion)"
        ko: "누군가에게 시키기 (강제)"
        example: "엄마가 아이에게 우유를 먹였어요. (Mom fed the child milk.)"
      - en: "Letting or allowing someone to do something"
        ko: "누군가에게 하게 허락하기"
        example: "선생님이 학생들을 집에 가게 했어요. (The teacher let the students go home.)"
      - en: "Causing a change of state"
        ko: "상태 변화 유발"
        example: "방을 따뜻하게 해 주세요. (Please make the room warm.)"
    notes:
      en: "Short causative forms are lexicalized and must be memorized — they cannot be predicted from the base verb. -게 하다 is productive and can be used with any verb, making it the safe choice when uncertain. Some verbs have both short and long causative with slightly different nuances: 먹이다 (directly feed) vs 먹게 하다 (make/let someone eat). Note that some suffixes create both passive and causative (e.g., 보이다 = to be seen / to show) — context disambiguates."
      ko: "짧은 사동형은 어휘화되어 암기 필요 — 기본 동사에서 예측 불가능. -게 하다는 생산적이어서 모든 동사에 사용 가능하므로 확실하지 않을 때 안전한 선택. 일부 동사는 짧은 사동과 긴 사동 모두 가능하며 미묘한 차이: 먹이다 (직접 먹이다) vs 먹게 하다 (먹게 시키다/허락하다). 일부 접미사는 피동과 사동 모두 생성 (예: 보이다 = 보이다/보여주다) — 문맥으로 구별."

  # ============================================================
  # SPECIAL CONSTRUCTIONS
  # ============================================================
  reported_speech:
    id: reported_speech
    label:
      en: "Reported Speech / Indirect Quotation (간접 화법)"
      ko: "간접 화법 (Reported Speech)"
    topik: TOPIK_II_3
    formation:
      en: "Indirect quotation patterns vary by sentence type. Statements: -다고 하다. Questions: -냐고 하다. Commands: -(으)라고 하다. Suggestions: -자고 하다. 하다 can be replaced with other verbs of communication."
      ko: "간접 인용 패턴은 문장 유형에 따라 다름. 평서문: -다고 하다. 의문문: -냐고 하다. 명령문: -(으)라고 하다. 청유문: -자고 하다. 하다 대신 다른 전달 동사 사용 가능."
    patterns:
      statement:
        present: "verb stem + -ㄴ/는다고 하다: 간다고 해요 (says they're going)"
        past: "verb stem + -았/었다고 하다: 갔다고 해요 (says they went)"
        future: "verb stem + -(으)ㄹ 거라고 하다: 갈 거라고 해요 (says they will go)"
        adjective: "adjective stem + -다고 하다: 춥다고 해요 (says it's cold)"
        noun: "noun + (이)라고 하다: 학생이라고 해요 (says they're a student)"
      question:
        regular: "verb stem + -냐고 하다: 가냐고 해요 (asks if they're going)"
        formal: "verb stem + -(으)냐고 하다: 먹었느냐고 했어요 (asked if they ate)"
      command:
        regular: "verb stem + -(으)라고 하다: 가라고 해요 (tells someone to go)"
        example: "빨리 오라고 했어요. (They told me to come quickly.)"
      suggestion:
        regular: "verb stem + -자고 하다: 같이 가자고 해요 (suggests going together)"
        example: "내일 만나자고 했어요. (They suggested meeting tomorrow.)"
      shortened:
        statement: "-대요: 간대요 (they say they're going)"
        question: "-냬요: 뭐 하냬요 (they ask what you're doing)"
        command: "-래요: 오래요 (they say to come)"
        suggestion: "-재요: 같이 가재요 (they suggest going together)"
    uses:
      - en: "Reporting what someone said"
        ko: "누군가가 말한 것을 전달"
        example: "민수가 내일 온다고 했어요. (Minsu said he's coming tomorrow.)"
      - en: "Reporting questions from others"
        ko: "다른 사람의 질문 전달"
        example: "어디 가냐고 물어봤어요. (They asked where I'm going.)"
      - en: "Relaying commands or requests"
        ko: "명령이나 요청 전달"
        example: "선생님이 조용히 하라고 하셨어요. (The teacher told us to be quiet.)"
      - en: "Sharing suggestions or proposals"
        ko: "제안 전달"
        example: "친구가 영화 보자고 했어요. (My friend suggested watching a movie.)"
    notes:
      en: "Reported speech is used far more frequently in Korean than in European languages. The shortened forms (-대요, -냬요, -래요, -재요) are extremely common in casual conversation. Note: 하다 can be replaced with verbs like 말하다 (to say), 묻다/물어보다 (to ask), 부탁하다 (to request), 제안하다 (to suggest) for more specific meanings."
      ko: "간접 화법은 유럽 언어들보다 한국어에서 훨씬 더 자주 사용됨. 축약형(-대요, -냬요, -래요, -재요)은 일상 대화에서 매우 흔함. 참고: 하다 대신 말하다, 묻다/물어보다, 부탁하다, 제안하다 등으로 교체하여 더 구체적인 의미 표현 가능."

  conditional:
    id: conditional
    label:
      en: "Conditional Form (조건)"
      ko: "조건 (Conditional Form)"
    topik: TOPIK_I_2
    formation:
      en: "Verb/adjective stem + -(으)면. Consonant-ending stems take -으면, vowel-ending stems take -면. Also: -다면 (hypothetical/contrary-to-fact), -(으)려면 (if one intends to)."
      ko: "동사/형용사 어간 + -(으)면. 자음 어간은 -으면, 모음 어간은 -면. 또한: -다면 (가정/반사실), -(으)려면 (의도 조건)."
    patterns:
      basic:
        consonant_stem: "stem + -으면: 먹다 → 먹으면, 읽다 → 읽으면"
        vowel_stem: "stem + -면: 가다 → 가면, 오다 → 오면"
        hada: "하다 → 하면: 공부하다 → 공부하면"
        copula: "이다 → 이면: 학생이면"
      hypothetical:
        damyeon: "stem + -다면: 시간이 있다면 (if there were time)"
        example: "내가 새라면 날아갈 텐데. (If I were a bird, I would fly away.)"
      intentional:
        euryeomyeon: "stem + -(으)려면: 가려면 (if you intend to go)"
        example: "한국어를 잘하려면 많이 연습해야 해요. (If you want to be good at Korean, you need to practice a lot.)"
    uses:
      - en: "Real conditional (if/when)"
        ko: "현실 조건 (만약/~할 때)"
        example: "비가 오면 집에 있을 거예요. (If it rains, I'll stay home.)"
      - en: "General truths and natural consequences"
        ko: "일반적 진리와 자연스러운 결과"
        example: "봄이 오면 꽃이 피어요. (When spring comes, flowers bloom.)"
      - en: "Hypothetical or contrary-to-fact conditions"
        ko: "가정 또는 반사실적 조건"
        example: "돈이 많다면 세계 여행을 할 텐데. (If I had a lot of money, I would travel the world.)"
      - en: "Prerequisite condition (if one intends to)"
        ko: "전제 조건 (의도 조건)"
        example: "역에 가려면 이 길로 가세요. (If you want to go to the station, take this road.)"
    trigger_words: [만약, 만일, 혹시]
    notes:
      en: "-(으)면 covers both 'if' and 'when' in most contexts, unlike English which distinguishes them. -다면 adds a more hypothetical or contrary-to-fact nuance. -(으)려면 combines intention (-(으)려고) with condition (-(으)면), meaning 'if one wants/intends to'. Related: -아/어야 (only if, must) as in 공부해야 합격해요 (you must study to pass)."
      ko: "-(으)면은 영어와 달리 대부분의 맥락에서 'if'와 'when' 모두를 포괄. -다면은 더 가정적/반사실적 뉘앙스 추가. -(으)려면은 의도(-(으)려고)와 조건(-(으)면)의 결합으로 '~하려면'의 의미. 관련: -아/어야 (~해야만) 예: 공부해야 합격해요 (공부해야 합격함)."
